<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>시안 도우미</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- ───────── 1. 시안 정보 입력 ───────── -->
    <section class="card">
      <h3>🎨 시안 정보</h3>

      <div class="row">
        <label>규격</label>
        <input type="text" id="spec" list="spec-list" placeholder="예: 600*900 / 550파이">
        <datalist id="spec-list"></datalist>
      </div>

      <div class="row">
        <label>상품명</label>
        <input type="text" id="kind" list="kind-list" placeholder="입력하면 자동완성">
        <datalist id="kind-list"></datalist>
        <button class="mini" id="kind-opt-btn" title="옵션 추가">+ 옵션</button>
      </div>

      <!-- 옵션 추가 패널 (토글) -->
      <div class="row sub-panel hidden" id="opt-panel">
        <div class="opt-grid" id="opt-grid"></div>
        <input type="text" id="opt-custom" placeholder="직접 입력 (쉼표로 구분)">
        <div class="actions">
          <button class="primary" id="opt-add-btn">상품명에 추가</button>
          <button id="opt-close-btn">닫기</button>
        </div>
      </div>

      <div class="row">
        <label>옵션</label>
        <input type="text" id="opt" placeholder="예: 반사실사/단면">
      </div>

      <div class="row">
        <label>수량</label>
        <span class="qty-mode">
          <label><input type="radio" name="qty-mode" value="single" checked> 단일</label>
          <input type="number" id="qty-single" value="1" min="1" style="width:60px">개
          <label><input type="radio" name="qty-mode" value="multi"> 다중</label>
        </span>
      </div>

      <div class="row hidden" id="qty-multi-row">
        <label></label>
        <span>각 <input type="number" id="qty-each" min="1" style="width:60px">개씩 총
          <input type="number" id="qty-total" min="1" style="width:80px">개</span>
      </div>

      <div class="row">
        <label>납품일</label>
        <input type="number" id="date-month" min="1" max="12" style="width:50px">
        <span>/</span>
        <input type="number" id="date-day" min="1" max="31" style="width:50px">
        <span class="hint">M/D</span>
      </div>
    </section>

    <!-- ───────── 2. 미리보기 ───────── -->
    <section class="card">
      <h3>👁 미리보기</h3>
      <div class="preview" id="preview-line1">(입력하면 여기 표시)</div>
      <div class="preview-sub" id="preview-line2"></div>
    </section>

    <!-- ───────── 3. 텍스트 삽입 액션 ───────── -->
    <div class="actions">
      <button class="primary" id="btn-insert">텍스트 삽입</button>
      <button id="btn-clear">초기화</button>
    </div>

    <!-- ───────── 4. 시안 저장 (항상 보임) ───────── -->
    <section class="card">
      <h3>💾 시안 저장</h3>

      <div class="row">
        <label>월일</label>
        <input type="text" id="save-date" style="width:80px">
      </div>

      <div class="row">
        <label>건설사</label>
        <input type="text" id="save-brand" list="brand-list" placeholder="예: 두산">
        <datalist id="brand-list"></datalist>
      </div>

      <div class="row">
        <label>현장</label>
        <input type="text" id="save-site" placeholder="예: 성수장미">
      </div>

      <div class="row">
        <label>종류</label>
        <input type="text" id="save-kind" list="kind-list" placeholder="(상품명에서 자동)">
      </div>

      <div class="row">
        <label>옵션</label>
        <input type="text" id="save-opt" placeholder="(옵션에서 자동)">
      </div>

      <div class="row">
        <label>버전</label>
        <input type="text" id="save-ver" value="v1" style="width:60px">
      </div>

      <div class="row">
        <label>발주처</label>
        <input type="text" id="save-vendor" list="vendor-list" value="공장">
        <datalist id="vendor-list"></datalist>
      </div>

      <div class="row">
        <label>형식</label>
        <span class="fmt-row">
          <label><input type="checkbox" id="fmt-ai" checked> 원본 .ai (CC)</label>
          <label><input type="checkbox" id="fmt-cs6" checked> 발주 .ai (CS6)</label>
          <label><input type="checkbox" id="fmt-jpg" checked> .jpg</label>
          <label><input type="checkbox" id="fmt-pdf"> .pdf</label>
        </span>
      </div>

      <div class="row">
        <label>폴더</label>
        <span class="folder-preview" id="save-folder">D:\...</span>
      </div>

      <div class="actions">
        <button class="primary big" id="btn-save">💾 한 번에 저장</button>
      </div>
    </section>

    <!-- 상태 표시 -->
    <div id="status"></div>

  </div>

  <script src="main.js"></script>
</body>
</html>
