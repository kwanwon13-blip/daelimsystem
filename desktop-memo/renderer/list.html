<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>워크스페이스 — 대림에스엠</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #f8f9fb;
      color: #1f2937;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .head {
      padding: 14px 16px 10px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
    }
    .head h1 { font-size: 15px; font-weight: 700; margin-bottom: 4px; color: #111827; }
    .head .sub { font-size: 11px; color: #6b7280; }

    .toolbar {
      padding: 8px 16px;
      background: #fff;
      border-bottom: 1px solid #f3f4f6;
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .toolbar input {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-size: 12px;
      outline: none;
      font-family: inherit;
    }
    .toolbar input:focus { border-color: #4f6ef7; }
    .toolbar button {
      padding: 6px 12px;
      background: #4f6ef7;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      flex-shrink: 0;
    }
    .toolbar button:hover { background: #4338ca; }

    .list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .item {
      padding: 10px 12px;
      background: #fff;
      border: 1px solid #f3f4f6;
      border-radius: 8px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: all .12s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .item:hover { border-color: #c7d2fe; background: #f0f9ff; }
    .item .emo { font-size: 18px; flex-shrink: 0; }
    .item .body { flex: 1; min-width: 0; }
    .item .title { font-size: 13px; font-weight: 600; color: #111827; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item .meta { font-size: 10.5px; color: #9ca3af; margin-top: 2px; }
    .item .pin {
      font-size: 14px;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 4px;
      color: #d1d5db;
      transition: all .12s;
    }
    .item .pin:hover { background: #fef3c7; }
    .item .pin.active { color: #f59e0b; }

    .empty, .err, .loading {
      text-align: center;
      padding: 60px 20px;
      color: #9ca3af;
      font-size: 13px;
    }
    .empty .ic, .err .ic, .loading .ic { font-size: 32px; opacity: .4; margin-bottom: 8px; }
    .err { color: #dc2626; }
    .err small { display: block; margin-top: 6px; color: #9ca3af; }

    .foot {
      padding: 8px 16px;
      background: #fff;
      border-top: 1px solid #e5e7eb;
      font-size: 10.5px;
      color: #9ca3af;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .foot a { color: #4f6ef7; cursor: pointer; text-decoration: none; }
    .foot a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="head">
    <h1>📋 워크스페이스</h1>
    <div class="sub" id="sub">불러오는 중...</div>
  </div>
  <div class="toolbar">
    <input id="q" placeholder="제목 검색..." />
    <button onclick="window.electronAPI.createNewMemo()">+ 새 메모</button>
  </div>
  <div class="list" id="list">
    <div class="loading"><div class="ic">⏳</div>불러오는 중...</div>
  </div>
  <div class="foot">
    <span><a onclick="window.electronAPI.openErp()">ERP 웹 열기 ↗</a></span>
    <span><a onclick="reload()">새로고침</a></span>
  </div>

<script>
const listEl = document.getElementById('list');
const subEl = document.getElementById('sub');
const qEl = document.getElementById('q');
let allPages = [];
let pinnedIds = new Set();

async function reload() {
  listEl.innerHTML = '<div class="loading"><div class="ic">⏳</div>불러오는 중...</div>';
  try {
    const data = await window.electronAPI.listPages();
    if (!data.ok) {
      if (data.error === 'not_logged_in') {
        listEl.innerHTML = '<div class="err"><div class="ic">🔒</div>로그인이 필요합니다<small>잠시 후 로그인 창이 뜹니다</small></div>';
        return;
      }
      throw new Error(data.error || '서버 오류');
    }
    allPages = data.pages || [];
    const pinned = await window.electronAPI.getPinned();
    pinnedIds = new Set(pinned.map(p => p.id));
    subEl.textContent = '총 ' + allPages.length + '개 페이지';
    render();
  } catch (e) {
    listEl.innerHTML = '<div class="err"><div class="ic">⚠️</div>'+e.message+'<small>ERP 서버 주소 확인 필요할 수 있습니다</small></div>';
  }
}

function render() {
  const q = qEl.value.trim().toLowerCase();
  let pages = allPages;
  if (q) pages = pages.filter(p => (p.title || '').toLowerCase().includes(q));
  // 즐겨찾기 우선 정렬
  pages.sort((a, b) => {
    const ap = pinnedIds.has(a.id) ? 0 : 1;
    const bp = pinnedIds.has(b.id) ? 0 : 1;
    if (ap !== bp) return ap - bp;
    return new Date(b.updated_at || 0) - new Date(a.updated_at || 0);
  });
  if (pages.length === 0) {
    listEl.innerHTML = '<div class="empty"><div class="ic">📭</div>'+(q?'검색 결과 없음':'아직 메모가 없습니다<br><small>"+ 새 메모" 로 시작하세요</small>')+'</div>';
    return;
  }
  listEl.innerHTML = pages.map(p => {
    const isPinned = pinnedIds.has(p.id);
    const date = p.updated_at ? new Date(p.updated_at).toLocaleString('ko-KR', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' }) : '';
    const author = p.author_name || '';
    const meta = [author, date].filter(Boolean).join(' · ');
    const safeTitle = (p.title || '제목 없음').replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
    return '<div class="item" data-id="'+p.id+'" data-title="'+safeTitle+'">'+
      '<span class="emo">'+(p.emoji || '📄')+'</span>'+
      '<div class="body"><div class="title">'+safeTitle+'</div><div class="meta">'+meta+'</div></div>'+
      '<span class="pin '+(isPinned?'active':'')+'" data-pin="'+p.id+'" title="즐겨찾기 토글">'+(isPinned?'⭐':'☆')+'</span>'+
    '</div>';
  }).join('');
}

listEl.addEventListener('click', async (e) => {
  const pinSpan = e.target.closest('[data-pin]');
  if (pinSpan) {
    e.stopPropagation();
    const item = pinSpan.closest('.item');
    const page = { id: pinSpan.dataset.pin, title: item.dataset.title };
    const isPinnedNow = await window.electronAPI.togglePin(page);
    if (isPinnedNow) pinnedIds.add(page.id); else pinnedIds.delete(page.id);
    render();
    return;
  }
  const item = e.target.closest('.item');
  if (item) {
    const id = item.dataset.id;
    const title = item.dataset.title;
    window.electronAPI.openMemo(id, title);
  }
});
qEl.addEventListener('input', render);

reload();
</script>
</body>
</html>
