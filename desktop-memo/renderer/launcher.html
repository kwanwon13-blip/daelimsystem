<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>대림에스엠</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: 'Noto Sans KR', 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #4f6ef7, #3b5ce4);
    color: #fff;
    overflow: hidden;
    user-select: none;
  }

  /* 헤더 — 통일된 드래그 영역 */
  .hdr {
    -webkit-app-region: drag;
    height: 22px;
    padding: 0 6px;
    display: flex;
    align-items: center;
    gap: 4px;
    background: rgba(0, 0, 0, 0.15);
    border-bottom: 1px solid rgba(255, 255, 255, 0.15);
    cursor: move;
  }
  .hdr-title {
    flex: 1;
    font-size: 10px;
    font-weight: 700;
    color: #fff;
    text-overflow: ellipsis;
    white-space: nowrap;
    overflow: hidden;
  }
  .hdr-btn {
    -webkit-app-region: no-drag;
    background: transparent;
    border: none;
    width: 18px;
    height: 18px;
    border-radius: 3px;
    cursor: pointer;
    color: #fff;
    font-size: 11px;
    line-height: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .hdr-btn:hover { background: rgba(255, 255, 255, 0.2); }
  .hdr-btn.close:hover { background: #ef4444; color: #fff; }

  /* 본문 — 4버튼 가로 배치 */
  .body {
    height: calc(100% - 22px);
    display: flex;
    align-items: stretch;
    padding: 4px;
    gap: 4px;
    background: linear-gradient(135deg, #4f6ef7, #3b5ce4);
  }
  .lb {
    flex: 1;
    background: rgba(255, 255, 255, 0.15);
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 5px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    padding: 4px 2px;
    transition: all 0.1s;
    color: #fff;
    backdrop-filter: blur(4px);
  }
  .lb:hover {
    background: rgba(255, 255, 255, 0.28);
    border-color: rgba(255, 255, 255, 0.6);
    transform: translateY(-1px);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
  }
  .lb:active { transform: translateY(0); }
  .lb-ico { font-size: 17px; line-height: 1; }
  .lb-lbl { font-size: 10px; font-weight: 700; }

  /* ✨ 자석 스냅 시각 효과 — 붙을 때 잠깐 빛남 */
  body.snap-flash {
    animation: snapFlash 0.5s ease-out;
  }
  body.snap-flash::after {
    content: '';
    position: fixed;
    inset: 0;
    border: 3px solid #4f6ef7;
    border-radius: 6px;
    pointer-events: none;
    animation: snapBorder 0.5s ease-out forwards;
    z-index: 9999;
  }
  @keyframes snapFlash {
    0% { box-shadow: inset 0 0 0 0 rgba(79, 110, 247, 0); }
    25% { box-shadow: inset 0 0 30px 4px rgba(79, 110, 247, 0.6); }
    100% { box-shadow: inset 0 0 0 0 rgba(79, 110, 247, 0); }
  }
  @keyframes snapBorder {
    0% { opacity: 0; transform: scale(1.05); }
    25% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1); }
  }

  /* 미니 모드 — 헤더가 body 전체를 채움 (빈 칸 없음) */
  body[data-mini="1"] {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  body[data-mini="1"] .body { display: none !important; }
  body[data-mini="1"] .hdr {
    flex: 1;
    border-bottom: none;
    height: auto;
  }
</style>
</head>
<body>
  <div class="hdr">
    <span class="hdr-title">📌 런처</span>
    <button class="hdr-btn" id="btnPin" title="항상 위">📌</button>
    <button class="hdr-btn" id="btnMini" title="미니 / 원래 크기">▭</button>
    <button class="hdr-btn close" id="btnClose" title="닫기">✕</button>
  </div>
  <div class="body">
    <div class="lb" data-action="workspace">
      <span class="lb-ico">📋</span>
      <span class="lb-lbl">워크스페이스</span>
    </div>
    <div class="lb" data-action="contacts">
      <span class="lb-ico">📞</span>
      <span class="lb-lbl">연락처</span>
    </div>
    <div class="lb" data-action="ai">
      <span class="lb-ico">🤖</span>
      <span class="lb-lbl">AI</span>
    </div>
    <div class="lb" data-action="ocr">
      <span class="lb-ico">📝</span>
      <span class="lb-lbl">OCR</span>
    </div>
  </div>

<script>
  const api = window.electronAPI;

  document.querySelectorAll('.lb').forEach(el => {
    el.addEventListener('click', () => {
      const action = el.dataset.action;
      if (action === 'new-memo') api.createNewMemo();
      else if (action === 'workspace') api.launcherOpen('workspace-sidebar');
      else if (action === 'contacts') api.launcherOpen('contacts-widget');
      else if (action === 'ai') api.launcherOpen('ai-widget');
      else if (action === 'ocr') api.launcherOpen('ocr-widget');
    });
  });

  // 미니 모드 — IPC + 직전 크기 기억해서 복원
  const $body = document.body;
  let isMini = false;
  let savedSize = null;     // 미니 진입 직전 크기 (가로 X 세로)
  const SIZE_KEY = 'launcher:savedSize';
  try { savedSize = JSON.parse(localStorage.getItem(SIZE_KEY) || 'null'); } catch(_) {}

  document.getElementById('btnMini').addEventListener('click', () => {
    if (!isMini) {
      // 미니 진입 — 현재 크기 저장
      try {
        const cur = { w: window.outerWidth, h: window.outerHeight };
        if (cur.h > 40) {  // 미니 상태가 아닐 때만 저장
          localStorage.setItem(SIZE_KEY, JSON.stringify(cur));
          savedSize = cur;
        }
      } catch(_) {}
      isMini = true;
      $body.setAttribute('data-mini', '1');
      if (api.setMini) api.setMini(true, savedSize ? savedSize.w : 360, 24);
    } else {
      // 복원 — 저장된 크기로
      isMini = false;
      $body.setAttribute('data-mini', '0');
      const restore = savedSize || { w: 360, h: 80 };
      if (api.setMini) api.setMini(false, restore.w, restore.h);
    }
  });

  document.getElementById('btnPin').addEventListener('click', async () => {
    if (api.toggleAlwaysOnTop) await api.toggleAlwaysOnTop();
  });

  document.getElementById('btnClose').addEventListener('click', () => window.close());

  // 헤더 더블클릭으로도 미니 토글
  document.querySelector('.hdr').addEventListener('dblclick', (e) => {
    if (e.target.closest('button')) return;
    document.getElementById('btnMini').click();
  });

  // ✨ 자석 스냅 시각 효과
  if (api.onSnapFlash) {
    api.onSnapFlash(() => {
      document.body.classList.remove('snap-flash');
      void document.body.offsetWidth;  // reflow trigger
      document.body.classList.add('snap-flash');
      setTimeout(() => document.body.classList.remove('snap-flash'), 600);
    });
  }
</script>
</body>
</html>
