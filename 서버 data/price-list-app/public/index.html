<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>업체별 단가표</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            charcoal: '#2a3439',
            'charcoal-light': '#3d4652',
            'slate-light': '#5a6b7d',
            'slate-lighter': '#8b9aaa',
            'ochre-light': '#fdf6ed',
            'ochre': '#f4e4c1'
          },
          fontFamily: {
            'work': ['Work Sans', 'sans-serif'],
            'inter': ['Inter', 'sans-serif'],
            'label': ['Public Sans', 'sans-serif']
          }
        }
      }
    }
  </script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Public+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Material Symbols Outlined -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <!-- 연락처 컴포넌트 (별도 파일) -->
  <script src="/contacts.js"></script>
  <!-- Alpine.js -->
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>

  <style>
    [x-cloak] { display: none !important; }
    *, *::before, *::after { box-sizing: border-box; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    :root {
      --sidebar-w: 200px;
      --header-h: 44px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #eef1f6;
      color: #1a1d23;
      font-size: 12.5px;
      line-height: 1.5;
      margin: 0;
    }
    h1,h2,h3,h4 { font-family: 'Work Sans', sans-serif; letter-spacing: -0.02em; }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      font-size: 17px; display: inline-flex; align-items: center; justify-content: center;
    }

    /* ── Buttons ── */
    .btn-primary {
      background: linear-gradient(135deg, #4f6ef7 0%, #3b5ce4 100%);
      color: #fff; padding: 5px 14px; border: none; border-radius: 6px;
      font-weight: 600; font-size: 12px; cursor: pointer;
      transition: all .2s cubic-bezier(.4,0,.2,1);
      display: inline-flex; align-items: center; gap: 6px;
      box-shadow: 0 2px 8px rgba(59,92,228,.28), inset 0 1px 0 rgba(255,255,255,.18);
      text-shadow: 0 1px 1px rgba(0,0,0,.12);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(59,92,228,.35), inset 0 1px 0 rgba(255,255,255,.18); filter: brightness(1.06); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: .45; cursor: not-allowed; transform: none; filter: none; }

    .btn-secondary {
      background: #3d4654; color: #fff; padding: 5px 14px; border: none; border-radius: 6px;
      font-weight: 600; font-size: 12px; cursor: pointer; transition: all .18s; display: inline-flex; align-items: center; gap: 5px;
    }
    .btn-secondary:hover { background: #2d3442; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.12); }
    .btn-secondary:active { transform: translateY(0); }

    .btn-ghost {
      background: #fff; border: 1px solid #dce0e8; color: #4b5563; padding: 5px 14px; border-radius: 6px;
      font-weight: 600; font-size: 12px; cursor: pointer; transition: all .18s; display: inline-flex; align-items: center; gap: 5px;
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
    }
    .btn-ghost:hover { background: #f7f8fa; border-color: #c5cad4; box-shadow: 0 2px 6px rgba(0,0,0,.06); }

    .btn-danger { color: #dc2626; font-weight: 600; font-size: 12px; cursor: pointer; background: none; border: none; padding: 4px 8px; border-radius: 6px; transition: all .15s; }
    .btn-danger:hover { background: #fef2f2; color: #b91c1c; }
    .btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 6px; }

    /* ── Inputs ── */
    .input-base {
      width: 100%; padding: 6px 10px;
      border: 1.5px solid #dce0e8; color: #1a1d23; font-size: 12px;
      background: #fff; border-radius: 6px; transition: all .18s; box-sizing: border-box;
    }
    .input-base:focus { outline: none; border-color: #6582f7; box-shadow: 0 0 0 3px rgba(101,130,247,.12); }
    .input-base::placeholder { color: #b0b8c4; }
    select.input-base { cursor: pointer; appearance: auto; }
    .input-base:disabled { background: #f5f6f8; color: #a0a8b4; cursor: not-allowed; }
    textarea.input-base { resize: vertical; min-height: 80px; }

    /* ── Labels ── */
    .label-base { font-size: 11px; color: #6b7280; font-weight: 600; display: block; margin-bottom: 3px; }

    /* ── Tables ── */
    .table-header {
      font-size: 10px; color: #8b95a5; font-weight: 700;
      background: linear-gradient(180deg, #f8f9fb 0%, #f2f4f7 100%);
      border-bottom: 1.5px solid #e0e4eb; text-transform: uppercase; letter-spacing: 0.06em;
    }

    /* ── Cards ── */
    .card {
      background: #fff; border-radius: 10px;
      border: 1px solid #e2e6ee;
      box-shadow: 0 1px 3px rgba(0,0,0,.04), 0 0 0 0 transparent;
      padding: 14px; transition: box-shadow .2s, border-color .2s;
    }
    .card:hover { box-shadow: 0 2px 10px rgba(0,0,0,.05); border-color: #d4d9e3; }

    /* ── Animations ── */
    .fade-in { animation: fadeIn .3s cubic-bezier(.4,0,.2,1); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
    .slide-down { animation: slideDown .2s ease; }
    .tab-active { border-bottom: 2px solid #4f6ef7; color: #1a1d23; font-weight: 600; }
    .tab-inactive { border-bottom: 2px solid transparent; color: #9ca3af; }
    .tab-inactive:hover { color: #4b5563; }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w); position: fixed; top: 0; left: 0; bottom: 0; z-index: 40;
      background: linear-gradient(195deg, #1a2236 0%, #0f172a 100%);
      display: flex; flex-direction: column; overflow-y: auto;
      box-shadow: 4px 0 24px rgba(0,0,0,.15);
    }
    .sidebar-nav-item {
      display: flex; align-items: center; gap: 9px; padding: 7px 12px;
      font-size: 12px; color: rgba(255,255,255,.55); border-radius: 7px; margin: 1px 8px;
      transition: all .18s; text-decoration: none; font-weight: 500; position: relative;
      letter-spacing: 0.01em;
    }
    .sidebar-nav-item:hover { background: rgba(255,255,255,.08); color: rgba(255,255,255,.85); }
    .sidebar-nav-item.active {
      background: rgba(79,110,247,.2); color: #8fabff; font-weight: 600;
      box-shadow: 0 0 12px rgba(79,110,247,.12);
    }
    .sidebar-nav-item.active::before {
      content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
      width: 3px; height: 20px; background: #6582f7; border-radius: 0 3px 3px 0;
    }
    .sidebar-nav-item .material-symbols-outlined { font-size: 17px; opacity: .65; }
    .sidebar-nav-item:hover .material-symbols-outlined { opacity: .85; }
    .sidebar-nav-item.active .material-symbols-outlined { opacity: 1; color: #8fabff; }

    /* ── Toast ── */
    .toast-container { position: fixed; top: 16px; right: 16px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast {
      padding: 11px 20px; border-radius: 10px; font-size: 13px; font-weight: 500;
      box-shadow: 0 8px 32px rgba(0,0,0,.18); animation: slideInRight .3s ease;
      display: flex; align-items: center; gap: 8px; max-width: 360px; backdrop-filter: blur(12px);
    }
    .toast-success { background: linear-gradient(135deg, #059669, #10b981); color: #fff; }
    .toast-error { background: linear-gradient(135deg, #dc2626, #ef4444); color: #fff; }
    .toast-info { background: linear-gradient(135deg, #4f6ef7, #3b5ce4); color: #fff; }
    @keyframes slideInRight { from { opacity: 0; transform: translateX(80px); } to { opacity: 1; transform: none; } }

    /* ── Empty State ── */
    .empty-state { text-align: center; padding: 28px 16px; color: #94a3b8; }
    .empty-state .material-symbols-outlined { font-size: 36px; margin-bottom: 8px; color: #d0d5de; }
    .empty-state p { font-size: 12px; margin-top: 3px; }

    /* ── Section Title ── */
    .section-title {
      font-family: 'Work Sans', sans-serif; font-size: 13px; font-weight: 700; color: #1a1d23;
      display: flex; align-items: center; gap: 6px; margin-bottom: 12px;
    }
    .section-title .material-symbols-outlined { font-size: 17px; color: #4f6ef7; }

    /* ── Badge ── */
    .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: .01em; white-space: nowrap; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #c8cdd6; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #a3aab5; }

    /* ── Login ── */
    .login-bg {
      background: linear-gradient(160deg, #0a0f1f 0%, #111827 40%, #1a2544 100%);
      min-height: 100vh;
    }

    /* ── Stat Cards ── */
    .stat-card {
      padding: 10px 14px; border-radius: 8px; border: 1px solid #e2e6ee; background: #fff;
      box-shadow: 0 1px 3px rgba(0,0,0,.04);
    }
    .stat-card .stat-label { font-size: 10px; font-weight: 700; color: #8b95a5; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
    .stat-card .stat-value { font-size: 16px; font-weight: 700; color: #1a1d23; font-family: 'Work Sans', sans-serif; }

    .divider { height: 1px; background: rgba(255,255,255,.06); margin: 0 16px; }

    /* ── Content scroll ── */
    .main-scroll::-webkit-scrollbar-track { background: #eef1f6; }
  </style>
</head>
<body x-data="app()" x-init="init()" x-cloak>

<!-- ═══ TOAST CONTAINER ═══ -->
<div class="toast-container" x-show="toasts.length > 0">
  <template x-for="(t, ti) in toasts" :key="ti">
    <div class="toast" :class="'toast-' + t.type" x-text="t.msg"></div>
  </template>
</div>

<!-- ═══ 시안 이미지 미리보기 모달 ═══ -->
<div x-show="quoteImagePreview" @click="quoteImagePreview = ''"
  class="fixed inset-0 z-[100] bg-black/70 flex items-center justify-center cursor-pointer" style="backdrop-filter:blur(4px);">
  <img :src="quoteImagePreview" class="max-w-[90vw] max-h-[85vh] rounded-xl shadow-2xl object-contain">
  <button @click="quoteImagePreview = ''" class="absolute top-6 right-6 text-white bg-black/50 rounded-full w-10 h-10 flex items-center justify-center hover:bg-black/70 transition-colors">
    <span class="material-symbols-outlined">close</span>
  </button>
</div>

<!-- ═══ LOGIN SCREEN ═══ -->
<template x-if="!auth.loggedIn">
  <div class="login-bg flex items-center justify-center" style="min-height:100vh;">
    <div class="rounded-2xl p-10 w-full max-w-md fade-in" style="background:rgba(255,255,255,.97);box-shadow: 0 25px 60px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.08); backdrop-filter:blur(20px);">
      <div class="text-center mb-8">
        <div class="w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-5" style="display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#4f6ef7,#6c5ce7);box-shadow:0 8px 24px rgba(79,110,247,.35);">
          <span class="material-symbols-outlined" style="font-size:26px;color:white;">receipt_long</span>
        </div>
        <h1 class="font-work text-2xl font-bold text-gray-900 mb-1" style="letter-spacing:-0.03em;">대림 SM</h1>
        <p class="text-gray-400 text-xs font-medium tracking-wider">업체별 단가표 시스템</p>
      </div>

      <!-- Login Form -->
      <template x-if="!showRegister">
        <div class="space-y-5 fade-in">
          <div>
            <label class="label-base">아이디</label>
            <input x-model="loginForm.userId" @keydown.enter="doLogin()" class="input-base" placeholder="아이디를 입력하세요">
          </div>
          <div>
            <label class="label-base">비밀번호</label>
            <input type="password" x-model="loginForm.password" @keydown.enter="doLogin()" class="input-base" placeholder="비밀번호를 입력하세요">
          </div>
          <p x-show="loginForm.error" class="text-xs text-red-600 font-semibold bg-red-50 p-3 rounded-lg" x-text="loginForm.error"></p>
          <button @click="doLogin()" :disabled="loginForm.loading" class="btn-primary w-full justify-center text-base py-3" style="font-size:15px;">
            <span class="material-symbols-outlined" style="font-size:18px;" x-show="!loginForm.loading">login</span>
            <span x-show="!loginForm.loading">로그인</span>
            <span x-show="loginForm.loading">로그인 중...</span>
          </button>
          <p class="text-center text-sm text-gray-400 mt-4">
            계정이 없으신가요? <button @click="showRegister=true; registerForm.error=''; registerForm.success=''" class="text-blue-600 font-semibold hover:underline">회원가입</button>
          </p>
        </div>
      </template>

      <!-- Register Form -->
      <template x-if="showRegister">
        <div class="space-y-4 fade-in">
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="label-base">이름</label>
              <input x-model="registerForm.name" class="input-base" placeholder="홍길동">
            </div>
            <div>
              <label class="label-base">직책</label>
              <select x-model="registerForm.position" class="input-base">
                <option value="">선택...</option>
                <option value="대표이사">대표이사</option>
                <option value="이사">이사</option>
                <option value="팀장">팀장</option>
                <option value="부장">부장</option>
                <option value="차장">차장</option>
                <option value="과장">과장</option>
                <option value="대리">대리</option>
                <option value="주임">주임</option>
                <option value="사원">사원</option>
              </select>
            </div>
          </div>
          <div>
            <label class="label-base">핸드폰</label>
            <input x-model="registerForm.phone" @input="onPhoneInput('register', $el)" inputmode="numeric" class="input-base" placeholder="010-0000-0000">
          </div>
          <div>
            <label class="label-base">아이디 <span class="text-gray-400 font-normal">(3자 이상)</span></label>
            <input x-model="registerForm.userId" class="input-base" placeholder="사용할 아이디 입력">
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="label-base">비밀번호 <span class="text-gray-400 font-normal">(4자+)</span></label>
              <input type="password" x-model="registerForm.password" class="input-base" placeholder="비밀번호">
            </div>
            <div>
              <label class="label-base">비밀번호 확인</label>
              <input type="password" x-model="registerForm.passwordConfirm" class="input-base" placeholder="재입력">
            </div>
          </div>
          <p x-show="registerForm.error" class="text-xs text-red-600 font-semibold bg-red-50 p-3 rounded-lg" x-text="registerForm.error"></p>
          <p x-show="registerForm.success" class="text-xs text-green-700 font-semibold bg-green-50 p-3 rounded-lg" x-text="registerForm.success"></p>
          <button @click="doRegister()" :disabled="registerForm.loading" class="btn-primary w-full justify-center text-base py-3" style="font-size:15px;">
            <span class="material-symbols-outlined" style="font-size:18px;" x-show="!registerForm.loading">person_add</span>
            <span x-show="!registerForm.loading">가입 신청</span>
            <span x-show="registerForm.loading">처리 중...</span>
          </button>
          <p class="text-center text-sm text-gray-400">
            <button @click="showRegister=false; loginForm.error=''" class="text-blue-600 font-semibold hover:underline">← 로그인으로 돌아가기</button>
          </p>
        </div>
      </template>
    </div>
  </div>
</template>

<!-- ═══ MAIN APP ═══ -->
<template x-if="auth.loggedIn">
<div class="flex h-screen" style="background:#eef1f6;">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="px-5 pt-6 pb-4">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0" style="display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#4f6ef7,#6c5ce7);">
          <span class="material-symbols-outlined" style="font-size:18px;color:white;">receipt_long</span>
        </div>
        <div>
          <h1 class="text-base font-bold leading-tight" style="color:#e2e8f0;font-family:'Work Sans',sans-serif;">대림 SM</h1>
          <p class="text-[10px] font-medium leading-tight" style="color:rgba(255,255,255,.35);">단가표 시스템 v2.0</p>
        </div>
      </div>
    </div>

    <div class="divider" style="margin:0 20px 8px;"></div>

    <nav class="flex-1 py-1 space-y-0.5">
      <p class="px-6 py-2 text-[10px] font-bold uppercase tracking-widest" style="color:rgba(255,255,255,.2);">메뉴</p>
      <template x-for="tab in tabs" :key="tab.id">
        <button @click="currentTab = tab.id"
          :class="currentTab === tab.id ? 'active' : ''"
          class="sidebar-nav-item w-full text-left">
          <span class="material-symbols-outlined" style="font-size:18px" x-text="
            tab.id === 'quote' ? 'edit_note' :
            tab.id === 'history' ? 'folder_open' :
            tab.id === 'pricing' ? 'payments' :
            tab.id === 'options' ? 'tune' :
            tab.id === 'vendors' ? 'storefront' :
            tab.id === 'admin' ? 'group' :
            tab.id === 'stats' ? 'bar_chart' :
            tab.id === 'design' ? 'image_search' :
            tab.id === 'contacts' ? 'contacts' :
            tab.id === 'notices' ? 'campaign' :
            'settings'
          "></span>
          <span x-text="tab.label"></span>
        </button>
      </template>
    </nav>

    <div class="mx-3 mb-4 p-3 rounded-xl" style="background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.06);">
      <div class="flex items-center gap-2.5 mb-2">
        <div class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0" style="display:flex;align-items:center;justify-content:center;background:rgba(79,110,247,.25);">
          <span class="material-symbols-outlined" style="font-size:15px;color:#8fabff;">person</span>
        </div>
        <div class="min-w-0">
          <p class="text-xs font-semibold truncate" style="color:#e2e8f0;" x-text="auth.name"></p>
          <p class="text-[10px] truncate" style="color:rgba(255,255,255,.35);" x-text="auth.position || auth.role"></p>
        </div>
      </div>
      <div class="flex gap-1.5">
        <button @click="showMyCardModal=true" class="flex-1 text-center text-[11px] font-medium py-1.5 rounded-lg transition-all" style="color:rgba(255,255,255,.5);background:transparent;" onmouseover="this.style.background='rgba(255,255,255,.06)';this.style.color='#a78bfa';" onmouseout="this.style.background='transparent';this.style.color='rgba(255,255,255,.5)';">
          <span class="material-symbols-outlined" style="font-size:13px;vertical-align:-2px;">badge</span> 내 명함
        </button>
        <button @click="doLogout()" class="flex-1 text-center text-[11px] font-medium py-1.5 rounded-lg transition-all" style="color:rgba(255,255,255,.35);background:transparent;" onmouseover="this.style.background='rgba(255,255,255,.06)';this.style.color='#f87171';" onmouseout="this.style.background='transparent';this.style.color='rgba(255,255,255,.35)';">
          <span class="material-symbols-outlined" style="font-size:13px;vertical-align:-2px;">logout</span> 로그아웃
        </button>
      </div>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main style="margin-left:var(--sidebar-w);" class="flex-1 flex flex-col overflow-hidden min-h-screen">

    <!-- TOP HEADER -->
    <header style="height:var(--header-h);" class="bg-white/85 backdrop-blur-xl border-b border-gray-200/60 px-7 flex items-center justify-between z-30 sticky top-0">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:linear-gradient(135deg,#eef2ff,#e0e7ff);">
          <span class="material-symbols-outlined" style="font-size:18px;color:#4f6ef7;" x-text="
            currentTab === 'quote' ? 'edit_note' :
            currentTab === 'history' ? 'folder_open' :
            currentTab === 'pricing' ? 'payments' :
            currentTab === 'options' ? 'tune' :
            currentTab === 'vendors' ? 'storefront' :
            currentTab === 'admin' ? 'group' :
            currentTab === 'stats' ? 'bar_chart' :
            'settings'
          "></span>
        </div>
        <h2 class="font-work text-lg font-bold text-gray-900" style="letter-spacing:-0.03em;">
          <span x-text="tabs.find(t => t.id === currentTab)?.label || ''"></span>
        </h2>
      </div>
      <div class="flex items-center gap-3">

      <!-- STATS TAB -->
      <template x-if="currentTab === 'stats'">
        <div class="space-y-3 fade-in" x-init="loadStats()">

          <!-- 요약 카드 4개 -->
          <template x-if="stats">
            <div class="grid grid-cols-4 gap-3">
              <div class="card text-center" style="padding:14px 10px;">
                <p style="font-size:10px;font-weight:700;color:#8b95a5;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;">총 견적 수</p>
                <p style="font-size:22px;font-weight:800;color:#1a1d23;line-height:1;" x-text="stats.total"></p>
              </div>
              <div class="card text-center" style="padding:14px 10px;">
                <p style="font-size:10px;font-weight:700;color:#8b95a5;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;">총 수주금액(VAT포함)</p>
                <p style="font-size:18px;font-weight:800;color:#2563eb;line-height:1;" x-text="Math.round((stats.totalAmount||0)*1.1).toLocaleString()+'원'"></p>
              </div>
              <div class="card text-center" style="padding:14px 10px;">
                <p style="font-size:10px;font-weight:700;color:#8b95a5;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;">수주율</p>
                <p style="font-size:22px;font-weight:800;color:#059669;line-height:1;" x-text="stats.total > 0 ? Math.round(((stats.statusCount?.won||0)+(stats.statusCount?.completed||0))/stats.total*100)+'%' : '-'"></p>
              </div>
              <div class="card text-center" style="padding:14px 10px;">
                <p style="font-size:10px;font-weight:700;color:#8b95a5;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;">상태별</p>
                <div class="flex justify-center gap-1 flex-wrap mt-1">
                  <span style="font-size:10px;padding:2px 6px;border-radius:10px;background:#dbeafe;color:#2563eb;font-weight:600;" x-text="'작성 '+(stats.statusCount?.draft||0)"></span>
                  <span style="font-size:10px;padding:2px 6px;border-radius:10px;background:#fef9c3;color:#d97706;font-weight:600;" x-text="'발송 '+(stats.statusCount?.sent||0)"></span>
                  <span style="font-size:10px;padding:2px 6px;border-radius:10px;background:#dcfce7;color:#16a34a;font-weight:600;" x-text="'수주 '+(stats.statusCount?.won||0)"></span>
                  <span style="font-size:10px;padding:2px 6px;border-radius:10px;background:#fee2e2;color:#dc2626;font-weight:600;" x-text="'미수주 '+(stats.statusCount?.lost||0)"></span>
                </div>
              </div>
            </div>
          </template>

          <div class="grid grid-cols-2 gap-3">
            <!-- 월별 견적 현황 -->
            <div class="card" style="padding:0;overflow:hidden;">
              <div style="padding:10px 14px;background:linear-gradient(135deg,#eff6ff,#dbeafe);border-bottom:1px solid #bfdbfe;">
                <h3 class="font-work text-[13px] font-bold text-gray-800 flex items-center gap-2 m-0">
                  <span class="material-symbols-outlined" style="font-size:16px;color:#2563eb;">bar_chart</span> 월별 견적 현황 (최근 12개월)
                </h3>
              </div>
              <div style="padding:12px 14px;">
                <template x-if="stats && stats.byMonth && stats.byMonth.length > 0">
                  <div>
                    <template x-for="m in stats.byMonth" :key="m.month">
                      <div class="flex items-center gap-2 mb-1.5">
                        <span style="font-size:10px;color:#6b7280;width:54px;flex-shrink:0;" x-text="m.month"></span>
                        <div style="flex:1;background:#f1f5f9;border-radius:4px;height:14px;overflow:hidden;">
                          <div :style="'width:'+Math.round((m.count/(Math.max(...stats.byMonth.map(x=>x.count))||1))*100)+'%;background:linear-gradient(90deg,#4f6ef7,#6c5ce7);height:100%;border-radius:4px;transition:width .4s;'"></div>
                        </div>
                        <span style="font-size:10px;color:#374151;font-weight:600;width:20px;text-align:right;flex-shrink:0;" x-text="m.count"></span>
                        <span style="font-size:10px;color:#2563eb;font-weight:600;width:80px;text-align:right;flex-shrink:0;" x-text="Math.round((m.amount||0)*1.1/10000)+'만'"></span>
                      </div>
                    </template>
                  </div>
                </template>
                <template x-if="!stats || !stats.byMonth || stats.byMonth.length === 0">
                  <div class="text-center py-6 text-gray-400 text-xs">데이터 없음</div>
                </template>
              </div>
            </div>

            <!-- 상위 거래처 & 상위 품목 -->
            <div class="space-y-3">
              <div class="card" style="padding:0;overflow:hidden;">
                <div style="padding:10px 14px;background:linear-gradient(135deg,#f0fdf4,#dcfce7);border-bottom:1px solid #bbf7d0;">
                  <h3 class="font-work text-[13px] font-bold text-gray-800 flex items-center gap-2 m-0">
                    <span class="material-symbols-outlined" style="font-size:16px;color:#16a34a;">storefront</span> 상위 거래처 (수주금액)
                  </h3>
                </div>
                <div style="padding:10px 14px;">
                  <template x-if="stats && stats.topVendors && stats.topVendors.length > 0">
                    <table class="w-full text-xs" style="border-collapse:collapse;">
                      <template x-for="(v,vi) in stats.topVendors" :key="v.vendorName">
                        <tr style="border-bottom:1px solid #f0f1f3;">
                          <td style="padding:4px 6px;color:#94a3b8;font-weight:700;" x-text="vi+1"></td>
                          <td style="padding:4px 6px;font-weight:600;color:#1e293b;" x-text="v.name||'(미지정)'"></td>
                          <td style="padding:4px 6px;text-align:right;color:#2563eb;font-weight:600;" x-text="Math.round((v.amount||0)*1.1/10000).toLocaleString()+'만'"></td>
                          <td style="padding:4px 6px;text-align:right;color:#6b7280;" x-text="v.count+'건'"></td>
                        </tr>
                      </template>
                    </table>
                  </template>
                  <template x-if="!stats || !stats.topVendors || stats.topVendors.length === 0">
                    <div class="text-center py-4 text-gray-400 text-xs">데이터 없음</div>
                  </template>
                </div>
              </div>

              <div class="card" style="padding:0;overflow:hidden;">
                <div style="padding:10px 14px;background:linear-gradient(135deg,#fef9f0,#fef3c7);border-bottom:1px solid #fde68a;">
                  <h3 class="font-work text-[13px] font-bold text-gray-800 flex items-center gap-2 m-0">
                    <span class="material-symbols-outlined" style="font-size:16px;color:#d97706;">category</span> 상위 품목 (빈도순)
                  </h3>
                </div>
                <div style="padding:10px 14px;">
                  <template x-if="stats && stats.topCategories && stats.topCategories.length > 0">
                    <div class="flex flex-wrap gap-1.5">
                      <template x-for="c in stats.topCategories" :key="c.name">
                        <span style="font-size:10px;padding:3px 8px;border-radius:12px;background:#fef9c3;color:#92400e;font-weight:600;border:1px solid #fde68a;" x-text="c.name+' '+c.count+'건'"></span>
                      </template>
                    </div>
                  </template>
                  <template x-if="!stats || !stats.topCategories || stats.topCategories.length === 0">
                    <div class="text-center py-4 text-gray-400 text-xs">데이터 없음</div>
                  </template>
                </div>
              </div>
            </div>
          </div>

            </button>
          </div>
        </div>

                <button @click="deleteNamecardImage()" style="background:#fee2e2;color:#dc2626;border:none;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;font-weight:600;">
                  <span class="material-symbols-outlined" style="font-size:12px;vertical-align:middle;">delete</span> 삭제
                </button>
              </div>
            </template>
            <label style="display:inline-flex;align-items:center;gap:6px;background:#7c3aed;color:#fff;border-radius:7px;padding:6px 14px;font-size:11px;font-weight:600;cursor:pointer;" :style="namecardImageUploading?'opacity:.6;pointer-events:none;':''">
              <span class="material-symbols-outlined" style="font-size:14px;">upload</span>

            <span style="font-size:10px;color:#9ca3af;font-weight:600;">또는 연락처 직접 입력</span>

  <!-- 시안 → 사양 가져오기 모달 -->
  <template x-if="specSearchModal.open">
    <div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" style="backdrop-filter:blur(4px);" @click.self="specSearchModal.open=false">
      <div class="bg-white rounded-2xl shadow-2xl fade-in" style="width:720px;max-width:95vw;max-height:85vh;display:flex;flex-direction:column;">
        <!-- 헤더 -->
        <div style="padding:16px 20px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
          <h3 style="font-size:14px;font-weight:700;color:#1e293b;margin:0;display:flex;align-items:center;gap:6px;">
            <span class="material-symbols-outlined" style="font-size:18px;color:#7c3aed;">image_search</span>
            시안 검색해서 사양으로 추가
          </h3>
          <button @click="specSearchModal.open=false" class="text-gray-400 hover:text-gray-600 p-1 rounded-lg hover:bg-gray-100">

          </button>

              @keydown.enter="searchSpecDesigns()"

              placeholder="띄어쓰기로 AND 검색  예) 현수막 750g 2024"
              style="font-size:13px;"
              x-init="$el.focus()"

            <button @click="searchSpecDesigns()" class="btn-primary px-4 text-sm" :disabled="specSearchModal.loading">
              <span class="material-symbols-outlined" style="font-size:16px;" x-text="specSearchModal.loading?'hourglass_empty':'search'"></span>
            </button>
          </div>
          <!-- 키워드 칩 -->
          <div x-show="specSearchModal.query.trim()" style="display:flex;flex-wrap:wrap;gap:4px;margin-top:7px;align-items:center;">

            <span x-show="specSearchModal.results.length > 0" style="font-size:10px;color:#6b7280;margin-left:4px;">

          </div>
        </div>

        <!-- 결과 그리드 -->
        <div style="flex:1;overflow-y:auto;padding:12px 20px;">

            <span class="material-symbols-outlined" style="font-size:36px;display:block;margin-bottom:8px;color:#d1d5db;">image_search</span>
            <p style="font-size:12px;margin:0;">파일명으로 검색하면 시안 이미지가 표시됩니다</p>
          </div>
          <!-- 검색 결과 없음 -->
          <div x-show="specSearchModal.results.length === 0 && !specSearchModal.loading && specSearchModal.query"
            style="text-align:center;padding:40px;color:#9ca3af;">
            <span class="material-symbols-outlined" style="font-size:36px;display:block;margin-bottom:8px;color:#d1d5db;">search_off</span>
            <p style="font-size:12px;margin:0;">"<span x-text="specSearchModal.query"></span>"에 해당하는 시안이 없습니다</p>
          </div>
          <!-- 로딩 -->
          <div x-show="specSearchModal.loading" style="text-align:center;padding:40px;color:#9ca3af;">
            <span class="material-symbols-outlined" style="font-size:32px;display:block;margin-bottom:8px;animation:spin 1s linear infinite;">refresh</span>
          </div>
          <!-- 결과 그리드 -->
          <div x-show="specSearchModal.results.length > 0 && !specSearchModal.loading"
            style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;">
            <template x-for="item in specSearchModal.results" :key="item.path">
              <div
                @click="importDesignAsSpec(item)"
                style="cursor:pointer;border:2px solid #e5e7eb;border-radius:10px;overflow:hidden;background:#f9fafb;transition:all .15s;"
                @mouseenter="$el.style.borderColor='#7c3aed';$el.style.background='#faf5ff';$el.style.transform='scale(1.02)'"
                @mouseleave="$el.style.borderColor='#e5e7eb';$el.style.background='#f9fafb';$el.style.transform='scale(1)'"
              >
                <!-- 썸네일 -->
                <div style="width:100%;height:110px;background:#e5e7eb;overflow:hidden;position:relative;">
                  <img
                    :src="'/api/design/thumb?path=' + encodeURIComponent(item.path)"
                    style="width:100%;height:100%;object-fit:cover;"
                    loading="lazy"
                    @error="$el.style.display='none'"
                  >
                  <!-- AI 파일 뱃지 -->
                  <span x-show="item.aiPath" style="position:absolute;top:4px;right:4px;background:#ff6b2b;color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;">AI</span>
                </div>
                <!-- 파일명 -->
                <div style="padding:6px 8px;">
                  <p style="font-size:10px;font-weight:600;color:#374151;margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" :title="item.name" x-text="item.name.replace(/\.[^.]+$/,'')"></p>
                  <p style="font-size:9px;color:#9ca3af;margin:2px 0 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" :title="item.rel" x-text="item.parts.slice(0,-1).join(' / ')"></p>
                </div>
              </div>
            </template>
          </div>
        </div>

        <!-- 하단 -->
        <div style="padding:10px 20px;border-top:1px solid #f3f4f6;flex-shrink:0;display:flex;justify-content:flex-end;">
          <button @click="specSearchModal.open=false" class="btn-ghost text-sm">닫기</button>
        </div>
      </div>
    </div>
  </template>

  <!-- MAIL MODAL -->
  <template x-if="showMailModal">
    <div class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50" style="backdrop-filter:blur(4px);">

          <div class="flex gap-3">
            <button @click="sendMail()" :disabled="mailForm.sending" class="btn-primary flex-1">
              <span x-show="!mailForm.sending">발송</span>

            <button @click="showMailModal = false" class="btn-ghost flex-1">취소</button>
          </div>
        </div>
      </div>
    </div>
  </template>

</div>
</template>

    formatPhoneValue(val) {

      if (digits.length <= 3) return digits;
      if (digits.length <= 7) return digits.slice(0,3) + '-' + digits.slice(3);
      return digits.slice(0,3) + '-' + digits.slice(3, 7) + '-' + digits.slice(7);

      try {
        const r = await fetch('/api/auth/me');

          this.auth = { loggedIn: true, userId: me.userId, name: me.name||me.userId, role: me.role||'user', position: me.position||'', phone: me.phone||'', permissions: me.permissions||[] };

          if (!this.tabs.find(t => t.id === this.currentTab)) this.currentTab = 'quote';
        }
      } catch(e) {}

      if (saved) this.loginForm.userId = saved;

    // ── 로그인 ──
    async doLogin() {
      this.loginForm.error = ''; this.loginForm.loading = true;
      try {
        const r = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: this.loginForm.userId, password: this.loginForm.password }) });
        const j = await r.json();
        if (!r.ok || !j.ok) { this.loginForm.error = j.error || '로그인 실패'; return; }
        this.auth = { loggedIn: true, userId: j.userId, name: j.name||j.userId, role: j.role||'user', position: j.position||'', phone: j.phone||'', permissions: j.permissions||[] };
        this.quoteHeader.vendorManager = this.auth.name + (this.auth.position ? ' ' + this.auth.position : '') + (this.auth.phone ? ' ' + this.auth.phone : '');
        localStorage.setItem('login_userId', this.loginForm.userId);
        await this.loadData();
        // 현재 탭이 허용되지 않으면 견적 작성으로 이동
        if (!this.tabs.find(t => t.id === this.currentTab)) this.currentTab = 'quote';
      } catch(e) { this.loginForm.error = '연결 오류: ' + e.message; }
      finally { this.loginForm.loading = false; }
    },

    async doRegister() {
      const f = this.registerForm;
      f.error = ''; f.success = '';
      if (!f.name.trim()) { f.error = '이름을 입력해주세요'; return; }
      if (f.userId.length < 3) { f.error = '아이디는 3자 이상이어야 합니다'; return; }
      if (f.password.length < 4) { f.error = '비밀번호는 4자 이상이어야 합니다'; return; }
      if (f.password !== f.passwordConfirm) { f.error = '비밀번호가 일치하지 않습니다'; return; }
      f.loading = true;
      try {
        const r = await fetch('/api/auth/register', { method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: f.name, userId: f.userId, password: f.password, position: f.position, phone: f.phone }) });
        const j = await r.json();
        if (!r.ok || !j.ok) { f.error = j.error || '가입 실패'; return; }
        f.success = '가입 신청 완료! 관리자 승인 후 로그인 가능합니다.';
        f.name = ''; f.userId = ''; f.password = ''; f.passwordConfirm = '';
      } catch(e) { f.error = '연결 오류: ' + e.message; }
      finally { f.loading = false; }
    },

    async saveVendorPrice(catId, overrides) {
      if (!this.pricingVendorId) {
        // 기본 단가 수정 → 카테고리 직접 업데이트
        const cat = this.categories.find(c => c.id === catId);
        if (!cat) return;
        const update = {};
        if (overrides.tiers !== undefined) update.tiers = overrides.tiers;
        if (overrides.widthTiers !== undefined) update.widthTiers = overrides.widthTiers;
        if (overrides.qtyPrice !== undefined) update.qtyPrice = overrides.qtyPrice;
        if (overrides.fixedPrice !== undefined) update.fixedPrice = overrides.fixedPrice;
        const r = await fetch('/api/categories/' + catId, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(update) });
        if (r.ok) {
          const updated = await r.json();
          const idx = this.categories.findIndex(c => c.id === catId);
          if (idx !== -1) this.categories[idx] = updated;
        }
        return;
      }
      // 업체별 단가 수정
      const vp = this.getVendorPriceForCat(catId) || {};
      const cat = this.categories.find(c => c.id === catId);
      const body = {
        vendorId: this.pricingVendorId, categoryId: catId,
        tiers: overrides.tiers !== undefined ? overrides.tiers : (vp.tiers || cat?.tiers || []),
        widthTiers: overrides.widthTiers !== undefined ? overrides.widthTiers : (vp.widthTiers || cat?.widthTiers || []),
        qtyPrice: overrides.qtyPrice !== undefined ? overrides.qtyPrice : (vp.qtyPrice || cat?.qtyPrice || 0),
        fixedPrice: overrides.fixedPrice !== undefined ? overrides.fixedPrice : (vp.fixedPrice || cat?.fixedPrice || 0)
      };
      await fetch('/api/vendor-prices', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      await this.loadVendorPrices(this.pricingVendorId);
    },
    async addVendorTier(catId) {
      const cat = this.categories.find(c => c.id === catId);
      const current = this.getDisplayTiers(cat || { id: catId, tiers: [] });
      if (current.length >= 5) { this.showToast('최대 5개까지 추가 가능합니다','error'); return; }
      const tiers = [...current, { areaMin: 0, areaMax: null, pricePerSqm: 0 }];
      await this.saveVendorPrice(catId, { tiers });
    },
    async updateVendorTier(catId, ti, field, value) {
      const cat = this.categories.find(c => c.id === catId);
      const tiers = [...this.getDisplayTiers(cat || { id: catId, tiers: [] })];
      tiers[ti] = { ...tiers[ti], [field]: value === '' ? null : Number(value) };
      await this.saveVendorPrice(catId, { tiers });
    },
    async removeVendorTier(catId, ti) {
      const cat = this.categories.find(c => c.id === catId);
      const tiers = [...this.getDisplayTiers(cat || { id: catId, tiers: [] })];
      tiers.splice(ti, 1);
      await this.saveVendorPrice(catId, { tiers });
    },
    // ── 폭별 m당 단가 (LENGTH) ──
    async addWidthTier(catId) {
      const cat = this.categories.find(c => c.id === catId);
      const current = this.getDisplayWidthTiers(cat || { id: catId, widthTiers: [] });
      const lastWidth = current.length > 0 ? Number(current[current.length-1].widthMm || 0) + 100 : 300;
      const widthTiers = [...current, { widthMm: lastWidth, pricePerM: 0 }];
      await this.saveVendorPrice(catId, { widthTiers });
    },
    async addWidthTierBulk(catId) {
      const cat = this.categories.find(c => c.id === catId);
      const current = this.getDisplayWidthTiers(cat || { id: catId, widthTiers: [] });
      if (current.length > 0 && !confirm('기존 단가를 덮어쓰시겠습니까?')) return;
      const widthTiers = [];
      for (let w = 300; w <= 1800; w += 100) {
        widthTiers.push({ widthMm: w, pricePerM: 0 });
      }
      await this.saveVendorPrice(catId, { widthTiers });
    },
    async updateWidthTier(catId, wi, field, value) {
      const cat = this.categories.find(c => c.id === catId);
      const widthTiers = [...this.getDisplayWidthTiers(cat || { id: catId, widthTiers: [] })];
      widthTiers[wi] = { ...widthTiers[wi], [field]: Number(value) || 0 };
      await this.saveVendorPrice(catId, { widthTiers });
    },
    async removeWidthTier(catId, wi) {
      const cat = this.categories.find(c => c.id === catId);

      await this.saveVendorPrice(catId, { widthTiers });

    getOptionVariant(id) { return this.newItem.optionVariants ? (this.newItem.optionVariants[id]||0) : 0; },
    setOptionVariant(id,v) { if(!this.newItem.optionVariants) this.newItem.optionVariants={}; this.newItem.optionVariants[id]=Number(v)||0; },
    onCategoryChange() { this.newItem.selectedOptions=[]; this.newItem.optionQtys={}; this.newItem.optionVariants={}; this.newItem.widthMm=0; this.newItem.heightMm=0; this.newItem.qty=1; this.newItem.customName=''; this.newItem.customSpec=''; this.calcPreview={}; },

    // ── 카테고리 필드 헬퍼 ──
    getCatField(catId, field) {
      const cat = this.categories.find(c => c.id === catId);
      return cat ? (cat[field] || '') : '';
    },
    async saveCatField(catId, field, value) {
      const cat = this.categories.find(c => c.id === catId);
      if (!cat) return;
      cat[field] = value;
      await fetch('/api/categories/' + catId, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ [field]: value }) });
    },

    // ── 사양별 매입 관리 (purchaseSpecs) ──
    getCatPurchaseSpecs(catId) {
      const cat = this.categories.find(c => c.id === catId);
      return cat?.purchaseSpecs || [];
    },
    async addPurchaseSpec(catId) {
      const cat = this.categories.find(c => c.id === catId);
      if (!cat) return;
      if (!cat.purchaseSpecs) cat.purchaseSpecs = [];
      cat.purchaseSpecs.push({ specName: '', quotes: [], image: '' });
      await this.saveCatField(catId, 'purchaseSpecs', cat.purchaseSpecs);
    },
    async updatePurchaseSpec(catId, idx, field, value) {
      const cat = this.categories.find(c => c.id === catId);
      if (!cat?.purchaseSpecs?.[idx]) return;
      cat.purchaseSpecs[idx][field] = value;
      await this.saveCatField(catId, 'purchaseSpecs', [...cat.purchaseSpecs]);
    },
    async removePurchaseSpec(catId, idx) {
      const cat = this.categories.find(c => c.id === catId);
      if (!cat?.purchaseSpecs) return;
      cat.purchaseSpecs.splice(idx, 1);
      await this.saveCatField(catId, 'purchaseSpecs', [...cat.purchaseSpecs]);
      this.showToast('사양이 삭제되었습니다');
    },
    // ── 사양 내 복수 매입견적 관리 ──
    getSpecQuotes(spec) {
      // 하위호환: 기존 단일 supplier/purchasePrice → quotes 배열로 변환
      if (!spec.quotes && spec.supplier) {
        spec.quotes = [{ supplier: spec.supplier, purchasePrice: spec.purchasePrice || 0, quoteDate: spec.quoteDate || '' }];
      }
      return spec.quotes || [];
    },
    getLowestQuote(spec) {
      const qs = this.getSpecQuotes(spec).filter(q => q.purchasePrice > 0);
      if (qs.length === 0) return null;
      return qs.reduce((min, q) => q.purchasePrice < min.purchasePrice ? q : min, qs[0]);
    },
    async addSpecQuote(catId, specIdx) {
      const cat = this.categories.find(c => c.id === catId);
      if (!cat?.purchaseSpecs?.[specIdx]) return;
      const spec = cat.purchaseSpecs[specIdx];
      if (!spec.quotes) spec.quotes = [];
      spec.quotes.push({ supplier: '', purchasePrice: 0, quoteDate: new Date().toISOString().slice(0,10) });
      await this.saveCatField(catId, 'purchaseSpecs', [...cat.purchaseSpecs]);
    },
    async updateSpecQuote(catId, specIdx, quoteIdx, field, value) {
      const cat = this.categories.find(c => c.id === catId);
      if (!cat?.purchaseSpecs?.[specIdx]?.quotes?.[quoteIdx]) return;
      cat.purchaseSpecs[specIdx].quotes[quoteIdx][field] = value;
      await this.saveCatField(catId, 'purchaseSpecs', [...cat.purchaseSpecs]);
    },
    async removeSpecQuote(catId, specIdx, quoteIdx) {
      const cat = this.categories.find(c => c.id === catId);
      if (!cat?.purchaseSpecs?.[specIdx]?.quotes) return;
      cat.purchaseSpecs[specIdx].quotes.splice(quoteIdx, 1);
      await this.saveCatField(catId, 'purchaseSpecs', [...cat.purchaseSpecs]);
      this.showToast('매입견적이 삭제되었습니다');
    },
    // ── 공통 이미지 업로드 (파일 또는 blob) ──
    async _uploadImageFile(file, fileName) {
      if (!file) return null;
      if (file.size > 10 * 1024 * 1024) { this.showToast('10MB 이하만 업로드 가능합니다', 'error'); return null; }
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = async () => {
          try {
            const r = await fetch('/api/upload-image', {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ imageData: reader.result, fileName })
            });
            if (r.ok) { const { url } = await r.json(); resolve(url); }
            else { this.showToast('업로드 실패', 'error'); resolve(null); }
          } catch(e) { this.showToast('업로드 실패', 'error'); resolve(null); }
        };
        reader.readAsDataURL(file);
      });
    },
    async uploadSpecImage(catId, idx, event) {
      const url = await this._uploadImageFile(event.target.files[0], catId + '_spec' + idx);
      if (url) { await this.updatePurchaseSpec(catId, idx, 'image', url); this.showToast('사양 이미지 업로드 완료'); }
    },

    // ── 시안 → 사양 가져오기 ──
    openSpecSearchModal(catId) {
      this.specSearchModal = { open: true, catId, query: '', results: [], loading: false };
    },
    async searchSpecDesigns() {
      const q = this.specSearchModal.query.trim();
      if (!q) { this.specSearchModal.results = []; return; }
      this.specSearchModal.loading = true;
      try {
        const r = await fetch('/api/design/search?q=' + encodeURIComponent(q));
        if (r.ok) {
          const data = await r.json();
          this.specSearchModal.results = data.items || [];
        }
      } catch(e) { this.showToast('검색 실패', 'error'); }
      finally { this.specSearchModal.loading = false; }
    },
    async importDesignAsSpec(item) {
      const catId = this.specSearchModal.catId;
      const cat = this.categories.find(c => c.id === catId);
      if (!cat) return;
      if (!cat.purchaseSpecs) cat.purchaseSpecs = [];
      // 파일명에서 확장자 제거 + 언더스코어 → 공백
      const specName = item.name.replace(/\.[^.]+$/, '').replace(/_/g, ' ');
      // 이미지 URL: /api/design/thumb?path=...
      const imageUrl = '/api/design/thumb?path=' + encodeURIComponent(item.path);
      cat.purchaseSpecs.push({ specName, quotes: [], image: imageUrl, designPath: item.path });
      await this.saveCatField(catId, 'purchaseSpecs', cat.purchaseSpecs);
      this.showToast('"' + specName + '" 사양으로 추가되었습니다');
      this.specSearchModal.open = false;
    },
    async uploadQuoteItemImage(idx, event) {
      const url = await this._uploadImageFile(event.target.files[0], 'quote_item_' + idx);
      if (url) { this.quoteItems[idx].designImage = url; this.showToast('시안 이미지 첨부 완료'); }
    },

    // ── Ctrl+V 붙여넣기 대상 ──
    pasteTarget: null, // { type: 'spec', catId, idx } or { type: 'quoteItem', idx }
    setPasteTarget(target) { this.pasteTarget = target; },
    async handlePaste(event) {
      if (!this.pasteTarget) return;
      const items = event.clipboardData?.items;
      if (!items) return;
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          event.preventDefault();
          const file = item.getAsFile();
          const t = this.pasteTarget;
          if (t.type === 'spec') {
            const url = await this._uploadImageFile(file, t.catId + '_spec' + t.idx);
            if (url) { await this.updatePurchaseSpec(t.catId, t.idx, 'image', url); this.showToast('이미지 붙여넣기 완료'); }
          } else if (t.type === 'quoteItem') {
            const url = await this._uploadImageFile(file, 'quote_item_' + t.idx);
            if (url) { this.quoteItems[t.idx].designImage = url; this.showToast('이미지 붙여넣기 완료'); }
          }
          break;
        }
      }
    },
    debouncePreview() { clearTimeout(this._previewTimer); this._previewTimer=setTimeout(()=>this.updatePreview(),300); },
    async updatePreview() {
      if(!this.newItem.categoryId){this.calcPreview={};return;}
      const os=this.newItem.selectedOptions.map(id=>({optionId:id,qty:this.getOptionQty(id),variantIdx:this.getOptionVariant(id)}));
      try { const r=await fetch('/api/quote/calculate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({categoryId:this.newItem.categoryId,widthMm:this.newItem.widthMm,heightMm:this.newItem.heightMm,qty:this.newItem.qty,optionSelections:os,vendorId:this.quoteHeader.vendorId||''})}); if(r.ok) this.calcPreview=await r.json(); } catch(e){}
    },
    async addQuoteItem() {
      if(!this.newItem.categoryId)return; await this.updatePreview();
      const cat=this.categories.find(c=>c.id===this.newItem.categoryId); if(!cat)return;
      const p=this.calcPreview; let name=cat.name,spec='',amount=p.totalExVat||0;
      if(cat.pricingType==='SIZE') { spec=this.newItem.widthMm+'×'+this.newItem.heightMm+'mm'; }
      else if(cat.pricingType==='LENGTH') { spec=this.newItem.heightMm+'×'+this.newItem.widthMm+'mm'; }
      else { name=this.newItem.customName||cat.name; spec=this.newItem.customSpec||''; }
      const perItem=Math.round(amount/Math.max(1,this.newItem.qty));
      const itemUnit = (cat.pricingType === 'SIZE' || cat.pricingType === 'LENGTH') ? 'ea' : (cat.unit || '개');
      // 사양 정보 가져오기
      const specs = cat.purchaseSpecs || [];
      const selSpec = this.newItem.selectedSpecIdx >= 0 ? specs[this.newItem.selectedSpecIdx] : null;
      const designImg = selSpec?.image || cat.designImage || '';
      // 복수 매입견적에서 최저가 사용
      const lowestQ = selSpec ? this.getLowestQuote(selSpec) : null;
      const purchPrice = lowestQ?.purchasePrice || selSpec?.purchasePrice || cat.purchasePrice || 0;
      const supplier = lowestQ?.supplier || selSpec?.supplier || '';
      const specName = selSpec?.specName || '';
      const allQuotes = selSpec ? this.getSpecQuotes(selSpec) : [];
      if (specName && !spec) spec = specName;
      else if (specName) spec = spec + ' / ' + specName;
      this.quoteItems.push({name,spec,unit:itemUnit,qty:this.newItem.qty,unitPrice:perItem,amount,remark:p.optionRemark||'',designImage:designImg,purchasePrice:purchPrice,supplier:supplier,purchaseQuotes:allQuotes});
      this.newItem={categoryId:'',widthMm:0,heightMm:0,qty:1,selectedOptions:[],optionQtys:{},optionVariants:{},customName:'',customSpec:''}; this.catSearch=''; this.catOpen=false; this.catHighlight=-1; this.calcPreview={};
    },

      try {
        const reader = new FileReader();
        reader.onload = async (e) => {
          const base64 = e.target.result;
          const r = await fetch('/api/me/namecard-image', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: base64, mimeType: file.type })
          });
          if (r.ok) {
            const data = await r.json();
            this.namecardImage = data.url + '?t=' + Date.now();
            this.showToast('명함 이미지가 업로드되었습니다');
          } else {
            this.showToast('업로드 실패', 'error');
          }
          this.namecardImageUploading = false;
        };
        reader.readAsDataURL(file);
      } catch(e) { this.showToast('업로드 오류', 'error'); this.namecardImageUploading = false; }
    },
    async deleteNamecardImage() {
      if (!confirm('명함 이미지를 삭제하시겠습니까?')) return;
      const r = await fetch('/api/me/namecard-image', { method: 'DELETE' });
      if (r.ok) { this.namecardImage = null; this.showToast('명함 이미지가 삭제되었습니다'); }
    },

    // ── 통계 ──
    async loadStats() {
      this.statsLoading = true;
      try { const r = await fetch('/api/stats'); if(r.ok) this.stats = await r.json(); }
      catch(e){}
      finally { this.statsLoading = false; }
    },

    // ── CSV ──
    async uploadCsv(e) { const f=e.target.files[0]; if(!f)return; const r=await fetch('/api/csv/upload',{method:'POST',body:await f.arrayBuffer()}); const j=await r.json(); if(j.ok){this.showToast(j.count+'개 항목이 로드되었습니다');await this.checkCsv();} else this.showToast(j.error,'error'); },
    async searchCsv() { if(!this.csvSearch.keyword.trim())return; const r=await fetch('/api/csv/search',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({keyword:this.csvSearch.keyword})}); this.csvSearch.results=(await r.json()).items||[]; },
    async importBackup(e) { const f=e.target.files[0]; if(!f||!confirm('덮어쓰기?'))return; const r=await fetch('/api/import',{method:'POST',headers:{'Content-Type':'application/json'},body:await f.text()}); if(r.ok){this.showToast('데이터가 복원되었습니다');await this.loadData();} else this.showToast('처리에 실패했습니다','error'); }
  };
}
</script>
