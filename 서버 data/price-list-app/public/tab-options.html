        <div class="space-y-3 fade-in">
          <div class="card" style="padding:0;overflow:hidden;">
            <div style="padding:10px 14px;background:linear-gradient(135deg,#fff7ed,#ffedd5);border-bottom:1px solid #fed7aa;">
              <div class="flex items-center justify-between">
                <h3 class="font-work text-[13px] font-bold text-gray-800 flex items-center gap-2 m-0">
                  <span class="material-symbols-outlined" style="font-size:16px;color:#ea580c;">tune</span> 옵션 추가
                </h3>
                <button @click="showAddOption = !showAddOption" class="btn-primary text-xs py-1.5 px-3 flex items-center gap-1">
                  <span class="material-symbols-outlined" style="font-size:16px;" x-text="showAddOption ? 'close' : 'add'"></span>
                  <span x-text="showAddOption ? '닫기' : '새 옵션'"></span>
                </button>
              </div>
            </div>

            <template x-if="showAddOption">
              <div style="padding:8px 14px;background:#fefcf9;border-bottom:1px solid #fed7aa;">
                <div class="flex items-center gap-2 flex-wrap mb-2">
                  <input x-model="newOpt.code" class="input-base py-1.5 text-xs" style="width:80px;" placeholder="코드">
                  <input x-model="newOpt.name" class="input-base py-1.5 text-xs" style="width:140px;" placeholder="이름">
                  <select x-model="newOpt.pricingType" class="input-base py-1.5 text-xs" style="width:110px;">
                    <option value="fixed">고정 단가</option>
                    <option value="perSqm">면적(㎡)당</option>
                    <option value="variants">규격별</option>
                  </select>
                  <input x-model="newOpt.unit" class="input-base py-1.5 text-xs" style="width:60px;" placeholder="단위">
                  <input x-show="newOpt.pricingType !== 'variants'" type="number" x-model="newOpt.price" class="input-base py-1.5 text-xs" style="width:100px;" placeholder="단가(원)">
                  <button @click="createOption()" class="btn-primary text-xs py-1.5 px-3">추가</button>
                </div>
                <div x-show="newOpt.pricingType === 'variants'" class="mb-2">
                  <div class="flex items-center gap-1 flex-wrap">
                    <template x-for="(v, vi) in newOpt.variants" :key="vi">
                      <div class="flex items-center gap-1">
                        <input x-model="v.label" class="input-base py-1 text-xs" style="width:80px;" placeholder="규격명">
                        <input type="number" x-model.number="v.price" class="input-base py-1 text-xs text-right" style="width:70px;" placeholder="단가">
                        <button @click="newOpt.variants.splice(vi, 1)" class="text-red-400 hover:text-red-600 text-xs">×</button>
                      </div>
                    </template>
                    <button @click="newOpt.variants.push({label:'',price:0})" class="text-blue-600 hover:text-blue-700 text-xs font-medium">+ 규격</button>
                  </div>
                </div>
                <div class="flex items-center gap-2 flex-wrap">
                  <span class="text-xs text-gray-500">적용:</span>
                  <template x-for="c in categories" :key="c.id">
                    <label class="flex items-center gap-1 cursor-pointer">
                      <input type="checkbox" :value="c.id" x-model="newOpt.categoryIds" class="w-3 h-3 cursor-pointer">
                      <span class="text-xs text-gray-600" x-text="c.name"></span>
                    </label>
                  </template>
                </div>
              </div>
            </template>
          </div>

          <div class="card" style="padding:0;overflow:hidden;">
            <div style="padding:10px 14px;background:linear-gradient(135deg,#fff7ed,#ffedd5);border-bottom:1px solid #fed7aa;">
              <h3 class="font-work text-[13px] font-bold text-gray-800 flex items-center gap-2 m-0">
                <span class="material-symbols-outlined" style="font-size:16px;color:#ea580c;">checklist</span> 옵션 목록
                <span class="text-xs font-medium px-2.5 py-1 rounded-full" style="background:rgba(234,88,12,.1);color:#ea580c;" x-text="options.length + '개'"></span>
              </h3>
            </div>
            <div class="overflow-x-auto">
            <table class="w-full text-xs" style="border-collapse:collapse;">
              <thead>
                <tr style="background:#f8fafb;">
                  <th style="padding:6px 6px;width:20px;border-bottom:1px solid #e5e7eb;"></th>
                  <th style="padding:6px 10px;text-align:left;font-size:10px;font-weight:600;color:#6b7280;border-bottom:1px solid #e5e7eb;">코드</th>
                  <th style="padding:6px 10px;text-align:left;font-size:10px;font-weight:600;color:#6b7280;border-bottom:1px solid #e5e7eb;">이름</th>
                  <th style="padding:6px 10px;text-align:center;font-size:10px;font-weight:600;color:#6b7280;border-bottom:1px solid #e5e7eb;">단가방식</th>
                  <th style="padding:6px 10px;text-align:right;font-size:10px;font-weight:600;color:#6b7280;border-bottom:1px solid #e5e7eb;">기본단가</th>
                  <th style="padding:6px 10px;text-align:center;font-size:10px;font-weight:600;color:#6b7280;border-bottom:1px solid #e5e7eb;">업체견적</th>
                  <th style="padding:6px 10px;text-align:left;font-size:10px;font-weight:600;color:#6b7280;border-bottom:1px solid #e5e7eb;">단위</th>
                  <th style="padding:6px 10px;text-align:left;font-size:10px;font-weight:600;color:#6b7280;border-bottom:1px solid #e5e7eb;">카테고리</th>
                  <th style="padding:6px 10px;text-align:center;font-size:10px;font-weight:600;color:#6b7280;border-bottom:1px solid #e5e7eb;">삭제</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="opt in options" :key="opt.id">
                  <tr style="border-bottom:1px solid #f0f1f3;cursor:pointer;" class="hover:bg-orange-50/40" @click="expandedOptId = (expandedOptId === opt.id ? null : opt.id)">
                    <td style="padding:5px 6px;text-align:center;color:#94a3b8;">
                      <span class="material-symbols-outlined" style="font-size:13px;transition:transform .15s;" :style="expandedOptId===opt.id?'transform:rotate(90deg)':''">chevron_right</span>
                    </td>
                    <td style="padding:5px 10px;font-weight:600;color:#374151;" x-text="opt.code"></td>
                    <td style="padding:5px 10px;color:#374151;" x-text="opt.name"></td>
                    <td style="padding:5px 10px;text-align:center;">
                      <span x-show="(opt.pricingType||'fixed')==='fixed'" class="inline-block px-1.5 py-0.5 rounded-full" style="font-size:10px;background:#f3f4f6;color:#6b7280;">고정</span>
                      <span x-show="opt.pricingType==='perSqm'" class="inline-block px-1.5 py-0.5 rounded-full" style="font-size:10px;background:#dbeafe;color:#1d4ed8;">㎡당</span>
                      <span x-show="opt.pricingType==='variants'" class="inline-block px-1.5 py-0.5 rounded-full" style="font-size:10px;background:#fef3c7;color:#b45309;">규격별</span>
                    </td>
                    <td style="padding:5px 10px;text-align:right;color:#6b7280;">
                      <span x-show="opt.pricingType!=='variants'" x-text="(opt.price||0).toLocaleString()+'원'"></span>
                      <span x-show="opt.pricingType==='variants'" x-text="(opt.variants||[]).length+'종'"></span>
                    </td>
                    <td style="padding:5px 10px;text-align:center;">
                      <span x-text="(opt.quotes||[]).length+'건'" :style="(opt.quotes||[]).length>0?'color:#ea580c;font-weight:600;':'color:#9ca3af;'"></span>
                    </td>
                    <td style="padding:5px 10px;color:#6b7280;" x-text="opt.unit"></td>
                    <td style="padding:5px 10px;color:#6b7280;">
                      <span :style="(!opt.categoryIds||opt.categoryIds.length===0)?'color:#ef4444;font-weight:600;':''"
                        x-text="(!opt.categoryIds||opt.categoryIds.length===0)?'미지정':opt.categoryIds.map(id=>categories.find(c=>c.id===id)?.name||'').join(', ')"></span>
                    </td>
                    <td style="padding:5px 10px;text-align:center;" @click.stop>
                      <button @click="deleteOption(opt.id)" class="text-red-400 hover:text-red-600" style="font-size:14px;line-height:1;">×</button>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
            </div>
            <!-- 업체별 견적 상세 패널 -->
            <template x-if="expandedOptId && options.find(o=>o.id===expandedOptId)">
              <div style="border-top:2px solid #fed7aa;background:#fffbf5;padding:10px 14px;">
                <!-- 적용 품목 편집 -->
                <div style="margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #fde68a;">
                  <span style="font-size:11px;font-weight:700;color:#ea580c;display:flex;align-items:center;gap:4px;margin-bottom:6px;">
                    <span class="material-symbols-outlined" style="font-size:14px;">category</span> 적용 품목
                  </span>
                  <div class="flex items-center gap-2 flex-wrap">
                    <template x-for="c in categories" :key="c.id">
                      <label class="flex items-center gap-1.5 cursor-pointer px-2 py-1 rounded-md border transition-colors"
                        :style="(options.find(o=>o.id===expandedOptId)?.categoryIds||[]).includes(c.id) ? 'background:#fff7ed;border-color:#fed7aa;' : 'background:#fff;border-color:#e5e7eb;'">
                        <input type="checkbox" :value="c.id"
                          :checked="(options.find(o=>o.id===expandedOptId)?.categoryIds||[]).includes(c.id)"
                          @change="toggleOptCategory(expandedOptId, c.id, $el.checked)"
                          class="w-3.5 h-3.5 cursor-pointer accent-orange-500">
                        <span class="text-xs" :style="(options.find(o=>o.id===expandedOptId)?.categoryIds||[]).includes(c.id) ? 'color:#9a3412;font-weight:600;' : 'color:#6b7280;'" x-text="c.name"></span>
                      </label>
                    </template>
                  </div>
                  <p x-show="(options.find(o=>o.id===expandedOptId)?.categoryIds||[]).length===0" style="font-size:10px;color:#ef4444;margin-top:6px;display:flex;align-items:center;gap:3px;">
                    <span class="material-symbols-outlined" style="font-size:13px;">warning</span> 품목이 선택되지 않으면 견적 작성 시 이 옵션이 표시되지 않습니다
                  </p>
                </div>
                <div class="flex items-center justify-between mb-2">
                  <h4 style="font-size:11px;font-weight:700;color:#ea580c;" x-text="(options.find(o=>o.id===expandedOptId)||{}).name + ' — 업체별 견적'"></h4>
                  <button @click="showAddOptQuote=!showAddOptQuote" style="font-size:11px;color:#ea580c;font-weight:600;" x-text="showAddOptQuote?'닫기':'+ 견적 추가'"></button>
                </div>
                <template x-if="showAddOptQuote">
                  <div class="flex items-center gap-2 flex-wrap mb-2">
                    <select x-model="newOptQuote.vendor" class="input-base py-1 text-xs" style="width:130px;">
                      <option value="">업체 선택</option>
                      <template x-for="v in vendors" :key="v.id"><option :value="v.name" x-text="v.name"></option></template>
                    </select>
                    <input type="number" x-model.number="newOptQuote.price" class="input-base py-1 text-xs text-right" style="width:100px;" placeholder="단가(원)">
                    <input type="date" x-model="newOptQuote.quoteDate" class="input-base py-1 text-xs" style="width:120px;">
                    <input x-model="newOptQuote.note" class="input-base py-1 text-xs" style="width:120px;" placeholder="비고">
                    <button @click="addOptQuote(expandedOptId)" class="btn-primary text-xs py-1 px-2">추가</button>
                  </div>
                </template>
                <div x-show="(options.find(o=>o.id===expandedOptId)?.quotes||[]).length===0" style="padding:8px;text-align:center;color:#9ca3af;font-size:11px;">등록된 업체 견적이 없습니다</div>
                <table x-show="(options.find(o=>o.id===expandedOptId)?.quotes||[]).length>0" class="w-full text-xs" style="border-collapse:collapse;">
                  <thead><tr style="background:#fff5eb;">
                    <th style="padding:4px 8px;text-align:left;font-size:10px;color:#92400e;border-bottom:1px solid #fde68a;">업체명</th>
                    <th style="padding:4px 8px;text-align:right;font-size:10px;color:#92400e;border-bottom:1px solid #fde68a;">단가</th>
                    <th style="padding:4px 8px;text-align:left;font-size:10px;color:#92400e;border-bottom:1px solid #fde68a;">견적일</th>
                    <th style="padding:4px 8px;text-align:left;font-size:10px;color:#92400e;border-bottom:1px solid #fde68a;">비고</th>
                    <th style="padding:4px 8px;text-align:center;font-size:10px;color:#92400e;border-bottom:1px solid #fde68a;">삭제</th>
                  </tr></thead>
                  <tbody>
                    <template x-for="q in (options.find(o=>o.id===expandedOptId)?.quotes||[])" :key="q.id">
                      <tr style="border-bottom:1px solid #fef3c7;" class="hover:bg-amber-50/40">
                        <td style="padding:4px 8px;font-weight:600;color:#374151;" x-text="q.vendor"></td>
                        <td style="padding:4px 8px;text-align:right;color:#ea580c;font-weight:600;" x-text="Number(q.price).toLocaleString()+'원'"></td>
                        <td style="padding:4px 8px;color:#6b7280;" x-text="q.quoteDate"></td>
                        <td style="padding:4px 8px;color:#6b7280;" x-text="q.note||'-'"></td>
                        <td style="padding:4px 8px;text-align:center;">
                          <button @click="deleteOptQuote(expandedOptId,q.id)" class="text-red-400 hover:text-red-600" style="font-size:13px;">×</button>
                        </td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>
            </template>
          </div>
        </div>
