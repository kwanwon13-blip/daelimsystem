<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="theme-color" content="#1d4ed8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="워크플로우">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon-180.png">
<link rel="stylesheet" href="/fonts/material-symbols.css" />
<title>워크플로우 — 대림에스엠</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:-apple-system,"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif;background:#eef1f6;color:#111827;-webkit-font-smoothing:antialiased;font-size:16px;padding-bottom:env(safe-area-inset-bottom);}
  [x-cloak]{display:none!important;}
  .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 500,'GRAD' 0,'opsz' 24;display:inline-flex;align-items:center;justify-content:center;line-height:1;}
  .wrap{max-width:560px;margin:0 auto;min-height:100vh;position:relative;background:#eef1f6;}

  /* 헤더 */
  .hd{background:#1d4ed8;color:#fff;padding:calc(env(safe-area-inset-top) + 14px) 16px 12px;position:sticky;top:0;z-index:60;}
  .hd-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .hd-sub{font-size:12px;opacity:.9;}
  .hd-h1{font-size:22px;font-weight:700;letter-spacing:-.3px;}
  .hd-pc{flex:none;display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.16);color:#fff;border:none;border-radius:12px;padding:9px 12px;font-size:14px;font-weight:600;text-decoration:none;}
  .hd-pc .material-symbols-outlined{font-size:18px;}

  /* 상단 탭(상태) */
  .tabs{display:flex;gap:8px;padding:12px 12px 4px;overflow-x:auto;position:sticky;top:calc(env(safe-area-inset-top) + 70px);z-index:55;background:#eef1f6;-webkit-overflow-scrolling:touch;}
  .tab{flex:0 0 auto;min-height:44px;padding:0 16px;border-radius:22px;border:2px solid #d7dbe3;background:#fff;color:#374151;font-size:15px;font-weight:700;display:inline-flex;align-items:center;gap:6px;cursor:pointer;}
  .tab .material-symbols-outlined{font-size:18px;}
  .tab.on{background:#1d4ed8;border-color:#1d4ed8;color:#fff;}
  .tab .cnt{background:rgba(0,0,0,.12);border-radius:999px;font-size:12px;font-weight:800;min-width:20px;padding:1px 6px;text-align:center;}
  .tab.on .cnt{background:rgba(255,255,255,.28);}

  /* 검색 */
  .srch{padding:8px 12px 4px;position:sticky;top:calc(env(safe-area-inset-top) + 124px);z-index:54;background:#eef1f6;}
  .srch-box{position:relative;}
  .srch input{width:100%;min-height:44px;padding:12px 44px 12px 16px;font-size:16px;border:2px solid #d7dbe3;border-radius:14px;background:#fff;-webkit-appearance:none;}
  .srch input:focus{outline:none;border-color:#1d4ed8;}
  .srch-clear{position:absolute;right:7px;top:50%;transform:translateY(-50%);width:34px;height:34px;border:none;background:#e5e7eb;color:#4b5563;border-radius:50%;font-size:18px;display:none;align-items:center;justify-content:center;cursor:pointer;}
  .srch-clear.show{display:flex;}

  .list{padding:10px 12px 120px;}
  .statebar{display:flex;align-items:center;gap:8px;padding:2px 4px 10px;color:#6b7280;font-size:13px;}
  .spin{width:18px;height:18px;border:3px solid #cbd5e1;border-top-color:#1d4ed8;border-radius:50%;animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* 카드 */
  .card{background:#fff;border-radius:16px;border:1px solid #e8ebf1;margin-bottom:12px;overflow:hidden;border-left:5px solid #cbd5e1;}
  .card.st-overdue{border-left-color:#ef4444;}
  .card.st-blocked{border-left-color:#f97316;}
  .card.st-late{border-left-color:#f59e0b;}
  .card.st-soon{border-left-color:#eab308;}
  .card.st-done{border-left-color:#16a34a;}
  .card.st-cancelled{border-left-color:#9ca3af;opacity:.7;}
  .card.urgent{border-left-color:#dc2626;}
  .card-body{display:flex;gap:12px;padding:13px 14px;cursor:pointer;align-items:flex-start;}
  .card-thumb{flex:none;width:72px;height:72px;border-radius:11px;background:#f1f3f7;overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative;border:1px solid #e8ebf1;}
  .card-thumb img{width:100%;height:100%;object-fit:cover;}
  .card-thumb .ph{font-size:30px;color:#cbd5e1;}
  .card-thumb .more{position:absolute;right:3px;bottom:3px;background:rgba(17,24,39,.78);color:#fff;font-size:11px;font-weight:800;border-radius:6px;padding:1px 6px;}
  .card-main{flex:1;min-width:0;}
  .card-title{font-size:17px;font-weight:700;letter-spacing:-.2px;line-height:1.3;word-break:break-all;}
  .card-sub{font-size:14px;color:#2563eb;margin-top:2px;font-weight:500;word-break:break-all;}
  .card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;align-items:center;}
  .tag{font-size:11px;font-weight:800;border-radius:999px;padding:2px 9px;line-height:1.5;}
  .tag.urgent{background:#fee2e2;color:#b91c1c;}
  .tag.note{background:#fff7ed;color:#9a3412;}
  .tag.due{background:#eef2ff;color:#3730a3;}
  .tag.unread{background:#fee2e2;color:#b91c1c;}
  .tag.un{background:#fef9c3;color:#854d0e;}
  .tag.weld{background:#ffedd5;color:#9a3412;}
  .tag.out{background:#dbeafe;color:#1e40af;}
  .tag.person{background:#f3f4f6;color:#4b5563;}
  .tag.unord{background:#fef3c7;color:#92400e;}

  /* 카드 하단 액션 */
  .card-act{display:flex;gap:8px;padding:0 14px 13px;flex-wrap:wrap;}
  .card-act:empty{display:none;}
  .act-date{flex:1;min-width:130px;min-height:44px;border:2px solid #d7dbe3;border-radius:12px;padding:0 12px;font-size:15px;background:#fff;-webkit-appearance:none;}
  .act-date:focus{outline:none;border-color:#1d4ed8;}
  .btn{min-height:44px;border:none;border-radius:12px;padding:0 16px;font-size:15px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;}
  .btn .material-symbols-outlined{font-size:19px;}
  .btn:active{opacity:.82;}
  .btn:disabled{opacity:.5;}
  .btn-blue{background:#1d4ed8;color:#fff;}
  .btn-green{background:#16a34a;color:#fff;}
  .btn-amber{background:#d97706;color:#fff;}
  .btn-grey{background:#eef1f6;color:#374151;border:1px solid #e2e6ee;}
  .btn-wide{flex:1;}

  /* 빈 상태 */
  .empty{padding:54px 28px;text-align:center;color:#4b5563;}
  .empty .material-symbols-outlined{font-size:54px;color:#cbd5e1;}
  .empty-t{font-size:17px;color:#6b7280;font-weight:700;margin-top:10px;}
  .empty-s{font-size:14px;color:#9aa3b2;margin-top:5px;line-height:1.5;}

  /* 로그인 안내 */
  .login{padding:60px 24px;text-align:center;}
  .login .material-symbols-outlined{font-size:60px;color:#1d4ed8;}
  .login-t{font-size:21px;font-weight:700;margin:14px 0 6px;}
  .login-s{font-size:15px;color:#6b7280;line-height:1.6;margin-bottom:22px;}
  .login a{display:inline-flex;align-items:center;gap:8px;background:#1d4ed8;color:#fff;text-decoration:none;border-radius:14px;padding:15px 26px;font-size:17px;font-weight:700;}

  /* 상세 풀스크린 */
  .detail{position:fixed;inset:0;background:#eef1f6;z-index:120;display:flex;flex-direction:column;overflow:hidden;max-width:560px;margin:0 auto;}
  .d-head{background:#1d4ed8;color:#fff;padding:calc(env(safe-area-inset-top) + 12px) 14px 12px;position:relative;flex:none;}
  .d-back{position:absolute;left:8px;top:calc(env(safe-area-inset-top) + 8px);width:42px;height:42px;border:none;background:rgba(255,255,255,.16);color:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .d-back .material-symbols-outlined{font-size:24px;}
  .d-title{font-size:19px;font-weight:700;padding:0 50px;line-height:1.3;word-break:break-all;}
  .d-subtitle{font-size:14px;opacity:.92;padding:0 50px;margin-top:3px;word-break:break-all;}
  .d-chips{display:flex;flex-wrap:wrap;gap:6px;padding:10px 6px 0;}
  .d-chip{font-size:12px;font-weight:800;border-radius:999px;padding:3px 10px;background:rgba(255,255,255,.18);color:#fff;}
  .d-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px calc(28px + env(safe-area-inset-bottom));}

  .d-note{background:#fff7ed;border:1px solid #fed7aa;border-radius:13px;padding:12px 14px;margin-bottom:14px;display:flex;gap:10px;}
  .d-note .material-symbols-outlined{font-size:20px;color:#ea580c;flex:none;}
  .d-note b{display:block;font-size:14px;color:#9a3412;margin-bottom:3px;}
  .d-note-text{font-size:14px;color:#7c2d12;line-height:1.5;word-break:break-all;}

  .d-actions{display:flex;flex-direction:column;gap:9px;background:#fff;border:1px solid #e8ebf1;border-radius:14px;padding:13px;margin-bottom:14px;}
  .d-actions .row{display:flex;gap:9px;align-items:center;}
  .d-act-label{font-size:13px;font-weight:800;color:#6b7280;margin-bottom:-2px;}

  .sec-label{font-size:14px;font-weight:800;color:#4b5563;margin:6px 2px 9px;display:flex;align-items:center;gap:6px;}
  .sec-label .material-symbols-outlined{font-size:18px;}

  .file{background:#fff;border:1px solid #e8ebf1;border-radius:14px;margin-bottom:12px;overflow:hidden;}
  .file.unread{border-color:#fca5a5;box-shadow:0 0 0 2px rgba(248,113,113,.18);}
  .file-img{width:100%;background:#f1f3f7;display:block;border:none;padding:0;cursor:pointer;position:relative;}
  .file-img img{width:100%;display:block;max-height:60vh;object-fit:contain;background:#f8fafc;}
  .file-bar{display:flex;align-items:center;gap:10px;padding:11px 13px;}
  .file-ext{flex:none;min-width:42px;height:42px;border-radius:9px;background:#eef2ff;color:#3730a3;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 6px;}
  .file-ext.missing{background:#fee2e2;color:#b91c1c;}
  .file-name{flex:1;min-width:0;font-size:14px;color:#111827;font-weight:600;word-break:break-all;line-height:1.35;}
  .file-meta{font-size:12px;color:#9aa3b2;margin-top:2px;}
  .file-foot{display:flex;gap:8px;padding:0 13px 12px;flex-wrap:wrap;align-items:center;}
  .file-st{font-size:11px;font-weight:800;border-radius:999px;padding:3px 9px;}
  .file-st.wait{background:#fee2e2;color:#b91c1c;}
  .file-st.ok{background:#dcfce7;color:#15803d;}

  .pcnote{text-align:center;color:#9aa3b2;font-size:13px;line-height:1.6;margin:18px 4px 6px;padding:14px;background:#fff;border:1px dashed #d7dbe3;border-radius:13px;}
  .pcnote .material-symbols-outlined{font-size:18px;vertical-align:-4px;color:#94a3b8;}

  /* 라이트박스 */
  .lb{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;display:none;flex-direction:column;}
  .lb.on{display:flex;}
  .lb-top{display:flex;justify-content:space-between;align-items:center;padding:calc(env(safe-area-inset-top) + 8px) 14px 8px;color:#fff;}
  .lb-x{width:42px;height:42px;border:none;background:rgba(255,255,255,.14);color:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .lb-x .material-symbols-outlined{font-size:24px;}
  .lb-body{flex:1;display:flex;align-items:center;justify-content:center;overflow:auto;padding:8px;}
  .lb-body img{max-width:100%;max-height:100%;object-fit:contain;}
  .lb-dl{display:inline-flex;align-items:center;gap:6px;background:#16a34a;color:#fff;text-decoration:none;border-radius:12px;padding:11px 18px;font-size:15px;font-weight:700;}

  /* 토스트(saving) */
  .saving-bar{position:fixed;left:50%;bottom:calc(20px + env(safe-area-inset-bottom));transform:translateX(-50%);background:#111827;color:#fff;font-size:14px;font-weight:700;padding:11px 20px;border-radius:14px;z-index:300;display:flex;align-items:center;gap:9px;}
  .saving-bar .spin{border-color:rgba(255,255,255,.35);border-top-color:#fff;}
</style>
<!-- Alpine.js v3 (+collapse) — index.html과 동일본. workflowApp()은 데이터 팩토리일 뿐 Alpine 런타임이 있어야 x-data/x-show/x-for가 동작한다. defer라서 DOM 파싱 완료 후(=본문 끝 workflow.js+래퍼 실행 후) 실행 → x-data="workflowApp()" 평가 시점엔 래퍼가 합쳐진 정의본이 보장됨. -->
<script src="https://unpkg.com/@alpinejs/collapse@3.x.x/dist/cdn.min.js" defer></script>
<script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>
<body>
<div class="wrap" x-data="workflowApp()" x-init="init()" x-cloak>

  <!-- 헤더 -->
  <div class="hd">
    <div class="hd-row">
      <div>
        <div class="hd-sub">대림에스엠 · 모바일</div>
        <div class="hd-h1">워크플로우</div>
      </div>
      <a class="hd-pc" href="/" title="PC 화면(전체 기능)으로 이동">
        <span class="material-symbols-outlined">desktop_windows</span>PC
      </a>
    </div>
  </div>

  <!-- 로그인 안내(미로그인) -->
  <template x-if="!loading && !currentUser">
    <div class="login">
      <span class="material-symbols-outlined">lock</span>
      <div class="login-t">로그인이 필요합니다</div>
      <div class="login-s">직원 계정으로 로그인하면<br>담당 작업을 폰에서 바로 처리할 수 있어요.</div>
      <a href="/">
        <span class="material-symbols-outlined">login</span>로그인 화면으로
      </a>
    </div>
  </template>

  <!-- 본문(로그인 시) -->
  <template x-if="currentUser">
    <div>
      <!-- 상태 탭 -->
      <div class="tabs">
        <template x-for="s in stages" :key="s.id">
          <button type="button" class="tab"
                  :class="(statusFilter==='active' && mStage===s.id) ? 'on' : ''"
                  @click="mSelectStage(s.id)">
            <span class="material-symbols-outlined" x-text="s.icon"></span>
            <span x-text="s.label"></span>
            <span class="cnt" x-text="jobsForStage(s.id).length"></span>
          </button>
        </template>
        <button type="button" class="tab" :class="statusFilter==='done' ? 'on' : ''" @click="mShowDone()">
          <span class="material-symbols-outlined">inventory_2</span>완료
        </button>
      </div>

      <!-- 검색 -->
      <div class="srch">
        <div class="srch-box">
          <input type="search" inputmode="search" placeholder="현장·회사·코드 검색"
                 x-model="query" @input.debounce.350ms="loadJobs()">
          <button type="button" class="srch-clear" :class="query ? 'show' : ''" @click="query=''; loadJobs()" aria-label="지우기">&times;</button>
        </div>
      </div>

      <!-- 리스트 -->
      <div class="list">
        <div class="statebar">
          <template x-if="loading"><span class="spin"></span></template>
          <span x-show="!loading" x-text="mCurrentLabel() + ' · ' + mVisibleJobs().length + '건'"></span>
          <span x-show="loading">불러오는 중…</span>
        </div>

        <template x-for="job in mVisibleJobs()" :key="job.id">
          <div class="card" :class="cardStateClass(job) + (job.priority==='urgent' ? ' urgent' : '')">
            <!-- 카드 본체(탭하면 상세) -->
            <div class="card-body" @click="selectJob(job.id, mStage)">
              <div class="card-thumb">
                <template x-if="job.primaryVisualFile">
                  <img :src="job.primaryVisualFile.thumbUrl || job.primaryVisualFile.previewUrl" loading="lazy"
                       @load="handleWorkflowImageLoad($event)"
                       @error="handleWorkflowImageError($event, job.primaryVisualFile.previewUrl)">
                </template>
                <template x-if="!job.primaryVisualFile">
                  <span class="material-symbols-outlined ph">image</span>
                </template>
                <span class="more" x-show="(job.visualFileCount||0) > 1" x-text="'+' + (job.visualFileCount - 1)"></span>
              </div>
              <div class="card-main">
                <div class="card-title" x-text="cardTitle(job)"></div>
                <div class="card-sub" x-show="cardSubtitle(job)" x-text="cardSubtitle(job)"></div>
                <div class="card-tags">
                  <span class="tag urgent" x-show="job.priority==='urgent'">긴급</span>
                  <span class="tag unord" x-show="job.unordered">미발주</span>
                  <span class="tag due" x-show="(cardDeadline(job)||{}).date" x-text="((cardDeadline(job)||{}).label||'마감') + ' ' + (cardDeadline(job)||{}).date"></span>
                  <span class="tag note" x-show="job.handoffNote">특이사항</span>
                  <span class="tag unread" x-show="job.unreadCount || job.unreadFileCount" x-text="'확인 ' + (job.unreadCount || job.unreadFileCount)"></span>
                  <span class="tag un" x-show="job.unassignedFileCount" x-text="'미배정 ' + job.unassignedFileCount"></span>
                  <span class="tag weld" x-show="job.weldingFileCount" x-text="'용접 ' + job.weldingFileCount"></span>
                  <span class="tag out" x-show="job.outputFileCount" x-text="'출력 ' + job.outputFileCount"></span>
                  <span class="tag person" x-show="job.createdByName" x-text="'발주 ' + job.createdByName"></span>
                </div>
              </div>
            </div>

            <!-- 디자인 단계 액션 -->
            <template x-if="mStage==='design' && statusFilter==='active'">
              <div class="card-act">
                <button type="button" class="btn btn-blue btn-wide" @click.stop="cardHandoff(job.id, 'design')"
                        x-show="!job.unordered && job.status!=='done' && job.status!=='cancelled' && job.viewerCanFactory">
                  <span class="material-symbols-outlined">download</span>가져오기
                </button>
                <button type="button" class="btn btn-blue btn-wide" @click.stop="reorderJob(job.id,'internal')"
                        x-show="job.unordered && job.viewerCanManage" :disabled="saving">내부발주</button>
                <button type="button" class="btn btn-grey" @click.stop="reorderJob(job.id,'external')"
                        x-show="job.unordered && job.viewerCanManage" :disabled="saving">외주발주</button>
              </div>
            </template>

            <!-- 공장 단계 액션: 완료가능일 + 수락/완료 -->
            <template x-if="mStage==='factory' && statusFilter==='active'">
              <div class="card-act">
                <input class="act-date" type="date"
                       x-show="job.viewerCanFactory && job.priority!=='urgent'"
                       :value="cardFactoryDateValue(job)"
                       @click.stop @change.stop="factoryDatePending[job.id] = $event.target.value">
                <button type="button" class="btn btn-green" @click.stop="cardSetFactoryDate(job.id, cardFactoryDateValue(job))"
                        x-show="cardDateDirty(job) && job.viewerCanFactory && job.priority!=='urgent'" :disabled="saving">
                  <span class="material-symbols-outlined">event_available</span>수락
                </button>
                <button type="button" class="btn btn-blue btn-wide" @click.stop="cardHandoff(job.id, 'factory')"
                        x-show="!cardDateDirty(job) && job.status!=='done' && job.status!=='cancelled' && job.viewerCanCurrentStageDept">
                  <span class="material-symbols-outlined">check_circle</span>완료
                </button>
              </div>
            </template>

            <!-- 납품(경영관리) 단계 액션 -->
            <template x-if="mStage==='delivery' && statusFilter==='active'">
              <div class="card-act">
                <button type="button" class="btn btn-blue btn-wide" @click.stop="cardHandoff(job.id, 'delivery')"
                        x-show="job.status!=='done' && job.status!=='cancelled' && job.viewerCanCurrentStageDept">
                  <span class="material-symbols-outlined">local_shipping</span>납품준비
                </button>
              </div>
            </template>
          </div>
        </template>

        <!-- 빈 상태 -->
        <template x-if="!loading && !mVisibleJobs().length">
          <div class="empty">
            <span class="material-symbols-outlined">task_alt</span>
            <div class="empty-t" x-text="statusFilter==='done' ? '완료된 작업이 없습니다' : (mCurrentLabel() + ' 단계 작업이 없습니다')"></div>
            <div class="empty-s">다른 탭을 눌러보거나<br>위에서 검색해 보세요.</div>
          </div>
        </template>
      </div>
    </div>
  </template>

  <!-- 상세 풀스크린 -->
  <template x-if="detail && detail.job">
    <div class="detail">
      <div class="d-head">
        <button type="button" class="d-back" @click="closeDetail()" aria-label="뒤로">
          <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <div class="d-title" x-text="detailHeaderTitle()"></div>
        <div class="d-subtitle" x-text="[detail.job.companyName, detail.job.projectName].filter(Boolean).join(' - ') || '회사 · 현장 미지정'"></div>
        <div class="d-chips">
          <span class="d-chip" x-text="priorityLabel(detail.job.priority)"></span>
          <span class="d-chip" x-text="(statuses[detail.job.status] || detail.job.status || '진행')"></span>
          <span class="d-chip" x-show="detail.job.currentStage" x-text="stageLabel(detail.job.currentStage)"></span>
          <span class="d-chip" x-show="detail.job.createdByName" x-text="'발주 ' + detail.job.createdByName"></span>
        </div>
      </div>

      <div class="d-body">
        <!-- 특이사항 -->
        <div class="d-note" x-show="detail.job.handoffNote" x-cloak>
          <span class="material-symbols-outlined">push_pin</span>
          <div>
            <b>전달 특이사항 — 확인하세요</b>
            <div class="d-note-text" x-text="detail.job.handoffNote"></div>
          </div>
        </div>

        <!-- 단계 이동(권한 있을 때만) -->
        <div class="d-actions"
             x-show="detail.job.status!=='done' && detail.job.status!=='cancelled' && (detail.job.viewerCanFactory || detail.job.viewerCanCurrentStage)">
          <div class="d-act-label">단계 처리</div>

          <!-- 가져오기(디자인→공장) -->
          <button type="button" class="btn btn-blue btn-wide"
                  x-show="detail.job.currentStage==='design' && detail.job.viewerCanFactory"
                  @click="cardHandoff(detail.job.id, 'design')" :disabled="saving">
            <span class="material-symbols-outlined">download</span>공장으로 가져오기
          </button>

          <!-- 공장: 완료가능일 + 수락/완료 -->
          <template x-if="detail.job.currentStage==='factory'">
            <div style="display:flex;flex-direction:column;gap:9px;">
              <div class="row" x-show="detail.job.viewerCanFactory && detail.job.priority!=='urgent'">
                <input class="act-date" style="flex:1;" type="date"
                       :value="cardFactoryDateValue(detail.job)"
                       @change="factoryDatePending[detail.job.id] = $event.target.value">
                <button type="button" class="btn btn-green" @click="cardSetFactoryDate(detail.job.id, cardFactoryDateValue(detail.job))"
                        x-show="cardDateDirty(detail.job)" :disabled="saving">수락</button>
              </div>
              <button type="button" class="btn btn-blue btn-wide"
                      x-show="!cardDateDirty(detail.job) && detail.job.viewerCanCurrentStageDept"
                      @click="cardHandoff(detail.job.id, 'factory')" :disabled="saving">
                <span class="material-symbols-outlined">check_circle</span>제작 완료
              </button>
            </div>
          </template>

          <!-- 납품준비(경영관리) -->
          <button type="button" class="btn btn-blue btn-wide"
                  x-show="detail.job.currentStage==='delivery' && detail.job.viewerCanCurrentStageDept"
                  @click="cardHandoff(detail.job.id, 'delivery')" :disabled="saving">
            <span class="material-symbols-outlined">local_shipping</span>납품준비
          </button>

          <!-- 되돌리기 -->
          <button type="button" class="btn btn-grey btn-wide"
                  x-show="detail.job.viewerCanCurrentStage && detail.job.currentStage!=='design'"
                  @click="cardStepBack(detail.job.id)" :disabled="saving">
            <span class="material-symbols-outlined">undo</span>이전 단계로 되돌리기
          </button>
        </div>

        <!-- 전체 파일 받기 -->
        <a class="btn btn-green btn-wide" style="width:100%;text-decoration:none;margin-bottom:14px;" :href="smartArchiveUrl()">
          <span class="material-symbols-outlined">folder_zip</span>전체 파일 ZIP 받기
        </a>

        <!-- 파일/시안 목록 -->
        <div class="sec-label">
          <span class="material-symbols-outlined">imagesmode</span>시안 · 파일
        </div>

        <template x-if="!detailTiles().length">
          <div class="empty" style="padding:30px 16px;">
            <span class="material-symbols-outlined">draft</span>
            <div class="empty-t">등록된 파일이 없습니다</div>
          </div>
        </template>

        <template x-for="file in detailTiles()" :key="'m-'+file.id">
          <div class="file" :class="isUnreadFile(file) ? 'unread' : ''">
            <!-- 이미지 -->
            <template x-if="file.isImage && file.exists!==false">
              <button type="button" class="file-img" @click="mOpenLightbox(file)">
                <img :src="filePreviewUrl(file) || fileThumbUrl(file)" loading="lazy"
                     @load="handleWorkflowImageLoad($event)"
                     @error="handleWorkflowImageError($event, fileThumbUrl(file))">
              </button>
            </template>

            <!-- 파일 정보 줄 -->
            <div class="file-bar">
              <span class="file-ext" :class="file.exists===false ? 'missing' : ''"
                    x-text="file.exists===false ? '없음' : fileTypeLabel(file)"></span>
              <div style="flex:1;min-width:0;">
                <div class="file-name" x-text="file.exists===false ? '서버 파일 없음' : (file.originalName || (fileTypeLabel(file) + ' 파일'))"></div>
                <div class="file-meta" x-show="file.version" x-text="'버전 v' + file.version"></div>
              </div>
            </div>

            <!-- 파일 하단: 상태 + 수신확인 + 받기 -->
            <div class="file-foot">
              <span class="file-st wait" x-show="file.hasTarget && !file.targetRead">수신대기</span>
              <span class="file-st ok" x-show="file.hasTarget && file.targetRead">수신확인됨</span>
              <span style="flex:1"></span>
              <button type="button" class="btn btn-amber" x-show="isUnreadFile(file)" @click="markRead(file)" :disabled="saving">
                <span class="material-symbols-outlined">done_all</span>수신확인
              </button>
              <a class="btn btn-grey" x-show="file.exists!==false" :href="smartFileUrl(file)">
                <span class="material-symbols-outlined">download</span>받기
              </a>
            </div>
          </div>
        </template>

        <!-- PC 안내 -->
        <div class="pcnote">
          <span class="material-symbols-outlined">desktop_windows</span>
          발주메일·현장명 변경·팀 분배·시안 교체 등 자세한 작업은 PC 화면에서 처리하세요.
        </div>
      </div>
    </div>
  </template>

  <!-- 라이트박스 -->
  <div class="lb" :class="mLb.open ? 'on' : ''">
    <div class="lb-top">
      <button type="button" class="lb-x" @click="mLb.open=false" aria-label="닫기">
        <span class="material-symbols-outlined">close</span>
      </button>
      <a class="lb-dl" x-show="mLb.file" :href="mLb.file ? smartFileUrl(mLb.file) : '#'">
        <span class="material-symbols-outlined">download</span>받기
      </a>
    </div>
    <div class="lb-body">
      <img x-show="mLb.file" :src="mLb.file ? (filePreviewUrl(mLb.file) || fileThumbUrl(mLb.file)) : ''"
           @error="handleWorkflowImageError($event, mLb.file ? fileThumbUrl(mLb.file) : '')">
    </div>
  </div>

  <!-- 저장 중 표시 -->
  <div class="saving-bar" x-show="saving" x-cloak>
    <span class="spin"></span>처리 중…
  </div>

</div>

<!-- 로직: 기존 자기완결형 workflowApp() 재사용. 모바일 전용 보조 상태/메서드는 아래 래퍼로 주입.
     ⚠ 스크립트 순서 중요: workflow.js(정의)를 먼저 동기 로드 → 그 다음 래퍼(동기)가 정의본을 감싼다.
     래퍼가 먼저면 _orig=window.workflowApp가 undefined라 return되어 mStage/mVisibleJobs 등이 빠진다(콘솔 ReferenceError).
     Alpine은 <head>에서 defer로 로드되어 DOM 파싱 완료 후(=이 두 동기 스크립트 실행 후) x-data를 평가하므로 합쳐진 정의본이 보장된다. -->
<script src="/workflow.js?v=20260625a"></script><!-- v= 캐시버스트: workflow.js 배포 때마다 올릴 것(옛 JS 캐시로 새 버튼이 죽는 사고 방지) -->
<script>
  // workflowApp()에 모바일 전용 보조 필드/메서드를 주입(원본 로직은 그대로 재사용).
  // 데스크톱 보드(jobsByStage)·상세(detail)·권한 플래그·파일 메서드를 그대로 쓰고,
  // 모바일은 "현재 보는 단계(mStage)"만 추가로 들고 한 칸씩 보여준다.
  (function () {
    var _orig = window.workflowApp;
    if (typeof _orig !== 'function' || _orig.__mobileWrapped) return;
    window.workflowApp = function () {
      var base = _orig();
      // ── 모바일 전용 상태 ──
      base.mStage = 'design';                 // 현재 보는 단계(상단 탭)
      base.mLb = { open: false, file: null }; // 시안 라이트박스
      // ── 모바일 전용 메서드 ──
      base.mSelectStage = function (id) {
        // 완료 탭에서 단계 탭으로 돌아오면 active 보드로 복귀(필요 시 재로딩)
        var needReload = (this.statusFilter !== 'active');
        this.mStage = id;
        if (needReload) { this.statusFilter = 'active'; this.loadJobs(); }
      };
      base.mShowDone = function () {
        if (this.statusFilter === 'done') return;
        this.statusFilter = 'done';
        this.loadJobs();
      };
      base.mCurrentLabel = function () {
        if (this.statusFilter === 'done') return '완료';
        var s = (this.stages || []).find(function (x) { return x.id === this.mStage; }.bind(this));
        return (s && s.label) || '진행';
      };
      // 현재 탭에 보여줄 작업 목록
      base.mVisibleJobs = function () {
        if (this.statusFilter === 'done') {
          // 완료 탭: 보드 그룹화를 거치지 않은 전체 완료 목록(검색은 서버가 q로 적용)
          return (this.jobs || []).filter(function (j) { return j && j.status === 'done'; });
        }
        // 진행 탭: 데스크톱과 동일한 단계별 그룹(권한·필터 동일) — 한 단계만 평탄화
        var groups = this.boardGroups(this.mStage) || [];
        var out = [];
        for (var i = 0; i < groups.length; i++) {
          var js = groups[i].jobs || [];
          for (var k = 0; k < js.length; k++) out.push(js[k]);
        }
        return out;
      };
      base.mOpenLightbox = function (file) {
        if (!file || !file.isImage || file.exists === false) return;
        this.mLb = { open: true, file: file };
      };
      return base;
    };
    window.workflowApp.__mobileWrapped = true;
  })();
</script>
</body>
</html>
