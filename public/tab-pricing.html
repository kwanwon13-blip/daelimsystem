                  </select>
                </div>
                <div class="flex-1 min-w-[200px]">
                  <label class="label-base">검색</label>
                  <input x-model="pricingSearch" class="input-base" placeholder="품목명 검색...">
                </div>
                <template x-if="pricingVendorId && canEditPricing">
                  <button @click="copyDefaultsToVendor()" class="btn-secondary whitespace-nowrap">기본 단가 복사</button>
                </template>
              </div>
            </div>
          </div>

          <!-- 품목 추가 인라인 폼 -->
          <div class="card" style="padding:0;overflow:hidden;">

                <h3 class="font-work text-[13px] font-bold text-gray-800 flex items-center gap-2 m-0">

                        <span x-text="cat.name"></span>
                        <span x-show="(cat.livartProducts||[]).length > 0" class="text-[10px] font-medium px-1.5 py-0.5 rounded-full" style="background:#fef3c7;color:#92400e;" x-text="'리바트 ' + (cat.livartProducts||[]).length"></span>

                      <template x-if="cat.pricingType === 'QTY' || cat.pricingType === 'FIXED'">
                        <input type="number" :value="getDisplayQtyPrice(cat)" @change="saveVendorPrice(cat.id, { qtyPrice: Number($el.value) })" :disabled="!canEditPricing" class="w-24 text-right text-sm border border-gray-200 rounded px-2 py-1 focus:border-blue-400 focus:ring-1 focus:ring-blue-200 outline-none" placeholder="-">
                      </template>
                      <span x-show="cat.pricingType === 'SIZE' || cat.pricingType === 'LENGTH' || cat.pricingType === 'VARIANTS'" class="text-gray-300">-</span>
                    </td>
                    <td class="px-4 py-3 text-right">
                      <template x-if="cat.pricingType === 'QTY' || cat.pricingType === 'FIXED'">
                        <input type="number" :value="getDisplayFixedPrice(cat)" @change="saveVendorPrice(cat.id, { fixedPrice: Number($el.value) })" :disabled="!canEditPricing" class="w-24 text-right text-sm border border-gray-200 rounded px-2 py-1 focus:border-blue-400 focus:ring-1 focus:ring-blue-200 outline-none" placeholder="-">
                      </template>
                      <span x-show="cat.pricingType === 'SIZE' || cat.pricingType === 'LENGTH' || cat.pricingType === 'VARIANTS'" class="text-gray-300">-</span>
                    </td>

                      <template x-if="cat.pricingType === 'SIZE'">

                              <span x-text="(tier.areaMin||0) + '~' + (tier.areaMax||'∞') + '㎡'"></span>
                              <span class="font-semibold text-gray-800" x-text="': ' + (tier.pricePerSqm||0).toLocaleString() + '원'"></span>
                            </span>
                          </template>
                          <span x-show="getDisplayTiers(cat).length === 0" class="text-gray-300 text-xs">단가 미설정</span>
                        </div>
                      </template>
                      <template x-if="cat.pricingType === 'LENGTH'">
                        <div class="flex flex-wrap gap-1">
                          <template x-for="(wt, wi) in getDisplayWidthTiers(cat)" :key="wi">

                              <span x-text="wt.widthMm + 'mm'"></span>
                              <span class="font-semibold text-gray-800" x-text="': ' + (wt.pricePerM||0).toLocaleString() + '원/m'"></span>
                            </span>
                          </template>
                          <span x-show="getDisplayWidthTiers(cat).length === 0" class="text-gray-300 text-xs">단가 미설정</span>
                        </div>
                      </template>
                      <template x-if="cat.pricingType === 'VARIANTS'">

                              <span class="font-semibold text-gray-800" x-text="': ' + (v.price||0).toLocaleString() + '원'"></span>
                            </span>
                          </template>
                          <span x-show="(cat.variants||[]).length === 0" class="text-gray-300 text-xs">단가 미설정</span>
                        </div>
                      </template>
                      <span x-show="cat.pricingType !== 'SIZE' && cat.pricingType !== 'LENGTH' && cat.pricingType !== 'VARIANTS'" class="text-gray-300">-</span>
                    </td>
                    <td class="px-4 py-2.5 text-center" x-show="canEditPricing" style="white-space:nowrap;">
                      <button @click="openPricingPopup(cat)" style="font-size:10px;color:#7c3aed;font-weight:600;background:rgba(124,58,237,.08);border:none;cursor:pointer;border-radius:4px;padding:2px 7px;">편집</button>

                          </div>
                          <span style="font-size:10px;font-weight:700;color:#92400e;white-space:nowrap;">단위</span>
                          <input type="text" :value="cat.unit" @change="updateCatField(cat.id,'unit',$el.value)" x-show="canEditPricing" class="input-base py-1 text-xs" style="width:55px;" placeholder="단위">

                        </div>

                        <!-- ② 사양 / 매입 관리 -->
                        <div style="margin-bottom:10px;">
                          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">

                              <span class="material-symbols-outlined" style="font-size:14px;">inventory_2</span> 사양 / 매입 관리

                            <div x-show="canEditPricing" class="flex items-center gap-1.5">
                              <button @click="openSpecSearchModal(cat.id)" class="flex items-center gap-1 text-xs py-1 px-2.5 rounded-lg font-semibold" style="background:#ede9fe;color:#7c3aed;border:1px solid #ddd6fe;">
                                <span class="material-symbols-outlined" style="font-size:13px;">image_search</span> 시안에서 가져오기
                              </button>
                              <button @click="addPurchaseSpec(cat.id)" class="btn-primary text-xs py-1 px-2.5 flex items-center gap-1">
                                <span class="material-symbols-outlined" style="font-size:14px;">add</span> 직접 추가
                              </button>
                            </div>
                          </div>
                          <div x-show="getCatPurchaseSpecs(cat.id).length === 0"

                                      <span class="material-symbols-outlined text-gray-300" style="font-size:20px;">content_paste</span>
                                      <span style="font-size:9px;color:#9ca3af;">Ctrl+V</span>
                                    </div>
                                    <label x-show="canEditPricing" class="btn-ghost text-xs py-0.5 cursor-pointer w-full text-center flex items-center justify-center gap-1" style="font-size:10px;">

                                            <input type="number" :value="q.purchasePrice" @change="updateSpecQuote(cat.id, si, qi, 'purchasePrice', Number($el.value))" :disabled="!canEditPricing" class="input-base py-0.5 text-xs text-right" style="width:80px;" placeholder="매입가">

                                      </div>
                                    </div>
                                  </div>
                                </div>
                              </div>
                            </template>
                          </div>
                        </div>

                            <span style="font-size:11px;font-weight:700;color:#d97706;display:flex;align-items:center;gap:4px;">
                              <span class="material-symbols-outlined" style="font-size:14px;">storefront</span> 리바트 등록상품
                              <span class="text-[10px] font-medium px-1.5 py-0.5 rounded-full" style="background:#fef3c7;color:#92400e;" x-text="(cat.livartProducts||[]).length + '개'"></span>

                                  <th style="padding:4px 6px;text-align:left;border-bottom:1px solid #fde68a;color:#92400e;font-weight:600;font-size:10px;">상품명</th>
                                  <th style="padding:4px 6px;text-align:center;border-bottom:1px solid #fde68a;color:#92400e;font-weight:600;font-size:10px;">단위</th>
                                  <th style="padding:4px 6px;text-align:right;border-bottom:1px solid #fde68a;color:#92400e;font-weight:600;font-size:10px;">공급가</th>
                                  <th style="padding:4px 6px;text-align:right;border-bottom:1px solid #fde68a;color:#92400e;font-weight:600;font-size:10px;">소비자가</th>
                                  <th style="padding:4px 6px;text-align:right;border-bottom:1px solid #fde68a;color:#92400e;font-weight:600;font-size:10px;">마진</th>
                                  <th style="padding:4px 6px;text-align:center;border-bottom:1px solid #fde68a;color:#92400e;font-weight:600;font-size:10px;">옵션</th>

                              <tbody>
                                <template x-for="(lp, li) in (cat.livartProducts||[]).filter(p => !livartSearchQ || p.productName.includes(livartSearchQ) || p.productCode.includes(livartSearchQ))" :key="li">

                                    <td style="padding:3px 6px;font-weight:500;" x-text="lp.productName"></td>
                                    <td style="padding:3px 6px;text-align:center;color:#6b7280;" x-text="lp.unit || '-'"></td>
                                    <td style="padding:3px 6px;text-align:right;color:#2563eb;font-weight:600;" x-text="(lp.supplyPrice||0).toLocaleString() + '원'"></td>
                                    <td style="padding:3px 6px;text-align:right;font-weight:600;" x-text="(lp.consumerPrice||0).toLocaleString() + '원'"></td>
                                    <td style="padding:3px 6px;text-align:right;" :style="(lp.margin||0) >= 0 ? 'color:#16a34a' : 'color:#dc2626'" x-text="(lp.margin||0).toLocaleString() + '원'"></td>
                                    <td style="padding:3px 6px;text-align:center;">
                                      <span x-show="(lp.options||[]).length > 0" class="text-[10px] px-1.5 py-0.5 rounded-full" style="background:#dbeafe;color:#2563eb;" x-text="(lp.options||[]).length + '개'"></span>
                                      <span x-show="(lp.options||[]).length === 0" style="color:#d1d5db;">-</span>
                                    </td>
                                  </tr>
                                </template>
                              </tbody>
                            </table>
                          </div>
                          <!-- 상세 보기 (펼치기) -->
                          <div x-show="livartExpanded" class="space-y-2">
                            <template x-for="(lp, li) in (cat.livartProducts||[]).filter(p => !livartSearchQ || p.productName.includes(livartSearchQ) || p.productCode.includes(livartSearchQ))" :key="li">
                              <div class="border border-amber-200 rounded-lg p-2.5 bg-white hover:shadow-sm transition-shadow">
                                <div class="flex items-start justify-between gap-3">
                                  <div class="flex-1">
                                    <div class="flex items-center gap-2 mb-1">
                                      <span class="text-[10px] font-mono px-1.5 py-0.5 rounded" style="background:#f1f5f9;color:#64748b;" x-text="lp.productCode"></span>
                                      <span class="text-xs font-semibold text-gray-800" x-text="lp.productName"></span>
                                      <span x-show="lp.unit" class="text-[10px] px-1 py-0.5 rounded" style="background:#e0f2fe;color:#0369a1;" x-text="lp.unit"></span>
                                    </div>
                                    <div x-show="lp.spec" class="text-[10px] text-gray-500 mb-1" x-text="'규격: ' + lp.spec"></div>
                                    <div class="flex items-center gap-4 text-xs">
                                      <span>공급가: <strong class="text-blue-600" x-text="(lp.supplyPrice||0).toLocaleString() + '원'"></strong></span>
                                      <span>소비자가: <strong x-text="(lp.consumerPrice||0).toLocaleString() + '원'"></strong></span>
                                      <span :style="(lp.margin||0) >= 0 ? 'color:#16a34a' : 'color:#dc2626'">마진: <strong x-text="(lp.margin||0).toLocaleString() + '원'"></strong></span>
                                    </div>
                                  </div>
                                </div>
                                <!-- 옵션 목록 -->
                                <div x-show="(lp.options||[]).length > 0" style="margin-top:6px;padding-top:6px;border-top:1px dashed #fde68a;">
                                  <div style="font-size:10px;font-weight:600;color:#92400e;margin-bottom:4px;">옵션 (사이즈별 단가)</div>
                                  <div class="flex flex-wrap gap-1">
                                    <template x-for="(opt, oi) in (lp.options||[])" :key="oi">
                                      <span class="inline-flex items-center gap-1 text-[10px] px-2 py-0.5 rounded-full" style="background:#fef9c3;color:#713f12;border:1px solid #fde68a;">
                                        <span x-text="opt.name"></span>
                                        <span class="font-semibold" x-text="'= ' + (opt.consumerPrice||0).toLocaleString() + '원'"></span>
                                      </span>
                                    </template>
                                  </div>
                                </div>
                              </div>
                            </template>
                          </div>
                        </div>

                        <!-- ③ 면적별 단가 (SIZE만) -->
                        <div x-show="cat.pricingType === 'SIZE'" style="border-top:1px solid #e9d5ff;padding-top:10px;margin-top:4px;">
                          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
                            <span style="font-size:11px;font-weight:700;color:#2563eb;display:flex;align-items:center;gap:4px;">
                              <span class="material-symbols-outlined" style="font-size:14px;">grid_view</span> 면적별 단가 (원/㎡)
                            </span>
                            <button x-show="canEditPricing" @click="addVendorTier(cat.id)" style="font-size:10px;color:#2563eb;font-weight:600;background:none;border:none;cursor:pointer;">+ 구간 추가</button>
                          </div>
                          <table class="w-full text-xs" style="border-collapse:collapse;">
                            <thead>
                              <tr style="background:#eff6ff;">
                                <th style="padding:4px 8px;text-align:left;border-bottom:1px solid #bfdbfe;color:#6b7280;font-weight:600;">최소(㎡)</th>
                                <th style="padding:4px 8px;text-align:left;border-bottom:1px solid #bfdbfe;color:#6b7280;font-weight:600;">최대(㎡)</th>
                                <th style="padding:4px 8px;text-align:right;border-bottom:1px solid #bfdbfe;color:#6b7280;font-weight:600;">단가(원/㎡)</th>
                                <th style="padding:4px 8px;border-bottom:1px solid #bfdbfe;" x-show="canEditPricing"></th>
                              </tr>
                            </thead>
                            <tbody>
                              <template x-for="(tier, ti) in getDisplayTiers(cat)" :key="ti">
                                <tr style="border-bottom:1px solid #f0f1f3;">
                                  <td style="padding:3px 6px;"><input type="number" :value="tier.areaMin||0" @change="updateVendorTier(cat.id, ti, 'areaMin', $el.value)" :disabled="!canEditPricing" class="input-base w-24 py-0.5 text-xs" placeholder="0"></td>
                                  <td style="padding:3px 6px;"><input type="number" :value="tier.areaMax" @change="updateVendorTier(cat.id, ti, 'areaMax', $el.value)" :disabled="!canEditPricing" class="input-base w-24 py-0.5 text-xs" placeholder="무제한"></td>
                                  <td style="padding:3px 6px;text-align:right;"><input type="number" :value="tier.pricePerSqm" @change="updateVendorTier(cat.id, ti, 'pricePerSqm', $el.value)" :disabled="!canEditPricing" class="input-base w-28 py-0.5 text-xs text-right" placeholder="단가"></td>
                                  <td style="padding:3px 6px;text-align:center;" x-show="canEditPricing"><button @click="removeVendorTier(cat.id, ti)" style="color:#dc2626;font-size:11px;font-weight:600;background:none;border:none;cursor:pointer;">삭제</button></td>
                                </tr>
                              </template>
                            </tbody>
                          </table>
                        </div>

                        <!-- ③ 폭별 m당 단가 (LENGTH만) -->
                        <div x-show="cat.pricingType === 'LENGTH'" style="border-top:1px solid #e9d5ff;padding-top:10px;margin-top:4px;">
                          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
                            <span style="font-size:11px;font-weight:700;color:#9333ea;display:flex;align-items:center;gap:4px;">
                              <span class="material-symbols-outlined" style="font-size:14px;">straighten</span> 폭별 m당 단가
                            </span>
                            <div style="display:flex;gap:6px;" x-show="canEditPricing">
                              <button @click="addWidthTier(cat.id)" style="font-size:10px;color:#7c3aed;font-weight:600;background:none;border:none;cursor:pointer;">+ 폭 추가</button>
                              <button @click="addWidthTierBulk(cat.id)" style="font-size:10px;color:#9ca3af;font-weight:600;background:none;border:none;cursor:pointer;">+ 300~1800 일괄</button>
                            </div>
                          </div>
                          <table class="w-full text-xs" style="border-collapse:collapse;">
                            <thead>
                              <tr style="background:#faf5ff;">
                                <th style="padding:4px 8px;text-align:left;border-bottom:1px solid #e9d5ff;color:#6b7280;font-weight:600;">폭(mm)</th>
                                <th style="padding:4px 8px;text-align:right;border-bottom:1px solid #e9d5ff;color:#6b7280;font-weight:600;">m당 단가(원)</th>
                                <th style="padding:4px 8px;border-bottom:1px solid #e9d5ff;" x-show="canEditPricing"></th>
                              </tr>
                            </thead>
                            <tbody>
                              <template x-for="(wt, wi) in getDisplayWidthTiers(cat)" :key="wi">
                                <tr style="border-bottom:1px solid #f0f1f3;">
                                  <td style="padding:3px 6px;"><input type="number" :value="wt.widthMm" @change="updateWidthTier(cat.id, wi, 'widthMm', $el.value)" :disabled="!canEditPricing" class="input-base w-28 py-0.5 text-xs" placeholder="300" step="100"></td>
                                  <td style="padding:3px 6px;text-align:right;"><input type="number" :value="wt.pricePerM" @change="updateWidthTier(cat.id, wi, 'pricePerM', $el.value)" :disabled="!canEditPricing" class="input-base w-28 py-0.5 text-xs text-right" placeholder="단가"></td>
                                  <td style="padding:3px 6px;text-align:center;" x-show="canEditPricing"><button @click="removeWidthTier(cat.id, wi)" style="color:#dc2626;font-size:11px;font-weight:600;background:none;border:none;cursor:pointer;">삭제</button></td>
                                </tr>
                              </template>
                            </tbody>
                          </table>
                        </div>

                      </div>
                    </td>
                  </tr>
                  </tbody>
                </template>
                <tbody>
                <tr x-show="filteredPricingCategories.length === 0">
                  <td colspan="8" class="px-5 py-8 text-center text-gray-400">검색 결과가 없습니다</td>
                </tr>
                </tbody>
            </table>
            </div>
          </div>
        </div>

<!-- ══ 단가 이력 모달 ══ -->
<template x-if="priceHistoryModal && priceHistoryModal.open">
  <div class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50" style="backdrop-filter:blur(3px);" @click.self="priceHistoryModal.open=false">
    <div class="bg-white rounded-2xl shadow-2xl" style="width:680px;max-width:95vw;max-height:80vh;display:flex;flex-direction:column;">
      <!-- 헤더 -->
      <div style="padding:14px 18px;background:linear-gradient(135deg,#eff6ff,#dbeafe);border-bottom:1px solid #bfdbfe;border-radius:16px 16px 0 0;display:flex;align-items:center;justify-content:space-between;">
        <div>
          <h3 style="margin:0;font-size:14px;font-weight:700;color:#1e40af;" x-text="`단가 이력 — ${priceHistoryModal.catName}`"></h3>
          <p style="margin:2px 0 0;font-size:11px;color:#6b7280;" x-text="pricingVendorId ? `업체: ${(vendors.find(v=>v.id===pricingVendorId)||{}).name||pricingVendorId}` : '기본 단가'"></p>
        </div>
        <button @click="priceHistoryModal.open=false" style="background:none;border:none;cursor:pointer;color:#6b7280;font-size:20px;">✕</button>
      </div>
      <!-- 본문 -->
      <div style="flex:1;overflow-y:auto;padding:14px 18px;">
        <div x-show="priceHistoryModal.loading" style="text-align:center;padding:30px;color:#9ca3af;">로딩 중...</div>
        <div x-show="!priceHistoryModal.loading && priceHistoryModal.logs.length === 0" style="text-align:center;padding:30px;color:#9ca3af;">변경 이력이 없습니다.</div>
        <template x-if="!priceHistoryModal.loading && priceHistoryModal.logs.length > 0">
          <table style="width:100%;border-collapse:collapse;font-size:12px;">
            <thead>
              <tr style="background:#f3f4f6;border-bottom:1px solid #e5e7eb;">
                <th style="padding:7px 10px;text-align:left;font-weight:600;color:#374151;white-space:nowrap;">변경일시</th>
                <th style="padding:7px 10px;text-align:left;font-weight:600;color:#374151;">변경자</th>
                <th style="padding:7px 10px;text-align:left;font-weight:600;color:#374151;">변경 전</th>
                <th style="padding:7px 10px;text-align:left;font-weight:600;color:#374151;">변경 후</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="log in priceHistoryModal.logs" :key="log.id">
                <tr style="border-bottom:1px solid #f3f4f6;">
                  <td style="padding:6px 10px;color:#6b7280;white-space:nowrap;" x-text="formatPriceHistoryDate(log.날짜)"></td>
                  <td style="padding:6px 10px;font-weight:600;" x-text="log.변경자"></td>
                  <td style="padding:6px 10px;font-size:11px;color:#6b7280;" x-html="formatPriceSummary(log.이전)"></td>
                  <td style="padding:6px 10px;font-size:11px;color:#1d4ed8;font-weight:600;" x-html="formatPriceSummary(log.변경후)"></td>
                </tr>
              </template>
            </tbody>
          </table>
        </template>
      </div>
      <!-- 페이지네이션 -->
      <div style="padding:10px 18px;border-top:1px solid #e5e7eb;display:flex;gap:8px;align-items:center;justify-content:space-between;">
        <span style="font-size:11px;color:#6b7280;" x-text="`총 ${priceHistoryModal.total}건`"></span>
        <div style="display:flex;gap:6px;" x-show="priceHistoryModal.total > 30">
          <button @click="loadPriceHistoryPage(priceHistoryModal.page-1)" :disabled="priceHistoryModal.page<=1" style="padding:3px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;background:#fff;cursor:pointer;" :style="priceHistoryModal.page<=1?'opacity:0.4':''">이전</button>
          <span style="font-size:12px;color:#6b7280;" x-text="`${priceHistoryModal.page} / ${Math.ceil(priceHistoryModal.total/30)||1}`"></span>
          <button @click="loadPriceHistoryPage(priceHistoryModal.page+1)" :disabled="priceHistoryModal.page>=Math.ceil(priceHistoryModal.total/30)" style="padding:3px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;background:#fff;cursor:pointer;" :style="priceHistoryModal.page>=Math.ceil(priceHistoryModal.total/30)?'opacity:0.4':''">다음</button>
        </div>
      </div>
    </div>
  </div>
</template>
