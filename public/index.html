      this.invalidateAttendanceCache(); await this.loadAttendanceSummary();
    },

    // ✓정상 확정 취소 → 자동분류로 복원
    async quickUnconfirm(emp, d) {
      await this.deleteAttendanceNote(emp.employeeName, d.date);
      this.invalidateAttendanceCache(); await this.loadAttendanceSummary();
    },

    // 정상 → 결근 즉시 처리 (테이블 행 취소 버튼)
    async quickMarkAbsent(emp, d) {
      if (!confirm(`${emp.employeeName} ${d.date} 을 결근으로 처리하시겠습니까?`)) return;
      await this.saveAttendanceNote(emp.employeeName, d.date, 'absent', '결근', '', undefined, undefined);
      this.invalidateAttendanceCache(); await this.loadAttendanceSummary();
    },

    // 출퇴근 수동 수정 저장
    async saveAttendanceNote(empName, date, leaveType, leaveLabel, note, modifiedInTime, modifiedOutTime) {
      const key = `${empName}_${date}`;
      try {
        const body = { leaveType, leaveLabel, note };
        if (modifiedInTime !== undefined) body.modifiedInTime = modifiedInTime;
        if (modifiedOutTime !== undefined) body.modifiedOutTime = modifiedOutTime;
        await fetch(`/api/attendance/notes/${encodeURIComponent(key)}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        // 모달 records 업데이트
        const r = this.attendance.detailModal.records.find(x => x.date === date);
        if (r) {
          r.leaveType = leaveType;
          r.leaveLabel = leaveLabel;
          r.note = note;
          r.manuallySet = true;
          r._editing = false;
          if (modifiedInTime !== undefined) {
            if (!r.originalInTime && r.inTime) r.originalInTime = r.inTime;
            r.inTime = modifiedInTime;
            r.modifiedInTime = modifiedInTime;
            r.timeModified = true;
          }
          if (modifiedOutTime !== undefined) {
            if (!r.originalOutTime && r.outTime) r.originalOutTime = r.outTime;
            r.outTime = modifiedOutTime;
            r.modifiedOutTime = modifiedOutTime;
            r.timeModified = true;
          }
        }
        this.showToast('수정 저장 완료', 'success');
      } catch(e) {
        this.showToast('저장 실패: ' + e.message, 'error');
      }
    },

    // 출퇴근 수동 수정 삭제 (자동분류 복원)
    async deleteAttendanceNote(empName, date) {
      const key = `${empName}_${date}`;
      try {
        await fetch(`/api/attendance/notes/${encodeURIComponent(key)}`, { method: 'DELETE' });
        // 모달이 열려 있을 때만 in-memory 업데이트 (quickUnconfirm 등 모달 없이 호출 시 skip)
        const r = this.attendance.detailModal?.records?.find(x => x.date === date);
        if (r) {
          r.manuallySet = false;
          r._editing = false;
          r.note = '';
        }
        this.showToast('수정 취소 완료 (자동분류 복원)', 'success');
        // 데이터 새로고침
        this.invalidateAttendanceCache(); await this.loadAttendanceSummary();
      } catch(e) {
        this.showToast('삭제 실패: ' + e.message, 'error');
      }
    },

    // 출퇴근 시간 수정 저장 (관리자)
    async saveAttendanceTime(empName, date, inTime, outTime) {
      const key = `${empName}_${date}`;
      try {
        await fetch(`/api/attendance/notes/${encodeURIComponent(key)}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ modifiedInTime: inTime || undefined, modifiedOutTime: outTime || undefined }),
        });
        this.showToast('시간 수정 저장 완료', 'success');
      } catch(e) {
        this.showToast('저장 실패: ' + e.message, 'error');
      }
    },

    // 출퇴근 수정 요청 (일반 사용자)
    async submitTimeRequest(date, requestedInTime, requestedOutTime, reason) {
      try {
        const r = await fetch('/api/attendance/requests', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ date, requestedInTime, requestedOutTime, reason }),
        });
        if (!r.ok) throw new Error(await r.text());
        this.showToast('수정 요청이 관리자에게 전달되었습니다', 'success');
        await this.loadAttendanceRequests();
      } catch(e) {
        this.showToast('요청 실패: ' + e.message, 'error');
      }
    },

    // 요청 목록 로드
    async loadAttendanceRequests() {
      try {
        const r = await fetch('/api/attendance/requests');
        if (r.ok) this.attendance.requests = await r.json();
      } catch(e) {}
    },

    // 요청 승인/거절 (관리자)
    async handleTimeRequest(reqId, status) {
      try {
        const r = await fetch(`/api/attendance/requests/${reqId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status }),
        });
        if (!r.ok) throw new Error(await r.text());
        this.showToast(status === 'approved' ? '승인 완료 — 시간이 반영되었습니다' : '거절 완료', 'success');
        await this.loadAttendanceRequests();
        if (status === 'approved') { this.invalidateAttendanceCache(); await this.loadAttendanceSummary(); }
      } catch(e) {
        this.showToast('처리 실패: ' + e.message, 'error');
      }
    },

    // ── 연차 관리 ──
    async loadLeaveCompare() {
      const empName = this.attendance.leaveCompare.empName;
      if (!empName) return;
      this.attendance.leaveCompare.loading = true;
      this.attendance.leaveCompare.error = '';
      this.attendance.leaveCompare.data = null;
      try {
        const r = await fetch(`/api/leave/compare?name=${encodeURIComponent(empName)}`);
        if (!r.ok) {
          const e = await r.json();
          throw new Error(e.error || '오류');
        }
        this.attendance.leaveCompare.data = await r.json();
      } catch(e) {
        this.attendance.leaveCompare.error = '비교 데이터 로드 실패: ' + e.message;
      } finally {
        this.attendance.leaveCompare.loading = false;
      }
    },

    async loadLeaveSummary() {
      this.attendance.leaveLoading = true;
      try {
        const r = await fetch(`/api/leave/summary?year=${this.attendance.leaveYear}&includeResigned=${this.attendance.showResigned}`);
        if (!r.ok) throw new Error(await r.text());
        const data = await r.json();
        this.attendance.leaveSummary = data.employees || [];
        // leaveTypes도 로드
        const r2 = await fetch('/api/leave/settings');
        if (r2.ok) {
          const s = await r2.json();
          this.attendance.leaveTypes = s.leaveTypes || [];
        }
      } catch(e) {
        this.showToast('연차 데이터 로드 실패: ' + e.message, 'error');
      } finally {
        this.attendance.leaveLoading = false;
        // 사용 내역 탭이면 자동 갱신
        if (this.attendance.leaveSubTab === 'records') this.loadLeaveRecordsList();
        if (this.attendance.leaveSubTab === 'adjustments') this.loadAdjustments();
      }
    },
    // 출퇴근 → 연차 벌크 동기화
    async syncLeaveFromAttendance() {
      // 전체현황에서 호출 시 현재 조회 중인 연/월만 동기화, 연차현황에서는 전체 연도
      const isLeaveView = this.attendance.leaveView;
      const year = isLeaveView ? this.attendance.leaveYear : Number(this.attendance.year);
      const now = new Date();

      if (isLeaveView) {
        // 연차현황: 1~현재월까지 전체 동기화
        const maxMonth = (year === now.getFullYear()) ? now.getMonth() + 1 : 12;
        if (!confirm(`${year}년 1월~${maxMonth}월 출퇴근 기록을 연차현황에 동기화합니다.\n계속하시겠습니까?`)) return;
        this.attendance._syncing = true;
        let totalAdded = 0, errors = [];
        for (let m = 1; m <= maxMonth; m++) {
          try {
            const r = await fetch('/api/leave/sync-from-attendance', {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ year, month: m })
            });
            if (r.ok) { totalAdded += (await r.json()).added; }
            else { errors.push(`${m}월: ${(await r.json()).error || '실패'}`); }
          } catch (e) { errors.push(`${m}월: ${e.message}`); }
        }
        this.attendance._syncing = false;
        if (errors.length > 0) {
          this.showToast(`동기화 완료 (${totalAdded}건). 오류: ${errors.join(', ')}`, 'warning');
        } else {
          this.showToast(`${year}년 연차 동기화 완료: ${totalAdded}건 반영`, 'success');
        }
        await this.loadLeaveSummary();
      } else {
        // 전체현황: 현재 조회 중인 연/월만 동기화
        const month = Number(this.attendance.month);
        this.attendance._syncing = true;
        try {
          const r = await fetch('/api/leave/sync-from-attendance', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ year, month })
          });
          if (r.ok) {
            const data = await r.json();
            this.showToast(`${year}년 ${month}월 동기화 완료: ${data.added}건 반영`, 'success');
          } else {
            const err = await r.json();
            this.showToast(`동기화 실패: ${err.error || '오류'}`, 'error');
          }
        } catch (e) {
          this.showToast(`동기화 오류: ${e.message}`, 'error');
        }
        this.attendance._syncing = false;
      }
    },

    // 전체 사용 내역 로드 (모든 직원의 records를 합침)
    loadLeaveRecordsList() {
      const allRecords = [];
      const empMap = {};
      for (const emp of this.attendance.leaveSummary) {
        empMap[emp.name] = emp.department || '';
        for (const rec of (emp.records || [])) {
          allRecords.push({ ...rec, _dept: emp.department || '' });
        }
      }
      // 날짜 내림차순 정렬
      allRecords.sort((a, b) => b.date.localeCompare(a.date));
      this.attendance.leaveRecordsList = allRecords;
    },

    // 필터된 사용 내역
    filteredLeaveRecords() {
      const f = this.attendance.recordsFilter;
      let list = this.attendance.leaveRecordsList;
      if (f.name) list = list.filter(r => r.employeeName === f.name);
      if (f.type) list = list.filter(r => r.leaveType === f.type);
      if (f.month) {
        const mm = String(f.month).padStart(2, '0');
        list = list.filter(r => r.date && r.date.substring(5, 7) === mm);
      }
      return list;
    },

    // ── 추가/공제 내역 ──
    async loadAdjustments() {
      try {
        const r = await fetch(`/api/leave/adjustments?year=${this.attendance.leaveYear}`);
        if (!r.ok) throw new Error(await r.text());
        this.attendance.adjustmentsList = await r.json();
      } catch(e) { this.showToast('추가/공제 내역 로드 실패: ' + e.message, 'error'); }
    },
    filteredAdjustments() {
      const f = this.attendance.adjustmentsFilter;
      let list = this.attendance.adjustmentsList;
      if (f.name) list = list.filter(a => a.employeeName === f.name);
      if (f.type) list = list.filter(a => a.type === f.type);
      return list.sort((a, b) => a.employeeName.localeCompare(b.employeeName));
    },
    async addAdjustment() {
      const m = this.attendance.adjustmentAddModal;
      if (!m.employeeName || !m.days) return this.showToast('직원과 일수를 입력하세요', 'error');
      try {
        const r = await fetch('/api/leave/adjustments', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ employeeName: m.employeeName, year: m.year, type: m.type, days: m.days, reason: m.reason })
        });
        if (!r.ok) throw new Error(await r.text());
        this.showToast('등록 완료', 'success');
        m.open = false; m.employeeName = ''; m.days = 0; m.reason = '';
        await this.loadAdjustments();
        await this.loadLeaveSummary();
      } catch(e) { this.showToast('등록 실패: ' + e.message, 'error'); }
    },
    async deleteAdjustment(id) {
      if (!confirm('이 내역을 삭제하시겠습니까?')) return;
      try {
        const r = await fetch(`/api/leave/adjustments/${id}`, { method: 'DELETE' });
        if (!r.ok) throw new Error(await r.text());
        this.showToast('삭제 완료', 'success');
        await this.loadAdjustments();
        await this.loadLeaveSummary();
      } catch(e) { this.showToast('삭제 실패: ' + e.message, 'error'); }
    },

    async addLeaveRecord() {
      const m = this.attendance.leaveAddModal;
      const startDate = m.startDate || m.date;
      const endDate = (m.endDate && m.endDate >= m.startDate) ? m.endDate : startDate;
      if (!m.employeeName || !startDate || !m.leaveType) {
        return this.showToast('직원, 날짜, 휴가유형을 입력하세요', 'error');
      }
      try {
        // 반차류는 단일 날짜만 등록
        const isHalf = m.leaveType.includes('반차');
        const dates = [];
        if (isHalf || startDate === endDate) {
          dates.push(startDate);
        } else {
          // 범위: 시작일~종료일 평일만 수집
          const cur = new Date(startDate + 'T00:00:00');
          const end = new Date(endDate + 'T00:00:00');
          while (cur <= end) {
            const dow = cur.getDay();
            if (dow !== 0 && dow !== 6) {
              const yy = cur.getFullYear();
              const mm = String(cur.getMonth() + 1).padStart(2, '0');
              const dd = String(cur.getDate()).padStart(2, '0');
              dates.push(`${yy}-${mm}-${dd}`);
            }
            cur.setDate(cur.getDate() + 1);
          }
        }
        if (dates.length === 0) return this.showToast('선택된 평일이 없습니다', 'error');
        for (const date of dates) {
          const r = await fetch('/api/leave/records', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ employeeName: m.employeeName, date, leaveType: m.leaveType, days: m.days, reason: m.reason })
          });
          if (!r.ok) throw new Error(await r.text());
        }
        this.showToast(`휴가 등록 완료 (${dates.length}일)`, 'success');
        m.open = false;
        m.employeeName = ''; m.date = ''; m.startDate = ''; m.endDate = ''; m.hoverDate = ''; m.leaveType = '연차'; m.days = 1; m.reason = '';
        await this.loadLeaveSummary();
      } catch(e) {
        this.showToast('등록 실패: ' + e.message, 'error');
      }
    },
    async deleteLeaveRecord(id) {
      if (!confirm('이 휴가 기록을 삭제하시겠습니까?')) return;
      try {
        const r = await fetch(`/api/leave/records/${id}`, { method: 'DELETE' });
        if (!r.ok) throw new Error(await r.text());
        this.showToast('삭제 완료', 'success');
        // refresh detail modal if open
        if (this.attendance.leaveDetailModal.open) {
          const empName = this.attendance.leaveDetailModal.emp.name;
          this.attendance.leaveDetailModal.records = this.attendance.leaveDetailModal.records.filter(r => r.id !== id);
        }
        await this.loadLeaveSummary();
      } catch(e) {
        this.showToast('삭제 실패: ' + e.message, 'error');
      }
    },
    openLeaveDetail(emp) {
      this.attendance.leaveDetailModal.open = true;
      this.attendance.leaveDetailModal.emp = emp;
      this.attendance.leaveDetailModal.records = emp.records || [];
    },
    async updateLeaveEmpField(empName, field, value, reload) {
      try {
        // 연도별 필드는 현재 조회 중인 연도를 함께 전달
        const payload = { [field]: value };
        const yearlyFields = ['additionalDays','deductedDays','paidDays','annualLeaveOverride'];
        if (yearlyFields.includes(field)) {
          payload._year = String(this.attendance.leaveYear);
        }
        await fetch(`/api/leave/employees/${encodeURIComponent(empName)}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        // 총연차/잔여 등이 바뀌는 필드면 서버에서 재계산
        if (reload || ['additionalDays','deductedDays','paidDays','annualLeaveOverride'].includes(field)) {
          await this.loadLeaveSummary();
        } else {
          const emp = this.attendance.leaveSummary.find(e => e.name === empName);
          if (emp) emp[field] = value;
        }
        this.showToast('저장 완료', 'success');
      } catch (e) {
        this.showToast('저장 실패: ' + e.message, 'error');
      }
    },
    printLeavePdf() {
      const area = document.getElementById('leave-print-area');
      if (!area) return this.showToast('인쇄할 데이터가 없습니다', 'error');
      // 인쇄용 헤더 표시
      const hdr = area.querySelector('.leave-print-header');
      if (hdr) hdr.style.display = 'block';
      const printWin = window.open('', '_blank');
      printWin.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>연차 현황표 ${this.attendance.leaveYear}년</title>
        <style>
          body{font-family:'Malgun Gothic',sans-serif;margin:20px;font-size:10px;color:#1e293b;}
          h2{text-align:center;font-size:16px;margin:0 0 4px;}
          p{text-align:center;font-size:11px;color:#6b7280;margin:0 0 12px;}
          table{width:100%;border-collapse:collapse;font-size:9px;}
          th{padding:4px 5px;text-align:center;font-weight:700;color:#374151;background:#f3f4f6;border:1px solid #d1d5db;font-size:8px;}
          td{padding:3px 4px;text-align:center;border:1px solid #e5e7eb;}
          tr:nth-child(even){background:#f9fafb;}
          tr:last-child{font-weight:700;background:#f3f4f6;}
          .leave-no-print{display:none!important;}
          .leave-badge{font-size:8px;font-weight:700;padding:1px 4px;border-radius:4px;}
          .leave-badge-good{background:#dcfce7;color:#16a34a;}
          .leave-badge-warn{background:#fef9c3;color:#92400e;}
          .leave-badge-danger{background:#fee2e2;color:#dc2626;}
          @page{size:landscape;margin:10mm;}
        </style></head><body>${area.innerHTML}</body></html>`);
      printWin.document.close();
      if (hdr) hdr.style.display = 'none';
      setTimeout(() => { printWin.print(); }, 300);
    },
    openLeaveAdd(empName) {
      const now = new Date();
      const m = this.attendance.leaveAddModal;
      m.open = true;
      m.employeeName = empName || '';
      m.date = now.toISOString().slice(0, 10);
      m.startDate = '';
      m.endDate = '';
      m.hoverDate = '';
      m.calYear = now.getFullYear();
      m.calMonth = now.getMonth();
      m.leaveType = '연차';
      m.days = 1;
      m.reason = '';
    },
    // ===== 연차 달력 헬퍼 =====
    leaveCalLabel() {
      const m = this.attendance.leaveAddModal;
      return m.calYear + '년 ' + (m.calMonth + 1) + '월';
    },
    leaveCalPrev() {
      const m = this.attendance.leaveAddModal;
      if (m.calMonth === 0) { m.calYear--; m.calMonth = 11; }
      else m.calMonth--;
    },
    leaveCalNext() {
      const m = this.attendance.leaveAddModal;
      if (m.calMonth === 11) { m.calYear++; m.calMonth = 0; }
      else m.calMonth++;
    },
    leaveCalCells() {
      const m = this.attendance.leaveAddModal;
      const firstDay = new Date(m.calYear, m.calMonth, 1).getDay();
      const daysInMonth = new Date(m.calYear, m.calMonth + 1, 0).getDate();
      const cells = [];
      for (let i = 0; i < firstDay; i++) cells.push({ key: 'e' + i, date: '', day: '' });
      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = m.calYear + '-' + String(m.calMonth + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
        cells.push({ key: dateStr, date: dateStr, day: d, dow: new Date(m.calYear, m.calMonth, d).getDay() });
      }
      return cells;
    },
    leaveCalCellStyle(cell) {
      if (!cell.date) return 'cursor:default;';
      const m = this.attendance.leaveAddModal;
      const { startDate, endDate, hoverDate } = m;
      const d = cell.date;
      // 호버 중 임시 종료일
      const effectiveEnd = (startDate && !endDate && hoverDate) ? hoverDate : endDate;
      const low  = (startDate && effectiveEnd) ? (startDate <= effectiveEnd ? startDate : effectiveEnd) : startDate;
      const high = (startDate && effectiveEnd) ? (startDate <= effectiveEnd ? effectiveEnd : startDate) : startDate;
      const isEdge = (d === low || d === high) && startDate;
      const inRange = startDate && effectiveEnd && d > low && d < high;
      const isWeekend = cell.dow === 0 || cell.dow === 6;
      let base = 'cursor:pointer;';
      if (isEdge) return base + 'background:#d97706;color:#fff;font-weight:700;border-radius:5px;';
      if (inRange) {
        if (isWeekend) return base + 'background:#fef3c7;color:#d1d5db;'; // 주말은 흐리게
        return base + 'background:#fef3c7;color:#b45309;';
      }
      if (isWeekend) return base + 'color:#cbd5e1;'; // 주말 기본색
      return base + 'color:#374151;';
    },
    leaveCalClick(dateStr) {
      const m = this.attendance.leaveAddModal;
      if (!m.startDate || (m.startDate && m.endDate)) {
        // 첫 번째 클릭 (또는 재선택)
        m.startDate = dateStr;
        m.endDate = '';
        m.hoverDate = '';
      } else {
        // 두 번째 클릭
        if (dateStr === m.startDate) {
          m.endDate = dateStr; // 같은 날: 1일 선택 확정
        } else if (dateStr < m.startDate) {
          m.endDate = m.startDate;
          m.startDate = dateStr;
        } else {
          m.endDate = dateStr;
        }
        m.hoverDate = '';
      }
    },
    leaveCalCountDays() {
      const m = this.attendance.leaveAddModal;
      if (!m.startDate || !m.endDate) return 0;
      const start = new Date(m.startDate + 'T00:00:00');
      const end = new Date(m.endDate + 'T00:00:00');
      let count = 0;
      const cur = new Date(start);
      while (cur <= end) {
        const dow = cur.getDay();
        if (dow !== 0 && dow !== 6) count++;
        cur.setDate(cur.getDate() + 1);
      }
      return count;
    },

    async loadAttendanceDetail() {
      const { year, month, filterEmpId } = this.attendance;
      const m = String(month).padStart(2,'0');
      const lastDay = new Date(year, month, 0).getDate();
      const from = `${year}-${m}-01`;
      const to   = `${year}-${m}-${lastDay}`;
      let url = `/api/attendance/records?from=${from}&to=${to}`;
      if (!this.canViewAllAttendance) {
        url += `&employeeId=${encodeURIComponent(this.auth.name)}`;
      } else if (filterEmpId) {
        url += `&employeeId=${encodeURIComponent(filterEmpId)}`;
      }
      try {
        const r = await fetch(url);
        if (r.ok) this.attendance.detailRecords = await r.json();
      } catch(e) {}
    },

    async openAttendanceDetail(emp) {
      const { year, month } = this.attendance;
      const lastDay = new Date(year, month, 0).getDate();
      const m = String(month).padStart(2, '0');

      // 실제 기록을 날짜 → record 맵으로 변환
      const recordMap = {};
      for (const r of (emp.records || [])) {
        recordMap[r.date] = r;
      }

      // 해당 월의 모든 날짜 생성 (주말 포함)
      const allDays = [];
      for (let d = 1; d <= lastDay; d++) {
        const dateStr = `${year}-${m}-${String(d).padStart(2,'0')}`;
        const date = new Date(dateStr + 'T00:00:00');
        const dayOfWeek = date.getDay(); // 0=일, 6=토
        const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
        const rec = recordMap[dateStr];
        if (rec) {
          allDays.push({ ...rec, isWeekend, dayOfWeek, _editing: false, _newType: rec.leaveType, _newLabel: rec.leaveLabel, _newNote: rec.note || '' });
        } else {
          allDays.push({
            date: dateStr,
            inTime: null, outTime: null,
            leaveType: isWeekend ? 'weekend' : 'nodata',
            leaveLabel: isWeekend ? (dayOfWeek === 0 ? '일요일' : '토요일') : '',
            late: false, lateMinutes: 0, overtime: 0, overtimeLabel: '',
            isWeekend, dayOfWeek, _editing: false, _newType: 'nodata', _newLabel: '', _newNote: '',
          });
        }
      }

      this.attendance.detailModal = {
        open: true,
        name: emp.employeeName,
        emp,
        records: allDays,
      };
    },

    // 그리드 셀 정보 계산
    gridCellInfo(rec, dayOfWeek) {
      const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
      const DAY_NAMES = ['일','월','화','수','목','금','토'];
      // 빈 셀
      if (!rec) {
        return {
          type: isWeekend ? 'weekend' : 'empty',
          bg: dayOfWeek===0 ? 'background:#fff5f5;' : dayOfWeek===6 ? 'background:#eff6ff;' : '',
          text: isWeekend ? DAY_NAMES[dayOfWeek] : '—',
          textStyle: dayOfWeek===0 ? 'color:#fca5a5;font-weight:700;font-size:12px;' : dayOfWeek===6 ? 'color:#93c5fd;font-weight:700;font-size:12px;' : 'color:#d1d5db;font-size:11px;',
        };
      }
      // 배경색 결정
      let bg = '';
      const outMin = rec.outTime ? (parseInt(rec.outTime.split(':')[0])*60 + parseInt(rec.outTime.split(':')[1])) : null;
      const isEarlyLeave = outMin && outMin < 17*60 && rec.leaveType === 'normal';
      if (isWeekend)                                   bg = dayOfWeek===0 ? 'background:#fff5f5;' : 'background:#eff6ff;';
      else if (rec.leaveType === 'annual')             bg = 'background:#fef9c3;';
      else if (rec.leaveType === 'halfAM' || rec.leaveType === 'halfPM') bg = 'background:#dbeafe;';
      else if (rec.leaveType === 'noswipe')            bg = 'background:#fff7ed;';
      else if (rec.late)                               bg = 'background:#fee2e2;';
      else if (isEarlyLeave)                           bg = 'background:#eff6ff;';
      // 타입 분류
      const isBadgeType = rec.leaveType === 'annual' || rec.leaveType === 'halfAM' || rec.leaveType === 'halfPM';
      return {
        type: isBadgeType ? 'badge' : 'data',
        bg,
        text: rec.leaveLabel,
        badgeStyle: this.leaveTypeStyle(rec.leaveType),
        inTime: rec.inTime,
        outTime: rec.outTime,
        inStyle: rec.late ? 'color:#dc2626;font-weight:700;' : 'color:#1e293b;',
        outStyle: isEarlyLeave ? 'color:#2563eb;font-weight:700;' : 'color:#64748b;',
        isNoswipe: rec.leaveType === 'noswipe',
        note: rec.note || '',
        manuallySet: rec.manuallySet || false,
      };
    },

    // 날짜 포맷 "YYYY-MM-DD" → "3/5 (수)"
    formatDate(d) {
      if (!d) return '';
      const date = new Date(d + 'T00:00:00');
      const days = ['일','월','화','수','목','금','토'];
      return `${date.getMonth()+1}/${date.getDate()} (${days[date.getDay()]})`;
    },

    // 분 → 소수점 시간 (1시간=1.00, 30분=0.50)
    fmtOvertime(min) {
      if (!min || min <= 0) return '0.00';
      return (Math.round((min / 60) * 100) / 100).toFixed(2);
    },

    // 구분 칩 스타일
    leaveTypeStyle(type) {
      if (type === 'normal')  return 'background:#dcfce7;color:#16a34a;';
      if (type === 'halfAM')  return 'background:#dbeafe;color:#0284c7;';
      if (type === 'halfPM')  return 'background:#dbeafe;color:#0284c7;';
      if (type === 'annual')  return 'background:#fef3c7;color:#d97706;';
      if (type === 'noswipe') return 'background:#fff7ed;color:#ea580c;';
      if (type === 'weekend') return 'background:#f3f4f6;color:#9ca3af;';
      if (type === 'nodata')  return 'background:#f9fafb;color:#d1d5db;';
      return 'background:#f3f4f6;color:#6b7280;';
    },

  };
}
</script>
</body>
</html>
