<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대림에스엠ERP</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            charcoal: '#2a3439',
            'charcoal-light': '#3d4652',
            'slate-light': '#5a6b7d',
            'slate-lighter': '#8b9aaa',
            'ochre-light': '#fdf6ed',
            'ochre': '#f4e4c1'
          },
          fontFamily: {
            'work': ['Work Sans', 'sans-serif'],
            'inter': ['Inter', 'sans-serif'],
            'label': ['Public Sans', 'sans-serif']
          }
        }
      }
    }
  </script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Public+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Material Symbols Outlined -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <!-- 별도 파일 컴포넌트 -->
  <script src="/contacts.js"></script>
  <script src="/approval.js"></script>
  <script src="/orgchart.js"></script>
  <!-- Alpine.js -->
  <script src="https://unpkg.com/@alpinejs/collapse@3.x.x/dist/cdn.min.js" defer></script>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>

  <style>
    [x-cloak] { display: none !important; }
    *, *::before, *::after { box-sizing: border-box; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    :root {
      --sidebar-w: 200px;
      --header-h: 44px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #eef1f6;
      color: #1a1d23;
      font-size: 12.5px;
      line-height: 1.5;
      margin: 0;
    }
    h1,h2,h3,h4 { font-family: 'Work Sans', sans-serif; letter-spacing: -0.02em; }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      font-size: 17px; display: inline-flex; align-items: center; justify-content: center;
    }

    /* ── Buttons ── */
    .btn-primary {
      background: linear-gradient(135deg, #4f6ef7 0%, #3b5ce4 100%);
      color: #fff; padding: 5px 14px; border: none; border-radius: 6px;
      font-weight: 600; font-size: 12px; cursor: pointer;
      transition: all .2s cubic-bezier(.4,0,.2,1);
      display: inline-flex; align-items: center; gap: 6px;
      box-shadow: 0 2px 8px rgba(59,92,228,.28), inset 0 1px 0 rgba(255,255,255,.18);
      text-shadow: 0 1px 1px rgba(0,0,0,.12);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(59,92,228,.35), inset 0 1px 0 rgba(255,255,255,.18); filter: brightness(1.06); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: .45; cursor: not-allowed; transform: none; filter: none; }

    .btn-secondary {
      background: #3d4654; color: #fff; padding: 5px 14px; border: none; border-radius: 6px;
      font-weight: 600; font-size: 12px; cursor: pointer; transition: all .18s; display: inline-flex; align-items: center; gap: 5px;
    }
    .btn-secondary:hover { background: #2d3442; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.12); }
    .btn-secondary:active { transform: translateY(0); }

    .btn-ghost {
      background: #fff; border: 1px solid #dce0e8; color: #4b5563; padding: 5px 14px; border-radius: 6px;
      font-weight: 600; font-size: 12px; cursor: pointer; transition: all .18s; display: inline-flex; align-items: center; gap: 5px;
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
    }
    .btn-ghost:hover { background: #f7f8fa; border-color: #c5cad4; box-shadow: 0 2px 6px rgba(0,0,0,.06); }

    .btn-danger { color: #dc2626; font-weight: 600; font-size: 12px; cursor: pointer; background: none; border: none; padding: 4px 8px; border-radius: 6px; transition: all .15s; }
    .btn-danger:hover { background: #fef2f2; color: #b91c1c; }
    .btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 6px; }

    /* ── Inputs ── */
    .input-base {
      width: 100%; padding: 6px 10px;
      border: 1.5px solid #dce0e8; color: #1a1d23; font-size: 12px;
      background: #fff; border-radius: 6px; transition: all .18s; box-sizing: border-box;
    }
    .input-base:focus { outline: none; border-color: #6582f7; box-shadow: 0 0 0 3px rgba(101,130,247,.12); }
    .input-base::placeholder { color: #b0b8c4; }
    select.input-base { cursor: pointer; appearance: auto; }
    .input-base:disabled { background: #f5f6f8; color: #a0a8b4; cursor: not-allowed; }
    textarea.input-base { resize: vertical; min-height: 80px; }

    /* ── Labels ── */
    .label-base { font-size: 11px; color: #6b7280; font-weight: 600; display: block; margin-bottom: 3px; }

    /* ── Tables ── */
    .table-header {
      font-size: 10px; color: #8b95a5; font-weight: 700;
      background: linear-gradient(180deg, #f8f9fb 0%, #f2f4f7 100%);
      border-bottom: 1.5px solid #e0e4eb; text-transform: uppercase; letter-spacing: 0.06em;
    }

    /* ── Cards ── */
    .card {
      background: #fff; border-radius: 10px;
      border: 1px solid #e2e6ee;
      box-shadow: 0 1px 3px rgba(0,0,0,.04), 0 0 0 0 transparent;
      padding: 14px; transition: box-shadow .2s, border-color .2s;
    }
    .card:hover { box-shadow: 0 2px 10px rgba(0,0,0,.05); border-color: #d4d9e3; }

    /* ── Animations ── */
    .fade-in { animation: fadeIn .3s cubic-bezier(.4,0,.2,1); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
    .slide-down { animation: slideDown .2s ease; }
    .tab-active { border-bottom: 2px solid #4f6ef7; color: #1a1d23; font-weight: 600; }
    .tab-inactive { border-bottom: 2px solid transparent; color: #9ca3af; }
    .tab-inactive:hover { color: #4b5563; }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w); position: fixed; top: 0; left: 0; bottom: 0; z-index: 40;
      background: linear-gradient(195deg, #1a2236 0%, #0f172a 100%);
      display: flex; flex-direction: column; overflow-y: auto;
      box-shadow: 4px 0 24px rgba(0,0,0,.15);
    }
    .sidebar-nav-item {
      display: flex; align-items: center; gap: 9px; padding: 7px 12px;
      font-size: 12px; color: rgba(255,255,255,.55); border-radius: 7px; margin: 1px 8px;
      transition: all .18s; text-decoration: none; font-weight: 500; position: relative;
      letter-spacing: 0.01em;
    }
    .sidebar-nav-item:hover { background: rgba(255,255,255,.08); color: rgba(255,255,255,.85); }
    .sidebar-nav-item.active {
      background: rgba(79,110,247,.2); color: #8fabff; font-weight: 600;
      box-shadow: 0 0 12px rgba(79,110,247,.12);
    }
    .sidebar-nav-item.active::before {
      content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
      width: 3px; height: 20px; background: #6582f7; border-radius: 0 3px 3px 0;
    }
    .sidebar-nav-item .material-symbols-outlined { font-size: 17px; opacity: .65; }
    .sidebar-nav-item:hover .material-symbols-outlined { opacity: .85; }
    .sidebar-nav-item.active .material-symbols-outlined { opacity: 1; color: #8fabff; }

    /* ── Toast ── */
    .toast-container { position: fixed; top: 16px; right: 16px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast {
      padding: 11px 20px; border-radius: 10px; font-size: 13px; font-weight: 500;
      box-shadow: 0 8px 32px rgba(0,0,0,.18); animation: slideInRight .3s ease;
      display: flex; align-items: center; gap: 8px; max-width: 360px; backdrop-filter: blur(12px);
    }
    .toast-success { background: linear-gradient(135deg, #059669, #10b981); color: #fff; }
    .toast-error { background: linear-gradient(135deg, #dc2626, #ef4444); color: #fff; }
    .toast-info { background: linear-gradient(135deg, #4f6ef7, #3b5ce4); color: #fff; }
    @keyframes slideInRight { from { opacity: 0; transform: translateX(80px); } to { opacity: 1; transform: none; } }

    /* ── Empty State ── */
    .empty-state { text-align: center; padding: 28px 16px; color: #94a3b8; }
    .empty-state .material-symbols-outlined { font-size: 36px; margin-bottom: 8px; color: #d0d5de; }
    .empty-state p { font-size: 12px; margin-top: 3px; }

    /* ── Section Title ── */
    .section-title {
      font-family: 'Work Sans', sans-serif; font-size: 13px; font-weight: 700; color: #1a1d23;
      display: flex; align-items: center; gap: 6px; margin-bottom: 12px;
    }
    .section-title .material-symbols-outlined { font-size: 17px; color: #4f6ef7; }

    /* ── Badge ── */
    .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: .01em; white-space: nowrap; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #c8cdd6; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #a3aab5; }

    /* ── Login ── */
    .login-bg {
      background: linear-gradient(160deg, #0a0f1f 0%, #111827 40%, #1a2544 100%);
      min-height: 100vh;
    }

    /* ── Stat Cards ── */
    .stat-card {
      padding: 10px 14px; border-radius: 8px; border: 1px solid #e2e6ee; background: #fff;
      box-shadow: 0 1px 3px rgba(0,0,0,.04);
    }
    .stat-card .stat-label { font-size: 10px; font-weight: 700; color: #8b95a5; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
    .stat-card .stat-value { font-size: 16px; font-weight: 700; color: #1a1d23; font-family: 'Work Sans', sans-serif; }

    .divider { height: 1px; background: rgba(255,255,255,.06); margin: 0 16px; }

    /* ── Content scroll ── */
    .main-scroll::-webkit-scrollbar-track { background: #eef1f6; }

    /* ════ 이카운트 스타일 팝업 ════ */
    .ec-popup-backdrop {
      position: fixed; inset: 0; z-index: 900;
      background: rgba(0,0,0,.3);
    }
    .ec-popup {
      position: fixed; z-index: 901;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 12px 48px rgba(0,0,0,.35), 0 0 0 1px rgba(0,0,0,.1);
      display: flex; flex-direction: column;
      overflow: hidden;
      min-width: 700px;
      max-height: 90vh;
    }
    .ec-popup.sm { min-width: 480px; max-width: 580px; }
    .ec-popup.lg { min-width: 660px; max-width: 800px; }
    .ec-popup-title {
      background: linear-gradient(135deg, #1e2d40 0%, #162032 100%);
      color: #e8eef5;
      padding: 9px 14px;
      display: flex; align-items: center; gap: 8px;
      cursor: grab; user-select: none; flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .ec-popup-title:active { cursor: grabbing; }
    .ec-popup-title-icon {
      width: 24px; height: 24px; border-radius: 5px;
      background: rgba(79,110,247,.35);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .ec-popup-ctrl-btn {
      width: 24px; height: 24px; border-radius: 5px; border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all .15s; background: rgba(255,255,255,.1); color: #c8d4e0;
    }
    .ec-popup-ctrl-btn:hover { background: rgba(255,255,255,.18); color: #fff; }
    .ec-popup-ctrl-btn.close:hover { background: rgba(220,38,38,.7); color: #fff; }
    .ec-popup-body {
      overflow-y: auto; flex: 1;
      padding: 14px 16px;
      background: #f2f4f8;
    }
    .ec-popup-footer {
      padding: 9px 16px;
      background: #fff;
      border-top: 1px solid #e5e7eb;
      display: flex; align-items: center; gap: 8px;
      flex-shrink: 0;
    }
    /* 인라인 탭바 (팝업 내부 탭) */
    .ec-tab-bar {
      display: flex; gap: 2px; margin-bottom: 12px;
      background: #e9ecf0; border-radius: 7px; padding: 3px;
    }
    .ec-tab-btn {
      flex: 1; padding: 5px 10px; border: none; background: transparent;
      border-radius: 5px; font-size: 12px; font-weight: 600; color: #6b7280;
      cursor: pointer; transition: all .15s;
    }
    .ec-tab-btn.active { background: #fff; color: #1a1d23; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
    .ec-tab-btn:hover:not(.active) { color: #374151; }
  </style>
</head>
<body x-data="app()" x-init="init()" x-cloak>

<!-- ═══ TOAST CONTAINER ═══ -->
<div class="toast-container" x-show="toasts.length > 0">
  <template x-for="(t, ti) in toasts" :key="ti">
    <div class="toast" :class="'toast-' + t.type" x-text="t.msg"></div>
  </template>
</div>

<!-- ═══ 시안 이미지 미리보기 모달 ═══ -->
<div x-show="quoteImagePreview" @click="quoteImagePreview = ''"
  class="fixed inset-0 z-[100] bg-black/70 flex items-center justify-center cursor-pointer" style="backdrop-filter:blur(4px);">
  <img :src="quoteImagePreview" class="max-w-[90vw] max-h-[85vh] rounded-xl shadow-2xl object-contain">
  <button @click="quoteImagePreview = ''" class="absolute top-6 right-6 text-white bg-black/50 rounded-full w-10 h-10 flex items-center justify-center hover:bg-black/70 transition-colors">
    <span class="material-symbols-outlined">close</span>
  </button>
</div>

<!-- ════════════════════════════════════════════
     이카운트 스타일 팝업 ① : 견적 작성 / 수정
     ════════════════════════════════════════════ -->
<template x-if="quotePopup.open">
  <!-- 반투명 배경 -->
  <div class="ec-popup-backdrop" @click.self="quotePopup.open=false"
       @mousemove.window="onPopupDrag(quotePopup, $event)"
       @mouseup.window="quotePopup.dragging=false"
       style="cursor:default;"></div>
</template>

<template x-if="quotePopup.open">
  <div class="ec-popup"
       :style="`left:${quotePopup.x}px; top:${quotePopup.y}px; width:${quotePopup.minimized ? '340px' : '920px'}; max-width:95vw;`"
       @mousemove.window="onPopupDrag(quotePopup, $event)"
       @mouseup.window="quotePopup.dragging=false">

    <!-- 타이틀바 -->
    <div class="ec-popup-title" style="justify-content:space-between;"
         @mousedown="startPopupDrag(quotePopup, $event)">
      <div class="flex items-center gap-2">
        <div class="ec-popup-title-icon">
          <span class="material-symbols-outlined" style="font-size:14px;color:#8fabff;">edit_note</span>
        </div>
        <span style="font-size:13px;font-weight:700;letter-spacing:.01em;"
              x-text="editingQuoteId ? '견적 수정' : '새 견적 작성'"></span>
        <span x-show="quoteHeader.siteName" class="text-[11px] font-normal" style="color:rgba(255,255,255,.45);" x-text="'— ' + quoteHeader.siteName"></span>
      </div>
      <div class="flex items-center gap-1.5">
        <button class="ec-popup-ctrl-btn" @click.stop="quotePopup.minimized = !quotePopup.minimized" title="최소화">
          <span class="material-symbols-outlined" style="font-size:14px;" x-text="quotePopup.minimized ? 'add' : 'remove'"></span>
        </button>
        <button class="ec-popup-ctrl-btn close" @click.stop="quotePopup.open=false" title="닫기">
          <span class="material-symbols-outlined" style="font-size:14px;">close</span>
        </button>
      </div>
    </div>

    <!-- 본문 (최소화 시 숨김) -->
    <template x-if="!quotePopup.minimized">
      <div class="ec-popup-body" style="max-height:calc(90vh - 100px);padding:0;">
        <!-- ── 탭 전환 바 ── -->
        <div style="display:flex;border-bottom:2px solid #e5e7eb;background:#fff;padding:0 16px;position:sticky;top:0;z-index:10;">
          <button @click.stop="quotePopup.tab='form'"
            style="padding:9px 18px;font-size:12px;font-weight:600;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;display:flex;align-items:center;gap:5px;"
            :style="quotePopup.tab==='form' ? 'color:#4f6ef7;border-bottom-color:#4f6ef7;' : 'color:#9ca3af;'">
            <span class="material-symbols-outlined" style="font-size:14px;">edit_note</span> 입력
          </button>
          <button @click.stop="quotePopup.tab='preview'; $nextTick(()=>refreshQuotePreview())"
            style="padding:9px 18px;font-size:12px;font-weight:600;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;display:flex;align-items:center;gap:5px;"
            :style="quotePopup.tab==='preview' ? 'color:#4f6ef7;border-bottom-color:#4f6ef7;' : 'color:#9ca3af;'">
            <span class="material-symbols-outlined" style="font-size:14px;">preview</span> 미리보기
          </button>
          <!-- 미리보기 탭에서 새로고침 버튼 -->
          <template x-if="quotePopup.tab==='preview'">
            <button @click.stop="refreshQuotePreview()"
              style="margin-left:auto;padding:6px 12px;font-size:11px;font-weight:600;border:1px solid #e5e7eb;background:#f9fafb;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:4px;color:#6b7280;align-self:center;">
              <span class="material-symbols-outlined" style="font-size:13px;">refresh</span> 새로고침
            </button>
          </template>
        </div>

        <!-- ── 입력 탭 ── -->
        <div x-show="quotePopup.tab === 'form'" style="padding:14px 16px;">
        <div class="space-y-4">

          <!-- ─ 견적 정보 ─ -->
          <div class="card" style="padding:0;overflow:hidden;">
            <div style="padding:8px 14px;background:linear-gradient(135deg,#f8faff,#f0f4ff);border-bottom:1px solid #e5eaf4;">
              <h3 class="section-title" style="margin-bottom:0;font-size:13px;">
                <span class="material-symbols-outlined" style="font-size:16px;">info</span> 견적 정보
              </h3>
            </div>
            <div style="padding:10px 14px;">
              <div class="grid grid-cols-3 gap-3">
                <div class="col-span-2">
                  <label class="label-base">현장명</label>
                  <input x-model="quoteHeader.siteName" class="input-base" placeholder="현장명 입력">
                </div>
                <div>
                  <label class="label-base">견적일</label>
                  <input type="date" x-model="quoteHeader.quoteDate" class="input-base">
                </div>
                <div>
                  <label class="label-base">견적명</label>
                  <input x-model="quoteHeader.quoteName" class="input-base" placeholder="견적명 입력">
                </div>
                <div>
                  <label class="label-base">현장담당자</label>
                  <input x-model="quoteHeader.manager" class="input-base" placeholder="현장 담당자명">
                </div>
                <div>
                  <label class="label-base">업체</label>
                  <select x-model="quoteHeader.vendorId" @change="onVendorSelect()" class="input-base">
                    <option value="">선택...</option>
                    <template x-for="v in vendors" :key="v.id">
                      <option :value="v.id" x-text="v.name"></option>
                    </template>
                  </select>
                </div>
              </div>
            </div>
          </div>

          <!-- ─ 항목 추가 ─ -->
          <div class="card" style="padding:0;overflow:hidden;">
            <div style="padding:8px 14px;background:linear-gradient(135deg,#f5f9f5,#eef6ee);border-bottom:1px solid #dce8dc;">
              <h3 class="section-title" style="margin-bottom:0;font-size:13px;">
                <span class="material-symbols-outlined" style="font-size:16px;color:#16a34a;">add_circle</span> 항목 추가
              </h3>
            </div>
            <div style="padding:10px 14px;">
              <div class="space-y-3 mb-4">
                <div class="grid grid-cols-3 gap-3">
                  <div class="relative">
                    <label class="label-base">카테고리</label>
                    <input type="text" x-model="catSearch"
                      @focus="catOpen = true; catHighlight = -1"
                      @click="catOpen = true"
                      @input="catOpen = true; catHighlight = 0"
                      @keydown.escape="catOpen = false"
                      @keydown.arrow-down.prevent="
                        const list = filteredCategories;
                        if(!catOpen) { catOpen = true; catHighlight = 0; }
                        else if(catHighlight < list.length - 1) { catHighlight++; }
                        $nextTick(() => { const el = $el.parentElement.querySelector('.cat-hl'); if(el) el.scrollIntoView({block:'nearest'}); });
                      "
                      @keydown.arrow-up.prevent="
                        if(catHighlight > 0) { catHighlight--; }
                        $nextTick(() => { const el = $el.parentElement.querySelector('.cat-hl'); if(el) el.scrollIntoView({block:'nearest'}); });
                      "
                      @keydown.enter.prevent="
                        const list = filteredCategories;
                        if(catHighlight >= 0 && catHighlight < list.length) {
                          newItem.categoryId = list[catHighlight].id; catSearch = list[catHighlight].name; catOpen = false; onCategoryChange();
                        } else if(list.length === 1) {
                          newItem.categoryId = list[0].id; catSearch = list[0].name; catOpen = false; onCategoryChange();
                        }
                      "
                      @keydown.tab="catOpen = false"
                      :placeholder="newItem.categoryId ? '' : '품목 검색...'"
                      class="input-base"
                      autocomplete="off">
                    <div x-show="catOpen"
                      @click.outside="catOpen = false"
                      class="absolute z-50 left-0 right-0 mt-1 bg-white border border-gray-200 rounded-xl shadow-lg max-h-60 overflow-y-auto">
                      <template x-for="(c, ci) in filteredCategories" :key="c.id">
                        <div @click="newItem.categoryId = c.id; catSearch = c.name; catOpen = false; onCategoryChange();"
                          @mouseenter="catHighlight = ci"
                          class="px-4 py-2.5 cursor-pointer text-sm text-gray-700 transition-colors"
                          :class="{
                            'bg-blue-100 font-semibold text-blue-700 cat-hl': catHighlight === ci,
                            'bg-blue-50 font-semibold text-blue-700': catHighlight !== ci && newItem.categoryId === c.id,
                            'hover:bg-gray-50': catHighlight !== ci && newItem.categoryId !== c.id
                          }"
                          x-text="c.name"></div>
                      </template>
                      <div x-show="filteredCategories.length === 0"
                        class="px-4 py-3 text-sm text-gray-400 text-center">검색 결과 없음</div>
                    </div>
                  </div>
                  <div>
                    <label class="label-base">수량</label>
                    <input type="number" x-model="newItem.qty" @change="debouncePreview()" class="input-base" placeholder="수량">
                  </div>
                </div>
                <!-- 사양 선택 -->
                <div x-show="newItem.categoryId && getCatPurchaseSpecs(newItem.categoryId).length > 0">
                  <label class="label-base">사양 선택</label>
                  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2 mt-1">
                    <template x-for="(spec, si) in getCatPurchaseSpecs(newItem.categoryId)" :key="si">
                      <div @click="newItem.selectedSpecIdx = si"
                        class="border rounded-xl p-3 cursor-pointer transition-all flex gap-3"
                        :class="newItem.selectedSpecIdx === si ? 'border-blue-500 bg-blue-50 ring-2 ring-blue-200' : 'border-gray-200 hover:border-gray-400'">
                        <div x-show="spec.image" class="flex-shrink-0 w-14 h-14 rounded-lg overflow-hidden border border-gray-200 bg-gray-50">
                          <img :src="spec.image" class="w-full h-full object-contain">
                        </div>
                        <div x-show="!spec.image" class="flex-shrink-0 w-14 h-14 rounded-lg border border-dashed border-gray-300 bg-gray-50 flex items-center justify-center">
                          <span class="material-symbols-outlined text-gray-300" style="font-size:18px;">image</span>
                        </div>
                        <div class="flex-1 min-w-0">
                          <p class="text-sm font-semibold text-gray-800 truncate" x-text="spec.specName || '(이름 없음)'"></p>
                          <template x-if="getSpecQuotes(spec).length > 0">
                            <div>
                              <p class="text-xs text-gray-500" x-text="getSpecQuotes(spec).length + '개 매입견적'"></p>
                              <p class="text-xs font-semibold text-green-600" x-show="getLowestQuote(spec)" x-text="'최저 ' + (getLowestQuote(spec)?.purchasePrice||0).toLocaleString() + '원 (' + (getLowestQuote(spec)?.supplier||'') + ')'"></p>
                            </div>
                          </template>
                          <template x-if="getSpecQuotes(spec).length === 0">
                            <p class="text-xs text-gray-400">매입견적 없음</p>
                          </template>
                        </div>
                      </div>
                    </template>
                  </div>
                </div>
                <!-- SIZE 타입 -->
                <div x-show="selectedCatType === 'SIZE'" class="grid grid-cols-2 gap-3">
                  <div>
                    <label class="label-base">가로 (mm)</label>
                    <input type="number" x-model="newItem.widthMm" @change="debouncePreview()" class="input-base" placeholder="가로">
                  </div>
                  <div>
                    <label class="label-base">세로 (mm)</label>
                    <input type="number" x-model="newItem.heightMm" @change="debouncePreview()" class="input-base" placeholder="세로">
                  </div>
                </div>
                <!-- LENGTH 타입 -->
                <div x-show="selectedCatType === 'LENGTH'" class="grid grid-cols-2 gap-3">
                  <div>
                    <label class="label-base">폭 (mm)</label>
                    <input type="number" x-model="newItem.widthMm" @change="debouncePreview()" class="input-base" placeholder="폭 (예: 1000)">
                  </div>
                  <div>
                    <label class="label-base">길이 (mm)</label>
                    <input type="number" x-model="newItem.heightMm" @change="debouncePreview()" class="input-base" placeholder="길이 (예: 3000)">
                  </div>
                </div>
                <!-- QTY/FIXED 타입 -->
                <div x-show="selectedCatType !== 'SIZE' && selectedCatType !== 'LENGTH'" class="grid grid-cols-2 gap-3">
                  <div>
                    <label class="label-base">상품명</label>
                    <input x-model="newItem.customName" class="input-base" placeholder="상품명">
                  </div>
                  <div>
                    <label class="label-base">규격</label>
                    <input x-model="newItem.customSpec" class="input-base" placeholder="규격">
                  </div>
                </div>
              </div>

              <!-- 옵션 -->
              <div x-show="availableOptions.length > 0" class="mb-4 p-3 bg-gray-50 rounded-lg border border-gray-200">
                <label class="label-base mb-2">옵션</label>
                <div class="space-y-2">
                  <template x-for="opt in availableOptions" :key="opt.id">
                    <div class="flex flex-wrap items-center gap-2">
                      <input type="checkbox" :id="'popu_opt_' + opt.id" :value="opt.id" x-model="newItem.selectedOptions" @change="debouncePreview()" class="w-4 h-4 cursor-pointer">
                      <label :for="'popu_opt_' + opt.id" class="cursor-pointer">
                        <span class="text-sm text-gray-800 font-medium" x-text="opt.name"></span>
                        <span x-show="(opt.pricingType||'fixed')==='fixed'" class="text-xs text-gray-400" x-text="'(' + (opt.price||0).toLocaleString() + '원/' + opt.unit + ')'"></span>
                        <span x-show="opt.pricingType==='perSqm'" class="text-xs text-blue-500" x-text="'(' + (opt.price||0).toLocaleString() + '원/㎡)'"></span>
                        <span x-show="opt.pricingType==='variants'" class="text-xs text-amber-600">(규격선택)</span>
                      </label>
                      <select x-show="newItem.selectedOptions.includes(opt.id) && opt.pricingType==='variants'"
                        :value="getOptionVariant(opt.id)" @change="setOptionVariant(opt.id, $el.value); debouncePreview()"
                        class="input-base w-36 py-1 text-xs">
                        <template x-for="(v, vi) in (opt.variants||[])" :key="vi">
                          <option :value="vi" x-text="v.label + ' (' + Number(v.price).toLocaleString() + '원)'"></option>
                        </template>
                      </select>
                      <input x-show="newItem.selectedOptions.includes(opt.id)" type="number" :value="getOptionQty(opt.id)" @change="setOptionQty(opt.id, $el.value)" class="input-base w-16 py-1 text-xs" placeholder="수량">
                    </div>
                  </template>
                </div>
              </div>

              <!-- 계산 미리보기 -->
              <div x-show="Object.keys(calcPreview).length > 0" class="p-3 rounded-lg border border-blue-200 mb-3" style="background:linear-gradient(135deg,#f8fbff,#eff6ff);">
                <div class="grid grid-cols-3 gap-3 text-sm">
                  <div>
                    <p class="text-[10px] text-blue-400 font-semibold mb-1" x-text="selectedCatType === 'LENGTH' ? '길이 / 적용폭' : '면적'"></p>
                    <p class="text-sm font-bold text-gray-800" x-text="selectedCatType === 'LENGTH' ? ((calcPreview.lengthM||0)+'m / '+(calcPreview.widthTierLabel||'-')) : (calcPreview.sqm || '-')"></p>
                  </div>
                  <div>
                    <p class="text-[10px] text-blue-400 font-semibold mb-1" x-text="selectedCatType === 'LENGTH' ? 'm당 단가' : '단가'"></p>
                    <p class="text-sm font-bold text-gray-800" x-text="selectedCatType === 'LENGTH' ? ((calcPreview.pricePerM||0).toLocaleString()+' 원/m') : ((calcPreview.unitPrice || 0).toLocaleString() + ' 원')"></p>
                  </div>
                  <div>
                    <p class="text-[10px] text-blue-400 font-semibold mb-1">합계 (세전)</p>
                    <p class="text-sm font-bold text-blue-700" x-text="(calcPreview.totalExVat || 0).toLocaleString() + ' 원'"></p>
                  </div>
                </div>
              </div>

              <button @click="addQuoteItem()" class="btn-primary btn-sm">
                <span class="material-symbols-outlined" style="font-size:15px;">add</span> 항목 추가
              </button>
            </div>
          </div>

          <!-- ─ 견적 항목 테이블 ─ -->
          <div x-show="quoteItems.length > 0" class="card overflow-x-auto" style="padding:0;">
            <div style="padding:8px 14px;background:linear-gradient(135deg,#faf8ff,#f3f0ff);border-bottom:1px solid #e5e0f0;">
              <h3 class="section-title" style="margin-bottom:0;font-size:13px;">
                <span class="material-symbols-outlined" style="font-size:16px;color:#7c3aed;">list_alt</span> 견적 항목
                <span class="text-xs font-medium px-2 py-0.5 rounded-full ml-1" style="background:rgba(124,58,237,.1);color:#7c3aed;" x-text="quoteItems.length+'건'"></span>
              </h3>
            </div>
            <div style="padding:8px 14px;">
              <table class="w-full text-xs">
                <thead>
                  <tr class="table-header">
                    <th class="px-2 py-2 text-center" style="width:44px;">시안</th>
                    <th class="px-2 py-2 text-left">항목명</th>
                    <th class="px-2 py-2 text-left">규격</th>
                    <th class="px-2 py-2 text-right">수량</th>
                    <th class="px-2 py-2 text-right">매출단가</th>
                    <th class="px-2 py-2 text-right">매출금액</th>
                    <th class="px-2 py-2 text-left">매입정보</th>
                    <th class="px-2 py-2 text-right">마진</th>
                    <th class="px-2 py-2 text-center">비고</th>
                    <th class="px-2 py-2 text-center">삭제</th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="(item, idx) in quoteItems" :key="idx">
                    <tr class="border-b border-gray-100 hover:bg-gray-50">
                      <td class="px-2 py-1.5 text-center">
                        <div class="relative group" style="width:36px;height:36px;margin:0 auto;" @click="setPasteTarget({type:'quoteItem',idx})" tabindex="0"
                          @focus="setPasteTarget({type:'quoteItem',idx})">
                          <img x-show="item.designImage" :src="item.designImage" class="w-9 h-9 rounded object-cover border border-gray-200 cursor-pointer" @click.stop="quoteImagePreview = item.designImage">
                          <label x-show="!item.designImage" class="w-9 h-9 rounded border-2 border-dashed flex items-center justify-center cursor-pointer"
                            :class="pasteTarget?.type==='quoteItem' && pasteTarget?.idx===idx ? 'border-blue-400 bg-blue-50' : 'border-gray-300 hover:border-blue-400'">
                            <span class="material-symbols-outlined text-gray-400" style="font-size:14px;">content_paste</span>
                            <input type="file" accept="image/*" class="hidden" @change="uploadQuoteItemImage(idx, $event)">
                          </label>
                        </div>
                      </td>
                      <td class="px-2 py-2 text-gray-800 font-semibold" x-text="item.name"></td>
                      <td class="px-2 py-2 text-gray-500" x-text="item.spec"></td>
                      <td class="px-2 py-2 text-right text-gray-800" x-text="item.qty + ' ' + item.unit"></td>
                      <td class="px-2 py-2 text-right text-blue-700 font-semibold" x-text="item.unitPrice.toLocaleString() + '원'"></td>
                      <td class="px-2 py-2 text-right font-semibold text-gray-800" x-text="item.amount.toLocaleString() + '원'"></td>
                      <td class="px-2 py-1">
                        <div class="flex flex-col gap-0.5">
                          <div class="flex items-center gap-1">
                            <input type="text" :value="item.supplier || ''" @change="item.supplier = $el.value" class="w-20 text-xs border border-gray-200 rounded px-1.5 py-0.5 focus:border-blue-400 outline-none" placeholder="매입처">
                            <input type="number" :value="item.purchasePrice || 0" @change="item.purchasePrice = Number($el.value)" class="w-16 text-right text-xs border border-gray-200 rounded px-1.5 py-0.5 focus:border-blue-400 outline-none" placeholder="매입가">
                          </div>
                          <template x-if="item.purchaseQuotes && item.purchaseQuotes.length > 1">
                            <select @change="if($el.value) { const q = item.purchaseQuotes[$el.value]; item.supplier = q.supplier; item.purchasePrice = q.purchasePrice; }" class="text-xs border border-gray-200 rounded px-1 py-0.5 text-gray-500">
                              <option value="">다른 견적...</option>
                              <template x-for="(pq, pqi) in item.purchaseQuotes" :key="pqi">
                                <option :value="pqi" x-text="pq.supplier + ' - ' + pq.purchasePrice.toLocaleString() + '원'"></option>
                              </template>
                            </select>
                          </template>
                        </div>
                      </td>
                      <td class="px-2 py-2 text-right text-xs" :class="(item.amount - (item.purchasePrice * item.qty)) >= 0 ? 'text-green-600' : 'text-red-500'">
                        <div class="font-semibold" x-text="((item.amount||0) - ((item.purchasePrice||0) * (item.qty||1))).toLocaleString() + '원'"></div>
                        <div x-show="item.amount > 0" x-text="(((item.amount - (item.purchasePrice||0) * item.qty) / item.amount) * 100).toFixed(1) + '%'" style="color:inherit;opacity:.7;"></div>
                      </td>
                      <td class="px-2 py-2 text-gray-500 text-xs" x-text="item.remark"></td>
                      <td class="px-2 py-2 text-center">
                        <button @click="quoteItems.splice(idx, 1)" class="btn-danger" style="font-size:11px;padding:2px 6px;">삭제</button>
                      </td>
                    </tr>
                  </template>
                </tbody>
              </table>

              <!-- 합계 -->
              <div class="mt-4 grid grid-cols-4 gap-2">
                <div class="stat-card">
                  <p class="stat-label">공급가 (매출)</p>
                  <p class="stat-value text-sm" x-text="quoteTotals.supplyTotal.toLocaleString() + '원'"></p>
                </div>
                <div class="stat-card">
                  <p class="stat-label">매입 합계</p>
                  <p class="stat-value text-sm" x-text="quoteTotals.purchaseTotal.toLocaleString() + '원'"></p>
                </div>
                <div class="stat-card" :style="quoteTotals.margin >= 0 ? 'background:#f0fdf4;border-color:#bbf7d0' : 'background:#fef2f2;border-color:#fecaca'">
                  <p class="stat-label" :style="quoteTotals.margin >= 0 ? 'color:#16a34a' : 'color:#dc2626'">마진</p>
                  <p class="stat-value text-sm" :style="quoteTotals.margin >= 0 ? 'color:#15803d' : 'color:#b91c1c'" x-text="quoteTotals.margin.toLocaleString() + '원'"></p>
                  <p class="text-xs font-semibold" :style="quoteTotals.margin >= 0 ? 'color:#22c55e' : 'color:#ef4444'" x-show="quoteTotals.supplyTotal > 0" x-text="(quoteTotals.margin / quoteTotals.supplyTotal * 100).toFixed(1) + '%'"></p>
                </div>
                <div class="stat-card" style="background:linear-gradient(135deg,#eff6ff,#dbeafe);border-color:#93c5fd;">
                  <p class="stat-label" style="color:#2563eb;">합계 (VAT 포함)</p>
                  <p class="stat-value text-base" style="color:#1d4ed8;" x-text="quoteTotals.grandTotal.toLocaleString() + '원'"></p>
                </div>
              </div>
            </div>
          </div>

        </div>
        </div><!-- /입력 탭 -->

        <!-- ── 미리보기 탭 ── -->
        <div x-show="quotePopup.tab === 'preview'" style="height:calc(85vh - 140px);display:flex;flex-direction:column;overflow:hidden;">
          <div x-show="quoteItems.length === 0" style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:#9ca3af;">
            <span class="material-symbols-outlined" style="font-size:40px;">receipt_long</span>
            <p style="font-size:13px;font-weight:500;">항목을 추가하면 미리보기가 표시됩니다</p>
          </div>
          <!-- ctrl bar(약 42px)를 위로 밀어 숨김, overflow:hidden으로 클리핑 -->
          <div x-show="quoteItems.length > 0" style="flex:1;overflow:hidden;position:relative;">
            <iframe
              id="quote-preview-iframe"
              src=""
              style="position:absolute;top:-42px;left:0;width:100%;height:calc(100% + 42px);border:none;background:#e8ecf0;">
            </iframe>
          </div>
        </div><!-- /미리보기 탭 -->

      </div>
    </template>

    <!-- 팝업 푸터 -->
    <template x-if="!quotePopup.minimized">
      <div class="ec-popup-footer">
        <button @click="saveQuote(); quotePopup.open=false;" class="btn-primary btn-sm">
          <span class="material-symbols-outlined" style="font-size:15px;">save</span> 저장 후 닫기
        </button>
        <button @click="saveQuote()" class="btn-secondary btn-sm">
          <span class="material-symbols-outlined" style="font-size:15px;">save</span> 저장
        </button>
        <button @click="openPrintView()" class="btn-ghost btn-sm">
          <span class="material-symbols-outlined" style="font-size:15px;">print</span> 인쇄
        </button>
        <button @click="exportQuote()" class="btn-ghost btn-sm">
          <span class="material-symbols-outlined" style="font-size:15px;">download</span> 내보내기
        </button>
        <button @click="openMailModal()" class="btn-ghost btn-sm">
          <span class="material-symbols-outlined" style="font-size:15px;">mail</span> 메일
        </button>
        <div style="flex:1;"></div>
        <button @click="quotePopup.open=false" class="btn-ghost btn-sm">닫기</button>
      </div>
    </template>
  </div>
</template>

<!-- ════════════════════════════════════════════
     이카운트 스타일 팝업 ② : 품목 추가 / 편집
     ════════════════════════════════════════════ -->
<template x-if="pricingPopup.open">
  <div class="ec-popup-backdrop" @click.self="pricingPopup.open=false"
       @mousemove.window="onPopupDrag(pricingPopup, $event)"
       @mouseup.window="pricingPopup.dragging=false"></div>
</template>
<template x-if="pricingPopup.open">
  <div class="ec-popup lg"
       :style="`left:${pricingPopup.x}px; top:${pricingPopup.y}px;`"
       @mousemove.window="onPopupDrag(pricingPopup, $event)"
       @mouseup.window="pricingPopup.dragging=false">
    <div class="ec-popup-title" style="justify-content:space-between;"
         @mousedown="startPopupDrag(pricingPopup, $event)">
      <div class="flex items-center gap-2">
        <div class="ec-popup-title-icon" style="background:rgba(217,119,6,.3);">
          <span class="material-symbols-outlined" style="font-size:14px;color:#fbbf24;">payments</span>
        </div>
        <span style="font-size:13px;font-weight:700;" x-text="pricingPopup.editMode ? '품목 편집' : '품목 추가'"></span>
      </div>
      <button class="ec-popup-ctrl-btn close" @click.stop="pricingPopup.open=false">
        <span class="material-symbols-outlined" style="font-size:14px;">close</span>
      </button>
    </div>
    <div class="ec-popup-body" style="max-height:82vh;">
      <div class="space-y-3">
        <!-- 기본 정보 -->
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="label-base">품목명 <span style="color:#ef4444;">*</span></label>
            <input x-model="pricingPopup.form.name" class="input-base" placeholder="품목명 입력">
          </div>
          <div>
            <label class="label-base">코드</label>
            <input x-model="pricingPopup.form.code" class="input-base" placeholder="예: SAFE001">
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="label-base">측정 방식</label>
            <select x-model="pricingPopup.form.pricingType" class="input-base">
              <option value="SIZE">면적 (가로×세로)</option>
              <option value="LENGTH">길이</option>
              <option value="QTY">수량</option>
              <option value="FIXED">고정금액</option>
            </select>
          </div>
          <div>
            <label class="label-base">단위</label>
            <input x-model="pricingPopup.form.unit" class="input-base" placeholder="㎡, m, 개, 식…">
          </div>
        </div>
        <!-- 신규 추가 시 안내 -->
        <template x-if="!pricingPopup.editMode">
          <div class="p-3 rounded-lg" style="background:#fffbeb;border:1px solid #fde68a;">
            <p class="text-xs font-semibold" style="color:#92400e;">
              <span class="material-symbols-outlined" style="font-size:13px;vertical-align:-2px;">info</span>
              저장 후 다시 열면 단가 구간 및 사양 설정이 가능합니다.
            </p>
          </div>
        </template>
        <!-- 편집 모드: 사양 / 매입 관리 -->
        <template x-if="pricingPopup.editMode">
          <div style="background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:12px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
              <span style="font-size:11px;font-weight:700;color:#9333ea;display:flex;align-items:center;gap:4px;">
                <span class="material-symbols-outlined" style="font-size:14px;">inventory_2</span> 사양 / 매입 관리
              </span>
              <div x-show="canEditPricing" class="flex items-center gap-1.5">
                <button @click="openSpecSearchModal(pricingPopup.editId)" class="flex items-center gap-1 text-xs py-1 px-2.5 rounded-lg font-semibold" style="background:#ede9fe;color:#7c3aed;border:1px solid #ddd6fe;">
                  <span class="material-symbols-outlined" style="font-size:13px;">image_search</span> 시안에서 가져오기
                </button>
                <button @click="addPurchaseSpec(pricingPopup.editId)" class="btn-primary text-xs py-1 px-2.5 flex items-center gap-1">
                  <span class="material-symbols-outlined" style="font-size:14px;">add</span> 직접 추가
                </button>
              </div>
            </div>
            <div x-show="getCatPurchaseSpecs(pricingPopup.editId).length===0" style="border:2px dashed #d1d5db;border-radius:8px;padding:16px;text-align:center;color:#9ca3af;font-size:12px;">
              등록된 사양이 없습니다. 시안에서 가져오거나 직접 추가하세요.
            </div>
            <div class="space-y-3">
              <template x-for="(spec,si) in getCatPurchaseSpecs(pricingPopup.editId)" :key="si">
                <div class="border border-gray-200 rounded-xl p-3 bg-white hover:shadow-sm transition-shadow">
                  <div class="flex gap-3">
                    <div class="flex-shrink-0" style="width:100px;">
                      <div x-show="spec.image" class="rounded-lg overflow-hidden border border-gray-200 bg-gray-50 mb-1.5 cursor-pointer" style="height:75px;"
                        @click="quoteImagePreview=spec.image" @focus="setPasteTarget({type:'spec',catId:pricingPopup.editId,idx:si})" tabindex="0">
                        <img :src="spec.image" class="w-full h-full object-contain">
                      </div>
                      <div x-show="!spec.image" @click="setPasteTarget({type:'spec',catId:pricingPopup.editId,idx:si});$el.focus()" tabindex="0"
                        @focus="setPasteTarget({type:'spec',catId:pricingPopup.editId,idx:si})"
                        class="rounded-lg border-2 border-dashed border-gray-300 bg-gray-50 flex flex-col items-center justify-center mb-1.5 cursor-pointer focus:border-blue-400 outline-none" style="height:75px;"
                        :class="pasteTarget?.type==='spec'&&pasteTarget?.idx===si?'border-blue-400 bg-blue-50':''">
                        <span class="material-symbols-outlined text-gray-300" style="font-size:20px;">content_paste</span>
                        <span style="font-size:9px;color:#9ca3af;">Ctrl+V</span>
                      </div>
                      <label x-show="canEditPricing" class="btn-ghost text-xs py-0.5 cursor-pointer w-full text-center flex items-center justify-center gap-1" style="font-size:10px;">
                        <span class="material-symbols-outlined" style="font-size:12px;">upload</span>
                        <span x-text="spec.image?'변경':'파일'"></span>
                        <input type="file" accept="image/*" class="hidden" @change="uploadSpecImage(pricingPopup.editId,si,$event)">
                      </label>
                    </div>
                    <div class="flex-1">
                      <div class="flex items-center gap-2 mb-2">
                        <div class="flex-1">
                          <label style="font-size:10px;color:#6b7280;font-weight:600;">사양명</label>
                          <input type="text" :value="spec.specName" @change="updatePurchaseSpec(pricingPopup.editId,si,'specName',$el.value)" :disabled="!canEditPricing" class="input-base w-full py-1 text-xs" placeholder="예: 선명 750g">
                        </div>
                        <button x-show="canEditPricing" @click="removePurchaseSpec(pricingPopup.editId,si)" class="btn-ghost text-xs py-1 text-red-500 hover:text-red-600 flex-shrink-0 mt-4">
                          <span class="material-symbols-outlined" style="font-size:14px;">delete</span>
                        </button>
                      </div>
                      <div style="background:#f9fafb;border-radius:8px;padding:8px;border:1px solid #f0f1f3;">
                        <div class="flex items-center justify-between mb-1.5">
                          <span style="font-size:10px;color:#6b7280;font-weight:600;">매입견적</span>
                          <button x-show="canEditPricing" @click="addSpecQuote(pricingPopup.editId,si)" style="font-size:10px;color:#2563eb;font-weight:600;background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:2px;">
                            <span class="material-symbols-outlined" style="font-size:12px;">add</span> 추가
                          </button>
                        </div>
                        <div x-show="getSpecQuotes(spec).length===0" style="font-size:10px;color:#9ca3af;text-align:center;padding:6px 0;">매입견적이 없습니다</div>
                        <div class="space-y-1.5">
                          <template x-for="(q,qi) in getSpecQuotes(spec)" :key="qi">
                            <div style="background:#fff;border-radius:6px;border:1px solid #e5e7eb;padding:4px 8px;display:flex;align-items:center;gap:6px;">
                              <input type="text" :value="q.supplier" @change="updateSpecQuote(pricingPopup.editId,si,qi,'supplier',$el.value)" :disabled="!canEditPricing" class="input-base flex-1 py-0.5 text-xs" placeholder="매입처명" style="min-width:80px;">
                              <input type="number" :value="q.purchasePrice" @change="updateSpecQuote(pricingPopup.editId,si,qi,'purchasePrice',Number($el.value))" :disabled="!canEditPricing" class="input-base py-0.5 text-xs text-right" style="width:80px;" placeholder="매입가">
                              <span style="font-size:10px;color:#9ca3af;">원</span>
                              <input type="date" :value="q.quoteDate" @change="updateSpecQuote(pricingPopup.editId,si,qi,'quoteDate',$el.value)" :disabled="!canEditPricing" class="input-base py-0.5 text-xs" style="width:110px;">
                              <button x-show="canEditPricing" @click="removeSpecQuote(pricingPopup.editId,si,qi)" style="color:#f87171;background:none;border:none;cursor:pointer;">
                                <span class="material-symbols-outlined" style="font-size:14px;">close</span>
                              </button>
                            </div>
                          </template>
                        </div>
                        <div x-show="getSpecQuotes(spec).length>1" style="margin-top:4px;font-size:10px;color:#16a34a;font-weight:600;display:flex;align-items:center;gap:3px;">
                          <span class="material-symbols-outlined" style="font-size:12px;">trending_down</span>
                          최저: <span x-text="getLowestQuote(spec)?.supplier"></span> — <span x-text="(getLowestQuote(spec)?.purchasePrice||0).toLocaleString()+'원'"></span>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </template>
        <!-- 편집 모드: 면적별 단가 (SIZE) -->
        <template x-if="pricingPopup.editMode && pricingPopup.form.pricingType==='SIZE'">
          <div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:12px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
              <span style="font-size:11px;font-weight:700;color:#2563eb;display:flex;align-items:center;gap:4px;">
                <span class="material-symbols-outlined" style="font-size:14px;">grid_view</span> 면적별 단가 (원/㎡)
              </span>
              <button x-show="canEditPricing" @click="addVendorTier(pricingPopup.editId)" style="font-size:10px;color:#2563eb;font-weight:600;background:none;border:none;cursor:pointer;">+ 구간 추가</button>
            </div>
            <table class="w-full text-xs" style="border-collapse:collapse;">
              <thead>
                <tr style="background:#eff6ff;">
                  <th style="padding:4px 8px;text-align:left;border-bottom:1px solid #bfdbfe;color:#6b7280;font-weight:600;">최소(㎡)</th>
                  <th style="padding:4px 8px;text-align:left;border-bottom:1px solid #bfdbfe;color:#6b7280;font-weight:600;">최대(㎡)</th>
                  <th style="padding:4px 8px;text-align:right;border-bottom:1px solid #bfdbfe;color:#6b7280;font-weight:600;">단가(원/㎡)</th>
                  <th style="padding:4px 8px;border-bottom:1px solid #bfdbfe;" x-show="canEditPricing"></th>
                </tr>
              </thead>
              <tbody>
                <template x-for="(tier,ti) in getDisplayTiers(categories.find(c=>c.id===pricingPopup.editId))" :key="ti">
                  <tr style="border-bottom:1px solid #f0f1f3;">
                    <td style="padding:3px 6px;"><input type="number" :value="tier.areaMin||0" @change="updateVendorTier(pricingPopup.editId,ti,'areaMin',$el.value)" :disabled="!canEditPricing" class="input-base w-24 py-0.5 text-xs" placeholder="0"></td>
                    <td style="padding:3px 6px;"><input type="number" :value="tier.areaMax" @change="updateVendorTier(pricingPopup.editId,ti,'areaMax',$el.value)" :disabled="!canEditPricing" class="input-base w-24 py-0.5 text-xs" placeholder="무제한"></td>
                    <td style="padding:3px 6px;text-align:right;"><input type="number" :value="tier.pricePerSqm" @change="updateVendorTier(pricingPopup.editId,ti,'pricePerSqm',$el.value)" :disabled="!canEditPricing" class="input-base w-28 py-0.5 text-xs text-right" placeholder="단가"></td>
                    <td style="padding:3px 6px;text-align:center;" x-show="canEditPricing"><button @click="removeVendorTier(pricingPopup.editId,ti)" style="color:#dc2626;font-size:11px;font-weight:600;background:none;border:none;cursor:pointer;">삭제</button></td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </template>
        <!-- 편집 모드: 폭별 m당 단가 (LENGTH) -->
        <template x-if="pricingPopup.editMode && pricingPopup.form.pricingType==='LENGTH'">
          <div style="background:#faf5ff;border:1px solid #e9d5ff;border-radius:10px;padding:12px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
              <span style="font-size:11px;font-weight:700;color:#9333ea;display:flex;align-items:center;gap:4px;">
                <span class="material-symbols-outlined" style="font-size:14px;">straighten</span> 폭별 m당 단가
              </span>
              <div style="display:flex;gap:6px;" x-show="canEditPricing">
                <button @click="addWidthTier(pricingPopup.editId)" style="font-size:10px;color:#7c3aed;font-weight:600;background:none;border:none;cursor:pointer;">+ 폭 추가</button>
                <button @click="addWidthTierBulk(pricingPopup.editId)" style="font-size:10px;color:#9ca3af;font-weight:600;background:none;border:none;cursor:pointer;">+ 300~1800 일괄</button>
              </div>
            </div>
            <table class="w-full text-xs" style="border-collapse:collapse;">
              <thead>
                <tr style="background:#faf5ff;">
                  <th style="padding:4px 8px;text-align:left;border-bottom:1px solid #e9d5ff;color:#6b7280;font-weight:600;">폭(mm)</th>
                  <th style="padding:4px 8px;text-align:right;border-bottom:1px solid #e9d5ff;color:#6b7280;font-weight:600;">m당 단가(원)</th>
                  <th style="padding:4px 8px;border-bottom:1px solid #e9d5ff;" x-show="canEditPricing"></th>
                </tr>
              </thead>
              <tbody>
                <template x-for="(wt,wi) in getDisplayWidthTiers(categories.find(c=>c.id===pricingPopup.editId))" :key="wi">
                  <tr style="border-bottom:1px solid #f0f1f3;">
                    <td style="padding:3px 6px;"><input type="number" :value="wt.widthMm" @change="updateWidthTier(pricingPopup.editId,wi,'widthMm',$el.value)" :disabled="!canEditPricing" class="input-base w-28 py-0.5 text-xs" placeholder="300" step="100"></td>
                    <td style="padding:3px 6px;text-align:right;"><input type="number" :value="wt.pricePerM" @change="updateWidthTier(pricingPopup.editId,wi,'pricePerM',$el.value)" :disabled="!canEditPricing" class="input-base w-28 py-0.5 text-xs text-right" placeholder="단가"></td>
                    <td style="padding:3px 6px;text-align:center;" x-show="canEditPricing"><button @click="removeWidthTier(pricingPopup.editId,wi)" style="color:#dc2626;font-size:11px;font-weight:600;background:none;border:none;cursor:pointer;">삭제</button></td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </template>
      </div>
    </div>
    <div class="ec-popup-footer">
      <button @click="savePricingPopup()" class="btn-primary btn-sm">
        <span class="material-symbols-outlined" style="font-size:15px;">save</span>
        <span x-text="pricingPopup.editMode ? '수정' : '추가'"></span>
      </button>
      <button @click="pricingPopup.open=false" class="btn-ghost btn-sm">취소</button>
    </div>
  </div>
</template>

<!-- ════════════════════════════════════════════
     이카운트 스타일 팝업 ③ : 옵션 추가 / 편집
     ════════════════════════════════════════════ -->
<template x-if="optionsPopup.open">
  <div class="ec-popup-backdrop" @click.self="optionsPopup.open=false"
       @mousemove.window="onPopupDrag(optionsPopup, $event)"
       @mouseup.window="optionsPopup.dragging=false"></div>
</template>
<template x-if="optionsPopup.open">
  <div class="ec-popup lg"
       :style="`left:${optionsPopup.x}px; top:${optionsPopup.y}px;`"
       @mousemove.window="onPopupDrag(optionsPopup, $event)"
       @mouseup.window="optionsPopup.dragging=false">
    <div class="ec-popup-title" style="justify-content:space-between;"
         @mousedown="startPopupDrag(optionsPopup, $event)">
      <div class="flex items-center gap-2">
        <div class="ec-popup-title-icon" style="background:rgba(234,88,12,.3);">
          <span class="material-symbols-outlined" style="font-size:14px;color:#fb923c;">tune</span>
        </div>
        <span style="font-size:13px;font-weight:700;" x-text="optionsPopup.editMode ? '옵션 편집' : '새 옵션 추가'"></span>
      </div>
      <button class="ec-popup-ctrl-btn close" @click.stop="optionsPopup.open=false">
        <span class="material-symbols-outlined" style="font-size:14px;">close</span>
      </button>
    </div>
    <div class="ec-popup-body" style="max-height:70vh;">
      <div class="space-y-3">
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="label-base">코드</label>
            <input x-model="optionsPopup.form.code" class="input-base" placeholder="예: OPT001">
          </div>
          <div>
            <label class="label-base">이름 <span style="color:#ef4444;">*</span></label>
            <input x-model="optionsPopup.form.name" class="input-base" placeholder="옵션 이름">
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="label-base">단가 방식</label>
            <select x-model="optionsPopup.form.pricingType" class="input-base">
              <option value="fixed">고정 단가</option>
              <option value="perSqm">면적(㎡)당</option>
              <option value="variants">규격별</option>
            </select>
          </div>
          <div>
            <label class="label-base">단위</label>
            <input x-model="optionsPopup.form.unit" class="input-base" placeholder="개, ㎡, m…">
          </div>
        </div>
        <!-- 고정/면적당 단가 -->
        <div x-show="optionsPopup.form.pricingType !== 'variants'">
          <label class="label-base">단가 (원)</label>
          <input type="number" x-model.number="optionsPopup.form.price" class="input-base" placeholder="단가">
        </div>
        <!-- 규격별 단가 -->
        <div x-show="optionsPopup.form.pricingType === 'variants'">
          <label class="label-base">규격별 단가</label>
          <div class="space-y-1.5">
            <template x-for="(v, vi) in optionsPopup.form.variants" :key="vi">
              <div class="flex items-center gap-2">
                <input x-model="v.label" class="input-base py-1 text-xs" style="width:100px;" placeholder="규격명">
                <input type="number" x-model.number="v.price" class="input-base py-1 text-xs text-right" style="width:90px;" placeholder="단가">
                <button @click="optionsPopup.form.variants.splice(vi, 1)" class="text-red-400 hover:text-red-600 text-sm font-bold">×</button>
              </div>
            </template>
            <button @click="optionsPopup.form.variants.push({label:'',price:0})" class="text-blue-600 hover:text-blue-700 text-xs font-semibold">
              + 규격 추가
            </button>
          </div>
        </div>
        <!-- 적용 품목 -->
        <div>
          <label class="label-base">적용 품목</label>
          <div class="flex flex-wrap gap-1.5 mt-1">
            <template x-for="c in categories" :key="c.id">
              <button type="button"
                @click="optionsPopup.form.categoryIds.includes(c.id) ? optionsPopup.form.categoryIds.splice(optionsPopup.form.categoryIds.indexOf(c.id),1) : optionsPopup.form.categoryIds.push(c.id)"
                class="text-xs px-2.5 py-0.5 rounded-full border transition-all"
                :style="optionsPopup.form.categoryIds.includes(c.id) ? 'background:#fff7ed;border-color:#fed7aa;color:#9a3412;font-weight:600;cursor:pointer;' : 'background:#f9fafb;border-color:#e5e7eb;color:#6b7280;cursor:pointer;'">
                <span x-show="optionsPopup.form.categoryIds.includes(c.id)" style="font-size:10px;">✓ </span>
                <span x-text="c.name"></span>
              </button>
            </template>
          </div>
          <p x-show="optionsPopup.form.categoryIds.length===0" class="text-xs text-amber-600 mt-1">
            <span class="material-symbols-outlined" style="font-size:12px;vertical-align:-2px;">warning</span>
            품목 미선택 시 견적 작성 시 표시되지 않습니다
          </p>
        </div>
        <!-- 편집 모드: 업체별 견적 -->
        <template x-if="optionsPopup.editMode">
          <div style="background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:12px;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
              <span style="font-size:11px;font-weight:700;color:#ea580c;display:flex;align-items:center;gap:4px;">
                <span class="material-symbols-outlined" style="font-size:14px;">receipt_long</span> 업체별 견적
              </span>
              <button @click="showAddOptQuote=!showAddOptQuote" style="font-size:11px;color:#ea580c;font-weight:600;background:none;border:none;cursor:pointer;" x-text="showAddOptQuote?'닫기':'+ 견적 추가'"></button>
            </div>
            <template x-if="showAddOptQuote">
              <div class="flex items-center gap-2 flex-wrap mb-3">
                <select x-model="newOptQuote.vendor" class="input-base py-1 text-xs" style="width:130px;">
                  <option value="">업체 선택</option>
                  <template x-for="v in vendors" :key="v.id"><option :value="v.name" x-text="v.name"></option></template>
                </select>
                <input type="number" x-model.number="newOptQuote.price" class="input-base py-1 text-xs text-right" style="width:100px;" placeholder="단가(원)">
                <input type="date" x-model="newOptQuote.quoteDate" class="input-base py-1 text-xs" style="width:120px;">
                <input x-model="newOptQuote.note" class="input-base py-1 text-xs" style="width:120px;" placeholder="비고">
                <button @click="addOptQuote(optionsPopup.editId)" class="btn-primary text-xs py-1 px-2">추가</button>
              </div>
            </template>
            <div x-show="(options.find(o=>o.id===optionsPopup.editId)?.quotes||[]).length===0" style="padding:8px;text-align:center;color:#9ca3af;font-size:11px;">등록된 업체 견적이 없습니다</div>
            <table x-show="(options.find(o=>o.id===optionsPopup.editId)?.quotes||[]).length>0" class="w-full text-xs" style="border-collapse:collapse;">
              <thead><tr style="background:#fff7ed;">
                <th style="padding:5px 8px;text-align:left;font-size:10px;color:#92400e;border-bottom:1px solid #fde68a;">업체명</th>
                <th style="padding:5px 8px;text-align:right;font-size:10px;color:#92400e;border-bottom:1px solid #fde68a;">단가</th>
                <th style="padding:5px 8px;text-align:left;font-size:10px;color:#92400e;border-bottom:1px solid #fde68a;">견적일</th>
                <th style="padding:5px 8px;text-align:left;font-size:10px;color:#92400e;border-bottom:1px solid #fde68a;">비고</th>
                <th style="padding:5px 8px;text-align:center;font-size:10px;color:#92400e;border-bottom:1px solid #fde68a;">삭제</th>
              </tr></thead>
              <tbody>
                <template x-for="q in (options.find(o=>o.id===optionsPopup.editId)?.quotes||[])" :key="q.id">
                  <tr style="border-bottom:1px solid #fef3c7;" class="hover:bg-amber-50/40">
                    <td style="padding:4px 8px;font-weight:600;color:#374151;" x-text="q.vendor"></td>
                    <td style="padding:4px 8px;text-align:right;color:#ea580c;font-weight:600;" x-text="Number(q.price).toLocaleString()+'원'"></td>
                    <td style="padding:4px 8px;color:#6b7280;" x-text="q.quoteDate"></td>
                    <td style="padding:4px 8px;color:#6b7280;" x-text="q.note||'-'"></td>
                    <td style="padding:4px 8px;text-align:center;">
                      <button @click="deleteOptQuote(optionsPopup.editId,q.id)" class="text-red-400 hover:text-red-600" style="font-size:13px;">×</button>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </template>
      </div>
    </div>
    <div class="ec-popup-footer">
      <button @click="saveOptionsPopup()" class="btn-primary btn-sm">
        <span class="material-symbols-outlined" style="font-size:15px;">save</span>
        <span x-text="optionsPopup.editMode ? '수정' : '추가'"></span>
      </button>
      <button @click="optionsPopup.open=false" class="btn-ghost btn-sm">취소</button>
    </div>
  </div>
</template>

<!-- ═══════════════════════════════════════════════════════
     이카운트 스타일 팝업 ④ : 업체 추가 / 수정
════════════════════════════════════════════════════════ -->
<template x-if="vendorPopup.open">
  <div class="ec-popup-backdrop" @click.self="vendorPopup.open=false"
       @mousemove.window="onPopupDrag(vendorPopup, $event)"
       @mouseup.window="vendorPopup.dragging=false">
</template>
<template x-if="vendorPopup.open">
  <div class="ec-popup sm"
       :style="`left:${vendorPopup.x}px; top:${vendorPopup.y}px; min-width:520px; max-width:95vw;`"
       @mousemove.window="onPopupDrag(vendorPopup, $event)"
       @mouseup.window="vendorPopup.dragging=false">
    <div class="ec-popup-title" @mousedown="startPopupDrag(vendorPopup, $event)">
      <div class="flex items-center gap-2">
        <div class="ec-popup-title-icon">
          <span class="material-symbols-outlined" style="font-size:14px;color:#8fabff;">storefront</span>
        </div>

              <div :style="'background:'+(attendance.leaveCompare.data.fiscal.reduce((s,r)=>s+r.total,0)-attendance.leaveCompare.data.anniversary.reduce((s,r)=>s+r.annual,0)>0?'#dcfce7':attendance.leaveCompare.data.fiscal.reduce((s,r)=>s+r.total,0)-attendance.leaveCompare.data.anniversary.reduce((s,r)=>s+r.annual,0)<0?'#fee2e2':'#f1f5f9')+';border-radius:6px;padding:4px 10px;text-align:center;'">

                  x-text="(()=>{const d=attendance.leaveCompare.data.fiscal.reduce((s,r)=>s+r.total,0)-attendance.leaveCompare.data.anniversary.reduce((s,r)=>s+r.annual,0);return (d>0?'+':'')+d+'일'})()"></div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">

              <table class="leave-tbl" style="font-size:10px;">

                  <tr style="background:#f8f9fb;font-weight:700;border-top:2px solid #e0e4eb;">
                    <td style="text-align:left;font-size:9px;color:#6b7280;">합계</td>
                    <td class="leave-num" x-text="attendance.leaveCompare.data.fiscal.reduce((s,r)=>s+r.annual,0)"></td>
                    <td class="leave-num" style="color:#16a34a;" x-text="attendance.leaveCompare.data.fiscal.reduce((s,r)=>s+(r.additionalDays||0),0)||''"></td>
                    <td class="leave-num" style="color:#dc2626;" x-text="attendance.leaveCompare.data.fiscal.reduce((s,r)=>s+(r.deductedDays||0),0)||''"></td>
                    <td class="leave-num" style="color:#4f6ef7;" x-text="attendance.leaveCompare.data.fiscal.reduce((s,r)=>s+r.total,0)"></td>
                    <td class="leave-num" style="color:#b45309;" x-text="attendance.leaveCompare.data.fiscal.reduce((s,r)=>s+(r.used||0),0)"></td>
                    <td class="leave-num" style="color:#059669;" x-text="attendance.leaveCompare.data.fiscal.reduce((s,r)=>s+r.remaining,0)"></td>

                </tbody>
              </table>
            </div>

              </div>
              <table class="leave-tbl" style="font-size:10px;">
                <thead>
                  <tr>

                    <th style="font-size:9px;color:#6b7280;">시작일</th>
                    <th style="font-size:9px;color:#6b7280;">종료일</th>
                    <th style="color:#7c3aed;">연차</th>
                    <th style="color:#b45309;">사용</th>
                    <th style="color:#059669;">잔여</th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="row in attendance.leaveCompare.data.anniversary" :key="row.workYear">
                    <tr>
                      <td style="text-align:left;font-weight:600;white-space:nowrap;" x-text="row.workYear+'년차'"></td>
                      <td style="font-size:9px;color:#6b7280;" x-text="row.startDate"></td>
                      <td style="font-size:9px;color:#6b7280;" x-text="row.endDate"></td>
                      <td class="leave-num" style="color:#7c3aed;font-weight:700;" x-text="row.annual"></td>
                      <td class="leave-num" style="color:#b45309;" x-text="row.used||''"></td>
                      <td class="leave-num" :style="'color:'+(row.remaining<0?'#dc2626':row.remaining===0?'#9ca3af':'#059669')" x-text="row.remaining"></td>
                    </tr>
                  </template>
                  <tr style="background:#f8f9fb;font-weight:700;border-top:2px solid #e0e4eb;">
                    <td style="text-align:left;font-size:9px;color:#6b7280;">합계</td>
                    <td></td><td></td>
                    <td class="leave-num" style="color:#7c3aed;" x-text="attendance.leaveCompare.data.anniversary.reduce((s,r)=>s+r.annual,0)"></td>
                    <td class="leave-num" style="color:#b45309;" x-text="attendance.leaveCompare.data.anniversary.reduce((s,r)=>s+(r.used||0),0)"></td>
                    <td class="leave-num" style="color:#059669;" x-text="attendance.leaveCompare.data.anniversary.reduce((s,r)=>s+r.remaining,0)"></td>
                  </tr>
                </tbody>
              </table>
            </div>

          </div><!-- /grid -->

          <!-- 설명 -->
          <div style="margin-top:12px;padding:8px 12px;background:#fafafa;border-radius:6px;border:1px solid #e5e7eb;font-size:10px;color:#6b7280;line-height:1.6;">
            <strong style="color:#374151;">💡 계산 방식 차이</strong><br>
            • <strong style="color:#2563eb;">회계년도</strong>: 매년 1월 1일 기준 근속연수로 산정. 연도가 바뀌면 즉시 갱신.<br>
            • <strong style="color:#7c3aed;">입사일기준</strong>: 입사 N주년 ~ N+1주년이 하나의 연차 단위. 첫 해는 매월 1개(최대 11개), 2년차부터 15일, 2년 초과마다 +1일(최대 25일).
          </div>
        </div>
      </template>
    </div>
  </template>

  <div x-show="!attendance.leaveLoading && attendance.leaveSummary.length===0" style="text-align:center;padding:60px;color:#9ca3af;font-size:13px;">
    <span class="material-symbols-outlined" style="font-size:36px;">event_busy</span>
    <div style="margin-top:8px;">등록된 직원이 없습니다</div>
  </div>

</div>

<div x-show="attendance.leaveAddModal.open" class="leave-modal-overlay" @click.self="attendance.leaveAddModal.open=false">
  <div class="leave-modal" style="width:400px;">
    <h3 style="font-size:14px;font-weight:700;margin:0 0 12px;color:#1e293b;">휴가 등록</h3>
    <div class="space-y-3" style="font-size:11px;">
      <div>
        <label class="label-base">직원</label>
        <select x-model="attendance.leaveAddModal.employeeName" class="input-base" style="width:100%;padding:6px 10px;">
          <option value="">선택</option>
          <template x-for="emp in attendance.leaveSummary"><option :value="emp.name" x-text="emp.name+' ('+emp.department+')'"></option></template>
        </select>
      </div>
      <div>
        <label class="label-base">
          날짜
          <span style="font-size:9px;color:#9ca3af;font-weight:400;margin-left:4px;">1번 클릭: 하루 / 2번 클릭: 기간 선택</span>
        </label>
        <!-- 커스텀 달력 -->
        <div style="border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;user-select:none;">
          <!-- 월 이동 헤더 -->
          <div style="display:flex;align-items:center;justify-content:space-between;padding:7px 12px;background:#f9fafb;border-bottom:1px solid #e5e7eb;">
            <button type="button" @click="leaveCalPrev()" style="background:none;border:none;cursor:pointer;color:#6b7280;font-size:18px;line-height:1;padding:0 4px;">‹</button>
            <span style="font-size:12px;font-weight:600;color:#374151;" x-text="leaveCalLabel()"></span>
            <button type="button" @click="leaveCalNext()" style="background:none;border:none;cursor:pointer;color:#6b7280;font-size:18px;line-height:1;padding:0 4px;">›</button>
          </div>
          <!-- 요일 헤더 -->
          <div style="display:grid;grid-template-columns:repeat(7,1fr);text-align:center;padding:5px 4px 2px;background:#fafafa;gap:2px;">
            <template x-for="(dow,di) in ['일','월','화','수','목','금','토']">
              <div :style="di===0?'font-size:9px;font-weight:700;color:#ef4444;':(di===6?'font-size:9px;font-weight:700;color:#3b82f6;':'font-size:9px;font-weight:600;color:#9ca3af;')" x-text="dow"></div>

              <div
                @click="cell.date && leaveCalClick(cell.date)"

                style="text-align:center;padding:5px 2px;font-size:11px;border-radius:5px;transition:all .1s;min-height:26px;display:flex;align-items:center;justify-content:center;"
                x-text="cell.day||''"
              ></div>
            </template>
          </div>
        </div>

        <div style="margin-top:5px;font-size:10px;text-align:center;min-height:18px;">
          <template x-if="attendance.leaveAddModal.startDate">
            <span style="color:#374151;">
              <span style="font-weight:700;color:#d97706;" x-text="attendance.leaveAddModal.startDate"></span>
              <template x-if="attendance.leaveAddModal.endDate && attendance.leaveAddModal.endDate !== attendance.leaveAddModal.startDate">
                <span>
                  <span style="color:#9ca3af;"> ~ </span>
                  <span style="font-weight:700;color:#d97706;" x-text="attendance.leaveAddModal.endDate"></span>
                  <span style="color:#9ca3af;" x-text="' (평일 ' + leaveCalCountDays() + '일)'"></span>
                </span>
              </template>
              <template x-if="!attendance.leaveAddModal.endDate || attendance.leaveAddModal.endDate === attendance.leaveAddModal.startDate">
                <span style="color:#9ca3af;"> (1일 선택됨)</span>
              </template>
            </span>
          </template>
          <template x-if="!attendance.leaveAddModal.startDate">
            <span style="color:#d1d5db;">날짜를 선택하세요</span>
          </template>
        </div>

      <div>
        <label class="label-base">유형</label>
        <select x-model="attendance.leaveAddModal.leaveType" class="input-base" style="width:100%;padding:6px 10px;">

          <option value="오전반차">오전반차 (0.5일)</option>
          <option value="오후반차">오후반차 (0.5일)</option>
          <option value="경조휴가">경조휴가</option>
          <option value="예비군">예비군</option>
        </select>
      </div>
      <div>
        <label class="label-base">사유</label>
        <input x-model="attendance.leaveAddModal.reason" class="input-base" style="width:100%;padding:6px 10px;" placeholder="선택 입력">
      </div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">
      <button @click="attendance.leaveAddModal.open=false" style="background:#f3f4f6;color:#6b7280;border:none;border-radius:6px;padding:6px 16px;font-size:11px;font-weight:600;cursor:pointer;">취소</button>
      <button @click="addLeaveRecord()" style="background:#d97706;color:#fff;border:none;border-radius:6px;padding:6px 16px;font-size:11px;font-weight:600;cursor:pointer;">등록</button>
    </div>
  </div>
</div>

              </div>
              <div class="card text-center" style="padding:14px 10px;">

                  <span style="font-size:10px;padding:2px 6px;border-radius:10px;background:#fef9c3;color:#d97706;font-weight:600;" x-text="'발송 '+(stats.statusCount?.sent||0)"></span>
                  <span style="font-size:10px;padding:2px 6px;border-radius:10px;background:#dcfce7;color:#16a34a;font-weight:600;" x-text="'수주 '+(stats.statusCount?.won||0)"></span>
                  <span style="font-size:10px;padding:2px 6px;border-radius:10px;background:#fee2e2;color:#dc2626;font-weight:600;" x-text="'미수주 '+(stats.statusCount?.lost||0)"></span>
                </div>
              </div>
            </div>

  <!-- 시안 → 사양 가져오기 모달 -->
  <template x-if="specSearchModal.open">
    <div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" style="backdrop-filter:blur(4px);" @click.self="specSearchModal.open=false">
      <div class="bg-white rounded-2xl shadow-2xl fade-in" style="width:720px;max-width:95vw;max-height:85vh;display:flex;flex-direction:column;">
        <!-- 헤더 -->
        <div style="padding:16px 20px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">

            시안 검색해서 사양으로 추가

          </button>
        </div>

        <!-- 검색창 -->

          <div style="display:flex;gap:8px;">
            <input
              x-model="specSearchModal.query"
              @keydown.enter="searchSpecDesigns()"

              class="input-base flex-1"
              placeholder="띄어쓰기로 AND 검색  예) 현수막 750g 2024"
              style="font-size:13px;"
              x-init="$el.focus()"
