          <!-- ══ 활동 로그 (관리자 전용) ══ -->
          <template x-if="auth.role === 'admin'">
            <div class="card" style="padding:0;overflow:hidden;" x-data="{
              logs: [], total: 0, page: 1, limit: 50,
              filterUser: '', filterAction: '',
              activeTab: '전체',
              tabs: [
                { id: '전체',    label: '전체',      keywords: '' },
                { id: '견적',    label: '📋 견적',    keywords: '견적' },
                { id: '단가',    label: '💰 단가/품목', keywords: '품목,옵션,업체,단가' },
                { id: '인사',    label: '👤 인사',    keywords: '연차,결재,휴가,사용자,회원가입' },
                { id: '시스템',  label: '⚙️ 시스템', keywords: '로그인,GitHub,토큰,설정,백업' },
              ],
              loading: false,
              async load() {
                this.loading = true;
                try {
                  const params = new URLSearchParams({ page: this.page, limit: this.limit });
                  if (this.filterUser) params.set('user', this.filterUser);
                  const tab = this.tabs.find(t => t.id === this.activeTab);
                  const kw = (tab && tab.keywords) ? tab.keywords : '';
                  const actionFilter = this.filterAction || kw;
                  if (actionFilter) params.set('action', actionFilter);
                  const r = await fetch('/api/audit-logs?' + params);
                  const d = await r.json();
                  this.logs = d.logs || [];
                  this.total = d.total || 0;
                } catch(e) { console.error(e); }
                this.loading = false;
              },
              async switchTab(tabId) { this.activeTab = tabId; this.filterAction = ''; this.page = 1; await this.load(); },
              async search() { this.page = 1; await this.load(); },
              fmtTime(iso) {
                if (!iso) return '';
                const d = new Date(iso);
                return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
              }
            }" x-init="load()">
              <div style="padding:10px 14px;background:linear-gradient(135deg,#f0fdf4,#dcfce7);border-bottom:1px solid #bbf7d0;display:flex;align-items:center;justify-content:space-between;">
                <h3 class="font-work text-[13px] font-bold text-gray-800 flex items-center gap-2 m-0">
                  <span class="material-symbols-outlined" style="font-size:16px;color:#16a34a;">history</span> 활동 로그
                  <span class="text-xs font-normal text-gray-400">(관리자 전용)</span>
                </h3>
                <span style="font-size:11px;color:#6b7280;" x-text="`총 ${total}건`"></span>
              </div>
              <!-- 탭 바 -->
              <div style="display:flex;gap:0;border-bottom:1px solid #e5e7eb;background:#fff;overflow-x:auto;">
                <template x-for="tab in tabs" :key="tab.id">
                  <button @click="switchTab(tab.id)"
                    :style="activeTab === tab.id
                      ? 'border-bottom:2px solid #16a34a;color:#16a34a;font-weight:700;background:#f0fdf4;'
                      : 'border-bottom:2px solid transparent;color:#6b7280;background:#fff;'"
                    style="padding:8px 14px;font-size:12px;border:none;border-top:none;border-left:none;border-right:none;cursor:pointer;white-space:nowrap;transition:all .15s;"
                    x-text="tab.label">
                  </button>
                </template>
              </div>
              <!-- 필터 -->
              <div style="padding:8px 14px;background:#f9fafb;border-bottom:1px solid #e5e7eb;display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
                <input x-model="filterUser" @keydown.enter="search()" placeholder="사용자 ID" style="width:100px;padding:4px 8px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;">
                <input x-model="filterAction" @keydown.enter="search()" placeholder="행동 키워드" :disabled="activeTab !== '전체'" style="width:120px;padding:4px 8px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;" :style="activeTab!=='전체'?'opacity:0.4;':''">
                <button @click="search()" style="padding:4px 12px;background:#16a34a;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;">검색</button>
                <button @click="filterUser='';filterAction='';activeTab='전체';search()" style="padding:4px 10px;background:#6b7280;color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer;">초기화</button>
                <span x-show="loading" style="font-size:11px;color:#9ca3af;">로딩 중...</span>
              </div>
              <!-- 로그 테이블 -->
              <div style="overflow-x:auto;">
                <table style="width:100%;border-collapse:collapse;font-size:12px;">
                  <thead>
                    <tr style="background:#f3f4f6;border-bottom:1px solid #e5e7eb;">
                      <th style="padding:7px 10px;text-align:left;font-weight:600;color:#374151;white-space:nowrap;">시간</th>
                      <th style="padding:7px 10px;text-align:left;font-weight:600;color:#374151;">사용자</th>
                      <th style="padding:7px 10px;text-align:left;font-weight:600;color:#374151;">행동</th>
                      <th style="padding:7px 10px;text-align:left;font-weight:600;color:#374151;">대상</th>
                    </tr>
                  </thead>
                  <tbody>
                    <template x-if="logs.length === 0 && !loading">
                      <tr><td colspan="4" style="padding:20px;text-align:center;color:#9ca3af;">로그가 없습니다.</td></tr>
                    </template>
                    <template x-for="log in logs" :key="log.id">
                      <tr style="border-bottom:1px solid #f3f4f6;" @mouseenter="$el.style.background='#f9fafb'" @mouseleave="$el.style.background=''">
                        <td style="padding:6px 10px;color:#6b7280;white-space:nowrap;" x-text="fmtTime(log.시간)"></td>
                        <td style="padding:6px 10px;font-weight:600;color:#1f2937;" x-text="log.사용자"></td>
                        <td style="padding:6px 10px;">
                          <span x-text="log.행동" :style="
                            log.행동 && log.행동.includes('삭제') ? 'color:#dc2626;font-weight:600;' :
                            log.행동 && log.행동.includes('생성') ? 'color:#16a34a;font-weight:600;' :
                            log.행동 && log.행동.includes('수정') ? 'color:#2563eb;font-weight:600;' :
                            log.행동 && log.행동.includes('로그인') ? 'color:#7c3aed;font-weight:600;' :
                            'color:#374151;'
                          "></span>
                        </td>
                        <td style="padding:6px 10px;color:#4b5563;" x-text="log.대상"></td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>

<script>
// rev 2026-04-28a — 깨진 commit 복구 (force re-push)
function app() {
  // ═══════════════════════════════════════════════════════════════════
  // 새로고침(F5) 시 "기억할 탭" 목록
  // ───────────────────────────────────────────────────────────────────
  // 기본: 새로고침하면 홈으로 리셋
  // 예외: 이 배열에 포함된 탭은 마지막으로 보고 있던 상태 그대로 복원
  //
  // 👉 여기에 탭 id만 추가하면 됩니다 (아래 예시 중에서 원하는 것만 유지)
  //     'workspace'    = 워크스페이스 (장시간 문서 작성용)
  //     'history'      = 견적 목록
  //     'attendance'   = 출퇴근 기록부
  //     'salary'       = 급여 관리
  //     'stats'        = 통계
  //     'approval'     = 결재
  //     'leave'        = 연차
  //     'gpsAttendance'= GPS 출퇴근
  //     'admin'        = 사용자 관리
  //     'vendors'      = 업체 관리
  //     'pricing'      = 과거단가조회
  //     'options'      = 옵션 관리
  //     'notices'      = 공지사항
  //     'orgchart'     = 조직도
  //     'home'         = 홈 (기본값이라 추가할 필요 없음)
  //
  // 탭 id 확인: 사이드바 버튼 onclick 의 currentTab='xxx' 부분
  // ═══════════════════════════════════════════════════════════════════
  // F5 새로고침 시 복원할 탭 목록 (이 목록에 없는 탭은 새로고침 시 홈으로 이동).
  // - workspace: 편집 중인 견적 작업은 새로고침해도 유지되는 게 실용적
  // - history 는 제외: 항상 견적목록으로만 튀는 문제 때문
  const REMEMBERED_TABS = ['workspace', 'ai'];

  return {
    // 기억할 탭 목록을 data에도 노출 (Alpine 내부에서 참조 가능)
    _rememberedTabs: REMEMBERED_TABS,
    // 인증
    auth: { loggedIn: false, userId: '', name: '', role: '', position: '', phone: '', permissions: [] },
    // 급여 탭 가용성 (false이면 메뉴 자체를 숨김 — 관리자 PC 외에서는 존재조차 노출 안 함)

      if (this.bulkPermSaving) return;

      if (targets.length === 0) { alert('적용 대상 직원이 없습니다.'); return; }
      if (this.bulkPermForm.permissions.length === 0) { alert('권한을 1개 이상 선택하세요.'); return; }
      const opLabel = { replace: '덮어쓰기', add: '추가', remove: '제거' }[this.bulkPermForm.operation];
      const msg = `${targets.length}명에게 ${this.bulkPermForm.permissions.length}개 권한을 "${opLabel}" 하시겠습니까?\n\n대상: ${targets.map(u => u.name).join(', ')}`;
      if (!confirm(msg)) return;
      this.bulkPermSaving = true;
      try {
        const r = await fetch('/api/admin/users/bulk-permissions', {
          method: 'POST',

            permissions: this.bulkPermForm.permissions,

    // 팝업 드래그 메서드
    startPopupDrag(popup, e) {
      popup.dragging = true;
      popup._ox = e.clientX - popup.x;
      popup._oy = e.clientY - popup.y;
    },
    onPopupDrag(popup, e) {
      if (!popup.dragging) return;
      const nx = e.clientX - popup._ox;
      const ny = e.clientY - popup._oy;
      popup.x = Math.max(0, Math.min(nx, window.innerWidth - 200));
      popup.y = Math.max(0, Math.min(ny, window.innerHeight - 80));
    },
    startPopupResize(popup, edge, e) {
      popup.resizing = true;
      popup._rEdge = edge;
      popup._rx = e.clientX;
      popup._ry = e.clientY;
      popup._rw = popup.width || 920;
      popup._rh = popup.height || 680;
    },
    onPopupResize(popup, e) {
      if (!popup.resizing) return;
      const dx = e.clientX - popup._rx;
      const dy = e.clientY - popup._ry;
      const edge = popup._rEdge;
      const minW = 480, minH = 300;
      const maxW = window.innerWidth - (popup.x || 0) - 20;
      const maxH = window.innerHeight - (popup.y || 0) - 20;
      if (edge === 'r' || edge === 'br') {
        popup.width = Math.round(Math.min(maxW, Math.max(minW, popup._rw + dx)));
      }
      if (edge === 'b' || edge === 'br') {
        popup.height = Math.round(Math.min(maxH, Math.max(minH, popup._rh + dy)));
      }
    },

    // 견적 팝업 열기
    // ── 견적 작업 자동 백업 + 복구 ──
    closeQuotePopupWithBackup() {
      // 현재 작업 내용을 localStorage 에 백업 (실수로 ESC 눌러도 복구 가능)
      try {
        // 새 견적 (editingQuoteId 없음) + 입력된 내용이 있을 때만 백업
        const hasContent = !this.editingQuoteId && (
          (this.quoteHeader && (this.quoteHeader.siteName || this.quoteHeader.quoteName || this.quoteHeader.manager)) ||
          (Array.isArray(this.quoteItems) && this.quoteItems.length > 0)
        );
        if (hasContent) {
          const draft = {
            quoteHeader: this.quoteHeader,
            quoteItems: this.quoteItems,
            savedAt: new Date().toISOString(),
            popupSize: { width: this.quotePopup.width, height: this.quotePopup.height, x: this.quotePopup.x, y: this.quotePopup.y },
          };
          localStorage.setItem('quoteDraft:' + (this.auth?.userId || 'anon'), JSON.stringify(draft));
        }
      } catch(e) { /* localStorage 사용 불가해도 닫기는 진행 */ }
      this.quotePopup.open = false;
    },
    hasQuoteDraft() {
      try {
        const raw = localStorage.getItem('quoteDraft:' + (this.auth?.userId || 'anon'));
        if (!raw) return null;
        const draft = JSON.parse(raw);
        // 24시간 지난 백업은 무시 (혼란 방지)
        const ageMs = Date.now() - new Date(draft.savedAt).getTime();
        if (ageMs > 24*3600*1000) {
          localStorage.removeItem('quoteDraft:' + (this.auth?.userId || 'anon'));
          return null;
        }
        return draft;
      } catch(e) { return null; }
    },

      this.quoteHeader = draft.quoteHeader || this.quoteHeader;

      if (draft.popupSize) {
        Object.assign(this.quotePopup, draft.popupSize);

        this.quotePopup.height = Math.round(window.innerHeight * 0.9);
        this.quotePopup.x = Math.round(window.innerWidth * 0.025);

        // 전체 데이터(items 포함) 비동기 로드
        try {
          const r = await fetch('/api/quotes/' + quote.id);
          if (r.ok) {
            const full = await r.json();
            this.quoteItems = JSON.parse(JSON.stringify(full.items || []));
            // 헤더에 누락된 필드 보완
            if (full.vendorId && !this.quoteHeader.vendorId) this.quoteHeader.vendorId = full.vendorId;
            // vendorId 없지만 vendorName 있으면 이름으로 매칭
            if (!this.quoteHeader.vendorId && full.vendorName) {
              const mv = this.vendors.find(v => v.name === full.vendorName);
              if (mv) this.quoteHeader.vendorId = mv.id;
            }
            if (full.manager && !this.quoteHeader.manager) this.quoteHeader.manager = full.manager;
          }

        const draft = this.hasQuoteDraft();

    get calendarLeaveData() {

        for (const r of (emp.records || [])) {
          if (r.leaveType !== 'annual' && r.leaveType !== 'halfAM' && r.leaveType !== 'halfPM') continue;
          if (!byDate[r.date]) byDate[r.date] = [];
          byDate[r.date].push({

            dept: emp.department || '',
            leaveType: r.leaveType,
            leaveLabel: r.leaveLabel || (r.leaveType === 'annual' ? '연차' : '반차')
          });
        }
      }
      return byDate;

    // 팀별 색상 팔레트 (departments 순서 기반)
    get calendarDeptColors() {
      const PALETTE = [

        { bg: '#dcfce7', text: '#15803d', border: '#86efac' },  // 그린

        { bg: '#fce7f3', text: '#9d174d', border: '#f9a8d4' },  // 핑크
      ];

      (this.attendance.departments || []).forEach((d, i) => {

      });

    // 달력 셀 배열 생성 (월요일 시작, null = 빈 칸)
    get calendarCells() {
      const y = this.attendance.year;
      const m = this.attendance.month;
      const firstDow = new Date(y, m - 1, 1).getDay(); // 0=일 기준, 화이트보드와 동일하게 일요일 시작
      const daysInMonth = new Date(y, m, 0).getDate();
      const cells = [];
      for (let i = 0; i < firstDow; i++) cells.push(null); // 일=0이면 빈 칸 없음
      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const dow = new Date(y, m - 1, d).getDay();
        const today = new Date();
        const isToday = (y === today.getFullYear() && m === today.getMonth()+1 && d === today.getDate());
        const isHoliday = !!(this.holidays && this.holidays[dateStr]);
        const holidayName = isHoliday ? this.holidays[dateStr] : null;
        cells.push({ day: d, date: dateStr, isSun: dow===0, isSat: dow===6, isToday, isHoliday, holidayName });
      }
      while (cells.length % 7 !== 0) cells.push(null);
      return cells;
    },
    get computedTotalStats() {
      const list = this.filteredSummary || [];
      let normalDays=0, usedLeave=0, lateDays=0, totalOvertimeMin=0;
      for (const e of list) {
        normalDays += e.normalDays || 0;
        usedLeave  += e.usedLeave  || 0;
        lateDays   += e.lateDays   || 0;
        totalOvertimeMin += e.totalOvertimeMin || 0;
      }
      return { normalDays, usedLeave, lateDays, totalOvertimeMin, overtimeLabel: this.fmtOvertime(totalOvertimeMin) };
    },
    get filteredDetailRecords() {
      if (!this.attendance.filterEmpId) return this.attendance.detailRecords;
      return this.attendance.detailRecords.filter(r => r.employeeId === this.attendance.filterEmpId);
    },
    // 가로 그리드용 계산 (날짜=열, 직원=행)
    get attendanceGrid() {
      const { year, month } = this.attendance;
      const lastDay = new Date(year, month, 0).getDate();
      const m = String(month).padStart(2, '0');
      const dates = [];
      for (let d = 1; d <= lastDay; d++) {
        const ds = `${year}-${m}-${String(d).padStart(2,'0')}`;
        const dt = new Date(ds + 'T00:00:00');
        const holiday = this.holidays[ds] || null;
        dates.push({ dateStr: ds, day: d, dayOfWeek: dt.getDay(), holiday });
      }
      const rows = this.filteredSummary.map(emp => {
        const map = {};
        for (const r of (emp.records || [])) map[r.date] = r;
        return { name: emp.employeeName, emp, map };
      });
      return { dates, rows };
    },

    get selectedCatType() { const c = this.categories.find(c => c.id === this.newItem.categoryId); return c ? (c.pricingType||'QTY') : ''; },
    get availableOptions() { const id = this.newItem.categoryId; if(!id) return []; return this.options.filter(o => Array.isArray(o.categoryIds) && o.categoryIds.length > 0 && o.categoryIds.includes(id)); },
    get itemEditAvailableOptions() { const id = this.itemEditPopup.categoryId; if(!id) return []; return this.options.filter(o => Array.isArray(o.categoryIds) && o.categoryIds.length > 0 && o.categoryIds.includes(id)); },
    get selectedVendor() { if(!this.quoteHeader.vendorId) return null; return this.vendors.find(v=>v.id===this.quoteHeader.vendorId)||null; },
    get quoteTotals() { let s=0,p=0; for(const i of this.quoteItems) { s+=i.amount||0; p+=((i.purchasePrice||0)*(i.qty||1)); } const v=Math.round(s*0.1); return {supplyTotal:s,purchaseTotal:p,margin:s-p,vatTotal:v,grandTotal:s+v}; },

    // 전화번호 포맷팅: 숫자만 남기고 자동 하이픈
    formatPhoneValue(val) {
      const digits = val.replace(/\D/g, '').slice(0, 11);
      if (digits.length <= 3) return digits;
      if (digits.length <= 7) return digits.slice(0,3) + '-' + digits.slice(3);
      return digits.slice(0,3) + '-' + digits.slice(3, 7) + '-' + digits.slice(7);
    },
    onPhoneInput(model, $el) {
      const formatted = this.formatPhoneValue($el.value);
      $el.value = formatted;
      // model에 직접 할당
      if (model === 'register') this.registerForm.phone = formatted;
      else if (model === 'profile') this.profileEditForm.phone = formatted;
      else if (model === 'createUser') this.createUserForm.phone = formatted;
    },

    async init() {
      // ── 브라우저 히스토리 API 연동 (뒤로가기 버튼이 앱을 나가지 않고 이전 탭으로) ──
      // popstate 로 복원할 때는 _suppressHashUpdate=true 를 켜서 재push 방지 (무한루프 차단)
      this._suppressHashUpdate = false;

      // 워크스페이스 공유 링크로 진입한 경우 (/workspace/view/:token → 서버가 /?wsopen=<pageId>#workspace 로 리디렉트)
      // → localStorage 의 ws:lastPageId 에 저장해서 워크스페이스 탭이 자동으로 해당 페이지 열도록
      try {
        const params = new URLSearchParams(window.location.search);
        const wsOpen = params.get('wsopen');
        if (wsOpen) {
          localStorage.setItem('ws:lastPageId', String(wsOpen));
          // URL 에서 ?wsopen= 만 제거 (해시는 유지)
          const newUrl = window.location.pathname + window.location.hash;
          history.replaceState(null, '', newUrl);
        }
      } catch(e) { console.warn('[app] wsopen 처리 실패:', e); }

      // 초기 진입 시 URL hash 가 있으면 그 탭으로 이동 (공유 링크로 바로 들어온 경우)
      try {
        const initHashTab = (window.location.hash || '').replace('#', '');
        if (initHashTab && this.tabs.find(t => t.id === initHashTab)) {
          this._suppressHashUpdate = true;
          this.currentTab = initHashTab;
          setTimeout(() => { this._suppressHashUpdate = false; }, 0);
        }
      } catch(e) {}

      // 뒤로가기/앞으로가기 버튼 감지 → URL hash 읽어서 탭 복원
      window.addEventListener('popstate', () => {
        const tab = (window.location.hash || '').replace('#', '') || 'home';
        if (tab !== this.currentTab && this.tabs.find(t => t.id === tab)) {
          this._suppressHashUpdate = true;
          this.currentTab = tab;
          // 다음 틱에 플래그 해제 (watch 발동 후)
          this.$nextTick(() => { this._suppressHashUpdate = false; });
        }
      });

      // 탭 변경 감시: localStorage 저장 + URL hash + 뱃지 초기화
      this.$watch('currentTab', (val, oldVal) => {
        // '견적 작성' 탭은 history로 리다이렉트 (팝업은 버튼으로만 열기)
        if (val === 'quote') {
          this.$nextTick(() => { this.currentTab = 'history'; });
          return;
        }
        try {
          if (REMEMBERED_TABS.includes(val)) {
            localStorage.setItem('currentTab', val);
          } else {
            localStorage.removeItem('currentTab');
          }
        } catch(e) { console.warn('[app] $watch save failed:', e); }

        // URL hash 업데이트 (popstate 로 인한 변경이 아닐 때만)
        if (!this._suppressHashUpdate && oldVal !== undefined) {
          try {
            const targetHash = (val === 'home') ? '' : '#' + val;
            if (window.location.hash !== targetHash) {
              history.pushState({ tab: val }, '', window.location.pathname + window.location.search + targetHash);
            }
          } catch(e) {}
        }

        // 공지사항 탭 진입 시 뱃지 초기화
        if (val === 'notices') this.navBadges.notices = 0;
        // 결재 탭 진입 시 뱃지 초기화
        if (val === 'approval') this.navBadges.approval = 0;
      });
      // 초기 로드 시 'quote' 탭이면 history로 전환 (팝업 자동오픈 제거)
      if (this.currentTab === 'quote') {
        this.currentTab = 'history';
      }
      // Ctrl+V 이미지 붙여넣기 전역 리스너
      document.addEventListener('paste', (e) => this.handlePaste(e));
      // 로그인 상태 확인
      try {
        const r = await fetch('/api/auth/me');
        const me = await r.json();
        if (me.loggedIn) {
          this.auth = { loggedIn: true, userId: me.userId, name: me.name||me.userId, role: me.role||'user', position: me.position||'', phone: me.phone||'', permissions: me.permissions||[], isTeamLeader: me.isTeamLeader||false };
          this.quoteHeader.vendorManager = this.auth.name + (this.auth.position ? ' ' + this.auth.position : '') + (this.auth.phone ? ' ' + this.auth.phone : '');
          // 급여 탭 가용성 체크 (관리자 PC 외엔 메뉴 자체를 숨김)
          try {
            const sa = await fetch('/api/salary-availability');
            if (sa.ok) {
              const sj = await sa.json();
              this.salaryAvailable = !!sj.available;
              this.salaryMode = sj.mode || 'local';
            }
          } catch(e) { this.salaryAvailable = false; }
          await this.loadData();
          if (!this.tabs.find(t => t.id === this.currentTab)) this.currentTab = 'home';
          // 홈 탭이 현재 보이면 즉시 대시보드 데이터 로드
          if (this.currentTab === 'home') { try { this.loadHomeDashboard(); } catch(e) {} }
          // 알림 폴링 시작
          this.startNotificationPolling();
        }
      } catch(e) {}
      // 이전 로그인 아이디 프리필
      const saved = localStorage.getItem('login_userId');
      if (saved) this.loginForm.userId = saved;
    },

    // ── 알림 폴링 (사이드바 뱃지 + 브라우저 알림) ───────────────
    startNotificationPolling() {
      // 즉시 1회 실행
      this._pollNotifications();
      // 30초마다 반복
      setInterval(() => this._pollNotifications(), 30000);
      // 브라우저 알림 권한 요청 (관리자만)
      if (this.auth.role === 'admin' && 'Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
      }
    },
    async _pollNotifications() {
      try {
        // ── 결재 미처리 건수 ──
        const r1 = await fetch('/api/approvals?status=pending');
        if (r1.ok) {
          const list = await r1.json();
          // 관리자: 전체 pending / 일반: 본인에게 온 것만
          let count = 0;
          if (this.auth.role === 'admin') {
            count = (list || []).length;
          } else {
            count = (list || []).filter(a => a.approverId === this.auth.userId || a.requesterId === this.auth.userId).length;
          }
          // 새로 늘어난 경우 인앱 팝업 + 브라우저 알림
          if (count > this._notifLastApproval && this._notifLastApproval >= 0) {
            // 나에게 온 새 결재 요청 찾기 (approverId 기준)
            const myPending = (list || []).filter(a => a.approverId === this.auth.userId && a.status === 'pending');
            // 인앱 팝업 (결재 탭이 아닐 때만)
            if (this.currentTab !== 'approval') {
              const newCount = count - this._notifLastApproval;
              if (this.approvalNotif._timer) clearTimeout(this.approvalNotif._timer);
              this.approvalNotif = {
                show: true,
                count: myPending.length || newCount,
                items: myPending.slice(0, 3),
                _timer: setTimeout(() => { this.approvalNotif.show = false; }, 8000)
              };
            }
            // 브라우저 알림
            if ('Notification' in window && Notification.permission === 'granted') {
              const n = new Notification('📋 결재 요청', {
                body: `미처리 결재 ${count}건이 있습니다`,
                icon: '/favicon.ico'
              });
              n.onclick = () => { this.currentTab = 'approval'; window.focus(); n.close(); };
            }
          }
          this._notifLastApproval = count;
          this.navBadges.approval = count;
        }
      } catch(e) {}
      try {
        // ── 공지사항 미확인 건수 ──
        const r2 = await fetch('/api/notices');
        if (r2.ok) {
          const list = await r2.json();
          // 최근 7일 이내 공지 중 현재 탭이 notices가 아닌 경우 뱃지 표시
          const weekAgo = new Date(Date.now() - 7*24*60*60*1000).toISOString();
          const recent = (list || []).filter(n => n.createdAt && n.createdAt > weekAgo);
          // 현재 notices 탭 보고 있으면 뱃지 제거
          this.navBadges.notices = (this.currentTab === 'notices') ? 0 : recent.length;
        }
      } catch(e) {}
    },

      if (this.auth.role === 'admin') tasks.push(this.loadAdminUsers());
      await Promise.all(tasks);
      // 출퇴근 현재 월 데이터 백그라운드 프리로드 (탭 진입 전 메모리 캐시)

    // ── 로그인 ──
    async doLogin() {
      this.loginForm.error = ''; this.loginForm.loading = true;
      try {
        const r = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' },

        this.quoteHeader.vendorManager = this.auth.name + (this.auth.position ? ' ' + this.auth.position : '') + (this.auth.phone ? ' ' + this.auth.phone : '');

    // ══════════════════════════════════════════════════════
    // 홈 대시보드 데이터 로드 (dashboard API + 오늘 출근자 병렬)
    // ══════════════════════════════════════════════════════
    async loadHomeDashboard(force = false) {
      // 캐시: 30초 이내 재호출이면 skip (force=true 면 강제)
      if (!force && this.homeDashboard.lastLoadedAt && (Date.now() - this.homeDashboard.lastLoadedAt < 30_000)) return;
      this.homeDashboard.loading = true;
      try {
        // 오늘 날짜 (YYYY-MM-DD)
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        const todayStr = `${yyyy}-${mm}-${dd}`;
        const isAdmin = this.auth.role === 'admin';

        // ── 공통: 공지 + 내가 결재해야 할 문서(pending) ──
        // 직원이어도 본인에게 온 결재 대기 목록은 보여줘야 함
        const commonTasks = [
          fetch('/api/dashboard').then(r => r.ok ? r.json() : null),
          fetch('/api/approvals/?filter=pending').then(r => r.ok ? r.json() : null),
        ];

        if (isAdmin) {
          // ── 관리자: 전사 KPI + 오늘 출근자 수 + 연동/검수 위젯 ──
          commonTasks.push(fetch(`/api/attendance/records?from=${todayStr}&to=${todayStr}`).then(r => r.ok ? r.json() : null));
          commonTasks.push(fetch('/api/sync-status').then(r => r.ok ? r.json() : null));
          const [dashR, pendR, attR, syncR] = await Promise.allSettled(commonTasks);
          if (syncR && syncR.status === 'fulfilled' && syncR.value && syncR.value.ok) {
            this.syncStatus = { items: syncR.value.items || [], summary: syncR.value.summary || null };
          }

          if (dashR.status === 'fulfilled' && dashR.value) {
            this.homeDashboard.stats = dashR.value.stats || {};
            this.homeDashboard.recentNotices = dashR.value.recentNotices || [];
          }
          if (pendR.status === 'fulfilled' && Array.isArray(pendR.value)) {
            this.homeDashboard.pendingApprovals = pendR.value.slice(0, 5);
            // 관리자는 전사 미처리결재 숫자를 stats.미처리결재 에서 쓰지만
            // 본인이 승인해야 할 건도 알려주려면 pendingApprovals.length 사용
          }
          if (attR.status === 'fulfilled' && attR.value) {
            const recs = attR.value.records || attR.value.data || (Array.isArray(attR.value) ? attR.value : []);
            const names = new Set();
            for (const r of recs) {
              const n = r.name || r.Name || r.employeeName;
              if (n) names.add(n);
            }
            this.homeDashboard.todayAttendees = names.size;
          } else {
            this.homeDashboard.todayAttendees = null;
          }
        } else {
          // ── 일반 직원: 내 출근/연차/결재 + 공지 + 내가 결재할 문서 ──
          commonTasks.push(
            fetch(`/api/attendance/summary?year=${yyyy}&month=${today.getMonth() + 1}`).then(r => r.ok ? r.json() : null),
            fetch(`/api/leave/summary?year=${yyyy}`).then(r => r.ok ? r.json() : null),
            fetch('/api/approvals/?filter=mine').then(r => r.ok ? r.json() : null),
          );
          const [dashR, pendR, attSumR, leaveR, mineR] = await Promise.allSettled(commonTasks);

          // 공지 (전사 공통)
          if (dashR.status === 'fulfilled' && dashR.value) {
            this.homeDashboard.recentNotices = dashR.value.recentNotices || [];
            // stats 는 직원에게 노출하지 않음 (매출/전사결재 등 포함)
            this.homeDashboard.stats = {};
          }
          // 내가 결재할 문서
          if (pendR.status === 'fulfilled' && Array.isArray(pendR.value)) {
            this.homeDashboard.pendingApprovals = pendR.value.slice(0, 5);
          }
          // 내 이번달 출근 집계 (summary 는 [{employeeName, normalDays, lateDays, annualDays, halfAM, halfPM, absentDays}] 배열)
          if (attSumR.status === 'fulfilled' && Array.isArray(attSumR.value)) {
            const mine = attSumR.value.find(r => r.employeeName === this.auth.name) || attSumR.value[0] || {};
            this.homeDashboard.myAttendance = {
              normalDays: mine.normalDays || 0,
              lateDays: mine.lateDays || 0,
              annualDays: mine.annualDays || 0,
              halfAM: mine.halfAM || 0,
              halfPM: mine.halfPM || 0,
              absentDays: mine.absentDays || 0,
            };
          }
          // 내 연차 잔여
          if (leaveR.status === 'fulfilled' && Array.isArray(leaveR.value)) {
            const mineL = leaveR.value.find(r => r.name === this.auth.name) || leaveR.value[0] || {};
            this.homeDashboard.myLeave = {
              totalLeave: mineL.totalLeave || 0,
              usedDays: mineL.usedDays || 0,
              remainingDays: mineL.remainingDays !== undefined ? mineL.remainingDays : 0,
            };
          }
          // 내가 올린 결재 (mine) → 상태별 카운트
          if (mineR.status === 'fulfilled' && Array.isArray(mineR.value)) {
            const counts = { pending: 0, approved: 0, rejected: 0 };
            for (const d of mineR.value) {
              const st = d.status || 'pending';
              if (st === 'pending') counts.pending++;
              else if (st === 'approved') counts.approved++;
              else if (st === 'rejected') counts.rejected++;
            }
            this.homeDashboard.myApprovals = counts;
          }
        }

        this.homeDashboard.lastLoadedAt = Date.now();

        // 관리자는 월별 인건비 추이 그래프도 함께 로드
        if (isAdmin) {
          // Chart.js 가 로드될 때까지 잠깐 대기 후 호출
          this.$nextTick(() => { try { this.loadCostTrend(); } catch(e) { console.warn('[costTrend] load 실패:', e); } });
        }
      } catch (e) {
        console.warn('[home] loadHomeDashboard 실패:', e);
      } finally {
        this.homeDashboard.loading = false;
      }
    },

    // ════ 월별 인건비 추이 그래프 (관리자 홈) ════
    async loadCostTrend() {
      if (this.auth.role !== 'admin') return;
      this.costTrend.loading = true;
      try {
        const months = parseInt(this.costTrend.months, 10) || 12;
        const company = this.costTrend.company || 'all';
        const r = await fetch(`/api/salary/cost-trend?months=${months}&company=${encodeURIComponent(company)}`);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const data = await r.json();
        this.costTrend.raw = data;
        this.costTrend.companies = data.companies ? data.companies.map(c => ({ id: c.companyId, name: c.companyName })) : [];

        // 데이터 있는지 체크: 총 grossPay 가 전부 0 이면 "데이터 없음" 표시
        const total = Array.isArray(data.total) ? data.total : [];
        const hasAny = total.some(m => (m.grossPay || 0) > 0 || (m.headcount || 0) > 0);
        this.costTrend.hasData = hasAny;

        if (hasAny) {
          // summary 계산
          const metricVals = total.map(m => m.grossPay || 0);
          const sumTotal = metricVals.reduce((a, b) => a + b, 0);
          const avg = metricVals.length ? Math.round(sumTotal / metricVals.length) : 0;
          const last = metricVals[metricVals.length - 1] || 0;
          const prev = metricVals[metricVals.length - 2] || 0;
          const momPct = prev > 0 ? ((last - prev) / prev) * 100 : 0;
          const headVals = total.map(m => m.headcount || 0);
          const avgHead = headVals.length ? (headVals.reduce((a, b) => a + b, 0) / headVals.length) : 0;
          this.costTrend.summary = { total: sumTotal, avg, momPct, avgHead };
          this.$nextTick(() => this.renderCostTrendChart());
        } else {
          // 차트 있으면 파괴
          if (this.costTrend._chart) { try { this.costTrend._chart.destroy(); } catch(e) {} this.costTrend._chart = null; }
        }
      } catch (e) {
        console.warn('[costTrend] 로드 실패:', e);
        this.costTrend.hasData = false;
      } finally {
        this.costTrend.loading = false;
      }
    },

    renderCostTrendChart() {
      if (typeof Chart === 'undefined') {
        console.warn('[costTrend] Chart.js 로드 안됨');
        return;
      }
      const data = this.costTrend.raw;
      if (!data || !Array.isArray(data.months)) return;
      const canvas = document.getElementById('costTrendChart');
      if (!canvas) return;

      // 기존 차트 제거
      if (this.costTrend._chart) {
        try { this.costTrend._chart.destroy(); } catch(e) {}
        this.costTrend._chart = null;
      }

      const metric = this.costTrend.metric || 'grossPay';
      const metricLabels = {
        grossPay: '지급총액',
        netPay: '실지급액',
        totalDeductions: '공제총액',
        headcount: '인원수',
      };
      const isHeadcount = metric === 'headcount';

      // 회사별 색상
      const palette = ['#4f6ef7', '#10b981', '#f59e0b', '#8b5cf6', '#ef4444', '#0ea5e9', '#ec4899'];
      const companies = data.companies || [];
      const labels = data.months.map(m => m.slice(2)); // "26-04" 형태

      // 회사별 bar 데이터 (stacked)
      const barDatasets = companies.map((c, i) => ({
        type: 'bar',
        label: c.companyName,
        data: (c.monthly || []).map(m => m[metric] || 0),
        backgroundColor: palette[i % palette.length] + 'cc',
        borderColor: palette[i % palette.length],
        borderWidth: 1,
        stack: 'cost',
        borderRadius: 4,
      }));

      // 전체 합계 line (지급총액 보는 경우 인원수 라인도 함께)
      const totals = (data.total || []).map(m => m[metric] || 0);
      const headcountLine = (data.total || []).map(m => m.headcount || 0);

      const datasets = [...barDatasets];
      if (!isHeadcount) {
        datasets.push({
          type: 'line',
          label: '전 직원 수',
          data: headcountLine,
          borderColor: '#ef4444',
          backgroundColor: 'rgba(239,68,68,0.1)',
          borderWidth: 2,
          tension: 0.3,
          yAxisID: 'y1',
          pointRadius: 3,
          pointBackgroundColor: '#ef4444',
        });
      }

      const ctx = canvas.getContext('2d');
      this.costTrend._chart = new Chart(ctx, {
        data: { labels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } },
            tooltip: {
              callbacks: {
                label: (ctx) => {
                  const v = ctx.parsed.y;
                  if (ctx.dataset.label === '전 직원 수') return `${ctx.dataset.label}: ${v}명`;
                  return `${ctx.dataset.label}: ${(v || 0).toLocaleString()}원`;
                },
              },
            },
          },
          scales: {
            y: {
              stacked: true,
              beginAtZero: true,
              ticks: {
                callback: (v) => isHeadcount ? v + '명' : (v >= 1e8 ? (v / 1e8).toFixed(1) + '억' : v >= 1e4 ? (v / 1e4).toFixed(0) + '만' : v),
                font: { size: 10 },
              },
              title: { display: true, text: metricLabels[metric] || '금액', font: { size: 11 } },
            },
            x: { stacked: true, ticks: { font: { size: 10 } } },
            ...(isHeadcount ? {} : {
              y1: {
                position: 'right',
                beginAtZero: true,
                grid: { drawOnChartArea: false },
                ticks: { callback: (v) => v + '명', font: { size: 10 } },
                title: { display: true, text: '인원', font: { size: 11 } },
              },
            }),
          },
        },
      });
    },

    // ── 코드 자동생성 ──
    generateCode(name) {
      if (!name || !name.trim()) return '';
      name = name.trim();
      // 1) 영문으로 시작하는 경우 (PE, PVC 등) → 앞 2~3글자 대문자
      const engStart = name.match(/^([A-Za-z]{2,})/);
      if (engStart) return engStart[1].slice(0, 3).toUpperCase();
      // 2) 알려진 한국어 → 영문 코드 사전 (긴 키 우선 매칭)
      const dict = [
        ['각목현수막','GH'],['현수막','BN'],['배너','BN'],['수막','BN'],
        ['게시판','BB'],['화이트보드','WB'],['보드','BD'],
        ['기타','ETC'],
        ['폼보드','FB'],['폼','FM'],
        ['포맥스','FM'],['포멕스','FM'],
        ['후렉스','FX'],['플렉스','FX'],['플렉','FX'],
        ['안전조끼','SV'],['조끼','VS'],
        ['안전모','HM'],['헬멧','HM'],
        ['고무자석','MG'],['자석','MG'],['마그넷','MG'],
        ['아크릴용품','AC'],['아크릴','AC'],
        ['PVC망','PV'],['PVC','PV'],
        ['근로자휴게실','RS'],['휴게실','RS'],['쉼터','RS'],
        ['간판','SB'],['사인보드','SB'],
        ['표지판','SG'],['사인','SG'],
        ['스티커','ST'],['스티카','ST'],
        ['공도구','TL'],['공구','TL'],['도구','TL'],
        ['타포린','TP'],['타폴린','TP'],
        ['윈드배너','WN'],['현수기','FL'],['롤업','RU'],
        ['배너스탠드','BS'],['명함','BC'],['리플렛','LF'],
        ['전단지','FL'],['포스터','PS'],['현수막기','FL'],
      ];
      for (const [key, code] of dict) {
        if (name.includes(key)) return code;
      }
      // 3) 한국어 초성 → 영문 로마자 (2글자 추출)
      const CHOSEONG = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
      const ROMAN    = ['G', 'K', 'N', 'D', 'D', 'R', 'M', 'B', 'B', 'S', 'S', '', 'J', 'J', 'C', 'K', 'T', 'P', 'H'];
      let result = '';
      for (const ch of name) {
        const cp = ch.charCodeAt(0);
        if (cp >= 0xAC00 && cp <= 0xD7A3) {
          const r = ROMAN[Math.floor((cp - 0xAC00) / (21 * 28))];
          if (r) result += r;
        } else if (/[A-Za-z]/.test(ch)) {
          result += ch.toUpperCase();
        }
        if (result.length >= 2) break;
      }
      if (!result) return 'XX';
      if (result.length === 1) return result + 'X';
      return result.slice(0, 2);
    },
    autoFillCode() {
      // 코드를 사용자가 직접 입력하지 않은 경우에만 자동 생성
      if (this.newCat._codeEdited) return;
      const suggested = this.generateCode(this.newCat.name);
      this.newCat.code = this.resolveCodeConflict(suggested);
    },
    resolveCodeConflict(code, excludeId = null) {
      if (!code) return code;
      const used = this.categories.filter(c => excludeId ? c.id !== excludeId : true).map(c => (c.code||'').toUpperCase());
      if (!used.includes(code.toUpperCase())) return code;
      for (let i = 2; i <= 9; i++) { const t = code + i; if (!used.includes(t.toUpperCase())) return t; }
      return code;
    },
    isDupCode(code, excludeId = null) {
      if (!code) return false;
      const used = this.categories.filter(c => excludeId ? c.id !== excludeId : true).map(c => (c.code||'').toUpperCase());
      return used.includes(code.toUpperCase());
    },

      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;

    formatPriceSummary(p) {
      if (!p) return '<span style="color:#9ca3af;">-</span>';
      const parts = [];
      if (p.fixedPrice) parts.push(`고정 ${p.fixedPrice.toLocaleString()}원`);
      if (p.qtyPrice) parts.push(`수량 ${p.qtyPrice.toLocaleString()}원`);
      if (p.tiers && p.tiers.length) parts.push(`구간 ${p.tiers.length}개`);
      if (p.widthTiers && p.widthTiers.length) parts.push(`폭 ${p.widthTiers.length}개`);
      return parts.length ? parts.join(' / ') : '<span style="color:#9ca3af;">-</span>';
    },

    async saveVendorPrice(catId, overrides) {
      if (!this.pricingVendorId) {
        // 기본 단가 수정 → 카테고리 직접 업데이트
        const cat = this.categories.find(c => c.id === catId);
        if (!cat) return;
        const update = {};
        if (overrides.tiers !== undefined) update.tiers = overrides.tiers;
        if (overrides.widthTiers !== undefined) update.widthTiers = overrides.widthTiers;
        if (overrides.qtyPrice !== undefined) update.qtyPrice = overrides.qtyPrice;
        if (overrides.fixedPrice !== undefined) update.fixedPrice = overrides.fixedPrice;
        const r = await fetch('/api/categories/' + catId, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(update) });
        if (r.ok) {
          const updated = await r.json();
          const idx = this.categories.findIndex(c => c.id === catId);
          if (idx !== -1) this.categories[idx] = updated;
        }
        return;
      }
      // 업체별 단가 수정
      const vp = this.getVendorPriceForCat(catId) || {};
      const cat = this.categories.find(c => c.id === catId);
      const body = {
        vendorId: this.pricingVendorId, categoryId: catId,
        tiers: overrides.tiers !== undefined ? overrides.tiers : (vp.tiers || cat?.tiers || []),
        widthTiers: overrides.widthTiers !== undefined ? overrides.widthTiers : (vp.widthTiers || cat?.widthTiers || []),
        qtyPrice: overrides.qtyPrice !== undefined ? overrides.qtyPrice : (vp.qtyPrice || cat?.qtyPrice || 0),
        fixedPrice: overrides.fixedPrice !== undefined ? overrides.fixedPrice : (vp.fixedPrice || cat?.fixedPrice || 0)
      };
      await fetch('/api/vendor-prices', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      await this.loadVendorPrices(this.pricingVendorId);
    },
    async addVendorTier(catId) {
      const cat = this.categories.find(c => c.id === catId);
      const current = this.getDisplayTiers(cat || { id: catId, tiers: [] });
      if (current.length >= 5) { this.showToast('최대 5개까지 추가 가능합니다','error'); return; }
      const tiers = [...current, { areaMin: 0, areaMax: null, pricePerSqm: 0 }];
      await this.saveVendorPrice(catId, { tiers });
    },
    async updateVendorTier(catId, ti, field, value) {
      const cat = this.categories.find(c => c.id === catId);
      const tiers = [...this.getDisplayTiers(cat || { id: catId, tiers: [] })];
      tiers[ti] = { ...tiers[ti], [field]: value === '' ? null : Number(value) };
      await this.saveVendorPrice(catId, { tiers });
    },
    async removeVendorTier(catId, ti) {
      const cat = this.categories.find(c => c.id === catId);
      const tiers = [...this.getDisplayTiers(cat || { id: catId, tiers: [] })];
      tiers.splice(ti, 1);
      await this.saveVendorPrice(catId, { tiers });
    },
    // ── 폭별 m당 단가 (LENGTH) ──
    async addWidthTier(catId) {
      const cat = this.categories.find(c => c.id === catId);
      const current = this.getDisplayWidthTiers(cat || { id: catId, widthTiers: [] });
      const lastWidth = current.length > 0 ? Number(current[current.length-1].widthMm || 0) + 100 : 300;
      const widthTiers = [...current, { widthMm: lastWidth, pricePerM: 0 }];
      await this.saveVendorPrice(catId, { widthTiers });
    },
    async addWidthTierBulk(catId) {
      const cat = this.categories.find(c => c.id === catId);
      const current = this.getDisplayWidthTiers(cat || { id: catId, widthTiers: [] });
      if (current.length > 0 && !confirm('기존 단가를 덮어쓰시겠습니까?')) return;
      const widthTiers = [];
      for (let w = 300; w <= 1800; w += 100) {
        widthTiers.push({ widthMm: w, pricePerM: 0 });
      }
      await this.saveVendorPrice(catId, { widthTiers });
    },
    async updateWidthTier(catId, wi, field, value) {
      const cat = this.categories.find(c => c.id === catId);
      const widthTiers = [...this.getDisplayWidthTiers(cat || { id: catId, widthTiers: [] })];
      widthTiers[wi] = { ...widthTiers[wi], [field]: Number(value) || 0 };
      await this.saveVendorPrice(catId, { widthTiers });
    },
    async removeWidthTier(catId, wi) {
      const cat = this.categories.find(c => c.id === catId);
      const widthTiers = [...this.getDisplayWidthTiers(cat || { id: catId, widthTiers: [] })];
      widthTiers.splice(wi, 1);
      await this.saveVendorPrice(catId, { widthTiers });
    },

      await fetch(`/api/categories/${catId}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ variants }) });
      await this.loadCategories();
    },

      await fetch(`/api/categories/${catId}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ variants }) });

    async createOption() { await fetch('/api/options',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(this.newOpt)}); this.showAddOption=false; this.newOpt={code:'',name:'',price:0,unit:'개',categoryIds:[],pricingType:'fixed',variants:[]}; await this.loadOptions(); },

      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = async () => {
          try {
            const r = await fetch('/api/upload-image', {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ imageData: reader.result, fileName })
            });
            if (r.ok) { const { url } = await r.json(); resolve(url); }
            else { this.showToast('업로드 실패', 'error'); resolve(null); }
          } catch(e) { this.showToast('업로드 실패', 'error'); resolve(null); }

        reader.readAsDataURL(file);
      });

    // ── 인라인 품목: 카테고리 선택 ──
    selectNewRowCategory(cat) {
      this.newRow.categoryId = cat.id;
      this.newRow.catSearch = cat.name;
      this.newRow.catOpen = false;
      this.newRow.categoryType = cat.pricingType || 'QTY';
      this.newRow.customName = cat.name;
      if (cat.pricingType === 'SIZE') this.newRow.unitType = 'area';
      else if (cat.pricingType === 'LENGTH') this.newRow.unitType = 'length';

    // ── 인라인 품목: 행 추가 ──
    async addInlineItem() {
      const nr = this.newRow;
      if (!nr.categoryId) return;
      const cat = this.categories.find(c => c.id === nr.categoryId);
      if (!cat) return;

      const catType = nr.categoryType || cat.pricingType || 'QTY';
      let name = nr.customName || cat.name;
      let spec = '';
      let unitPrice = 0;
      let amount = 0;

      if (catType === 'QTY' || catType === 'FIXED' || nr.manualPrice) {
        unitPrice = Number(nr.manualUnitPrice) || 0;
        amount = unitPrice * (Number(nr.qty) || 1);
        spec = nr.customSpec || '';
      } else {
        try {
          const r = await fetch('/api/quote/calculate', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
              categoryId: nr.categoryId,
              widthMm: Number(nr.widthMm) || 0,
              heightMm: Number(nr.heightMm) || 0,
              qty: Number(nr.qty) || 1,
              variantIdx: -1,
              optionSelections: [],
              vendorId: this.quoteHeader.vendorId || ''
            })
          });
          if (r.ok) {
            const calc = await r.json();
            amount = calc.totalExVat || 0;
            unitPrice = Math.round(amount / Math.max(1, Number(nr.qty) || 1));
          }
        } catch(e) { console.error('calc error', e); }

        if (catType === 'SIZE') spec = (nr.widthMm||0) + '×' + (nr.heightMm||0) + 'mm';
        else if (catType === 'LENGTH') spec = (nr.heightMm||0) + '×' + (nr.widthMm||0) + 'mm';
      }

      const itemUnit = (catType === 'SIZE' || catType === 'LENGTH') ? 'ea' : (cat.unit || '개');

      this.quoteItems.push({
        name, spec, unit: itemUnit, qty: Number(nr.qty)||1, unitPrice, amount,
        remark: '', supplier: '', purchasePrice: 0, purchaseMemo: '', purchaseImage: '',
        categoryId: nr.categoryId, categoryType: catType,
        widthMm: Number(nr.widthMm)||0, heightMm: Number(nr.heightMm)||0,
        variantIdx: -1,
        selectedOptions: [], optionQtys: {}, optionVariants: {}, optionAreas: {},
        customName: name, customSpec: spec,
        manualPrice: (catType === 'QTY' || catType === 'FIXED'),
        purchaseQuotes: [], designImage: ''
      });

      this.newRow = {
        categoryId: '', categoryType: 'QTY', catSearch: '', catOpen: false, catHighlight: -1,
        widthMm: 0, heightMm: 0, qty: 1, unitType: 'area',
        manualPrice: false, manualUnitPrice: 0,
        selectedOptions: [], optionQtys: {}, optionVariants: {},
        customName: '', customSpec: ''
      };

      this.showToast('항목이 추가되었습니다');
    },

    // ── 인라인 품목: 재계산 ──
    async recalcInlineItem(idx) {
      const item = this.quoteItems[idx];
      if (!item) return;
      if (item.manualPrice || item.categoryType === 'QTY' || item.categoryType === 'FIXED') {
        item.amount = (item.unitPrice || 0) * (item.qty || 1);
        if (item.categoryType === 'SIZE') item.spec = (item.widthMm||0) + '×' + (item.heightMm||0) + 'mm';
        return;
      }
      try {
        const os = (item.selectedOptions || []).map(id => {
          const a = (item.optionAreas||{})[id];
          return {
            optionId: id,
            qty: (item.optionQtys||{})[id] || 1,
            variantIdx: (item.optionVariants||{})[id] !== undefined ? (item.optionVariants||{})[id] : 0,
            areaOverride: (a && a.useCustom) ? { widthMm: Number(a.widthMm)||0, heightMm: Number(a.heightMm)||0 } : null
          };
        });
        const r = await fetch('/api/quote/calculate', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            categoryId: item.categoryId,
            widthMm: Number(item.widthMm) || 0,
            heightMm: Number(item.heightMm) || 0,
            qty: Number(item.qty) || 1,
            variantIdx: item.variantIdx !== undefined ? Number(item.variantIdx) : -1,
            optionSelections: os,
            vendorId: this.quoteHeader.vendorId || ''
          })
        });
        if (r.ok) {
          const calc = await r.json();
          item.amount = calc.totalExVat || 0;
          item.unitPrice = Math.round(item.amount / Math.max(1, item.qty || 1));
          item.remark = calc.optionRemark || '';
          if (item.categoryType === 'SIZE') item.spec = (item.widthMm||0) + '×' + (item.heightMm||0) + 'mm';
          else if (item.categoryType === 'LENGTH') item.spec = (item.heightMm||0) + '×' + (item.widthMm||0) + 'mm';
        }
      } catch(e) { console.error('recalc error', e); }
    },

    // ── 과거단가 검색 (견적 팝업 내) ──
    async searchPastPrices() {
      // 현재 선택된 거래처 이름 가져오기
      const vendorObj = this.vendors?.find(v => v.id === this.quoteHeader?.vendorId);
      this.pastPriceVendorName = vendorObj?.name || '';
      if (!this.pastPriceKeyword && !this.pastPriceVendorName) return;
      this.pastPriceLoading = true;
      this.pastPriceSearched = true;
      this.pastPriceShowOthers = false;
      try {
        const params = new URLSearchParams();
        if (this.pastPriceVendorName) params.set('vendor', this.pastPriceVendorName);
        if (this.pastPriceKeyword) params.set('keyword', this.pastPriceKeyword);
        params.set('limit', '30');
        const res = await fetch('/api/sales-history/search?' + params);
        const data = await res.json();
        this.pastPriceResults = data.vendor_results || [];
        this.pastPriceOthers = data.other_results || [];
      } catch (e) {
        console.error('past price search error:', e);
      }
      this.pastPriceLoading = false;
    },

    prevCalendarMonth() {
      this.calendar.month--;
      if (this.calendar.month < 1) {
        this.calendar.month = 12;
        this.calendar.year--;
      }
    },

    nextCalendarMonth() {
      this.calendar.month++;
      if (this.calendar.month > 12) {
        this.calendar.month = 1;
        this.calendar.year++;
      }
    },

    getCalendarDays() {
      const y = this.calendar.year, m = this.calendar.month;
      const firstDay = new Date(y, m - 1, 1).getDay();
      const lastDay = new Date(y, m, 0).getDate();
      const prevLastDay = new Date(y, m - 1, 0).getDate();

      const days = [];

      // 이전 달의 날짜들
      for (let i = firstDay - 1; i >= 0; i--) {
        days.push({
          dayNum: prevLastDay - i,
          date: null,
          currentMonth: false,
          events: []
        });
      }

      // 현재 달의 날짜들
      for (let i = 1; i <= lastDay; i++) {
        const date = `${y}-${String(m).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
        const events = (this.calendarEvents || []).filter(e => e.날짜 === date);
        days.push({
          dayNum: i,
          date,
          currentMonth: true,
          events
        });
      }

      // 다음 달의 날짜들
      const remaining = 42 - days.length; // 6주 * 7일
      for (let i = 1; i <= remaining; i++) {
        days.push({
          dayNum: i,
          date: null,
          currentMonth: false,
          events: []
        });
      }

      return days;
    },
