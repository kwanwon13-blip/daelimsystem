<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#4f6ef7">
<title>AI 이미지 저장소 — 대림에스엠</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- 아이콘 폰트 셀프호스팅 — 구글/인터넷 상태와 무관하게 아이콘 유지 -->
<link rel="stylesheet" href="/fonts/material-symbols.css" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter','Noto Sans KR',-apple-system,"Apple SD Gothic Neo",sans-serif;background:#f3f4f6;color:#1f2937;font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font:inherit}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}
.app{display:grid;grid-template-columns:236px 1fr;height:100vh;overflow:hidden;background:#fff}

/* ── 좌측 사이드바 ── */
.sidebar{background:#fafbfc;border-right:1px solid #e5e7eb;display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:14px 16px;border-bottom:1px solid #eef0f3;display:flex;align-items:center;gap:10px}
.logo{width:30px;height:30px;background:linear-gradient(135deg,#4f6ef7,#7c5cff);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 2px 6px rgba(79,110,247,.3);flex-shrink:0}
.logo .material-symbols-outlined{font-size:18px}
.brand{font-size:14px;font-weight:700;color:#1f2937}
.brand-sub{font-size:10px;color:#9ca3af;margin-top:1px}
.sidebar-scroll{flex:1;overflow-y:auto;padding:10px 10px 16px}
.sidebar-scroll::-webkit-scrollbar{width:6px}
.sidebar-scroll::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:4px}
.nav-section-label{padding:12px 8px 5px;font-size:10.5px;font-weight:600;color:#9ca3af;letter-spacing:.3px;display:flex;align-items:center;justify-content:space-between}
.nav-section-label .add-mini{width:18px;height:18px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;color:#9ca3af;cursor:pointer}
.nav-section-label .add-mini:hover{background:#eef0f3;color:#4f6ef7}
.nav-section-label .add-mini .material-symbols-outlined{font-size:14px}
.nav-item{padding:7px 9px;border-radius:8px;color:#374151;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .08s,color .08s}
.nav-item:hover{background:#eef0f3}
.nav-item.active{background:#eff3ff;color:#4f6ef7;font-weight:600}
.nav-item .material-symbols-outlined{font-size:16px;color:#9ca3af;flex-shrink:0}
.nav-item.active .material-symbols-outlined{color:#4f6ef7}
.nav-item-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.nav-item-count{font-size:10.5px;color:#9ca3af;font-weight:500;flex-shrink:0}
.nav-item.active .nav-item-count{color:#4f6ef7}
.album-edit-btn{width:18px;height:18px;border-radius:5px;display:none;align-items:center;justify-content:center;color:#9ca3af;flex-shrink:0}
.nav-item:hover .album-edit-btn{display:inline-flex}
.album-edit-btn:hover{color:#4f6ef7;background:#fff}
.album-edit-btn .material-symbols-outlined{font-size:13px;color:inherit}
.tag-chips{display:flex;flex-wrap:wrap;gap:5px;padding:4px 8px 0}
.tag-chip{padding:3px 9px;background:#fff;border:1px solid #e5e7eb;border-radius:20px;font-size:11.5px;color:#4b5563;cursor:pointer}
.tag-chip:hover{border-color:#4f6ef7;color:#4f6ef7}
.tag-chip.active{background:#eff3ff;border-color:#4f6ef7;color:#4f6ef7;font-weight:600}
.tag-empty{padding:4px 8px;font-size:11px;color:#bcc2cc}
.sidebar-footer{padding:10px 12px;border-top:1px solid #eef0f3;background:#fafbfc}
.back-btn{width:100%;padding:8px 12px;background:#fff;border:1px solid #e5e7eb;border-radius:8px;color:#4b5563;font-size:12px;font-weight:500;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .08s,border-color .08s}
.back-btn:hover{background:#f3f4f6;border-color:#d1d5db}
.back-btn .material-symbols-outlined{font-size:14px}

/* ── 메인 ── */
.main{display:flex;flex-direction:column;overflow:hidden;background:#fff;position:relative}
.topbar{padding:12px 20px;border-bottom:1px solid #eef0f3;display:flex;align-items:center;gap:12px;flex-shrink:0;flex-wrap:wrap}
.hamburger{display:none;width:32px;height:32px;border-radius:8px;align-items:center;justify-content:center;color:#6b7280;cursor:pointer}
.hamburger:hover{background:#f3f4f6}
.topbar-title{font-size:15px;font-weight:700;color:#1f2937;white-space:nowrap}
.topbar-spacer{flex:1}
.search-wrap{position:relative;min-width:180px}
.search-input{width:100%;padding:8px 10px 8px 32px;background:#f3f4f6;border:1px solid transparent;border-radius:9px;font-size:12.5px;color:#1f2937;outline:none;transition:background .1s,border-color .1s}
.search-input:focus{background:#fff;border-color:#4f6ef7}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:16px;color:#9ca3af;pointer-events:none}
.sort-select{padding:8px 10px;background:#f3f4f6;border:1px solid transparent;border-radius:9px;font-size:12.5px;color:#374151;outline:none;cursor:pointer}
.sort-select:focus{border-color:#4f6ef7;background:#fff}
.btn-primary{height:36px;padding:0 14px;border-radius:9px;background:linear-gradient(135deg,#4f6ef7,#7c5cff);color:#fff;font-size:12.5px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;gap:5px;box-shadow:0 2px 6px rgba(79,110,247,.25);white-space:nowrap}
.btn-primary:hover{box-shadow:0 3px 10px rgba(79,110,247,.35)}
.btn-primary .material-symbols-outlined{font-size:16px}
.usage-pill{padding:6px 11px;background:#fff7ed;border:1px solid #fed7aa;border-radius:14px;font-size:11px;color:#9a3412;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.usage-pill .material-symbols-outlined{font-size:13px}

/* 선택 모드 액션바 */
.selbar{display:none;align-items:center;gap:10px;padding:9px 20px;background:#eff3ff;border-bottom:1px solid #dbe4ff;flex-shrink:0}
.selbar.visible{display:flex}
.selbar-count{font-size:12.5px;font-weight:600;color:#4f6ef7}
.selbar-spacer{flex:1}
.selbar-btn{height:32px;padding:0 11px;border-radius:8px;background:#fff;border:1px solid #d1d5db;color:#374151;font-size:12px;font-weight:500;display:inline-flex;align-items:center;gap:4px}
.selbar-btn:hover{border-color:#4f6ef7;color:#4f6ef7}
.selbar-btn.danger:hover{border-color:#dc2626;color:#dc2626;background:#fef2f2}
.selbar-btn .material-symbols-outlined{font-size:15px}
.selbar-move{position:relative}
.move-menu{display:none;position:absolute;top:38px;left:0;background:#fff;border:1px solid #e5e7eb;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);min-width:180px;z-index:30;padding:5px;max-height:280px;overflow-y:auto}
.move-menu.visible{display:block}
.move-menu button{display:flex;align-items:center;gap:7px;width:100%;padding:8px 10px;border-radius:6px;font-size:12.5px;color:#374151;text-align:left}
.move-menu button:hover{background:#f3f4f6}
.move-menu .material-symbols-outlined{font-size:15px;color:#9ca3af}

/* 그리드 */
.grid-scroll{flex:1;overflow-y:auto;padding:18px 20px 40px}
.grid-scroll::-webkit-scrollbar{width:8px}
.grid-scroll::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:4px}
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
.tile{background:#fff;border:1px solid #e9ebef;border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color .12s,box-shadow .12s,transform .08s;position:relative;display:flex;flex-direction:column}
.tile:hover{border-color:#4f6ef7;box-shadow:0 4px 16px rgba(79,110,247,.12)}
.tile.selected{border-color:#4f6ef7;box-shadow:0 0 0 2px #4f6ef7}
.tile-thumb{position:relative;width:100%;aspect-ratio:1/1;background:#f3f4f6;overflow:hidden;display:flex;align-items:center;justify-content:center}
.tile-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.tile-thumb .ph{color:#cbd1da}
.tile-thumb .ph .material-symbols-outlined{font-size:34px}
.tile-fav{position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.92);display:inline-flex;align-items:center;justify-content:center;color:#9ca3af;box-shadow:0 1px 4px rgba(0,0,0,.12);z-index:3}
.tile-fav:hover{color:#f59e0b}
.tile-fav.on{color:#f59e0b}
.tile-fav .material-symbols-outlined{font-size:18px;font-variation-settings:'FILL' 1}
.tile-fav.off .material-symbols-outlined{font-variation-settings:'FILL' 0}
.tile-check{position:absolute;top:8px;left:8px;width:24px;height:24px;border-radius:7px;background:rgba(255,255,255,.92);border:1.5px solid #d1d5db;display:inline-flex;align-items:center;justify-content:center;color:transparent;box-shadow:0 1px 4px rgba(0,0,0,.1);z-index:3}
.tile-check:hover{border-color:#4f6ef7}
.tile-check.on{background:#4f6ef7;border-color:#4f6ef7;color:#fff}
.tile-check .material-symbols-outlined{font-size:16px}
.tile-meta{padding:9px 11px 11px}
.tile-title{font-size:12.5px;font-weight:600;color:#1f2937;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tile-sub{font-size:10.5px;color:#9ca3af;margin-top:3px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.tile-sub .dot{width:3px;height:3px;border-radius:50%;background:#d1d5db}
.tile-cost{color:#4f6ef7;font-weight:600}

.empty{height:100%;min-height:340px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;color:#9ca3af}
.empty .icon{width:60px;height:60px;border-radius:16px;background:#eff3ff;color:#4f6ef7;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.empty .icon .material-symbols-outlined{font-size:30px}
.empty h3{font-size:16px;font-weight:700;color:#374151;margin-bottom:5px}
.empty p{font-size:13px;max-width:360px;line-height:1.55}
.loading-state{padding:60px 20px;text-align:center;color:#9ca3af;font-size:13px}
.load-more-wrap{display:flex;justify-content:center;padding:20px 0 0}
.load-more{padding:9px 18px;border:1px solid #e5e7eb;border-radius:9px;background:#fff;color:#4b5563;font-size:12.5px;font-weight:500}
.load-more:hover{border-color:#4f6ef7;color:#4f6ef7}

/* ── 상세 슬라이드오버 ── */
.detail-bg{position:fixed;inset:0;background:rgba(15,23,42,.42);display:none;z-index:1200}
.detail-bg.visible{display:block}
.detail{position:fixed;top:0;right:0;bottom:0;width:560px;max-width:96vw;background:#fff;box-shadow:-10px 0 30px rgba(15,23,42,.16);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .22s ease;z-index:1201}
.detail.visible{transform:translateX(0)}
.detail-head{height:54px;padding:10px 16px;border-bottom:1px solid #eef0f3;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0}
.detail-head h3{font-size:14px;font-weight:600;color:#1f2937;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.detail-head-actions{display:flex;gap:6px}
.icon-btn{width:32px;height:32px;border-radius:8px;background:#f3f4f6;color:#6b7280;display:inline-flex;align-items:center;justify-content:center;text-decoration:none}
.icon-btn:hover{background:#e5e7eb;color:#1f2937}
.icon-btn .material-symbols-outlined{font-size:18px}
.detail-body{flex:1;min-height:0;overflow-y:auto;padding:16px;background:#f8fafc}
.detail-body::-webkit-scrollbar{width:8px}
.detail-body::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:4px}
.detail-img{width:100%;background:#fff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;display:flex;align-items:center;justify-content:center;min-height:200px}
.detail-img img{max-width:100%;max-height:46vh;display:block}
.detail-block{background:#fff;border:1px solid #e9ebef;border-radius:12px;padding:14px;margin-top:12px}
.detail-block-label{font-size:11px;font-weight:600;color:#9ca3af;letter-spacing:.3px;margin-bottom:7px;display:flex;align-items:center;gap:5px}
.detail-block-label .material-symbols-outlined{font-size:14px}
.doc-text{font-size:13px;color:#374151;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.doc-text.muted{color:#9ca3af}
.doc-prompt{font-size:12.5px;color:#1f2937;line-height:1.6;white-space:pre-wrap;word-break:break-word;background:#f8fafc;border:1px solid #eef0f3;border-radius:8px;padding:10px 11px;margin-top:8px}
.meta-grid{display:grid;grid-template-columns:auto 1fr;gap:6px 14px;font-size:12.5px}
.meta-grid dt{color:#9ca3af}
.meta-grid dd{color:#374151;word-break:break-word}
.meta-grid dd.cost{color:#4f6ef7;font-weight:600}
.field-label{font-size:11px;font-weight:600;color:#9ca3af;margin:10px 0 5px}
.field-input{width:100%;padding:9px 11px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;color:#1f2937;outline:none;background:#fff}
.field-input:focus{border-color:#4f6ef7}
textarea.field-input{resize:vertical;min-height:64px;line-height:1.5}
.tag-edit-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.tag-edit-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 6px 4px 10px;background:#eff3ff;border:1px solid #dbe4ff;border-radius:20px;font-size:12px;color:#4f6ef7}
.tag-edit-chip .x{width:16px;height:16px;border-radius:50%;background:#fff;color:#6b7280;display:inline-flex;align-items:center;justify-content:center;cursor:pointer}
.tag-edit-chip .x:hover{background:#fecaca;color:#b91c1c}
.tag-edit-chip .x .material-symbols-outlined{font-size:11px}
.save-row{display:flex;gap:8px;margin-top:12px}
.btn-save{flex:1;height:38px;border-radius:9px;background:linear-gradient(135deg,#4f6ef7,#7c5cff);color:#fff;font-size:13px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;gap:5px}
.btn-save:hover{box-shadow:0 3px 10px rgba(79,110,247,.3)}
.btn-save:disabled{background:#e5e7eb;color:#9ca3af;cursor:not-allowed}
.btn-save .material-symbols-outlined{font-size:16px}
.detail-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.act-btn{height:36px;padding:0 13px;border-radius:9px;background:#fff;border:1px solid #e5e7eb;color:#374151;font-size:12.5px;font-weight:500;display:inline-flex;align-items:center;gap:5px}
.act-btn:hover{border-color:#4f6ef7;color:#4f6ef7}
.act-btn.danger:hover{border-color:#dc2626;color:#dc2626;background:#fef2f2}
.act-btn .material-symbols-outlined{font-size:16px}

/* 작은 입력 모달 (앨범 만들기/이름변경) */
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:1500}
.modal-bg.visible{display:flex}
.modal{background:#fff;border-radius:12px;padding:20px;width:380px;max-width:92vw;box-shadow:0 12px 32px rgba(0,0,0,.2)}
.modal h3{font-size:15px;font-weight:600;margin-bottom:12px}
.modal input{width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;outline:none}
.modal input:focus{border-color:#4f6ef7}
.modal-actions{display:flex;gap:8px;justify-content:space-between;margin-top:14px}
.modal-actions-left{display:flex}
.modal-actions-right{display:flex;gap:8px;margin-left:auto}
.modal-actions button{padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600}
.btn-cancel{background:#f3f4f6;color:#4b5563}
.btn-ok{background:linear-gradient(135deg,#4f6ef7,#7c5cff);color:#fff}
.btn-del{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.btn-del:hover{background:#fee2e2}

/* 토스트 */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:#1f2937;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:2000}
.toast.visible{opacity:1;transform:translateX(-50%) translateY(0)}

.sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}

@media (max-width: 820px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;left:-100%;top:0;width:78%;max-width:300px;height:100vh;z-index:100;transition:left .25s;box-shadow:2px 0 18px rgba(0,0,0,.12)}
  .sidebar.open{left:0}
  .sidebar.open ~ .sidebar-backdrop{display:block}
  .hamburger{display:inline-flex}
  .img-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:11px}
  .detail{width:100vw}
  .topbar-title{display:none}
}
@media (max-width: 520px){
  .search-wrap{min-width:120px;flex:1}
  .img-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<div class="app" id="app">
<!-- ── 좌측 사이드바 ── -->
<aside class="sidebar" id="sidebar">
<div class="sidebar-header">
<div class="logo"><span class="material-symbols-outlined">photo_library</span></div>
<div><div class="brand">AI 이미지</div><div class="brand-sub">대림에스엠 ERP</div></div>
</div>
<div class="sidebar-scroll">
<div class="nav-section-label">보기</div>
<div class="nav-item active" data-view="all" id="navAll"><span class="material-symbols-outlined">grid_view</span><span class="nav-item-name">전체</span><span class="nav-item-count" id="cntAll"></span></div>
<div class="nav-item" data-view="favorite" id="navFav"><span class="material-symbols-outlined">star</span><span class="nav-item-name">즐겨찾기</span></div>
<div class="nav-item" data-view="none" id="navNone"><span class="material-symbols-outlined">folder_off</span><span class="nav-item-name">미분류</span></div>

<div class="nav-section-label">앨범<span class="add-mini" id="addAlbumBtn" title="새 앨범"><span class="material-symbols-outlined">add</span></span></div>
<div id="albumList"></div>

<div class="nav-section-label">태그</div>
<div class="tag-chips" id="tagChips"><span class="tag-empty">아직 태그가 없어요</span></div>
</div>
<div class="sidebar-footer">
<a href="/" class="back-btn" id="backBtn"><span class="material-symbols-outlined">arrow_back</span>ERP 메인으로</a>
</div>
</aside>

<!-- ── 메인 ── -->
<main class="main">
<div class="topbar">
<button class="hamburger" id="hamburgerBtn" title="메뉴"><span class="material-symbols-outlined">menu</span></button>
<div class="topbar-title" id="topbarTitle">AI 이미지 저장소</div>
<div class="topbar-spacer"></div>
<div class="usage-pill" id="usagePill" style="display:none;"><span class="material-symbols-outlined">payments</span><span id="usageLabel"></span></div>
<div class="search-wrap">
<span class="material-symbols-outlined search-icon">search</span>
<input type="text" class="search-input" id="searchInput" placeholder="프롬프트·제목·태그 검색…">
</div>
<select class="sort-select" id="sortSelect">
<option value="recent">최신순</option>
<option value="cost">비용순</option>
<option value="fav">즐겨찾기순</option>
</select>
<button class="btn-primary" id="newAlbumBtn"><span class="material-symbols-outlined">create_new_folder</span>새 앨범</button>
</div>

<!-- 다중선택 액션바 -->
<div class="selbar" id="selbar">
<span class="selbar-count" id="selCount">0개 선택</span>
<div class="selbar-spacer"></div>
<div class="selbar-move">
<button class="selbar-btn" id="selMoveBtn"><span class="material-symbols-outlined">drive_file_move</span>앨범 이동</button>
<div class="move-menu" id="moveMenu"></div>
</div>
<button class="selbar-btn" id="selTagBtn"><span class="material-symbols-outlined">sell</span>태그 추가</button>
<button class="selbar-btn" id="selDownloadBtn"><span class="material-symbols-outlined">download</span>다운로드</button>
