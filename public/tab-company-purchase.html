<!-- tab-company-purchase.html — 컴퍼니 매입 장부 (E2E 대체 지향) -->
<!-- 보기: 명세서별/업체별 · 입력: OCR 사진(추후 수기) · 저장/확정/삭제 · 출력: E2E 엑셀 -->
<!-- ⚠️ 컴포넌트 JS는 public/company-purchase.js (템플릿 안 script 미실행 — statements.js 패턴) -->
<div x-data="companyLedgerApp()" x-init="init()" style="height:100%;display:flex;flex-direction:column;background:#eef1f6;">
  <style>
    .cl-head { background:linear-gradient(90deg,#b45309,#d97706); color:#fff; padding:13px 18px; display:flex; align-items:center; gap:12px; }
    .cl-head .ic { width:36px; height:36px; border-radius:10px; background:rgba(255,255,255,.18); display:flex; align-items:center; justify-content:center; font-size:19px; }
    .cl-head .h { font-size:16px; font-weight:850; }
    .cl-head .s { font-size:11px; opacity:.9; margin-top:2px; }
    .cl-head .out { margin-left:auto; font-size:11px; font-weight:800; background:rgba(255,255,255,.18); padding:5px 12px; border-radius:999px; }

    .cl-toolbar { display:flex; align-items:center; gap:8px; padding:10px 16px; background:#fff; border-bottom:1px solid #e5e7eb; flex-wrap:wrap; }
    .cl-btn { padding:7px 13px; border-radius:8px; font-size:12.5px; font-weight:700; border:1px solid #d1d5db; background:#fff; color:#374151; cursor:pointer; display:inline-flex; align-items:center; gap:5px; }
    .cl-btn:hover { background:#f3f4f6; }
    .cl-btn.primary { background:#d97706; border-color:#d97706; color:#fff; }
    .cl-btn.primary:hover { background:#b45309; }
    .cl-btn.upload { background:#fffbeb; border-color:#fde68a; color:#b45309; font-weight:800; }
    .cl-btn.success { background:#16a34a; border-color:#16a34a; color:#fff; }
    .cl-btn.danger { color:#b91c1c; border-color:#fecaca; }
    .cl-btn:disabled { opacity:.45; cursor:not-allowed; }
    .cl-inp { padding:6px 10px; border:1px solid #d1d5db; border-radius:7px; font-size:12px; background:#fff; }

    /* 보기 전환 토글 */
    .cl-views { display:inline-flex; border:1px solid #d1d5db; border-radius:8px; overflow:hidden; }
    .cl-views button { padding:7px 14px; font-size:12px; font-weight:800; border:0; background:#fff; color:#6b7280; cursor:pointer; }
    .cl-views button.on { background:#d97706; color:#fff; }

    .cl-queue { margin:10px 16px 0; padding:9px 13px; background:#fffaf0; border:1px solid #fde2b0; border-radius:9px; font-size:12px; color:#b45309; display:flex; align-items:center; gap:10px; }
    .cl-qbar { flex:1; height:8px; background:#fdebc8; border-radius:99px; overflow:hidden; }
    .cl-qbar .fill { height:100%; background:linear-gradient(90deg,#d97706,#22c55e); transition:width .3s; }

    .cl-body { flex:1; display:grid; grid-template-columns:340px 1fr; min-height:0; overflow:hidden; }
    .cl-list { border-right:1px solid #e5e7eb; background:#fafbfd; display:flex; flex-direction:column; min-height:0; }
    .cl-list-head { padding:9px 14px; font-size:11px; font-weight:800; color:#6b7280; text-transform:uppercase; letter-spacing:.4px; border-bottom:1px solid #eef1f6; display:flex; align-items:center; gap:6px; }
    .cl-list-scroll { overflow-y:auto; flex:1; }

    .cl-row { padding:10px 14px; border-bottom:1px solid #eef1f6; cursor:pointer; border-left:3px solid transparent; }
    .cl-row:hover { background:#fdf6ea; }
    .cl-row.active { background:#fffbeb; border-left-color:#d97706; }
    .cl-row .r1 { display:flex; justify-content:space-between; align-items:center; gap:8px; }
    .cl-row .vendor { font-size:13px; font-weight:800; color:#1f2937; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .cl-row .amt { font-size:13px; font-weight:800; font-variant-numeric:tabular-nums; white-space:nowrap; }
    .cl-row .r2 { display:flex; justify-content:space-between; align-items:center; margin-top:4px; }
    .cl-row .date { font-size:11px; color:#9ca3af; }
    .cl-badge { font-size:10px; font-weight:800; padding:2px 8px; border-radius:999px; }
    .cl-badge.parsed { background:#fef3c7; color:#92400e; }
    .cl-badge.confirmed { background:#d1fae5; color:#065f46; }

    /* 업체별 보기 */
    .cl-vh { padding:10px 14px; border-bottom:1px solid #eef1f6; cursor:pointer; background:#fff; display:flex; align-items:center; gap:8px; }
    .cl-vh:hover { background:#fdf6ea; }
    .cl-vh .arrow { color:#9ca3af; font-size:11px; width:12px; }
    .cl-vh .vname { font-size:13px; font-weight:850; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .cl-vh .vsum { font-size:12px; font-weight:800; font-variant-numeric:tabular-nums; }
    .cl-vh .vcnt { font-size:10.5px; color:#6b7280; }
    .cl-vh .vpend { font-size:10px; font-weight:800; background:#fef3c7; color:#92400e; padding:1px 7px; border-radius:999px; }
    .cl-sub { background:#fafbfd; }
    .cl-sub .cl-row { padding-left:30px; }

    /* 우측 전표 */
    .cl-detail { padding:14px 18px; overflow-y:auto; background:#fff; }
    .cl-meta { display:flex; gap:14px; align-items:flex-end; flex-wrap:wrap; margin-bottom:12px; }
    .cl-meta .k { font-size:11px; color:#9ca3af; margin-bottom:3px; }
    .cl-cols { display:grid; grid-template-columns:280px 1fr; gap:16px; }
    .cl-prev { background:#0e1116; border-radius:9px; min-height:280px; max-height:58vh; display:flex; align-items:center; justify-content:center; overflow:auto; }
    .cl-prev img { max-width:100%; max-height:58vh; }
    .cl-prev .ph { color:#6b7280; font-size:12px; text-align:center; line-height:1.7; padding:26px; }

    table.cl-grid { width:100%; border-collapse:collapse; font-size:12px; }
    table.cl-grid th { background:#f6f8fb; border-bottom:2px solid #e2e8f0; padding:7px; text-align:left; font-weight:800; color:#475569; font-size:11px; white-space:nowrap; }
    table.cl-grid td { border-bottom:1px solid #f1f5f9; padding:0; }
    table.cl-grid input { width:100%; border:0; padding:6px 7px; background:transparent; font-size:12px; outline:none; }
    table.cl-grid input[type=number] { text-align:right; }
    table.cl-grid input:focus { background:#fffbeb; box-shadow:inset 0 0 0 2px #d97706; }
    tr.matched { background:#f0fdf4; } tr.predicted { background:#fefce8; } tr.unknown { background:#fef2f2; }
    tr.skipped td { opacity:.4; }
    tr.skipped input { text-decoration:line-through; }
    .cl-sb { font-size:10px; font-weight:800; padding:1px 7px; border-radius:4px; white-space:nowrap; }
    .cl-sb.matched { background:#d1fae5; color:#065f46; } .cl-sb.predicted { background:#fef3c7; color:#92400e; } .cl-sb.unknown { background:#fee2e2; color:#991b1b; }
    table.cl-grid tfoot td { border-top:2px solid #e2e8f0; background:#f6f8fb; font-weight:850; padding:8px 7px; text-align:right; }
    .cl-empty { padding:50px; text-align:center; color:#9ca3af; font-size:13px; }
    .cl-spin { display:inline-block; width:26px; height:26px; border:3px solid #e5e7eb; border-top-color:#d97706; border-radius:50%; animation:clspin 1s linear infinite; }
    @keyframes clspin { to { transform:rotate(360deg); } }
  </style>

  <!-- 헤더 -->
  <div class="cl-head">
    <div class="ic">📒</div>
    <div>
      <div class="h">컴퍼니 매입 장부</div>
      <div class="s">대림컴퍼니 매입 전용 · 사진 → AI 인식 → 검토·수정 → 확정(학습) → E2E</div>
    </div>
    <div class="out">출력 ▸ E2E 엑셀</div>
  </div>

  <!-- 툴바 -->
  <div class="cl-toolbar">
    <input type="file" x-ref="file" multiple accept="image/*" style="display:none;" @change="onFileInput($event)">
    <button class="cl-btn upload" @click="$refs.file.click()" :disabled="queue.running>0">📎 명세서 사진 추가 (끌어놓기/Ctrl+V)</button>
    <div class="cl-views">
      <button :class="viewMode==='st'?'on':''" @click="viewMode='st'">📄 명세서별</button>
      <button :class="viewMode==='vendor'?'on':''" @click="viewMode='vendor'">🏢 업체별</button>
    </div>
    <input type="month" class="cl-inp" x-model="filterMonth" style="width:130px;" title="월 필터">
    <input class="cl-inp" placeholder="🔍 거래처 검색" x-model="searchQ" style="width:150px;">
    <select class="cl-inp" x-model="filterStatus" title="상태">
      <option value="">전체</option>
      <option value="parsed">검토전</option>
      <option value="confirmed">확정</option>
    </select>
    <button class="cl-btn" @click="loadList()">↻</button>
    <span style="flex:1"></span>
    <span style="font-size:11.5px;font-weight:700;color:#6b7280;" x-text="`${filtered.length}건 · 합계 ${fmt(sumFiltered)}원`"></span>
  </div>

  <!-- 업로드 진행 -->
  <div class="cl-queue" x-show="queue.total>0" x-cloak>
    <span x-text="queue.running>0 ? `📸 사진 ${queue.total}장 — 한 장씩 인식 중` : `✅ ${queue.total}장 처리 완료`"></span>
    <div class="cl-qbar"><div class="fill" :style="`width:${queue.total?Math.round((queue.done+queue.failed)*100/queue.total):0}%`"></div></div>
    <b x-text="`${queue.done+queue.failed}/${queue.total}` + (queue.failed?` · 실패 ${queue.failed}`:'')"></b>
  </div>

  <!-- 본문 -->
  <div class="cl-body" @drop.prevent="onDrop($event)" @dragover.prevent>
    <!-- 좌: 목록 (명세서별 / 업체별) -->
    <div class="cl-list">
      <div class="cl-list-head">
        <span x-text="viewMode==='st' ? '📄 명세서 (전표) 목록' : '🏢 업체별 장부'"></span>
      </div>
      <div class="cl-list-scroll">
        <!-- 명세서별 -->
        <template x-if="viewMode==='st'">
          <div>
            <template x-for="h in filtered" :key="h.id">
              <div class="cl-row" :class="{active: selectedId===h.id}" @click="openDetail(h.id)">
                <div class="r1">
                  <span class="vendor" x-text="h.vendor_name || '(거래처 미인식)'"></span>
                  <span class="amt" x-text="fmt(h.total_amt)+'원'"></span>
                </div>
                <div class="r2">
                  <span class="date" x-text="(h.trx_date || fmtTime(h.created_at)) + ` · ${h.line_count||0}품목`"></span>
                  <span class="cl-badge" :class="h.status==='confirmed'?'confirmed':'parsed'" x-text="h.status==='confirmed'?'확정':'검토전'"></span>
                </div>
              </div>
            </template>
            <div x-show="filtered.length===0 && !loadingList" class="cl-empty">
              명세서가 없습니다.<br><small><b>📎 사진 추가</b> 또는 끌어놓기 / Ctrl+V</small>
            </div>
          </div>
        </template>
        <!-- 업체별 -->
        <template x-if="viewMode==='vendor'">
          <div>
            <template x-for="g in vendorGroups" :key="g.name">
              <div>
                <div class="cl-vh" @click="toggleVendor(g.name)">
                  <span class="arrow" x-text="expandedVendor===g.name ? '▼' : '▶'"></span>
                  <span class="vname" x-text="g.name"></span>
                  <span class="vpend" x-show="g.pending>0" x-text="`검토 ${g.pending}`"></span>
                  <div style="text-align:right;">
                    <div class="vsum" x-text="fmt(g.total)+'원'"></div>
                    <div class="vcnt" x-text="g.n+'건'"></div>
                  </div>
                </div>
                <div class="cl-sub" x-show="expandedVendor===g.name">
                  <template x-for="h in g.items" :key="h.id">
                    <div class="cl-row" :class="{active: selectedId===h.id}" @click="openDetail(h.id)">
                      <div class="r1">
                        <span class="date" x-text="h.trx_date || fmtTime(h.created_at)"></span>
                        <span class="amt" x-text="fmt(h.total_amt)+'원'"></span>
                      </div>
                      <div class="r2">
                        <span class="date" x-text="`${h.line_count||0}품목`"></span>
                        <span class="cl-badge" :class="h.status==='confirmed'?'confirmed':'parsed'" x-text="h.status==='confirmed'?'확정':'검토전'"></span>
                      </div>
                    </div>
                  </template>
                </div>
              </div>
            </template>
            <div x-show="vendorGroups.length===0 && !loadingList" class="cl-empty">거래처 없음</div>
          </div>
        </template>
        <div x-show="loadingList" class="cl-empty"><span class="cl-spin"></span></div>
      </div>
    </div>

    <!-- 우: 전표 상세 -->
    <div class="cl-detail">
      <template x-if="loadingDetail">
        <div class="cl-empty"><span class="cl-spin"></span><div style="margin-top:12px;">불러오는 중…</div></div>
      </template>

      <template x-if="!loadingDetail && !selectedId">
        <div class="cl-empty">
          왼쪽에서 명세서(전표)를 선택하거나,<br>사진을 올려 시작하세요.<br><br>
          <small>🏢 업체별 보기에서 거래처를 누르면 그 거래처 장부가 펼쳐집니다.</small>
        </div>
      </template>

      <template x-if="!loadingDetail && selectedId">
        <div>
          <!-- 전표 메타 (수정 가능) -->
          <div class="cl-meta">
            <div>
              <div class="k">거래처</div>
              <input class="cl-inp" x-model="vendor.name" style="font-size:14px;font-weight:800;width:200px;">
            </div>
            <div>
              <div class="k">사업자번호</div>
              <input class="cl-inp" x-model="vendor.biz_no" style="width:130px;">
            </div>
            <div>
              <div class="k">일자</div>
              <input type="date" class="cl-inp" x-model="trxDate" style="font-size:13px;">
            </div>
            <div>
              <div class="k">상태</div>
              <span class="cl-badge" :class="stStatus==='confirmed'?'confirmed':'parsed'" style="font-size:12px;padding:5px 12px;" x-text="stStatus==='confirmed'?'✅ 확정':'⏳ 검토전'"></span>
            </div>
            <div style="margin-left:auto;">
              <div class="k">합계(부가세 포함)</div>
              <div style="font-size:16px;font-weight:850;" x-text="fmt(totalAmt)+'원'"></div>
            </div>
          </div>

          <div class="cl-cols">
            <!-- 원본 -->
            <div class="cl-prev">
              <template x-if="imageUrl"><img :src="imageUrl" alt="원본"></template>
              <template x-if="!imageUrl"><div class="ph">📄 원본 사진 없음<br>(수기 전표)</div></template>
            </div>
            <!-- 품목 -->
            <div>
              <table class="cl-grid">
                <thead>
                  <tr><th style="width:26px;">#</th><th>품명 (등록명)</th><th>규격</th><th style="width:54px;">수량</th><th style="width:76px;">단가</th><th style="width:86px;">금액</th><th style="width:72px;">세액</th><th style="width:64px;">상태</th><th style="width:34px;"></th></tr>
                </thead>
                <tbody>
                  <template x-for="(line, idx) in lines" :key="idx">
                    <tr :class="[line.skip ? 'skipped' : (line.status || 'unknown')]">
                      <td style="padding:6px 7px;color:#9ca3af;text-align:center;" x-text="idx+1"></td>
                      <td><input type="text" x-model="line.item" :placeholder="line.ocr_text ? 'OCR: '+line.ocr_text : '품명 입력'" :title="line.ocr_text ? 'OCR 원문: '+line.ocr_text+(line.ocr_spec?' / '+line.ocr_spec:'') : ''"></td>
                      <td><input type="text" x-model="line.spec"></td>
                      <td><input type="number" step="0.1" x-model.number="line.qty" @input="recalcLine(line)"></td>
                      <td><input type="number" x-model.number="line.unit_price" @input="recalcLine(line)"></td>
                      <td><input type="number" x-model.number="line.supply_amt" @input="recalcLine(line,'supply')"></td>
                      <td><input type="number" x-model.number="line.vat_amt"></td>
                      <td style="padding:5px 7px;">
                        <span class="cl-sb" :class="line.status || 'unknown'" x-text="line.status==='matched'?'✓매칭':(line.status==='predicted'?'⚠확인':'✗신규')"></span>
                      </td>
                      <td style="padding:5px 7px;text-align:center;">
                        <span style="cursor:pointer;color:#cbd5e1;" :title="line.skip?'다시 포함':'이 줄 제외'" @click="line.skip=!line.skip" x-text="line.skip?'↩':'✕'"></span>
                      </td>
                    </tr>
                  </template>
                  <tr x-show="lines.length===0"><td colspan="9" style="text-align:center;padding:24px;color:#9ca3af;">품목 없음 — 아래 “+ 행 추가”</td></tr>
                </tbody>
                <tfoot>
                  <tr>
                    <td colspan="5" style="text-align:left;font-weight:700;color:#6b7280;font-size:11px;">✗신규는 품명 입력 → <b>확정</b> 시 학습되어 다음부턴 자동</td>
                    <td x-text="fmt(totalSupply)"></td>
                    <td x-text="fmt(totalVat)"></td>
                    <td colspan="2"></td>
                  </tr>
                </tfoot>
              </table>

              <!-- 전표 액션 -->
              <div style="margin-top:13px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
                <button class="cl-btn" @click="addBlankLine()">+ 행 추가</button>
                <button class="cl-btn primary" @click="save()" :disabled="saving">💾 저장</button>
                <button class="cl-btn success" x-show="stStatus!=='confirmed'" @click="confirmSt()" :disabled="saving">✓ 확정 (학습)</button>
                <button class="cl-btn" x-show="stStatus==='confirmed'" @click="reopenSt()" :disabled="saving">↩ 검토로</button>
                <button class="cl-btn" @click="exportOne()" :disabled="saving">⬇ E2E 엑셀</button>
                <button class="cl-btn danger" @click="deleteSt()">🗑 삭제</button>
                <span style="flex:1"></span>
                <button class="cl-btn" @click="nextStatement()">다음 →</button>
              </div>
              <div x-show="saveMsg" x-cloak style="margin-top:8px;font-size:12px;font-weight:700;" x-text="saveMsg"></div>
              <div style="margin-top:6px;font-size:11px;color:#9ca3af;">
                🟢 매칭 <b x-text="lines.filter(l=>l.status==='matched'&&!l.skip).length"></b> ·
                🟡 확인 <b x-text="lines.filter(l=>l.status==='predicted'&&!l.skip).length"></b> ·
                🔴 신규 <b x-text="lines.filter(l=>l.status==='unknown'&&!l.skip).length"></b>
              </div>
            </div>
          </div>
        </div>
      </template>
    </div>
  </div>
</div>
