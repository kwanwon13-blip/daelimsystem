<!-- tab-company-purchase.html — 컴퍼니 매입 (E2E 매입 화면 스타일 장부) -->
<!-- 좌: 일자|매입처 전표목록 · 우: 전표 헤더+품목 그리드 · 신규/저장/승인/삭제 · OCR 사진 입력 -->
<!-- ⚠️ 컴포넌트 JS는 public/company-purchase.js (템플릿 안 script 미실행 — statements.js 패턴) -->
<div x-data="companyLedgerApp()" x-init="init()" style="height:100%;display:flex;flex-direction:column;background:#eceef2;font-family:'Malgun Gothic','맑은 고딕',sans-serif;">
  <style>
    /* ── 우리 ERP 컨셉 (흰 카드·둥근 모서리·파스텔 배지 / 컴퍼니=주황 포인트) ── */
    .cl2-titlebar { display:flex; align-items:center; gap:12px; padding:12px 16px; background:#fff; border-bottom:1px solid #e5e7eb; }
    .cl2-tic { width:36px; height:36px; border-radius:10px; background:#fff7ed; border:1px solid #fed7aa; color:#d97706; display:flex; align-items:center; justify-content:center; font-size:18px; flex:0 0 auto; }
    .cl2-title { font-size:16px; font-weight:850; color:#111827; line-height:1.2; }
    .cl2-sub { font-size:11.5px; color:#9ca3af; margin-top:2px; }
    .cl2-actions { margin-left:auto; display:flex; gap:6px; flex-wrap:wrap; }
    .cl2-abtn { display:inline-flex; align-items:center; gap:5px; padding:7px 12px; background:#fff; border:1px solid #d1d5db; border-radius:8px; font-size:12px; font-weight:700; color:#374151; cursor:pointer; transition:all .15s; }
    .cl2-abtn:hover { background:#f9fafb; }
    .cl2-abtn .i { font-size:14px; line-height:1; }
    .cl2-abtn.blue { background:#2563eb; border-color:#2563eb; color:#fff; }
    .cl2-abtn.blue:hover { background:#1d4ed8; }
    .cl2-abtn.green { background:#16a34a; border-color:#16a34a; color:#fff; }
    .cl2-abtn.green:hover { background:#15803d; }
    .cl2-abtn.red { color:#b91c1c; border-color:#fecaca; }
    .cl2-abtn.red:hover { background:#fef2f2; }
    .cl2-abtn:disabled { opacity:.4; cursor:not-allowed; }

    .cl2-body { flex:1; display:grid; grid-template-columns:332px 1fr; min-height:0; overflow:hidden; }

    /* 좌측: 전표 목록 */
    .cl2-left { border-right:1px solid #e5e7eb; background:#fafbfc; display:flex; flex-direction:column; min-height:0; }
    .cl2-filter { padding:10px 12px; background:#fff; border-bottom:1px solid #eef1f4; display:flex; flex-direction:column; gap:7px; }
    .cl2-frow { display:flex; align-items:center; gap:6px; font-size:11.5px; color:#374151; }
    .cl2-frow label { width:52px; font-weight:700; color:#6b7280; flex:0 0 auto; }
    .cl2-inp { padding:6px 9px; border:1px solid #d1d5db; border-radius:7px; font-size:12px; background:#fff; min-width:0; outline:none; }
    .cl2-inp:focus { border-color:#f59e0b; }
    .cl2-views { display:inline-flex; border:1px solid #d1d5db; border-radius:8px; overflow:hidden; }
    .cl2-views button { padding:5px 12px; font-size:11.5px; font-weight:800; border:0; background:#fff; color:#6b7280; cursor:pointer; }
    .cl2-views button.on { background:#d97706; color:#fff; }

    table.cl2-list { width:100%; border-collapse:collapse; font-size:12.5px; background:#fff; }
    table.cl2-list th { position:sticky; top:0; z-index:1; background:#f3f4f6; border-bottom:1px solid #e5e7eb; padding:7px 8px; font-weight:700; color:#6b7280; font-size:11px; text-align:left; }
    table.cl2-list td { border-bottom:1px solid #f1f5f9; padding:8px 8px; cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:#1f2937; }
    table.cl2-list tr:hover td { background:#f8fafc; }
    table.cl2-list tr.sel td { background:#fff7ed; }
    table.cl2-list tr.sel td:first-child { box-shadow:inset 3px 0 0 #d97706; }
    table.cl2-list td.num { text-align:right; font-variant-numeric:tabular-nums; font-weight:600; }
    .cl2-st { font-size:10px; font-weight:800; padding:2px 8px; border-radius:999px; }
    .cl2-st.parsed { background:#fef3c7; color:#92400e; }
    .cl2-st.confirmed { background:#d1fae5; color:#065f46; }
    .cl2-vh td { background:#f8fafc !important; font-weight:850; cursor:pointer; border-top:1px solid #e5e7eb; }
    .cl2-listfoot { background:#fff; border-top:2px solid #e5e7eb; padding:9px 12px; font-size:12.5px; font-weight:850; display:flex; justify-content:space-between; color:#111827; }
    .cl2-listfoot span:last-child { color:#b45309; }
    .cl2-scroll { overflow-y:auto; flex:1; }

    /* 우측: 전표 */
    .cl2-right { display:flex; flex-direction:column; min-height:0; background:#fff; }
    .cl2-vheader { padding:12px 16px; border-bottom:1px solid #eef1f4; background:#fff; }
    .cl2-vgrid { display:grid; grid-template-columns:64px 170px 64px 1fr; gap:7px 10px; align-items:center; max-width:780px; }
    .cl2-vgrid label { font-size:11.5px; font-weight:700; color:#6b7280; }
    .cl2-vgrid .cl2-inp { width:100%; }
    .cl2-vstate { display:flex; align-items:center; gap:10px; margin-top:8px; flex-wrap:wrap; }

    .cl2-gridwrap { flex:1; overflow:auto; min-height:0; display:grid; grid-template-columns:1fr; }
    .cl2-gridwrap.with-img { grid-template-columns:minmax(0,1fr) 300px; }
    .cl2-imgpane { border-left:1px solid #e5e7eb; background:#0e1116; display:flex; align-items:flex-start; justify-content:center; overflow:auto; }
    .cl2-imgpane img { max-width:100%; }

    table.cl2-grid { width:100%; border-collapse:collapse; font-size:12px; }
    table.cl2-grid th { position:sticky; top:0; z-index:2; background:#f9fafb; border-bottom:2px solid #e5e7eb; padding:7px 6px; font-weight:700; color:#6b7280; font-size:11px; white-space:nowrap; text-align:left; }
    table.cl2-grid td { border-bottom:1px solid #f1f5f9; border-right:1px solid #f8fafc; padding:0; }
    table.cl2-grid td.ro { padding:5px 6px; color:#9ca3af; text-align:center; }
    table.cl2-grid input { width:100%; border:0; padding:5px 7px; background:transparent; font-size:12px; outline:none; font-family:inherit; color:#1f2937; }
    table.cl2-grid input[type=number] { text-align:right; }
    table.cl2-grid input:focus { background:#fff7ed; box-shadow:inset 0 0 0 2px #f59e0b; border-radius:3px; }
    table.cl2-grid td.calc { padding:5px 7px; text-align:right; font-variant-numeric:tabular-nums; background:#fafbfd; font-weight:600; }
    tr.l-matched td { background:#f4fdf7; } tr.l-predicted td { background:#fffdf0; } tr.l-unknown td { background:#fff5f5; }
    tr.l-skip td { opacity:.4; }
    tr.l-skip input { text-decoration:line-through; }
    .cl2-code { font-size:10.5px; color:#2563eb; font-weight:700; padding:0 6px; white-space:nowrap; }
    table.cl2-grid tfoot td { background:#fff; border-top:2px solid #e5e7eb; font-weight:850; padding:8px 7px; text-align:right; font-variant-numeric:tabular-nums; position:sticky; bottom:0; color:#111827; }
    table.cl2-grid tfoot td:nth-last-child(3) { color:#b45309; }

    .cl2-msg { padding:5px 14px; font-size:12px; font-weight:700; }
    .cl2-empty { padding:60px 30px; text-align:center; color:#9ca3af; font-size:13px; }
    .cl2-spin { display:inline-block; width:24px; height:24px; border:3px solid #e5e7eb; border-top-color:#d97706; border-radius:50%; animation:cl2spin 1s linear infinite; }
    @keyframes cl2spin { to { transform:rotate(360deg); } }
    .cl2-queue { padding:6px 14px; background:#fffaf0; border-bottom:1px solid #fde2b0; font-size:11.5px; color:#b45309; display:flex; align-items:center; gap:8px; }
    .cl2-qbar { flex:1; height:7px; background:#fdebc8; border-radius:99px; overflow:hidden; }
    .cl2-qbar .fill { height:100%; background:linear-gradient(90deg,#d97706,#22c55e); transition:width .3s; }
  </style>

  <!-- 타이틀바: 제목 + 우측 액션버튼 -->
  <div class="cl2-titlebar">
    <div class="cl2-tic">📒</div>
    <div>
      <div class="cl2-title">컴퍼니 매입</div>
      <div class="cl2-sub">사진(OCR)·수기 입력 → 검토 → 승인 → E2E</div>
    </div>
    <div class="cl2-actions">
      <input type="file" x-ref="file" multiple accept="image/*" style="display:none;" @change="onFileInput($event)">
      <button class="cl2-abtn blue" @click="createNew()"><span class="i">🆕</span>신규</button>
      <button class="cl2-abtn" @click="$refs.file.click()" :disabled="queue.running>0"><span class="i">📷</span>사진</button>
      <button class="cl2-abtn" @click="save()" :disabled="!selectedId || saving"><span class="i">💾</span>저장</button>
      <button class="cl2-abtn green" x-show="stStatus!=='confirmed'" @click="confirmSt()" :disabled="!selectedId || saving"><span class="i">✔</span>승인</button>
      <button class="cl2-abtn" x-show="selectedId && stStatus==='confirmed'" x-cloak @click="reopenSt()" :disabled="saving"><span class="i">↩</span>반송</button>
      <button class="cl2-abtn" @click="exportOne()" :disabled="!selectedId || saving"><span class="i">📊</span>E2E</button>
      <button class="cl2-abtn red" @click="deleteSt()" :disabled="!selectedId"><span class="i">🗑</span>삭제</button>
    </div>
  </div>

  <!-- 업로드 진행 -->
  <div class="cl2-queue" x-show="queue.total>0" x-cloak>
    <span x-text="queue.running>0 ? `📸 사진 ${queue.total}장 인식 중` : `✅ ${queue.total}장 완료`"></span>
    <div class="cl2-qbar"><div class="fill" :style="`width:${queue.total?Math.round((queue.done+queue.failed)*100/queue.total):0}%`"></div></div>
    <b x-text="`${queue.done+queue.failed}/${queue.total}` + (queue.failed?` · 실패 ${queue.failed}`:'')"></b>
  </div>

  <div class="cl2-body" @drop.prevent="onDrop($event)" @dragover.prevent>
    <!-- ══ 좌: 전표 목록 ══ -->
    <div class="cl2-left">
      <div class="cl2-filter">
        <div class="cl2-frow">
          <label>등록일자</label>
          <input type="date" class="cl2-inp" x-model="dateFrom" style="flex:1;">
          <span>~</span>
          <input type="date" class="cl2-inp" x-model="dateTo" style="flex:1;">
        </div>
        <div class="cl2-frow">
          <label>거래처</label>
          <input class="cl2-inp" x-model="searchQ" placeholder="검색" style="flex:1;">
          <select class="cl2-inp" x-model="filterStatus" style="width:72px;">
            <option value="">전체</option>
            <option value="parsed">검토</option>
            <option value="confirmed">승인</option>
          </select>
        </div>
        <div class="cl2-frow">
          <label>보기</label>
          <div class="cl2-views">
            <button :class="viewMode==='st'?'on':''" @click="viewMode='st'">일자별</button>
            <button :class="viewMode==='vendor'?'on':''" @click="viewMode='vendor'">업체별</button>
          </div>
          <span style="flex:1"></span>
          <button class="cl2-inp" style="cursor:pointer;" @click="loadList()">↻</button>
        </div>
      </div>

      <div class="cl2-scroll">
        <table class="cl2-list">
          <thead>
            <tr><th style="width:46px;">일자</th><th>매입처</th><th style="width:84px;">합계</th><th style="width:46px;">상태</th></tr>
          </thead>
          <tbody>
            <!-- 일자별 -->
            <template x-if="viewMode==='st'">
              <template x-for="h in filtered" :key="h.id">
                <tr :class="{sel: selectedId===h.id}" @click="openDetail(h.id)">
                  <td x-text="fmtDateShort(h.trx_date) || '-'"></td>
                  <td x-text="h.vendor_name || '(미입력)'"></td>
                  <td class="num" x-text="fmt(h.total_amt)"></td>
                  <td style="text-align:center;"><span class="cl2-st" :class="h.status==='confirmed'?'confirmed':'parsed'" x-text="h.status==='confirmed'?'승인':'검토'"></span></td>
                </tr>
              </template>
            </template>
            <!-- 업체별 (평탄화: 그룹헤더행 + 전표행) -->
            <template x-if="viewMode==='vendor'">
              <template x-for="row in vendorRows" :key="row.key">
                <tr :class="row.t==='g' ? 'cl2-vh' : {sel: selectedId===row.h.id}"
                    @click="row.t==='g' ? toggleVendor(row.g.name) : openDetail(row.h.id)">
                  <td style="text-align:center;" x-text="row.t==='g' ? (expandedVendor===row.g.name?'▼':'▶') : fmtDateShort(row.h.trx_date)"></td>
                  <td :style="row.t==='g' ? '' : 'padding-left:18px;'" x-text="row.t==='g' ? row.g.name : ((row.h.line_count||0)+'품목')"></td>
                  <td class="num" x-text="row.t==='g' ? fmt(row.g.total) : fmt(row.h.total_amt)"></td>
                  <td style="text-align:center;">
                    <span x-show="row.t==='g'" style="font-size:11px;font-weight:800;" x-text="row.g.n+'건'"></span>
                    <span x-show="row.t==='h'" class="cl2-st" :class="row.h && row.h.status==='confirmed'?'confirmed':'parsed'" x-text="row.h && row.h.status==='confirmed'?'승인':'검토'"></span>
                  </td>
                </tr>
              </template>
            </template>
          </tbody>
        </table>
        <div x-show="filtered.length===0 && !loadingList" class="cl2-empty" style="padding:30px;">
          전표 없음<br><small>🆕 신규(수기) 또는 📷 사진(OCR) / Ctrl+V</small>
        </div>
        <div x-show="loadingList" class="cl2-empty" style="padding:30px;"><span class="cl2-spin"></span></div>
      </div>
      <div class="cl2-listfoot">
        <span>합계 <span x-text="filtered.length"></span>건</span>
        <span x-text="fmt(sumFiltered)"></span>
      </div>
    </div>

    <!-- ══ 우: 전표 ══ -->
    <div class="cl2-right">
      <template x-if="loadingDetail">
        <div class="cl2-empty"><span class="cl2-spin"></span><div style="margin-top:10px;">불러오는 중…</div></div>
      </template>

      <template x-if="!loadingDetail && !selectedId">
        <div class="cl2-empty">
          왼쪽 목록에서 전표를 선택하거나<br>
          <b>🆕 신규</b>(수기 입력) 또는 <b>📷 사진</b>(OCR)으로 시작하세요.
        </div>
      </template>

      <template x-if="!loadingDetail && selectedId">
        <div style="display:flex;flex-direction:column;min-height:0;flex:1;">
          <!-- 전표 헤더 -->
          <div class="cl2-vheader">
            <div class="cl2-vgrid">
              <label>등록일자</label>
              <input class="cl2-inp" :value="fmtTime(createdAt)" disabled style="background:#f3f4f6;">
              <label>발행일자</label>
              <input type="date" class="cl2-inp" x-model="trxDate" style="max-width:170px;">
              <label>거 래 처</label>
              <input class="cl2-inp" x-model="vendor.name" style="font-weight:800;background:#e8f4fd;">
              <label>사업자No</label>
              <input class="cl2-inp" x-model="vendor.biz_no" placeholder="000-00-00000" style="max-width:170px;">
              <label>비    고</label>
              <input class="cl2-inp" x-model="memo" style="grid-column:2 / span 3;">
            </div>
            <div class="cl2-vstate">
              <span class="cl2-st" :class="stStatus==='confirmed'?'confirmed':'parsed'" style="font-size:11.5px;padding:4px 10px;" x-text="stStatus==='confirmed'?'✔ 승인':'⏳ 검토'"></span>
              <span style="font-size:11px;color:#6b7280;" x-show="isManual">⌨️ 수기 전표</span>
              <button class="cl2-inp" style="cursor:pointer;" x-show="imageUrl" @click="showImage=!showImage" x-text="showImage?'📄 원본 닫기':'📄 원본 보기'"></button>
              <button class="cl2-inp" style="cursor:pointer;" @click="addBlankLine()">+ 행 추가</button>
              <span class="cl2-msg" x-show="saveMsg" x-cloak x-text="saveMsg" style="padding:0;"></span>
              <span style="flex:1"></span>
              <button class="cl2-inp" style="cursor:pointer;" @click="nextStatement()">다음 ▶</button>
            </div>
          </div>

          <!-- 품목 그리드 (+ 원본 이미지) -->
          <div class="cl2-gridwrap" :class="showImage && imageUrl ? 'with-img' : ''">
            <div style="overflow:auto;min-width:0;">
              <table class="cl2-grid">
                <thead>
                  <tr>
                    <th style="width:30px;">순번</th>
                    <th style="width:62px;">약어</th>
                    <th style="min-width:150px;">상품명</th>
                    <th style="width:90px;">비고</th>
                    <th style="width:110px;">규격</th>
                    <th style="width:52px;">수량</th>
                    <th style="width:74px;">단가</th>
                    <th style="width:84px;">금액</th>
                    <th style="width:70px;">세액</th>
                    <th style="width:86px;">합계금액</th>
                    <th style="width:92px;">상품코드</th>
                    <th style="width:28px;"></th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="(line, idx) in lines" :key="idx">
                    <tr :class="[line.skip ? 'l-skip' : ('l-' + (line.status || 'unknown'))]">
                      <td class="ro" x-text="idx+1"></td>
                      <td><input type="text" x-model="line.short"></td>
                      <td><input type="text" x-model="line.item" :placeholder="line.ocr_text ? 'OCR: '+line.ocr_text : '상품명'" :title="line.ocr_text ? 'OCR 원문: '+line.ocr_text+(line.ocr_spec?' / '+line.ocr_spec:'') : ''"></td>
                      <td><input type="text" x-model="line.memo"></td>
                      <td><input type="text" x-model="line.spec"></td>
                      <td><input type="number" step="0.1" x-model.number="line.qty" @input="recalcLine(line)"></td>
                      <td><input type="number" x-model.number="line.unit_price" @input="recalcLine(line)"></td>
                      <td><input type="number" x-model.number="line.supply_amt" @input="recalcLine(line,'supply')"></td>
                      <td><input type="number" x-model.number="line.vat_amt"></td>
                      <td class="calc" x-text="fmt(line.total_amt)"></td>
                      <td><span class="cl2-code" x-text="line.code || ''" :title="line.match_reason || ''"></span></td>
                      <td class="ro" style="cursor:pointer;color:#b91c1c;" :title="line.skip?'다시 포함':'제외'" @click="line.qty||line.item ? (line.skip=!line.skip) : removeLine(idx)" x-text="line.skip?'↩':'✕'"></td>
                    </tr>
                  </template>
                  <tr x-show="lines.length===0"><td colspan="12" style="text-align:center;padding:26px;color:#9ca3af;">품목 없음 — “+ 행 추가”</td></tr>
                </tbody>
                <tfoot>
                  <tr>
                    <td colspan="5" style="text-align:left;font-weight:700;color:#6b7280;font-size:11px;">빨간 줄(신규)은 상품명 입력 → <b>승인</b> 시 학습</td>
                    <td x-text="fmt(totalQty)"></td>
                    <td></td>
                    <td x-text="fmt(totalSupply)"></td>
                    <td x-text="fmt(totalVat)"></td>
                    <td x-text="fmt(totalAmt)"></td>
                    <td colspan="2"></td>
                  </tr>
                </tfoot>
              </table>
            </div>
            <div class="cl2-imgpane" x-show="showImage && imageUrl" x-cloak>
              <img :src="imageUrl" alt="원본 명세서">
            </div>
          </div>
        </div>
      </template>
    </div>
  </div>
</div>
