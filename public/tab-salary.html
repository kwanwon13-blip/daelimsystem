    },
    // 라벨 모달에서 visibility 조회/토글 (체크박스 바인딩용)
    // visibility[key]는 boolean 또는 { visible, nonTaxable, nonTaxLimit } 객체
    isSlotVisible(key) {
      const v = this.labelModal.form?.visibility || {};
      if (Object.prototype.hasOwnProperty.call(v, key)) {
        const entry = v[key];
        if (entry && typeof entry === 'object') {
          return entry.visible !== false;
        }
        return !!entry;
      }
      const nameKey = key + 'Name';
      return !!(this.labelModal.form?.[nameKey] && String(this.labelModal.form[nameKey]).trim());
    },
    toggleSlotVisibility(key, val) {
      if (!this.labelModal.form.visibility || typeof this.labelModal.form.visibility !== 'object') {
        this.labelModal.form.visibility = {};
      }
      const cur = this.labelModal.form.visibility[key];
      if (cur && typeof cur === 'object') {
        cur.visible = !!val;
      } else {
        this.labelModal.form.visibility[key] = !!val;
      }
    },
    // ── 비과세 플래그 (extraPay1~8) ───────────────────────────
    _ensureExtraVisObj(i) {
      if (!this.labelModal.form.visibility || typeof this.labelModal.form.visibility !== 'object') {
        this.labelModal.form.visibility = {};
      }
      const key = 'extraPay' + i;
      const cur = this.labelModal.form.visibility[key];
      if (!cur || typeof cur !== 'object') {
        this.labelModal.form.visibility[key] = {
          visible: !!cur || this.isSlotVisible(key),
          nonTaxable: false, nonTaxLimit: 0,
        };
      }
      return this.labelModal.form.visibility[key];
    },
    isExtraNonTaxable(i) {
      const v = this.labelModal.form?.visibility?.['extraPay' + i];
      return !!(v && typeof v === 'object' && v.nonTaxable);
    },
    toggleExtraNonTax(i, val) {
      const e = this._ensureExtraVisObj(i);
      e.nonTaxable = !!val;
    },
    extraNonTaxLimit(i) {
      const v = this.labelModal.form?.visibility?.['extraPay' + i];
      return (v && typeof v === 'object' && +v.nonTaxLimit) || 0;
    },
    setExtraNonTaxLimit(i, val) {
      const e = this._ensureExtraVisObj(i);
      e.nonTaxLimit = +val || 0;
    },
    // 급여대장에서 기본 표시되지만 사용자가 숨길 수 있는 공제 컬럼 후보

    // ── 탭 전환 ───────────────────────────────────────────────
    switchSubTab(id) {
      this.subTab = id;
      if (id === 'overtime') this.loadOvertime();
      else if (id === 'paystatus') this.loadPayStatus();
      else if (id === 'edi') this.loadEdiCompare();
      else if (id === 'home') this.loadHome();

    // ── HOME 대시보드: 12개월 추이 + 회사 비교 ────────────────
    // /api/salary/paystatus 는 { employees:[{userId,name,months:{'2026-01':{grossPay,totalDeductions,netPay,status}}}], months:['2026-01',...'2026-12'] } 구조
    _aggregateMonthly(data) {
      // 월별 총합 맵 { '01': {headcount, grossPay, totalDeductions, netPay} }
      const totals = {};
      for (let i = 1; i <= 12; i++) totals[String(i).padStart(2,'0')] = { headcount:0, grossPay:0, totalDeductions:0, netPay:0 };
      (data.employees || []).forEach(emp => {
        Object.keys(emp.months || {}).forEach(ym => {
          const mm = (ym || '').slice(5, 7);
          if (!totals[mm]) return;
          const m = emp.months[ym] || {};
          totals[mm].headcount += 1;
          totals[mm].grossPay += +(m.grossPay || 0);
          totals[mm].totalDeductions += +(m.totalDeductions || 0);
          totals[mm].netPay += +(m.netPay || 0);
        });
      });
      return totals;
    },
    async loadHome() {
      this.homeData.loading = true;
      try {
        const year = Number((this.yearMonth || '').slice(0, 4)) || new Date().getFullYear();
        const other = this.company === 'dalim-sm' ? 'dalim-company' : 'dalim-sm';
        const [resA, resB] = await Promise.all([
          fetch(`/api/salary/paystatus?company=${encodeURIComponent(this.company)}&year=${year}`, { credentials: 'include' }),
          fetch(`/api/salary/paystatus?company=${encodeURIComponent(other)}&year=${year}`, { credentials: 'include' }),
        ]);
        const dataA = resA.ok ? await resA.json() : { employees: [] };
        const dataB = resB.ok ? await resB.json() : { employees: [] };
        const aggA = this._aggregateMonthly(dataA);
        const aggB = this._aggregateMonthly(dataB);

        this.homeData.trend = [];
        for (let mm = 1; mm <= 12; mm++) {
          const k = String(mm).padStart(2,'0');
          const a = aggA[k] || {};
          this.homeData.trend.push({
            month: `${year}-${k}`,
            label: `${mm}월`,
            headcount: a.headcount || 0,
            grossPay: a.grossPay || 0,
            totalDeductions: a.totalDeductions || 0,
            netPay: a.netPay || 0,
          });
        }
        const curMonth = (this.yearMonth || '').slice(5, 7);
        this.homeData.compare = {
          monthLabel: `${year}-${curMonth}`,
          self: {
            name: this.company === 'dalim-sm' ? '대림에스엠' : '대림컴퍼니',
            data: aggA[curMonth] || {},
          },
          other: {
            name: other === 'dalim-sm' ? '대림에스엠' : '대림컴퍼니',
            data: aggB[curMonth] || {},
          },
        };
      } catch (e) {
        console.warn('loadHome 실패:', e);
        this.homeData.trend = [];
        this.homeData.compare = null;
      } finally {
        this.homeData.loading = false;
      }
    },
    // KPI: 현재 records 기준 상태별 집계 (퇴사자 필터 적용)
    homeStatusCount(status) {
      return (this.visibleRecords || []).filter(r => r.status === status).length;
    },
    // Top N 지급합계 (퇴사자 필터 적용)
    homeTopEarners(n) {
      return [...(this.visibleRecords || [])]
        .sort((a, b) => (+b.grossPay || 0) - (+a.grossPay || 0))
        .slice(0, n);
    },
    // 추이 차트용 최대값 (0이면 1로 치환해 0 나누기 방지)
    homeTrendMax(field) {
      const arr = (this.homeData.trend || []).map(t => +t[field] || 0);
      const m = Math.max.apply(null, arr.length ? arr : [0]);
      return m > 0 ? m : 1;
    },

      // (기존 핸들러 있으면 제거 후 재등록 — Alpine 재마운트 시 중복 방지)

    async loadUsers() {
      try {
        // 부서 먼저 로드 (department id → name 맵)
        try {
          const dr = await fetch('/api/departments', { credentials: 'include' });
          if (dr.ok) {
            const depts = await dr.json();
            this.departmentMap = {};
            (depts || []).forEach(d => { this.departmentMap[d.id] = d.name; });
          }
        } catch(e) {}

        const r = await fetch('/api/admin/users', { credentials: 'include' });
        if (r.ok) {
          const d = await r.json();
          // 서버가 배열([...])을 반환하므로 객체({users:[...]})도 호환 처리
          this.allUsers = Array.isArray(d) ? d : (d.users || []);
          this.userMap = {};
          this.userInfoMap = {};
          this.allUsers.forEach(u => {
            const info = {
              department: u.department || '',
              position: u.position || '',
              hireDate: u.hireDate || '',
              resignDate: u.resignDate || '',
              birthDate: u.birthDate || '',
              email: u.email || '',
              phone: u.phone || '',
              companyId: u.companyId || '',
              sabun: u.sabun || '',
            };
            // 1) id (UUID 포함) 키
            if (u.id) {
              this.userMap[u.id] = u.name || u.id;
              this.userInfoMap[u.id] = info;
            }
            // 2) companyId:sabun(소문자) 복합키 — ws-001 등 엑셀 사번 기반
            if (u.sabun && u.companyId) {
              const k = `${u.companyId}:${String(u.sabun).toLowerCase()}`;
              this.userMap[k] = u.name || '';
              this.userInfoMap[k] = info;
            }
            // 3) sabun 단일 (대·소문자 모두) — 회사 중복 시 마지막 승
            if (u.sabun) {
              const low = String(u.sabun).toLowerCase();
              this.userMap[low] = u.name || '';
              this.userInfoMap[low] = info;
              this.userMap[u.sabun] = u.name || '';
              this.userInfoMap[u.sabun] = info;
            }
          });
        }
      } catch(e) {}
    },

    async loadAll() {
      this.loading = true;
      await Promise.all([this.loadRecords(), this.loadConfigs(), this.loadLabels(), this.loadIssuances()]);

    async loadRecords() {
      try {
        const r = await fetch(`/api/salary/records?company=${this.company}&month=${this.yearMonth}`, { credentials:'include' });
        if (r.ok) {
          const d = await r.json();
          this.records = d.records || [];
          this.selectedIds = new Set();
          // 빈 월 자동 초안 생성: records 0건 + 설정된 재직자 있음 → /calculate 호출 후 다시 로드
          // 한 번만 시도 (_autoDraftTried 플래그로 무한루프 방지)
          const key = `${this.company}|${this.yearMonth}`;
          if (this.records.length === 0 && !this._autoDraftTried?.[key]) {
            this._autoDraftTried = this._autoDraftTried || {};
            this._autoDraftTried[key] = true;
            // configs가 아직 없으면 먼저 로드
            if (!this.configs || this.configs.length === 0) {
              await this.loadConfigs();
            }
            if ((this.configs || []).length > 0) {
              try {
                const cr = await fetch('/api/salary/calculate', {
                  method: 'POST', headers: {'Content-Type':'application/json'}, credentials: 'include',
                  body: JSON.stringify({ companyId: this.company, yearMonth: this.yearMonth, overwrite: false })
                });
                if (cr.ok) {
                  // 다시 로드 (재귀 대신 한 번만 fetch)
                  const r2 = await fetch(`/api/salary/records?company=${this.company}&month=${this.yearMonth}`, { credentials:'include' });
                  if (r2.ok) { const d2 = await r2.json(); this.records = d2.records || []; }
                }
              } catch(e) {}
            }
          }
        }
      } catch(e) {}
    },

    // ── 급여 계산 ─────────────────────────────────────────────
    // CAPS 자동 병합 — 관리자 수동 개입 없이 CAPS 실측 근무일수 + 연장시간이 반영됨
    async calcAll() {
      if (!confirm(`${this.yearMonth} ${this.company} 전체 직원 급여를 자동 계산할까요?\n\n✓ 대상자는 "전월에 급여받은 사람"만 자동 포함 (퇴사자 자동 제외)\n✓ 상여/연차수당/기타 공제 같은 수동 입력 값은 전월 값 그대로 복제\n✓ CAPS 출퇴근 실측(근무일수+연장시간) 자동 반영\n✓ 수동 입력한 연장근무는 우선 유지\n✓ 기존 draft는 덮어씁니다\n\n※ 신규 입사자는 [+ 사람 추가] 버튼으로 별도 추가하세요.`)) return;
      try {
        // ─ 1차 실행: 자동계산만 수행 (잔여 draft 삭제는 아직 안 함) ─
        const r = await fetch('/api/salary/calculate', {
          method: 'POST', headers: {'Content-Type':'application/json'}, credentials:'include',
          body: JSON.stringify({ companyId: this.company, yearMonth: this.yearMonth, overwrite: true, purgeStale: false })
        });
        if (!r.ok) { const d = await r.json(); alert(d.error); return; }
        const d = await r.json();

        // ─ 잔여 draft (전월에도 없고, 이번달 자동대상도 아닌 draft) 가 있으면 추가 확인 ─
        let staleMsg = '';
        if (d.staleCount > 0) {
          const okPurge = confirm(
            `전월(${d.prevMonth})에 없고 ${this.yearMonth} 에 draft 로만 남아있는 ${d.staleCount}명이 발견되었습니다.\n` +
            `(과거 잘못된 자동계산으로 생긴 잡음 — 확정/지급된 급여는 포함 안 됨)\n\n` +
            `이 ${d.staleCount}명을 급여대장에서 정리할까요?`
          );
          if (okPurge) {
            const r2 = await fetch('/api/salary/calculate', {
              method: 'POST', headers: {'Content-Type':'application/json'}, credentials:'include',
              body: JSON.stringify({ companyId: this.company, yearMonth: this.yearMonth, overwrite: true, purgeStale: true })
            });
            if (r2.ok) {
              const d2 = await r2.json();
              staleMsg = `\n• 잔여 draft 정리: ${d2.staleDeleted}명 삭제`;
            } else {
              const de = await r2.json();
              staleMsg = `\n• 잔여 draft 정리 실패: ${de.error || '오류'}`;
            }
          } else {
            staleMsg = `\n• 잔여 draft ${d.staleCount}명 유지 (다음에 정리 가능)`;
          }
        }

        let msg = '자동계산 완료';
        msg += `\n• 대상 인원: ${(d.results||[]).length}명`;
        if (d.prevSeedCount > 0) msg += `\n• 전월(${d.prevMonth}) 값 복제: ${d.prevSeedCount}명 (상여·연차수당·기타 공제)`;
        if (d.capsAutoCount > 0) msg += `\n• CAPS 연장시간 자동 반영: ${d.capsAutoCount}명`;
        if (d.attendanceNote) msg += `\n• ${d.attendanceNote}`;
        msg += staleMsg;
        alert(msg);
        await this.loadRecords();
      } catch(e) { alert('오류: ' + e.message); }
    },

    // ── 선택 빼기 (이 월 급여대장에서 제외) ──────────────────
    async removeSelected() {
      const ids = [...this.selectedIds];
      if (ids.length === 0) return;
      // 선택된 userId 중 recordId를 갖고 있는 애들 추출
      const targets = this.records.filter(r => ids.includes(r.userId) && r.id);
      const confirmed = targets.filter(r => r.status !== 'draft');
      let msg = `선택한 ${targets.length}명을 ${this.yearMonth} 급여대장에서 제외할까요?`;
      if (confirmed.length > 0) {
        msg += `\n\n※ 이미 확정/지급된 ${confirmed.length}명이 포함되어 있습니다. 확정된 급여는 관리자 권한으로만 삭제됩니다.`;
      }
      if (!confirm(msg)) return;
      let ok = 0, fail = 0;
      for (const r of targets) {
        try {
          const res = await fetch(`/api/salary/records/${r.id}`, { method: 'DELETE', credentials: 'include' });
          if (res.ok) ok++; else fail++;
        } catch(e) { fail++; }
      }
      this.selectedIds = new Set();
      await this.loadRecords();
      alert(`제외 완료: 성공 ${ok}명${fail > 0 ? ` / 실패 ${fail}명` : ''}`);
    },

    // ── 사람 추가 모달 ────────────────────────────────────────
    // 재직자: configs 중 현재 records에 없는 + 퇴사자 아닌 사람
    get addCandidatesActive() {
      const inRecs = new Set(this.records.map(r => r.userId));
      const resignedIds = new Set((this.addModal.resignedUsers || []).map(r => r.userId));
      return (this.configs || [])
        .filter(c => !inRecs.has(c.userId) && !resignedIds.has(c.userId))
        .map(c => ({ userId: c.userId, name: c.name || this.userMap[c.userId] || c.userId }));
    },
    async openAddModal() {
      this.addModal.open = true;
      this.addModal.tab = 'active';
      this.addModal.selectedIds = new Set();
      // 퇴사자 목록 로드
      try {
        const r = await fetch(`/api/salary/resigned-users?company=${this.company}&month=${this.yearMonth}`, { credentials: 'include' });
        if (r.ok) { const d = await r.json(); this.addModal.resignedUsers = d.resignedUsers || []; }
      } catch(e) {}
    },
    toggleAddPick(userId) {
      const s = this.addModal.selectedIds;
      if (s.has(userId)) s.delete(userId); else s.add(userId);
      this.addModal = { ...this.addModal, selectedIds: new Set(s) }; // Alpine reactivity trigger
    },
    async confirmAdd() {
      const ids = [...this.addModal.selectedIds];
      if (ids.length === 0) { alert('추가할 직원을 선택하세요'); return; }
      // 이미 records에 있는 사람은 제외
      const inRecs = new Set(this.records.map(r => r.userId));
      const newIds = ids.filter(id => !inRecs.has(id));
      if (newIds.length === 0) { alert('선택한 직원은 이미 대장에 있습니다'); return; }
      try {
        const r = await fetch('/api/salary/calculate', {
          method: 'POST', headers: {'Content-Type':'application/json'}, credentials: 'include',
          body: JSON.stringify({ companyId: this.company, yearMonth: this.yearMonth, userIds: newIds, overwrite: false })
        });
        if (r.ok) {
          alert(`${newIds.length}명 추가됨`);
          this.addModal.open = false;
          await this.loadRecords();
        } else {
          const d = await r.json(); alert('추가 실패: ' + (d.error || ''));
        }
      } catch(e) { alert('오류: ' + e.message); }
    },

    // ── 확정 ──────────────────────────────────────────────────
    async confirmOne(r) {
      if (!confirm(`${this.nameOf(r.userId)} ${r.yearMonth} 급여를 확정할까요?\n(확정 후 수정 불가)`)) return;
      try {
        const res = await fetch(`/api/salary/records/${r.id}/confirm`, { method:'PUT', credentials:'include' });
        if (res.ok) { await this.loadRecords(); if (this.detailModal.open) this.detailModal.rec = (await res.json()).record; }
        else { const d = await res.json(); alert(d.error); }
      } catch(e) {}
    },

    // ── 지급 처리 ─────────────────────────────────────────────
    async paidOne(r) {
      const payDate = prompt('지급일 입력 (YYYY-MM-DD)', new Date().toISOString().slice(0,10));
      if (!payDate) return;
      try {
        await fetch(`/api/salary/records/${r.id}/paid`, {
          method:'PUT', headers:{'Content-Type':'application/json'}, credentials:'include',
          body: JSON.stringify({ payDate })
        });
        await this.loadRecords();
      } catch(e) {}
    },

    // ── 설정 저장 ─────────────────────────────────────────────
    async saveSettings() {
      try {
        const r = await fetch(`/api/salary/settings/${this.company}`, {
          method:'PUT', headers:{'Content-Type':'application/json'}, credentials:'include',
          body: JSON.stringify(this.settingsForm)
        });
        if (r.ok) alert('저장되었습니다');
        else { const d = await r.json(); alert(d.error); }
      } catch(e) { alert('오류'); }
    },

    // ── 직원 설정 ─────────────────────────────────────────────
    openConfigModal(c) {
      this.configModal.form = c ? { ...c } : {
        userId: '', name: '', companyId: this.company, effectiveFrom: new Date().toISOString().slice(0,10),
        baseSalary: 0, fixedOvertimePay: 0, fixedHolidayPay: 0, mealAllowance: 200000,
        transportAllowance: 0, teamLeaderAllowance: 0, workingHours: 209,
        incomeTaxType: '근로소득 100%', dependents: 1, childrenCount: 0,
        pensionOpt: 'O', healthOpt: 'O', ltcOpt: 'O', employmentOpt: 'O',
        pensionReductionPct: 0, healthReductionPct: 0, ltcReductionPct: 0,
        employmentReductionPct: 0, incomeReductionPct: 100
      };
      this.configModal.form.companyId = this.company;
      // 감면율 기본값 보정
      if (this.configModal.form.pensionReductionPct == null) this.configModal.form.pensionReductionPct = 0;
      if (this.configModal.form.healthReductionPct == null) this.configModal.form.healthReductionPct = 0;
      if (this.configModal.form.ltcReductionPct == null) this.configModal.form.ltcReductionPct = 0;
      if (this.configModal.form.employmentReductionPct == null) this.configModal.form.employmentReductionPct = 0;
      if (this.configModal.form.incomeReductionPct == null) this.configModal.form.incomeReductionPct = 100;
      // 이름이 없으면 userMap에서 보완
      if (!this.configModal.form.name && this.configModal.form.userId) {
        this.configModal.form.name = this.nameOf(this.configModal.form.userId);
      }
      this.configModal.open = true;
    },
    updateNormal() {
      const f = this.configModal.form;
      // 통상임금 = 기본급 + 고정연장 + 고정휴일 + 정기 수당
      f.normalWage = (+f.baseSalary||0) + (+f.fixedOvertimePay||0) + (+f.fixedHolidayPay||0)
        + (+f.mealAllowance||0) + (+f.transportAllowance||0) + (+f.teamLeaderAllowance||0);
    },
    async saveConfig() {
      if (!this.configModal.form.userId) { alert('직원 ID를 입력하거나 ERP에서 선택하세요'); return; }
      if (!this.configModal.form.name) { alert('직원 이름을 입력하세요'); return; }
      try {
        const r = await fetch('/api/salary/config', {
          method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include',
          body: JSON.stringify(this.configModal.form)
        });
        if (r.ok) { this.configModal.open = false; await this.loadConfigs(); alert('저장되었습니다'); }
        else { const d = await r.json(); alert(d.error); }
      } catch(e) { alert('오류'); }
    },

    // ── 항목명 설정 ───────────────────────────────────────────
    openLabelModal() {
      // labels.visibility는 서버에서 객체로 파싱되어 옴 → 깊은 복사로 격리
      const vis = (this.labels?.visibility && typeof this.labels.visibility === 'object')
        ? JSON.parse(JSON.stringify(this.labels.visibility))
        : {};
      this.labelModal.form = { ...this.labels, visibility: vis };
      // 8슬롯 누락된 기본값 채움
      for (let i = 1; i <= 8; i++) {
        if (this.labelModal.form['extraPay'+i+'Name'] === undefined) this.labelModal.form['extraPay'+i+'Name'] = '';
        if (this.labelModal.form['extraDeduction'+i+'Name'] === undefined) this.labelModal.form['extraDeduction'+i+'Name'] = '';
      }
      this.labelModal.open = true;
    },
    async saveLabels() {
      try {
        // visibility를 JSON 문자열로 직렬화해서 전송 (서버 스키마가 TEXT)
        const payload = { ...this.labelModal.form };
        if (payload.visibility && typeof payload.visibility === 'object') {
          payload.visibility = JSON.stringify(payload.visibility);
        }
        await fetch('/api/salary/labels', {
          method:'PUT', headers:{'Content-Type':'application/json'}, credentials:'include',
          body: JSON.stringify({ companyId: this.company, yearMonth: this.yearMonth, ...payload })
        });
        this.labelModal.open = false;
        await this.loadLabels();
        await this.loadRecords();
      } catch(e) {}
    },

    // ── 급여 상세 모달 ────────────────────────────────────────
    openDetail(r) {
      this.detailModal.rec = { ...r };
      this.detailModal.open = true;
    },
    async saveDetail() {
      try {
        const r = await fetch(`/api/salary/records/${this.detailModal.rec.id}`, {
          method:'PUT', headers:{'Content-Type':'application/json'}, credentials:'include',
          body: JSON.stringify(this.detailModal.rec)
        });
        if (r.ok) { this.detailModal.open = false; await this.loadRecords(); }
        else { const d = await r.json(); alert(d.error); }
      } catch(e) {}
    },
    async recalcOne() {
      if (!confirm('현재 입력된 값으로 4대보험/소득세를 재계산할까요?')) return;
      try {
        const r = await fetch('/api/salary/calculate', {
          method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include',
          body: JSON.stringify({ companyId: this.company, yearMonth: this.yearMonth, userIds: [this.detailModal.rec.userId], overwrite: true })
        });
        if (r.ok) {
          await this.loadRecords();
          const updated = this.records.find(x => x.userId === this.detailModal.rec.userId);
          if (updated) this.detailModal.rec = { ...updated };
        }
      } catch(e) {}
    },

    // ── 실시간 합계 계산 (모달) ───────────────────────────────
    calcTaxable() {
      const r = this.detailModal.rec || {};
      let extraPaySum = 0;
      for (let i = 1; i <= 8; i++) extraPaySum += (r['extraPay'+i]||0);
      const all = (r.baseSalary||0)+(r.fixedOvertimePay||0)+(r.fixedHolidayPay||0)+(r.mealAllowance||0)
        +(r.transportAllowance||0)+(r.teamLeaderAllowance||0)+(r.overtimePay||0)+(r.nightPay||0)
        +(r.holidayPay||0)+(r.holidayOtPay||0)+(r.bonusPay||0)+(r.retroPay||0)+(r.leavePay||0)
        + extraPaySum;
      return all - this.calcNonTaxable();
    },
    calcNonTaxable() {
      const r = this.detailModal.rec || {};
      return Math.min(r.mealAllowance||0, 200000) + (r.transportAllowance||0);
    },
    calcGross() { return this.calcTaxable() + this.calcNonTaxable(); },
    calcTotalDed() {
      const r = this.detailModal.rec || {};
      let extraDedSum = 0;
      for (let i = 1; i <= 8; i++) extraDedSum += (r['extraDeduction'+i]||0);
      return (r.nationalPension||0)+(r.healthInsurance||0)+(r.longTermCare||0)+(r.employmentInsurance||0)
        +(r.incomeTax||0)+(r.localTax||0)+(r.incomeTaxAdj||0)+(r.localTaxAdj||0)
        +(r.healthAnnual||0)+(r.ltcAnnual||0)+(r.healthInstallment||0)+(r.ltcInstallment||0)
        +(r.healthAprExtra||0)+(r.ltcAprExtra||0)+(r.healthRefundInterest||0)+(r.ltcRefundInterest||0)
        +(r.miscDeduction1||0)+(r.miscDeduction2||0)+ extraDedSum;
    },

    // ── 체크박스 선택 ─────────────────────────────────────────
    toggleSelect(userId, e) {
      const next = new Set(this.selectedIds);
      e.target.checked ? next.add(userId) : next.delete(userId);
      this.selectedIds = next;
    },
    toggleSelectAll(e) {
      this.selectedIds = e.target.checked ? new Set(this.records.map(r => r.userId)) : new Set();
    },

    // ── 선택 직원 명세서 출력 (팝업으로 선택 → PDF ZIP) ─────────
    printSelected() {
      if (!this.records || this.records.length === 0) {
        alert('이 월의 급여대장에 직원이 없습니다'); return;
      }
      // 기존 체크박스 선택 있으면 그대로 프리셀렉트, 없으면 전체
      const preselect = this.selectedIds.size > 0
        ? new Set(this.selectedIds)
        : new Set(this.records.map(r => r.userId));
      this.slipPickModal = {
        ...this.slipPickModal,
        open: true,
        pickedIds: preselect,
        search: '',
        lastMsg: '',
        loading: false,
      };
    },

    // 명세서 출력 후보 (visibleRecords = 퇴사자 숨김 반영)
    get slipCandidates() {
      return (this.visibleRecords || []).map(r => {
        const info = this._lookupInfo(r.userId) || {};
        const deptId = info.department || '';
        const deptName = this.departmentMap && this.departmentMap[deptId] ? this.departmentMap[deptId] : deptId;
        return {
          userId: r.userId,
          name: this.nameOf(r.userId),
          department: deptName || '',
          position: info.position || '',
          birthDate: info.birthDate || '',
          status: r.status,
        };
      });
    },
    get slipCandidatesFiltered() {
      const q = (this.slipPickModal.search || '').trim().toLowerCase();
      const list = this.slipCandidates;
      if (!q) return list;
      return list.filter(c =>
        (c.name || '').toLowerCase().includes(q) ||
        (c.department || '').toLowerCase().includes(q) ||
        (c.userId || '').toLowerCase().includes(q)
      );
    },
    // 선택된 중에 생년월일 없는 인원 수
    get slipPickedMissingBirth() {
      const picked = this.slipPickModal.pickedIds;
      return this.slipCandidates.filter(c => picked.has(c.userId) && !c.birthDate).length;
    },
    toggleSlipPick(userId) {
      const s = this.slipPickModal.pickedIds;
      if (s.has(userId)) s.delete(userId); else s.add(userId);
      this.slipPickModal = { ...this.slipPickModal, pickedIds: new Set(s) };
    },
    toggleSlipPickAll(e) {
      const ids = this.slipCandidatesFiltered.map(c => c.userId);
      if (e.target.checked) {
        const s = new Set(this.slipPickModal.pickedIds);
        ids.forEach(id => s.add(id));
        this.slipPickModal = { ...this.slipPickModal, pickedIds: s };
      } else {
        const s = new Set(this.slipPickModal.pickedIds);
        ids.forEach(id => s.delete(id));
        this.slipPickModal = { ...this.slipPickModal, pickedIds: s };
      }
    },
    async submitSlipPick() {
      const ids = [...this.slipPickModal.pickedIds];
      if (ids.length === 0) { alert('직원을 선택하세요'); return; }
      const withPassword = !!this.slipPickModal.withPassword;
      if (withPassword && this.slipPickedMissingBirth > 0) {
        const ok = confirm(
          `⚠️ 선택된 ${this.slipPickedMissingBirth}명은 생년월일이 등록되어 있지 않아서 PDF가 생성되지 않습니다.\n\n` +
          `그대로 진행하시겠습니까?\n(나머지 인원만 비번 PDF로 만들어집니다)`
        );
        if (!ok) return;
      }
      this.slipPickModal.loading = true;
      this.slipPickModal.lastMsg = '';
      try {
        const res = await fetch('/api/salary/slip/pdf/bulk', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({
            companyId: this.company,
            yearMonth: this.yearMonth,
            userIds: ids,
            withPassword,
          }),
        });
        if (!res.ok) {
          let msg = 'PDF 생성 실패';
          try { const d = await res.json(); msg = d.error || msg; } catch(e) {}
          alert(msg);
          this.slipPickModal.loading = false;
          return;
        }
        // 파일명 추출
        const cd = res.headers.get('Content-Disposition') || '';
        let filename = `급여명세서_${this.yearMonth}.pdf`;
        const m = cd.match(/filename\*=UTF-8''([^;]+)/);
        if (m) { try { filename = decodeURIComponent(m[1]); } catch(e) {} }
        const failed = parseInt(res.headers.get('X-Slip-Failed') || '0', 10) || 0;
        const blob = await res.blob();
        // 다운로드 트리거
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = filename;
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 5000);
        this.slipPickModal.lastMsg = `✓ ${filename} 다운로드` + (failed > 0 ? ` (실패 ${failed}명 — ZIP 내 실패목록.txt 참조)` : '');
      } catch (e) {
        alert('오류: ' + (e.message || e));
      } finally {
        this.slipPickModal.loading = false;
      }
    },

    // ── 급여명세서 팝업 ───────────────────────────────────────
    openSlip(r) {
      if (!r) return;
      const url = `/api/salary/slip/${r.userId}/${r.yearMonth}?company=${this.company}`;
      window.open(url, `slip_${r.userId}`, 'width=750,height=900');
      // 발급대장 기록
      fetch('/api/salary/issuances', { method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include',
        body: JSON.stringify({ yearMonth: r.yearMonth, userId: r.userId, companyId: this.company, issuedType: 'pdf' })
      }).catch(()=>{});
    },

    async emailBulk() {
      const count = this.records.filter(r => r.status !== 'draft').length;
      if (!confirm(`확정/지급된 ${count}명에게 급여명세서를 이메일로 발송할까요?`)) return;
      try {
        const r = await fetch('/api/salary/slip/email/bulk', {
          method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include',
          body: JSON.stringify({ companyId: this.company, yearMonth: this.yearMonth })
        });
        const d = await r.json();
        const ok = d.results?.filter(x=>x.ok).length || 0;

    // ── 출퇴근 연동 ──────────────────────────────────────────
    async importAttendance() {
      this.attendanceModal = { open: true, employees: [], selected: new Set(), warn: '' };
      try {
        const r = await fetch(`/api/salary/attendance-import?company=${this.company}&month=${this.yearMonth}`, { credentials:'include' });
        const d = await r.json();
        if (!r.ok) { this.attendanceModal.warn = d.error || '오류'; return; }
        if (d.warn) this.attendanceModal.warn = d.warn;
        if (d.note) this.attendanceModal.note = d.note; // 대림컴퍼니 자동계산 안내
        this.attendanceModal.employees = d.employees || [];
        // 기본: draft 상태 직원 전체 선택
        const draftIds = new Set(this.records.filter(r=>r.status==='draft').map(r=>r.userId));
        this.attendanceModal.selected = new Set(d.employees.filter(e=>draftIds.has(e.userId)).map(e=>e.userId));
      } catch(e) { this.attendanceModal.warn = '서버 오류: ' + e.message; }
    },
    async applyAttendance() {
      const targets = this.attendanceModal.employees.filter(e => this.attendanceModal.selected.has(e.userId));
      if (!targets.length) return;
      try {
        const r = await fetch('/api/salary/attendance-apply', {
          method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include',
          body: JSON.stringify({ companyId: this.company, yearMonth: this.yearMonth, employees: targets })
        });
        const d = await r.json();
        const ok = d.results?.filter(x=>x.ok).length || 0;
        const skip = d.results?.filter(x=>x.skipped).length || 0;
        alert(`출퇴근 연동 완료\n반영: ${ok}명${skip?` / 건너뜀: ${skip}명 (확정/지급됨)`:''}`)
        this.attendanceModal.open = false;
        await this.loadRecords();
      } catch(e) { alert('오류: ' + e.message); }
    },

    // ── 연장근무 CAPS 자동 가져오기 ────────────────────────────
    async importOvertimeFromCaps() {
      this.overtimeImportModal = { open: true, employees: [], warn: '' };
      try {
        const r = await fetch(`/api/salary/overtime-import?company=${this.company}&month=${this.yearMonth}`, { credentials:'include' });
        const d = await r.json();
        if (!r.ok) { this.overtimeImportModal.warn = d.error || '오류'; return; }
        if (d.warn) this.overtimeImportModal.warn = d.warn;
        // 오탐 의심 항목은 기본 unchecked
        const emps = (d.employees || []).map(e => ({
          ...e,
          suspicious: (e.suspicious || []).map(s => ({ ...s, _checked: false })),
        }));
        this.overtimeImportModal.employees = emps;
      } catch(e) { this.overtimeImportModal.warn = '서버 오류: ' + e.message; }
    },
    async applyOvertimeImport() {
      const emps = this.overtimeImportModal.employees;
      if (!emps.length) { this.overtimeImportModal.open = false; return; }
      // 각 직원의 최종 연장시간 = confirmedH + 체크된 suspicious.hours 합산
      const rows = emps.map(e => {
        const extra = (e.suspicious || []).filter(s => s._checked).reduce((a,s)=>a+s.hours, 0);
        return { userId: e.userId, overtimeH: +(e.confirmedH + extra).toFixed(2) };
      });

      const cfg = this.configs.find(c => c.userId === row.userId);
      if (!cfg) return 0;
      const hourlyRate = cfg.hourlyRate || 0;
      const s = this.settingsForm;
      const otM = +(s.overtimeMultiple || 1.5);
      const ntM = +(s.nightMultiple || 0.5);
      const holM = +(s.holidayMultiple || 1.5);
      const holOtM = +(s.holidayOtMultiple || 2.0);
      return Math.floor(
        (+(row.overtimeH||0) * hourlyRate * otM +
         +(row.nightH||0) * hourlyRate * ntM +
         +(row.holidayH||0) * hourlyRate * holM +
         +(row.holidayOtH||0) * hourlyRate * holOtM) / 10) * 10;
