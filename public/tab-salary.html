<!-- ===== 급여 관리 탭 ===== -->
<template x-if="currentTab === 'salary'">
<div x-data="salaryApp()" x-init="init()" style="height:100%;display:flex;flex-direction:column;">

<style>
  /* 급여 탭 전용 반응형/스크롤바 */
  #salary-scope table::-webkit-scrollbar { height:10px; width:10px; }
  #salary-scope table::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:6px; }
  #salary-scope .salary-sub-actions { display:flex; gap:6px; flex-wrap:wrap; }
  @media (max-width: 900px) {
    #salary-scope .salary-header-label { font-size:15px !important; }
    #salary-scope table { font-size:11px !important; }
    #salary-scope .salary-action-btn { padding:5px 9px !important; font-size:11px !important; }
  }
  @media (max-width: 640px) {
    #salary-scope .summary-card-value { font-size:15px !important; }
  }
</style>

<!-- ── PIN 재인증 화면 ──────────────────────────────────────── -->
<div x-show="!pinOk" style="display:flex;align-items:center;justify-content:center;height:100%;background:#f9fafb;">
  <div style="background:#fff;border-radius:16px;padding:40px 48px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.1);min-width:320px;">
    <div style="font-size:40px;margin-bottom:12px;">🔐</div>
    <div style="font-size:18px;font-weight:700;color:#1f2937;margin-bottom:4px;">급여 보안 PIN</div>
    <div style="font-size:13px;color:#6b7280;margin-bottom:24px;">급여 데이터에 접근하려면 PIN을 입력하세요</div>
    <input x-model="pinInput" @keydown.enter="submitPin()" type="password" maxlength="6"
      placeholder="PIN 6자리" style="width:100%;padding:12px;border:1px solid #d1d5db;border-radius:8px;font-size:18px;text-align:center;letter-spacing:8px;margin-bottom:12px;">
    <div x-show="pinError" x-text="pinError" style="color:#ef4444;font-size:12px;margin-bottom:8px;"></div>
    <button @click="submitPin()" style="width:100%;padding:12px;background:#4f6ef7;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;">확인</button>
  </div>
</div>

<!-- ── 메인 UI (PIN 인증 후) ──────────────────────────────── -->
<div x-show="pinOk" id="salary-scope" style="display:flex;flex-direction:column;height:100%;">

  <!-- 상단 헤더 -->
  <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:#fff;border-bottom:1px solid #e5e7eb;flex-shrink:0;flex-wrap:wrap;">
    <span style="font-size:18px;font-weight:700;color:#1f2937;">💰 급여 관리</span>
    <!-- 회사 선택 -->
    <div style="display:flex;gap:4px;background:#f3f4f6;border-radius:8px;padding:3px;">
      <button @click="company='dalim-sm';loadAll()" :style="company==='dalim-sm'?'background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.1);':''"
        style="padding:5px 14px;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600;transition:all .15s;">대림에스엠</button>
      <button @click="company='dalim-company';loadAll()" :style="company==='dalim-company'?'background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.1);':''"
        style="padding:5px 14px;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600;transition:all .15s;">대림컴퍼니</button>
    </div>
    <!-- 귀속월 -->
    <input type="month" x-model="yearMonth" @change="loadAll()" style="padding:6px 10px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;">
    <!-- 서브탭 -->
    <div style="display:flex;gap:2px;margin-left:8px;">
      <template x-for="tab in subTabs" :key="tab.id">
        <button @click="switchSubTab(tab.id)" :style="subTab===tab.id?'background:#4f6ef7;color:#fff;':'background:#f3f4f6;color:#374151;'"
          style="padding:6px 14px;border:none;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600;transition:all .15s;" x-text="tab.label"></button>
      </template>
    </div>
    <span style="flex:1"></span>
    <!-- 액션 버튼 -->
    <button x-show="subTab==='ledger'" @click="openLabelModal()" style="padding:6px 12px;background:#f3f4f6;border:none;border-radius:6px;font-size:12px;cursor:pointer;">📝 항목명 설정</button>
    <button x-show="subTab==='ledger'" @click="importAttendance()" style="padding:6px 12px;background:#8b5cf6;color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600;" title="출퇴근 탭의 근무일수/연장시간을 급여 레코드에 자동 반영">🔗 출퇴근 연동</button>
    <button x-show="subTab==='ledger'" @click="calcAll()" style="padding:6px 14px;background:#10b981;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600;">⚡ 전체 자동계산</button>
    <!-- 선택 출력 버튼 (선택된 직원 있을 때만 강조) -->
    <button x-show="subTab==='ledger'"
      @click="printSelected()"
      :style="selectedIds.size>0?'background:#4f6ef7;color:#fff;':'background:#f3f4f6;color:#374151;'"
      style="padding:6px 12px;border:none;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600;transition:all .15s;">
      🖨️ 명세서 출력 <span x-show="selectedIds.size>0" x-text="'('+selectedIds.size+'명)'"></span>
    </button>
    <button x-show="subTab==='ledger'" @click="exportCsv()" style="padding:6px 12px;background:#f3f4f6;border:none;border-radius:6px;font-size:12px;cursor:pointer;">📥 CSV</button>
    <button x-show="subTab==='ledger'" @click="emailBulk()" style="padding:6px 12px;background:#f3f4f6;border:none;border-radius:6px;font-size:12px;cursor:pointer;">📧 일괄발송</button>
  </div>

  <!-- ── 서브탭 콘텐츠 ────────────────────────────────────── -->
  <div style="flex:1;overflow:auto;padding:16px;">

    <!-- ★ 급여대장 탭 -->
    <div x-show="subTab==='ledger'">
      <div x-show="loading" style="text-align:center;padding:40px;color:#9ca3af;">불러오는 중...</div>
      <div x-show="!loading">
        <!-- 요약 카드 -->
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:16px;">
          <div style="background:#fff;border-radius:10px;padding:14px;border:1px solid #e5e7eb;">
            <div style="font-size:11px;color:#6b7280;margin-bottom:4px;">대상 인원</div>
            <div style="font-size:20px;font-weight:700;color:#1f2937;" x-text="records.length + '명'"></div>
          </div>
          <div style="background:#fff;border-radius:10px;padding:14px;border:1px solid #e5e7eb;">
            <div style="font-size:11px;color:#6b7280;margin-bottom:4px;">지급합계</div>
            <div style="font-size:18px;font-weight:700;color:#1f2937;" x-text="fmtW(sumField('grossPay'))"></div>
          </div>
          <div style="background:#fff;border-radius:10px;padding:14px;border:1px solid #e5e7eb;">
            <div style="font-size:11px;color:#6b7280;margin-bottom:4px;">공제합계</div>
            <div style="font-size:18px;font-weight:700;color:#ef4444;" x-text="fmtW(sumField('totalDeductions'))"></div>
          </div>
          <div style="background:#3b82f6;border-radius:10px;padding:14px;">
            <div style="font-size:11px;color:#bfdbfe;margin-bottom:4px;">실지급합계</div>
            <div style="font-size:18px;font-weight:700;color:#fff;" x-text="fmtW(sumField('netPay'))"></div>
          </div>
        </div>

        <!-- 급여대장 테이블 -->
        <div style="background:#fff;border-radius:10px;border:1px solid #e5e7eb;overflow:auto;">
          <table style="width:100%;border-collapse:collapse;font-size:12px;min-width:1200px;">
            <thead>
              <tr style="background:#f8fafc;border-bottom:2px solid #e5e7eb;">
                <th style="padding:10px 8px;text-align:center;white-space:nowrap;position:sticky;left:0;background:#f8fafc;z-index:2;width:36px;">
                  <input type="checkbox" @change="toggleSelectAll($event)" :checked="selectedIds.size>0&&selectedIds.size===records.length" :indeterminate="selectedIds.size>0&&selectedIds.size<records.length" title="전체 선택/해제">
                </th>
                <th style="padding:10px 8px;text-align:left;font-weight:600;white-space:nowrap;position:sticky;left:36px;background:#f8fafc;z-index:2;">이름</th>
                <th style="padding:10px 6px;text-align:right;white-space:nowrap;" title="기본급">기본급</th>
                <th style="padding:10px 6px;text-align:right;white-space:nowrap;" title="고정연장">고정연장</th>
                <th style="padding:10px 6px;text-align:right;white-space:nowrap;" title="식대">식대</th>
                <th style="padding:10px 6px;text-align:right;white-space:nowrap;" title="연장수당">연장</th>
                <th style="padding:10px 6px;text-align:right;white-space:nowrap;" title="상여">상여</th>
                <th style="padding:10px 6px;text-align:right;white-space:nowrap;" title="기타지급합계">기타</th>
                <th style="padding:10px 6px;text-align:right;white-space:nowrap;background:#f0fdf4;" title="과세합계">과세</th>
                <th style="padding:10px 6px;text-align:right;white-space:nowrap;background:#f0fdf4;" title="지급합계">지급합계</th>
                <th style="padding:10px 6px;text-align:right;white-space:nowrap;background:#fef2f2;" title="4대보험합계">4대보험</th>
                <th style="padding:10px 6px;text-align:right;white-space:nowrap;background:#fef2f2;" title="소득세+지방세">소득세</th>
                <th style="padding:10px 6px;text-align:right;white-space:nowrap;background:#fef2f2;" title="공제합계">공제합계</th>
                <th style="padding:10px 6px;text-align:right;white-space:nowrap;background:#eff6ff;font-weight:700;" title="실지급액">실지급액</th>
                <th style="padding:10px 6px;text-align:center;white-space:nowrap;">상태</th>
                <th style="padding:10px 6px;text-align:center;white-space:nowrap;">액션</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="r in records" :key="r.id||r.userId">
                <tr style="border-bottom:1px solid #f3f4f6;cursor:pointer;" @click="openDetail(r)" :style="selectedIds.has(r.userId)?'background:#eff6ff;':''">
                  <td style="padding:9px 8px;text-align:center;position:sticky;left:0;z-index:1;" :style="selectedIds.has(r.userId)?'background:#eff6ff;':'background:#fff;'" @click.stop>
                    <input type="checkbox" :checked="selectedIds.has(r.userId)" @change="toggleSelect(r.userId,$event)">
                  </td>
                  <td style="padding:9px 8px;font-weight:600;white-space:nowrap;position:sticky;left:36px;z-index:1;" :style="selectedIds.has(r.userId)?'background:#eff6ff;':'background:#fff;'" x-text="nameOf(r.userId)"></td>
                  <td style="padding:9px 6px;text-align:right;" x-text="fmt(r.baseSalary)"></td>
                  <td style="padding:9px 6px;text-align:right;color:#6b7280;" x-text="r.fixedOvertimePay?fmt(r.fixedOvertimePay):''"></td>
                  <td style="padding:9px 6px;text-align:right;color:#6b7280;" x-text="r.mealAllowance?fmt(r.mealAllowance):''"></td>
                  <td style="padding:9px 6px;text-align:right;color:#6b7280;" x-text="r.overtimePay?fmt(r.overtimePay):''"></td>
                  <td style="padding:9px 6px;text-align:right;color:#6b7280;" x-text="r.bonusPay?fmt(r.bonusPay):''"></td>
                  <td style="padding:9px 6px;text-align:right;color:#6b7280;" x-text="extraPay(r)?fmt(extraPay(r)):''"></td>
                  <td style="padding:9px 6px;text-align:right;background:#f0fdf4;" x-text="fmt(r.taxableTotal)"></td>
                  <td style="padding:9px 6px;text-align:right;background:#f0fdf4;font-weight:600;" x-text="fmt(r.grossPay)"></td>
                  <td style="padding:9px 6px;text-align:right;background:#fef2f2;" x-text="fmt((r.nationalPension||0)+(r.healthInsurance||0)+(r.longTermCare||0)+(r.employmentInsurance||0))"></td>
                  <td style="padding:9px 6px;text-align:right;background:#fef2f2;" x-text="fmt((r.incomeTax||0)+(r.localTax||0))"></td>
                  <td style="padding:9px 6px;text-align:right;background:#fef2f2;font-weight:600;" x-text="fmt(r.totalDeductions)"></td>
                  <td style="padding:9px 6px;text-align:right;background:#eff6ff;font-weight:700;color:#1d4ed8;" x-text="fmt(r.netPay)"></td>
                  <td style="padding:9px 6px;text-align:center;">
                    <span :style="statusStyle(r.status)" style="padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;" x-text="statusLabel(r.status)"></span>
                  </td>
                  <td style="padding:9px 6px;text-align:center;" @click.stop>
                    <button @click="openSlip(r)" title="명세서" style="padding:3px 8px;background:#f3f4f6;border:none;border-radius:4px;font-size:11px;cursor:pointer;margin-right:2px;">📄</button>
                    <template x-if="r.status==='draft'">
                      <button @click="confirmOne(r)" title="확정" style="padding:3px 8px;background:#10b981;color:#fff;border:none;border-radius:4px;font-size:11px;cursor:pointer;">✓확정</button>
                    </template>
                    <template x-if="r.status==='confirmed'">
                      <button @click="paidOne(r)" title="지급처리" style="padding:3px 8px;background:#3b82f6;color:#fff;border:none;border-radius:4px;font-size:11px;cursor:pointer;">💸지급</button>
                    </template>
                  </td>
                </tr>
              </template>
              <tr x-show="records.length===0">
                <td colspan="15" style="padding:32px;text-align:center;color:#9ca3af;">
                  급여 데이터가 없습니다. [전체 자동계산] 버튼을 눌러 계산하세요.
                </td>
              </tr>
            </tbody>
            <!-- 합계 행 -->
            <tfoot x-show="records.length>0">
              <tr style="background:#f8fafc;border-top:2px solid #e5e7eb;font-weight:700;">
                <td style="padding:9px 8px;position:sticky;left:0;background:#f8fafc;"></td>
                <td style="padding:9px 8px;position:sticky;left:36px;background:#f8fafc;">합계</td>
                <td style="padding:9px 6px;text-align:right;" x-text="fmt(sumField('baseSalary'))"></td>
                <td style="padding:9px 6px;text-align:right;" x-text="fmt(sumField('fixedOvertimePay'))"></td>
                <td style="padding:9px 6px;text-align:right;" x-text="fmt(sumField('mealAllowance'))"></td>
                <td style="padding:9px 6px;text-align:right;" x-text="fmt(sumField('overtimePay'))"></td>
                <td style="padding:9px 6px;text-align:right;" x-text="fmt(sumField('bonusPay'))"></td>
                <td style="padding:9px 6px;text-align:right;"></td>
                <td style="padding:9px 6px;text-align:right;background:#f0fdf4;" x-text="fmt(sumField('taxableTotal'))"></td>
                <td style="padding:9px 6px;text-align:right;background:#f0fdf4;" x-text="fmt(sumField('grossPay'))"></td>
                <td style="padding:9px 6px;text-align:right;background:#fef2f2;" x-text="fmt(sumField('nationalPension')+sumField('healthInsurance')+sumField('longTermCare')+sumField('employmentInsurance'))"></td>
                <td style="padding:9px 6px;text-align:right;background:#fef2f2;" x-text="fmt(sumField('incomeTax')+sumField('localTax'))"></td>
                <td style="padding:9px 6px;text-align:right;background:#fef2f2;" x-text="fmt(sumField('totalDeductions'))"></td>
                <td style="padding:9px 6px;text-align:right;background:#eff6ff;color:#1d4ed8;" x-text="fmt(sumField('netPay'))"></td>
                <td colspan="2"></td>
              </tr>
            </tfoot>
          </table>
        </div>
        <!-- 발급대장 간략 표시 -->
        <div x-show="issuances.length>0" style="margin-top:12px;background:#fff;border-radius:8px;border:1px solid #e5e7eb;padding:12px;">
          <div style="font-size:12px;font-weight:600;color:#374151;margin-bottom:8px;">📋 발급 내역</div>
          <div style="display:flex;flex-wrap:wrap;gap:6px;">
            <template x-for="is in issuances.slice(0,10)" :key="is.id">
              <span style="font-size:11px;background:#f3f4f6;padding:3px 8px;border-radius:4px;" x-text="is.issuedAt?.slice(0,16)+' '+nameOf(is.userId)+' '+is.issuedType"></span>
            </template>
          </div>
        </div>
      </div>
    </div>

    <!-- ★ 직원 설정 탭 -->
    <div x-show="subTab==='config'">
      <div style="display:flex;gap:12px;align-items:center;margin-bottom:14px;">
        <span style="font-size:14px;font-weight:600;color:#374151;">직원별 급여 기초 설정</span>
        <button @click="openConfigModal(null)" style="padding:6px 14px;background:#4f6ef7;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;">+ 직원 추가</button>
      </div>
      <div style="background:#fff;border-radius:10px;border:1px solid #e5e7eb;overflow:auto;">
        <table style="width:100%;border-collapse:collapse;font-size:12px;min-width:900px;">
          <thead>
            <tr style="background:#f8fafc;border-bottom:2px solid #e5e7eb;">
              <th style="padding:10px 8px;text-align:left;">이름</th>
              <th style="padding:10px 8px;text-align:right;">기본급</th>
              <th style="padding:10px 8px;text-align:right;">고정연장</th>
              <th style="padding:10px 8px;text-align:right;">고정휴일</th>
              <th style="padding:10px 8px;text-align:right;">식대</th>
              <th style="padding:10px 8px;text-align:right;">차량유지비</th>
              <th style="padding:10px 8px;text-align:right;">팀장수당</th>
              <th style="padding:10px 8px;text-align:right;">통상임금</th>
              <th style="padding:10px 8px;text-align:right;">소정근로</th>
              <th style="padding:10px 8px;text-align:right;">통상시급</th>
              <th style="padding:10px 8px;text-align:center;">세금유형</th>
              <th style="padding:10px 8px;text-align:center;">부양가족</th>
              <th style="padding:10px 8px;text-align:center;">4대보험</th>
              <th style="padding:10px 8px;text-align:center;"></th>
            </tr>
          </thead>
          <tbody>
            <template x-for="c in configs" :key="c.userId">
              <tr style="border-bottom:1px solid #f3f4f6;" @dblclick="openConfigModal(c)">
                <td style="padding:9px 8px;font-weight:600;" x-text="nameOf(c.userId)"></td>
                <td style="padding:9px 8px;text-align:right;" x-text="fmt(c.baseSalary)"></td>
                <td style="padding:9px 8px;text-align:right;color:#6b7280;" x-text="c.fixedOvertimePay?fmt(c.fixedOvertimePay):''"></td>
                <td style="padding:9px 8px;text-align:right;color:#6b7280;" x-text="c.fixedHolidayPay?fmt(c.fixedHolidayPay):''"></td>
                <td style="padding:9px 8px;text-align:right;color:#6b7280;" x-text="c.mealAllowance?fmt(c.mealAllowance):''"></td>
                <td style="padding:9px 8px;text-align:right;color:#6b7280;" x-text="c.transportAllowance?fmt(c.transportAllowance):''"></td>
                <td style="padding:9px 8px;text-align:right;color:#6b7280;" x-text="c.teamLeaderAllowance?fmt(c.teamLeaderAllowance):''"></td>
                <td style="padding:9px 8px;text-align:right;font-weight:600;" x-text="fmt(c.normalWage)"></td>
                <td style="padding:9px 8px;text-align:right;" x-text="c.workingHours+'h'"></td>
                <td style="padding:9px 8px;text-align:right;" x-text="fmt(Math.round(c.hourlyRate))+'원'"></td>
                <td style="padding:9px 8px;text-align:center;font-size:11px;" x-text="c.incomeTaxType"></td>
                <td style="padding:9px 8px;text-align:center;" x-text="(c.dependents||1)+'명'+(c.childrenCount?' / 자녀'+c.childrenCount:'')"></td>
                <td style="padding:9px 8px;text-align:center;font-size:11px;color:#6b7280;">
                  <span :style="c.pensionOpt==='O'?'':'opacity:.3'">연</span>
                  <span :style="c.healthOpt==='O'?'':'opacity:.3'">건</span>
                  <span :style="c.ltcOpt==='O'?'':'opacity:.3'">장</span>
                  <span :style="c.employmentOpt==='O'?'':'opacity:.3'">고</span>
                </td>
                <td style="padding:9px 8px;text-align:center;" @click.stop>
                  <button @click="openConfigModal(c)" style="padding:3px 10px;background:#f3f4f6;border:none;border-radius:4px;font-size:11px;cursor:pointer;">수정</button>
                </td>
              </tr>
            </template>
            <tr x-show="configs.length===0">
              <td colspan="14" style="padding:32px;text-align:center;color:#9ca3af;">설정된 직원이 없습니다.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- ★ 연간현황 탭 -->
    <div x-show="subTab==='annual'">
      <div style="display:flex;gap:12px;align-items:center;margin-bottom:14px;">
        <span style="font-size:14px;font-weight:600;">연간 급여현황</span>

              <span style="font-size:11px;color:#10b981;">※ 건보료 대비 2026년: 13.14</span>
            </label>
            <label style="display:flex;align-items:center;gap:10px;font-size:13px;">
              <span style="width:120px;color:#374151;">고용보험 (%)</span>
              <input type="number" x-model="settingsForm.employmentRate" step="0.01" style="flex:1;padding:7px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;">
            </label>
            <div style="border-top:1px solid #e5e7eb;padding-top:10px;margin-top:4px;font-size:12px;font-weight:600;color:#374151;">시간외수당 배수</div>
            <label style="display:flex;align-items:center;gap:10px;font-size:13px;">
              <span style="width:120px;color:#374151;">연장수당 배수</span>
              <input type="number" x-model="settingsForm.overtimeMultiple" step="0.1" style="flex:1;padding:7px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;">
            </label>
            <label style="display:flex;align-items:center;gap:10px;font-size:13px;">
              <span style="width:120px;color:#374151;">야간수당 배수</span>
              <input type="number" x-model="settingsForm.nightMultiple" step="0.1" style="flex:1;padding:7px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;">
            </label>
            <label style="display:flex;align-items:center;gap:10px;font-size:13px;">
              <span style="width:120px;color:#374151;">절사 단위</span>
              <select x-model="settingsForm.roundingUnit" style="flex:1;padding:7px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;">
                <option>원단위</option><option>십단위</option><option>백단위</option><option>천단위</option>
              </select>
            </label>
            <button @click="saveSettings()" style="width:100%;padding:10px;background:#4f6ef7;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-weight:600;margin-top:4px;">저장</button>
          </div>
        </div>
        <!-- 간이세액표 -->
        <div style="background:#fff;border-radius:10px;border:1px solid #e5e7eb;padding:20px;">
          <div style="font-size:14px;font-weight:700;margin-bottom:8px;">📊 근로소득 간이세액표</div>
          <div style="font-size:12px;color:#6b7280;margin-bottom:14px;">등록된 연도: <strong x-text="taxYears.join(', ')||'없음'"></strong></div>
          <div style="display:flex;flex-direction:column;gap:10px;">
            <div>
              <div style="font-size:12px;font-weight:600;margin-bottom:6px;">CSV 파일 업로드</div>
              <div style="font-size:11px;color:#6b7280;margin-bottom:8px;">컬럼: year, salaryFrom, salaryTo, dep1~dep11 (단위: 원)</div>
              <input type="number" x-model="taxUploadYear" placeholder="연도 (예: 2025)" style="width:120px;padding:7px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;margin-right:8px;">
              <input type="file" @change="taxFileSelected($event)" accept=".csv" style="font-size:12px;">
              <button @click="uploadTaxTable()" style="padding:7px 14px;background:#4f6ef7;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;margin-top:8px;width:100%;">업로드</button>
            </div>
            <div style="border-top:1px solid #e5e7eb;padding-top:10px;">
              <div style="font-size:12px;font-weight:600;margin-bottom:6px;">현재 등록된 세액표 조회</div>
              <div style="display:flex;gap:8px;margin-bottom:8px;">
                <select x-model="taxViewYear" @change="loadTaxTable()" style="padding:7px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;">
                  <template x-for="y in taxYears" :key="y"><option :value="y" x-text="y+'년'"></option></template>
                </select>
              </div>
              <div x-show="taxRows.length>0" style="overflow:auto;max-height:300px;border:1px solid #e5e7eb;border-radius:6px;">
                <table style="width:100%;border-collapse:collapse;font-size:11px;">
                  <thead>
                    <tr style="background:#f8fafc;position:sticky;top:0;">
                      <th style="padding:6px;text-align:right;">시작</th>
                      <th style="padding:6px;text-align:right;">끝</th>
                      <th style="padding:6px;text-align:right;">1인</th>
                      <th style="padding:6px;text-align:right;">2인</th>
                      <th style="padding:6px;text-align:right;">3인</th>
                      <th style="padding:6px;text-align:right;">4인</th>
                      <th style="padding:6px;text-align:right;">5인+</th>
                    </tr>
                  </thead>
                  <tbody>
                    <template x-for="t in taxRows.slice(0,30)" :key="t.id">
                      <tr style="border-bottom:1px solid #f3f4f6;">
                        <td style="padding:5px;text-align:right;" x-text="fmt(t.salaryFrom)"></td>
                        <td style="padding:5px;text-align:right;" x-text="fmt(t.salaryTo)"></td>
                        <td style="padding:5px;text-align:right;" x-text="fmt(t.dep1)"></td>
                        <td style="padding:5px;text-align:right;" x-text="fmt(t.dep2)"></td>
                        <td style="padding:5px;text-align:right;" x-text="fmt(t.dep3)"></td>
                        <td style="padding:5px;text-align:right;" x-text="fmt(t.dep4)"></td>
                        <td style="padding:5px;text-align:right;" x-text="fmt(t.dep5)"></td>
                      </tr>
                    </template>
                  </tbody>
                </table>
                <div x-show="taxRows.length>30" style="text-align:center;padding:6px;font-size:11px;color:#6b7280;" x-text="'+ '+(taxRows.length-30)+'행 더 있음'"></div>
              </div>
              <div x-show="taxRows.length===0" style="color:#9ca3af;font-size:12px;padding:12px 0;">등록된 세액표가 없습니다</div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /서브탭 콘텐츠 -->
</div><!-- /pinOk -->

<!-- 개인 급여 상세/수정 모달 -->
<div x-show="detailModal.open" style="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;" @click.self="detailModal.open=false">
  <div style="background:#fff;border-radius:14px;width:900px;max-width:95vw;max-height:90vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);">
    <div style="padding:20px 24px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1;">
      <div>
        <span style="font-size:16px;font-weight:700;" x-text="nameOf(detailModal.rec?.userId)+' — '+detailModal.rec?.yearMonth+' 급여명세'"></span>
        <span :style="statusStyle(detailModal.rec?.status)" style="margin-left:8px;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;" x-text="statusLabel(detailModal.rec?.status)"></span>
      </div>
      <div style="display:flex;gap:8px;">
        <button @click="openSlip(detailModal.rec)" style="padding:7px 14px;background:#f3f4f6;border:none;border-radius:6px;font-size:13px;cursor:pointer;">📄 명세서</button>
        <button @click="saveDetail()" x-show="detailModal.rec?.status==='draft'" style="padding:7px 16px;background:#4f6ef7;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600;">저장</button>
        <button @click="recalcOne()" x-show="detailModal.rec?.status==='draft'" style="padding:7px 14px;background:#10b981;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;">⚡ 재계산</button>
        <button @click="detailModal.open=false" style="padding:7px 12px;background:#f3f4f6;border:none;border-radius:6px;font-size:13px;cursor:pointer;">✕</button>
      </div>
    </div>
    <div style="padding:20px 24px;" x-show="detailModal.rec">
      <!-- 2단 레이아웃 -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
        <!-- 지급 -->
        <div>
          <div style="font-size:13px;font-weight:700;color:#374151;background:#f0fdf4;padding:8px 12px;border-radius:6px;margin-bottom:10px;">💰 지급 내역</div>
          <div style="display:grid;gap:6px;">
            <template x-for="f in payFields" :key="f.key">
              <div style="display:flex;align-items:center;gap:8px;">
                <span style="width:130px;font-size:12px;color:#374151;" x-text="f.label"></span>
                <template x-if="f.hours">
                  <input type="number" :value="detailModal.rec[f.hoursKey]" @input="detailModal.rec[f.hoursKey]=+$event.target.value" step="0.5" style="width:60px;padding:5px;border:1px solid #d1d5db;border-radius:4px;font-size:12px;" :disabled="detailModal.rec?.status!=='draft'" placeholder="시간">
                </template>
                <input type="number" :value="detailModal.rec[f.key]" @input="detailModal.rec[f.key]=+$event.target.value" style="flex:1;padding:5px;border:1px solid #d1d5db;border-radius:4px;font-size:12px;text-align:right;" :disabled="detailModal.rec?.status!=='draft'">
              </div>
            </template>
            <!-- 합계 -->
            <div style="border-top:1px solid #e5e7eb;padding-top:8px;margin-top:4px;">
              <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;">
                <span style="color:#374151;">과세합계</span><strong x-text="fmt(calcTaxable())"></strong>
              </div>
              <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;color:#6b7280;">
                <span>비과세합계</span><span x-text="fmt(calcNonTaxable())"></span>
              </div>
              <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700;background:#f0fdf4;padding:6px 8px;border-radius:4px;">
                <span>지급합계</span><span x-text="fmt(calcGross())"></span>
              </div>
            </div>
          </div>
        </div>
        <!-- 공제 -->
        <div>
          <div style="font-size:13px;font-weight:700;color:#374151;background:#fef2f2;padding:8px 12px;border-radius:6px;margin-bottom:10px;">➖ 공제 내역</div>
          <div style="display:grid;gap:6px;">
            <template x-for="f in dedFields" :key="f.key">
              <div style="display:flex;align-items:center;gap:8px;">
                <span style="width:150px;font-size:12px;color:#374151;" x-text="f.label"></span>
                <input type="number" :value="detailModal.rec[f.key]" @input="detailModal.rec[f.key]=+$event.target.value" style="flex:1;padding:5px;border:1px solid #d1d5db;border-radius:4px;font-size:12px;text-align:right;" :disabled="detailModal.rec?.status!=='draft'">
              </div>
            </template>
            <!-- 공제합계/실지급 -->
            <div style="border-top:1px solid #e5e7eb;padding-top:8px;margin-top:4px;">
              <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700;background:#fef2f2;padding:6px 8px;border-radius:4px;margin-bottom:6px;">
                <span>공제합계</span><span x-text="fmt(calcTotalDed())"></span>
              </div>
              <div style="display:flex;justify-content:space-between;font-size:15px;font-weight:800;background:#1e3a5f;color:#fff;padding:10px 12px;border-radius:6px;">
                <span>실지급액</span><span x-text="fmt(calcGross()-calcTotalDed())"></span>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- 기타 정보 -->
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:16px;">
        <label style="display:flex;flex-direction:column;gap:4px;font-size:12px;">
          <span style="color:#6b7280;">급여지급일</span>
          <input type="date" x-model="detailModal.rec.payDate" style="padding:7px;border:1px solid #d1d5db;border-radius:6px;" :disabled="detailModal.rec?.status!=='draft'">
        </label>
        <label style="display:flex;flex-direction:column;gap:4px;font-size:12px;">
          <span style="color:#6b7280;">근무일수</span>
          <input type="number" x-model="detailModal.rec.workDays" style="padding:7px;border:1px solid #d1d5db;border-radius:6px;" :disabled="detailModal.rec?.status!=='draft'">
        </label>
        <label style="display:flex;flex-direction:column;gap:4px;font-size:12px;">
          <span style="color:#6b7280;">메모</span>
          <input type="text" x-model="detailModal.rec.note" style="padding:7px;border:1px solid #d1d5db;border-radius:6px;" :disabled="detailModal.rec?.status!=='draft'">
        </label>
      </div>
    </div>
  </div>
</div>

<!-- 직원 설정 모달 -->
<div x-show="configModal.open" style="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;" @click.self="configModal.open=false">
  <div style="background:#fff;border-radius:14px;width:700px;max-width:95vw;max-height:90vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);">
    <div style="padding:18px 22px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1;">
      <span style="font-size:15px;font-weight:700;">직원 급여 기초 설정</span>
      <button @click="configModal.open=false" style="padding:6px 12px;background:#f3f4f6;border:none;border-radius:6px;cursor:pointer;">✕</button>
    </div>
    <div style="padding:20px 22px;">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <!-- 직원 선택 -->
        <!-- 직원 선택 (ERP 등록 직원 선택 또는 직접 입력) -->
        <div style="grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          <label style="display:flex;flex-direction:column;gap:4px;font-size:12px;">
            <span style="color:#6b7280;font-weight:600;">직원 이름 *</span>
            <div style="display:flex;gap:6px;">
              <input type="text" x-model="configModal.form.name" placeholder="이름 직접 입력"
                style="flex:1;padding:8px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;">
              <select @change="e=>{ const u=allUsers.find(x=>x.id===e.target.value); if(u){ configModal.form.userId=u.id; configModal.form.name=u.name; } e.target.value=''; }"
                style="width:110px;padding:6px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;">
                <option value="">ERP선택</option>
                <template x-for="u in allUsers" :key="u.id">
                  <option :value="u.id" x-text="u.name||u.id"></option>
                </template>
              </select>
            </div>
            <span style="font-size:11px;color:#9ca3af;">ERP 미등록(대림컴퍼니 등)은 이름 직접 입력</span>
          </label>
          <label style="display:flex;flex-direction:column;gap:4px;font-size:12px;">
            <span style="color:#6b7280;font-weight:600;">직원 ID * <span style="font-weight:400;color:#9ca3af;">(ERP 선택 시 자동)</span></span>
            <input type="text" x-model="configModal.form.userId" placeholder="예: comp-001"
              style="padding:8px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;">
          </label>
        </div>
        <label style="display:flex;flex-direction:column;gap:4px;font-size:12px;">
          <span style="color:#6b7280;">적용 시작일</span>
          <input type="date" x-model="configModal.form.effectiveFrom" style="padding:8px;border:1px solid #d1d5db;border-radius:6px;">
        </label>
        <label style="display:flex;flex-direction:column;gap:4px;font-size:12px;">
          <span style="color:#6b7280;">월 소정근로시간</span>
          <select x-model="configModal.form.workingHours" style="padding:8px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;">
            <option value="209">209 (사무직)</option>
            <option value="216.875">216.875 (5일 주44h)</option>
            <option value="224.75">224.75 (5일 주46h)</option>
            <option value="241.55">241.55 (6일 주44h)</option>
          </select>
        </label>
        <label style="display:flex;flex-direction:column;gap:4px;font-size:12px;">
          <span style="color:#6b7280;">기본급 *</span>
          <input type="number" x-model="configModal.form.baseSalary" @input="updateNormal()" style="padding:8px;border:1px solid #d1d5db;border-radius:6px;">
        </label>
        <label style="display:flex;flex-direction:column;gap:4px;font-size:12px;">
          <span style="color:#6b7280;">고정연장수당</span>
          <input type="number" x-model="configModal.form.fixedOvertimePay" @input="updateNormal()" style="padding:8px;border:1px solid #d1d5db;border-radius:6px;">
        </label>
        <label style="display:flex;flex-direction:column;gap:4px;font-size:12px;">
          <span style="color:#6b7280;">고정휴일수당</span>
          <input type="number" x-model="configModal.form.fixedHolidayPay" @input="updateNormal()" style="padding:8px;border:1px solid #d1d5db;border-radius:6px;">
        </label>
        <label style="display:flex;flex-direction:column;gap:4px;font-size:12px;">
          <span style="color:#6b7280;">식대</span>
          <input type="number" x-model="configModal.form.mealAllowance" style="padding:8px;border:1px solid #d1d5db;border-radius:6px;">
        </label>
        <label style="display:flex;flex-direction:column;gap:4px;font-size:12px;">
          <span style="color:#6b7280;">차량유지비</span>
          <input type="number" x-model="configModal.form.transportAllowance" style="padding:8px;border:1px solid #d1d5db;border-radius:6px;">
        </label>
        <label style="display:flex;flex-direction:column;gap:4px;font-size:12px;">
          <span style="color:#6b7280;">팀장수당</span>
          <input type="number" x-model="configModal.form.teamLeaderAllowance" style="padding:8px;border:1px solid #d1d5db;border-radius:6px;">
        </label>
        <!-- 자동계산 표시 -->
        <div style="background:#f0fdf4;border-radius:6px;padding:10px;font-size:12px;display:grid;gap:4px;">
          <div style="display:flex;justify-content:space-between;"><span>통상임금</span><strong x-text="fmt(configModal.form.normalWage||0)"></strong></div>
          <div style="display:flex;justify-content:space-between;color:#6b7280;"><span>통상시급</span><span x-text="fmt(Math.round((configModal.form.normalWage||0)/(configModal.form.workingHours||209)))+'원'"></span></div>
        </div>
        <!-- 세금 설정 -->
        <label style="display:flex;flex-direction:column;gap:4px;font-size:12px;">
          <span style="color:#6b7280;">소득세 유형</span>
          <select x-model="configModal.form.incomeTaxType" style="padding:8px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;">
            <option>근로소득 100%</option>
            <option>근로소득 80%</option>
            <option>근로소득 120%</option>
            <option>10%감면</option><option>20%감면</option><option>30%감면</option>
            <option>50%감면</option><option>70%감면</option><option>90%감면</option>
            <option>사업소득 3.3%</option>
            <option>기타소득 8.8%</option>
          </select>
        </label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px;">
          <label style="display:flex;flex-direction:column;gap:4px;">
            <span style="color:#6b7280;">부양가족(본인포함)</span>
            <input type="number" x-model="configModal.form.dependents" min="1" style="padding:8px;border:1px solid #d1d5db;border-radius:6px;">
          </label>
          <label style="display:flex;flex-direction:column;gap:4px;">
            <span style="color:#6b7280;">자녀수(7~20세)</span>
            <input type="number" x-model="configModal.form.childrenCount" min="0" style="padding:8px;border:1px solid #d1d5db;border-radius:6px;">
          </label>
        </div>
        <!-- 4대보험 가입 여부 -->
        <div style="grid-column:1/-1;font-size:12px;">
          <div style="font-weight:600;color:#374151;margin-bottom:8px;">4대보험 가입 여부</div>
          <div style="display:flex;gap:16px;">
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
              <input type="checkbox" :checked="configModal.form.pensionOpt==='O'" @change="configModal.form.pensionOpt=$event.target.checked?'O':'X'"> 국민연금
            </label>
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
              <input type="checkbox" :checked="configModal.form.healthOpt==='O'" @change="configModal.form.healthOpt=$event.target.checked?'O':'X'"> 건강보험
            </label>
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
              <input type="checkbox" :checked="configModal.form.ltcOpt==='O'" @change="configModal.form.ltcOpt=$event.target.checked?'O':'X'"> 장기요양

    async recalcOne() {
      if (!confirm('현재 입력된 값으로 4대보험/소득세를 재계산할까요?')) return;
      try {
        const r = await fetch('/api/salary/calculate', {
          method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include',
          body: JSON.stringify({ companyId: this.company, yearMonth: this.yearMonth, userIds: [this.detailModal.rec.userId], overwrite: true })
        });
        if (r.ok) {
          await this.loadRecords();
          const updated = this.records.find(x => x.userId === this.detailModal.rec.userId);
          if (updated) this.detailModal.rec = { ...updated };
        }
      } catch(e) {}
    },

    // ── 실시간 합계 계산 (모달) ───────────────────────────────
    calcTaxable() {
      const r = this.detailModal.rec || {};
      const all = (r.baseSalary||0)+(r.fixedOvertimePay||0)+(r.fixedHolidayPay||0)+(r.mealAllowance||0)
        +(r.transportAllowance||0)+(r.teamLeaderAllowance||0)+(r.overtimePay||0)+(r.nightPay||0)
        +(r.holidayPay||0)+(r.holidayOtPay||0)+(r.bonusPay||0)+(r.retroPay||0)+(r.leavePay||0)
        +(r.extraPay1||0)+(r.extraPay2||0)+(r.extraPay3||0);
      return all - this.calcNonTaxable();
    },
    calcNonTaxable() {
      const r = this.detailModal.rec || {};
      return Math.min(r.mealAllowance||0, 200000) + (r.transportAllowance||0);
    },
    calcGross() { return this.calcTaxable() + this.calcNonTaxable(); },
    calcTotalDed() {
      const r = this.detailModal.rec || {};
      return (r.nationalPension||0)+(r.healthInsurance||0)+(r.longTermCare||0)+(r.employmentInsurance||0)
        +(r.incomeTax||0)+(r.localTax||0)+(r.incomeTaxAdj||0)+(r.localTaxAdj||0)
        +(r.healthAnnual||0)+(r.ltcAnnual||0)+(r.healthInstallment||0)+(r.ltcInstallment||0)
        +(r.healthAprExtra||0)+(r.ltcAprExtra||0)+(r.healthRefundInterest||0)+(r.ltcRefundInterest||0)
        +(r.miscDeduction1||0)+(r.miscDeduction2||0)+(r.extraDeduction1||0)+(r.extraDeduction2||0)+(r.extraDeduction3||0);
    },

    // ── 체크박스 선택 ─────────────────────────────────────────
    toggleSelect(userId, e) {
      const next = new Set(this.selectedIds);
      e.target.checked ? next.add(userId) : next.delete(userId);
      this.selectedIds = next;
    },
    toggleSelectAll(e) {
      this.selectedIds = e.target.checked ? new Set(this.records.map(r => r.userId)) : new Set();
    },

    // ── 선택 직원 명세서 출력 ──────────────────────────────────
    printSelected() {
      const targets = this.selectedIds.size > 0
        ? this.records.filter(r => this.selectedIds.has(r.userId))
        : this.records; // 아무것도 선택 안 하면 전체
      if (targets.length === 0) { alert('출력할 급여 데이터가 없습니다'); return; }
      if (targets.length > 10) {
        if (!confirm(`${targets.length}명 명세서를 한꺼번에 열까요?\n(팝업 차단이 켜져 있으면 열리지 않을 수 있습니다)`)) return;
      }
      targets.forEach((r, i) => {
        setTimeout(() => {
          const url = `/api/salary/slip/${r.userId}/${r.yearMonth}?company=${this.company}`;
          window.open(url, `slip_${r.userId}`, 'width=750,height=900');
        }, i * 300); // 팝업 차단 우회 위해 약간씩 딜레이
      });
    },

    openSlip(r) {
      if (!r) return;
      const url = `/api/salary/slip/${r.userId}/${r.yearMonth}?company=${this.company}`;
      window.open(url, `slip_${r.userId}`, 'width=750,height=900');
      // 발급대장 기록
      fetch('/api/salary/issuances', { method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include',
        body: JSON.stringify({ yearMonth: r.yearMonth, userId: r.userId, companyId: this.company, issuedType: 'pdf' })
      }).catch(()=>{});
    },

    // ── 이메일 일괄발송 ───────────────────────────────────────
    async emailBulk() {
      const count = this.records.filter(r => r.status !== 'draft').length;
      if (!confirm(`확정/지급된 ${count}명에게 급여명세서를 이메일로 발송할까요?`)) return;
      try {
        const r = await fetch('/api/salary/slip/email/bulk', {
          method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include',
          body: JSON.stringify({ companyId: this.company, yearMonth: this.yearMonth })
        });
        const d = await r.json();
        const ok = d.results?.filter(x=>x.ok).length || 0;
        alert(`발송 완료: ${ok}명 성공`);
      } catch(e) { alert('오류'); }
    },

    // ── 출퇴근 연동 ──────────────────────────────────────────
    async importAttendance() {
      this.attendanceModal = { open: true, employees: [], selected: new Set(), warn: '' };
      try {
        const r = await fetch(`/api/salary/attendance-import?company=${this.company}&month=${this.yearMonth}`, { credentials:'include' });
        const d = await r.json();
        if (!r.ok) { this.attendanceModal.warn = d.error || '오류'; return; }
        if (d.warn) this.attendanceModal.warn = d.warn;
        if (d.note) this.attendanceModal.note = d.note; // 대림컴퍼니 자동계산 안내
        this.attendanceModal.employees = d.employees || [];
        // 기본: draft 상태 직원 전체 선택
        const draftIds = new Set(this.records.filter(r=>r.status==='draft').map(r=>r.userId));
        this.attendanceModal.selected = new Set(d.employees.filter(e=>draftIds.has(e.userId)).map(e=>e.userId));
      } catch(e) { this.attendanceModal.warn = '서버 오류: ' + e.message; }
    },
    async applyAttendance() {
      const targets = this.attendanceModal.employees.filter(e => this.attendanceModal.selected.has(e.userId));
      if (!targets.length) return;
      try {
        const r = await fetch('/api/salary/attendance-apply', {
          method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include',
          body: JSON.stringify({ companyId: this.company, yearMonth: this.yearMonth, employees: targets })
        });
        const d = await r.json();
        const ok = d.results?.filter(x=>x.ok).length || 0;
        const skip = d.results?.filter(x=>x.skipped).length || 0;
        alert(`출퇴근 연동 완료\n반영: ${ok}명${skip?` / 건너뜀: ${skip}명 (확정/지급됨)`:''}`)
        this.attendanceModal.open = false;
        await this.loadRecords();
      } catch(e) { alert('오류: ' + e.message); }
    },

    // ── 연장근무 CAPS 자동 가져오기 ────────────────────────────
    async importOvertimeFromCaps() {
      this.overtimeImportModal = { open: true, employees: [], warn: '' };
      try {
        const r = await fetch(`/api/salary/overtime-import?company=${this.company}&month=${this.yearMonth}`, { credentials:'include' });
        const d = await r.json();
        if (!r.ok) { this.overtimeImportModal.warn = d.error || '오류'; return; }
        if (d.warn) this.overtimeImportModal.warn = d.warn;
        // 오탐 의심 항목은 기본 unchecked
        const emps = (d.employees || []).map(e => ({
          ...e,
          suspicious: (e.suspicious || []).map(s => ({ ...s, _checked: false })),
        }));
        this.overtimeImportModal.employees = emps;
      } catch(e) { this.overtimeImportModal.warn = '서버 오류: ' + e.message; }
    },
    async applyOvertimeImport() {
      const emps = this.overtimeImportModal.employees;
      if (!emps.length) { this.overtimeImportModal.open = false; return; }
      // 각 직원의 최종 연장시간 = confirmedH + 체크된 suspicious.hours 합산
      const rows = emps.map(e => {
        const extra = (e.suspicious || []).filter(s => s._checked).reduce((a,s)=>a+s.hours, 0);
        return { userId: e.userId, overtimeH: +(e.confirmedH + extra).toFixed(2) };
      });
      try {
        const r = await fetch('/api/salary/overtime-apply', {
          method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include',
          body: JSON.stringify({ companyId: this.company, yearMonth: this.yearMonth, rows })
        });
        const d = await r.json();
        if (!r.ok) { alert(d.error || '반영 실패'); return; }
        alert(`${d.applied?.length || 0}명의 연장시간이 반영되었습니다.\n이제 [⚡ 연장수당 반영 후 급여계산] 버튼을 눌러주세요.`);
        this.overtimeImportModal.open = false;
        await this.loadOvertime();
      } catch(e) { alert('오류: ' + e.message); }
    },

    // ── 연장근무 ─────────────────────────────────────────────
    // 통상시급 기반 연장수당 미리보기 계산
    calcOtPay(row, idx) {
      const cfg = this.configs.find(c => c.userId === row.userId);
      if (!cfg) return 0;
      const hourlyRate = cfg.hourlyRate || 0;
      const s = this.settingsForm;
      const otM = +(s.overtimeMultiple || 1.5);
      const ntM = +(s.nightMultiple || 0.5);
      const holM = +(s.holidayMultiple || 1.5);
      const holOtM = +(s.holidayOtMultiple || 2.0);
      return Math.floor(
        (+(row.overtimeH||0) * hourlyRate * otM +
         +(row.nightH||0) * hourlyRate * ntM +
         +(row.holidayH||0) * hourlyRate * holM +
         +(row.holidayOtH||0) * hourlyRate * holOtM) / 10) * 10;
    },
    async saveOvertime(idx) {
      const row = this.overtimeRows[idx];
      try {
        const r = await fetch('/api/salary/overtime', {
          method: 'POST', headers: {'Content-Type':'application/json'}, credentials:'include',
          body: JSON.stringify({ userId: row.userId, companyId: this.company, yearMonth: this.yearMonth,
            overtimeH: +(row.overtimeH||0), nightH: +(row.nightH||0),
            holidayH: +(row.holidayH||0), holidayOtH: +(row.holidayOtH||0), memo: row.memo||'' })
        });
        if (r.ok) { /* 저장됨 — 시각적 피드백 */ this.overtimeRows[idx]._saved = true; setTimeout(()=>this.overtimeRows[idx]._saved=false, 1500); }
        else { const d = await r.json(); alert(d.error); }
      } catch(e) { alert('저장 오류: ' + e.message); }
    },
    async calcOvertimePay() {
      // 연장근무 데이터를 급여 레코드에 반영 후 재계산
      if (!confirm(`${this.yearMonth} 연장근무 시간을 급여 레코드에 반영 후 전체 자동계산할까요?`)) return;
      try {
        // 1. 각 직원 급여 레코드에 연장시간 반영
        for (const row of this.overtimeRows) {
          const rec = this.records.find(r => r.userId === row.userId);
          if (rec && rec.id && rec.status === 'draft') {
            await fetch(`/api/salary/records/${rec.id}`, {
              method: 'PUT', headers: {'Content-Type':'application/json'}, credentials:'include',
              body: JSON.stringify({ overtimeHours: +(row.overtimeH||0), nightHours: +(row.nightH||0),
                holidayHours: +(row.holidayH||0), holidayOtHours: +(row.holidayOtH||0) })
            });
          }
        }
        // 2. 전체 재계산
        const r = await fetch('/api/salary/calculate', {
          method: 'POST', headers: {'Content-Type':'application/json'}, credentials:'include',
          body: JSON.stringify({ companyId: this.company, yearMonth: this.yearMonth, overwrite: true })
        });
        if (r.ok) { alert('연장수당 반영 및 급여 재계산 완료'); await this.loadRecords(); }
        else { const d = await r.json(); alert(d.error); }
      } catch(e) { alert('오류: ' + e.message); }
    },
    fmtH(h) { return (+(h||0)).toFixed(1) + 'h'; },

    // ── CSV 다운로드 ──────────────────────────────────────────
    exportCsv() {
      window.location.href = `/api/salary/export?company=${this.company}&month=${this.yearMonth}`;
    },

    // ── EDI ──────────────────────────────────────────────────
    openEdiUpload() { this.ediUploadModal.yearMonth = this.yearMonth; this.ediUploadModal.open = true; },
    openEdiManual() {
      this.ediManualModal.form = { userId:'', companyId: this.company, yearMonth: this.yearMonth };
      this.ediManualModal.open = true;
    },
    async uploadEdi() {
      if (!this.ediUploadModal.file) { alert('파일을 선택하세요'); return; }
      const fd = new FormData();
      fd.append('file', this.ediUploadModal.file);
      fd.append('companyId', this.company);
      fd.append('yearMonth', this.ediUploadModal.yearMonth || this.yearMonth);
      try {
        const r = await fetch('/api/salary/edi/upload', { method:'POST', credentials:'include', body: fd });
        const d = await r.json();
        if (r.ok) { alert(`${d.count}명 업로드 완료`); this.ediUploadModal.open = false; await this.loadEdiCompare(); }
        else alert(d.error);
      } catch(e) { alert('업로드 오류: ' + e.message); }
    },
    async saveEdiManual() {
      try {
        const r = await fetch('/api/salary/edi', {
          method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include',
          body: JSON.stringify({ ...this.ediManualModal.form, companyId: this.company, yearMonth: this.yearMonth })
        });
        if (r.ok) { this.ediManualModal.open = false; await this.loadEdiCompare(); }
        else { const d = await r.json(); alert(d.error); }
      } catch(e) {}
    },

    // ── 간이세액표 업로드 ─────────────────────────────────────
    taxFileSelected(e) { this.taxFile = e.target.files[0]; },
    async uploadTaxTable() {
      if (!this.taxFile || !this.taxUploadYear) { alert('연도와 파일을 선택하세요'); return; }
      const fd = new FormData();
      fd.append('file', this.taxFile);
      fd.append('year', this.taxUploadYear);
      try {
        const r = await fetch('/api/salary/tax-table/upload', { method:'POST', credentials:'include', body: fd });
        const d = await r.json();
        if (r.ok) { alert(`${d.count}행 등록 완료`); await this.loadTaxYears(); }
        else alert(d.error);
      } catch(e) { alert('업로드 오류'); }
    },

    // ── 유틸 ─────────────────────────────────────────────────
    nameOf(id) { return this.userMap[id] || this.configNameMap[id] || id || ''; },
    fmt(n) { return (n||0).toLocaleString('ko-KR'); },
    fmtW(n) { return (n||0).toLocaleString('ko-KR') + '원'; },
    sumField(key) { return this.records.reduce((s,r) => s + (r[key]||0), 0); },
    extraPay(r) { return (r.retroPay||0)+(r.leavePay||0)+(r.extraPay1||0)+(r.extraPay2||0)+(r.extraPay3||0)+(r.teamLeaderAllowance||0); },
    statusLabel(s) { return s==='draft'?'임시':s==='confirmed'?'확정':s==='paid'?'지급완료':'—'; },
    statusStyle(s) {
      if (s==='draft') return 'background:#f3f4f6;color:#6b7280;';
      if (s==='confirmed') return 'background:#fef3c7;color:#92400e;';
      if (s==='paid') return 'background:#d1fae5;color:#065f46;';
      return '';
    },
  };
}
</script>
