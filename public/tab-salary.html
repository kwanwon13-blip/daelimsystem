<!-- ===== 급여 관리 탭 ===== -->
<template x-if="currentTab === 'salary'">
<div x-data="salaryApp()" x-init="init()" style="height:100%;display:flex;flex-direction:column;">

<style>
  /* 급여 탭 전용 반응형/스크롤바 */
  #salary-scope table::-webkit-scrollbar { height:10px; width:10px; }
  #salary-scope table::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:6px; }
  #salary-scope .salary-sub-actions { display:flex; gap:6px; flex-wrap:wrap; }

  /* ── 엑셀 스타일 격자선 (모든 급여 탭 테이블에 적용) ── */
  #salary-scope table {
    border-collapse: separate !important;
    border-spacing: 0 !important;
  }
  #salary-scope table th,
  #salary-scope table td {
    border-right: 1px solid #d4d7dc !important;
    border-bottom: 1px solid #d4d7dc !important;
  }
  /* 첫 칸 왼쪽 테두리 */
  #salary-scope table th:first-child,
  #salary-scope table td:first-child {
    border-left: 1px solid #d4d7dc !important;
  }
  /* 헤더 위쪽 테두리 + 강조 */
  #salary-scope table thead th {
    border-top: 1.5px solid #9ca3af !important;
    border-bottom: 1.5px solid #9ca3af !important;
    background-clip: padding-box;
  }
  /* tfoot 상단 굵은선 */
  #salary-scope table tfoot tr:first-child td {
    border-top: 1.5px solid #9ca3af !important;
  }
  #salary-scope table tbody tr:hover td {
    background: #fafbfc;
  }
  /* sticky 열도 테두리 유지 */
  #salary-scope table th[style*="sticky"],
  #salary-scope table td[style*="sticky"] {
    box-shadow: inset -1px 0 0 #d4d7dc;
  }

  @media (max-width: 900px) {
    #salary-scope .salary-header-label { font-size:15px !important; }
    #salary-scope table { font-size:11px !important; }
    #salary-scope .salary-action-btn { padding:5px 9px !important; font-size:11px !important; }
  }
  @media (max-width: 640px) {
    #salary-scope .summary-card-value { font-size:15px !important; }
  }

  /* ── 엑셀식 셀 선택 + 한번클릭+타이핑 편집 ────────────────────
   * 직원 항목설정 그리드 + 급여대장 그리드 공통 적용
   * 클릭 = 셀 선택 (파란 테두리), 타이핑/F2/더블클릭 = 편집 시작
   */
  #salary-scope td.cfg-selected,
  #salary-scope td.ledger-selected {
    outline: 2px solid #2563eb !important;
    outline-offset: -2px;
    position: relative;
    z-index: 2;
    background: #dbeafe !important;
  }
  /* 편집가능 셀임을 시각적 힌트 (살짝 진한 cursor + 파란 톤) */
  #salary-scope td[data-col] { cursor: cell; }

  /* ── 셀 크기 변경/스크롤 시 layout reflow 비용 줄이기 ────────
   * table-layout:fixed → 컬럼 너비를 미리 확정해서 reflow 거의 무료
   * 실제 컬럼 width 는 colgroup 또는 첫 행 셀 width 로 결정
   */
  #salary-scope table.cfg-grid,
  #salary-scope table.ledger-grid {
    table-layout: fixed;
    contain: layout style;
  }
</style>

<!-- ── PIN 재인증 화면 ──────────────────────────────────────── -->
<div x-show="!pinOk" style="display:flex;align-items:center;justify-content:center;height:100%;background:#f9fafb;">
  <div style="background:#fff;border-radius:16px;padding:40px 48px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.1);min-width:320px;">
    <div style="font-size:40px;margin-bottom:12px;">🔐</div>
    <div style="font-size:18px;font-weight:700;color:#1f2937;margin-bottom:4px;">급여 보안 PIN</div>
    <div style="font-size:13px;color:#6b7280;margin-bottom:24px;">급여 데이터에 접근하려면 PIN을 입력하세요</div>
    <input x-model="pinInput" @keydown.enter="submitPin()" type="password" maxlength="6"
      placeholder="PIN 6자리" style="width:100%;padding:12px;border:1px solid #d1d5db;border-radius:8px;font-size:18px;text-align:center;letter-spacing:8px;margin-bottom:12px;">
    <div x-show="pinError" x-text="pinError" style="color:#ef4444;font-size:12px;margin-bottom:8px;"></div>
    <button @click="submitPin()" style="width:100%;padding:12px;background:#4f6ef7;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;">확인</button>
  </div>
</div>

<!-- ── 메인 UI (PIN 인증 후) ──────────────────────────────── -->
<div x-show="pinOk" id="salary-scope" style="display:flex;flex-direction:column;height:100%;">

  <!-- 상단 헤더 -->
  <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:#fff;border-bottom:1px solid #e5e7eb;flex-shrink:0;flex-wrap:wrap;">
    <span style="font-size:18px;font-weight:700;color:#1f2937;">💰 급여 관리</span>
    <!-- 회사 선택 -->
    <div style="display:flex;gap:4px;background:#f3f4f6;border-radius:8px;padding:3px;">
      <button @click="company='dalim-sm';_loadColWidths();loadAll()" :style="company==='dalim-sm'?'background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.1);':''"
        style="padding:5px 14px;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600;transition:all .15s;">대림에스엠</button>
      <button @click="company='dalim-company';_loadColWidths();loadAll()" :style="company==='dalim-company'?'background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.1);':''"
        style="padding:5px 14px;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600;transition:all .15s;">대림컴퍼니</button>
    </div>
    <!-- 귀속월 -->
    <input type="month" x-model="yearMonth" @change="resetAutoDraft(); loadAll()" style="padding:6px 10px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;">
    <!-- 서브탭 -->
    <div style="display:flex;gap:2px;margin-left:8px;">
      <template x-for="tab in subTabs" :key="tab.id">
        <button @click="switchSubTab(tab.id)" :style="subTab===tab.id?'background:#4f6ef7;color:#fff;':'background:#f3f4f6;color:#374151;'"
          style="padding:6px 14px;border:none;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600;transition:all .15s;" x-text="tab.label"></button>
      </template>
    </div>
    <span style="flex:1"></span>
    <!-- 액션 버튼 -->
    <button x-show="subTab==='ledger'" @click="openAddModal()" style="padding:6px 12px;background:#e0f2fe;color:#0369a1;border:1px solid #7dd3fc;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600;" title="이 월의 급여대장에 직원(퇴사자 포함)을 추가">＋ 사람 추가</button>
    <button x-show="subTab==='ledger'" :disabled="selectedIds.size===0"
      @click="removeSelected()"
      :style="selectedIds.size>0?'background:#fef2f2;color:#b91c1c;border:1px solid #fecaca;cursor:pointer;':'background:#f3f4f6;color:#9ca3af;border:1px solid #e5e7eb;cursor:not-allowed;'"
      style="padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;" title="선택한 직원을 이 월의 급여대장에서 제외">− 선택 빼기 <span x-show="selectedIds.size>0" x-text="'('+selectedIds.size+')'"></span></button>
    <button x-show="subTab==='ledger'" @click="openLabelModal()" style="padding:6px 12px;background:#f3f4f6;border:none;border-radius:6px;font-size:12px;cursor:pointer;">📝 항목명 설정</button>
    <!-- 값 0 컬럼 자동 숨김 토글 -->
    <button x-show="subTab==='ledger'" @click="toggleAutoHideZero()"
      :style="autoHideZero?'background:#dbeafe;color:#1e40af;border:1px solid #93c5fd;':'background:#f3f4f6;color:#6b7280;border:1px solid #e5e7eb;'"
      style="padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600;"
      :title="autoHideZero?'클릭하면 전체 47열 모두 표시 (빈 컬럼 포함)':'클릭하면 값 없는 컬럼 자동으로 숨김 (엑셀처럼)'">
      <span x-show="autoHideZero">👁️ 필요한 열만</span>
      <span x-show="!autoHideZero">🔎 전체 47열</span>
    </button>
    <!-- 퇴사자 숨김 토글 -->
    <button x-show="subTab==='ledger'" @click="toggleHideResigned()"
      :style="hideResigned?'background:#dcfce7;color:#166534;border:1px solid #86efac;':'background:#fef3c7;color:#92400e;border:1px solid #fcd34d;'"
      style="padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600;"
      :title="hideResigned?'현재 현직자만 보임. 클릭하면 퇴사자 포함 전체 보기':'현재 퇴사자 포함. 클릭하면 퇴사자 숨기고 현직자만 보기'">
      <span x-show="hideResigned">🚪 퇴사자 숨김</span>
      <span x-show="!hideResigned">👥 전체(퇴사자 포함)</span>
    </button>
    <button x-show="subTab==='ledger'" @click="resetColWidths()"
      style="padding:6px 12px;background:#f3f4f6;color:#6b7280;border:1px solid #e5e7eb;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600;"
      title="급여대장 셀 너비를 기본값으로 되돌립니다. 헤더 오른쪽 가장자리를 드래그하면 너비 조절 가능.">📏 열너비 초기화</button>
    <button x-show="subTab==='ledger'" @click="importAttendance()" style="padding:6px 12px;background:#8b5cf6;color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600;" title="출퇴근 탭의 근무일수/연장시간을 급여 레코드에 자동 반영">🔗 출퇴근 연동</button>
    <button x-show="subTab==='ledger'" @click="calcAll()" style="padding:6px 14px;background:#10b981;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600;">⚡ 전체 자동계산</button>
    <!-- 선택 출력 버튼 (선택된 직원 있을 때만 강조) -->
    <button x-show="subTab==='ledger'"
      @click="printSelected()"
      :style="selectedIds.size>0?'background:#4f6ef7;color:#fff;':'background:#f3f4f6;color:#374151;'"
      style="padding:6px 12px;border:none;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600;transition:all .15s;">
      🖨️ 명세서 출력 <span x-show="selectedIds.size>0" x-text="'('+selectedIds.size+'명)'"></span>
    </button>
    <button x-show="subTab==='ledger'" @click="exportCsv()" style="padding:6px 12px;background:#f3f4f6;border:none;border-radius:6px;font-size:12px;cursor:pointer;">📥 CSV</button>
    <button x-show="subTab==='ledger'" @click="emailBulk()" style="padding:6px 12px;background:#f3f4f6;border:none;border-radius:6px;font-size:12px;cursor:pointer;">📧 일괄발송</button>
  </div>

  <!-- ── 서브탭 콘텐츠 ────────────────────────────────────── -->
  <div style="flex:1;overflow:auto;padding:16px;">

    <!-- ★ HOME 월별 대시보드 -->
    <div x-show="subTab==='home'" x-init="subTab==='home'&&loadHome()">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <div>
          <div style="font-size:16px;font-weight:700;color:#1f2937;">🏠 급여 월별 대시보드</div>
          <div style="font-size:12px;color:#6b7280;margin-top:3px;">
            <span x-text="company==='dalim-sm'?'대림에스엠':'대림컴퍼니'"></span>
            · <span x-text="yearMonth"></span> 기준
          </div>
        </div>
        <button @click="loadHome()" style="padding:6px 12px;background:#f3f4f6;border:1px solid #e5e7eb;border-radius:6px;font-size:12px;cursor:pointer;">🔄 새로고침</button>
      </div>

      <!-- 이번달 KPI 4개 -->
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:18px;">
        <div style="background:#fff;border-radius:10px;padding:16px;border:1px solid #e5e7eb;">
          <div style="font-size:11px;color:#6b7280;margin-bottom:4px;">이번달 대상 인원</div>
          <div style="font-size:24px;font-weight:700;color:#1f2937;" x-text="visibleRecords.length + '명'"></div>
        </div>
        <div style="background:#fff;border-radius:10px;padding:16px;border:1px solid #e5e7eb;">
          <div style="font-size:11px;color:#6b7280;margin-bottom:4px;">지급합계</div>
          <div style="font-size:20px;font-weight:700;color:#1f2937;" x-text="fmtW(sumField('grossPay'))"></div>
        </div>
        <div style="background:#fff;border-radius:10px;padding:16px;border:1px solid #e5e7eb;">
          <div style="font-size:11px;color:#6b7280;margin-bottom:4px;">공제합계</div>
          <div style="font-size:20px;font-weight:700;color:#ef4444;" x-text="fmtW(sumField('totalDeductions'))"></div>
        </div>
        <div style="background:#3b82f6;border-radius:10px;padding:16px;">
          <div style="font-size:11px;color:#bfdbfe;margin-bottom:4px;">실지급합계</div>
          <div style="font-size:20px;font-weight:700;color:#fff;" x-text="fmtW(sumField('netPay'))"></div>
        </div>
      </div>

      <!-- 상태별 breakdown (draft / confirmed / paid) -->
      <div style="background:#fff;border-radius:10px;border:1px solid #e5e7eb;padding:16px;margin-bottom:18px;">
        <div style="font-size:13px;font-weight:600;color:#374151;margin-bottom:12px;">📋 상태별 현황 (이번달)</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">
          <div style="padding:12px;background:#fef9c3;border-radius:8px;text-align:center;">
            <div style="font-size:11px;color:#713f12;margin-bottom:3px;">작성중 (draft)</div>
            <div style="font-size:22px;font-weight:700;color:#854d0e;" x-text="homeStatusCount('draft')+'건'"></div>
          </div>
          <div style="padding:12px;background:#e0f2fe;border-radius:8px;text-align:center;">
            <div style="font-size:11px;color:#0369a1;margin-bottom:3px;">확정 (confirmed)</div>
            <div style="font-size:22px;font-weight:700;color:#075985;" x-text="homeStatusCount('confirmed')+'건'"></div>
          </div>
          <div style="padding:12px;background:#dcfce7;border-radius:8px;text-align:center;">
            <div style="font-size:11px;color:#15803d;margin-bottom:3px;">지급완료 (paid)</div>
            <div style="font-size:22px;font-weight:700;color:#166534;" x-text="homeStatusCount('paid')+'건'"></div>
          </div>
        </div>
        <div x-show="homeStatusCount('draft')>0" style="margin-top:10px;padding:8px 12px;background:#fffbeb;border-radius:6px;font-size:12px;color:#92400e;">
          ⚠️ 미확정 <span x-text="homeStatusCount('draft')"></span>건이 있습니다. [급여대장] 탭에서 확정 처리하세요.
        </div>
      </div>

      <!-- 12개월 추이 (실지급합계 기준 막대 그래프) -->
      <div style="background:#fff;border-radius:10px;border:1px solid #e5e7eb;padding:16px;margin-bottom:18px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
          <div style="font-size:13px;font-weight:600;color:#374151;">📈 연간 월별 추이 (실지급합계)</div>
          <div style="font-size:11px;color:#6b7280;" x-text="(yearMonth||'').slice(0,4)+'년 전체'"></div>
        </div>
        <div x-show="homeData.loading" style="text-align:center;padding:20px;color:#9ca3af;font-size:12px;">불러오는 중...</div>
        <div x-show="!homeData.loading" style="display:grid;grid-template-columns:repeat(12,1fr);gap:6px;align-items:end;height:160px;">
          <template x-for="(t,idx) in homeData.trend" :key="t.month">
            <div style="display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;position:relative;"
                 :title="t.label+': '+fmtW(t.netPay)+' / '+t.headcount+'명'">
              <div style="width:100%;background:linear-gradient(180deg,#60a5fa,#3b82f6);border-radius:4px 4px 0 0;transition:all .2s;"
                   :style="'height:'+(t.netPay>0?Math.max(3,(t.netPay/homeTrendMax('netPay'))*130):2)+'px;'+((yearMonth||'').slice(5,7)===String(idx+1).padStart(2,'0')?'outline:2px solid #1d4ed8;':'')"></div>
              <div style="font-size:10px;color:#6b7280;margin-top:3px;" x-text="t.label"></div>
            </div>
          </template>
        </div>
        <div x-show="!homeData.loading" style="margin-top:10px;display:flex;justify-content:space-between;font-size:11px;color:#6b7280;">
          <span>연간 지급합계: <strong x-text="fmtW((homeData.trend||[]).reduce((s,t)=>s+(+t.grossPay||0),0))"></strong></span>
          <span>연간 실지급합계: <strong x-text="fmtW((homeData.trend||[]).reduce((s,t)=>s+(+t.netPay||0),0))"></strong></span>
        </div>
      </div>

      <!-- 회사별 비교 -->
      <div x-show="homeData.compare" style="background:#fff;border-radius:10px;border:1px solid #e5e7eb;padding:16px;margin-bottom:18px;">
        <div style="font-size:13px;font-weight:600;color:#374151;margin-bottom:12px;">🏢 회사별 비교 (<span x-text="homeData.compare?.monthLabel"></span>)</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div style="padding:12px;background:#eff6ff;border:2px solid #bfdbfe;border-radius:8px;">
            <div style="font-size:12px;font-weight:700;color:#1e40af;margin-bottom:8px;" x-text="homeData.compare?.self?.name + ' (현재 선택)'"></div>
            <div style="font-size:11px;color:#6b7280;">인원 <strong style="color:#1f2937;margin-left:6px;" x-text="(homeData.compare?.self?.data?.headcount||0)+'명'"></strong></div>
            <div style="font-size:11px;color:#6b7280;margin-top:3px;">지급합계 <strong style="color:#1f2937;margin-left:6px;" x-text="fmtW(homeData.compare?.self?.data?.grossPay||0)"></strong></div>
            <div style="font-size:11px;color:#6b7280;margin-top:3px;">실지급 <strong style="color:#1d4ed8;margin-left:6px;" x-text="fmtW(homeData.compare?.self?.data?.netPay||0)"></strong></div>
          </div>
          <div style="padding:12px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;">
            <div style="font-size:12px;font-weight:700;color:#6b7280;margin-bottom:8px;" x-text="homeData.compare?.other?.name"></div>
            <div style="font-size:11px;color:#6b7280;">인원 <strong style="color:#1f2937;margin-left:6px;" x-text="(homeData.compare?.other?.data?.headcount||0)+'명'"></strong></div>
            <div style="font-size:11px;color:#6b7280;margin-top:3px;">지급합계 <strong style="color:#1f2937;margin-left:6px;" x-text="fmtW(homeData.compare?.other?.data?.grossPay||0)"></strong></div>
            <div style="font-size:11px;color:#6b7280;margin-top:3px;">실지급 <strong style="color:#1d4ed8;margin-left:6px;" x-text="fmtW(homeData.compare?.other?.data?.netPay||0)"></strong></div>
          </div>
        </div>
      </div>

      <!-- Top 5 지급 상위 -->
      <div x-show="visibleRecords.length>0" style="background:#fff;border-radius:10px;border:1px solid #e5e7eb;padding:16px;margin-bottom:18px;">
        <div style="font-size:13px;font-weight:600;color:#374151;margin-bottom:12px;">🏆 이번달 지급합계 상위 5명</div>
        <table style="width:100%;border-collapse:collapse;font-size:12px;">
          <thead>
            <tr style="background:#f8fafc;border-bottom:1px solid #e5e7eb;">
              <th style="padding:6px 8px;text-align:left;width:30px;">#</th>
              <th style="padding:6px 8px;text-align:left;">성명</th>
              <th style="padding:6px 8px;text-align:left;">부서</th>
              <th style="padding:6px 8px;text-align:right;">지급합계</th>
              <th style="padding:6px 8px;text-align:right;">실지급</th>
            </tr>

              <th style="padding:8px 6px;text-align:left;background:#fce7f3;">은행</th>

                <td data-col="healthBasisManual" style="padding:7px 6px;text-align:right;color:#374151;background:#eff6ff;cursor:cell;" x-text="c.healthBasisManual?fmt(c.healthBasisManual):''"></td>

    <!-- ★ 연간현황 탭 -->
    <div x-show="subTab==='annual'">

    <!-- ★ 연장근무 탭 ──────────────────────────────────────────── -->
    <div x-show="subTab==='overtime'" x-init="subTab==='overtime'&&loadOvertime()">
      <div style="display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap;">
        <span style="font-size:14px;font-weight:600;">⏰ 연장근무 입력</span>
        <span style="font-size:12px;color:#6b7280;" x-text="yearMonth+' 귀속'"></span>
        <button @click="loadOvertime()" style="padding:6px 12px;background:#f3f4f6;border:none;border-radius:6px;font-size:12px;cursor:pointer;">🔄 새로고침</button>
        <button @click="importOvertimeFromCaps()" style="padding:6px 14px;background:#8b5cf6;color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600;" title="출퇴근 탭의 CAPS 데이터에서 평일 연장시간을 자동 가져옵니다">📥 CAPS에서 가져오기</button>
        <span style="flex:1"></span>
        <button @click="calcOvertimePay()" style="padding:8px 16px;background:#10b981;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-weight:700;box-shadow:0 2px 6px rgba(16,185,129,.35);">⚡ 연장수당 반영 후 급여계산</button>
      </div>
      <div style="background:#fef3c7;border:1px solid #fbbf24;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:#78350f;line-height:1.6;">
        <strong>사용 순서</strong> ① 각 직원의 연장/야간/휴일 시간을 입력 → ② 행별 <b>저장</b> 버튼 → ③ 상단 <b>[⚡ 연장수당 반영 후 급여계산]</b> 클릭<br>
        ※ 예상 연장수당은 설정 탭의 <b>할증률</b>과 직원별 <b>시급(통상임금/근로시간)</b>을 기준으로 계산됩니다.
      </div>
      <div style="background:#fff;border-radius:10px;border:1px solid #e5e7eb;overflow:auto;">
        <table style="width:100%;border-collapse:collapse;font-size:13px;min-width:700px;">
          <thead>
            <tr style="background:#f8fafc;border-bottom:2px solid #e5e7eb;">
              <th style="padding:10px 12px;text-align:left;white-space:nowrap;">성명</th>
              <th style="padding:10px 10px;text-align:right;white-space:nowrap;background:#fef3c7;">연장근무 (h)</th>
              <th style="padding:10px 10px;text-align:right;white-space:nowrap;background:#fef3c7;">야간근무 (h)</th>
              <th style="padding:10px 10px;text-align:right;white-space:nowrap;background:#fef3c7;">휴일근무 (h)</th>
              <th style="padding:10px 10px;text-align:right;white-space:nowrap;background:#fef3c7;">휴일연장 (h)</th>
              <th style="padding:10px 10px;text-align:right;white-space:nowrap;background:#f0fdf4;">예상 연장수당</th>
              <th style="padding:10px 10px;text-align:left;white-space:nowrap;">메모</th>
              <th style="padding:10px 10px;text-align:center;white-space:nowrap;">저장</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="(row, idx) in overtimeRows" :key="row.userId">
              <tr style="border-bottom:1px solid #f3f4f6;" :style="(row.overtimeH||row.nightH||row.holidayH||row.holidayOtH)?'background:#fffbeb;':''">

                <td style="padding:6px 8px;background:#fffbeb;">
                  <input type="number" x-model="overtimeRows[idx].overtimeH" min="0" step="0.5"
                    style="width:70px;padding:5px;border:1px solid #d1d5db;border-radius:4px;text-align:right;font-size:13px;">
                </td>
                <td style="padding:6px 8px;background:#fffbeb;">
                  <input type="number" x-model="overtimeRows[idx].nightH" min="0" step="0.5"
                    style="width:70px;padding:5px;border:1px solid #d1d5db;border-radius:4px;text-align:right;font-size:13px;">
                </td>
                <td style="padding:6px 8px;background:#fffbeb;">
                  <input type="number" x-model="overtimeRows[idx].holidayH" min="0" step="0.5"
                    style="width:70px;padding:5px;border:1px solid #d1d5db;border-radius:4px;text-align:right;font-size:13px;">
                </td>
                <td style="padding:6px 8px;background:#fffbeb;">
                  <input type="number" x-model="overtimeRows[idx].holidayOtH" min="0" step="0.5"
                    style="width:70px;padding:5px;border:1px solid #d1d5db;border-radius:4px;text-align:right;font-size:13px;">

                <td style="padding:6px 8px;">

                </td>
                <td style="padding:6px 8px;text-align:center;white-space:nowrap;">
                  <button @click="saveOvertime(idx)"

                    style="padding:4px 10px;color:#fff;border:none;border-radius:4px;font-size:12px;cursor:pointer;min-width:48px;transition:background .2s;"

            </tr>

          </thead>
          <tbody>

                <tr :style="rowDef.bold?'background:#f8fafc;font-weight:700;':''" style="border-bottom:1px solid #f3f4f6;">

                  <td style="padding:7px 10px;position:sticky;left:0;z-index:1;width:80px;min-width:80px;"

                  <td style="padding:7px 6px;color:#6b7280;white-space:nowrap;position:sticky;left:80px;z-index:1;"

                  <template x-for="m in (payStatusData?.months||[])" :key="m">
                    <td style="padding:7px 6px;text-align:right;"

            <tr x-show="!payStatusData?.employees?.length">

            </tr>
          </tbody>
        </table>
      </div>
      <div x-show="!payStatusData" style="text-align:center;padding:40px;color:#9ca3af;">불러오는 중...</div>
    </div>

    <!-- ★ EDI 비교 탭 -->
    <div x-show="subTab==='edi'">

        <button @click="openEdiUpload()" style="padding:6px 14px;background:#4f6ef7;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;">📤 EDI 파일 업로드</button>

        <button @click="loadEdiCompare()" style="padding:6px 12px;background:#f3f4f6;border:none;border-radius:6px;font-size:13px;cursor:pointer;">🔄 새로고침</button>
      </div>
      <div style="background:#fff;border-radius:10px;border:1px solid #e5e7eb;overflow:auto;">
        <table style="width:100%;border-collapse:collapse;font-size:12px;min-width:1000px;">
          <thead>
            <tr style="background:#f8fafc;border-bottom:2px solid #e5e7eb;">
              <th style="padding:10px 8px;text-align:left;">이름</th>
              <th colspan="2" style="padding:10px 8px;text-align:center;background:#f0fdf4;border-left:1px solid #e5e7eb;">건강보험</th>

              <th style="padding:10px 8px;text-align:center;border-left:1px solid #e5e7eb;">보수월액(EDI)</th>
              <th style="padding:10px 8px;text-align:center;">일치</th>
            </tr>
            <tr style="background:#f8fafc;border-bottom:1px solid #e5e7eb;font-size:11px;color:#6b7280;">
              <th style="padding:6px 8px;"></th>
              <th style="padding:6px 6px;text-align:right;background:#f0fdf4;">시스템</th>
              <th style="padding:6px 6px;text-align:right;background:#f0fdf4;">EDI</th>
              <th style="padding:6px 6px;text-align:right;background:#f0fdf4;border-left:1px solid #e5e7eb;">시스템</th>
              <th style="padding:6px 6px;text-align:right;background:#f0fdf4;">EDI</th>
              <th style="padding:6px 6px;text-align:right;background:#fef3c7;border-left:1px solid #e5e7eb;">시스템</th>
              <th style="padding:6px 6px;text-align:right;background:#fef3c7;">EDI</th>
              <th style="padding:6px 6px;text-align:right;background:#fef3c7;border-left:1px solid #e5e7eb;">시스템</th>
              <th style="padding:6px 6px;text-align:right;background:#fef3c7;">EDI</th>
              <th style="padding:6px 6px;text-align:right;border-left:1px solid #e5e7eb;"></th>
              <th style="padding:6px 6px;text-align:center;"></th>
            </tr>
          </thead>
          <tbody>
            <template x-for="row in ediCompare" :key="row.userId">
              <tr style="border-bottom:1px solid #f3f4f6;" :style="row.hasDiscrepancy?'background:#fff7ed;':''">
                <td style="padding:9px 8px;font-weight:600;" x-text="row.name"></td>
                <td style="padding:9px 6px;text-align:right;background:#f0fdf4;" x-text="fmt(row.calc?.healthInsurance||0)"></td>
                <td style="padding:9px 6px;text-align:right;background:#f0fdf4;" :style="row.diff&&Math.abs(row.diff.health)>10?'color:#ef4444;font-weight:700;':''" x-text="row.edi?fmt(row.edi.healthBilled||0):'—'"></td>
                <td style="padding:9px 6px;text-align:right;background:#f0fdf4;border-left:1px solid #e5e7eb;" x-text="fmt(row.calc?.longTermCare||0)"></td>
                <td style="padding:9px 6px;text-align:right;background:#f0fdf4;" :style="row.diff&&Math.abs(row.diff.ltc)>10?'color:#ef4444;font-weight:700;':''" x-text="row.edi?fmt(row.edi.ltcBilled||0):'—'"></td>
                <td style="padding:9px 6px;text-align:right;background:#fef3c7;border-left:1px solid #e5e7eb;" x-text="fmt(row.calc?.nationalPension||0)"></td>
                <td style="padding:9px 6px;text-align:right;background:#fef3c7;" :style="row.diff&&Math.abs(row.diff.pension)>10?'color:#ef4444;font-weight:700;':''" x-text="row.edi?fmt(row.edi.pensionBilled||0):'—'"></td>
                <td style="padding:9px 6px;text-align:right;background:#fef3c7;border-left:1px solid #e5e7eb;" x-text="fmt(row.calc?.employmentInsurance||0)"></td>
                <td style="padding:9px 6px;text-align:right;background:#fef3c7;" :style="row.diff&&Math.abs(row.diff.employment)>10?'color:#ef4444;font-weight:700;':''" x-text="row.edi?fmt(row.edi.employmentBilled||0):'—'"></td>
                <td style="padding:9px 6px;text-align:right;border-left:1px solid #e5e7eb;" x-text="row.edi?fmt(row.edi.healthBasis||0):'—'"></td>
                <td style="padding:9px 6px;text-align:center;">
                  <span x-show="!row.edi" style="color:#9ca3af;font-size:11px;">미등록</span>
                  <span x-show="row.edi&&!row.hasDiscrepancy" style="color:#10b981;font-weight:700;">✓</span>
                  <span x-show="row.edi&&row.hasDiscrepancy" style="color:#ef4444;font-weight:700;">⚠</span>
                </td>
              </tr>
            </template>
            <tr x-show="ediCompare.length===0">
              <td colspan="11" style="padding:32px;text-align:center;color:#9ca3af;">급여 데이터 또는 EDI 데이터가 없습니다</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- ★ 시스템 설정 탭 -->
    <div x-show="subTab==='settings'">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <!-- 4대보험 요율 -->
        <div style="background:#fff;border-radius:10px;border:1px solid #e5e7eb;padding:20px;">
          <div style="font-size:14px;font-weight:700;margin-bottom:16px;">⚙️ 4대보험 요율 설정</div>
          <div style="display:grid;gap:10px;">
            <label style="display:flex;align-items:center;gap:10px;font-size:13px;">
              <span style="width:120px;color:#374151;">적용 시작일</span>
              <input type="date" x-model="settingsForm.effectiveFrom" style="flex:1;padding:7px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;">
            </label>
            <label style="display:flex;align-items:center;gap:10px;font-size:13px;">
              <span style="width:120px;color:#374151;">국민연금 (%)</span>
              <input type="number" x-model="settingsForm.pensionRate" step="0.01" style="flex:1;padding:7px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;">
            </label>
            <label style="display:flex;align-items:center;gap:10px;font-size:13px;">
              <span style="width:120px;color:#374151;">국민연금 상한(원)</span>
              <input type="number" x-model="settingsForm.pensionMax" style="flex:1;padding:7px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;">
            </label>
            <label style="display:flex;align-items:center;gap:10px;font-size:13px;">
              <span style="width:120px;color:#374151;">건강보험 (%)</span>
              <input type="number" x-model="settingsForm.healthRate" step="0.001" style="flex:1;padding:7px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;">
              <span style="font-size:11px;color:#10b981;">※ 2026년: 3.595</span>
            </label>
            <label style="display:flex;align-items:center;gap:10px;font-size:13px;">
              <span style="width:120px;color:#374151;">장기요양 (%)</span>
              <input type="number" x-model="settingsForm.ltcRate" step="0.01" style="flex:1;padding:7px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;">
              <span style="font-size:11px;color:#10b981;">※ 건보료 대비 2026년: 13.14</span>
            </label>
            <label style="display:flex;align-items:center;gap:10px;font-size:13px;">
              <span style="width:120px;color:#374151;">고용보험 (%)</span>
              <input type="number" x-model="settingsForm.employmentRate" step="0.01" style="flex:1;padding:7px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;">
            </label>
            <div style="border-top:1px solid #e5e7eb;padding-top:10px;margin-top:4px;font-size:12px;font-weight:600;color:#374151;">시간외수당 배수</div>
            <label style="display:flex;align-items:center;gap:10px;font-size:13px;">
              <span style="width:120px;color:#374151;">연장수당 배수</span>
              <input type="number" x-model="settingsForm.overtimeMultiple" step="0.1" style="flex:1;padding:7px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;">
            </label>
            <label style="display:flex;align-items:center;gap:10px;font-size:13px;">
              <span style="width:120px;color:#374151;">야간수당 배수</span>
              <input type="number" x-model="settingsForm.nightMultiple" step="0.1" style="flex:1;padding:7px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;">
            </label>
            <label style="display:flex;align-items:center;gap:10px;font-size:13px;">
              <span style="width:120px;color:#374151;">절사 단위</span>
              <select x-model="settingsForm.roundingUnit" style="flex:1;padding:7px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;">
                <option>원단위</option><option>십단위</option><option>백단위</option><option>천단위</option>
              </select>
            </label>
            <div style="border-top:1px solid #e5e7eb;padding-top:10px;margin-top:4px;font-size:12px;font-weight:600;color:#374151;">정산 주기 · 일할계산</div>
            <label style="display:flex;align-items:center;gap:10px;font-size:13px;">
              <span style="width:120px;color:#374151;">정산 기간</span>
              <select x-model="settingsForm.periodType" style="flex:1;padding:7px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;">
                <option value="monthly">월초~월말 (1일~말일)</option>
                <option value="prev20_curr19">전월 20일~당월 19일</option>
              </select>
            </label>
            <label style="display:flex;align-items:center;gap:10px;font-size:13px;">
              <span style="width:120px;color:#374151;">일할계산 방식</span>
              <select x-model="settingsForm.prorateMode" style="flex:1;padding:7px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;">
                <option value="none">일할계산 안함 (만근 지급)</option>
                <option value="base_plus_allow">기본급+수당 모두 일할</option>
                <option value="base_only">기본급만 일할</option>
              </select>
            </label>
            <label style="display:flex;align-items:center;gap:10px;font-size:13px;">
              <span style="width:120px;color:#374151;">일할계산 분모</span>
              <select x-model="settingsForm.prorateDenom" style="flex:1;padding:7px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;">
                <option value="period_ratio">실제일수 / 정산기간일수</option>
                <option value="days_30">해당월일수 / 30</option>
                <option value="calendar_days">실제일수 / 달력일수</option>
              </select>
            </label>
            <button @click="saveSettings()" style="width:100%;padding:10px;background:#4f6ef7;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-weight:600;margin-top:4px;">저장</button>
          </div>
        </div>
        <!-- 간이세액표 -->
        <div style="background:#fff;border-radius:10px;border:1px solid #e5e7eb;padding:20px;">
          <div style="font-size:14px;font-weight:700;margin-bottom:8px;">📊 근로소득 간이세액표</div>
          <div style="font-size:12px;color:#6b7280;margin-bottom:14px;">등록된 연도: <strong x-text="taxYears.join(', ')||'없음'"></strong></div>
          <div style="display:flex;flex-direction:column;gap:10px;">
            <div>
              <div style="font-size:12px;font-weight:600;margin-bottom:6px;">CSV 파일 업로드</div>
              <div style="font-size:11px;color:#6b7280;margin-bottom:8px;">컬럼: year, salaryFrom, salaryTo, dep1~dep11 (단위: 원)</div>
              <input type="number" x-model="taxUploadYear" placeholder="연도 (예: 2025)" style="width:120px;padding:7px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;margin-right:8px;">
              <input type="file" @change="taxFileSelected($event)" accept=".csv" style="font-size:12px;">
              <button @click="uploadTaxTable()" style="padding:7px 14px;background:#4f6ef7;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;margin-top:8px;width:100%;">업로드</button>
            </div>
            <div style="border-top:1px solid #e5e7eb;padding-top:10px;">
              <div style="font-size:12px;font-weight:600;margin-bottom:6px;">현재 등록된 세액표 조회</div>
              <div style="display:flex;gap:8px;margin-bottom:8px;">
                <select x-model="taxViewYear" @change="loadTaxTable()" style="padding:7px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;">
                  <template x-for="y in taxYears" :key="y"><option :value="y" x-text="y+'년'"></option></template>
                </select>
              </div>
              <div x-show="taxRows.length>0" style="overflow:auto;max-height:300px;border:1px solid #e5e7eb;border-radius:6px;">
                <table style="width:100%;border-collapse:collapse;font-size:11px;">
                  <thead>
                    <tr style="background:#f8fafc;position:sticky;top:0;">
                      <th style="padding:6px;text-align:right;">시작</th>
                      <th style="padding:6px;text-align:right;">끝</th>
                      <th style="padding:6px;text-align:right;">1인</th>
                      <th style="padding:6px;text-align:right;">2인</th>
                      <th style="padding:6px;text-align:right;">3인</th>
                      <th style="padding:6px;text-align:right;">4인</th>
                      <th style="padding:6px;text-align:right;">5인+</th>
                    </tr>
                  </thead>
                  <tbody>
                    <template x-for="t in taxRows.slice(0,30)" :key="t.id">
                      <tr style="border-bottom:1px solid #f3f4f6;">
                        <td style="padding:5px;text-align:right;" x-text="fmt(t.salaryFrom)"></td>
                        <td style="padding:5px;text-align:right;" x-text="fmt(t.salaryTo)"></td>
                        <td style="padding:5px;text-align:right;" x-text="fmt(t.dep1)"></td>
                        <td style="padding:5px;text-align:right;" x-text="fmt(t.dep2)"></td>
                        <td style="padding:5px;text-align:right;" x-text="fmt(t.dep3)"></td>
                        <td style="padding:5px;text-align:right;" x-text="fmt(t.dep4)"></td>
                        <td style="padding:5px;text-align:right;" x-text="fmt(t.dep5)"></td>
                      </tr>
                    </template>
                  </tbody>
                </table>
                <div x-show="taxRows.length>30" style="text-align:center;padding:6px;font-size:11px;color:#6b7280;" x-text="'+ '+(taxRows.length-30)+'행 더 있음'"></div>
              </div>
              <div x-show="taxRows.length===0" style="color:#9ca3af;font-size:12px;padding:12px 0;">등록된 세액표가 없습니다</div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /서브탭 콘텐츠 -->
</div><!-- /pinOk -->

      <div style="display:flex;gap:8px;">

                <input type="number" :value="detailModal.rec[f.key]" @input="detailModal.rec[f.key]=+$event.target.value" style="flex:1;padding:5px;border:1px solid #d1d5db;border-radius:4px;font-size:12px;text-align:right;" :disabled="detailModal.rec?.status!=='draft'">

              </div>
            </div>
          </div>
        </div>
        <!-- 공제 -->
        <div>
          <div style="font-size:13px;font-weight:700;color:#374151;background:#fef2f2;padding:8px 12px;border-radius:6px;margin-bottom:10px;">➖ 공제 내역</div>
          <div style="display:grid;gap:6px;">
            <template x-for="f in dedFields" :key="f.key">
              <div style="display:flex;align-items:center;gap:8px;">
                <span style="width:150px;font-size:12px;color:#374151;" x-text="f.label"></span>
                <input type="number" :value="detailModal.rec[f.key]" @input="detailModal.rec[f.key]=+$event.target.value" style="flex:1;padding:5px;border:1px solid #d1d5db;border-radius:4px;font-size:12px;text-align:right;" :disabled="detailModal.rec?.status!=='draft'">
              </div>
            </template>
            <!-- 공제합계/실지급 -->
            <div style="border-top:1px solid #e5e7eb;padding-top:8px;margin-top:4px;">
              <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700;background:#fef2f2;padding:6px 8px;border-radius:4px;margin-bottom:6px;">
                <span>공제합계</span><span x-text="fmt(calcTotalDed())"></span>
              </div>
              <div style="display:flex;justify-content:space-between;font-size:15px;font-weight:800;background:#1e3a5f;color:#fff;padding:10px 12px;border-radius:6px;">
                <span>실지급액</span><span x-text="fmt(calcGross()-calcTotalDed())"></span>
              </div>

          </div>

      <!-- 기타 정보 -->
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:16px;">
        <label style="display:flex;flex-direction:column;gap:4px;font-size:12px;">
          <span style="color:#6b7280;">급여지급일</span>
          <input type="date" x-model="detailModal.rec.payDate" style="padding:7px;border:1px solid #d1d5db;border-radius:6px;" :disabled="detailModal.rec?.status!=='draft'">
        </label>
        <label style="display:flex;flex-direction:column;gap:4px;font-size:12px;">
          <span style="color:#6b7280;">근무일수</span>
          <input type="number" x-model="detailModal.rec.workDays" style="padding:7px;border:1px solid #d1d5db;border-radius:6px;" :disabled="detailModal.rec?.status!=='draft'">
        </label>
        <label style="display:flex;flex-direction:column;gap:4px;font-size:12px;">
          <span style="color:#6b7280;">메모</span>
          <input type="text" x-model="detailModal.rec.note" style="padding:7px;border:1px solid #d1d5db;border-radius:6px;" :disabled="detailModal.rec?.status!=='draft'">
        </label>
      </div>
    </div>
    </template>
  </div>
</div>

<!-- 직원 설정 모달 -->
<div x-show="configModal.open" style="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;" @click.self="configModal.open=false">

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">

              <select @change="e=>{ const u=allUsers.find(x=>x.id===e.target.value); if(u){ configModal.form.userId=u.id; configModal.form.name=u.name; } e.target.value=''; }"

          <label style="display:flex;flex-direction:column;gap:4px;font-size:12px;">

            <input type="text" x-model="configModal.form.userId" placeholder="예: comp-001"

        </div>
        <label style="display:flex;flex-direction:column;gap:4px;font-size:12px;">

        </label>
        <label style="display:flex;flex-direction:column;gap:4px;font-size:12px;">
          <span style="color:#6b7280;">월 소정근로시간</span>
          <select x-model="configModal.form.workingHours" style="padding:8px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;">
            <option value="209">209 (사무직)</option>
            <option value="216.875">216.875 (5일 주44h)</option>
            <option value="224.75">224.75 (5일 주46h)</option>
            <option value="241.55">241.55 (6일 주44h)</option>
          </select>
        </label>
        <label style="display:flex;flex-direction:column;gap:4px;font-size:12px;">
          <span style="color:#6b7280;">기본급 *</span>
          <input type="number" x-model="configModal.form.baseSalary" @input="updateNormal()" style="padding:8px;border:1px solid #d1d5db;border-radius:6px;">
        </label>
        <label style="display:flex;flex-direction:column;gap:4px;font-size:12px;">
          <span style="color:#6b7280;">고정연장수당</span>
          <input type="number" x-model="configModal.form.fixedOvertimePay" @input="updateNormal()" style="padding:8px;border:1px solid #d1d5db;border-radius:6px;">
        </label>
        <label style="display:flex;flex-direction:column;gap:4px;font-size:12px;">
          <span style="color:#6b7280;">고정휴일수당</span>
          <input type="number" x-model="configModal.form.fixedHolidayPay" @input="updateNormal()" style="padding:8px;border:1px solid #d1d5db;border-radius:6px;">
        </label>
        <label style="display:flex;flex-direction:column;gap:4px;font-size:12px;">
          <span style="color:#6b7280;">식대 (20만 비과세)</span>
          <input type="number" x-model="configModal.form.mealAllowance" @input="updateNormal()" style="padding:8px;border:1px solid #d1d5db;border-radius:6px;">
        </label>
        <label style="display:flex;flex-direction:column;gap:4px;font-size:12px;">
          <span style="color:#6b7280;">차량유지비 (20만 비과세)</span>
          <input type="number" x-model="configModal.form.transportAllowance" @input="updateNormal()" style="padding:8px;border:1px solid #d1d5db;border-radius:6px;">
        </label>
        <label style="display:flex;flex-direction:column;gap:4px;font-size:12px;">
          <span style="color:#6b7280;">팀장수당</span>
          <input type="number" x-model="configModal.form.teamLeaderAllowance" @input="updateNormal()" style="padding:8px;border:1px solid #d1d5db;border-radius:6px;">
        </label>
        <!-- 자동계산 표시 -->
        <div style="background:#f0fdf4;border-radius:6px;padding:10px;font-size:12px;display:grid;gap:4px;">
          <div style="display:flex;justify-content:space-between;"><span>통상임금 합계</span><strong x-text="fmt(configModal.form.normalWage||0)"></strong></div>
          <div style="display:flex;justify-content:space-between;color:#6b7280;"><span>통상시급 (추정)</span><span x-text="fmt(Math.floor((+configModal.form.normalWage||0)/(+configModal.form.workingHours||209)))+'원'"></span></div>
          <div style="font-size:10.5px;color:#9ca3af;line-height:1.4;">※ 서버 저장 시 고정연장·고정휴일을 분모에 반영해 정확한 시급 재계산</div>
        </div>
        <!-- 세금 설정 -->
        <label style="display:flex;flex-direction:column;gap:4px;font-size:12px;">

            <option>근로소득 100%</option>
            <option>근로소득 80%</option>
            <option>근로소득 120%</option>
            <option>10%감면</option><option>20%감면</option><option>30%감면</option>
            <option>50%감면</option><option>70%감면</option><option>90%감면</option>
            <option>사업소득 3.3%</option>
            <option>기타소득 8.8%</option>
          </select>
        </label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px;">
          <label style="display:flex;flex-direction:column;gap:4px;">
            <span style="color:#6b7280;">부양가족(본인포함)</span>
            <input type="number" x-model="configModal.form.dependents" min="1" style="padding:8px;border:1px solid #d1d5db;border-radius:6px;">
          </label>
          <label style="display:flex;flex-direction:column;gap:4px;">
            <span style="color:#6b7280;">자녀수(7~20세)</span>
            <input type="number" x-model="configModal.form.childrenCount" min="0" style="padding:8px;border:1px solid #d1d5db;border-radius:6px;">
          </label>
        </div>
        <!-- 4대보험 가입 여부 -->

          <div style="display:flex;gap:16px;">
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
              <input type="checkbox" :checked="configModal.form.pensionOpt==='O'" @change="configModal.form.pensionOpt=$event.target.checked?'O':'X'"> 국민연금
            </label>
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
              <input type="checkbox" :checked="configModal.form.healthOpt==='O'" @change="configModal.form.healthOpt=$event.target.checked?'O':'X'"> 건강보험
            </label>
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
              <input type="checkbox" :checked="configModal.form.ltcOpt==='O'" @change="configModal.form.ltcOpt=$event.target.checked?'O':'X'"> 장기요양
            </label>
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
              <input type="checkbox" :checked="configModal.form.employmentOpt==='O'" @change="configModal.form.employmentOpt=$event.target.checked?'O':'X'"> 고용보험
            </label>

        <!-- 보수월액 수동입력 -->

          <input type="number" x-model="configModal.form.healthBasisManual" placeholder="비워두면 과세합계 자동 적용" style="padding:8px;border:1px solid #d1d5db;border-radius:6px;">
        </label>
        <label style="display:flex;flex-direction:column;gap:4px;font-size:12px;">
          <span style="color:#6b7280;">국민연금 기준소득월액 수동입력</span>
          <input type="number" x-model="configModal.form.pensionBasisManual" placeholder="비워두면 과세합계 자동 적용" style="padding:8px;border:1px solid #d1d5db;border-radius:6px;">
        </label>
        <!-- 4대보험 감면율 (%) -->
        <div style="grid-column:1/-1;font-size:12px;border-top:1px solid #e5e7eb;padding-top:12px;">

            </label>
            <label style="display:flex;flex-direction:column;gap:3px;">
              <span style="color:#6b7280;font-size:11px;">건강보험</span>
              <input type="number" x-model="configModal.form.healthReductionPct" min="0" max="100" step="1" placeholder="0" style="padding:6px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;">
            </label>
            <label style="display:flex;flex-direction:column;gap:3px;">
              <span style="color:#6b7280;font-size:11px;">장기요양</span>
              <input type="number" x-model="configModal.form.ltcReductionPct" min="0" max="100" step="1" placeholder="0" style="padding:6px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;">
            </label>
            <label style="display:flex;flex-direction:column;gap:3px;">
              <span style="color:#6b7280;font-size:11px;">고용보험</span>
              <input type="number" x-model="configModal.form.employmentReductionPct" min="0" max="100" step="1" placeholder="0" style="padding:6px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;">

            <label style="display:flex;flex-direction:column;gap:3px;">
              <span style="color:#6b7280;font-size:11px;">소득세(80=80%)</span>

        </div>
        <!-- 계좌 -->
        <label style="display:flex;flex-direction:column;gap:4px;font-size:12px;">
          <span style="color:#6b7280;">금융기관</span>
          <input type="text" x-model="configModal.form.bankName" style="padding:8px;border:1px solid #d1d5db;border-radius:6px;">
        </label>
        <label style="display:flex;flex-direction:column;gap:4px;font-size:12px;">
          <span style="color:#6b7280;">계좌번호 (암호화 저장)</span>
          <input type="text" x-model="configModal.form.bankAccount" style="padding:8px;border:1px solid #d1d5db;border-radius:6px;">

        <label style="display:flex;flex-direction:column;gap:4px;font-size:12px;grid-column:1/-1;">

          <input type="email" x-model="configModal.form.email" style="padding:8px;border:1px solid #d1d5db;border-radius:6px;">
        </label>
      </div>
      <div style="display:flex;gap:8px;margin-top:16px;">
        <button @click="saveConfig()" style="flex:1;padding:11px;background:#4f6ef7;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-weight:600;">저장</button>
        <button @click="configModal.open=false" style="padding:11px 20px;background:#f3f4f6;border:none;border-radius:8px;font-size:14px;cursor:pointer;">취소</button>
      </div>
    </div>
  </div>
</div>

    // ── 지급 필드 정의 ────────────────────────────────────────
    // visibility 판단: labels.visibility 객체에 명시된 값이 우선,
    // 없으면 "이름이 있으면 노출" fallback (기본 하위호환)
    _slotVisible(key) {
      const v = this.labels?.visibility || {};
      if (Object.prototype.hasOwnProperty.call(v, key)) {
        const entry = v[key];
        if (entry && typeof entry === 'object') return entry.visible !== false;
        return !!entry;
      }
      const nameKey = key + 'Name';
      return !!(this.labels?.[nameKey] && String(this.labels[nameKey]).trim());
    },
    // 47열 급여대장 기본 컬럼 표시 여부 (기본값 = true)
    // labels.visibility['col_xxx'] 로 저장됨. 사용자가 체크 해제하면 false.
    _colVisible(key) {
      const v = this.labels?.visibility || {};
      const storeKey = 'col_' + key;
      let shown = true;
      if (Object.prototype.hasOwnProperty.call(v, storeKey)) {
        const entry = v[storeKey];
        if (entry && typeof entry === 'object') shown = entry.visible !== false;
        else shown = !!entry;
      }
      if (!shown) return false;
      // 이 달 전원 0원이면 자동 숨김 (autoHideZero 기본 ON)
      if (this.autoHideZero && this._isAllZero(key)) return false;
      return true;
    },
    // 지급/공제 컬럼 그룹 자동 숨김: fieldKey 기준. 연장/야간/휴기/휴연 같은 시간+수당 쌍은 pay 필드 하나로 묶어서 체크
    // 예) _hideGrp('overtimePay') → 이 달 연장수당 총합이 0이면 연장(h)+연장수당 둘 다 숨김
    _hideGrp(fieldKey) {
      if (!this.autoHideZero) return false;
      return this._isAllZero(fieldKey);
    },
    _isAllZero(fieldKey) {
      const recs = this.visibleRecords;
      if (!Array.isArray(recs) || recs.length === 0) return false;
      for (const r of recs) {
        const v = +(r?.[fieldKey] || 0);
        if (v) return false;
      }
      return true;
    },

    // ── 급여대장 47열 셀 너비 관리 ─────────────────────────
    // 저장값(colWidths) > 기본값(_colDefaults) > 80px 순
    _colW(key) {
      const w = this.colWidths && this.colWidths[key];
      if (w && +w > 0) return +w;
      return this._colDefaults[key] || 80;
    },
    // thead 위에서 마우스 이동 시 오른쪽 경계 근처에서 col-resize 커서 표시
    // ⚡ 드래그 중엔 비활성화 (불필요한 boundingClientRect 호출 방지)
    _hdrMouseMove(ev) {
      if (this._colDragging) return; // 드래그 중엔 cursor 갱신 불필요
      const th = ev.target.closest('th[data-col]');
      if (!th) return;
      const rect = th.getBoundingClientRect();
      const dx = rect.right - ev.clientX;
      if (dx >= 0 && dx <= 8) {
        th.style.cursor = 'col-resize';
      } else {
        th.style.cursor = '';
      }
    },
    // thead 위에서 오른쪽 경계 근처를 mousedown → 드래그하면 너비 조절
    _hdrMouseDown(ev) {
      const th = ev.target.closest('th[data-col]');
      if (!th) return;
      const colKey = th.dataset.col;
      if (!colKey) return;
      const rect = th.getBoundingClientRect();
      const dx = rect.right - ev.clientX;
      if (dx < 0 || dx > 8) return; // 오른쪽 가장자리 근처에서만
      ev.preventDefault();
      ev.stopPropagation();
      const startX = ev.clientX;
      const startW = this._colW(colKey);
      const self = this;
      // ⚡ 드래그 중엔 DOM에만 반영 (Alpine state 안 건드림) → 1,400+셀 재렌더 방지
      // 떼는 순간(mouseup) 한 번만 colWidths 업데이트 + localStorage 저장
      let latestW = startW;
      const colEls = document.querySelectorAll('col[data-col="' + colKey + '"]');
      // 드래그 중 mousemove 가드용
      this._colDragging = true;
      // body cursor 강제 col-resize (드래그 중 cursor 안 깜빡)
      const prevCursor = document.body.style.cursor;
      document.body.style.cursor = 'col-resize';
      // rAF 스로틀: 매 mousemove 가 아니라 다음 frame 에 한 번만 width 적용 → 60fps 상한
      let pendingFrame = null;
      const apply = () => {
        pendingFrame = null;
        for (let i = 0; i < colEls.length; i++) colEls[i].style.width = latestW + 'px';
      };
      const onMove = (e) => {
        latestW = Math.max(40, Math.min(500, startW + (e.clientX - startX)));
        if (pendingFrame == null) pendingFrame = requestAnimationFrame(apply);
      };
      const onUp = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        if (pendingFrame != null) { cancelAnimationFrame(pendingFrame); pendingFrame = null; }
        // 마지막 width 보장
        for (let i = 0; i < colEls.length; i++) colEls[i].style.width = latestW + 'px';
        document.body.style.cursor = prevCursor;
        self._colDragging = false;
        // mouseup 시점 한 번만 Alpine state 업데이트 (전체 재렌더 1회)
        self.colWidths = Object.assign({}, self.colWidths, { [colKey]: latestW });
        try {
          localStorage.setItem('ledgerCW:' + self.company, JSON.stringify(self.colWidths));
        } catch(e) {}
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    },
    // 사용자가 조절한 셀 너비 초기화 (기본값으로 되돌림)
    resetColWidths() {
      if (!confirm('급여대장 셀 너비를 기본값으로 되돌릴까요?')) return;
      this.colWidths = {};

    },
    // 회사 변경 시 해당 회사의 저장된 셀 너비 로드
    _loadColWidths() {
      try {

    // ── 엑셀처럼 셀 인라인 편집 ─────────────────────────────
    // 행 클릭(싱글): 편집 가능한 칸이 아닐 때만 상세 모달 열기
    _onRowClick(ev, r) {
      if (ev.target.closest('td[data-col]')) return; // 편집 가능 칸은 싱글 클릭으로 모달 안 띄움
      if (ev.target.closest('button,input,a')) return;

    },
    // 셀 한 번 클릭: 셀 선택만 (편집은 안 들어감) — 엑셀 동작
    _onLedgerCellClick(ev) {
      const td = ev.target.closest('td[data-col]');
      if (!td) return;
      const tr = td.closest('tr[data-recid]');
      if (!tr) return;
      const colKey = td.dataset.col;
      if (!this._editableCols.includes(colKey)) return;
      const recId = tr.dataset.recid;
      const r = this.records.find(x => String(x.id) === String(recId));
      if (!r || r.status !== 'draft') return; // 확정/지급완료는 잠금
      // 이전 선택 해제 + 현재 셀 선택 표시
      document.querySelectorAll('#salary-scope td.ledger-selected').forEach(el => el.classList.remove('ledger-selected'));
      td.classList.add('ledger-selected');
      this.selectedLedgerCell = { recId, key: colKey };
    },
    // 선택된 셀에서 키 입력 시 편집 시작 — 엑셀 동작
    _onLedgerKeydown(ev) {
      if (this.editing?.id) return; // 이미 편집 중
      if (!this.selectedLedgerCell?.recId) return;
      const tag = (document.activeElement?.tagName || '').toLowerCase();
      if (['input','textarea','select'].includes(tag)) return;
      if (this.detailModal?.open || this.configModal?.open || this.labelModal?.open) return;

      const recId = this.selectedLedgerCell.recId;
      const key = this.selectedLedgerCell.key;
      const r = this.records.find(x => String(x.id) === String(recId));
      if (!r || r.status !== 'draft') return;
      const td = document.querySelector(`#salary-scope tr[data-recid="${CSS.escape(String(recId))}"] td[data-col="${key}"]`);
      if (!td) return;

      // 인쇄 가능 단일 키 → 편집 시작 + 첫 글자 덮어쓰기
      if (ev.key.length === 1 && !ev.ctrlKey && !ev.metaKey && !ev.altKey) {
        ev.preventDefault();
        this._startCellEdit(r, key, td);
        this.$nextTick(() => {
          const el = this.$refs.editInput;
          if (el) {
            el.value = ev.key;
            this.editing.value = ev.key;
            el.setSelectionRange(el.value.length, el.value.length);
          }
        });
        return;
      }
      // F2 → 기존값 유지 편집
      if (ev.key === 'F2') {
        ev.preventDefault();
        this._startCellEdit(r, key, td);
        return;
      }
      // Backspace/Delete → 빈 값 편집
      if (ev.key === 'Backspace' || ev.key === 'Delete') {
        ev.preventDefault();
        this._startCellEdit(r, key, td);
        this.$nextTick(() => {
          const el = this.$refs.editInput;
          if (el) { el.value = ''; this.editing.value = ''; }
        });
        return;
      }
    },
    // 셀 더블클릭: 편집 시작
    _onCellDblClick(ev) {
      const td = ev.target.closest('td[data-col]');
      if (!td) return;
      const tr = td.closest('tr[data-recid]');
      if (!tr) return;
      const colKey = td.dataset.col;
      if (!this._editableCols.includes(colKey)) return;
      const recId = tr.dataset.recid;
      const r = this.records.find(x => String(x.id) === String(recId));
      if (!r) return;
      if (r.status !== 'draft') {
        alert('확정 또는 지급완료된 급여는 수정할 수 없습니다.\n액션 열의 ↩ 버튼으로 확정 취소 후 수정하세요.');
        return;
      }
      ev.preventDefault();
      ev.stopPropagation();
      this._startCellEdit(r, colKey, td);
    },
    // 오버레이 입력창을 해당 셀 위에 띄우고 포커스
    _startCellEdit(r, colKey, td) {
      const wrapper = td.closest('[data-ledger-wrapper]');
      if (!wrapper) return;
      const tdRect = td.getBoundingClientRect();
      const wrapRect = wrapper.getBoundingClientRect();
      const top = (tdRect.top - wrapRect.top) + wrapper.scrollTop;
      const left = (tdRect.left - wrapRect.left) + wrapper.scrollLeft;
      const cur = r[colKey];
      this.editing = {
        id: r.id,
        key: colKey,
        value: (cur === null || cur === undefined || cur === 0) ? '' : String(cur),
        origValue: +(cur || 0),
        top, left,
        width: tdRect.width, height: tdRect.height,
      };
      this.$nextTick(() => {
        const el = this.$refs.editInput;
        if (el) { el.focus(); el.select(); }
      });
    },
    // 저장 + 이동. move: 'down' | 'right' | 'stay'
    async commitEdit(move) {
      if (!this.editing.id) return;
      const id = this.editing.id;
      const key = this.editing.key;
      const raw = String(this.editing.value || '').trim().replace(/,/g, '');
      const newVal = raw === '' ? 0 : +raw;
      if (isNaN(newVal)) {
        alert('숫자만 입력 가능합니다');
        return;
      }
      const changed = newVal !== this.editing.origValue;
      // 우선 편집 상태 닫고 (다음 셀로 이동해도 깜빡이지 않게)
      const recIdx = this.visibleRecords.findIndex(x => x.id === id);
      const colIdx = this._editableCols.indexOf(key);
      this.editing = { id: null, key: null, value: '', origValue: null, top: 0, left: 0, width: 0, height: 0 };

      if (changed) {
        try {
          const res = await fetch(`/api/salary/records/${id}`, {
            method: 'PUT',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ [key]: newVal }),
          });
          if (!res.ok) {
            const txt = await res.text();
            throw new Error(txt);
          }
          const d = await res.json();
          const idx = this.records.findIndex(x => x.id === id);
          if (idx >= 0 && d.record) this.records[idx] = d.record;
        } catch(e) {
          alert('저장 실패: ' + (e.message || e));
        }
      }

      // 다음 셀로 이동
      if (move === 'down') {
        const nextRec = this.visibleRecords[recIdx + 1];
        if (nextRec && nextRec.status === 'draft') {
          this.$nextTick(() => this._moveEditTo(nextRec.id, key));
        }
      } else if (move === 'right') {
        const nextKey = this._editableCols[colIdx + 1];
        if (nextKey) {
          this.$nextTick(() => this._moveEditTo(id, nextKey));
        }
      }
    },
    cancelEdit() {
      this.editing = { id: null, key: null, value: '', origValue: null, top: 0, left: 0, width: 0, height: 0 };
    },
    // 특정 (recId, colKey) 로 편집 포커스 이동 — Enter/Tab 후 호출
    _moveEditTo(recId, colKey) {
      const td = document.querySelector(`tr[data-recid="${recId}"] td[data-col="${colKey}"]`);
      const r = this.records.find(x => String(x.id) === String(recId));
      if (!td || !r) return;
      if (r.status !== 'draft') return;
      this._startCellEdit(r, colKey, td);
    },
    // Excel 복사(탭/개행 구분) 붙여넣기 처리
    async onCellPaste(ev) {
      const text = (ev.clipboardData || window.clipboardData).getData('text');
      if (!text) return;
      const hasTab = text.includes('\t');
      const hasNL = text.includes('\n');
      // 단일 값이면 기본 붙여넣기 동작에 맡김
      if (!hasTab && !hasNL) return;
      ev.preventDefault();
      // \r\n 정리 후 빈 마지막 줄 제거
      const cleaned = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').replace(/\n$/, '');
      const rows = cleaned.split('\n');
      const matrix = rows.map(line => line.split('\t'));
      if (matrix.length === 0) return;

      const startRecId = this.editing.id;
      const startKey = this.editing.key;
      if (!startRecId || !startKey) return;
      const startRowIdx = this.visibleRecords.findIndex(x => x.id === startRecId);
      const startColIdx = this._editableCols.indexOf(startKey);
      if (startRowIdx < 0 || startColIdx < 0) return;

      const patches = [];
      let skippedConfirmed = 0;
      for (let dr = 0; dr < matrix.length; dr++) {
        const rowIdx = startRowIdx + dr;
        if (rowIdx >= this.visibleRecords.length) break;
        const rec = this.visibleRecords[rowIdx];
        if (rec.status !== 'draft') { skippedConfirmed++; continue; }
        const patch = {};
        let any = false;
        for (let dc = 0; dc < matrix[dr].length; dc++) {
          const colIdx = startColIdx + dc;
          if (colIdx >= this._editableCols.length) break;
          const colKey = this._editableCols[colIdx];
          const cell = String(matrix[dr][dc] || '').trim().replace(/,/g, '');
          if (cell === '') continue;
          const v = +cell;
          if (isNaN(v)) continue;
          patch[colKey] = v;
          any = true;
        }
        if (any) patches.push({ id: rec.id, patches: patch });
      }

      if (patches.length === 0) {
        alert('붙여넣을 숫자가 없습니다');
        return;
      }
      const cellCount = patches.reduce((s, p) => s + Object.keys(p.patches).length, 0);
      let msg = `${patches.length}개 행 · 총 ${cellCount}개 칸에 값을 붙여넣을까요?`;
      if (skippedConfirmed > 0) msg += `\n\n(확정된 ${skippedConfirmed}개 행은 건너뜁니다)`;
      if (!confirm(msg)) return;

      // 편집 상태 닫기
      this.editing = { id: null, key: null, value: '', origValue: null, top: 0, left: 0, width: 0, height: 0 };

      try {
        const res = await fetch('/api/salary/records/bulk-update', {
          method: 'PUT',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ patches }),
        });
        if (!res.ok) throw new Error(await res.text());
        const d = await res.json();
        await this.loadRecords();
        const skipServer = d.skipped || 0;
        let ok = `${d.updated}건 업데이트 완료`;
        if (skipServer > 0) ok += ` · ${skipServer}건 스킵`;
        alert(ok);
      } catch(e) {
        alert('붙여넣기 실패: ' + (e.message || e));
      }
    },

    // ── 직원 기초 설정 엑셀식 인라인 편집 ───────────────────────
    // 한 번 클릭 → 셀 선택만 (파란 테두리). 타이핑/F2/더블클릭 → 편집 시작.
    _onConfigCellClick(ev) {
      const td = ev.target.closest('td[data-col]');
      if (!td) return;
      const tr = td.closest('tr[data-cfgid]');
      if (!tr) return;
      const colKey = td.dataset.col;
      if (!this._configEditableCols.includes(colKey)) return;
      const cfgId = tr.dataset.cfgid;
      // 이전 선택 해제 + 현재 셀 선택 표시
      document.querySelectorAll('#salary-scope td.cfg-selected').forEach(el => el.classList.remove('cfg-selected'));
      td.classList.add('cfg-selected');
      this.selectedConfigCell = { userId: cfgId, key: colKey };
    },
    // 선택된 셀에서 키 입력 시 편집 시작 (엑셀처럼)
    _onConfigKeydown(ev) {
      // 이미 편집 중이면 패스 (configEdit 가 알아서 처리)
      if (this.configEdit?.userId) return;
      // 선택된 셀 없으면 패스
      if (!this.selectedConfigCell?.userId) return;
      // 다른 input/textarea/select에 포커스가 있으면 패스
      const tag = (document.activeElement?.tagName || '').toLowerCase();
      if (['input','textarea','select'].includes(tag)) return;
      // 모달 열려 있으면 패스
      if (this.configModal?.open || this.labelModal?.open) return;

      const cfgId = this.selectedConfigCell.userId;
      const key = this.selectedConfigCell.key;
      const c = this.configs.find(x => String(x.userId) === String(cfgId));
      if (!c) return;
      const td = document.querySelector(`#salary-scope tr[data-cfgid="${CSS.escape(String(cfgId))}"] td[data-col="${key}"]`);
      if (!td) return;

      // 인쇄 가능 단일 키 (영문/숫자/한글) → 편집 시작 + 첫 글자 덮어쓰기
      if (ev.key.length === 1 && !ev.ctrlKey && !ev.metaKey && !ev.altKey) {
        ev.preventDefault();
        this._startConfigCellEdit(c, key, td);
        // 입력창에 첫 글자 박기
        this.$nextTick(() => {
          const el = this.$refs.configEditInput;
          if (el) {
            el.value = ev.key;
            this.configEdit.value = ev.key;
            // 커서를 끝으로
            el.setSelectionRange(el.value.length, el.value.length);
          }
        });
        return;
      }
      // F2 → 기존 값 유지하며 편집 시작
      if (ev.key === 'F2') {
        ev.preventDefault();
        this._startConfigCellEdit(c, key, td);
        return;
      }
      // Backspace/Delete → 빈 값으로 편집 시작
      if (ev.key === 'Backspace' || ev.key === 'Delete') {
        ev.preventDefault();
        this._startConfigCellEdit(c, key, td);
        this.$nextTick(() => {
          const el = this.$refs.configEditInput;
          if (el) { el.value = ''; this.configEdit.value = ''; }
        });
        return;
      }
    },
    // 파란색 배경 셀(data-col)을 더블클릭 → 오버레이 입력창 (기존값 유지)
    _onConfigCellDblClick(ev) {
      const td = ev.target.closest('td[data-col]');
      if (!td) return;
      const tr = td.closest('tr[data-cfgid]');
      if (!tr) return;
      const colKey = td.dataset.col;
      if (!this._configEditableCols.includes(colKey)) return;
      const cfgId = tr.dataset.cfgid;
      const c = this.configs.find(x => String(x.userId) === String(cfgId));
      if (!c) return;
      ev.preventDefault();
      ev.stopPropagation();
      this._startConfigCellEdit(c, colKey, td);
    },
    // 입력 오버레이를 해당 셀 위에 띄우고 포커스
    _startConfigCellEdit(c, colKey, td) {
      const wrapper = td.closest('[data-config-wrapper]');
      if (!wrapper) return;
      const tdRect = td.getBoundingClientRect();
      const wrapRect = wrapper.getBoundingClientRect();
      const top = (tdRect.top - wrapRect.top) + wrapper.scrollTop;
      const left = (tdRect.left - wrapRect.left) + wrapper.scrollLeft;

      // 현재 값 읽기 (date 는 조직관리, 나머지는 config 행)
      let cur = '';
      if (colKey === 'hireDate')      cur = this.hireDateOf(c.userId) || '';
      else if (colKey === 'resignDate') cur = this.resignDateOf(c.userId) || '';
      else cur = c[colKey];

      const origValue = cur;
      const valStr = (cur === null || cur === undefined || cur === 0) ? '' : String(cur);

      this.configEdit = {
        userId: c.userId,
        key: colKey,
        value: valStr,
        origValue: origValue,
        top, left,
        width: tdRect.width, height: tdRect.height,
      };
      this.$nextTick(() => {
        const el = this.$refs.configEditInput;
        if (el) { el.focus(); el.select(); }
      });
    },
    // 저장 + 이동. move: 'down' | 'right' | 'stay'
    async commitConfigEdit(move) {
      if (!this.configEdit.userId) return;
      const cfgId = this.configEdit.userId;
      const key = this.configEdit.key;
      let raw = String(this.configEdit.value || '').trim();
      const c = this.configs.find(x => String(x.userId) === String(cfgId));
      if (!c) { this.cancelConfigEdit(); return; }

      // 값 파싱 — 날짜/숫자/텍스트 각자
      let newVal;
      if (this._configDateCols.includes(key)) {
        // 날짜: 빈 값 허용(=해제). 형식은 YYYY-MM-DD 로 정규화
        if (raw === '') { newVal = ''; }
        else {
          // 사용자가 20260401 / 2026.04.01 / 2026/4/1 등을 쳐도 처리
          const digits = raw.replace(/[^0-9]/g, '');
          if (digits.length === 8) {
            newVal = digits.slice(0,4)+'-'+digits.slice(4,6)+'-'+digits.slice(6,8);
          } else if (/^\d{4}-\d{1,2}-\d{1,2}$/.test(raw)) {
            const [y,m,d] = raw.split('-');
            newVal = y+'-'+m.padStart(2,'0')+'-'+d.padStart(2,'0');
          } else if (/^\d{4}[./]\d{1,2}[./]\d{1,2}$/.test(raw)) {
            const [y,m,d] = raw.split(/[./]/);
            newVal = y+'-'+m.padStart(2,'0')+'-'+d.padStart(2,'0');
          } else {
            alert('날짜 형식이 올바르지 않습니다. YYYY-MM-DD 또는 YYYYMMDD 로 입력하세요.');
            return;
          }
        }
      } else if (this._configTextCols.includes(key)) {
        newVal = raw;
      } else {
        // 숫자
        const r2 = raw.replace(/,/g, '').replace(/[^0-9.\-]/g, '');
        newVal = r2 === '' ? 0 : +r2;
        if (isNaN(newVal)) { alert('숫자만 입력 가능합니다'); return; }
      }

      const changed = String(newVal) !== String(this.configEdit.origValue || (typeof newVal==='number'?0:''));
      // 편집 상태 먼저 닫기 (이동 시 깜빡임 방지)
      const rowIdx = this.configs.findIndex(x => String(x.userId) === String(cfgId));
      const colIdx = this._configEditableCols.indexOf(key);
      this.configEdit = { userId: null, key: null, value: '', origValue: null, top: 0, left: 0, width: 0, height: 0 };

      if (changed) {
        try {
          if (this._configEmploymentCols.includes(key)) {
            // 입/퇴사일 → 조직관리.json 쪽 저장 endpoint
            const payload = {
              companyId: c.companyId || this.company,
              name: c.name || this.nameOf(c.userId) || '',
            };
            payload[key] = newVal;
            const res = await fetch(`/api/salary/config/${encodeURIComponent(cfgId)}/employment`, {
              method: 'POST', credentials: 'include',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload),
            });
            if (!res.ok) throw new Error(await res.text());
            await this.loadUsers(); // userInfoMap 갱신 → hireDateOf/resignDateOf 반영
            // 퇴사자 숨김 토글이 켜져 있으면 급여대장도 영향 — 재조회
            await this.loadRecords();
          } else {
            // 급여 기초 설정 → /config full upsert
            const full = { ...c };
            full[key] = newVal;
            full.companyId = c.companyId || this.company;
            if (!full.name) full.name = this.nameOf(c.userId) || '';
            // 통상임금 재계산
            full.normalWage = (+full.baseSalary||0) + (+full.fixedOvertimePay||0) + (+full.fixedHolidayPay||0)
              + (+full.mealAllowance||0) + (+full.transportAllowance||0) + (+full.teamLeaderAllowance||0);
            const res = await fetch('/api/salary/config', {
              method: 'POST', credentials: 'include',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(full),
            });
            if (!res.ok) throw new Error(await res.text());
            await this.loadConfigs();
          }
        } catch(e) {
          alert('저장 실패: ' + (e.message || e));
          return;
        }
      }

      // 다음 셀로 이동
      if (move === 'down') {
        const nextCfg = this.configs[rowIdx + 1];
        if (nextCfg) this.$nextTick(() => this._moveConfigEditTo(nextCfg.userId, key));
      } else if (move === 'right') {
        const nextKey = this._configEditableCols[colIdx + 1];
        if (nextKey) this.$nextTick(() => this._moveConfigEditTo(cfgId, nextKey));
      }
    },
    cancelConfigEdit() {
      this.configEdit = { userId: null, key: null, value: '', origValue: null, top: 0, left: 0, width: 0, height: 0 };
    },
    // 특정 (userId, colKey) 로 편집 포커스 이동
    _moveConfigEditTo(cfgId, colKey) {
      const td = document.querySelector(`tr[data-cfgid="${CSS.escape(String(cfgId))}"] td[data-col="${colKey}"]`);
      const c = this.configs.find(x => String(x.userId) === String(cfgId));
      if (!td || !c) return;
      this._startConfigCellEdit(c, colKey, td);
    },

    // 퇴사자 필터링: hideResigned=true 면 퇴사자 제외한 현직자만 반환
    // records 원본은 그대로 두고 화면/합계 전용으로만 필터
    // ⚡ 캐시: records/hideResigned 변경 안 됐으면 같은 array reference 재사용
    //   → sumField 47회 호출이 캐시 적중으로 가벼워짐
    get visibleRecords() {
      if (!Array.isArray(this.records)) return [];
      if (!this.hideResigned) return this.records;
      if (this._vrCache && this._vrCache.records === this.records && this._vrCache.hideResigned === this.hideResigned) {
        return this._vrCache.result;
      }
      const result = this.records.filter(r => !r?.resigned);
      this._vrCache = { records: this.records, hideResigned: this.hideResigned, result };
      return result;
    },
    // 상단 "지급 (I~AB)" 헤더 colspan 동적 계산
    _payGroupColspan() {
      let c = 2; // 기본급 + 지급합계 (항상 표시)
      const pairs = ['overtimePay','nightPay','holidayPay','holidayOtPay'];
      for (const k of pairs) if (!this._hideGrp(k)) c += 2;
      const singles = ['fixedOvertimePay','fixedHolidayPay','mealAllowance','transportAllowance','teamLeaderAllowance','bonusPay','retroPay','extraPay1','extraPay2','leavePay'];
      for (const k of singles) if (!this._hideGrp(k)) c += 1;
      return c;
    },
    // 상단 "공제 (AC~AR)" 헤더 colspan 동적 계산 (manual toggle 8개 + 자동숨김)
    _dedGroupColspan() {
      // 항상 표시: 국민연금/건강/장기/고용/소득세/지방세/과태료(AK)/공제합계 = 8
      let c = 8;
      const toggleKeys = ['incomeTaxAdj','localTaxAdj','ltcInstallment','miscDeduction2','healthAnnual','ltcAnnual','healthRefundInterest','ltcRefundInterest'];
      for (const k of toggleKeys) if (this._colVisible(k)) c += 1;
      return c;
    },
    // 라벨 모달에서 컬럼 토글 바인딩용
    isColShown(key) {
      const v = this.labelModal.form?.visibility || {};
      const storeKey = 'col_' + key;
      if (!Object.prototype.hasOwnProperty.call(v, storeKey)) return true;
      const entry = v[storeKey];
      if (entry && typeof entry === 'object') return entry.visible !== false;
      return !!entry;
    },
    toggleColShown(key, val) {
      if (!this.labelModal.form.visibility || typeof this.labelModal.form.visibility !== 'object') {
        this.labelModal.form.visibility = {};
      }
      this.labelModal.form.visibility['col_' + key] = !!val;
    },
    // 지급/공제 활성 슬롯 수 카운트 (이름 + visible 둘 다 충족)
    activeExtraPayCount() {
      let n = 0;
      for (let i = 1; i <= 8; i++) {
        const name = this.labelModal.form?.['extraPay'+i+'Name'];
        if (name && String(name).trim() && this.isSlotVisible('extraPay'+i)) n++;
      }
      return n;
    },
    activeExtraDedCount() {
      let n = 0;
      for (let i = 1; i <= 8; i++) {
        const name = this.labelModal.form?.['extraDeduction'+i+'Name'];
        if (name && String(name).trim() && this.isSlotVisible('extraDeduction'+i)) n++;
      }
      return n;
    },
    activeColCount() {
      let n = 0;
      for (const c of this.colToggleList) if (this.isColShown(c.key)) n++;
      return n;
    },
    // 전체 선택 / 전체 해제 (이름이 있는 슬롯만 대상. 전체해제는 모든 슬롯)
    toggleAllExtraPay(val) {
      for (let i = 1; i <= 8; i++) {
        const name = this.labelModal.form?.['extraPay'+i+'Name'];
        // 전체 체크 시 이름 없는 슬롯은 건드리지 않음 (어차피 숨김)
        if (val && !(name && String(name).trim())) continue;
        this.toggleSlotVisibility('extraPay'+i, !!val);
      }
    },
    toggleAllExtraDed(val) {
      for (let i = 1; i <= 8; i++) {
        const name = this.labelModal.form?.['extraDeduction'+i+'Name'];
        if (val && !(name && String(name).trim())) continue;
        this.toggleSlotVisibility('extraDeduction'+i, !!val);
      }
    },
    toggleAllCols(val) {
      for (const c of this.colToggleList) this.toggleColShown(c.key, !!val);
    },
    get payFields() {
      const l = this.labels;
      const base = [
        { key: 'baseSalary', label: '기본급' },
        { key: 'fixedOvertimePay', label: '고정연장수당' },
        { key: 'fixedHolidayPay', label: '고정휴일수당' },
        { key: 'mealAllowance', label: '식대' },
        { key: 'transportAllowance', label: '차량유지비' },
        { key: 'teamLeaderAllowance', label: '팀장수당' },
        { key: 'overtimePay', label: '연장수당', hours: true, hoursKey: 'overtimeHours' },
        { key: 'nightPay', label: '야간수당', hours: true, hoursKey: 'nightHours' },
        { key: 'holidayPay', label: '휴일기본수당', hours: true, hoursKey: 'holidayHours' },
        { key: 'holidayOtPay', label: '휴일연장수당', hours: true, hoursKey: 'holidayOtHours' },
        { key: 'bonusPay', label: '상여' },
        { key: 'retroPay', label: '소급' },
        { key: 'leavePay', label: '연차수당' },
      ];
      for (let i = 1; i <= 8; i++) {
        if (this._slotVisible('extraPay'+i)) {
          base.push({ key: 'extraPay'+i, label: l['extraPay'+i+'Name'] || ('추가 지급 '+i), extra: true });
        }
      }
      return base;
    },
    get dedFields() {
      const l = this.labels;
      const base = [
        { key: 'nationalPension', label: '국민연금' },
        { key: 'healthInsurance', label: '건강보험' },
        { key: 'longTermCare', label: '장기요양보험' },
        { key: 'employmentInsurance', label: '고용보험' },
        { key: 'incomeTax', label: '소득세' },
        { key: 'localTax', label: '지방소득세' },
        { key: 'incomeTaxAdj', label: '정산소득세' },
        { key: 'localTaxAdj', label: '정산지방소득세' },
        { key: 'healthAnnual', label: '건강보험 연말정산' },
        { key: 'ltcAnnual', label: '장기요양 연말정산' },
        { key: 'healthInstallment', label: '건강보험 분할납부' },
        { key: 'ltcInstallment', label: '장기요양 분할납부' },
        { key: 'healthAprExtra', label: '건강보험 정산분' },
        { key: 'ltcAprExtra', label: '장기요양 정산분' },
        { key: 'healthRefundInterest', label: '건강보험 환급금이자' },
        { key: 'ltcRefundInterest', label: '요양보험 환급금이자' },
        { key: 'miscDeduction1', label: '과태료 및 주차비' },
        { key: 'miscDeduction2', label: '기타 공제' },
      ];
      for (let i = 1; i <= 8; i++) {
        if (this._slotVisible('extraDeduction'+i)) {
          base.push({ key: 'extraDeduction'+i, label: l['extraDeduction'+i+'Name'] || ('추가 공제 '+i), extra: true });
