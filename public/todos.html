<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>할 일</title>
<script>
// Alpine 컴포넌트 (Alpine core보다 먼저 전역에 정의)
function todayStr(){ return new Date(Date.now() + 9*3600*1000).toISOString().slice(0,10); }
function todosApp(){
  return {
    loading: true, gate: false,
    viewer: { mode:'mine', isAdmin:false, canSeeTeam:false, name:'', userId:'' },
    tab: 'mine', curDate: todayStr(),
    memos: [], people: [], expanded: {}, saveTimers: {},
    newTitle: '', aiOpen: false, aiText: '', aiBusy: false, aiMsg: '',
    aiFiles: [], aiUploading: false,
    assign: { open:false, targetUserId:'', targetName:'', text:'', busy:false, err:'' },
    detail: { open:false, memoId:'', itemId:'', text:'', attachments:[], busy:false, aiBusy:false, err:'', uploading:false },
    attMeta: {},
    base: '/api/workspace/todos',

    clean(s, max){ return String(s==null?'':s).replace(/\s+$/,'').slice(0, max||2000); },

    async init(){ await this.reload(); },

    fmtDate(s){ const d=new Date(s+'T00:00:00Z'); const wd=['일','월','화','수','목','금','토'][d.getUTCDay()];
      return (d.getUTCMonth()+1)+'월 '+d.getUTCDate()+'일 ('+wd+')'; },
    shortDate(s){ const d=new Date(s+'T00:00:00Z'); return (d.getUTCMonth()+1)+'/'+d.getUTCDate(); },

    async reload(){
      this.loading = true;
      const q = this.tab==='team' ? ('?view=team&date='+this.curDate) : ('?date='+this.curDate);
      let r;
      try { r = await fetch(this.base+q, { credentials:'same-origin' }); }
      catch(e){ this.gate=true; this.loading=false; return; }
      if (r.status===401){ this.gate=true; this.loading=false; return; }
      this.gate=false;
      let j={}; try{ j = await r.json(); }catch(e){}
      this.viewer = j.viewer || this.viewer;
      this.memos = j.memos || [];
      this.people = j.people || [];
      this.loading = false;
    },

    switchTab(t){ if(this.tab===t) return; this.tab=t; this.expanded={}; this.reload(); },
    shiftDate(n){ const d=new Date(this.curDate+'T00:00:00Z'); d.setUTCDate(d.getUTCDate()+n); this.curDate=d.toISOString().slice(0,10); this.expanded={}; this.reload(); },
    goToday(){ this.curDate=todayStr(); this.expanded={}; this.reload(); },

    isExpanded(id){ return !!this.expanded[id]; },
    toggle(id){ this.expanded[id]=!this.expanded[id]; if(this.expanded[id]){ const m=this.memos.find(x=>x.id===id); if(m && m.mine) this.ensureBlank(m); } },

    countItems(m){ return (m.items||[]).filter(i=>(i.text||'').trim()); },
    progress(m){ const it=this.countItems(m); return it.filter(i=>i.done).length+' / '+it.length; },
    pct(m){ const it=this.countItems(m); if(!it.length) return 0; return Math.round(it.filter(i=>i.done).length/it.length*100); },
    carried(m){ return !!(m.date && m.date < this.curDate); },
    carriedLabel(m){ return this.carried(m) ? '지난 '+this.shortDate(m.date) : ''; },
    assignedTag(it){ return (it && it.source==='assigned' && it.assignedByName) ? it.assignedByName+' 전달' : ''; },

    // ── 팀/전체 보기: 사람별 ──
    personMemos(uid){ return this.memos.filter(m=>m.ownerId===uid); },
    personItems(uid){ const out=[]; this.personMemos(uid).forEach(m=>{ (m.items||[]).forEach(it=>{ if((it.text||'').trim()) out.push(it); }); }); return out; },
    personDone(uid){ return this.personItems(uid).filter(i=>i.done).length; },
    personTotal(uid){ return this.personItems(uid).length; },

    localId(p){ return (p||'item')+'_'+Date.now()+'_'+Math.random().toString(36).slice(2,6); },
    ensureBlank(m){ if(!m.items) m.items=[]; if(!m.items.some(i=>!(i.text||'').trim())) m.items.push({ id:this.localId('item'), text:'', done:false }); },

    async addMemo(){ const t=(this.newTitle||'').trim(); if(!t) return; this.newTitle='';
      try{
        const r=await fetch(this.base,{ method:'POST', headers:{'Content-Type':'application/json'}, credentials:'same-origin', body:JSON.stringify({ title:t, date:this.curDate }) });
        const j=await r.json();
        if(j.ok && j.memo){ this.memos.push(j.memo); this.expanded[j.memo.id]=true; this.ensureBlank(j.memo); this.$nextTick(()=>this.focusFirstItem(j.memo.id)); }
      }catch(e){}
    },

    onItemEnter(m, idx){ const cur=m.items[idx]; if(!cur || !(cur.text||'').trim()) return;
      const it={ id:this.localId('item'), text:'', done:false }; m.items.splice(idx+1,0,it);
      this.$nextTick(()=>this.focusItem(m.id,it.id)); this.queueSave(m); },
    onItemBackspace(m, idx, ev){ const cur=m.items[idx];
      if(cur && (cur.text||'')==='' && m.items.length>1){ ev.preventDefault(); const prev=m.items[Math.max(0,idx-1)]; m.items.splice(idx,1); if(prev) this.$nextTick(()=>this.focusItem(m.id,prev.id,true)); this.queueSave(m); } },
    onItemBlur(m, idx){ const cur=m.items[idx]; if(cur && (cur.text||'').trim()==='' && m.items.length>1) m.items.splice(idx,1); this.queueSave(m); },
    onItemInput(m){ this.queueSave(m); },
    toggleItem(m){ this.queueSave(m); },
    renameMemo(m){ this.queueSave(m); },

    queueSave(m){ clearTimeout(this.saveTimers[m.id]); this.saveTimers[m.id]=setTimeout(()=>this.saveMemo(m), 500); },
    async saveMemo(m){ try{ await fetch(this.base+'/'+m.id,{ method:'PUT', headers:{'Content-Type':'application/json'}, credentials:'same-origin', body:JSON.stringify({ title:m.title, items:(m.items||[]).filter(i=>(i.text||'').trim()) }) }); }catch(e){} },
    async delMemo(m){ if(!confirm('이 메모를 삭제할까요?\n'+(m.title||''))) return; try{ await fetch(this.base+'/'+m.id,{ method:'DELETE', credentials:'same-origin' }); this.memos=this.memos.filter(x=>x.id!==m.id); }catch(e){} },

    focusItem(memoId, itemId, toEnd){ const el=document.getElementById('it-'+memoId+'-'+itemId); if(el){ el.focus(); if(toEnd){ const v=el.value; try{ el.setSelectionRange(v.length,v.length); }catch(e){} } } },
    focusFirstItem(memoId){ const m=this.memos.find(x=>x.id===memoId); if(m && m.items && m.items[0]) this.focusItem(memoId, m.items[0].id); },

    // ── AI 정리: 파일 첨부 ──
    onAiFilesPicked(ev){ const fs=Array.from((ev.target&&ev.target.files)||[]); if(!fs.length) return;
      const room=Math.max(0, 5-this.aiFiles.length);
      this.aiFiles=this.aiFiles.concat(fs.slice(0,room));
      if(ev.target) ev.target.value=''; },
    removeAiFile(i){ this.aiFiles.splice(i,1); },
    fileKind(f){ const n=((f&&f.name)||'').toLowerCase(); const t=((f&&f.type)||'').toLowerCase();
      if(t.startsWith('image/')||/\.(jpe?g|png|gif|webp|bmp)$/.test(n)) return 'image';
      if(/\.(xlsx|xlsm|xls|csv)$/.test(n)) return 'excel';
      if(t==='application/pdf'||/\.pdf$/.test(n)) return 'pdf';
      return 'text'; },
    fileIcon(kind){ return kind==='image'?'🖼️':kind==='excel'?'📊':kind==='pdf'?'📄':'📝'; },

    async runAI(){ const t=(this.aiText||'').trim(); const hasFiles=this.aiFiles.length>0;
      if(!t && !hasFiles) return; this.aiBusy=true; this.aiMsg='';
      try{
        let r;
        if(hasFiles){
          const fd=new FormData();
          if(t) fd.append('text', t);
          fd.append('date', this.curDate);
          this.aiFiles.forEach(f=>fd.append('files', f));
          r=await fetch(this.base+'/ingest',{ method:'POST', credentials:'same-origin', body:fd });
        } else {
          r=await fetch(this.base+'/ingest',{ method:'POST', headers:{'Content-Type':'application/json'}, credentials:'same-origin', body:JSON.stringify({ text:t, date:this.curDate }) });
        }
        const j=await r.json();
        if(j.ok && j.memos){ j.memos.forEach(mm=>{ this.memos.push(mm); this.expanded[mm.id]=true; }); this.aiText=''; this.aiFiles=[]; this.aiOpen=false; }
        else { this.aiMsg = j.error || '정리하지 못했어요.'; }
      }catch(e){ this.aiMsg='오류가 났어요. 다시 시도해주세요.'; }
      this.aiBusy=false;
    },

    // ── 업무 전달 ──
    openAssign(p){ this.assign={ open:true, targetUserId:p.userId, targetName:p.name||'', text:'', busy:false, err:'' }; this.$nextTick(()=>{ const el=document.getElementById('assignText'); if(el) el.focus(); }); },
    closeAssign(){ this.assign.open=false; },
    async submitAssign(){ const t=(this.assign.text||'').trim(); if(!t){ this.assign.err='업무 내용을 입력하세요'; return; } this.assign.busy=true; this.assign.err='';
      try{
        const r=await fetch(this.base+'/assign',{ method:'POST', headers:{'Content-Type':'application/json'}, credentials:'same-origin', body:JSON.stringify({ targetUserId:this.assign.targetUserId, text:t, date:this.curDate }) });
        const j=await r.json();
        if(j.ok){ this.assign.open=false; await this.reload(); }
        else { this.assign.err=j.error||'전달하지 못했어요.'; }
      }catch(e){ this.assign.err='오류가 났어요. 다시 시도해주세요.'; }
      this.assign.busy=false;
    },

    // ── 세부내역(detail) + 사진/파일 첨부 ──
    itemDetailBadge(it){ return !!(it && (it.detail||'').trim()); },
    itemAttachCount(it){ return (it && Array.isArray(it.attachmentIds)) ? it.attachmentIds.length : 0; },
    attRawUrl(id){ return this.base+'/attachments/'+id+'/raw'; },
    attInfo(id){ return this.attMeta[id] || null; },
    attIsImage(id){ const a=this.attMeta[id]; return !!(a && a.kind==='image'); },
    attLabel(id){ const a=this.attMeta[id]; return a ? (a.original_name||('첨부 '+id)) : ('첨부 '+id); },

    findMemo(id){ return this.memos.find(x=>x.id===id); },
    findItem(m, itemId){ return m && Array.isArray(m.items) ? m.items.find(i=>i.id===itemId) : null; },

    async loadAttMeta(ids){ const need=(ids||[]).filter(id=>!this.attMeta[id]); if(!need.length) return;
      try{
        const r=await fetch(this.base+'/attachments/meta?ids='+encodeURIComponent(need.join(',')), { credentials:'same-origin' });
        if(!r.ok) return; const j=await r.json();
        if(j && j.ok && Array.isArray(j.attachments)){ j.attachments.forEach(a=>{ if(a && a.id!=null) this.attMeta[a.id]=a; }); }
      }catch(e){}
    },

    openDetail(m, it){
      this.detail={ open:true, memoId:m.id, itemId:it.id, text:(it.detail||''), attachments:(Array.isArray(it.attachmentIds)?it.attachmentIds.slice():[]), busy:false, aiBusy:false, err:'', uploading:false };
      this.loadAttMeta(this.detail.attachments);
    },
    closeDetail(){ this.detail.open=false; },

    async addDetailFiles(ev){ const fs=Array.from((ev.target&&ev.target.files)||[]); if(ev.target) ev.target.value=''; if(!fs.length) return;
      this.detail.uploading=true; this.detail.err='';
      for(const f of fs){
        if(this.detail.attachments.length>=12){ this.detail.err='첨부는 최대 12개까지예요.'; break; }
        try{
          const fd=new FormData(); fd.append('file', f);
          const r=await fetch(this.base+'/attachments',{ method:'POST', credentials:'same-origin', body:fd });
          const j=await r.json();
          if(r.ok && j.ok && j.attachment){ this.attMeta[j.attachment.id]=j.attachment; this.detail.attachments.push(j.attachment.id); }
          else { this.detail.err=j.error||'업로드하지 못했어요.'; }
        }catch(e){ this.detail.err='업로드 중 오류가 났어요.'; }
      }
      this.detail.uploading=false;
    },
    removeDetailAttachment(id){ this.detail.attachments=this.detail.attachments.filter(x=>x!==id); },

    async writeDetailAI(){ const m=this.findMemo(this.detail.memoId); if(!m) return; this.detail.aiBusy=true; this.detail.err='';
      try{
        const r=await fetch(this.base+'/'+this.detail.memoId+'/items/'+this.detail.itemId+'/detail-ai',{ method:'POST', headers:{'Content-Type':'application/json'}, credentials:'same-origin', body:JSON.stringify({ extra:this.clean(this.detail.text,1000) }) });
        const j=await r.json();
        if(r.ok && j.ok && typeof j.detail==='string'){ this.detail.text=j.detail; }
        else { this.detail.err=j.error||'세부내역을 작성하지 못했어요.'; }
      }catch(e){ this.detail.err='오류가 났어요. 다시 시도해주세요.'; }
      this.detail.aiBusy=false;
    },

    saveDetail(){ const m=this.findMemo(this.detail.memoId); if(m){ const it=this.findItem(m, this.detail.itemId);
      if(it){ it.detail=this.clean(this.detail.text,2000); it.attachmentIds=this.detail.attachments.slice(); this.queueSave(m); } }
      this.detail.open=false;
    },
  };
}
</script>
<script src="https://unpkg.com/@alpinejs/collapse@3.x.x/dist/cdn.min.js" defer></script>
<script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
<style>
  :root{ --bg:#f4f5f7; --card:#fff; --line:#e5e7eb; --line2:#d1d5db; --text:#111827; --muted:#6b7280; --hint:#9ca3af; --accent:#4f6ef7; --accent-bg:#eef2ff; --accent-line:#e0e7ff; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; }
  body{ background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","맑은 고딕",sans-serif; font-size:15px; line-height:1.5; }
  [x-cloak]{ display:none !important; }
  .wrap{ max-width:680px; margin:0 auto; padding:14px 14px 90px; }

  .topbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .title{ font-size:20px; font-weight:700; }
  .me{ font-size:13px; color:var(--muted); }

  .datenav{ display:flex; align-items:center; gap:6px; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:6px; margin-bottom:12px; }
  .dbtn{ width:38px; height:38px; border:none; background:transparent; border-radius:9px; font-size:18px; color:var(--text); cursor:pointer; }
  .dbtn:active{ background:#f0f1f3; }
  .dlabel{ flex:1; text-align:center; font-size:15px; font-weight:600; }
  .today{ height:34px; padding:0 12px; border:1px solid var(--line2); background:#fff; border-radius:9px; font-size:13px; color:var(--muted); cursor:pointer; }

  .tabs{ display:flex; gap:4px; background:var(--card); border:1px solid var(--line); border-radius:10px; padding:4px; margin-bottom:14px; }
  .tab{ flex:1; height:36px; border:none; background:transparent; border-radius:7px; font-size:14px; font-weight:600; color:var(--muted); cursor:pointer; }
  .tab.active{ background:var(--accent); color:#fff; }

  .aibtn{ width:100%; display:flex; align-items:center; justify-content:center; gap:8px; height:44px; border:1px dashed var(--accent); background:var(--accent-bg); color:var(--accent); border-radius:12px; font-size:14px; font-weight:600; cursor:pointer; margin-bottom:12px; }
  .aibox{ background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px; margin-bottom:12px; }
  .aibox textarea{ width:100%; border:1px solid var(--line2); border-radius:9px; padding:10px; font:inherit; resize:vertical; }
  .airow{ display:flex; align-items:center; gap:10px; margin-top:8px; }
  .primary{ height:38px; padding:0 16px; border:none; background:var(--accent); color:#fff; border-radius:9px; font-size:14px; font-weight:600; cursor:pointer; }
  .primary:disabled{ opacity:.6; }
  .aimsg{ font-size:13px; color:#b91c1c; }
  .aihint{ font-size:12px; color:var(--hint); margin-top:8px; }

  /* ── 내 할 일: 메모 카드 ── */
  .memo{ background:var(--card); border:1px solid var(--line); border-radius:12px; margin-bottom:10px; overflow:hidden; }
  .mhead{ display:flex; align-items:center; gap:4px; padding:8px 8px 6px; }
  .chevbtn{ width:34px; height:34px; border:none; background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; flex:none; }
  .chev{ display:inline-block; transition:transform .15s; color:var(--hint); font-size:12px; }
  .chev.open{ transform:rotate(90deg); }
  .mtitle{ flex:1; border:none; background:transparent; font:inherit; font-size:15px; font-weight:600; color:var(--text); padding:6px 2px; min-width:0; }
  .mtitle:focus{ outline:none; }
  .prog{ flex:none; font-size:12px; color:var(--muted); background:#f3f4f6; border-radius:8px; padding:3px 9px; }
  .ai-tag{ flex:none; font-size:11px; color:var(--accent); background:var(--accent-bg); border-radius:7px; padding:2px 7px; margin-left:4px; }
  .overdue{ flex:none; font-size:11px; color:#b45309; background:#fef3c7; border-radius:7px; padding:2px 7px; margin-left:4px; white-space:nowrap; }
  .bar{ height:5px; border-radius:999px; background:#eef0f3; margin:0 14px 8px 42px; overflow:hidden; }
  .barfill{ height:100%; background:var(--accent); border-radius:999px; transition:width .2s; }

  .mbody{ padding:0 12px 12px 42px; }
  .item{ display:flex; align-items:center; gap:10px; padding:3px 0; }
  .cbx{ width:20px; height:20px; flex:none; accent-color:var(--accent); cursor:pointer; }
  .itxt{ flex:1; border:none; background:transparent; font:inherit; font-size:14px; color:var(--text); padding:5px 2px; min-width:0; }
  .itxt:focus{ outline:none; }
  .itxt.done{ color:var(--hint); text-decoration:line-through; }
  .atag{ flex:none; font-size:10px; font-weight:700; color:#4338CA; background:#EEF2FF; padding:2px 7px; border-radius:8px; white-space:nowrap; }
  .memofoot{ margin-top:6px; }
  .delmemo{ border:none; background:transparent; color:var(--hint); font-size:12px; cursor:pointer; padding:4px 2px; }

  .newmemo{ display:flex; align-items:center; gap:8px; background:var(--card); border:1px dashed var(--line2); border-radius:12px; padding:10px 14px; margin-top:4px; }
  .newmemo .plus{ color:var(--hint); font-size:18px; flex:none; }
  .newmemo input{ flex:1; border:none; background:transparent; font:inherit; font-size:14px; padding:4px 0; min-width:0; }
  .newmemo input:focus{ outline:none; }

  /* ── 팀/전체 보기: 출퇴근 기록부 카드식 ── */
  .pcard{ background:var(--card); border:1px solid #e2e6ee; border-radius:10px; overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.04); margin-bottom:10px; }
  .pcard-head{ display:flex; align-items:center; gap:7px; padding:9px 12px; background:var(--accent-bg); border-bottom:1.5px solid var(--accent-line); }
  .pname{ font-size:14px; font-weight:700; color:#1e293b; }
  .pdept{ font-size:11px; color:#8b95a5; }
  .spacer{ flex:1; }
  .pprog{ font-size:11px; font-weight:700; color:#475569; background:#fff; border:1px solid var(--accent-line); padding:2px 8px; border-radius:8px; white-space:nowrap; }
  .pprog.done{ color:#16a34a; background:#f0fdf4; border-color:#bbf7d0; }
  .assignbtn{ display:flex; align-items:center; gap:4px; font-size:11px; font-weight:600; color:#fff; background:var(--accent); border:none; border-radius:8px; padding:5px 10px; cursor:pointer; white-space:nowrap; }
  .pbody{ padding:7px 12px 9px; }
  .roitem{ display:flex; align-items:center; gap:10px; padding:5px 0; border-bottom:1px solid #f3f4f6; }
  .roitem:last-child{ border-bottom:none; }
  .cbx-ro{ width:18px; height:18px; flex:none; border:1.5px solid var(--line2); border-radius:5px; position:relative; }
  .cbx-ro.on{ background:#16a34a; border-color:#16a34a; }
  .cbx-ro.on::after{ content:"✓"; color:#fff; font-size:12px; position:absolute; left:2px; top:-2px; }
  .rotext{ flex:1; font-size:14px; color:#1f2937; }
  .rotext.done{ color:var(--hint); text-decoration:line-through; }
  .pempty{ font-size:13px; color:var(--hint); padding:4px 2px; }

  .gate, .loading{ text-align:center; color:var(--muted); padding:60px 20px; }
  .gate a{ color:var(--accent); font-weight:600; text-decoration:none; }
  .hint{ font-size:12px; color:var(--hint); text-align:center; margin-top:14px; line-height:1.6; }

  /* ── 업무 전달 모달 ── */
  .modal-ov{ position:fixed; inset:0; background:rgba(17,24,39,.45); display:flex; align-items:flex-end; justify-content:center; z-index:50; padding:0; }
  .modal{ background:#fff; width:100%; max-width:520px; border-radius:16px 16px 0 0; padding:16px 16px 20px; }
  @media(min-width:560px){ .modal-ov{ align-items:center; } .modal{ border-radius:16px; } }
  .modal-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .modal-head b{ font-size:16px; }
  .modal-x{ border:none; background:transparent; font-size:20px; color:var(--muted); cursor:pointer; }
  .modal textarea{ width:100%; border:1px solid var(--line2); border-radius:10px; padding:11px; font:inherit; font-size:15px; resize:vertical; min-height:80px; }
  .modal-sub{ font-size:12px; color:var(--hint); margin:8px 0 0; }
  .modal-err{ font-size:13px; color:#b91c1c; margin-top:8px; min-height:18px; }
  .modal-foot{ display:flex; gap:8px; justify-content:flex-end; margin-top:12px; }
  .btn{ height:40px; padding:0 16px; border:1px solid var(--line2); background:#fff; border-radius:10px; font-size:14px; font-weight:600; color:var(--text); cursor:pointer; }

  /* ── 파일 첨부 (AI 정리 + 세부내역 공용) ── */
  .filerow{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-top:8px; }
  .filebtn{ display:inline-flex; align-items:center; gap:6px; height:34px; padding:0 12px; border:1px solid var(--accent-line); background:var(--accent-bg); color:var(--accent); border-radius:9px; font-size:13px; font-weight:600; cursor:pointer; }
  .filebtn.busy{ opacity:.6; pointer-events:none; }
  .filehint{ font-size:12px; color:var(--hint); }
  .chips{ display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
  .chip{ display:inline-flex; align-items:center; gap:5px; max-width:100%; background:#f3f4f6; border:1px solid var(--line); border-radius:8px; padding:4px 6px 4px 9px; font-size:12px; color:var(--text); }
  .chip-name{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:160px; }
  .chip-x{ border:none; background:transparent; color:var(--hint); cursor:pointer; font-size:12px; padding:0 2px; }

  /* ── 아이템 세부내역 버튼 ── */
  .detailbtn{ flex:none; display:inline-flex; align-items:center; gap:2px; border:none; background:transparent; cursor:pointer; font-size:13px; color:var(--muted); padding:3px 4px; border-radius:7px; position:relative; }
  .detailbtn:active{ background:#f0f1f3; }
  .detailbtn .dot{ width:6px; height:6px; border-radius:50%; background:var(--accent); display:inline-block; }
  .detailbtn .clip{ font-size:11px; color:var(--accent); }

  /* ── 세부내역 첨부 영역 ── */
  .d-attach{ margin-top:10px; }
  .d-attach-grid{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:8px; }
  .d-att{ position:relative; }
  .d-att-link{ display:block; text-decoration:none; color:var(--text); }
  .d-att-thumb{ width:72px; height:72px; object-fit:cover; border-radius:9px; border:1px solid var(--line); display:block; background:#f3f4f6; }
  .d-att-file{ display:inline-flex; align-items:center; gap:6px; max-width:180px; height:36px; padding:0 10px; background:#f3f4f6; border:1px solid var(--line); border-radius:9px; font-size:12px; }
  .d-att-name{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .d-att-x{ position:absolute; top:-6px; right:-6px; width:20px; height:20px; border-radius:50%; border:none; background:#111827; color:#fff; font-size:11px; cursor:pointer; display:flex; align-items:center; justify-content:center; line-height:1; }
  .ai-mini{ display:inline-flex; align-items:center; gap:5px; height:34px; padding:0 12px; border:1px solid var(--accent); background:#fff; color:var(--accent); border-radius:9px; font-size:13px; font-weight:600; cursor:pointer; }
  .ai-mini:disabled{ opacity:.6; }
</style>
</head>
<body x-data="todosApp()" x-init="init()">
  <div class="wrap">

    <div class="topbar">
      <span class="title">할 일</span>
      <span class="me" x-show="!gate && viewer.name" x-text="viewer.name+'님'"></span>
    </div>

    <div class="gate" x-show="gate" x-cloak>
      로그인이 필요합니다.<br><br>
      <a href="/">ERP로 이동해서 로그인하기 →</a>
    </div>

    <template x-if="!gate">
      <div>
        <div class="datenav">
          <button class="dbtn" @click="shiftDate(-1)" aria-label="이전 날">‹</button>
          <span class="dlabel" x-text="fmtDate(curDate)"></span>
          <button class="dbtn" @click="shiftDate(1)" aria-label="다음 날">›</button>
          <button class="today" @click="goToday()">오늘</button>
        </div>

        <div class="tabs" x-show="viewer.canSeeTeam" x-cloak>
          <button class="tab" :class="tab==='mine'?'active':''" @click="switchTab('mine')">내 할일</button>
          <button class="tab" :class="tab==='team'?'active':''" @click="switchTab('team')" x-text="viewer.isAdmin ? '전체 보기' : '팀 보기'"></button>
        </div>

        <div class="loading" x-show="loading" x-cloak>불러오는 중…</div>

        <!-- ───────── 내 할일 ───────── -->
        <div x-show="!loading && tab==='mine'" x-cloak>
          <button class="aibtn" @click="aiOpen=!aiOpen"><i class="ti ti-clipboard-text" style="font-size:18px;" aria-hidden="true"></i> 카톡·메모 붙여넣고 AI로 정리</button>
          <div class="aibox" x-show="aiOpen" x-collapse>
            <textarea x-model="aiText" rows="5" placeholder="카톡이나 메모 내용을 그대로 붙여넣으세요. 사진·엑셀·PDF·텍스트 파일도 첨부하면 AI가 읽어서 할 일로 정리해 드려요."></textarea>
            <div class="filerow">
              <label class="filebtn">
                <i class="ti ti-paperclip" style="font-size:15px;" aria-hidden="true"></i> 파일 첨부
                <input type="file" x-ref="aiFiles" multiple accept="image/*,.xlsx,.xls,.csv,.pdf,.txt,.md,.json,.log" @change="onAiFilesPicked($event)" style="display:none">
              </label>
              <span class="filehint">사진·엑셀·PDF·텍스트 · 최대 5개</span>
            </div>
            <div class="chips" x-show="aiFiles.length">
              <template x-for="(f, i) in aiFiles" :key="i">
                <span class="chip"><span x-text="fileIcon(fileKind(f))"></span> <span class="chip-name" x-text="f.name"></span><button class="chip-x" @click="removeAiFile(i)" aria-label="제거">✕</button></span>
              </template>
            </div>
            <div class="airow">
              <button class="primary" @click="runAI()" :disabled="aiBusy" x-text="aiBusy ? '정리 중…' : 'AI로 정리'"></button>
              <span class="aimsg" x-text="aiMsg"></span>
            </div>
          </div>

          <template x-for="m in memos" :key="m.id">
            <div class="memo">
              <div class="mhead">
                <button class="chevbtn" @click="toggle(m.id)" :aria-label="isExpanded(m.id)?'접기':'펼치기'"><span class="chev" :class="isExpanded(m.id)?'open':''">▶</span></button>
                <input class="mtitle" x-model="m.title" @input="renameMemo(m)" @focus="expanded[m.id]=true" @keydown.enter="$event.target.blur()" placeholder="메모 제목">
                <span class="overdue" x-show="carried(m)" x-text="carriedLabel(m)"></span>
                <span class="ai-tag" x-show="m.source==='ai'">AI</span>
                <span class="ai-tag" style="color:#4338CA;background:#EEF2FF;" x-show="m.source==='assigned'">전달받음</span>
                <span class="prog" x-text="progress(m)"></span>
              </div>
              <div class="bar" x-show="isExpanded(m.id) && countItems(m).length"><div class="barfill" :style="'width:'+pct(m)+'%'"></div></div>
              <div class="mbody" x-show="isExpanded(m.id)" x-collapse>
                <template x-for="(it, idx) in m.items" :key="it.id">
                  <div class="item">
                    <input type="checkbox" class="cbx" x-model="it.done" @change="toggleItem(m)">
                    <input class="itxt" :class="it.done?'done':''" :id="'it-'+m.id+'-'+it.id" x-model="it.text"
                      @input="onItemInput(m)" @keydown.enter.prevent="onItemEnter(m, idx)"
                      @keydown.backspace="onItemBackspace(m, idx, $event)" @blur="onItemBlur(m, idx)"
                      placeholder="할 일 적고 엔터…">
                    <span class="atag" x-show="it.source==='assigned'" x-text="assignedTag(it)"></span>
                    <button class="detailbtn" x-show="(it.text||'').trim()" @click="openDetail(m, it)" aria-label="세부내역">
                      <span x-show="itemDetailBadge(it)" class="dot"></span>📝<span class="clip" x-show="itemAttachCount(it)>0" x-text="'📎'+itemAttachCount(it)"></span>
                    </button>
                  </div>
                </template>
                <div class="memofoot">
                  <button class="delmemo" @click="delMemo(m)">메모 삭제</button>
                </div>
              </div>
            </div>
          </template>

          <div class="newmemo">
            <span class="plus">＋</span>
            <input x-model="newTitle" @keydown.enter="addMemo()" placeholder="새 메모 제목 적고 엔터… (예: 포스코 자재)">
          </div>
          <p class="hint">메모를 누르면 안에 할 일을 적을 수 있어요. 엔터로 줄 추가, 체크로 지우기.<br>안 끝낸 메모는 다음 날 오늘로 자동으로 따라옵니다.</p>
        </div>

        <!-- ───────── 팀 / 전체 보기 (출퇴근 기록부 카드식) ───────── -->
        <div x-show="!loading && tab==='team'" x-cloak>
          <template x-for="p in people" :key="p.userId">
            <div class="pcard">
              <div class="pcard-head">
                <span class="pname" x-text="p.name"></span>
                <span class="pdept" x-text="p.deptName"></span>
                <span class="spacer"></span>
                <span class="pprog" :class="personTotal(p.userId)>0 && personDone(p.userId)===personTotal(p.userId) ? 'done' : ''"
                      x-text="personDone(p.userId)+' / '+personTotal(p.userId)+(personTotal(p.userId)>0 && personDone(p.userId)===personTotal(p.userId)?' 완료':'')"></span>
                <button class="assignbtn" @click="openAssign(p)"><i class="ti ti-send" style="font-size:13px;" aria-hidden="true"></i> 업무 전달</button>
              </div>
              <div class="pbody">
                <template x-if="personTotal(p.userId)===0">
                  <div class="pempty">아직 등록된 할 일이 없어요.</div>
                </template>
                <template x-for="(it,ii) in personItems(p.userId)" :key="p.userId+'_'+ii">
                  <div class="roitem">
                    <span class="cbx-ro" :class="it.done?'on':''"></span>
                    <span class="rotext" :class="it.done?'done':''" x-text="it.text"></span>
                    <span class="atag" x-show="it.source==='assigned'" x-text="assignedTag(it)"></span>
                  </div>
                </template>
              </div>
            </div>
          </template>
          <p class="hint" x-show="people.length===0">표시할 사람이 없어요.</p>
          <p class="hint" x-show="people.length>0">사람마다 <b>업무 전달</b>을 누르면 그 직원 '내 할 일'에 전달돼요. 완료 체크는 본인이 합니다.</p>
        </div>
      </div>
    </template>
  </div>

  <!-- 업무 전달 모달 -->
  <div class="modal-ov" x-show="assign.open" x-cloak @click.self="closeAssign()">
    <div class="modal">
      <div class="modal-head">
        <b x-text="(assign.targetName||'')+'님에게 업무 전달'"></b>
        <button class="modal-x" @click="closeAssign()" aria-label="닫기">✕</button>
      </div>
      <textarea id="assignText" x-model="assign.text" placeholder="전달할 업무를 한 줄로 적으세요. 예: 포스코 H빔 5본 픽업" @keydown.enter.meta="submitAssign()"></textarea>
      <p class="modal-sub" x-text="fmtDate(curDate)+' 날짜로 전달됩니다.'"></p>
      <div class="modal-err" x-text="assign.err"></div>
      <div class="modal-foot">
        <button class="btn" @click="closeAssign()">취소</button>
        <button class="primary" @click="submitAssign()" :disabled="assign.busy" x-text="assign.busy ? '전달 중…' : '전달'"></button>
      </div>
    </div>
  </div>

  <!-- 세부내역 모달 -->
  <div class="modal-ov" x-show="detail.open" x-cloak @click.self="closeDetail()">
    <div class="modal">
      <div class="modal-head">
        <b>세부내역</b>
        <button class="modal-x" @click="closeDetail()" aria-label="닫기">✕</button>
      </div>
      <textarea x-model="detail.text" placeholder="이 할 일의 세부내역을 적으세요. (준비물·연락처·수량·기한 등)"></textarea>

      <div class="d-attach">
        <div class="d-attach-grid" x-show="detail.attachments.length">
          <template x-for="id in detail.attachments" :key="id">
            <div class="d-att">
              <a class="d-att-link" :href="attRawUrl(id)" target="_blank" rel="noopener" :title="attLabel(id)">
                <template x-if="attIsImage(id)">
                  <img class="d-att-thumb" :src="attRawUrl(id)" alt="">
                </template>
                <template x-if="!attIsImage(id)">
                  <span class="d-att-file"><span x-text="fileIcon(attInfo(id)?attInfo(id).kind:'text')"></span><span class="d-att-name" x-text="attLabel(id)"></span></span>
                </template>
              </a>
              <button class="d-att-x" @click="removeDetailAttachment(id)" aria-label="첨부 제거">✕</button>
            </div>
          </template>
        </div>
        <div class="filerow">
          <label class="filebtn" :class="detail.uploading?'busy':''">
            <i class="ti ti-camera-plus" style="font-size:15px;" aria-hidden="true"></i>
            <span x-text="detail.uploading ? '올리는 중…' : '사진·파일 추가'"></span>
            <input type="file" multiple accept="image/*,.xlsx,.xls,.csv,.pdf,.txt,.md,.json,.log" @change="addDetailFiles($event)" :disabled="detail.uploading" style="display:none">
          </label>
          <button class="ai-mini" @click="writeDetailAI()" :disabled="detail.aiBusy">
            <i class="ti ti-sparkles" style="font-size:14px;" aria-hidden="true"></i>
            <span x-text="detail.aiBusy ? '작성 중…' : 'AI로 상세 작성'"></span>
          </button>
        </div>
      </div>

      <div class="modal-err" x-text="detail.err"></div>
      <div class="modal-foot">
        <button class="btn" @click="closeDetail()">취소</button>
        <button class="primary" @click="saveDetail()">저장</button>
      </div>
    </div>
  </div>
</body>
</html>
