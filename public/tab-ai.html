<!-- tab-ai.html — AI 전용 탭 (Claude.ai 스타일) -->
<!-- 좌측: 프로젝트/스레드 목록 + 검색 / 우측: 대화창 + 이미지 생성 -->
<div>
<style>
  .ai-app { display:flex; height:calc(100vh - var(--header-h) - 2px); background:#f8f9fb; overflow:hidden; }

  /* ── 좌측 사이드바 ── */
  .ai-side { width:260px; background:#fff; border-right:1px solid #e5e7eb; display:flex; flex-direction:column; flex-shrink:0; }
  .ai-side-head { padding:10px 12px 8px; border-bottom:1px solid #f0f1f3; }
  .ai-side-title { font-family:'Work Sans',sans-serif; font-size:13px; font-weight:700; color:#1a1d23; display:flex; align-items:center; gap:5px; }
  .ai-new-btn { margin-top:10px; width:100%; padding:9px 12px; border-radius:10px; background:linear-gradient(135deg,#4f6ef7,#7c3aed); color:#fff; border:none; font-size:12.5px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; box-shadow:0 1px 3px rgba(79,110,247,.25); transition:all .15s; }
  .ai-new-btn:hover { filter:brightness(1.06); transform:translateY(-1px); box-shadow:0 3px 10px rgba(79,110,247,.3); }
  .ai-side-search { width:100%; margin-top:6px; padding:4px 8px; border:1px solid #e5e7eb; border-radius:6px; font-size:11.5px; background:#f8f9fb; outline:none; min-height:26px; }
  .ai-side-search:focus { border-color:#4f6ef7; background:#fff; }

  .ai-scope-row { display:flex; flex-wrap:wrap; gap:3px; padding:6px 10px 4px; border-bottom:1px dashed #f0f1f3; }
  .ai-scope-chip { font-size:10px; padding:2px 8px; border:1px solid #e5e7eb; border-radius:99px; background:#fff; cursor:pointer; color:#6b7280; transition:all .12s; white-space:nowrap; font-weight:500; }
  .ai-scope-chip:hover { background:#f8f9fb; }
  .ai-scope-chip.active { background:#eef2ff; color:#4338ca; border-color:#c7d2fe; font-weight:600; }

  .ai-side-list { flex:1; overflow-y:auto; padding:4px 6px; }
  .ai-list-group { color:#9ca3af; font-size:9.5px; font-weight:700; padding:6px 6px 2px; text-transform:uppercase; letter-spacing:0.5px; display:flex; align-items:center; justify-content:space-between; }
  .ai-list-group .ghost-btn { background:none; border:none; color:#9ca3af; cursor:pointer; font-size:12px; padding:0 3px; border-radius:3px; }
  .ai-list-group .ghost-btn:hover { color:#4338ca; background:#eef2ff; }

  /* 워크스페이스 사이드바와 동일한 밀도로 컴팩트화 */
  .ai-thread-item { display:flex; align-items:center; gap:5px; padding:2px 6px; border-radius:5px; cursor:pointer; transition:all .12s; min-height:22px; }
  .ai-thread-item:hover { background:#f3f4f6; }
  .ai-thread-item.active { background:#eef2ff; }
  .ai-thread-item .icon { font-size:11px; flex-shrink:0; width:14px; text-align:center; }
  .ai-thread-item .info { flex:1; min-width:0; display:flex; flex-direction:column; gap:0; }
  .ai-thread-item .title { color:#374151; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:500; font-size:11.5px; line-height:1.3; }
  .ai-thread-item .meta { font-size:9.5px; color:#9ca3af; line-height:1.2; display:none; }
  .ai-thread-item.active .title { color:#4338ca; font-weight:600; }
  .ai-thread-item .scope-badge { font-size:8.5px; padding:0 4px; border-radius:99px; background:#f3f4f6; color:#6b7280; flex-shrink:0; }
  .ai-thread-item .scope-badge.team { background:#fef3c7; color:#92400e; }
  .ai-thread-item .scope-badge.company { background:#dcfce7; color:#15803d; }
  .ai-thread-item .scope-badge.invited { background:#fce7f3; color:#a21caf; }

  /* 프로젝트 항목도 동일 밀도 */
  .ai-proj-item { display:flex; align-items:center; gap:5px; padding:2px 6px; border-radius:5px; cursor:pointer; transition:all .12s; min-height:22px; }
  .ai-proj-item:hover { background:#f3f4f6; }
  .ai-proj-item.active { background:#eef2ff; }
  .ai-proj-item .em { font-size:12px; flex-shrink:0; width:14px; text-align:center; }
  .ai-proj-item .info { flex:1; min-width:0; }
  .ai-proj-item .n { color:#374151; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:500; font-size:11.5px; line-height:1.3; }
  .ai-proj-item .s { font-size:9.5px; color:#9ca3af; display:none; }
  .ai-proj-item .badge { font-size:8.5px; padding:0 4px; border-radius:99px; background:#f3f4f6; color:#6b7280; }
  .ai-proj-item .badge.team { background:#fef3c7; color:#92400e; }
  .ai-proj-item .badge.company { background:#dcfce7; color:#15803d; }
  .ai-proj-item .badge.invited { background:#fce7f3; color:#a21caf; }

  .ai-empty { padding:14px 8px; text-align:center; color:#9ca3af; font-size:10.5px; }
  .ai-load-more { width:100%; padding:7px; background:#fff; border:1px dashed #e5e7eb; border-radius:8px; font-size:11px; color:#6b7280; cursor:pointer; margin-top:4px; }
  .ai-load-more:hover { background:#f8f9fb; color:#4338ca; border-color:#c7d2fe; }

  /* ── 우측 메인 대화창 ── */
  .ai-main { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }
  .ai-main-head { padding:12px 20px; background:#fff; border-bottom:1px solid #f0f1f3; display:flex; align-items:center; gap:10px; flex-shrink:0; }
  .ai-main-head .emj { font-size:20px; }
  .ai-main-head .titles { flex:1; min-width:0; }
  .ai-main-head .t { font-family:'Work Sans',sans-serif; font-size:14px; font-weight:700; color:#1a1d23; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ai-main-head .s { font-size:11px; color:#9ca3af; }
  .ai-main-head .actions { display:flex; gap:6px; align-items:center; }
  .ai-main-head button { background:#fff; border:1px solid #e5e7eb; border-radius:8px; padding:5px 10px; font-size:11.5px; color:#6b7280; cursor:pointer; display:inline-flex; align-items:center; gap:4px; }
  .ai-main-head button:hover { background:#f8f9fb; color:#4338ca; border-color:#c7d2fe; }
  .ai-main-head button.primary { background:linear-gradient(135deg,#4f6ef7,#3b5ce4); color:#fff; border-color:transparent; }
  .ai-main-head button.primary:hover { filter:brightness(1.06); color:#fff; }

  .ai-body { flex:1; overflow-y:auto; padding:20px 24px 120px; }
  .ai-body-inner { max-width:760px; margin:0 auto; display:flex; flex-direction:column; gap:14px; }

  /* 메시지 버블 */
  .ai-msg { display:flex; gap:10px; align-items:flex-start; }
  .ai-msg.user { flex-direction:row-reverse; }
  .ai-msg .avatar { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
  .ai-msg.user .avatar { background:#e0e7ff; color:#4338ca; font-weight:700; }
  .ai-msg.ai .avatar { background:linear-gradient(135deg,#4f6ef7,#7c3aed); color:#fff; }
  /* 메시지 행 — 바깥 컨테이너 (인라인 flex:1 이김!important).
     :not(.avatar) 로 아바타 제외 — 아바타는 자체 flex-shrink:0 유지해야 함 */
  .ai-msg.ai > div:not(.avatar),
  .ai-msg.user > div:not(.avatar) {
    flex: 0 1 auto !important;
    min-width: 0;
    max-width: calc(100% - 50px);
    align-self: flex-start !important;
    height: auto !important;
    min-height: 0 !important;
  }
  .ai-msg.user > div { text-align: right; }
  .ai-msg.ai > div { text-align: left; }

  /* 버블 — Claude.ai 스타일, 내용 정확히만 차지 */
  .ai-msg .bubble {
    padding: 7px 14px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.5;
    word-break: break-word;
    display: inline-block;
    text-align: left;
    max-width: 100%;
    height: auto !important;
    min-height: 0 !important;
    max-height: none !important;
    /* ⚠ 핵심: bubble 은 normal — <template> 사이 들여쓰기 공백/개행 무시.
       텍스트 div 안에서만 pre-wrap 으로 사용자가 입력한 줄바꿈 보존 */
    white-space: normal;
  }
  /* 실제 텍스트 컨테이너는 pre-wrap — 코드/사용자 줄바꿈 보존 */
  .ai-msg .bubble > div { white-space: pre-wrap; }
  /* template 자체는 무조건 invisible (브라우저 기본이지만 안전망) */
  .ai-msg .bubble > template { display: none; }
  .ai-msg.user .bubble {
    background: #f3f4f6;
    color: #1f2937;
    border-top-right-radius: 4px;
  }
  .ai-msg.ai .bubble {
    background: transparent;
    color: #1f2937;
    padding: 0 4px;        /* AI 응답은 배경 없이 텍스트만 — Claude.ai 스타일 */
    border: none;
    border-radius: 0;
  }
  /* AI 메시지 중 이미지/업스케일/에이전트 등 큰 컨텐츠는 카드 스타일로 복구 */
  .ai-msg.ai .bubble:has(img.ai-img),
  .ai-msg.ai .bubble:has(.ai-upscale-bar),
  .ai-msg.ai .bubble:has(.ai-artifacts),
  .ai-msg.ai .bubble:has(details) {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 14px;
    padding: 12px 14px;
  }
  /* 에러 상태 */
  .ai-msg.ai.error .bubble {
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: #b91c1c;
    padding: 10px 14px;
    border-radius: 12px;
  }
  /* 메시지 행 자체 — flex-start 강제 */
  .ai-msg { align-items: flex-start; }
  .ai-msg.ai.error .bubble { background:#fef2f2; border-color:#fecaca; color:#b91c1c; }
  /* 시스템 에러 배너 (AI 답변이 아닌 서버 에러 전용) */
  .ai-system-error { display:flex; align-items:flex-start; gap:10px; margin:12px auto; padding:12px 14px; max-width:560px; background:#fef2f2; border:1px solid #fecaca; border-radius:12px; box-shadow:0 1px 3px rgba(220,38,38,0.08); }
  /* AI 가 생성한 파일 (엑셀/PDF 등) */
  .ai-artifacts { display:flex; flex-direction:column; gap:6px; margin-top:10px; }
  .ai-artifact { display:flex; align-items:center; gap:10px; padding:8px 12px; background:#fff; border:1px solid #e5e7eb; border-radius:10px; text-decoration:none; color:inherit; transition:all 0.15s; cursor:pointer; }
  .ai-artifact:hover { background:#f9fafb; border-color:#4f6ef7; box-shadow:0 2px 6px rgba(79,110,247,0.1); }
  .ai-artifact-icon { font-size:22px; flex-shrink:0; }
  .ai-artifact-body { flex:1; min-width:0; }
  .ai-artifact-name { font-size:13px; font-weight:600; color:#1f2937; word-break:break-all; }
  .ai-svg-thumb { background:#fff; border:1px solid #e5e7eb; border-radius:8px; overflow:hidden; margin-bottom:6px; cursor:pointer; min-height:120px; display:flex; align-items:center; justify-content:center; }
  .ai-svg-thumb img { width:100%; max-height:360px; display:block; object-fit:contain; background:#fff; }
  .ai-svg-thumb.load-error::before { content:'SVG 미리보기를 열 수 없습니다. 클릭해서 패널에서 확인하세요.'; color:#9ca3af; font-size:12px; padding:24px; text-align:center; }
  /* 엑셀 미리보기 (SheetJS sheet_to_html 결과) */
  .xlsx-preview table { border-collapse:collapse; width:100%; font-size:11.5px; }
  .xlsx-preview th, .xlsx-preview td { border:1px solid #e5e7eb; padding:4px 8px; min-width:60px; vertical-align:top; }
  .xlsx-preview tr:first-child th, .xlsx-preview tr:first-child td { background:#f3f4f6; font-weight:600; position:sticky; top:0; }
  .xlsx-preview td:empty::before { content:'\00a0'; }
  .ai-artifact-meta { font-size:10px; color:#9ca3af; margin-top:2px; }
  .ai-artifact-dl { font-size:16px; color:#4f6ef7; flex-shrink:0; text-decoration:none; }
  .ai-preview-backdrop { position:fixed; inset:0; z-index:1000; background:rgba(15,23,42,0.18); display:flex; justify-content:flex-end; }
  .ai-preview-panel { width:min(720px, 42vw); min-width:520px; height:100%; background:#fff; box-shadow:-18px 0 38px rgba(15,23,42,.18); display:flex; flex-direction:column; border-left:1px solid #e5e7eb; }
  .ai-preview-head { height:56px; padding:10px 14px; border-bottom:1px solid #e5e7eb; display:flex; align-items:center; gap:10px; flex-shrink:0; }
  .ai-preview-title { flex:1; min-width:0; }
  .ai-preview-title .name { font-size:13px; font-weight:700; color:#1f2937; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ai-preview-title .meta { font-size:10.5px; color:#9ca3af; margin-top:2px; }
  .ai-preview-action { padding:6px 10px; border-radius:6px; border:1px solid #dbe2f0; background:#fff; color:#4f6ef7; font-size:12px; font-weight:600; text-decoration:none; cursor:pointer; }
  .ai-preview-action.primary { background:#4f6ef7; color:#fff; border-color:#4f6ef7; }
  .ai-preview-close { width:32px; height:32px; border:0; background:#f3f4f6; color:#6b7280; border-radius:6px; cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center; }
  .ai-preview-body { flex:1; min-height:0; overflow:auto; background:#f8fafc; }
  .ai-preview-canvas { min-height:100%; padding:18px; display:flex; align-items:center; justify-content:center; }
  .ai-preview-canvas img { max-width:100%; max-height:calc(100vh - 110px); object-fit:contain; background:#fff; border:1px solid #e5e7eb; border-radius:8px; box-shadow:0 1px 5px rgba(15,23,42,.06); }
  .ai-preview-error { max-width:420px; color:#6b7280; font-size:13px; line-height:1.55; text-align:center; background:#fff; border:1px dashed #cbd5e1; border-radius:8px; padding:22px; }
  @media (max-width: 980px) {
    .ai-preview-panel { width:100vw; min-width:0; }
  }
  /* 모델 선택 드롭다운 */
  .ai-model-picker { display:inline-flex; align-items:center; gap:6px; padding:4px 10px; background:#fff; border:1px solid #e5e7eb; border-radius:20px; cursor:pointer; font-size:11px; color:#4b5563; user-select:none; }
  .ai-model-picker:hover { background:#f9fafb; border-color:#4f6ef7; }
  .ai-model-picker.active { background:#eff6ff; border-color:#4f6ef7; color:#1d4ed8; }
  .ai-msg .meta { font-size:10px; color:#9ca3af; margin-top:3px; }
  .ai-msg.user .meta { text-align:right; }
  .ai-msg .bubble img.ai-img { max-width:100%; border-radius:8px; margin-top:6px; display:block; }
  .ai-msg .bubble .atts { display:flex; flex-wrap:wrap; gap:4px; margin-top:6px; }
  .ai-msg .bubble .atts .att { font-size:10.5px; padding:3px 8px; background:#f3f4f6; border-radius:99px; color:#4b5563; display:inline-flex; align-items:center; gap:3px; }
  .ai-msg.user .bubble .atts .att { background:#fff; }

  /* 로딩 애니메이션 */
  .ai-msg.thinking .bubble { color:#4f6ef7; animation:aiPulse 1.4s ease-in-out infinite; }
  @keyframes aiPulse { 0%,100%{opacity:.55} 50%{opacity:1} }

  /* 빈 상태 (스레드 없음) */
  .ai-welcome { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:#6b7280; text-align:center; padding:40px 20px; }
  .ai-welcome-icon { font-size:56px; margin-bottom:16px; }
  .ai-welcome-title { font-family:'Work Sans',sans-serif; font-size:22px; font-weight:700; color:#1a1d23; margin-bottom:8px; }
  .ai-welcome-desc { font-size:13.5px; color:#6b7280; max-width:480px; line-height:1.7; margin-bottom:20px; }
  .ai-welcome-suggests { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:10px; max-width:560px; width:100%; margin-top:8px; }
  .ai-welcome-sugg { padding:12px 14px; background:#fff; border:1px solid #e5e7eb; border-radius:12px; font-size:12.5px; color:#374151; cursor:pointer; text-align:left; transition:all .15s; }
  .ai-welcome-sugg:hover { border-color:#c7d2fe; background:#eef2ff; color:#4338ca; transform:translateY(-1px); box-shadow:0 2px 8px rgba(79,110,247,.1); }

  /* ── 업스케일 컨트롤 ── */
  /* ── 이미지 호버 액션 (우하단) ── */
  .ai-img-wrap { position: relative; display: inline-block; max-width: 100%; }
  .ai-img-wrap .ai-img-actions {
    position: absolute;
    right: 8px;
    bottom: 12px;
    display: flex;
    gap: 6px;
    opacity: 0;
    transition: opacity 0.18s ease;
    pointer-events: none;
  }
  .ai-img-wrap:hover .ai-img-actions { opacity: 1; pointer-events: auto; }
  .ai-img-action-btn {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: rgba(15, 23, 42, 0.85);
    color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.15);
    cursor: pointer;
    font-size: 15px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.12s;
    backdrop-filter: blur(6px);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
  }
  .ai-img-action-btn:hover {
    background: rgba(15, 23, 42, 0.98);
    transform: scale(1.06);
  }
  .ai-img-action-btn:active { transform: scale(0.95); }

  /* ── 업스케일 모달 ── */
  .upscale-modal {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.55);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(2px);
  }
  .upscale-modal-card {
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    width: 100%;
    max-width: 720px;
    max-height: 90vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .upscale-modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid #e5e7eb;
    background: linear-gradient(135deg, #f8fafc, #fff);
  }
  .upscale-modal-header h2 {
    font-size: 14px;
    font-weight: 700;
    color: #1f2937;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .upscale-modal-close {
    background: transparent;
    border: none;
    width: 28px;
    height: 28px;
    border-radius: 6px;
    cursor: pointer;
    color: #6b7280;
    font-size: 14px;
  }
  .upscale-modal-close:hover { background: #f3f4f6; color: #1f2937; }
  .upscale-modal-body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    overflow: hidden;
    flex: 1;
    min-height: 0;
  }
  .upscale-modal-preview {
    background: #1f2937;
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: auto;
  }
  .upscale-modal-preview img {
    max-width: 100%;
    max-height: 320px;
    border-radius: 6px;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
  }
  .upscale-modal-preview .preview-info {
    margin-top: 10px;
    font-size: 11px;
    color: #cbd5e1;
    font-family: 'Consolas', monospace;
  }
  .upscale-modal-options {
    padding: 16px 18px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .upscale-opt-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .upscale-opt-label {
    font-size: 11px;
    font-weight: 700;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .upscale-scale-row {
    display: inline-flex;
    background: #f3f4f6;
    border-radius: 6px;
    padding: 2px;
    align-self: flex-start;
  }
  .upscale-scale-row button {
    padding: 5px 14px;
    background: none;
    border: none;
    border-radius: 4px;
    font-size: 12px;
    color: #6b7280;
    cursor: pointer;
    font-weight: 600;
  }
  .upscale-scale-row button.on { background: #4f6ef7; color: #fff; }
  .upscale-model-list {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .upscale-model-item {

<div class="ai-app" x-data="aiApp()" x-init="init()">

  <!-- 모바일: 사이드바 배경 오버레이 -->
  <div class="ai-mobile-overlay" :class="mobileSidebar ? 'show' : ''" @click="mobileSidebar=false"></div>

  <!-- 좌측 사이드바 -->
  <div class="ai-side" :class="mobileSidebar ? 'open' : ''">
    <div class="ai-side-head">
      <div class="ai-side-title">
        <span style="color:#4f6ef7;">🤖</span> AI 챗
      </div>
      <button class="ai-new-btn" @click="startNewThread()">
        <span>+</span> 새 대화
      </button>
      <input class="ai-side-search" placeholder="🔍 대화 검색..."
        x-model="q" @input.debounce.300ms="loadThreads()" />
    </div>

    <!-- 스코프 칩 -->
    <div class="ai-scope-row">
      <button class="ai-scope-chip" :class="scope==='mine' ? 'active' : ''"
        @click="setScope('mine')">내 대화</button>
      <button class="ai-scope-chip" :class="scope==='team' ? 'active' : ''"
        @click="setScope('team')">팀</button>
      <button class="ai-scope-chip" :class="scope==='company' ? 'active' : ''"
        @click="setScope('company')">회사</button>
      <button class="ai-scope-chip" :class="scope==='invited' ? 'active' : ''"
        @click="setScope('invited')">초대받은</button>
    </div>

    <div class="ai-side-list">
      <!-- 프로젝트 섹션 -->
      <div class="ai-list-group">
        <span>프로젝트</span>
        <button class="ghost-btn" @click="openProjectModal()" title="새 프로젝트">+</button>
      </div>
      <template x-for="p in projects" :key="p.id">
        <div class="ai-proj-item" :class="currentProjectId===p.id ? 'active' : ''"
          @click="selectProject(p.id)">
          <span class="em" x-text="p.emoji || '📁'"></span>
          <div class="info">
            <div class="n" x-text="p.name"></div>
            <div class="s" x-text="(p.thread_count||0) + '개 대화 · ' + p.owner_name"></div>
          </div>
          <span class="badge" :class="p.share_mode" x-text="scopeBadges[p.share_mode] || p.share_mode"></span>
        </div>
      </template>
      <div x-show="projects.length===0" class="ai-empty" style="padding:10px 8px;">
        프로젝트가 없습니다
      </div>

      <!-- 스레드 섹션 -->
      <div class="ai-list-group">
        <span x-text="'대화 · ' + (scopeLabels[scope] || '')"></span>
      </div>
      <template x-for="t in threads" :key="t.id">
        <div class="ai-thread-item" :class="currentThreadId===t.id ? 'active' : ''"
          @click="openThread(t.id)">
          <span class="icon" x-text="t.project_emoji || '💬'"></span>
          <div class="info">
            <div class="title" x-text="t.title || '(제목 없음)'"></div>
            <div class="meta">
              <span x-text="formatDate(t.last_message_at || t.created_at)"></span>
              <template x-if="t.project_name">
                <span> · <span x-text="t.project_name"></span></span>
              </template>
            </div>
          </div>
          <template x-if="t.share_mode && t.share_mode !== 'private'">
            <span class="scope-badge" :class="t.share_mode" x-text="scopeBadges[t.share_mode] || t.share_mode"></span>
          </template>
        </div>
      </template>
      <div x-show="threads.length===0 && !loadingThreads" class="ai-empty">
        대화가 없습니다
      </div>
      <button x-show="hasMore" class="ai-load-more" @click="loadMoreThreads()">더 보기</button>
    </div>
  </div>

  <!-- 우측 메인 대화창 -->
  <div class="ai-main">

    <!-- 모바일 네비 -->
    <div class="ai-mobile-nav">
      <button @click="mobileSidebar=true" title="목록">
        <span class="material-symbols-outlined" style="font-size:20px;">menu</span>
      </button>
      <div class="ai-mobile-nav-title"
        x-text="currentThread ? (currentThread.title || '대화') : '새 대화'"></div>
      <button @click="startNewThread()" title="새 대화">
        <span style="font-size:18px;">+</span>
      </button>
    </div>

    <!-- 헤더 (스레드 선택됐을 때) -->
    <div class="ai-main-head" x-show="currentThread">
      <span class="emj" x-text="currentThread && (currentThread.project_emoji || '💬')"></span>
      <div class="titles">
        <div class="t" x-text="currentThread && (currentThread.title || '(제목 없음)')"></div>
        <div class="s">
          <span x-text="currentMessages.length + '턴'"></span>
          <template x-if="currentThread && currentThread.project_name">
            <span> · 📁 <span x-text="currentThread.project_name"></span></span>
          </template>
        </div>
      </div>
      <div class="actions" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <!-- 모델 선택 (API 모드에서만 활성) -->
        <div style="position:relative;" x-show="backendMode === 'api'">
          <button class="ai-model-picker" :class="modelPickerOpen?'active':''"
                  @click="modelPickerOpen = !modelPickerOpen"
                  :title="'현재 모델: ' + (getModelDisplay().name)">
            <span x-text="getModelDisplay().emoji"></span>
            <span x-text="getModelDisplay().name"></span>
            <span style="color:#9ca3af;">▾</span>
          </button>
          <div x-show="modelPickerOpen" @click.away="modelPickerOpen=false"
               style="position:absolute;top:100%;right:0;margin-top:4px;background:#fff;border:1px solid #e5e7eb;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.1);padding:4px;min-width:240px;z-index:50;">
            <template x-for="opt in modelOptionsVisible" :key="opt.key">
              <button @click="selectModel(opt.key)"
                      :class="selectedModel===opt.key?'active':''"
                      style="display:flex;align-items:flex-start;gap:8px;width:100%;padding:8px 10px;border:none;background:none;cursor:pointer;border-radius:6px;text-align:left;"
                      :style="selectedModel===opt.key ? 'background:#eff6ff;' : ''">
                <span style="font-size:16px;flex-shrink:0;margin-top:1px;" x-text="opt.emoji"></span>
                <div style="flex:1;min-width:0;">
                  <div style="font-size:12px;font-weight:600;color:#1f2937;"
                       x-text="opt.name + (opt.adminOnly ? ' (관리자)' : '')"></div>
                  <div style="font-size:10px;color:#6b7280;margin-top:2px;" x-text="opt.desc"></div>
                </div>
                <span x-show="selectedModel===opt.key" style="color:#4f6ef7;">✓</span>
              </button>
            </template>
          </div>
        </div>
        <!-- 백엔드 상태 (CLI 모드면 배지 표시) -->
        <span x-show="backendMode === 'cli'" style="font-size:10px;padding:3px 8px;background:#fef3c7;color:#92400e;border-radius:10px;font-weight:600;" title="CLI 모드 — 동시 사용 제한됨. API 키 설정하면 자동 전환">CLI</span>
        <!-- 오늘 사용량 — 항상 표시 (직원이 잔여 한도 볼 수 있게) -->
        <span x-show="usageToday.limit > 0"
              :style="'font-size:10px;padding:3px 10px;border-radius:10px;font-weight:600;cursor:default;'+(usageToday.remaining < 3 ? 'background:#fef2f2;color:#dc2626;' : (usageToday.remaining < 10 ? 'background:#fef3c7;color:#92400e;' : 'background:#f0fdf4;color:#166534;'))"
              :title="'오늘 이미지 생성 ' + usageToday.count + '/' + usageToday.limit + '장 — 남은 횟수: ' + usageToday.remaining + ' (텍스트 메시지는 무제한)'"
              x-text="'🎨 ' + (usageToday.count || 0) + '/' + (usageToday.limit || 0)"></span>
        <button @click="startNewThread()">+ 새 대화</button>
      </div>
    </div>

    <!-- 본문: 스레드 비어있으면 환영 화면 / 있으면 메시지 버블 목록 -->
    <div class="ai-body">
      <template x-if="!currentThread && currentMessages.length === 0">
        <div class="ai-welcome">
          <div class="ai-welcome-icon">🤖</div>
          <div class="ai-welcome-title">무엇을 도와드릴까요?</div>
          <div class="ai-welcome-desc">
            질문을 하거나, 파일을 첨부해 분석하거나, 이미지를 생성해 보세요.<br>
            대화는 자동으로 기록되며 프로젝트별로 분류하거나 팀원과 공유할 수 있습니다.
          </div>
          <div class="ai-welcome-suggests">
            <button class="ai-welcome-sugg" @click="draft='이번 주 업무 일지를 정리해줘'">📝 업무 일지 정리</button>
            <button class="ai-welcome-sugg" @click="draft='이 엑셀 파일을 요약해줘'; $refs.fileInput.click()">📊 엑셀 분석</button>
            <button class="ai-welcome-sugg" @click="imageMode=true; draft='밝고 깔끔한 사무실 책상에 노트북과 커피'">🎨 이미지 생성</button>
            <button class="ai-welcome-sugg" @click="draft='고객에게 납품 완료 안내 메일을 정중하게 써줘'">📧 이메일 작성</button>
          </div>
        </div>
      </template>

      <div class="ai-body-inner" x-show="currentThread || currentMessages.length > 0">
        <template x-for="(m, mi) in currentMessages" :key="m.id || ('m-'+mi)">
          <div>
            <!-- 시스템 에러 배너 (AI 답변이 아님을 명확히) -->
            <template x-if="m.role === 'system'">
              <div class="ai-system-error">
                <span class="material-symbols-outlined" style="font-size:18px;color:#dc2626;">error</span>
                <div style="flex:1;">
                  <div style="font-weight:700;color:#991b1b;font-size:12px;margin-bottom:2px;">시스템 알림 (AI 답변 아님)</div>
                  <div style="color:#7f1d1d;font-size:13px;" x-text="m.content"></div>
                </div>
              </div>
            </template>
            <template x-if="m.role !== 'system'">
          <div class="ai-msg" :class="m.role==='user' ? 'user' : (m.status==='error' ? 'ai error' : 'ai')">
            <div class="avatar">
              <template x-if="m.role === 'user'"><span x-text="(getAuth().name || '나').charAt(0)"></span></template>
              <template x-if="m.role !== 'user'"><span>✦</span></template>
            </div>
            <div style="flex: 0 1 auto; min-width: 0; max-width: calc(100% - 50px); align-self: flex-start; height: auto;">
              <div class="bubble" style="display: inline-block; height: auto; min-height: 0; max-height: none; width: auto; max-width: 100%;">
                <template x-if="m.kind==='image' && m.image_url">
                  <div class="ai-img-wrap">
                    <img class="ai-img" :src="m.image_url" :alt="m.content || 'AI 이미지'" />
                    <!-- 호버 액션 버튼 (우하단) — AI 메시지 + 원본 이미지에만 -->
                    <div class="ai-img-actions" x-show="m.role !== 'user'">
                      <button class="ai-img-action-btn" @click.stop="downloadImage(m.image_url, m.content)" title="다운로드">⬇</button>
                      <button class="ai-img-action-btn"
                              x-show="!(m.metadata_parsed && m.metadata_parsed.upscaledFrom)"
                              @click.stop="openUpscaleModal(m)" title="업스케일">🔍</button>
                    </div>
                    <div x-show="m.content" x-text="cleanMsgText(m.content)" style="margin-top:6px;font-size:12px;color:#6b7280;"></div>
                  </div>
                </template>
                <!-- 일반 텍스트 / 이미지 생성 사용자 프롬프트 — cleanMsgText 가 빈 줄 정리 -->
                <template x-if="m.kind !== 'agent' && (m.kind !== 'image' || !m.image_url)">
                  <div x-text="cleanMsgText(m.content)"></div>
                </template>
                <!-- 🤖 Agent 모드 메시지 — 진행상황 + 출력 + 생성된 파일 -->
                <template x-if="m.kind === 'agent'">
                  <div>
                    <div style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:#374151;">
                      <template x-if="m.agentStatus==='running'"><span class="ai-agent-spin">⚙️</span></template>
                      <template x-if="m.agentStatus==='done'"><span style="color:#10b981;">✓</span></template>
                      <template x-if="m.agentStatus==='error'"><span style="color:#dc2626;">✗</span></template>
                      <template x-if="m.agentStatus==='cancelled'"><span style="color:#6b7280;">⏹</span></template>
                      <span x-text="m.content"></span>
                    </div>
                    <!-- 진행 출력 (collapsible) -->
                    <details x-show="m.agentOutput" style="margin-top:6px;">
                      <summary style="cursor:pointer;font-size:11px;color:#6b7280;user-select:none;">▸ Claude 출력 보기</summary>
                      <pre style="font-size:11px;line-height:1.5;background:#f9fafb;padding:8px;border-radius:6px;margin-top:4px;overflow-x:auto;max-height:300px;white-space:pre-wrap;color:#374151;border:1px solid #e5e7eb;" x-text="m.agentOutput"></pre>
                    </details>
                    <!-- 생성된 파일 카드들 -->
                    <template x-if="m.agentFiles && m.agentFiles.length">
                      <div style="margin-top:10px;display:flex;flex-direction:column;gap:6px;">
                        <template x-for="f in m.agentFiles" :key="f.relPath">
                          <div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:#f0f9ff;border:1px solid #bae6fd;border-radius:6px;">
                            <span style="font-size:18px;" x-text="
                              {'.xlsx':'📊','.xls':'📊','.csv':'📊','.pdf':'📕','.png':'🖼️','.jpg':'🖼️','.jpeg':'🖼️','.docx':'📝','.doc':'📝','.pptx':'📑','.txt':'📄','.md':'📄','.html':'📄','.json':'⚙️','.zip':'📦'}[f.ext] || '📎'
                            "></span>
                            <div style="flex:1;min-width:0;">
                              <div style="font-size:12px;font-weight:600;color:#0c4a6e;" x-text="f.name"></div>
                              <div style="font-size:10px;color:#6b7280;" x-text="formatSize(f.size) + ' · ' + (f.ext||'').replace('.','').toUpperCase()"></div>
                            </div>
                            <template x-if="isPreviewable(f)">
                              <a :href="agentFileUrl(m, f) + '?inline=1'" target="_blank"
                                style="font-size:11px;color:#0369a1;text-decoration:none;padding:4px 8px;border-radius:4px;background:#e0f2fe;">미리보기</a>
                            </template>
                            <a :href="agentFileUrl(m, f)" download
                              style="font-size:11px;color:#fff;text-decoration:none;padding:5px 10px;border-radius:4px;background:#0369a1;font-weight:600;">⬇ 다운</a>
                          </div>
                        </template>
                      </div>
                    </template>
                    <!-- 진행 중 취소 버튼 -->
                    <template x-if="m.agentStatus==='running'">
                      <button @click="cancelAgent()" style="margin-top:8px;font-size:11px;color:#6b7280;background:#f3f4f6;border:1px solid #e5e7eb;padding:4px 10px;border-radius:4px;cursor:pointer;">⏹ 작업 중단</button>
                    </template>
                  </div>
                </template>
                <template x-if="m.attachments_parsed && m.attachments_parsed.length">
                  <div class="atts">
                    <template x-for="a in m.attachments_parsed" :key="a.id">
                      <span class="att">📎 <span x-text="a.original_name || ('#'+a.id)"></span></span>
                    </template>
                  </div>
                </template>
                <!-- AI 가 생성한 파일 (엑셀/PDF/SVG/HTML 등) 미리보기 + 다운로드 -->
                <template x-if="m.artifacts_parsed && m.artifacts_parsed.length">
                  <div class="ai-artifacts">
                    <template x-for="a in m.artifacts_parsed" :key="a.id">
                      <div>
                        <!-- SVG 인라인 미리보기 (바로 렌더링) -->
                        <template x-if="a.kind === 'svg'">
                          <div class="ai-svg-thumb" @click="openArtifactModal(a)">
                            <img :src="artifactPreviewUrl(a)" :alt="a.name || 'SVG preview'" @error="$event.currentTarget.parentElement.classList.add('load-error'); $event.currentTarget.style.display='none';">
                          </div>
                        </template>
                        <!-- HTML 인라인 미리보기 (iframe) -->
                        <template x-if="a.kind === 'html'">
                          <div style="background:#fff; border:1px solid #e5e7eb; border-radius:10px; overflow:hidden; margin-bottom:6px;">
                            <iframe :src="artifactPreviewUrl(a)" sandbox="allow-same-origin" style="width:100%; height:400px; border:0; display:block;"></iframe>
                          </div>
                        </template>
                        <!-- 클릭 시 모달 미리보기 (엑셀/PDF/SVG/HTML/MD/TXT/JSON/CSV) -->
                        <div class="ai-artifact" role="button" tabindex="0" @click="['excel','pdf','svg','html','markdown','text','json','csv'].includes(a.kind) ? openArtifactModal(a) : window.open(a.url,'_blank')">
                          <span class="ai-artifact-icon" x-text="artifactIcon(a.kind)"></span>
                          <div class="ai-artifact-body">
                            <div class="ai-artifact-name" x-text="a.name || ('#'+a.id)"></div>
                            <div class="ai-artifact-meta">
                              <span x-text="(a.kind || 'file').toUpperCase()"></span>
                              <span x-show="a.size" x-text="' · ' + formatSize(a.size)"></span>
                              <span style="color:#4f6ef7; margin-left:6px;">👁 미리보기</span>
                            </div>
                          </div>
                          <a :href="a.url" download class="ai-artifact-dl" @click.stop="void 0" title="다운로드">⬇</a>
                        </div>
                      </div>
                    </template>
                  </div>
                </template>
              </div>
              <div class="meta">
                <span x-text="formatDate(m.created_at)"></span>
                <span x-show="m.metadata_parsed && m.metadata_parsed.model" style="margin-left:8px;color:#9ca3af;font-size:9px;" x-text="'· ' + (m.metadata_parsed && m.metadata_parsed.model || '')"></span>
              </div>
            </div>
          </div>
            </template>
          </div>
        </template>
        <div class="ai-msg ai thinking" x-show="loading">
          <div class="avatar">✦</div>
          <div class="bubble" x-text="imageMode ? '이미지를 그리고 있어요... (최대 3분)' : 'Claude가 생각하는 중...'"></div>
        </div>
      </div>
    </div>

    <!-- 하단 입력 (Claude 웹 스타일: 드래그 & 드롭 / 붙여넣기 지원) -->
    <div class="ai-foot">
      <div class="ai-foot-inner">
        <!-- 숨겨진 파일 입력 (multiple) -->
        <input type="file" x-ref="fileInput" style="display:none" multiple
          @change="uploadFiles($event.target.files); $event.target.value=''"
          accept=".xlsx,.xls,.pdf,.png,.jpg,.jpeg,.gif,.webp,.txt,.docx,.doc,.csv" />

        <!-- 입력 박스 (드래그/드롭/붙여넣기 이벤트 루트) -->
        <div class="ai-input-wrap" :class="dragOver ? 'dragging' : ''"
          @dragover.prevent="dragOver=true"
          @dragenter.prevent="dragOver=true"
          @dragleave.prevent="onDragLeave($event)"
          @drop.prevent="onDrop($event)">

          <!-- 드래그 오버레이 -->
          <div class="ai-drop-overlay" x-show="dragOver">
            <div class="big">📎</div>
            <div class="txt">여기에 놓으면 파일이 첨부됩니다</div>
          </div>

          <!-- 첨부 칩 (입력박스 상단) -->
          <div x-show="pendingAttachments.length > 0 || uploadingCount > 0" class="ai-attach-row">
            <template x-for="a in pendingAttachments" :key="a.id">
              <div class="ai-attach-chip" :class="a.kind === 'image' ? 'img' : ''">
                <template x-if="a.kind === 'image'">
                  <img :src="'/api/ai/attachments/' + a.id + '/raw'" :alt="a.original_name" />
                </template>
                <template x-if="a.kind !== 'image'">
                  <div class="ai-attach-icon" :class="a.kind || 'file'" x-text="fileIcon(a)"></div>
                </template>
                <div class="ai-attach-info">
                  <div class="ai-attach-name" x-text="a.original_name"></div>
                  <div class="ai-attach-size" x-text="formatSize(a.size)"></div>
                </div>
                <button class="ai-attach-x" @click="removeAttachment(a.id)" title="제거">×</button>
              </div>
            </template>
            <template x-if="uploadingCount > 0">
              <div class="ai-attach-loading">
                <div class="spinner"></div>
                <span x-text="uploadingCount + '개 업로드 중...'"></span>
              </div>
            </template>
          </div>

          <!-- 텍스트 입력 -->
          <textarea class="ai-input" x-ref="inputArea"
            :placeholder="agentMode ? '🤖 Agent 작업 요청 (예: 첨부한 엑셀 거래처별 정렬해줘 / 매출 차트 만들어줘 / PPT 보고서)' : (imageMode ? (hasImageAttachment ? '첨부한 이미지를 어떻게 편집할까요?' : '생성할 이미지를 설명해 주세요.') : '무엇이든 물어보세요. 파일은 드래그하거나 붙여넣으세요.')"
            x-model="draft"
            @input="autoGrow($event)"
            @keydown.enter.prevent="onEnter($event)"
            @paste="onPaste($event)"
            rows="1"></textarea>

          <!-- 하단 액션바 -->
          <div class="ai-input-actions">
            <div class="ai-input-left-tools">
              <button class="ai-icon-btn" @click="$refs.fileInput.click()"
                :disabled="loading" title="파일 첨부 (드래그/붙여넣기 가능)">📎</button>
              <button class="ai-icon-btn image-mode" :class="imageMode ? 'on' : ''"
                @click="imageMode = !imageMode; if(imageMode) agentMode=false;" title="이미지 생성 모드 (gpt-image-2)">🎨</button>
              <button class="ai-icon-btn agent-mode" :class="agentMode ? 'on' : ''"
                @click="agentMode = !agentMode; if(agentMode){imageMode=false;} try{localStorage.setItem('aiTab:agentMode', agentMode?'1':'0')}catch(e){}"
                title="🤖 Agent 모드 — 엑셀/파일/ERP 자동 작업 (코워크식)">🤖</button>
              <!-- 이미지 품질 선택 (imageMode 일 때만 노출) -->
              <template x-if="imageMode">
                <div class="ai-quality-picker" style="display:inline-flex;background:#f3f4f6;border-radius:6px;padding:2px;gap:2px;align-items:center;">
                  <span style="font-size:10px;color:#6b7280;padding:0 6px;font-weight:600;">품질</span>
                  <template x-for="q in [
                    {key:'low', label:'초안', cost:'~₩8'},
                    {key:'medium', label:'시안', cost:'~₩70'},
                    {key:'high', label:'최종', cost:'~₩280'}
                  ]" :key="q.key">
                    <button @click="imageQuality=q.key; try{localStorage.setItem('aiTab:imgQuality', q.key)}catch(e){}"
                      :style="'font-size:10px;padding:3px 8px;border-radius:4px;cursor:pointer;border:none;font-weight:600;'+(imageQuality===q.key ? 'background:#4f6ef7;color:#fff;' : 'background:transparent;color:#6b7280;')"
                      :title="q.label + ' (' + q.cost + ')'"
                      x-text="q.label"></button>
                  </template>
                </div>
              </template>
              <div style="position:relative;">
                <button class="ai-icon-btn with-label" :class="currentProjectId ? 'on' : ''"
                  @click="showProjectPicker = !showProjectPicker" title="프로젝트 선택">
                  <span>📁</span>
                  <span class="label" x-text="currentProjectId ? (projects.find(p=>p.id===currentProjectId)?.name || '프로젝트') : '프로젝트'"></span>
                </button>
                <!-- 프로젝트 선택 드롭다운 -->
                <div x-show="showProjectPicker" x-transition @click.away="showProjectPicker=false" class="ai-proj-picker">
                  <div class="ai-proj-item" @click="currentProjectId=null; showProjectPicker=false;">
                    <span class="em">❌</span>
                    <div class="info"><div class="n">프로젝트 없음</div></div>
                  </div>
                  <template x-for="p in projects" :key="p.id">
                    <div class="ai-proj-item" :class="currentProjectId===p.id ? 'active' : ''"
                      @click="currentProjectId=p.id; showProjectPicker=false;">
                      <span class="em" x-text="p.emoji || '📁'"></span>
                      <div class="info">
                        <div class="n" x-text="p.name"></div>
                        <div class="s" x-text="p.owner_name || ''"></div>
                      </div>
                      <span class="badge" :class="p.share_mode" x-text="scopeBadges[p.share_mode] || p.share_mode"></span>
                    </div>
                  </template>
                  <div x-show="projects.length===0" class="ai-empty">
                    프로젝트 없음. <a href="#" @click.prevent="openProjectModal(); showProjectPicker=false;" style="color:#4338ca;">+ 만들기</a>
                  </div>
                </div>
              </div>
            </div>
            <div class="ai-input-right">
              <span class="ai-input-hint">
                <span x-show="!imageMode && !agentMode">Enter 전송 · Shift+Enter 줄바꿈</span>
                <span x-show="agentMode">🤖 Agent — 파일/엑셀/Python/ERP 자동 작업 (최대 5분)</span>
                <span x-show="imageMode && !hasImageAttachment" x-text="'🎨 ' + (imageQuality==='low'?'초안 (~₩8/장)':imageQuality==='high'?'최종품질 (~₩280/장)':'시안품질 (~₩70/장)')"></span>
                <span x-show="imageMode && hasImageAttachment">✏️ 첨부 이미지를 편집합니다</span>
              </span>
              <button class="ai-send-btn" :class="imageMode ? 'image' : (agentMode ? 'agent' : '')"
                @click="send()"
                :disabled="loading || agentRunning || (!draft.trim() && pendingAttachments.length===0)">
                <span x-show="!loading && !agentRunning && !imageMode && !agentMode">전송 ↑</span>
                <span x-show="!loading && !agentRunning && agentMode">🤖 작업 시작</span>
                <span x-show="!loading && !agentRunning && imageMode && !hasImageAttachment">🎨 그리기</span>
                <span x-show="!loading && !agentRunning && imageMode && hasImageAttachment">✏️ 편집하기</span>
                <span x-show="loading || agentRunning">…</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Artifact 미리보기 모달 (SVG/HTML/MD/JSON/CSV/TXT 큰 화면) -->
  <template x-if="artifactModal">
    <div class="ai-preview-backdrop" @click.self="closeArtifactModal()">
      <section class="ai-preview-panel">
        <!-- 헤더 -->
        <div class="ai-preview-head">
          <span style="font-size:20px;" x-text="artifactIcon(artifactModal.kind)"></span>
          <div class="ai-preview-title">
            <div class="name" x-text="artifactModal.name"></div>
            <div class="meta">
              <span x-text="(artifactModal.kind||'').toUpperCase()"></span>
              <span x-show="artifactModal.size" x-text="' · ' + formatSize(artifactModal.size)"></span>
            </div>
          </div>
          <a :href="artifactPreviewUrl(artifactModal)" target="_blank" class="ai-preview-action">새 탭</a>
          <a :href="artifactModal.url" download class="ai-preview-action primary">다운로드</a>
          <button @click="closeArtifactModal()" class="ai-preview-close">×</button>
        </div>
        <!-- 본문 (kind 별 렌더링) -->
        <div class="ai-preview-body">
          <template x-if="artifactModal.kind==='svg'">
            <div class="ai-preview-canvas">
              <img x-show="!artifactModal.svgError"
                :src="artifactModal.svgDataUrl || artifactPreviewUrl(artifactModal)"
                :alt="artifactModal.name || 'SVG preview'"
                @error="artifactModal.svgError = true">
              <div class="ai-preview-error" x-show="artifactModal.svgError">
                SVG를 이미지로 바로 렌더링하지 못했습니다.<br>
                다운로드하거나 새 탭으로 열어 확인해주세요.
              </div>
            </div>
          </template>
          <template x-if="artifactModal.kind==='html'">
            <iframe :src="artifactPreviewUrl(artifactModal)" sandbox="allow-same-origin" style="width:100%; height:80vh; border:0;"></iframe>
          </template>
          <template x-if="artifactModal.kind==='pdf'">
            <iframe :src="artifactPreviewUrl(artifactModal)" style="width:100%; height:85vh; border:0;"></iframe>

          <template x-if="artifactModal.kind==='excel'">
            <div style="display:flex; flex-direction:column; height:85vh;">
              <!-- 시트 탭 -->

                <template x-for="(s, i) in artifactModal.sheets" :key="i">
                  <button @click="artifactModal.activeSheet = i"
                    :style="`padding:6px 14px; border:1px solid ${artifactModal.activeSheet===i?'#4f6ef7':'#e5e7eb'}; background:${artifactModal.activeSheet===i?'#4f6ef7':'#fff'}; color:${artifactModal.activeSheet===i?'#fff':'#374151'}; border-radius:6px; font-size:12px; cursor:pointer; white-space:nowrap;`"
                    x-text="s.name"></button>
                </template>
              </div>
              <!-- 시트 내용 -->
              <div style="flex:1; overflow:auto; padding:14px; background:#fff;">
                <div x-show="artifactModal.loading" style="color:#9ca3af; font-size:13px;">엑셀 파싱 중...</div>
                <div x-show="!artifactModal.loading && artifactModal.sheets && artifactModal.sheets.length > 0"
                  x-html="artifactModal.sheets[artifactModal.activeSheet]?.html || ''"
                  style="font-size:12px;"
                  class="xlsx-preview"></div>
              </div>
            </div>
          </template>
          <template x-if="['markdown','text','json','csv'].includes(artifactModal.kind)">
            <div style="padding:18px;">
              <div x-show="artifactModal.loading" style="color:#9ca3af; font-size:13px;">불러오는 중...</div>
              <pre x-show="!artifactModal.loading" x-text="artifactModal.content" style="white-space:pre-wrap; word-break:break-word; font-family:Consolas, monospace; font-size:12.5px; line-height:1.55; color:#1f2937; margin:0;"></pre>
            </div>

  </template>

  <!-- 업스케일 모달 (호버 → 🔍 클릭 시 열림) -->
  <template x-if="upscaleModal.open">
    <div class="upscale-modal" @click.self="closeUpscaleModal()">
      <div class="upscale-modal-card">
        <div class="upscale-modal-header">
          <h2>🔍 업스케일</h2>
          <button class="upscale-modal-close" @click="closeUpscaleModal()" :disabled="upscaleModal.running">✕</button>
        </div>
        <div class="upscale-modal-body">
          <!-- 좌: 미리보기 -->
          <div class="upscale-modal-preview">
            <img :src="upscaleModal.imageUrl" alt="원본" />
            <div class="preview-info">원본 <span x-text="upscaleModal.origSize || '—'"></span></div>
          </div>
          <!-- 우: 옵션 -->
          <div class="upscale-modal-options">
            <div class="upscale-opt-row">
              <label class="upscale-opt-label">배수</label>
              <div class="upscale-scale-row">
                <button :class="upscaleModal.scale===2 ? 'on' : ''" @click="upscaleModal.scale=2; updateUpscaleResult()" :disabled="upscaleModal.running">2배</button>
                <button :class="upscaleModal.scale===4 ? 'on' : ''" @click="upscaleModal.scale=4; updateUpscaleResult()" :disabled="upscaleModal.running">4배</button>
              </div>

            <div class="upscale-opt-row">
              <label class="upscale-opt-label">모델</label>
              <div class="upscale-model-list">
                <label class="upscale-model-item" :class="upscaleModal.useAuto ? 'active' : ''">
                  <input type="radio" name="upscale-model" :checked="upscaleModal.useAuto" @change="upscaleModal.useAuto=true" :disabled="upscaleModal.running" />
                  <span class="label">✨ 자동 (추천)</span>
                  <span class="desc">프롬프트 기반 자동 선택</span>
                </label>
                <template x-for="mdl in upscaleModelsForModal" :key="mdl.key">
                  <label class="upscale-model-item" :class="!upscaleModal.useAuto && upscaleModal.modelKey===mdl.key ? 'active' : ''">
                    <input type="radio" name="upscale-model" :checked="!upscaleModal.useAuto && upscaleModal.modelKey===mdl.key" @change="upscaleModal.useAuto=false; upscaleModal.modelKey=mdl.key" :disabled="upscaleModal.running" />
                    <span class="label" x-text="mdl.emoji + ' ' + mdl.name"></span>

              </div>

            <div class="upscale-result-info">

            <template x-if="upscaleModal.error">
              <div class="upscale-error-box" x-text="upscaleModal.error"></div>

            <template x-if="upscaleModal.running">
              <div class="upscale-progress">
                <span class="dot"></span>
                <span>업스케일 처리 중... <span x-show="upscaleModal.elapsed" x-text="'(' + upscaleModal.elapsed + '초 경과)'"></span></span>
              </div>
            </template>

        </div>
        <div class="upscale-modal-footer">
          <button class="upscale-cancel-btn" @click="closeUpscaleModal()" :disabled="upscaleModal.running">닫기</button>
          <button class="upscale-run-btn" @click="runUpscaleFromModal()" :disabled="upscaleModal.running">
            <template x-if="!upscaleModal.running"><span>↑ 시작</span></template>
            <template x-if="upscaleModal.running"><span>⏳ 처리 중...</span></template>
          </button>
        </div>
      </div>
    </div>
  </template>

  <!-- 프로젝트 편집/생성 모달 -->
  <template x-if="showProjectModal">
    <div class="ai-proj-overlay" @click.self="closeProjectModal()">
      <div class="ai-proj-modal">
        <div class="ai-proj-head">
          <h3 x-text="projectForm.id ? '프로젝트 편집' : '새 프로젝트'"></h3>
          <button @click="closeProjectModal()" style="background:none;border:none;font-size:20px;color:#9ca3af;cursor:pointer;">×</button>

          <label>설명 (선택)</label>

              @click="projectForm.share_mode='team'">

              <small>같은 부서 사람들</small>

            <button :class="projectForm.share_mode==='company' ? 'active' : ''"
              @click="projectForm.share_mode='company'">
              🏢 회사 전체
              <small>모든 직원</small>
            </button>
            <button :class="projectForm.share_mode==='invited' ? 'active' : ''"
              @click="projectForm.share_mode='invited'">
              ✉️ 초대
              <small>지정한 사람만</small>
            </button>

          <template x-if="projectForm.share_mode==='invited'">
            <div>
              <label>초대할 사람</label>
              <div class="ai-proj-user-list">
                <template x-for="u in shareUserList" :key="u.userId">
                  <label class="ai-proj-user" x-show="u.userId !== getAuth().userId">
                    <input type="checkbox" :value="u.userId"
                      :checked="projectForm.member_ids.includes(u.userId)"
                      @change="toggleProjectMember(u.userId)" />
                    <div class="avatar" x-text="(u.name || '?').charAt(0)"></div>
                    <span class="name" x-text="u.name"></span>
                    <span class="dept" x-show="(u.dept || u.department || '').trim()" x-text="u.dept || u.department || ''"></span>
                  </label>
                </template>
                <div x-show="shareUserList.length <= 1" style="padding:10px;text-align:center;color:#9ca3af;font-size:11.5px;">
                  등록된 직원이 없습니다
                </div>
              </div>
            </div>
          </template>
        </div>
        <div class="ai-proj-foot">
          <div class="left">
            <button class="danger" x-show="projectForm.id" @click="deleteProject()">삭제</button>
          </div>
          <div style="display:flex;gap:6px;">
            <button class="secondary" @click="closeProjectModal()">취소</button>
            <button class="primary" @click="saveProject()" :disabled="!projectForm.name.trim()">
              <span x-text="projectForm.id ? '저장' : '만들기'"></span>
            </button>
