<script>
function aiApp() {
  return {
    // 준비 상태
    aiReady: false,

    // 목록
    threads: [],
    projects: [],
    q: '',
    scope: 'mine',   // 'mine' | 'team' | 'company' | 'invited'
    scopeLabels: { mine:'내 대화', team:'팀', company:'회사', invited:'초대받은' },
    scopeBadges: { private:'나만', team:'팀', company:'회사', invited:'초대' },

    // 업스케일 모달 상태
    upscaleModal: {
      open: false,
      msgId: null,
      imageUrl: null,
      origSize: '',
      origW: 0,
      origH: 0,
      resultSize: '',
      estimatedTime: '약 30초',
      scale: 4,
      useAuto: true,
      modelKey: 'ultrasharp-4x',
      running: false,
      elapsed: 0,
      _timer: null,
      error: null,
    },
    get upscaleModelsForModal() {
      return (this.upscaleModels || []).filter(m => m.installed);
    },


    // 메시지 텍스트 정리 — 빈 줄 / 다중 newline 압축 / 앞뒤 공백 제거
    cleanMsgText(content) {
      if (content == null) return '';
      const s = String(content);
      // 모든 라인 분리: LF, CR, CRLF, U+0085 NEL, U+2028 LS, U+2029 PS
      const lines = s.split(new RegExp('\r\n|\r|\n|\u0085|\u2028|\u2029'));
      const cleaned = [];
      for (const line of lines) {
        // \s 는 NBSP/zero-width 포함 모든 unicode whitespace 매칭
        const trimmed = line.replace(/^\s+|\s+$/g, '');
        if (trimmed.length > 0) cleaned.push(trimmed);
      }
      return cleaned.join('\n');
    },




    limit: 30,
    offset: 0,
    hasMore: false,
    loadingThreads: false,

    // 현재 스레드
    currentThreadId: null,
    currentThread: null,
    currentMessages: [],

    // 입력
    draft: '',
    imageMode: false,
    agentMode: localStorage.getItem('aiTab:agentMode') === '1',  // 🤖 Agent 모드 (코워크식 작업)
    imageQuality: localStorage.getItem('aiTab:imgQuality') || 'medium',  // low/medium/high
    loading: false,
    pendingAttachments: [],
    currentProjectId: null,
    showProjectPicker: false,

    // Agent 스트리밍 상태
    agentRunning: false,         // SSE 진행 중
    agentEvents: [],             // 현재 Agent 작업의 이벤트 스트림 (output/file 등)
    agentSessionInfo: null,      // {sessionId, dir, files} — 완료 후
    _agentEventSource: null,     // SSE 연결 핸들 (취소용)

    // 파일 업로드 UX
    dragOver: false,
    uploadingCount: 0,         // 업로드 중인 파일 개수
    _dragLeaveTimer: null,

    // 프로젝트 모달
    showProjectModal: false,
    projectForm: { id:null, name:'', emoji:'📁', description:'', share_mode:'private', member_ids:[] },
    shareUserList: [],

    // 모바일
    mobileSidebar: false,

    // AI 모델 선택 (API 모드에서만 의미 있음)
    selectedModel: localStorage.getItem('aiTab:model') || '',   // '' = 서버 기본값
    modelPickerOpen: false,
    backendMode: 'cli',   // 'api' | 'cli'
    backendModel: '',     // 서버가 쓰는 기본 모델
    MODEL_OPTIONS: [
      { key: '', name: '기본', emoji: '✦', desc: '서버 기본 모델 사용' },
      { key: 'claude-haiku-4-5-20251001', name: 'Haiku', emoji: '⚡', desc: '빠르고 저렴. 간단 질문·대화에 최적' },
      { key: 'claude-sonnet-4-6', name: 'Sonnet', emoji: '✨', desc: '균형. 문서·분석·도구 호출에 권장' },
      { key: 'claude-opus-4-6', name: 'Opus', emoji: '🧠', desc: '최강. 복잡한 추론·긴 문서 (비쌈)', adminOnly: true },
    ],
    get modelOptionsVisible() {
      const isAdmin = this.getAuth().role === 'admin';
      return this.MODEL_OPTIONS.filter(m => !m.adminOnly || isAdmin);
    },
    selectModel(key) {
      this.selectedModel = key;
      try { localStorage.setItem('aiTab:model', key); } catch(e) {}
      this.modelPickerOpen = false;
    },
    getModelDisplay() {
      const m = this.MODEL_OPTIONS.find(o => o.key === this.selectedModel) || this.MODEL_OPTIONS[0];
      return m;
    },
    async loadBackendInfo() {
      try {
        const r = await fetch('/api/ai/health');
        if (!r.ok) return;
        const d = await r.json();
        this.backendMode = d.backend || 'cli';
        this.backendModel = d.model || '';
      } catch (e) {}
    },
    // 오늘 사용량 표시 (헤더)
    usageToday: { count: 0, limit: 100, remaining: 100 },
    async loadUsageToday() {
      try {
        const r = await fetch('/api/ai/usage/today');
        if (!r.ok) return;
        const d = await r.json();
        this.usageToday = d;
      } catch (e) {}
    },

    // ── 업스케일 ──
    upscaleHealth: null,       // { ready, binExists, models: [...], installedCount }
    upscaleModels: [],         // health 응답의 models
    upscaleAutoPick: true,     // 자동 추천 토글
    upscaleModelKey: 'ultrasharp-4x',
    upscaleScale: 4,
    // 업스케일 진행 중/결과 캐시: { [messageId]: { loading, model, url, error } }
    upscaleStatus: {},
    // 드롭다운 열림 상태: messageId → bool
    upscalePickerOpen: {},

    get hasImageAttachment() {
      return this.pendingAttachments.some(a => a && a.kind === 'image');
    },

    getAuth() {
      try {
        const appEl = document.querySelector('[x-data="app()"]');
        if (appEl && appEl.__x) return appEl.__x.$data.auth;
        if (appEl && appEl._x_dataStack) return appEl._x_dataStack[0].auth;
      } catch(e) {}
      return { userId: 'admin', name: '관리자' };
    },

    async init() {
      // /api/ai/health 체크 + 백엔드 모드/모델 정보 로드
      try {
        const r = await fetch('/api/ai/health');
        if (r.ok) {
          const d = await r.json();
          this.aiReady = !!d.ready;
          this.backendMode = d.backend || 'cli';
          this.backendModel = d.model || '';
        }
      } catch(e) { this.aiReady = false; }

      if (!this.aiReady) return;

      // API 모드면 오늘 사용량도 로드
      if (this.backendMode === 'api') {
        this.loadUsageToday();
      }

      await this.loadThreads();
      await this.loadProjects();

      // 마지막 스레드 복원 (워크스페이스와 별개 키)
      try {
        const savedTid = localStorage.getItem('aiTab:lastThreadId');
        if (savedTid && this.threads.some(t => String(t.id)===String(savedTid))) {
          await this.openThread(savedTid);
        }
      } catch(e) {}
    },

    async setScope(scope) {
      this.scope = scope;
      this.offset = 0;
      this.threads = [];
      await this.loadThreads();
    },

    async loadThreads() {
      if (!this.aiReady) return;
      this.loadingThreads = true;
      try {
        const params = new URLSearchParams({
          scope: this.scope,
          q: this.q || '',
          limit: String(this.limit),
          offset: '0'
        });
        const r = await fetch('/api/ai/threads?' + params.toString());
        const d = await r.json();
        if (d.ok) {
          this.threads = d.threads || [];
          this.offset = this.threads.length;
          this.hasMore = !!d.hasMore;
        }
      } catch(e) { console.error('[ai-tab] loadThreads:', e); }
      this.loadingThreads = false;
    },

    async loadMoreThreads() {
      if (!this.aiReady || !this.hasMore) return;
      try {
        const params = new URLSearchParams({
          scope: this.scope,
          q: this.q || '',
          limit: String(this.limit),
          offset: String(this.offset)
        });
        const r = await fetch('/api/ai/threads?' + params.toString());
        const d = await r.json();
        if (d.ok) {
          this.threads = this.threads.concat(d.threads || []);
          this.offset = this.threads.length;
          this.hasMore = !!d.hasMore;
        }
      } catch(e) {}
    },

    async loadProjects() {
      if (!this.aiReady) return;
      try {
        const r = await fetch('/api/ai/projects');
        const d = await r.json();
        if (d.ok) this.projects = d.projects || [];
      } catch(e) { console.error('[ai-tab] loadProjects:', e); }
    },

    async openThread(threadId) {
      if (!this.aiReady) return;
      // 다른 스레드로 전환 시 로딩 인디케이터 끄기 (이전 스레드 질문은 백그라운드에서 계속 진행)
      // - 진행 중이던 fetch 가 완료되면 해당 스레드 데이터로 자동 갱신됨
      // - 사용자에겐 "이 스레드는 로딩 중 아님" 으로 보여야 자연스러움
      if (String(threadId) !== String(this.currentThreadId)) {
        this.loading = false;
      }
      try {
        const r = await fetch('/api/ai/threads/' + encodeURIComponent(threadId));
        const d = await r.json();
        if (d.ok) {
          this.currentThreadId = d.thread.id;
          this.currentThread = d.thread;
          this.currentMessages = d.messages || [];
          // 메시지별 필드 파싱 (첨부/생성파일/메타데이터)
          for (const m of this.currentMessages) {
            if (!m.attachments_parsed && m.attachments) {
              try {
                const a = typeof m.attachments === 'string' ? JSON.parse(m.attachments) : m.attachments;
                m.attachments_parsed = Array.isArray(a) ? a : [];
              } catch(e) { m.attachments_parsed = []; }
            }
            if (!m.metadata_parsed && m.metadata) {
              try {
                m.metadata_parsed = typeof m.metadata === 'string' ? JSON.parse(m.metadata) : m.metadata;
              } catch(e) { m.metadata_parsed = {}; }
            }
            // metadata 에 들어있는 artifacts 를 꺼냄
            if (!m.artifacts_parsed && m.metadata_parsed && Array.isArray(m.metadata_parsed.artifacts)) {
              m.artifacts_parsed = m.metadata_parsed.artifacts;
            }
            // Agent 메시지: metadata 의 files/sessionId 를 화면 표시용 필드로 복원
            if (m.kind === 'agent' && m.role !== 'user' && m.metadata_parsed) {
              m.agentFiles = Array.isArray(m.metadata_parsed.files) ? m.metadata_parsed.files : [];
              m.agentOutput = m.metadata_parsed.outputTail || '';
              m.sessionId = m.metadata_parsed.sessionId || null;
              m.userIdForFile = (this.getAuth && this.getAuth().userId) || 'anon';
              m.agentStatus = m.status === 'error' ? 'error' : 'done';
            }
          }
          try { localStorage.setItem('aiTab:lastThreadId', String(d.thread.id)); } catch(e) {}
          this.mobileSidebar = false;
          this.$nextTick(() => this.scrollToBottom());
        }
      } catch(e) { console.error('[ai-tab] openThread:', e); }
    },

    selectProject(projectId) {
      // 프로젝트 클릭 → 해당 프로젝트의 스레드만 필터링
      this.currentProjectId = projectId;
      this.scope = 'mine';  // 스코프 초기화
      this.offset = 0;
      this.threads = [];
      this.loadProjectThreads(projectId);
    },

    async loadProjectThreads(projectId) {
      if (!this.aiReady) return;
      this.loadingThreads = true;
      try {
        const params = new URLSearchParams({
          project: String(projectId),
          q: this.q || '',
          limit: String(this.limit),
          offset: '0'
        });
        const r = await fetch('/api/ai/threads?' + params.toString());
        const d = await r.json();
        if (d.ok) {
          this.threads = d.threads || [];
          this.offset = this.threads.length;
          this.hasMore = !!d.hasMore;
        }
      } catch(e) {}
      this.loadingThreads = false;
    },

    startNewThread() {
      this.currentThreadId = null;
      this.currentThread = null;
      this.currentMessages = [];
      this.pendingAttachments = [];
      this.draft = '';
      this.imageMode = false;
      try { localStorage.removeItem('aiTab:lastThreadId'); } catch(e) {}
      this.$nextTick(() => { try { this.$refs.inputArea && this.$refs.inputArea.focus(); } catch(e){} });
    },

    // 여러 파일 일괄 업로드 (FileList, File[], 또는 DataTransfer.items 모두 허용)
    async uploadFiles(files) {
      if (!files || !files.length) return;
      const list = Array.from(files);
      for (const file of list) {
        if (!file || !(file instanceof File)) continue;
        await this._uploadOne(file);
      }
    },

    async _uploadOne(file) {
      if (file.size > 20 * 1024 * 1024) {
        this._toast(`"${file.name}" 은(는) 20MB 를 초과해서 건너뜁니다.`);
        return;
      }
      this.uploadingCount++;
      try {
        const form = new FormData();
        form.append('file', file);
        const r = await fetch('/api/ai/attachments', { method:'POST', body: form });
        const d = await r.json();
        if (d.ok) {
          this.pendingAttachments.push(d.attachment);
        } else {
          this._toast(d.error || '첨부 업로드 실패');
        }
      } catch(e) {
        this._toast('첨부 업로드 실패: ' + e.message);
      } finally {
        this.uploadingCount = Math.max(0, this.uploadingCount - 1);
      }
    },

    removeAttachment(id) {
      this.pendingAttachments = this.pendingAttachments.filter(a => a.id !== id);
    },

    // 드래그 & 드롭
    onDragLeave(ev) {
      // 빈번한 dragleave 플리커 방지: 100ms 여유
      clearTimeout(this._dragLeaveTimer);
      this._dragLeaveTimer = setTimeout(() => { this.dragOver = false; }, 80);
    },
    onDrop(ev) {
      clearTimeout(this._dragLeaveTimer);
      this.dragOver = false;
      const dt = ev.dataTransfer;
      if (!dt) return;
      if (dt.files && dt.files.length) {
        this.uploadFiles(dt.files);
      }
    },

    // 붙여넣기 (이미지 캡쳐 포함)
    onPaste(ev) {
      const items = ev.clipboardData && ev.clipboardData.items;
      if (!items) return;
      const files = [];
      for (const it of items) {
        if (it.kind === 'file') {
          const f = it.getAsFile();
          if (f) files.push(f);
        }
      }
      if (files.length) {
        ev.preventDefault();
        this.uploadFiles(files);
      }
    },

    // 첨부 UI 헬퍼
    fileIcon(a) {
      switch (a && a.kind) {
        case 'excel': return '📊';
        case 'pdf': return '📄';
        case 'word': return '📝';
        case 'text': return '📃';
        case 'image': return '🖼️';
        default: return '📎';
      }
    },
    formatSize(bytes) {
      const n = Number(bytes) || 0;
      if (n < 1024) return n + 'B';
      if (n < 1024 * 1024) return (n / 1024).toFixed(1).replace(/\.0$/,'') + 'KB';
      return (n / 1024 / 1024).toFixed(1).replace(/\.0$/,'') + 'MB';
    },
    // AI 가 만든 파일 아이콘 (kind 별)
    artifactIcon(kind) {
      switch ((kind || '').toLowerCase()) {
        case 'excel': return '📊';
        case 'pdf': return '📄';
        case 'image': return '🖼️';
        case 'svg': return '🎨';
        case 'html': return '🌐';
        case 'markdown': return '📝';
        case 'json': return '📋';
        case 'csv': return '📈';
        case 'text': return '📝';
        default: return '📁';
      }
    },

    // Artifact 미리보기 모달
    artifactPreviewUrl(a) {
      if (!a) return '';
      if (a.previewUrl) return a.previewUrl;
      if (!a.url) return '';
      return a.url + (a.url.includes('?') ? '&' : '?') + 'inline=1';
    },

    artifactPreviewApiUrl(a) {
      if (!a || !a.id) return '';
      return '/api/ai/artifacts/' + encodeURIComponent(a.id) + '/preview';
    },

    escapeHtml(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    },

    sheetRowsToHtml(rows) {
      const list = Array.isArray(rows) ? rows : [];
      if (!list.length) return '<div style="color:#9ca3af;font-size:13px;">No preview rows.</div>';
      const maxCols = Math.max(...list.map(r => Array.isArray(r) ? r.length : 0), 0);
      const trs = list.map((row, ri) => {
        const cells = [];
        for (let c = 0; c < maxCols; c++) {
          const tag = ri === 0 ? 'th' : 'td';
          cells.push(`<${tag}>${this.escapeHtml(row && row[c])}</${tag}>`);
        }
        return `<tr>${cells.join('')}</tr>`;
      });
      return `<table>${trs.join('')}</table>`;
    },

    artifactModal: null,  // { url, name, kind, content, sheets, activeSheet }
    async openArtifactModal(a) {
      this.artifactModal = { ...a, content: '', loading: true, sheets: [], activeSheet: 0, html: '', svgDataUrl: '', svgError: false };
      try {
        if (['markdown', 'text', 'json', 'csv', 'excel', 'svg'].includes(a.kind)) {
          const d = await fetch(this.artifactPreviewApiUrl(a)).then(r => r.json());
          if (!d.ok) throw new Error(d.error || 'preview failed');
          if (a.kind === 'excel') {
            this.artifactModal.sheets = (d.sheets || []).map(s => ({
              name: s.name,
              html: this.sheetRowsToHtml(s.rows || []),
            }));
            this.artifactModal.activeSheet = 0;
          } else if (a.kind === 'svg') {
            this.artifactModal.content = d.content || '';
            if (this.artifactModal.content.trim()) {
              this.artifactModal.svgDataUrl = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(this.artifactModal.content);
            } else {
              this.artifactModal.svgDataUrl = d.previewUrl || this.artifactPreviewUrl(a);
            }
          } else {
            this.artifactModal.content = d.content || '';
          }
          this.artifactModal.loading = false;
          return;
        }
        if (['markdown', 'text', 'json', 'csv'].includes(a.kind)) {
          this.artifactModal.content = await fetch(a.url).then(r => r.text());
        } else if (a.kind === 'excel' && window.XLSX) {
          // 엑셀 → SheetJS 로 파싱 → HTML 테이블
          const buf = await fetch(a.url).then(r => r.arrayBuffer());
          const wb = XLSX.read(buf, { type: 'array' });
          this.artifactModal.sheets = wb.SheetNames.map(name => ({
            name,
            html: XLSX.utils.sheet_to_html(wb.Sheets[name], { editable: false }),
          }));
          this.artifactModal.activeSheet = 0;
        }
        this.artifactModal.loading = false;
      } catch (e) {
        this.artifactModal.content = '미리보기 실패: ' + e.message;
        this.artifactModal.loading = false;
      }
    },
    closeArtifactModal() { this.artifactModal = null; },

    // 간단 토스트 (alert 대체)
    _toast(msg) {
      try {
        const el = document.createElement('div');
        el.textContent = msg;
        el.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.2);max-width:80vw;';
        document.body.appendChild(el);
        setTimeout(() => { el.style.transition='opacity .3s'; el.style.opacity='0'; }, 2200);
        setTimeout(() => { try { el.remove(); } catch(_){} }, 2600);
      } catch(_) { alert(msg); }
    },

    // ── 업스케일 ──
    // force=true 면 캐시 무시 (서버 환경 변경 후 재진단)
    async loadUpscaleHealth(force = false) {
      if (!force && this.upscaleHealth !== null) return this.upscaleHealth;
      try {
        const r = await fetch('/api/ai/upscale/health?_t=' + Date.now());
        const d = await r.json();
        this.upscaleHealth = d;
        this.upscaleModels = d.models || [];
        const firstInstalled = this.upscaleModels.find(m => m.installed && m.recommended)
          || this.upscaleModels.find(m => m.installed);
        if (firstInstalled) this.upscaleModelKey = firstInstalled.key;
        return d;
      } catch(e) {
        this.upscaleHealth = { ok:false, ready:false, error:e.message };
        return this.upscaleHealth;
      }
    },

    toggleUpscalePicker(messageId) {
      this.upscalePickerOpen[messageId] = !this.upscalePickerOpen[messageId];
      // 한 번만 lazy load
      if (this.upscalePickerOpen[messageId]) this.loadUpscaleHealth();
    },

    selectUpscaleModel(key) {
      this.upscaleModelKey = key;
      this.upscaleAutoPick = false;
    },

    // 자동 추천: 메시지 프롬프트(유저 질문)에서 모델키 뽑기
    async autoRecommendModel(messageId) {
      // 직전 user 메시지의 content 를 힌트로
      const idx = this.currentMessages.findIndex(m => m.id === messageId);
      let hint = '';
      for (let i = idx - 1; i >= 0; i--) {
        const m = this.currentMessages[i];
        if (m.role === 'user' && m.content) { hint = m.content; break; }
      }
      try {
        const r = await fetch('/api/ai/upscale/recommend?hint=' + encodeURIComponent(hint));
        const d = await r.json();
        if (d.ok && d.model) this.upscaleModelKey = d.model;
      } catch(_){}
    },

    getModelInfo(key) {
      return this.upscaleModels.find(m => m.key === key) || null;
    },

    // 이미지 다운로드 (호버 ⬇ 버튼)
    async downloadImage(url, alt) {
      if (!url) return;
      try {
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const blob = await resp.blob();
        const fname = (alt ? String(alt).replace(/[^\w가-힣]+/g, '_').slice(0, 30) : 'ai_image')
          + '_' + new Date().toISOString().slice(0, 10) + '.png';
        const objUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = objUrl;
        a.download = fname;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(objUrl), 1000);
        this._toast('📥 다운로드: ' + fname);
      } catch (e) {
        this._toast('다운로드 실패: ' + e.message);
      }
    },

    // 업스케일 모달 열기 (호버 🔍 버튼)
    async openUpscaleModal(msg) {
      if (!msg || !msg.image_url) return;
      await this.loadUpscaleHealth(true);
      this.upscaleModal.open = true;
      this.upscaleModal.msgId = msg.id;
      this.upscaleModal.imageUrl = msg.image_url;
      this.upscaleModal.scale = 4;
      this.upscaleModal.useAuto = true;
      this.upscaleModal.running = false;
      this.upscaleModal.error = null;
      this.upscaleModal.elapsed = 0;
      this.upscaleModal.origSize = '— × —';
      this.upscaleModal.resultSize = '— × —';

      // 자동 추천 모델 미리 가져오기
      const hint = msg.content || '';
      try {
        const r = await fetch('/api/ai/upscale/recommend?hint=' + encodeURIComponent(hint));
        const d = await r.json();
        if (d.ok && d.model) this.upscaleModal.modelKey = d.model;
      } catch (_) {}

      // 원본 이미지 크기 측정
      const probe = new Image();
      probe.onload = () => {
        this.upscaleModal.origW = probe.naturalWidth;
        this.upscaleModal.origH = probe.naturalHeight;
        this.upscaleModal.origSize = probe.naturalWidth + ' × ' + probe.naturalHeight;
        this.updateUpscaleResult();
      };
      probe.src = msg.image_url;
    },

    closeUpscaleModal() {
      if (this.upscaleModal.running) return;  // 처리 중엔 닫기 차단
      this.upscaleModal.open = false;
      if (this.upscaleModal._timer) {
        clearInterval(this.upscaleModal._timer);
        this.upscaleModal._timer = null;
      }
    },

    updateUpscaleResult() {
      const { origW, origH, scale } = this.upscaleModal;
      if (origW && origH) {
        this.upscaleModal.resultSize = (origW * scale) + ' × ' + (origH * scale);
        const pixels = origW * origH * scale * scale;
        const sec = Math.max(15, Math.round(pixels / 250000));
        this.upscaleModal.estimatedTime = '약 ' + sec + '초';
      }
    },

    async runUpscaleFromModal() {
      const msg = this.currentMessages.find(m => m.id === this.upscaleModal.msgId);
      if (!msg) return;
      if (!this.upscaleHealth || !this.upscaleHealth.ready) {
        this.upscaleModal.error = (this.upscaleHealth && this.upscaleHealth.diagnosis) || '업스케일 도구 미설치';
        return;
      }
      this.upscaleModal.running = true;
      this.upscaleModal.error = null;
      this.upscaleModal.elapsed = 0;
      this.upscaleModal._timer = setInterval(() => { this.upscaleModal.elapsed++; }, 1000);

      const modelKey = this.upscaleModal.modelKey;
      const scale = this.upscaleModal.scale;

      const ctrl = new AbortController();
      const abortTimer = setTimeout(() => ctrl.abort(), 6 * 60 * 1000);

      try {
        const r = await fetch('/api/ai/upscale', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          signal: ctrl.signal,
          body: JSON.stringify({
            imageUrl: msg.image_url,
            model: modelKey,
            scale,
            threadId: this.currentThreadId,
          }),
        });
        clearTimeout(abortTimer);
        const d = await r.json();
        if (d.ok) {
          if (d.message) {
            const nm = d.message;
            try { nm.metadata_parsed = typeof nm.metadata === 'string' ? JSON.parse(nm.metadata) : (nm.metadata || {}); } catch(_) { nm.metadata_parsed = {}; }
            try { nm.attachments_parsed = typeof nm.attachments === 'string' ? JSON.parse(nm.attachments) : []; } catch(_) { nm.attachments_parsed = []; }
            this.currentMessages.push(nm);
            this.$nextTick(() => this.scrollToBottom());
          }
          this._toast('✅ ' + scale + '배 업스케일 완료');
          if (this.upscaleModal._timer) clearInterval(this.upscaleModal._timer);
          this.upscaleModal._timer = null;
          this.upscaleModal.running = false;
          this.upscaleModal.open = false;
        } else {
          this.upscaleModal.error = (d.error || '실패') + (d.hint ? ' — ' + d.hint : '');
          this.upscaleModal.running = false;
          if (this.upscaleModal._timer) clearInterval(this.upscaleModal._timer);
          this.upscaleModal._timer = null;
        }
      } catch (e) {
        clearTimeout(abortTimer);
        this.upscaleModal.error = e.name === 'AbortError'
          ? '6분 초과 — 서버에서 응답 없음'
          : e.message;
        this.upscaleModal.running = false;
        if (this.upscaleModal._timer) clearInterval(this.upscaleModal._timer);
        this.upscaleModal._timer = null;
      }
    },

    async runUpscale(msg) {
      console.log('[upscale] runUpscale called', { msgId: msg?.id, hasImage: !!msg?.image_url });
      if (!msg || !msg.image_url) {
        this._toast('이미지가 없어 업스케일 불가 (msg.image_url 누락)');
        console.warn('[upscale] no image_url on msg:', msg);
        return;
      }
      // 이전 시도가 stuck 일 수 있으니 강제 리셋
      this.upscaleStatus[msg.id] = null;
      this.$nextTick(() => { delete this.upscaleStatus[msg.id]; });
      // 누를 때마다 health 새로 — 캐시 안 함 (설치 후 즉시 인식)
      await this.loadUpscaleHealth(true);
      if (!this.upscaleHealth || !this.upscaleHealth.ready) {
        const diag = this.upscaleHealth?.diagnosis || '업스케일 도구 미설치';
        this.upscaleStatus[msg.id] = { loading:false, error: diag };
        this._toast('🔧 ' + diag);
        return;
      }
      if (this.upscaleAutoPick) await this.autoRecommendModel(msg.id);

      // 모델 선택 검증 — 미설치 모델로 보내면 503
      const selectedModel = this.upscaleModels.find(m => m.key === this.upscaleModelKey);
      if (selectedModel && !selectedModel.installed) {
        const installedRec = this.upscaleModels.find(m => m.installed && m.recommended)
          || this.upscaleModels.find(m => m.installed);
        if (installedRec) {
          this.upscaleModelKey = installedRec.key;
        } else {
          this.upscaleStatus[msg.id] = { loading:false, error: '설치된 업스케일 모델이 없음' };
          this._toast('설치된 업스케일 모델이 없음');
          return;
        }
      }

      this.upscaleStatus[msg.id] = { loading: true, model: this.upscaleModelKey, scale: this.upscaleScale };
      this.upscalePickerOpen[msg.id] = false;

      // 6분 후 강제 abort — 서버 timeout 5분 + 여유 1분
      const ctrl = new AbortController();
      const abortTimer = setTimeout(() => ctrl.abort(), 6 * 60 * 1000);

      try {
        const r = await fetch('/api/ai/upscale', {
          method:'POST',
          headers: { 'Content-Type':'application/json' },
          signal: ctrl.signal,
          body: JSON.stringify({
            imageUrl: msg.image_url,
            model: this.upscaleModelKey,
            scale: this.upscaleScale,
            threadId: this.currentThreadId,    // 서버가 새 메시지로 저장하도록
          })
        });
        clearTimeout(abortTimer);
        const d = await r.json();
        if (d.ok) {
          // 원본 메시지의 업스케일 상태는 "완료"만 표시 — 이미지 자체는 교체 안 함
          this.upscaleStatus[msg.id] = { loading:false, done:true, model: d.model, scale: d.scale, cached: d.cached, url: d.url };
          // 서버가 새 AI 메시지를 만들었으면 채팅창에 추가
          if (d.message) {
            const nm = d.message;
            // metadata 파싱 (openThread 와 동일)
            try {
              nm.metadata_parsed = typeof nm.metadata === 'string' ? JSON.parse(nm.metadata) : (nm.metadata || {});
            } catch(_) { nm.metadata_parsed = {}; }
            try {
              nm.attachments_parsed = typeof nm.attachments === 'string' ? JSON.parse(nm.attachments) : [];
            } catch(_) { nm.attachments_parsed = []; }
            this.currentMessages.push(nm);
            this.$nextTick(() => this.scrollToBottom());
          }
          this._toast(`${this.upscaleScale}배 업스케일 완료 (${(d.model && d.model.name) || ''})`);
        } else {
          const err = d.error || '업스케일 실패';
          const hint = d.hint ? ' — ' + d.hint : '';
          this.upscaleStatus[msg.id] = { loading:false, error: err + hint };
          this._toast('❌ ' + err + hint);
          console.error('[upscale] 실패:', d);
        }
      } catch(e) {
        clearTimeout(abortTimer);
        const errMsg = e.name === 'AbortError'
          ? '업스케일 6분 초과 — 서버에서 응답 없음. Real-ESRGAN 미설치/서버 다운 가능성'
          : e.message;
        this.upscaleStatus[msg.id] = { loading:false, error: errMsg };
        this._toast('업스케일 실패: ' + errMsg);
        console.error('[upscale] 네트워크 오류:', e);
      }
    },

    onEnter(e) {
      if (e.shiftKey) {
        // 줄바꿈 허용
        const pos = e.target.selectionStart;
        this.draft = this.draft.slice(0, pos) + '\n' + this.draft.slice(pos);
        this.$nextTick(() => {
          e.target.selectionStart = e.target.selectionEnd = pos + 1;
          this.autoGrow(e);
        });
        return;
      }
      this.send();
    },

    autoGrow(e) {
      const ta = e.target;
      ta.style.height = 'auto';
      ta.style.height = Math.min(ta.scrollHeight, 200) + 'px';
    },

    async send() {
      const prompt = this.cleanMsgText(this.draft);
      if (!prompt || this.loading || this.agentRunning) return;
      if (!this.aiReady) {
        alert('AI 기능이 서버에서 비활성화 상태입니다. 서버 관리자에게 문의하세요.');
        return;
      }

      if (this.agentMode) {
        return this.sendAgent(prompt);
      }
      if (this.imageMode) {
        return this.sendImage(prompt);
      }

      this.loading = true;

      // 낙관적 UI: 유저 메시지 즉시 추가
      const userMsg = {
        id: 'tmp-' + Date.now(),
        role: 'user',
        kind: 'text',
        content: prompt,
        created_at: new Date(Date.now()+9*3600*1000).toISOString().replace('T',' ').slice(0,19),
        attachments_parsed: this.pendingAttachments.map(a => ({ id:a.id, original_name:a.original_name }))
      };
      this.currentMessages.push(userMsg);
      const attIds = this.pendingAttachments.map(a => a.id);
      const projectId = this.currentProjectId;
      this.draft = '';
      // textarea 높이 초기화
      this.$nextTick(() => {
        if (this.$refs.inputArea) this.$refs.inputArea.style.height = 'auto';
        this.scrollToBottom();
      });

      try {
        const res = await fetch('/api/ai/chat', {
          method:'POST',
          headers: { 'Content-Type':'application/json' },
          body: JSON.stringify({
            threadId: this.currentThreadId || null,
            projectId: projectId,
            prompt: prompt,
            attachmentIds: attIds,
            model: this.selectedModel || undefined,
          })
        });
        const d = await res.json();
        if (d.ok) {
          if (d.threadId) {
            await this.openThread(d.threadId);
            try { localStorage.setItem('aiTab:lastThreadId', String(d.threadId)); } catch(e){}
          }
          await this.loadThreads();
          this.pendingAttachments = [];
          // 사용량 뱃지 갱신 (모드 무관 — 항상)
          this.loadUsageToday();
          // 파일 생성되면 토스트
          if (Array.isArray(d.artifacts) && d.artifacts.length > 0) {
            this._toast(`📎 ${d.artifacts.length}개 파일이 생성되었습니다 — 대화창 하단 확인`);
          }
        } else {
          // 낙관적으로 추가한 유저 메시지 제거 (서버엔 저장 안됐으므로)
          this.currentMessages = this.currentMessages.filter(m => m.id !== userMsg.id);
          // 권한 에러(403/NOT_OWNER): 토스트 + 입력창 복구로 새 대화 시작 유도
          if (res.status === 403 || d.code === 'NOT_OWNER') {
            if (this._toast) this._toast(d.error || '권한이 없는 대화입니다. 새 대화를 시작해주세요.');
            this.draft = prompt;
          } else if (res.status === 429 || d.code === 'DAILY_LIMIT') {
            if (this._toast) this._toast(d.error || '오늘 AI 사용 한도에 도달했습니다.');
            this.draft = prompt;
          } else {
            // 그 외 에러는 AI 답변이 아닌 시스템 에러 배너로 명확히 표시
            this.currentMessages.push({
              id: 'err-' + Date.now(),
              role: 'system', kind:'error',
              content: d.error || 'AI 요청 실패',
              status: 'error',
              created_at: new Date(Date.now()+9*3600*1000).toISOString().replace('T',' ').slice(0,19)
            });
          }
        }
      } catch(e) {
        this.currentMessages = this.currentMessages.filter(m => m.id !== userMsg.id);
        this.currentMessages.push({
          id: 'err-' + Date.now(),
          role: 'system', kind:'error',
          content: '서버 연결 실패: ' + e.message,
          status: 'error',
          created_at: new Date(Date.now()+9*3600*1000).toISOString().replace('T',' ').slice(0,19)
        });
      }
      this.loading = false;
      this.$nextTick(() => this.scrollToBottom());
    },

    async sendImage(prompt) {
      this.loading = true;

      // 참고 이미지 (이미지 첨부만) 추출
      const imageAttachments = this.pendingAttachments.filter(a => a.kind === 'image');
      const attIds = imageAttachments.map(a => a.id);
      const isEdit = attIds.length > 0;

      // 낙관적 UI: 유저 메시지
      const userMsg = {
        id: 'tmp-' + Date.now(),
        role: 'user',
        kind: 'text',
        content: (isEdit ? '🎨 ✏️ ' : '🎨 ') + prompt,
        created_at: new Date(Date.now()+9*3600*1000).toISOString().replace('T',' ').slice(0,19),
        attachments_parsed: imageAttachments.map(a => ({ id:a.id, original_name:a.original_name, kind:a.kind }))
      };
      this.currentMessages.push(userMsg);
      const projectId = this.currentProjectId;
      this.draft = '';
      this.$nextTick(() => {
        if (this.$refs.inputArea) this.$refs.inputArea.style.height = 'auto';
        this.scrollToBottom();
      });

      try {
        const res = await fetch('/api/ai/chat-image', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            threadId: this.currentThreadId || null,
            projectId: projectId,
            prompt: prompt,
            attachmentIds: attIds,
            quality: this.imageQuality || 'medium'
          })
        });
        const d = await res.json();
        if (d.ok) {
          if (d.threadId) {
            await this.openThread(d.threadId);
            try { localStorage.setItem('aiTab:lastThreadId', String(d.threadId)); } catch(e){}
          }
          await this.loadThreads();
          this.pendingAttachments = [];
        } else {
          this.currentMessages.push({
            id: 'err-' + Date.now(),
            role: 'assistant', kind:'text',
            content: d.error || '이미지 생성 실패' + (d.hint ? ' — ' + d.hint : ''),
            status: 'error',
            created_at: new Date(Date.now()+9*3600*1000).toISOString().replace('T',' ').slice(0,19)
          });
        }
      } catch(e) {
        this.currentMessages.push({
          id: 'err-' + Date.now(),
          role: 'assistant', kind:'text',
          content: '이미지 생성 실패: ' + e.message,
          status: 'error',
          created_at: new Date(Date.now()+9*3600*1000).toISOString().replace('T',' ').slice(0,19)
        });
      }
      this.loading = false;
      this.$nextTick(() => this.scrollToBottom());
    },

    // ──────────────────────────────────────────────────────
    // 🤖 Agent 모드 — Claude CLI 가 격리된 workspace 에서 도구 자유 사용
    //   엑셀 처리, Python 실행, 파일 생성, ERP 조회, 이미지 생성 등 자율 작업
    //   SSE 스트리밍으로 진행상황을 실시간 표시
    // ──────────────────────────────────────────────────────
    async sendAgent(prompt) {
      if (this.agentRunning) return;
      const attCountForConsent = this.pendingAttachments.length;
      const ok = confirm(
        'Agent 작업 세션을 시작할까요?\n\n' +
        '- 격리된 작업공간에서 파일을 읽고 결과 파일을 만들 수 있습니다.\n' +
        '- 첨부파일 ' + attCountForConsent + '개가 세션 작업공간으로 복사됩니다.\n' +
        '- 작업 중 생성된 파일은 대화창에서 바로 미리보기/다운로드할 수 있습니다.'
      );
      if (!ok) return;
      this.agentRunning = true;
      this.agentEvents = [];
      this.agentSessionInfo = null;

      // 첨부 파일 ID
      const attIds = this.pendingAttachments.map(a => a.id);

      // 낙관적 UI: 사용자 메시지 추가
      const userMsg = {
        id: 'tmp-' + Date.now(),
        role: 'user', kind: 'text',
        content: '🤖 ' + prompt,
        created_at: new Date(Date.now()+9*3600*1000).toISOString().replace('T',' ').slice(0,19),
        attachments_parsed: this.pendingAttachments.map(a => ({ id:a.id, original_name:a.original_name, kind:a.kind }))
      };
      this.currentMessages.push(userMsg);

      // 진행상황 메시지 (살아있는 동안 계속 업데이트)
      const liveMsgId = 'live-' + Date.now();
      const liveMsg = {
        id: liveMsgId,
        role: 'assistant', kind: 'agent',
        content: '🤖 작업 시작 중...',
        agentOutput: '',
        agentFiles: [],
        agentStatus: 'running',
        created_at: new Date(Date.now()+9*3600*1000).toISOString().replace('T',' ').slice(0,19)
      };
      this.currentMessages.push(liveMsg);

      this.draft = '';
      this.$nextTick(() => {
        if (this.$refs.inputArea) this.$refs.inputArea.style.height = 'auto';
        this.scrollToBottom();
      });

      // SSE 는 fetch 로 직접 처리 (EventSource 는 POST 안 됨)
      const ctrl = new AbortController();
      this._agentAbort = ctrl;
      try {
        const resp = await fetch('/api/ai/agent/run', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            task: prompt,
            attachmentIds: attIds,
            threadId: this.currentThreadId || null,
            projectId: this.currentProjectId || null,
            sessionConsent: true,
          }),
          signal: ctrl.signal,
        });
        if (!resp.ok) {
          const t = await resp.text();
          throw new Error('HTTP ' + resp.status + ': ' + t.slice(0, 200));
        }
        if (!resp.body) throw new Error('SSE 본문 없음');

        // 자체 SSE 파서
        const reader = resp.body.getReader();
        const decoder = new TextDecoder('utf-8');
        let buffer = '';
        let currentEvent = 'message';
        let userId = (this.getAuth && this.getAuth().userId) || 'anon';
        let sessionId = null;

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split(/\r?\n/);
          buffer = lines.pop() || '';
          for (const line of lines) {
            if (line.startsWith(':')) continue;
            if (line.startsWith('event: ')) { currentEvent = line.slice(7).trim(); continue; }
            if (line.startsWith('data: ')) {
              const dataStr = line.slice(6);
              try {
                const data = JSON.parse(dataStr);
                this._onAgentEvent(currentEvent, data, liveMsg);
                if (data.sessionId) sessionId = data.sessionId;
                if (currentEvent === 'done') {
                  this.agentSessionInfo = { ...data, userId };
                }
              } catch(e) { console.warn('[agent] SSE parse:', e, dataStr); }
              currentEvent = 'message';
            }
          }
          this.$nextTick(() => this.scrollToBottom());
        }

        liveMsg.agentStatus = 'done';
        if (!liveMsg.content || liveMsg.content === '🤖 작업 시작 중...') {
          liveMsg.content = '✓ 작업 완료';
        }
        this.pendingAttachments = [];
      } catch (e) {
        if (e.name === 'AbortError') {
          liveMsg.agentStatus = 'cancelled';
          liveMsg.content = '⏹️ 작업 취소됨';
        } else {
          liveMsg.agentStatus = 'error';
          liveMsg.content = '❌ ' + e.message;
        }
      } finally {
        this.agentRunning = false;
        this._agentAbort = null;
        this.$nextTick(() => this.scrollToBottom());
        // 사용량 갱신
        this.loadUsageToday && this.loadUsageToday();
      }
    },

    _onAgentEvent(type, data, liveMsg) {
      switch (type) {
        case 'queued':
          if (data.waiting > 0) liveMsg.content = `⏳ 대기 중 (앞에 ${data.waiting}개 작업)`;
          else liveMsg.content = '🚀 시작합니다';
          break;
        case 'started':
          liveMsg.content = '🤖 작업 중...';
          liveMsg.sessionId = data.sessionId;
          // 백엔드가 만든 thread 가 있으면 채팅 컨텍스트로 등록
          if (data.threadId && !this.currentThreadId) {
            this.currentThreadId = data.threadId;
            try { localStorage.setItem('aiTab:lastThreadId', String(data.threadId)); } catch(e) {}
          }
          if (data.attachments && data.attachments.length) {
            liveMsg.agentOutput += '📎 첨부파일: ' + data.attachments.join(', ') + '\n\n';
          }
          break;
        case 'saved':
          // 결과가 DB 에 저장됨 → 스레드 목록 갱신 + 메시지 ID 매칭
          liveMsg.savedMessageId = data.messageId;
          if (data.threadId) {
            this.loadThreads && this.loadThreads();
          }
          break;
        case 'output':
          liveMsg.agentOutput += data.text || '';
          // 미리보기로 마지막 200자 노출
          const tail = liveMsg.agentOutput.slice(-200).trim();
          if (tail) liveMsg.content = '🤖 ' + tail.slice(-80);
          break;
        case 'stderr':
          // stderr는 보조 정보로만
          break;
        case 'file':
          liveMsg.agentFiles.push({ ...data, isNew: true });
          liveMsg.content = `📂 ${data.name} 생성됨`;
          break;
        case 'done':
          liveMsg.agentStatus = 'done';
          liveMsg.content = `✅ 완료 (${data.files?.length || 0}개 파일, ${Math.round((data.durationMs||0)/1000)}초)`;
          liveMsg.agentFiles = data.files || liveMsg.agentFiles;
          liveMsg.sessionId = data.sessionId;
          liveMsg.userIdForFile = (this.getAuth && this.getAuth().userId) || 'anon';
          break;
        case 'error':
          liveMsg.agentStatus = 'error';
          liveMsg.content = '❌ ' + (data.message || '알 수 없는 에러');
          if (data.files) liveMsg.agentFiles = data.files;
          break;
      }
    },

    cancelAgent() {
      if (this._agentAbort) {
        try { this._agentAbort.abort(); } catch(_) {}
      }
    },

    agentFileUrl(msg, file) {
      const userId = msg.userIdForFile || ((this.getAuth && this.getAuth().userId) || 'anon');
      return '/api/ai/agent/file/' + encodeURIComponent(userId) + '/' + encodeURIComponent(msg.sessionId) + '/' + encodeURIComponent(file.relPath);
    },

    isPreviewable(file) {
      const ext = (file.ext || '').toLowerCase();
      return ['.png','.jpg','.jpeg','.gif','.webp','.bmp','.pdf','.txt','.md','.csv','.json','.svg','.html'].includes(ext);
    },

    scrollToBottom() {
      try {
        const body = document.querySelector('.ai-body');
        if (body) body.scrollTop = body.scrollHeight;
      } catch(e) {}
    },

    // ── 프로젝트 모달 ──
    openProjectModal(project) {
      if (project) {
        this.projectForm = {
          id: project.id,
          name: project.name || '',
          emoji: project.emoji || '📁',
          description: project.description || '',
          share_mode: project.share_mode || 'private',
          member_ids: Array.isArray(project.member_ids) ? [...project.member_ids] : []
        };
      } else {
        this.projectForm = { id:null, name:'', emoji:'📁', description:'', share_mode:'private', member_ids:[] };
      }
      this.loadShareUserList();
      this.showProjectModal = true;
    },

    closeProjectModal() {
      this.showProjectModal = false;
    },

    async loadShareUserList() {
      if (this.shareUserList && this.shareUserList.length) return;
      try {
        // AI 라우터의 /users 엔드포인트 (기존 /api/workspace/users 와 동일 형식)
        const r = await fetch('/api/ai/users');
        const d = await r.json();
        if (d.ok && Array.isArray(d.users)) { this.shareUserList = d.users; return; }
      } catch(e) {}
      // 폴백: 워크스페이스 엔드포인트
      try {
        const r = await fetch('/api/workspace/users');
        const d = await r.json();
        if (d.ok) this.shareUserList = d.users;
      } catch(e) {}
    },

    toggleProjectMember(userId) {
      const idx = this.projectForm.member_ids.indexOf(userId);
      if (idx >= 0) this.projectForm.member_ids.splice(idx, 1);
      else this.projectForm.member_ids.push(userId);
    },

    async saveProject() {
      if (!this.projectForm.name.trim()) return;
      try {
        const isEdit = !!this.projectForm.id;
        const url = isEdit ? ('/api/ai/projects/' + this.projectForm.id) : '/api/ai/projects';
        const method = isEdit ? 'PUT' : 'POST';
        const r = await fetch(url, {
          method,
          headers: { 'Content-Type':'application/json' },
          body: JSON.stringify({
            name: this.projectForm.name.trim(),
            emoji: this.projectForm.emoji || '📁',
            description: this.projectForm.description || '',
            share_mode: this.projectForm.share_mode || 'private',
            member_ids: this.projectForm.member_ids || []
          })
        });
        const d = await r.json();
        if (d.ok) {
          this.showProjectModal = false;
          await this.loadProjects();
        } else {
          alert(d.error || '저장 실패');
        }
      } catch(e) { alert('저장 실패: ' + e.message); }
    },

    async deleteProject() {
      if (!this.projectForm.id) return;
      if (!confirm('이 프로젝트를 삭제할까요? (소속 대화는 프로젝트 없음으로 이동됩니다)')) return;
      try {
        const r = await fetch('/api/ai/projects/' + this.projectForm.id, { method:'DELETE' });
        const d = await r.json();
        if (d.ok) {
          this.showProjectModal = false;
          if (this.currentProjectId === this.projectForm.id) this.currentProjectId = null;
          await this.loadProjects();
          await this.loadThreads();
        } else {
          alert(d.error || '삭제 실패');
        }
      } catch(e) { alert('삭제 실패: ' + e.message); }
    },

    formatDate(d) {
      if (!d) return '';
      const date = new Date(d);
      const now = new Date();
      const diff = now - date;
      if (diff < 60000) return '방금 전';
      if (diff < 3600000) return Math.floor(diff/60000) + '분 전';
      if (diff < 86400000) return Math.floor(diff/3600000) + '시간 전';
      if (diff < 604800000) return Math.floor(diff/86400000) + '일 전';
      return String(d).slice(0,10);
    }
  };
}
</script>
</div>
