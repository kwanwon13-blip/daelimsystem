<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📌 메모 — 대림에스엠</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Editor.js + plugins (워크스페이스와 동일) -->
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/editorjs@2.29.1/dist/editorjs.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/header@2.8.7/dist/header.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/checklist@1.6.0/dist/checklist.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/list@1.9.0/dist/list.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/delimiter@1.4.2/dist/delimiter.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/quote@2.7.2/dist/quote.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/marker@1.4.0/dist/marker.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/image@2.9.0/dist/image.umd.js"></script>
  <script src="/workspace-blocks.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    /* ─── 색상 테마 변수 — 데스크탑 위젯 스타일 (헤더는 톤다운, 본문이 색 면적 차지) ─── */
    :root {
      --memo-bg: #fffbeb;
      --memo-header-bg: #fff8d6;        /* 본문보다 살짝 진한 단색 */
      --memo-header-border: rgba(245,158,11,.18);
      --memo-header-fg: #78350f;
      --memo-status-bg: rgba(255,255,255,.7);
      --memo-status-fg: #92400e;
      --memo-text: #1f2937;
      --memo-footer-bg: rgba(255,251,235,.6);
      --memo-footer-border: rgba(245,158,11,.15);
      --memo-footer-fg: #92400e;
    }
    body[data-color="pink"] {
      --memo-bg: #fff1f2;
      --memo-header-bg: #ffe4e6;
      --memo-header-border: rgba(244,63,94,.18);
      --memo-header-fg: #881337;
      --memo-footer-bg: rgba(255,241,242,.6);
      --memo-footer-border: rgba(244,63,94,.15);
      --memo-footer-fg: #9f1239;
    }
    body[data-color="blue"] {
      --memo-bg: #eff6ff;
      --memo-header-bg: #dbeafe;
      --memo-header-border: rgba(59,130,246,.18);
      --memo-header-fg: #1e3a8a;
      --memo-footer-bg: rgba(239,246,255,.6);
      --memo-footer-border: rgba(59,130,246,.15);
      --memo-footer-fg: #1e40af;
    }
    body[data-color="green"] {
      --memo-bg: #f0fdf4;
      --memo-header-bg: #dcfce7;
      --memo-header-border: rgba(34,197,94,.18);
      --memo-header-fg: #14532d;
      --memo-footer-bg: rgba(240,253,244,.6);
      --memo-footer-border: rgba(34,197,94,.15);
      --memo-footer-fg: #166534;
    }
    body[data-color="purple"] {
      --memo-bg: #faf5ff;
      --memo-header-bg: #f3e8ff;
      --memo-header-border: rgba(168,85,247,.18);
      --memo-header-fg: #581c87;
      --memo-footer-bg: rgba(250,245,255,.6);
      --memo-footer-border: rgba(168,85,247,.15);
      --memo-footer-fg: #6b21a8;
    }
    body[data-color="white"] {
      --memo-bg: #ffffff;
      --memo-header-bg: #f9fafb;
      --memo-header-border: rgba(156,163,175,.2);
      --memo-header-fg: #1f2937;
      --memo-footer-bg: rgba(249,250,251,.7);
      --memo-footer-border: rgba(156,163,175,.18);
      --memo-footer-fg: #4b5563;
    }
    body[data-color="dark"] {
      --memo-bg: #1f2937;
      --memo-header-bg: #111827;
      --memo-header-border: rgba(255,255,255,.08);
      --memo-header-fg: #f3f4f6;
      --memo-text: #e5e7eb;
      --memo-footer-bg: rgba(17,24,39,.6);
      --memo-footer-border: rgba(255,255,255,.06);
      --memo-footer-fg: #d1d5db;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--memo-bg);
      color: var(--memo-text);
      font-size: 13.5px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background-color .2s, opacity .2s;
    }

    /* ─── 투명도 모드 (호버 시 진해짐) ─── */
    body[data-opacity="80"]:not(:hover) { opacity: 0.8; }
    body[data-opacity="60"]:not(:hover) { opacity: 0.6; }
    body[data-opacity="40"]:not(:hover) { opacity: 0.4; }

    /* ─── 미니 모드 — 본문 숨기고 헤더만 (제목+복원버튼+닫기) ─── */
    body[data-mini="1"] .memo-body,
    body[data-mini="1"] .memo-footer,
    body[data-mini="1"] .color-palette { display: none !important; }
    body[data-mini="1"] .memo-header {
      border-bottom: none;
      min-height: 28px;
    }
    /* 미니 모드: opacityBtn / colorBtn / aotBtn / icon / status 전부 숨김. 제목 + ⤢ + ✕ 만 */
    body[data-mini="1"] #opacityBtn,
    body[data-mini="1"] #colorBtn,
    body[data-mini="1"] #aotBtn,
    body[data-mini="1"] .memo-header .icon,
    body[data-mini="1"] .memo-status { display: none !important; }
    body[data-mini="1"] html,
    body[data-mini="1"] body {
      overflow: hidden;
      height: auto !important;
      min-height: 0 !important;
    }
    body[data-mini="1"] {
      display: block;
    }

    /* ─── 데스크탑 모드 (Electron) — 윈도우 자체 frameless / 드래그 활성 ─── */
    body.desktop-mode .memo-header {
      -webkit-app-region: drag;  /* Electron 윈도우 드래그 — 헤더 전체 */
      min-height: 28px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
      position: sticky;
      top: 0;
      z-index: 100;
      cursor: move;
    }
    /* 데스크탑 모드: 제목 div(read-only) 도 drag 가능. input 으로 바뀐 동안에만 no-drag */
    body.desktop-mode .memo-title-display {
      -webkit-app-region: drag;
      cursor: move;
    }
    /* 버튼/인풋(편집 중)/스테이터스/팔레트 만 no-drag */
    body.desktop-mode .memo-header button,
    body.desktop-mode .memo-header input,
    body.desktop-mode .memo-header .memo-status,
    body.desktop-mode .color-palette,
    body.desktop-mode .memo-body,
    body.desktop-mode .memo-footer {
      -webkit-app-region: no-drag;
      cursor: auto;
    }
    body.desktop-mode .memo-btn { cursor: pointer; }
    /* 푸터 데스크탑 모드 */
    body.desktop-mode .memo-footer { font-size: 10px; padding: 4px 10px; }

    /* ─── 헤더 — 슬림한 데스크탑 위젯 스타일 ─── */
    .memo-header {
      background: var(--memo-header-bg);
      padding: 3px 6px 3px 8px;
      display: flex;
      align-items: center;
      gap: 2px;
      border-bottom: 1px solid var(--memo-header-border);
      flex-shrink: 0;
      min-height: 26px;
      -webkit-app-region: drag;
    }
    .memo-header .icon {
      font-size: 10px;
      opacity: .55;
      -webkit-app-region: no-drag;
    }
    .memo-title-input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 12px;
      font-weight: 700;
      color: var(--memo-header-fg);
      outline: none;
      min-width: 0;
      padding: 0 4px;
      -webkit-app-region: no-drag;
    }
    .memo-title-input::placeholder { color: var(--memo-header-fg); opacity: .5; }
    .memo-title-display {
      flex: 1;
      font-size: 12px;
      font-weight: 700;
      color: var(--memo-header-fg);
      padding: 0 4px;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      user-select: none;
    }
    .memo-status {
      font-size: 8.5px;
      color: var(--memo-status-fg);
      padding: 1px 5px;
      background: var(--memo-status-bg);
      border-radius: 6px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .memo-status.saving { color: #4f6ef7; background: rgba(79,110,247,.15); }
    .memo-status.saved  { color: #16a34a; background: rgba(22,163,74,.12); }
    .memo-status.error  { color: #dc2626; background: rgba(220,38,38,.12); }

    .memo-btn {
      font-size: 11px;
      cursor: pointer;
      color: var(--memo-header-fg);
      background: none;
      border: none;
      padding: 2px 4px;
      border-radius: 3px;
      flex-shrink: 0;
      line-height: 1;
    }
    .memo-btn:hover { background: rgba(255,255,255,.5); }

    /* 색상 팔레트 */
    .color-palette {
      position: absolute;
      top: 36px;
      right: 50px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 8px;
      display: none;
      gap: 6px;
      box-shadow: 0 8px 24px rgba(0,0,0,.15);
      z-index: 100;
    }
    .color-palette.open { display: flex; }
    .color-swatch {
      width: 22px; height: 22px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform .1s, border-color .15s;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.active { border-color: #4f6ef7; }
    .cs-yellow { background: linear-gradient(135deg, #fde68a, #fcd34d); }
    .cs-pink   { background: linear-gradient(135deg, #fecdd3, #fda4af); }
    .cs-blue   { background: linear-gradient(135deg, #bfdbfe, #93c5fd); }
    .cs-green  { background: linear-gradient(135deg, #bbf7d0, #86efac); }
    .cs-purple { background: linear-gradient(135deg, #e9d5ff, #d8b4fe); }
    .cs-white  { background: linear-gradient(135deg, #f3f4f6, #e5e7eb); }
    .cs-dark   { background: linear-gradient(135deg, #4b5563, #1f2937); }

    /* ─── 본문 (Editor.js) ─── */
    .memo-body {
      flex: 1;
      padding: 8px 4px 8px 4px;
      overflow-y: auto;
      color: var(--memo-text);
    }
    /* Editor.js 미니 모드 — 기본 패딩 줄임 */
    .codex-editor { padding: 0 !important; }
    .codex-editor__redactor { padding-bottom: 80px !important; }
    .ce-block__content,
    .ce-toolbar__content { max-width: 100% !important; padding: 0 8px; }
    .ce-paragraph { line-height: 1.6; font-size: 13px; }
    .ce-header { line-height: 1.3; }
    h2.ce-header { font-size: 17px; }
    h3.ce-header { font-size: 14.5px; }
    .ce-block { margin: 0; }
    .ce-toolbar__plus { color: var(--memo-header-fg); }
    .ce-toolbar__settings-btn { color: var(--memo-header-fg); }
    /* 다크 모드: Editor.js 텍스트 색상 보정 */
    body[data-color="dark"] .ce-paragraph,
    body[data-color="dark"] .ce-header,
    body[data-color="dark"] .cdx-checklist__item-text,
    body[data-color="dark"] .cdx-list__item,
    body[data-color="dark"] .cdx-quote__text {
      color: #e5e7eb;
    }

    /* ─── 푸터 ─── */
    .memo-footer {
      padding: 5px 10px;
      font-size: 9.5px;
      color: var(--memo-footer-fg);
      border-top: 1px solid var(--memo-footer-border);
      background: var(--memo-footer-bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-shrink: 0;
    }
    .memo-footer a { color: #4f6ef7; text-decoration: none; }
    .memo-footer a:hover { text-decoration: underline; }
    body[data-color="dark"] .memo-footer a { color: #93c5fd; }

    /* 에러/로딩 화면 */
    .memo-error, .memo-loading {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
      color: #6b7280;
      gap: 8px;
    }
    .memo-error .ic { font-size: 32px; opacity: .5; }
    .memo-error .msg { font-size: 13px; font-weight: 600; }
    .memo-error .hint { font-size: 11px; color: #9ca3af; }
  </style>
</head>
<body data-color="yellow">
  <div class="memo-header">
    <span class="icon">📌</span>
    <div class="memo-title-display" id="titleDisplay" title="더블클릭하여 편집">제목 없음</div>
    <input class="memo-title-input" id="title" placeholder="제목 없음" style="display:none;" />
    <span class="memo-status" id="status">대기</span>
    <button class="memo-btn" id="opacityBtn" title="투명도 (호버 시 다시 진해짐)">👁</button>
    <button class="memo-btn" id="colorBtn" title="색상 변경">🎨</button>
    <button class="memo-btn" id="miniBtn" title="미니/원래 크기 토글">▭</button>
    <button class="memo-btn" id="closeBtn" title="창 닫기 (페이지는 저장됨)">×</button>
  </div>

  <!-- 색상 팔레트 -->
  <div class="color-palette" id="colorPalette">
    <div class="color-swatch cs-yellow" data-color="yellow" title="노랑"></div>
    <div class="color-swatch cs-pink"   data-color="pink"   title="핑크"></div>
    <div class="color-swatch cs-blue"   data-color="blue"   title="파랑"></div>
    <div class="color-swatch cs-green"  data-color="green"  title="초록"></div>
    <div class="color-swatch cs-purple" data-color="purple" title="보라"></div>
    <div class="color-swatch cs-white"  data-color="white"  title="화이트"></div>
    <div class="color-swatch cs-dark"   data-color="dark"   title="다크"></div>
  </div>

  <div class="memo-body" id="body">
    <div class="memo-loading">불러오는 중...</div>
  </div>

  <div class="memo-footer">
    <span>💡 항상 위: <b>Win+Ctrl+T</b> (PowerToys)</span>
    <a href="#" id="openInApp" title="ERP 앱에서 전체 편집기로 열기">전체 편집 ↗</a>
  </div>

<script>
(() => {
  const params = new URLSearchParams(location.search);
  const pageId = params.get('id') || (location.pathname.split('/').pop());
  const titleEl = document.getElementById('title');
  const titleDisplay = document.getElementById('titleDisplay');
  const bodyEl = document.getElementById('body');
  const statusEl = document.getElementById('status');
  const colorBtn = document.getElementById('colorBtn');
  const colorPalette = document.getElementById('colorPalette');
  const closeBtn = document.getElementById('closeBtn');
  const openInApp = document.getElementById('openInApp');

  // 제목 표시 ↔ 편집 모드 토글 (드래그 영역 보존)
  function syncTitleDisplay() {
    titleDisplay.textContent = titleEl.value || '제목 없음';
  }
  function enterTitleEdit() {
    titleDisplay.style.display = 'none';
    titleEl.style.display = '';
    titleEl.style.flex = '1';
    titleEl.focus();
    titleEl.select();
  }
  function exitTitleEdit() {
    titleEl.style.display = 'none';
    titleDisplay.style.display = '';
    syncTitleDisplay();
  }
  titleDisplay.addEventListener('dblclick', (e) => { e.stopPropagation(); enterTitleEdit(); });
  titleEl.addEventListener('blur', exitTitleEdit);
  titleEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); titleEl.blur(); }
    if (e.key === 'Escape') { e.preventDefault(); titleEl.blur(); }
  });
  titleEl.addEventListener('input', syncTitleDisplay);

  // ── 데스크탑 모드 감지 (Electron 앱에서 ?desktop=1 로 실행) ──
  const isDesktop = params.get('desktop') === '1' || (window.electronAPI && window.electronAPI.isDesktopApp);
  if (isDesktop) {
    document.body.classList.add('desktop-mode');
    // 푸터 안내 변경 (Electron 에선 항상 위가 진짜 동작)
    const footHint = document.querySelector('.memo-footer span');
    if (footHint) footHint.innerHTML = '🖥️ 데스크탑 모드';
  }

  // ❌ 클릭 = 그냥 창 닫기 (메모는 DB 에 저장된 상태로 살아있음, 트레이/목록에서 다시 열 수 있음)
  closeBtn.addEventListener('click', () => window.close());
  // 전체 편집 링크 — 데스크탑 모드에선 외부 브라우저로 (앱 내부 navigation 방지)
  if (openInApp) {
    if (isDesktop) {
      openInApp.style.display = 'none';  // 데스크탑 모드에선 숨김 (메모창 자체에 풀 에디터 있음)
    } else {
      openInApp.href = '/?wsopen=' + encodeURIComponent(pageId) + '#workspace';
    }
  }

  // ── 데스크탑 전용: 항상 위 토글 + 진짜 투명도 ──
  // 헤더에 "📌 항상 위" 버튼 동적 추가 (데스크탑 모드만)
  if (isDesktop) {
    const header = document.querySelector('.memo-header');
    const aotBtn = document.createElement('button');
    aotBtn.className = 'memo-btn';
    aotBtn.id = 'aotBtn';
    aotBtn.title = '항상 위에 표시 토글';
    aotBtn.textContent = '📌';
    // closeBtn 앞에 삽입
    closeBtn.parentNode.insertBefore(aotBtn, closeBtn);
    aotBtn.addEventListener('click', async () => {
      if (window.electronAPI && window.electronAPI.toggleAlwaysOnTop) {
        const isOn = await window.electronAPI.toggleAlwaysOnTop();
        aotBtn.style.opacity = isOn ? '1' : '0.4';
        aotBtn.title = '항상 위: ' + (isOn ? '켜짐' : '꺼짐');
      }
    });
    // 초기 상태 (기본: ON)
    aotBtn.style.opacity = '1';
  }

  // ── 미니 모드 (본문 숨기고 헤더만) — IPC 로 정확한 윈도우 리사이즈 ──
  const miniBtn = document.getElementById('miniBtn');
  const MINI_KEY = 'wsMemo:mini:' + pageId;
  const SIZE_KEY = 'wsMemo:size:' + pageId;
  const MINI_W_KEY = 'wsMemo:miniW:' + pageId;
  let savedSize = null;
  try { savedSize = JSON.parse(localStorage.getItem(SIZE_KEY) || 'null'); } catch(_) {}

  function setMini(on) {
    document.body.setAttribute('data-mini', on ? '1' : '0');
    miniBtn.textContent = on ? '⤢' : '▭';
    miniBtn.title = on ? '원래 크기로' : '미니 크기로';
    try { localStorage.setItem(MINI_KEY, on ? '1' : '0'); } catch(_) {}

    if (on) {
      // 현재 크기 저장 (복원용)
      try {
        const cur = { w: window.outerWidth, h: window.outerHeight };
        if (cur.h > 60) { // 미니 상태가 아닐 때만 저장 (이중 저장 방지)
          localStorage.setItem(SIZE_KEY, JSON.stringify(cur));
          savedSize = cur;
        }
      } catch(_) {}
      const miniW = parseInt(localStorage.getItem(MINI_W_KEY) || '0', 10) || (savedSize ? savedSize.w : 280);
      // IPC 로 정확하게 (minHeight 제약 우회)
      if (window.electronAPI && window.electronAPI.setMini) {
        window.electronAPI.setMini(true, miniW, 30);
      } else {
        try { window.resizeTo(miniW, 36); } catch(_) {}
      }
    } else {
      const restore = savedSize || { w: 420, h: 560 };
      if (window.electronAPI && window.electronAPI.setMini) {
        window.electronAPI.setMini(false, restore.w, restore.h);
      } else {
        try { window.resizeTo(restore.w, restore.h); } catch(_) {}
      }
    }
  }

  // 미니 모드에서 가로 리사이즈 시 너비 저장
  let miniResizeTimer = null;
  window.addEventListener('resize', () => {
    if (document.body.getAttribute('data-mini') !== '1') return;
    if (miniResizeTimer) clearTimeout(miniResizeTimer);
    miniResizeTimer = setTimeout(() => {
      try { localStorage.setItem(MINI_W_KEY, String(window.outerWidth)); } catch(_) {}
    }, 200);
  });

  miniBtn.addEventListener('click', () => {
    setMini(document.body.getAttribute('data-mini') !== '1');
  });
  // 헤더 더블클릭으로도 토글 (제목 div 더블클릭은 편집 진입이라 제외)
  document.querySelector('.memo-header').addEventListener('dblclick', (e) => {
    if (e.target.closest('input, button, .memo-title-display')) return;
    setMini(document.body.getAttribute('data-mini') !== '1');
  });
  // 초기 상태 복원
  if (localStorage.getItem(MINI_KEY) === '1') setMini(true);

  // ── 투명도 토글 (100 → 80 → 60 → 40 → 100 순환) ──
  const opacityBtn = document.getElementById('opacityBtn');
  const OPACITY_KEY = 'wsMemo:opacity:' + pageId;
  const OPACITY_LEVELS = ['100', '80', '60', '40'];
  function setOpacity(level) {
    if (level === '100') {
      document.body.removeAttribute('data-opacity');
    } else {
      document.body.setAttribute('data-opacity', level);
    }
    opacityBtn.textContent = level === '100' ? '👁' : '👁‍🗨';
    opacityBtn.title = '투명도: ' + level + '% (호버 시 100%) — 클릭으로 단계 변경';
    try { localStorage.setItem(OPACITY_KEY, level); } catch(_) {}
    // 데스크탑 모드: 진짜 윈도우 투명도 (호버 시 자동 복귀는 BrowserView 의 한계로 제외 — CSS 만)
    if (isDesktop && window.electronAPI && window.electronAPI.setOpacity) {
      // 데스크탑은 CSS 투명도 대신 윈도우 투명도 사용
      const v = parseInt(level, 10) / 100;
      window.electronAPI.setOpacity(v);
    }
  }
  opacityBtn.addEventListener('click', () => {
    const cur = document.body.getAttribute('data-opacity') || '100';
    const idx = OPACITY_LEVELS.indexOf(cur);
    setOpacity(OPACITY_LEVELS[(idx + 1) % OPACITY_LEVELS.length]);
  });
  // 초기 상태 복원
  setOpacity(localStorage.getItem(OPACITY_KEY) || '100');

  // ── 색상 테마 ──
  const COLOR_KEY = 'wsMemo:color:' + pageId;
  const initialColor = localStorage.getItem(COLOR_KEY) || localStorage.getItem('wsMemo:color') || 'yellow';
  document.body.setAttribute('data-color', initialColor);
  function applyColor(color) {
    document.body.setAttribute('data-color', color);
    try {
      localStorage.setItem(COLOR_KEY, color);
      localStorage.setItem('wsMemo:color', color); // 다음 메모 기본값
    } catch(e) {}
    // 활성 표시
    [...colorPalette.querySelectorAll('.color-swatch')].forEach(sw => {
      sw.classList.toggle('active', sw.dataset.color === color);
    });
  }
  applyColor(initialColor);
  colorBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    colorPalette.classList.toggle('open');
  });
  colorPalette.addEventListener('click', (e) => {
    const sw = e.target.closest('.color-swatch');
    if (!sw) return;
    applyColor(sw.dataset.color);
    colorPalette.classList.remove('open');
  });
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.color-palette') && !e.target.closest('#colorBtn')) {
      colorPalette.classList.remove('open');
    }
  });

  // ── 상태 표시 ──
  function setStatus(text, cls) {
    statusEl.textContent = text;
    statusEl.className = 'memo-status' + (cls ? ' ' + cls : '');
  }

  // ── Editor.js 초기화 ──
  let editor = null;
  let saveTimer = null;
  let dirty = false;

  // 이미지 업로드 (워크스페이스와 동일한 방식 — base64 JSON)
  async function uploadImageFile(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = async () => {
        try {
          const base64 = reader.result; // data:image/...;base64,...
          // 직접 데이터 URL 사용 (서버 업로드 안 하고 페이지에 인라인)
          // 워크스페이스 페이지가 base64 이미지 지원함 (DOMPurify 의 ALLOWED_URI_REGEXP 에 data:)
          resolve({ success: 1, file: { url: base64 } });
        } catch (e) { reject(e); }
      };
      reader.onerror = () => reject(new Error('파일 읽기 실패'));
      reader.readAsDataURL(file);
    });
  }

  function buildTools() {
    const tools = {
      header: { class: Header, config: { levels: [2, 3], defaultLevel: 2 } },
      checklist: { class: Checklist },
      list: { class: List, inlineToolbar: true },
      delimiter: Delimiter,
      quote: { class: Quote },
      marker: { class: Marker },
      image: {
        class: ImageTool,
        config: {
          uploader: {
            uploadByFile: uploadImageFile,
            uploadByUrl: (url) => Promise.resolve({ success: 1, file: { url } })
          },
          captionPlaceholder: '이미지 설명 (선택)',
          buttonContent: '📷 이미지 선택'
        }
      }
    };
    if (typeof DataTableTool !== 'undefined') tools.dataTable = { class: DataTableTool };
    if (typeof FormBlockTool !== 'undefined') tools.formBlock = { class: FormBlockTool };
    return tools;
  }

  async function load() {
    try {
      const r = await fetch('/api/workspace/pages/' + encodeURIComponent(pageId), { credentials: 'include' });
      if (!r.ok) {
        if (r.status === 401 || r.status === 403) {
          showError('🔒', '로그인이 필요하거나 접근 권한이 없습니다', 'ERP 에 로그인 후 다시 시도하세요');
          return;
        }
        if (r.status === 404) {
          showError('🔍', '페이지를 찾을 수 없습니다', '삭제되었거나 ID 가 잘못됐습니다');
          return;
        }
        throw new Error('HTTP ' + r.status);
      }
      const d = await r.json();
      if (!d.ok || !d.page) throw new Error('서버 응답 오류');
      const page = d.page;
      titleEl.value = page.title || '';
      syncTitleDisplay();
      document.title = '📌 ' + (page.title || '메모') + ' — 대림에스엠';
      titleEl.addEventListener('input', () => { dirty = true; scheduleSave(); syncTitleDisplay(); document.title = '📌 ' + (titleEl.value || '메모') + ' — 대림에스엠'; });

      // body 영역 → Editor.js 컨테이너로
      bodyEl.innerHTML = '<div id="editorjs"></div>';

      const editorData = (page.content && Array.isArray(page.content.blocks) && page.content.blocks.length)
        ? page.content
        : { blocks: [{ type: 'paragraph', data: { text: '' } }] };

      editor = new EditorJS({
        holder: 'editorjs',
        placeholder: "/ 를 눌러 블록 추가",
        data: editorData,
        tools: buildTools(),
        onChange: () => { dirty = true; scheduleSave(); },
        i18n: {
          messages: {
            ui: { blockTunes: { toggler: { 'Click to tune': '블록 설정' } } },
            toolNames: { 'Text': '텍스트', 'Heading': '제목', 'Checklist': '체크리스트', 'List': '목록', 'Delimiter': '구분선', 'Quote': '인용', 'Marker': '형광펜', 'Image': '이미지', '데이터 표': '데이터 표', '입력 폼': '입력 폼' },
            tools: { header: { 'Heading 2': '중제목', 'Heading 3': '소제목' } }
          }
        }
      });

      setStatus('자동저장', 'saved');
    } catch (e) {
      showError('⚠️', '불러오기 실패', e.message);
    }
  }

  function showError(icon, msg, hint) {
    bodyEl.innerHTML = `<div class="memo-error"><div class="ic">${icon}</div><div class="msg">${msg}</div><div class="hint">${hint||''}</div></div>`;
    setStatus('실패', 'error');
  }

  function scheduleSave() {
    setStatus('수정 중...', 'saving');
    if (saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(save, 1000);
  }

  async function save() {
    if (!dirty || !editor) return;
    setStatus('저장 중...', 'saving');
    try {
      const saved = await editor.save();
      const r = await fetch('/api/workspace/pages/' + encodeURIComponent(pageId), {
        method: 'PUT',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: titleEl.value, content: saved }),
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      dirty = false;
      setStatus('자동저장', 'saved');
    } catch (e) {
      setStatus('저장 실패', 'error');
      console.warn('[memo] save failed:', e);
    }
  }

  // 창 닫히기 전 마지막 저장 시도
  window.addEventListener('beforeunload', () => {
    if (dirty) {
      try {
        // 동기적 fetch 는 없지만 navigator.sendBeacon 사용 시도
        if (editor && navigator.sendBeacon) {
          editor.save().then(saved => {
            const blob = new Blob([JSON.stringify({ title: titleEl.value, content: saved })], { type: 'application/json' });
            navigator.sendBeacon('/api/workspace/pages/' + encodeURIComponent(pageId) + '?_method=PUT', blob);
          }).catch(()=>{});
        }
      } catch(e) {}
    }
  });

  load();
})();
</script>
</body>
</html>
