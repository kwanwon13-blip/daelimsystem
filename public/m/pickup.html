<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="theme-color" content="#1d4ed8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="픽업">
<link rel="manifest" href="/manifest-m.webmanifest">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon-180.png">
<link rel="stylesheet" href="/fonts/material-symbols.css" />
<title>픽업 — 대림에스엠</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:-apple-system,"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif;background:#eef1f6;color:#111827;-webkit-font-smoothing:antialiased;font-size:16px;padding-bottom:env(safe-area-inset-bottom);}
  [x-cloak]{display:none!important;}
  .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 500,'GRAD' 0,'opsz' 24;display:inline-flex;align-items:center;justify-content:center;line-height:1;}
  .wrap{max-width:560px;margin:0 auto;min-height:100vh;background:#eef1f6;--fs:1;}

  .hd{background:#1d4ed8;color:#fff;padding:calc(env(safe-area-inset-top) + 14px) 14px 12px;position:sticky;top:0;z-index:60;}
  .hd-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .hd-h1{font-size:21px;font-weight:800;letter-spacing:-.3px;}
  .hd-sub{font-size:12px;opacity:.9;}
  .hd-btns{display:flex;gap:7px;flex:none;}
  .hd-btn{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.16);color:#fff;border:none;border-radius:11px;padding:8px 10px;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;}
  .hd-btn .material-symbols-outlined{font-size:18px;}
  .hd-btn.live{background:rgba(255,255,255,.1);}
  .hd-btn .dot{width:8px;height:8px;border-radius:50%;background:#9ca3af;}
  .hd-btn .dot.on{background:#4ade80;}

  /* 날짜 바 */
  .datebar{display:flex;align-items:center;gap:8px;padding:10px 12px;position:sticky;top:calc(env(safe-area-inset-top) + 64px);z-index:55;background:#eef1f6;}
  .date-nav{width:42px;height:42px;border:2px solid #d7dbe3;background:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none;}
  .date-mid{flex:1;text-align:center;background:#fff;border:2px solid #d7dbe3;border-radius:12px;min-height:44px;display:flex;flex-direction:column;justify-content:center;position:relative;}
  .date-mid input{position:absolute;inset:0;opacity:0;width:100%;height:100%;border:none;}
  .date-d{font-size:16px;font-weight:800;}
  .date-w{font-size:11px;color:#6b7280;}
  .today-btn{flex:none;min-height:44px;padding:0 12px;border:none;border-radius:12px;background:#dbeafe;color:#1e40af;font-weight:800;font-size:13px;cursor:pointer;}

  .summary{padding:2px 14px 8px;color:#374151;font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;}
  .summary .pill{background:#fee2e2;color:#b91c1c;border-radius:999px;padding:2px 10px;font-size:13px;font-weight:800;}
  .summary .pill.zero{background:#dcfce7;color:#15803d;}

  .list{padding:4px 12px 110px;}
  .statebar{display:flex;align-items:center;gap:8px;padding:6px 4px 10px;color:#6b7280;font-size:13px;}
  .spin{width:18px;height:18px;border:3px solid #cbd5e1;border-top-color:#1d4ed8;border-radius:50%;animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* 글자크기 조절 */
  .summary .fsctl{margin-left:auto;display:flex;gap:5px;}
  .summary .fsctl button{border:1px solid #d7dbe3;background:#fff;color:#374151;border-radius:9px;padding:4px 11px;font-size:14px;font-weight:800;cursor:pointer;line-height:1;}

  /* 업체 목록 (복사 이미지처럼 — 흰 바탕·#업체 파랑·품목 한 줄·탭=형광펜 표시) */
  .vcard{background:#fff;border-radius:10px;border:1px solid #eef1f6;margin-bottom:7px;overflow:hidden;}
  .vcard.done{opacity:.72;}
  .vc-row{display:flex;align-items:center;gap:6px;padding:calc(7px * var(--fs)) 11px calc(2px * var(--fs));}
  .vc-name{flex:1;min-width:0;font-size:calc(16px * var(--fs));font-weight:800;letter-spacing:-.2px;color:#1d4ed8;word-break:break-all;line-height:1.25;}
  .vc-left{flex:none;font-size:calc(11px * var(--fs));font-weight:700;color:#94a3b8;}
  .vc-ic{flex:none;width:calc(32px * var(--fs));height:calc(32px * var(--fs));border:1px solid #e2e6ee;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#475569;text-decoration:none;}
  .vc-ic.call{background:#ecfdf5;color:#15803d;border-color:#bbf7d0;}
  .vc-ic .material-symbols-outlined{font-size:calc(19px * var(--fs));}
  .vc-memo{margin:4px 11px;background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:5px 9px;font-size:calc(12.5px * var(--fs));color:#9a3412;line-height:1.35;}

  .item{display:flex;align-items:center;gap:8px;padding:calc(5px * var(--fs)) 11px;cursor:pointer;}
  .item-name{flex:1;min-width:0;font-size:calc(14.5px * var(--fs));font-weight:600;word-break:break-all;line-height:1.3;}
  .item-site{color:#6b7280;font-weight:500;} .item-late{color:#dc2626;font-weight:800;} .item-fail{color:#b91c1c;font-weight:700;}
  .item.on{background:#dcfce7;}
  .item.on .item-name{text-decoration:line-through;text-decoration-color:#16a34a;color:#15803d;}
  .item.off{background:#fef2f2;}
  .item-x{flex:none;width:calc(30px * var(--fs));height:calc(30px * var(--fs));display:flex;align-items:center;justify-content:center;color:#cdd3dd;font-size:calc(16px * var(--fs));font-weight:800;border-radius:8px;cursor:pointer;}
  .item-x.undo{color:#dc2626;}
  .chip{flex:none;font-size:calc(12px * var(--fs));font-weight:800;border-radius:999px;padding:3px 9px;}
  .chip.req{background:#eef2ff;color:#3730a3;} .chip.no{background:#fee2e2;color:#b91c1c;}

  .empty{padding:54px 28px;text-align:center;color:#4b5563;}
  .empty .material-symbols-outlined{font-size:54px;color:#cbd5e1;}
  .empty-t{font-size:17px;color:#6b7280;font-weight:700;margin-top:10px;}
  .empty-s{font-size:14px;color:#9aa3b2;margin-top:5px;line-height:1.5;}

  .gate{padding:60px 26px;text-align:center;color:#4b5563;}
  .gate .material-symbols-outlined{font-size:56px;color:#cbd5e1;}
  .gate-t{font-size:18px;font-weight:700;margin:12px 0 6px;}
  .gate a{color:#1d4ed8;text-decoration:none;font-weight:700;}

  /* 알림 켜기 배너(납품팀, 미구독) */
  .pushbar{margin:6px 12px 2px;background:#fff7ed;border:1px solid #fed7aa;border-left:5px solid #d97706;border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:11px;}
  .pushbar .material-symbols-outlined{font-size:25px;color:#d97706;flex:none;}
  .pushbar .pb-main{flex:1;min-width:0;}
  .pushbar .pb-t{font-size:14.5px;font-weight:800;color:#9a3412;}
  .pushbar .pb-s{font-size:12px;color:#9a6b4a;margin-top:2px;line-height:1.35;}
  .pushbar .pb-btn{flex:none;min-height:40px;border:none;border-radius:11px;background:#d97706;color:#fff;font-size:14px;font-weight:800;padding:0 16px;cursor:pointer;}

  .saving-bar{position:fixed;left:50%;bottom:calc(20px + env(safe-area-inset-bottom));transform:translateX(-50%);background:#111827;color:#fff;font-size:14px;font-weight:700;padding:11px 20px;border-radius:14px;z-index:300;display:flex;align-items:center;gap:9px;}
  .saving-bar .spin{border-color:rgba(255,255,255,.35);border-top-color:#fff;}
</style>
<script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>
<body>
<div class="wrap" x-data="pickupApp()" x-init="init()" x-cloak :style="'--fs:' + fs">

  <!-- 헤더 -->
  <div class="hd">
    <div class="hd-row">
      <div>
        <div class="hd-sub">대림에스엠 · 모바일</div>
        <div class="hd-h1">픽업</div>
      </div>
      <div class="hd-btns">
        <button class="hd-btn" @click="enablePush()" x-show="pushState!=='on' && pushState!=='unsupported'" title="알림 켜기">
          <span class="material-symbols-outlined">notifications</span>알림
        </button>
        <span class="hd-btn live" title="실시간 연결">
          <span class="dot" :class="sseOn ? 'on' : ''"></span>실시간
        </span>
        <a class="hd-btn" href="/m/" title="홈">
          <span class="material-symbols-outlined">home</span>
        </a>
      </div>
    </div>
  </div>

  <!-- 권한 없음 -->
  <template x-if="authChecked && !canView">
    <div class="gate">
      <span class="material-symbols-outlined">lock</span>
      <div class="gate-t">픽업 조회 권한이 없습니다</div>
      <div class="empty-s">관리자에게 픽업 권한을 요청하세요.</div>
      <div style="margin-top:18px;"><a href="/m/">← 홈으로</a></div>
    </div>
  </template>

  <template x-if="canView">
    <div>
      <!-- 날짜 바 -->
      <div class="datebar">
        <button class="date-nav" @click="shiftDate(-1)" aria-label="전날"><span class="material-symbols-outlined">chevron_left</span></button>
        <label class="date-mid">
          <span class="date-d" x-text="dateLabel()"></span>
          <span class="date-w" x-text="weekday()"></span>
          <input type="date" :value="date" @change="setDate($event.target.value)">
        </label>
        <button class="date-nav" @click="shiftDate(1)" aria-label="다음날"><span class="material-symbols-outlined">chevron_right</span></button>
        <button class="today-btn" @click="setDate(today)" x-show="date!==today">오늘</button>
      </div>

      <div class="summary">
        <span x-text="'픽업 ' + groups.length + '곳'"></span>
        <span class="pill" :class="pendingCount()===0 ? 'zero' : ''"
              x-text="pendingCount()===0 ? '남은 픽업 없음' : ('남은 품목 ' + pendingCount())"></span>
        <span class="fsctl">
          <button @click="setFs(fs - 0.1)" title="글자 작게">가﹣</button>
          <button @click="setFs(fs + 0.1)" title="글자 크게">가＋</button>
        </span>
      </div>

      <!-- 알림 켜기(납품팀·미구독·지원환경). 안드로이드는 한 번 탭으로 끝 -->
      <div class="pushbar" x-show="canCheck && pushState==='off'" x-cloak>
        <span class="material-symbols-outlined">notifications_active</span>
        <div class="pb-main">
          <div class="pb-t">픽업 알림 켜기</div>
          <div class="pb-s">새 픽업이 등록되면 폰으로 바로 알려드려요. 한 번만 눌러두세요.</div>
        </div>
        <button class="pb-btn" @click="enablePush()">켜기</button>
      </div>

      <div class="list">
        <div class="statebar">
          <template x-if="loading"><span class="spin"></span></template>
          <span x-show="loading">불러오는 중…</span>
          <span x-show="!loading && error" x-text="error" style="color:#b91c1c;"></span>
        </div>

        <!-- 업체 카드 -->
        <template x-for="g in groups" :key="g.groupKey || g.vendorName">
          <div class="vcard" :class="groupClass(g)">
            <!-- 업체 한 줄: #이름(파랑) + 남은수 + 전화/길찾기 -->
            <div class="vc-row">
              <span class="vc-name" x-text="'#' + (vendorOf(g).name || g.vendorName || '업체 미지정')"></span>
              <span class="vc-left" x-text="rollupBadge(g).label"></span>
              <a class="vc-ic call" x-show="vendorPhone(g)" :href="'tel:' + vendorPhone(g)" title="전화"><span class="material-symbols-outlined">call</span></a>
              <a class="vc-ic" :href="mapUrl(vendorOf(g),'naver')" target="_blank" rel="noopener" title="길찾기"><span class="material-symbols-outlined">map</span></a>
            </div>
            <div class="vc-memo" x-show="vendorOf(g).pickupMemo" x-text="'📍 ' + vendorOf(g).pickupMemo"></div>

            <!-- 품목: 누르면 형광펜 표시(=수거완료), ✕=미수거 -->
            <template x-for="req in (g.requests||[])" :key="req.id">
              <div x-show="req.status!=='cancelled'">
                <template x-for="it in (req.items||[])" :key="it.id">
                  <div class="item" x-show="it.status!=='cancelled'"
                       :class="it.status==='pickedUp' ? 'on' : (it.status==='notPicked' ? 'off' : '')"
                       @click="canCheck && (it.status==='pickedUp' ? resetItem(it) : markPicked(it))">
                    <span class="item-name">
                      <span x-text="it.itemName + (it.spec ? (' ' + it.spec) : '') + (it.qty ? ('  ' + it.qty + (it.unit||'개')) : '')"></span>
                      <span class="item-site" x-show="it.site" x-text="' (' + it.site + ')'"></span>
                      <span class="item-late" x-show="req.isLate && timeOf(req)" x-text="' ·추가 ' + timeOf(req)"></span>
                      <span class="item-fail" x-show="it.status==='notPicked'" x-text="' ·미수거' + (it.failReason ? ('(' + it.failReason + ')') : '')"></span>
                    </span>
                    <span class="item-x" x-show="canCheck && it.status!=='notPicked'" @click.stop="markNot(it)" title="미수거">✕</span>
                    <span class="item-x undo" x-show="canCheck && it.status==='notPicked'" @click.stop="resetItem(it)" title="되돌리기">↺</span>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </template>

        <!-- 빈 상태 -->
        <template x-if="!loading && !groups.length">
          <div class="empty">
            <span class="material-symbols-outlined">local_shipping</span>
            <div class="empty-t">이 날짜에 픽업이 없습니다</div>
            <div class="empty-s">날짜를 바꿔보거나<br>경영관리팀이 등록하면 여기 표시됩니다.</div>
          </div>
        </template>
      </div>
    </div>
  </template>

  <div class="saving-bar" x-show="saving" x-cloak><span class="spin"></span>처리 중…</div>
</div>

<script src="/m/pwa.js"></script>
<script>
  function pickupApp() {
    return {
      today: '', date: '',
      loading: true, error: '', authChecked: false,
      me: null, canView: false, canCheck: false,
      requests: [], groups: [],
      saving: false, sseOn: false, pushState: '',
      fs: 1,
      _es: null, _poll: null,

      async init() {
        try { var f = parseFloat(localStorage.getItem('pk_fs')); if (f) this.fs = Math.min(1.6, Math.max(0.8, f)); } catch (_) {}
        this.today = this.todayStr();
        this.date = this.today;
        await this.loadMe();
        if (!this.me) { location.replace('/m/login.html'); return; }
        this.authChecked = true;
        if (!this.canView) { this.loading = false; return; }
        await this.load();
        this.connectSSE();
        this.startPoll();
        document.addEventListener('visibilitychange', () => { if (!document.hidden) this.load(); });
        try { this.pushState = await window.erpPwa.state(); } catch (_) {}
      },

      todayStr() {
        var d = new Date();
        return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
      },
      dateLabel() {
        var p = (this.date || '').split('-');
        return p.length === 3 ? (Number(p[1]) + '월 ' + Number(p[2]) + '일') : this.date;
      },
      weekday() {
        try { var d = new Date(this.date + 'T00:00:00'); return ['일','월','화','수','목','금','토'][d.getDay()] + '요일'; }
        catch (_) { return ''; }
      },
      setFs(v) {
        this.fs = Math.min(1.6, Math.max(0.8, Math.round(v * 10) / 10));   // 글자배율 0.8~1.6
        try { localStorage.setItem('pk_fs', this.fs); } catch (_) {}
      },
      setDate(v) { if (!v) return; this.date = v; this.load(); },
      shiftDate(n) {
        var d = new Date(this.date + 'T00:00:00'); d.setDate(d.getDate() + n);
        this.date = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        this.load();
      },

      async loadMe() {
        try {
          var r = await fetch('/api/auth/me', { credentials: 'same-origin', cache: 'no-store' });
          var d = await r.json();
          if (d && d.loggedIn) {
            this.me = d;
            var p = d.permissions || [], admin = d.role === 'admin';
            this.canView = admin || p.indexOf('pickup_view') >= 0;
            this.canCheck = admin || p.indexOf('pickup_check') >= 0;
          } else { this.me = null; }
        } catch (_) { this.me = null; }
      },

      async load() {
        if (!this.canView) return;
        this.loading = true; this.error = '';
        try {
          var r = await fetch('/api/pickup/requests?date=' + encodeURIComponent(this.date), { credentials: 'same-origin', cache: 'no-store' });
          if (r.status === 401) { location.replace('/m/login.html'); return; }
          if (r.status === 403) { this.error = '픽업 조회 권한이 없습니다.'; this.groups = []; this.requests = []; this.loading = false; return; }
          if (!r.ok) throw new Error('load ' + r.status);
          var d = await r.json();
          this.requests = d.requests || [];
          this.groups = d.groups || [];
        } catch (e) { this.error = '목록을 불러오지 못했습니다.'; }
        this.loading = false;
      },

      // ── 헬퍼 ──
      timeOf(req) {
        var s = (req && req.requestedAt) || '';
        if (!s) return '';
        var iso = String(s).replace(' ', 'T');
        if (!/[zZ]|[+-]\d\d:?\d\d$/.test(iso)) iso += 'Z';   // SQLite UTC → 로컬(KST) 변환
        var d = new Date(iso);
        if (isNaN(d.getTime())) return '';
        return d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false });
      },
      vendorOf(g) {
        var req = (g.requests || []).find(function (x) { return x && x.vendor; });
        return (req && req.vendor) || { name: g.vendorName };
      },
      vendorPhone(g) { var v = this.vendorOf(g); return v.contactPhone || v.phone || ''; },
      pendingCount() {
        var n = 0;
        (this.requests || []).forEach(function (req) {
          if (req.status === 'cancelled') return;
          (req.items || []).forEach(function (it) { if (it.status === 'requested') n++; });
        });
        return n;
      },
      groupItems(g) {
        var out = [];
        (g.requests || []).forEach(function (req) { (req.items || []).forEach(function (it) { out.push(it); }); });
        return out;
      },
      groupClass(g) {
        var its = this.groupItems(g).filter(function (i) { return i.status !== 'cancelled'; });
        if (its.length && its.every(function (i) { return i.status === 'pickedUp'; })) return 'done';
        if ((g.requests || []).some(function (r) { return r.isLate; })) return 'late';
        return '';
      },
      rollupBadge(g) {
        var its = this.groupItems(g).filter(function (i) { return i.status !== 'cancelled'; });
        if (!its.length) return { cls: 'b-req', label: '대기' };
        if (its.every(function (i) { return i.status === 'pickedUp'; })) return { cls: 'b-done', label: '완료' };
        if (its.some(function (i) { return i.status === 'pickedUp' || i.status === 'notPicked'; })) {
          var left = its.filter(function (i) { return i.status === 'requested'; }).length;
          return { cls: 'b-partial', label: left ? ('남음 ' + left) : '확인필요' };
        }
        return { cls: 'b-req', label: '대기 ' + its.length };
      },
      mapUrl(v, app) {
        var q = encodeURIComponent((v && (v.mapSearchKeyword || v.address || v.name)) || '');
        if (app === 'kakao') return 'https://map.kakao.com/?q=' + q;
        if (app === 'tmap') return 'https://tmap.life/search?name=' + q;
        return 'https://map.naver.com/v5/search/' + q;
      },

      // ── 라인 체크(납품팀) ──
      async setItem(it, status, extra) {
        if (!this.canCheck || this.saving) return;
        var prev = it.status;
        it.status = status;           // 낙관적 갱신
        this.saving = true;
        try {
          var body = Object.assign({ status: status }, extra || {});
          var r = await fetch('/api/pickup/items/' + encodeURIComponent(it.id) + '/status', {
            method: 'PATCH', headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin', body: JSON.stringify(body),
          });
          if (!r.ok) throw new Error('patch ' + r.status);
          await this.load();          // 롤업/상태 재동기화
        } catch (e) { it.status = prev; alert('상태 변경 실패. 다시 시도해주세요.'); }
        this.saving = false;
      },
      markPicked(it) { this.setItem(it, 'pickedUp'); },
      markNot(it) { var reason = prompt('미수거 사유를 적어주세요', '부재중'); if (reason === null) return; this.setItem(it, 'notPicked', { failReason: reason }); },
      resetItem(it) { this.setItem(it, 'requested'); },

      // ── 실시간 ──
      connectSSE() {
        try {
          var es = new EventSource('/api/workflow/events');
          this._es = es;
          es.onopen = () => { this.sseOn = true; };
          es.onmessage = (ev) => {
            try { var d = JSON.parse(ev.data); if (d && d.t === 'hello') return; } catch (_) {}
            this.load();              // 알림(픽업 등) 신호 오면 즉시 새로고침
          };
          es.onerror = () => { this.sseOn = false; };
        } catch (_) {}
      },
      startPoll() {
        var self = this;
        this._poll = setInterval(function () { if (!document.hidden && !self.sseOn) self.load(); }, 30000);
      },

      async enablePush() { try { this.pushState = await window.erpPwa.enable(); } catch (_) {} },
    };
  }
</script>
</body>
</html>
