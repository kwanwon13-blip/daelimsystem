<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="theme-color" content="#1d4ed8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="мӣҢнҒ¬н”ҢлЎңмҡ°">
<link rel="manifest" href="/manifest-m.webmanifest">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon-180.png">
<link rel="stylesheet" href="/fonts/material-symbols.css" />
<title>мӣҢнҒ¬н”ҢлЎңмҡ° вҖ” лҢҖлҰјм—җмҠӨм— </title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:-apple-system,"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif;background:#eef1f6;color:#111827;-webkit-font-smoothing:antialiased;font-size:16px;padding-bottom:env(safe-area-inset-bottom);}
  [x-cloak]{display:none!important;}
  .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 500,'GRAD' 0,'opsz' 24;display:inline-flex;align-items:center;justify-content:center;line-height:1;}
  .wrap{max-width:560px;margin:0 auto;min-height:100vh;position:relative;background:#eef1f6;}

  /* н—ӨлҚ” */
  .hd{background:#1d4ed8;color:#fff;padding:calc(env(safe-area-inset-top) + 14px) 16px 12px;position:sticky;top:0;z-index:60;}
  .hd-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .hd-sub{font-size:12px;opacity:.9;}
  .hd-h1{font-size:22px;font-weight:700;letter-spacing:-.3px;}
  .hd-pc{flex:none;display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.16);color:#fff;border:none;border-radius:12px;padding:9px 12px;font-size:14px;font-weight:600;text-decoration:none;}
  .hd-pc .material-symbols-outlined{font-size:18px;}

  /* мғҒлӢЁ нғӯ(мғҒнғң) */
  .tabs{display:flex;gap:8px;padding:12px 12px 4px;overflow-x:auto;position:sticky;top:calc(env(safe-area-inset-top) + 70px);z-index:55;background:#eef1f6;-webkit-overflow-scrolling:touch;}
  .tab{flex:0 0 auto;min-height:44px;padding:0 16px;border-radius:22px;border:2px solid #d7dbe3;background:#fff;color:#374151;font-size:15px;font-weight:700;display:inline-flex;align-items:center;gap:6px;cursor:pointer;}
  .tab .material-symbols-outlined{font-size:18px;}
  .tab.on{background:#1d4ed8;border-color:#1d4ed8;color:#fff;}
  .tab .cnt{background:rgba(0,0,0,.12);border-radius:999px;font-size:12px;font-weight:800;min-width:20px;padding:1px 6px;text-align:center;}
  .tab.on .cnt{background:rgba(255,255,255,.28);}

  /* кІҖмғү */
  .srch{padding:8px 12px 4px;position:sticky;top:calc(env(safe-area-inset-top) + 124px);z-index:54;background:#eef1f6;}
  .srch-box{position:relative;}
  .srch input{width:100%;min-height:44px;padding:12px 44px 12px 16px;font-size:16px;border:2px solid #d7dbe3;border-radius:14px;background:#fff;-webkit-appearance:none;}
  .srch input:focus{outline:none;border-color:#1d4ed8;}
  .srch-clear{position:absolute;right:7px;top:50%;transform:translateY(-50%);width:34px;height:34px;border:none;background:#e5e7eb;color:#4b5563;border-radius:50%;font-size:18px;display:none;align-items:center;justify-content:center;cursor:pointer;}
  .srch-clear.show{display:flex;}

  .list{padding:10px 12px 120px;}
  .statebar{display:flex;align-items:center;gap:8px;padding:2px 4px 10px;color:#6b7280;font-size:13px;}
  .spin{width:18px;height:18px;border:3px solid #cbd5e1;border-top-color:#1d4ed8;border-radius:50%;animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* м№ҙл“ң */
  .card{background:#fff;border-radius:16px;border:1px solid #e8ebf1;margin-bottom:12px;overflow:hidden;border-left:5px solid #cbd5e1;}
  .card.st-overdue{border-left-color:#ef4444;}
  .card.st-blocked{border-left-color:#f97316;}
  .card.st-late{border-left-color:#f59e0b;}
  .card.st-soon{border-left-color:#eab308;}
  .card.st-done{border-left-color:#16a34a;}
  .card.st-cancelled{border-left-color:#9ca3af;opacity:.7;}
  .card.urgent{border-left-color:#dc2626;}
  .card-body{display:flex;gap:12px;padding:13px 14px;cursor:pointer;align-items:flex-start;}
  .card-thumb{flex:none;width:72px;height:72px;border-radius:11px;background:#f1f3f7;overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative;border:1px solid #e8ebf1;}
  .card-thumb img{width:100%;height:100%;object-fit:cover;}
  .card-thumb .ph{font-size:30px;color:#cbd5e1;}
  .card-thumb .more{position:absolute;right:3px;bottom:3px;background:rgba(17,24,39,.78);color:#fff;font-size:11px;font-weight:800;border-radius:6px;padding:1px 6px;}
  .card-main{flex:1;min-width:0;}
  .card-title{font-size:17px;font-weight:700;letter-spacing:-.2px;line-height:1.3;word-break:break-all;}
  .card-sub{font-size:14px;color:#2563eb;margin-top:2px;font-weight:500;word-break:break-all;}
  .card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;align-items:center;}
  .tag{font-size:11px;font-weight:800;border-radius:999px;padding:2px 9px;line-height:1.5;}
  .tag.urgent{background:#fee2e2;color:#b91c1c;}
  .tag.note{background:#fff7ed;color:#9a3412;}
  .tag.due{background:#eef2ff;color:#3730a3;}
  .tag.unread{background:#fee2e2;color:#b91c1c;}
  .tag.un{background:#fef9c3;color:#854d0e;}
  .tag.weld{background:#ffedd5;color:#9a3412;}
  .tag.out{background:#dbeafe;color:#1e40af;}
  .tag.person{background:#f3f4f6;color:#4b5563;}
  .tag.unord{background:#fef3c7;color:#92400e;}

  /* м№ҙл“ң н•ҳлӢЁ м•Ўм…ҳ */
  .card-act{display:flex;gap:8px;padding:0 14px 13px;flex-wrap:wrap;}
  .card-act:empty{display:none;}
  .act-date{flex:1;min-width:130px;min-height:44px;border:2px solid #d7dbe3;border-radius:12px;padding:0 12px;font-size:15px;background:#fff;-webkit-appearance:none;}
  .act-date:focus{outline:none;border-color:#1d4ed8;}
  .btn{min-height:44px;border:none;border-radius:12px;padding:0 16px;font-size:15px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;}
  .btn .material-symbols-outlined{font-size:19px;}
  .btn:active{opacity:.82;}
  .btn:disabled{opacity:.5;}
  .btn-blue{background:#1d4ed8;color:#fff;}
  .btn-green{background:#16a34a;color:#fff;}
  .btn-amber{background:#d97706;color:#fff;}
  .btn-grey{background:#eef1f6;color:#374151;border:1px solid #e2e6ee;}
  .btn-wide{flex:1;}

  /* л№Ҳ мғҒнғң */
  .empty{padding:54px 28px;text-align:center;color:#4b5563;}
  .empty .material-symbols-outlined{font-size:54px;color:#cbd5e1;}
  .empty-t{font-size:17px;color:#6b7280;font-weight:700;margin-top:10px;}
  .empty-s{font-size:14px;color:#9aa3b2;margin-top:5px;line-height:1.5;}

  /* лЎңк·ёмқё м•ҲлӮҙ */
  .login{padding:60px 24px;text-align:center;}
  .login .material-symbols-outlined{font-size:60px;color:#1d4ed8;}
  .login-t{font-size:21px;font-weight:700;margin:14px 0 6px;}
  .login-s{font-size:15px;color:#6b7280;line-height:1.6;margin-bottom:22px;}
  .login a{display:inline-flex;align-items:center;gap:8px;background:#1d4ed8;color:#fff;text-decoration:none;border-radius:14px;padding:15px 26px;font-size:17px;font-weight:700;}

  /* мғҒм„ё н’ҖмҠӨнҒ¬лҰ° */
  .detail{position:fixed;inset:0;background:#eef1f6;z-index:120;display:flex;flex-direction:column;overflow:hidden;max-width:560px;margin:0 auto;}
  .d-head{background:#1d4ed8;color:#fff;padding:calc(env(safe-area-inset-top) + 12px) 14px 12px;position:relative;flex:none;}
  .d-back{position:absolute;left:8px;top:calc(env(safe-area-inset-top) + 8px);width:42px;height:42px;border:none;background:rgba(255,255,255,.16);color:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .d-back .material-symbols-outlined{font-size:24px;}
  .d-title{font-size:19px;font-weight:700;padding:0 50px;line-height:1.3;word-break:break-all;}
  .d-subtitle{font-size:14px;opacity:.92;padding:0 50px;margin-top:3px;word-break:break-all;}
  .d-chips{display:flex;flex-wrap:wrap;gap:6px;padding:10px 6px 0;}
  .d-chip{font-size:12px;font-weight:800;border-radius:999px;padding:3px 10px;background:rgba(255,255,255,.18);color:#fff;}
  .d-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px calc(28px + env(safe-area-inset-bottom));}

  .d-note{background:#fff7ed;border:1px solid #fed7aa;border-radius:13px;padding:12px 14px;margin-bottom:14px;display:flex;gap:10px;}
  .d-note .material-symbols-outlined{font-size:20px;color:#ea580c;flex:none;}
  .d-note b{display:block;font-size:14px;color:#9a3412;margin-bottom:3px;}
  .d-note-text{font-size:14px;color:#7c2d12;line-height:1.5;word-break:break-all;}

  .d-actions{display:flex;flex-direction:column;gap:9px;background:#fff;border:1px solid #e8ebf1;border-radius:14px;padding:13px;margin-bottom:14px;}
  .d-actions .row{display:flex;gap:9px;align-items:center;}
  .d-act-label{font-size:13px;font-weight:800;color:#6b7280;margin-bottom:-2px;}

  .sec-label{font-size:14px;font-weight:800;color:#4b5563;margin:6px 2px 9px;display:flex;align-items:center;gap:6px;}
  .sec-label .material-symbols-outlined{font-size:18px;}

  .file{background:#fff;border:1px solid #e8ebf1;border-radius:14px;margin-bottom:12px;overflow:hidden;}
  .file.unread{border-color:#fca5a5;box-shadow:0 0 0 2px rgba(248,113,113,.18);}
  .file-img{width:100%;background:#f1f3f7;display:block;border:none;padding:0;cursor:pointer;position:relative;}
  .file-img img{width:100%;display:block;max-height:60vh;object-fit:contain;background:#f8fafc;}
  .file-bar{display:flex;align-items:center;gap:10px;padding:11px 13px;}
  .file-ext{flex:none;min-width:42px;height:42px;border-radius:9px;background:#eef2ff;color:#3730a3;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 6px;}
  .file-ext.missing{background:#fee2e2;color:#b91c1c;}
  .file-name{flex:1;min-width:0;font-size:14px;color:#111827;font-weight:600;word-break:break-all;line-height:1.35;}
  .file-meta{font-size:12px;color:#9aa3b2;margin-top:2px;}
  .file-foot{display:flex;gap:8px;padding:0 13px 12px;flex-wrap:wrap;align-items:center;}
  .file-st{font-size:11px;font-weight:800;border-radius:999px;padding:3px 9px;}
  .file-st.wait{background:#fee2e2;color:#b91c1c;}
  .file-st.ok{background:#dcfce7;color:#15803d;}

  .pcnote{text-align:center;color:#9aa3b2;font-size:13px;line-height:1.6;margin:18px 4px 6px;padding:14px;background:#fff;border:1px dashed #d7dbe3;border-radius:13px;}
  .pcnote .material-symbols-outlined{font-size:18px;vertical-align:-4px;color:#94a3b8;}

  /* лқјмқҙнҠёл°•мҠӨ вҖ” мӢңм•Ҳ м „мҡ© л·°м–ҙ(нҷ•лҢҖ/мқҙлҸҷ/л„ҳкё°кё°), лӢӨмҡҙлЎңл“ң м—ҶмқҢ */
  .lb{position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:200;display:none;flex-direction:column;}
  .lb.on{display:flex;}
  .lb-top{display:flex;align-items:center;gap:10px;padding:calc(env(safe-area-inset-top) + 8px) 14px 8px;color:#fff;}
  .lb-site{flex:1;min-width:0;font-size:14px;font-weight:700;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .lb-count{flex:none;font-size:13px;font-weight:700;opacity:.85;}
  .lb-x{flex:none;width:42px;height:42px;border:none;background:rgba(255,255,255,.14);color:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .lb-x .material-symbols-outlined{font-size:24px;}
  .lb-body{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:8px;position:relative;touch-action:none;}
  .lb-body img{max-width:100%;max-height:100%;object-fit:contain;transform-origin:center center;will-change:transform;touch-action:none;user-select:none;-webkit-user-select:none;-webkit-user-drag:none;}
  .lb-nav{position:absolute;top:50%;transform:translateY(-50%);width:46px;height:46px;border:none;background:rgba(0,0,0,.42);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2;}
  .lb-nav:disabled{opacity:.22;}
  .lb-nav.prev{left:10px;} .lb-nav.next{right:10px;}
  .lb-nav .material-symbols-outlined{font-size:28px;}
  .lb-name{flex:none;text-align:center;color:#cbd5e1;font-size:13px;padding:5px 14px 0;line-height:1.3;word-break:break-all;}
  .lb-hint{flex:none;text-align:center;color:#94a3b8;font-size:12px;padding:5px 14px calc(10px + env(safe-area-inset-bottom));}

  /* нҶ мҠӨнҠё(saving) */
  .saving-bar{position:fixed;left:50%;bottom:calc(20px + env(safe-area-inset-bottom));transform:translateX(-50%);background:#111827;color:#fff;font-size:14px;font-weight:700;padding:11px 20px;border-radius:14px;z-index:300;display:flex;align-items:center;gap:9px;}
  .saving-bar .spin{border-color:rgba(255,255,255,.35);border-top-color:#fff;}
</style>
<!-- Alpine.js v3 (+collapse) вҖ” index.htmlкіј лҸҷмқјліё. workflowApp()мқҖ лҚ°мқҙн„° нҢ©нҶ лҰ¬мқј лҝҗ Alpine лҹ°нғҖмһ„мқҙ мһҲм–ҙм•ј x-data/x-show/x-forк°Җ лҸҷмһ‘н•ңлӢӨ. deferлқјм„ң DOM нҢҢмӢұ мҷ„лЈҢ нӣ„(=ліёл¬ё лҒқ workflow.js+лһҳнҚј мӢӨн–ү нӣ„) мӢӨн–ү вҶ’ x-data="workflowApp()" нҸүк°Җ мӢңм җм—” лһҳнҚјк°Җ н•©міҗм§„ м •мқҳліёмқҙ ліҙмһҘлҗЁ. -->
<script src="https://unpkg.com/@alpinejs/collapse@3.x.x/dist/cdn.min.js" defer></script>
<script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>
<body>
<div class="wrap" x-data="workflowApp()" x-init="init()" x-cloak>

  <!-- н—ӨлҚ” -->
  <div class="hd">
    <div class="hd-row">
      <div>
        <div class="hd-sub">лҢҖлҰјм—җмҠӨм—  В· лӘЁл°”мқј</div>
        <div class="hd-h1">мӣҢнҒ¬н”ҢлЎңмҡ°</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex:none;">
        <a class="hd-pc" href="/m/" title="лӘЁл°”мқј нҷҲмңјлЎң">
          <span class="material-symbols-outlined">home</span>нҷҲ
        </a>
        <a class="hd-pc" href="/?desktop=1" title="PC нҷ”л©ҙ(м „мІҙ кё°лҠҘ)мңјлЎң мқҙлҸҷ вҖ” нҸ°м—җм„ңлҸ„ PCнҷ”л©ҙ мң м§Җ(мһҗлҸҷ лӘЁл°”мқј лҒ”)">
          <span class="material-symbols-outlined">desktop_windows</span>PC
        </a>
      </div>
    </div>
  </div>

  <!-- лЎңк·ёмқё м•ҲлӮҙ(лҜёлЎңк·ёмқё) -->
  <template x-if="!loading && !currentUser">
    <div class="login">
      <span class="material-symbols-outlined">lock</span>
      <div class="login-t">лЎңк·ёмқёмқҙ н•„мҡ”н•©лӢҲлӢӨ</div>
      <div class="login-s">м§Ғмӣҗ кі„м •мңјлЎң лЎңк·ёмқён•ҳл©ҙ<br>лӢҙлӢ№ мһ‘м—…мқ„ нҸ°м—җм„ң л°”лЎң мІҳлҰ¬н•  мҲҳ мһҲм–ҙмҡ”.</div>
      <a href="/m/login.html">
        <span class="material-symbols-outlined">login</span>лЎңк·ёмқё нҷ”л©ҙмңјлЎң
      </a>
    </div>
  </template>

  <!-- ліёл¬ё(лЎңк·ёмқё мӢң) -->
  <template x-if="currentUser">
    <div>
      <!-- мғҒнғң нғӯ -->
      <div class="tabs">
        <template x-for="s in stages" :key="s.id">
          <button type="button" class="tab"
                  :class="(statusFilter==='active' && mStage===s.id) ? 'on' : ''"
                  @click="mSelectStage(s.id)">
            <span class="material-symbols-outlined" x-text="s.icon"></span>
            <span x-text="s.label"></span>
            <span class="cnt" x-text="jobsForStage(s.id).length"></span>
          </button>
        </template>
        <button type="button" class="tab" :class="statusFilter==='done' ? 'on' : ''" @click="mShowDone()">
          <span class="material-symbols-outlined">inventory_2</span>мҷ„лЈҢ
        </button>
      </div>

      <!-- кІҖмғү -->
      <div class="srch">
        <div class="srch-box">
          <input type="search" inputmode="search" placeholder="нҳ„мһҘВ·нҡҢмӮ¬В·мҪ”л“ң кІҖмғү"
                 x-model="query" @input.debounce.350ms="loadJobs()">
          <button type="button" class="srch-clear" :class="query ? 'show' : ''" @click="query=''; loadJobs()" aria-label="м§Җмҡ°кё°">&times;</button>
        </div>
      </div>

      <!-- лҰ¬мҠӨнҠё -->
      <div class="list">
        <div class="statebar">
          <template x-if="loading"><span class="spin"></span></template>
          <span x-show="!loading" x-text="mCurrentLabel() + ' В· ' + mVisibleJobs().length + 'кұҙ'"></span>
          <span x-show="loading">л¶Ҳлҹ¬мҳӨлҠ” мӨ‘вҖҰ</span>
        </div>

        <template x-for="job in mVisibleJobs()" :key="job.id">
          <div class="card" :class="cardStateClass(job) + (job.priority==='urgent' ? ' urgent' : '')">
            <!-- м№ҙл“ң ліёмІҙ(нғӯн•ҳл©ҙ мғҒм„ё) -->
            <div class="card-body" @click="selectJob(job.id, mStage)">
              <div class="card-thumb">
                <template x-if="job.primaryVisualFile">
                  <img :src="job.primaryVisualFile.thumbUrl || job.primaryVisualFile.previewUrl" loading="lazy"
                       @load="handleWorkflowImageLoad($event)"
                       @error="handleWorkflowImageError($event, job.primaryVisualFile.previewUrl)">
                </template>
                <template x-if="!job.primaryVisualFile">
                  <span class="material-symbols-outlined ph">image</span>
                </template>
                <span class="more" x-show="(job.visualFileCount||0) > 1" x-text="'+' + (job.visualFileCount - 1)"></span>
              </div>
              <div class="card-main">
                <div class="card-title" x-text="cardTitle(job)"></div>
                <div class="card-sub" x-show="cardSubtitle(job)" x-text="cardSubtitle(job)"></div>
                <div class="card-tags">
                  <span class="tag urgent" x-show="job.priority==='urgent'">кёҙкёү</span>
                  <span class="tag unord" x-show="job.unordered">лҜёл°ңмЈј</span>
                  <span class="tag due" x-show="(cardDeadline(job)||{}).date" x-text="((cardDeadline(job)||{}).label||'л§Ҳк°җ') + ' ' + (cardDeadline(job)||{}).date"></span>
                  <span class="tag note" x-show="job.handoffNote">нҠ№мқҙмӮ¬н•ӯ</span>
                  <span class="tag unread" x-show="job.unreadCount || job.unreadFileCount" x-text="'нҷ•мқё ' + (job.unreadCount || job.unreadFileCount)"></span>
                  <span class="tag un" x-show="job.unassignedFileCount" x-text="'лҜёл°°м • ' + job.unassignedFileCount"></span>
                  <span class="tag weld" x-show="job.weldingFileCount" x-text="'мҡ©м ‘ ' + job.weldingFileCount"></span>
                  <span class="tag out" x-show="job.outputFileCount" x-text="'м¶ңл Ҙ ' + job.outputFileCount"></span>

<!-- лЎңм§Ғ: кё°мЎҙ мһҗкё°мҷ„кІ°нҳ• workflowApp() мһ¬мӮ¬мҡ©. лӘЁл°”мқј м „мҡ© ліҙмЎ° мғҒнғң/л©”м„ңл“ңлҠ” м•„лһҳ лһҳнҚјлЎң мЈјмһ….
     вҡ  мҠӨнҒ¬лҰҪнҠё мҲңм„ң мӨ‘мҡ”: workflow.js(м •мқҳ)лҘј лЁјм Җ лҸҷкё° лЎңл“ң вҶ’ к·ё лӢӨмқҢ лһҳнҚј(лҸҷкё°)к°Җ м •мқҳліёмқ„ к°җмӢјлӢӨ.
     лһҳнҚјк°Җ лЁјм Җл©ҙ _orig=window.workflowAppк°Җ undefinedлқј returnлҗҳм–ҙ mStage/mVisibleJobs л“ұмқҙ л№ м§„лӢӨ(мҪҳмҶ” ReferenceError).
     AlpineмқҖ <head>м—җм„ң deferлЎң лЎңл“ңлҗҳм–ҙ DOM нҢҢмӢұ мҷ„лЈҢ нӣ„(=мқҙ л‘җ лҸҷкё° мҠӨнҒ¬лҰҪнҠё мӢӨн–ү нӣ„) x-dataлҘј нҸүк°Җн•ҳлҜҖлЎң н•©міҗм§„ м •мқҳліёмқҙ ліҙмһҘлҗңлӢӨ. -->
<script src="/workflow.js?v=20260628c"></script><!-- v= мәҗмӢңлІ„мҠӨнҠё: workflow.js л°°нҸ¬ л•Ңл§ҲлӢӨ мҳ¬лҰҙ кІғ(мҳӣ JS мәҗмӢңлЎң мғҲ лІ„нҠјмқҙ мЈҪлҠ” мӮ¬кі  л°©м§Җ) -->
<script>
  // workflowApp()м—җ лӘЁл°”мқј м „мҡ© ліҙмЎ° н•„л“ң/л©”м„ңл“ңлҘј мЈјмһ…(мӣҗліё лЎңм§ҒмқҖ к·ёлҢҖлЎң мһ¬мӮ¬мҡ©).
  // лҚ°мҠӨнҒ¬нҶұ ліҙл“ң(jobsByStage)В·мғҒм„ё(detail)В·к¶Ңн•ң н”Ңлһҳк·ёВ·нҢҢмқј л©”м„ңл“ңлҘј к·ёлҢҖлЎң м“°кі ,
  // лӘЁл°”мқјмқҖ "нҳ„мһ¬ ліҙлҠ” лӢЁкі„(mStage)"л§Ң м¶”к°ҖлЎң л“Өкі  н•ң м№ём”© ліҙм—¬мӨҖлӢӨ.
  (function () {
    var _orig = window.workflowApp;
    if (typeof _orig !== 'function' || _orig.__mobileWrapped) return;
    window.workflowApp = function () {
      var base = _orig();
      // в”Җв”Җ лӘЁл°”мқј м „мҡ© мғҒнғң в”Җв”Җ
      base.mStage = 'design';                 // нҳ„мһ¬ ліҙлҠ” лӢЁкі„(мғҒлӢЁ нғӯ)
      base.mLb = { open: false, file: null }; // мӢңм•Ҳ лқјмқҙнҠёл°•мҠӨ
      // в”Җв”Җ лӘЁл°”мқј м „мҡ© л©”м„ңл“ң в”Җв”Җ
      base.mSelectStage = function (id) {
        // мҷ„лЈҢ нғӯм—җм„ң лӢЁкі„ нғӯмңјлЎң лҸҢм•„мҳӨл©ҙ active ліҙл“ңлЎң ліөк·Җ(н•„мҡ” мӢң мһ¬лЎңл”©)
        var needReload = (this.statusFilter !== 'active');
        this.mStage = id;
        if (needReload) { this.statusFilter = 'active'; this.loadJobs(); }
      };
      base.mShowDone = function () {
        if (this.statusFilter === 'done') return;
        this.statusFilter = 'done';
        this.loadJobs();
      };
      base.mCurrentLabel = function () {
        if (this.statusFilter === 'done') return 'мҷ„лЈҢ';
        var s = (this.stages || []).find(function (x) { return x.id === this.mStage; }.bind(this));
        return (s && s.label) || 'м§„н–ү';
      };
      // нҳ„мһ¬ нғӯм—җ ліҙм—¬мӨ„ мһ‘м—… лӘ©лЎқ
      base.mVisibleJobs = function () {
        if (this.statusFilter === 'done') {
          // мҷ„лЈҢ нғӯ: ліҙл“ң к·ёлЈ№нҷ”лҘј кұ°м№ҳм§Җ м•ҠмқҖ м „мІҙ мҷ„лЈҢ лӘ©лЎқ(кІҖмғүмқҖ м„ңлІ„к°Җ qлЎң м Ғмҡ©)
          return (this.jobs || []).filter(function (j) { return j && j.status === 'done'; });
        }
        // м§„н–ү нғӯ: лҚ°мҠӨнҒ¬нҶұкіј лҸҷмқјн•ң лӢЁкі„лі„ к·ёлЈ№(к¶Ңн•ңВ·н•„н„° лҸҷмқј) вҖ” н•ң лӢЁкі„л§Ң нҸүнғ„нҷ”
        var groups = this.boardGroups(this.mStage) || [];
        var out = [];
        for (var i = 0; i < groups.length; i++) {
          var js = groups[i].jobs || [];
          for (var k = 0; k < js.length; k++) out.push(js[k]);
        }
        return out;
      };
      base.mOpenLightbox = function (file) {
        if (!file || !file.isImage || file.exists === false) return;
        this.mLb = { open: true, file: file };
      };
      // нҳ„мһ¬ мғҒм„ёмқҳ мқҙлҜём§Җ мӢңм•Ҳ лӘ©лЎқ(л„ҳкё°кё°мҡ©)
      base.mLbImages = function () {
        try {
          return (this.detailTiles() || []).filter(function (f) { return f && f.isImage && f.exists !== false; });
        } catch (e) { return []; }
      };
      base.mLbIndex = function () {
        if (!this.mLb || !this.mLb.file) return -1;
        var imgs = this.mLbImages();
        for (var i = 0; i < imgs.length; i++) { if (imgs[i].id === this.mLb.file.id) return i; }
        return -1;
      };
      base.mLbStep = function (dir) {
        var imgs = this.mLbImages();
        if (!imgs.length) return;
        var i = this.mLbIndex(); if (i < 0) i = 0;
        var n = i + dir;
        if (n < 0 || n >= imgs.length) return;
        this.mLb = { open: true, file: imgs[n] };
      };
      return base;
    };
    window.workflowApp.__mobileWrapped = true;
  })();
</script>

<!-- мӢңм•Ҳ лқјмқҙнҠёл°•мҠӨ мӨҢ/мқҙлҸҷ м ңмҠӨмІҳ(н•Җм№ҳВ·л“ңлһҳк·ёВ·лҚ”лё”нғӯ). viewportк°Җ maximum-scale=1мқҙлқј лёҢлқјмҡ°м Җ н•Җм№ҳк°Җ л§үнҳҖ мһҲм–ҙ м§Ғм ‘ кө¬нҳ„. -->
<script>
  (function () {
    function setup() {
      var body = document.getElementById('lbBody');
      var img = document.getElementById('lbImg');
      if (!body || !img) { return; }

      var scale = 1, tx = 0, ty = 0;
      var pointers = {};
      var mode = null;                 // 'pan' | 'pinch'
      var pinchStartDist = 0, pinchStartScale = 1;
      var panStartX = 0, panStartY = 0, panBaseTx = 0, panBaseTy = 0;
      var lastTapTime = 0;
      var MIN = 1, MAX = 5;

      function apply() { img.style.transform = 'translate3d(' + tx + 'px,' + ty + 'px,0) scale(' + scale + ')'; }
      function reset() { scale = 1; tx = 0; ty = 0; img.style.transition = 'none'; apply(); }
      function ids() { return Object.keys(pointers); }
      function clamp(s) { return Math.max(MIN, Math.min(MAX, s)); }

      // мғҲ мқҙлҜём§Җ лЎңл“ң(м—ҙкё°/л„ҳкё°кё°)л§ҲлӢӨ мӨҢ мҙҲкё°нҷ”
      img.addEventListener('load', reset);
      img.addEventListener('dragstart', function (e) { e.preventDefault(); });

      body.addEventListener('pointerdown', function (e) {
        // л„ҳкё°кё°/лӢ«кё° лІ„нҠјмқҖ м ңмҠӨмІҳ лҢҖмғҒм—җм„ң м ңмҷё
        if (e.target.closest && e.target.closest('.lb-nav, .lb-x')) return;
        pointers[e.pointerId] = { x: e.clientX, y: e.clientY };
        try { body.setPointerCapture(e.pointerId); } catch (_) {}
        var k = ids();
        if (k.length === 2) {
          mode = 'pinch';
          var a = pointers[k[0]], b = pointers[k[1]];
          pinchStartDist = Math.hypot(a.x - b.x, a.y - b.y) || 1;
          pinchStartScale = scale;
        } else if (k.length === 1) {
          mode = 'pan';
          panStartX = e.clientX; panStartY = e.clientY; panBaseTx = tx; panBaseTy = ty;
          var now = Date.now();
          if (now - lastTapTime < 300) {           // лҚ”лё”нғӯ вҶ’ нҷ•лҢҖ/м¶•мҶҢ нҶ кёҖ
            img.style.transition = 'transform .18s ease';
            if (scale > 1.02) { scale = 1; tx = 0; ty = 0; } else { scale = 2.5; }
            apply();
            mode = null; lastTapTime = 0; return;
          }
          lastTapTime = now;
        }
      });

      body.addEventListener('pointermove', function (e) {
        if (!pointers[e.pointerId]) return;
        pointers[e.pointerId] = { x: e.clientX, y: e.clientY };
        var k = ids();
        if (mode === 'pinch' && k.length >= 2) {
          var a = pointers[k[0]], b = pointers[k[1]];
          var d = Math.hypot(a.x - b.x, a.y - b.y) || 1;
          img.style.transition = 'none';
          scale = clamp(pinchStartScale * (d / pinchStartDist));
          apply();
        } else if (mode === 'pan' && k.length === 1 && scale > 1.02) {
          img.style.transition = 'none';
          tx = panBaseTx + (e.clientX - panStartX);
          ty = panBaseTy + (e.clientY - panStartY);
          apply();
        }
      });

      function up(e) {
        delete pointers[e.pointerId];
        try { body.releasePointerCapture(e.pointerId); } catch (_) {}
        var k = ids();
        if (k.length === 0) {
          mode = null;
          if (scale <= 1.02) { img.style.transition = 'transform .18s ease'; reset2(); }
        } else if (k.length === 1) {
          // н•Җм№ҳ вҶ’ нҢ¬ м „нҷҳ(мҶҗк°ҖлқҪ н•ҳлӮҳ л–јл©ҙ лӮЁмқҖ мҶҗк°ҖлқҪмңјлЎң мқҙлҸҷ)
          mode = 'pan';
          var id = k[0];
          panStartX = pointers[id].x; panStartY = pointers[id].y; panBaseTx = tx; panBaseTy = ty;
        }
      }
      function reset2() { scale = 1; tx = 0; ty = 0; apply(); }
      body.addEventListener('pointerup', up);
      body.addEventListener('pointercancel', up);
    }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', setup);
    else setup();
  })();
</script>
</body>
</html>
