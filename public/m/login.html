<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="theme-color" content="#1d4ed8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="대림에스엠">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon-180.png">
<link rel="stylesheet" href="/fonts/material-symbols.css" />
<title>로그인 — 대림에스엠</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:-apple-system,"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif;
    background:linear-gradient(160deg,#1d4ed8 0%,#1e40af 55%,#172554 100%);color:#111827;
    -webkit-font-smoothing:antialiased;font-size:16px;min-height:100vh;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);}
  .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 500,'GRAD' 0,'opsz' 24;display:inline-flex;align-items:center;justify-content:center;line-height:1;}
  .wrap{max-width:440px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:28px 22px;}

  .brand{text-align:center;color:#fff;margin-bottom:26px;}
  .brand .logo{width:64px;height:64px;border-radius:18px;background:rgba(255,255,255,.16);display:inline-flex;align-items:center;justify-content:center;margin-bottom:14px;}
  .brand .logo .material-symbols-outlined{font-size:38px;color:#fff;}
  .brand h1{font-size:24px;font-weight:800;letter-spacing:-.4px;}
  .brand p{font-size:14px;opacity:.85;margin-top:5px;}

  .card{background:#fff;border-radius:20px;padding:22px 20px 20px;box-shadow:0 18px 40px rgba(0,0,0,.22);}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:13px;font-weight:700;color:#4b5563;margin-bottom:7px;}
  .field .inp{position:relative;}
  .field .inp .material-symbols-outlined{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:21px;color:#94a3b8;}
  .field input[type=text],.field input[type=password]{width:100%;min-height:52px;padding:0 14px 0 44px;font-size:17px;
    border:2px solid #e2e6ee;border-radius:14px;background:#f8fafc;-webkit-appearance:none;color:#111827;}
  .field input:focus{outline:none;border-color:#1d4ed8;background:#fff;}
  .pw-toggle{position:absolute;right:4px;top:50%;transform:translateY(-50%);width:44px;height:44px;border:none;background:transparent;color:#94a3b8;display:flex;align-items:center;justify-content:center;cursor:pointer;}

  .remember{display:flex;align-items:center;gap:10px;margin:4px 2px 16px;cursor:pointer;user-select:none;}
  .remember input{width:22px;height:22px;accent-color:#1d4ed8;}
  .remember .lbl{font-size:15px;font-weight:600;color:#374151;}
  .remember .sub{font-size:12px;color:#9aa3b2;display:block;font-weight:400;margin-top:1px;}

  .btn-login{width:100%;min-height:54px;border:none;border-radius:14px;background:#1d4ed8;color:#fff;font-size:18px;font-weight:800;
    display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;}
  .btn-login:active{opacity:.85;}
  .btn-login:disabled{opacity:.6;}
  .btn-login .spin{width:20px;height:20px;border:3px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .err{background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;border-radius:12px;padding:11px 14px;font-size:14px;font-weight:600;margin-bottom:14px;display:none;align-items:flex-start;gap:8px;}
  .err.show{display:flex;}
  .err .material-symbols-outlined{font-size:19px;flex:none;}

  .foot{text-align:center;margin-top:18px;}
  .foot a{color:rgba(255,255,255,.9);font-size:13px;text-decoration:none;display:inline-flex;align-items:center;gap:5px;}
  .foot a .material-symbols-outlined{font-size:16px;}

  .booting{position:fixed;inset:0;background:#1d4ed8;display:flex;align-items:center;justify-content:center;z-index:50;}
  .booting .spin{width:34px;height:34px;border:4px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;}
</style>
</head>
<body>
  <!-- 자동로그인 확인 중 스플래시(이미 로그인/remember면 바로 홈으로) -->
  <div class="booting" id="booting"><div class="spin"></div></div>

  <div class="wrap" id="wrap" style="display:none;">
    <div class="brand">
      <div class="logo"><span class="material-symbols-outlined">apartment</span></div>
      <h1>대림에스엠</h1>
      <p>직원 로그인</p>
    </div>

    <form class="card" id="loginForm" autocomplete="on">
      <div class="err" id="err"><span class="material-symbols-outlined">error</span><span id="errMsg"></span></div>

      <div class="field">
        <label for="userId">아이디</label>
        <div class="inp">
          <span class="material-symbols-outlined">person</span>
          <input type="text" id="userId" name="username" autocomplete="username" autocapitalize="none" autocorrect="off" spellcheck="false" inputmode="text" placeholder="아이디" required>
        </div>
      </div>

      <div class="field">
        <label for="password">비밀번호</label>
        <div class="inp">
          <span class="material-symbols-outlined">lock</span>
          <input type="password" id="password" name="password" autocomplete="current-password" placeholder="비밀번호" required>
          <button type="button" class="pw-toggle" id="pwToggle" aria-label="비밀번호 표시"><span class="material-symbols-outlined">visibility</span></button>
        </div>
      </div>

      <label class="remember">
        <input type="checkbox" id="remember" checked>
        <span class="lbl">자동 로그인 유지
          <span class="sub">서버가 업데이트돼도 다시 로그인할 필요 없어요</span>
        </span>
      </label>

      <button type="submit" class="btn-login" id="submitBtn">
        <span id="btnLabel">로그인</span>
      </button>
    </form>

    <!-- 임시 비밀번호 사용자: 새 비밀번호 설정(보안상 변경 전 진입 차단) -->
    <form class="card" id="changeForm" autocomplete="on" style="display:none;">
      <div style="text-align:center;margin-bottom:14px;">
        <div style="font-size:19px;font-weight:800;color:#1d4ed8;">새 비밀번호 설정</div>
        <div style="font-size:13px;color:#6b7280;margin-top:5px;line-height:1.5;">임시 비밀번호로 로그인했어요.<br>안전을 위해 새 비밀번호로 바꿔주세요.</div>
      </div>
      <div class="err" id="cErr"><span class="material-symbols-outlined">error</span><span id="cErrMsg"></span></div>
      <div class="field">
        <label for="newPw">새 비밀번호</label>
        <div class="inp">
          <span class="material-symbols-outlined">lock_reset</span>
          <input type="password" id="newPw" name="new-password" autocomplete="new-password" placeholder="6자 이상" required>
        </div>
      </div>
      <div class="field">
        <label for="newPw2">새 비밀번호 확인</label>
        <div class="inp">
          <span class="material-symbols-outlined">lock_reset</span>
          <input type="password" id="newPw2" name="new-password" autocomplete="new-password" placeholder="한 번 더 입력" required>
        </div>
      </div>
      <button type="submit" class="btn-login" id="changeBtn"><span id="changeLabel">변경하고 시작하기</span></button>
    </form>

    <div class="foot">
      <a href="/?desktop=1"><span class="material-symbols-outlined">desktop_windows</span>PC 화면으로 보기</a>
    </div>
  </div>

<script>
(function(){
  var booting = document.getElementById('booting');
  var wrap = document.getElementById('wrap');
  var form = document.getElementById('loginForm');
  var errBox = document.getElementById('err');
  var errMsg = document.getElementById('errMsg');
  var btn = document.getElementById('submitBtn');
  var btnLabel = document.getElementById('btnLabel');

  function showLogin(){ booting.style.display='none'; wrap.style.display='flex'; }
  function showErr(msg){ errMsg.textContent = msg || '로그인에 실패했습니다.'; errBox.classList.add('show'); }
  function clearErr(){ errBox.classList.remove('show'); }

  // 비밀번호 보기 토글
  document.getElementById('pwToggle').addEventListener('click', function(){
    var p = document.getElementById('password');
    var on = p.type === 'password';
    p.type = on ? 'text' : 'password';
    this.querySelector('.material-symbols-outlined').textContent = on ? 'visibility_off' : 'visibility';
  });

  // 진입 시: 이미 로그인(또는 remember 쿠키로 자동 복구) 가능하면 바로 홈으로
  fetch('/api/auth/me', { credentials:'same-origin', cache:'no-store' })
    .then(function(r){ return r.json(); })
    .then(function(d){
      // 이미 로그인 + 임시비번이면 변경부터(아래 로그인 폼에서 재로그인→변경 단계). 그 외엔 바로 홈.
      if (d && d.loggedIn && !d.mustChangePassword) { goHome(); return; }
      showLogin();
    })
    .catch(function(){ showLogin(); });

  // 로그인 제출
  var busy = false;
  form.addEventListener('submit', function(e){
    e.preventDefault();
    if (busy) return;
    clearErr();
    var userId = document.getElementById('userId').value.trim();
    var password = document.getElementById('password').value;
    var remember = document.getElementById('remember').checked;
    if (!userId || !password) { showErr('아이디와 비밀번호를 입력해주세요.'); return; }

    busy = true;
    btn.disabled = true;
    btnLabel.textContent = '';
    btn.insertAdjacentHTML('afterbegin', '<span class="spin" id="loginSpin"></span>');

    fetch('/api/auth/login', {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      credentials:'same-origin',
      body: JSON.stringify({ userId: userId, password: password, remember: remember })
    })
    .then(function(r){ return r.json().then(function(j){ return { status:r.status, body:j }; }); })
    .then(function(res){
      if (res.status === 200 && res.body && res.body.ok) {
        if (res.body.mustChangePassword) {
          // 임시 비밀번호 → 새 비밀번호 설정 단계(변경 전 진입 차단)
          restoreBtn();
          enterChangePw(password);
          return;
        }
        goHome();
        return;
      }
      restoreBtn();
      showErr((res.body && res.body.error) || '로그인에 실패했습니다.');
    })
    .catch(function(){
      restoreBtn();
      showErr('네트워크 오류입니다. 잠시 후 다시 시도해주세요.');
    });
  });

  function restoreBtn(){
    busy = false;
    btn.disabled = false;
    var s = document.getElementById('loginSpin'); if (s) s.remove();
    btnLabel.textContent = '로그인';
  }

  // 로그인 완료 → 홈으로(예전에 눌린 PC강제 플래그 해제: 폰에서 PC로 다시 안 튕기게)
  function goHome(){
    try { localStorage.removeItem('wf_force_desktop'); } catch(e) {}
    location.replace('/m/');
  }

  // ── 임시 비밀번호: 새 비밀번호 설정 단계 ──
  var currentPwForChange = '';
  function enterChangePw(currentPw){
    currentPwForChange = currentPw || '';
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('changeForm').style.display = 'block';
    var np = document.getElementById('newPw'); if (np) np.focus();
  }

  var cBusy = false;
  document.getElementById('changeForm').addEventListener('submit', function(e){
    e.preventDefault();
    if (cBusy) return;
    var cErr = document.getElementById('cErr'), cErrMsg = document.getElementById('cErrMsg');
    function cShowErr(m){ cErrMsg.textContent = m; cErr.classList.add('show'); }
    cErr.classList.remove('show');
    var np = document.getElementById('newPw').value;
    var np2 = document.getElementById('newPw2').value;
    if (!np || np.length < 6) { cShowErr('새 비밀번호는 6자 이상이어야 합니다.'); return; }
    if (np !== np2) { cShowErr('두 비밀번호가 일치하지 않습니다.'); return; }
    if (np === currentPwForChange) { cShowErr('임시 비밀번호와 다른 비밀번호로 설정해주세요.'); return; }

    cBusy = true;
    var cBtn = document.getElementById('changeBtn'), cLabel = document.getElementById('changeLabel');
    cBtn.disabled = true; cLabel.textContent = '';
    cBtn.insertAdjacentHTML('afterbegin', '<span class="spin" id="cSpin"></span>');

    fetch('/api/auth/change-password', {
      method:'POST', headers:{ 'Content-Type':'application/json' }, credentials:'same-origin',
      body: JSON.stringify({ currentPassword: currentPwForChange, newPassword: np })
    })
    .then(function(r){ return r.json().then(function(j){ return { status:r.status, body:j }; }); })
    .then(function(res){
      if (res.status === 200 && res.body && res.body.ok) { goHome(); return; }
      cRestore();
      cShowErr((res.body && res.body.error) || '비밀번호 변경에 실패했습니다.');
    })
    .catch(function(){ cRestore(); cShowErr('네트워크 오류입니다. 다시 시도해주세요.'); });

    function cRestore(){
      cBusy = false; cBtn.disabled = false;
      var s = document.getElementById('cSpin'); if (s) s.remove();
      cLabel.textContent = '변경하고 시작하기';
    }
  });
})();
</script>
</body>
</html>
