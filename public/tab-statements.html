<!-- tab-statements.html — 명세서 일괄 스캔 + AI 추출 + 검토 + 엑셀 export -->
<div x-data="statementsApp()" x-init="init()" class="p-6">
  <!-- ═════ 회사 모드 화면 (COMPANY 매입/매출 = 엑셀창) ═════ -->
  <template x-if="currentView==='company-buy' || currentView==='company-sell'">
    <div>
      <div class="mode-bar">
        <button class="back" @click="exitMode()">← 돌아가기</button>
        <span class="mode-badge-co">컴퍼니 (E2E)</span>
        <span :class="currentView==='company-buy'?'mode-badge-buy':'mode-badge-sell'" x-text="currentView==='company-buy'?'매입':'매출'"></span>
        <span class="mode-title">엑셀창 모드</span>
        <span style="color:#6b7280; font-size:12px;" x-text="`${(modeRows||[]).length}건 · ${filterMonth||'전체월'}`"></span>
        <div style="flex:1;"></div>
        <input type="month" class="st-input" x-model="filterMonth" @change="loadModeRows()" style="height:30px; font-size:12px;">
        <button class="st-btn st-btn-ghost st-btn-sm" @click="rematchCompanySales()">↻ 학습 재매칭</button>
        <a :href="exportUrl('COMPANY')" class="st-btn st-btn-primary st-btn-sm">📊 E2E 엑셀 다운로드</a>
      </div>
      <div class="mode-body company-mode-body">
        <!-- 좌측 엑셀 표 -->
        <div class="ce-table-wrap">
          <table class="ce-grid">
            <colgroup>
              <col class="ce-col-rownum">
              <col class="ce-col-date">
              <col class="ce-col-name">
              <col class="ce-col-spec">
              <col class="ce-col-qty">
              <col class="ce-col-price">
              <col class="ce-col-amount">
              <col class="ce-col-vat">
              <col class="ce-col-total">
              <col class="ce-col-notes">
            </colgroup>
            <thead>
              <tr>
                <th></th>
                <th><span class="col-letter">A</span>일자</th>
                <th><span class="col-letter">C</span>상품명</th>
                <th><span class="col-letter">D</span>규격</th>
                <th><span class="col-letter">E</span>수량</th>
                <th><span class="col-letter">F</span>단가</th>
                <th><span class="col-letter">G</span>금액</th>
                <th><span class="col-letter">H</span>세액</th>
                <th><span class="col-letter">I</span>합계</th>
                <th><span class="col-letter">J</span>비고</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="(r, idx) in (modeRows||[])" :key="r._key">
                <tr :class="{selected: selectedRowIdx===idx}" @click="selectModeRow(idx)">
                  <td class="row-num" x-text="idx+1"></td>
                  <td><input x-model="r.date" :title="r.date"></td>
                  <td class="ce-text"><textarea rows="2" x-model="r.name" :title="r.name"></textarea></td>
                  <td class="ce-text"><textarea rows="2" x-model="r.spec" :title="r.spec"></textarea></td>
                  <td class="num"><input type="number" x-model.number="r.qty" @input="recalc(r)"></td>
                  <td class="num"><input type="number" x-model.number="r.price" @input="recalc(r)"></td>
                  <td class="num"><input type="number" x-model.number="r.amount" @input="recalc(r, true)"></td>
                  <td class="num"><input type="number" x-model.number="r.vat"></td>
                  <td class="num"><input type="number" x-model.number="r.total"></td>
                  <td class="ce-text"><textarea rows="2" x-model="r.notes" :title="r.notes"></textarea></td>
                </tr>
              </template>
              <tr x-show="!modeRows || modeRows.length===0">
                <td colspan="10" style="text-align:center; padding:40px; color:#9ca3af;">
                  이 분할에 등록된 명세서 라인 아이템 없음
                </td>
              </tr>
            </tbody>
          </table>
          <div class="ce-action">
            <button class="st-btn st-btn-ghost st-btn-sm" @click="addBlankRow()">+ 행 추가</button>
            <span style="color:#6b7280;">선택 행 클릭 시 우측에 원본 미리보기</span>
            <div style="flex:1;"></div>
            <span style="font-size:12px; color:#6b7280;">합계:</span>
            <span style="font-weight:600; color:#1f2937;" x-text="modeSum().toLocaleString() + '원'"></span>
            <button class="st-btn st-btn-success st-btn-sm" @click="confirmAllInMode()">✓ 전체 확정</button>
          </div>
        </div>
        <!-- 우측 미리보기 -->
        <div class="ce-pane">
          <h4>선택 행 원본 명세서</h4>
          <div class="ce-preview-img" x-show="selectedRow">
            <template x-if="selectedRow && (selectedRow.source_file||'').toLowerCase().endsWith('.pdf')">
              <iframe :src="`/api/statements/${selectedRow.statement_id}/file`"></iframe>
            </template>
            <template x-if="selectedRow && !(selectedRow.source_file||'').toLowerCase().endsWith('.pdf')">
              <img :src="`/api/statements/${selectedRow.statement_id}/file`" alt="원본">
            </template>
          </div>
          <div class="ce-preview-img" x-show="!selectedRow" style="color:#9ca3af; font-size:12px;">
            왼쪽 표에서 행을 클릭하면 원본 보임
          </div>
          <div x-show="selectedRow" style="font-size:11px; color:#6b7280;">
            <div>거래처: <b x-text="selectedRow?.vendor"></b></div>
            <div>업로드: <span x-text="selectedRow?.uploaded_at"></span></div>
            <div>원본파일: <span x-text="selectedRow?.source_file"></span></div>
          </div>
          <div style="display:flex; gap:5px;">
            <button class="st-btn st-btn-ghost st-btn-sm" style="flex:1;" @click="prevRow()">← 이전</button>
            <button class="st-btn st-btn-ghost st-btn-sm" style="flex:1;" @click="nextRow()">다음 →</button>
          </div>
        </div>
      </div>
    </div>
  </template>

  <!-- ═════ 에스엠 이카운트 모드 (캡처 모방) ═════ -->
  <template x-if="currentView==='sm-buy' || currentView==='sm-sell'">
    <div>
      <!-- 이카운트 헤더바 (진한 파랑) -->
      <div style="background:#1E40FA; color:#fff; padding:6px 12px; font-size:12px; display:flex; align-items:center; gap:8px; border-radius:4px 4px 0 0;">
        <button @click="exitMode()" style="background:rgba(255,255,255,0.15); border:0; color:#fff; padding:3px 10px; border-radius:3px; font-size:11px; cursor:pointer;">← 돌아가기</button>
        <span x-text="currentView==='sm-buy' ? '구매수정 [OCR 자동입력]' : '판매수정 [OCR 자동입력]'"></span>
        <div style="flex:1;"></div>
        <a :href="exportUrl('SM')" style="background:rgba(255,255,255,0.15); border:0; color:#fff; padding:3px 10px; border-radius:3px; font-size:11px; text-decoration:none;">📊 엑셀</a>
      </div>

      <div style="background:#fff; border:1px solid #c7c9d1; border-top:0; border-radius:0 0 6px 6px; display:grid; grid-template-columns: 1.2fr 1fr; min-height:540px;">
        <!-- 좌측: 이카운트 입력 폼 모방 -->
        <div style="padding:14px; border-right:1px solid #c7c9d1; overflow:auto;">
          <div style="display:flex; align-items:center; gap:8px; margin-bottom:10px;">
            <span style="color:#c7c9d1; font-size:14px;">★</span>
            <span style="font-weight:500; font-size:13px;" x-text="currentView==='sm-buy' ? '구매수정' : '판매수정'"></span>
            <div style="flex:1;"></div>
            <button style="font-size:11px; padding:3px 10px; background:#fff; border:1px solid #c7c9d1; border-radius:3px;">확인취소</button>
            <button style="font-size:11px; padding:3px 10px; background:#fff; border:1px solid #c7c9d1; border-radius:3px;">Option</button>
            <button style="font-size:11px; padding:3px 10px; background:#fff; border:1px solid #c7c9d1; border-radius:3px;">도움말</button>
          </div>
          <div style="margin-bottom:10px;">
            <span style="background:#1E40FA; color:#fff; font-size:11px; padding:4px 12px; border-radius:14px;" x-text="currentView==='sm-buy' ? '구매입력 ▼' : '거래명세서 ▼'"></span>
            <button style="background:#fff; border:1px solid #c7c9d1; padding:4px 8px; border-radius:14px; font-size:11px; margin-left:4px;">+</button>
          </div>

          <!-- 상단 정보 영역 -->
          <div style="display:grid; grid-template-columns:60px 1fr 60px 1fr; gap:5px 10px; font-size:11px; align-items:center; margin-bottom:10px;">
            <span style="color:#444;">일자</span>
            <input type="date" :value="selectedRow?.date || ''" style="height:24px; font-size:11px; border:1px solid #d4d6dd; border-radius:2px; padding:2px 4px;">
            <span style="color:#444;">거래처</span>
            <div style="display:flex; gap:4px; align-items:center;">
              <input :value="selectedRow?.vendor_biz_no || ''" placeholder="사업자번호" style="width:100px; height:24px; font-size:11px; border:1px solid #d4d6dd; border-radius:2px; padding:2px 4px;">
              <span style="color:#888;">🔍</span>
              <span style="font-size:11px; flex:1;" x-text="selectedRow?.vendor || ''"></span>
            </div>
            <span style="color:#444;">담당자</span>
            <input placeholder="담당자" style="height:24px; font-size:11px; border:1px solid #d4d6dd; border-radius:2px; padding:2px 4px;">
            <span style="color:#444;" x-text="currentView==='sm-buy' ? '입고창고' : '출하창고'"></span>
            <div style="display:flex; gap:4px;">
              <input value="100" style="width:40px; height:24px; font-size:11px; border:1px solid #d4d6dd; border-radius:2px; padding:2px 4px;">
              <span style="line-height:24px;">본사창고</span>
            </div>
            <span style="color:#444;">거래유형</span>
            <select style="height:24px; font-size:11px; border:1px solid #d4d6dd;">
              <option>부가세율 적용</option>
            </select>
            <span style="color:#444;">통화</span>
            <select style="height:24px; font-size:11px; border:1px solid #d4d6dd;">
              <option>내자</option>
            </select>
          </div>

          <!-- 액션 버튼 행 -->
          <div style="display:flex; gap:3px; flex-wrap:wrap; margin:8px 0; font-size:10px;">
            <button style="padding:2px 7px; background:#fff; border:1px solid #c7c9d1; border-radius:2px;">찾기(F3)</button>
            <button style="padding:2px 7px; background:#fff; border:1px solid #c7c9d1; border-radius:2px;">정렬</button>
            <button style="padding:2px 7px; background:#fff; border:1px solid #c7c9d1; border-radius:2px;" x-text="currentView==='sm-buy' ? '거래내역보기(구매) ▼' : '거래내역보기(판매) ▼'"></button>
            <button style="padding:2px 7px; background:#fff; border:1px solid #c7c9d1; border-radius:2px;">My품목 ▼</button>
            <button style="padding:2px 7px; background:#fff; border:1px solid #c7c9d1; border-radius:2px;">할인</button>
            <button style="padding:2px 7px; background:#fff; border:1px solid #c7c9d1; border-radius:2px;">전표불러오기</button>
            <button style="padding:2px 7px; background:#fff; border:1px solid #c7c9d1; border-radius:2px;">바코드</button>
          </div>

          <!-- 라인 아이템 표 -->
          <table style="width:100%; border-collapse:collapse; font-size:11px;">
            <thead>
              <tr style="background:#f3f4f6;">
                <th style="border:1px solid #d4d6dd; padding:4px; width:18px;"></th>
                <th style="border:1px solid #d4d6dd; padding:4px; width:22px;"></th>
                <th style="border:1px solid #d4d6dd; padding:4px; font-weight:500;">품목코드</th>
                <th style="border:1px solid #d4d6dd; padding:4px; font-weight:500;">품목명</th>
                <th style="border:1px solid #d4d6dd; padding:4px; font-weight:500;">규격</th>
                <th style="border:1px solid #d4d6dd; padding:4px; font-weight:500; width:50px;">수량</th>
                <th style="border:1px solid #d4d6dd; padding:4px; font-weight:500; width:60px;">단가</th>
                <th style="border:1px solid #d4d6dd; padding:4px; font-weight:500; width:80px;">공급가액</th>
                <th style="border:1px solid #d4d6dd; padding:4px; font-weight:500; width:60px;">부가세</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="(r, idx) in (modeRows||[])" :key="r._key">
                <tr :class="{'selected-ec': selectedRowIdx===idx}" @click="selectModeRow(idx)" style="cursor:pointer;">
                  <td style="border:1px solid #d4d6dd; padding:3px; text-align:center;">☐</td>
                  <td style="border:1px solid #d4d6dd; padding:3px; text-align:center; color:#888; font-size:10px;" x-text="(idx+1)+'▽'"></td>
                  <td style="border:1px solid #d4d6dd; padding:0;"><input x-model="r.item_code" placeholder="자동매칭" style="width:100%; padding:3px 5px; border:0; background:transparent; font-size:11px; outline:none;"></td>
                  <td style="border:1px solid #d4d6dd; padding:0;"><input x-model="r.name" style="width:100%; padding:3px 5px; border:0; background:transparent; font-size:11px; outline:none;"></td>
                  <td style="border:1px solid #d4d6dd; padding:0;"><input x-model="r.spec" style="width:100%; padding:3px 5px; border:0; background:transparent; font-size:11px; outline:none;"></td>
                  <td style="border:1px solid #d4d6dd; padding:0;"><input type="number" x-model.number="r.qty" @input="recalc(r)" style="width:100%; padding:3px 5px; border:0; background:transparent; font-size:11px; outline:none; text-align:right;"></td>
                  <td style="border:1px solid #d4d6dd; padding:0;"><input type="number" x-model.number="r.price" @input="recalc(r)" style="width:100%; padding:3px 5px; border:0; background:transparent; font-size:11px; outline:none; text-align:right;"></td>
                  <td style="border:1px solid #d4d6dd; padding:0;"><input type="number" x-model.number="r.amount" @input="recalc(r, true)" style="width:100%; padding:3px 5px; border:0; background:transparent; font-size:11px; outline:none; text-align:right;"></td>
                  <td style="border:1px solid #d4d6dd; padding:0;"><input type="number" x-model.number="r.vat" style="width:100%; padding:3px 5px; border:0; background:transparent; font-size:11px; outline:none; text-align:right;"></td>
                </tr>
              </template>
              <tr x-show="!modeRows||modeRows.length===0">
                <td colspan="9" style="text-align:center; padding:30px; color:#9ca3af;">이 분할에 등록할 명세서 없음</td>
              </tr>
              <tr style="background:#f9fafb;" x-show="modeRows && modeRows.length>0">
                <td colspan="5" style="border:1px solid #d4d6dd; padding:3px;"></td>
                <td style="border:1px solid #d4d6dd; padding:3px; text-align:right; font-weight:500;" x-text="modeRows.reduce((s,r)=>s+(Number(r.qty)||0),0)"></td>
                <td style="border:1px solid #d4d6dd; padding:3px;"></td>
                <td style="border:1px solid #d4d6dd; padding:3px; text-align:right; font-weight:500;" x-text="modeRows.reduce((s,r)=>s+(Number(r.amount)||0),0).toLocaleString()"></td>
                <td style="border:1px solid #d4d6dd; padding:3px; text-align:right; font-weight:500;" x-text="modeRows.reduce((s,r)=>s+(Number(r.vat)||0),0).toLocaleString()"></td>
              </tr>
            </tbody>
          </table>

          <!-- 하단 액션 -->
          <div style="display:flex; gap:4px; margin-top:14px; align-items:center;">
            <span style="color:#1E40FA; font-size:13px;">✈</span>
            <button @click="ecountRegister(currentView==='sm-buy'?'매입':'매출', true)" style="padding:5px 14px; background:#1E40FA; color:#fff; border:0; border-radius:3px; font-size:11px; font-weight:500;" title="실제 등록 전 dry-run 검증">⚡ 이카운트 dry-run</button>
            <button @click="ecountRegister(currentView==='sm-buy'?'매입':'매출', false)" style="padding:5px 14px; background:#dc2626; color:#fff; border:0; border-radius:3px; font-size:11px; font-weight:500;">🔴 실제 등록</button>
            <button class="back" @click="addBlankRow()" style="font-size:11px;">+ 행 추가</button>
            <div style="flex:1;"></div>
            <span style="color:#6b7280; font-size:11px;" x-text="`${(modeRows||[]).length}건 / 합계 ${modeSum().toLocaleString()}원`"></span>
          </div>
          <div x-show="ecountMsg" x-cloak style="margin-top:10px; padding:10px; background:#f3f4f6; border-radius:4px; font-size:11px; white-space:pre-wrap; max-height:140px; overflow:auto;" x-text="ecountMsg"></div>
        </div>

        <!-- 우측 미리보기 -->
        <div class="ce-pane">
          <h4>선택 행 원본 (1/<span x-text="(modeRows||[]).length"></span>)</h4>
          <div class="ce-preview-img" x-show="selectedRow && selectedRow.statement_id">
            <template x-if="selectedRow && (selectedRow.source_file||'').toLowerCase().endsWith('.pdf')">
              <iframe :src="`/api/statements/${selectedRow.statement_id}/file`"></iframe>
            </template>
            <template x-if="selectedRow && !(selectedRow.source_file||'').toLowerCase().endsWith('.pdf')">
              <img :src="`/api/statements/${selectedRow.statement_id}/file`" alt="원본">
            </template>
          </div>
          <div class="ce-preview-img" x-show="!selectedRow || !selectedRow.statement_id" style="color:#9ca3af; font-size:12px;">
            왼쪽 표에서 행을 클릭하면 원본 보임
          </div>
          <div x-show="selectedRow" style="font-size:11px; color:#6b7280;">
            <div>거래처: <b x-text="selectedRow?.vendor"></b></div>
            <div>업로드: <span x-text="selectedRow?.uploaded_at"></span></div>
          </div>
          <div style="display:flex; gap:5px;">
            <button class="st-btn st-btn-ghost st-btn-sm" style="flex:1;" @click="prevRow()">← 이전</button>
            <button class="st-btn st-btn-ghost st-btn-sm" style="flex:1;" @click="nextRow()">다음 →</button>
          </div>
        </div>
      </div>
    </div>
  </template>

  <!-- ═════ 시안 문구 확인 모드 ═════ -->
  <template x-if="currentView==='spell-check'">
    <div @paste.window="onSpellPaste($event)" @keydown.escape.window="exitMode()">
      <div class="mode-bar">
        <button class="back" @click="exitMode()">← 돌아가기</button>
        <span style="background:#fef3c7; color:#92400e; font-size:12px; font-weight:600; padding:4px 10px; border-radius:4px;">✏️ 시안 문구 확인</span>
        <span style="color:#6b7280; font-size:13px;">시안 이미지를 붙이면 AI가 다국어 문구/오타 확인</span>
        <div style="flex:1;"></div>
        <span x-show="spellResults.length > 0" x-cloak style="font-size:12px; color:#6b7280;" x-text="`${spellResults.length}장 검사 · 의심 ${spellResults.reduce((s,r)=>s+(r.issues||[]).length,0)}건 · 정상 ${spellResults.filter(r=>(!r.issues||r.issues.length===0)&&r.text).length}장`"></span>
        <span x-show="spellChecking" x-cloak style="font-size:12px; color:#1e40af; font-weight:500;">⏳ AI 분석중 <span x-text="spellChecked"></span>/<span x-text="spellTotal"></span></span>
        <button class="back" @click="spellResults=[]; spellSelectedIdx=-1" x-show="spellResults.length > 0">초기화</button>
      </div>

      <!-- 항상 보이는 Ctrl+V 작은 영역 + 좌우 분할 -->
      <div class="mode-body" style="grid-template-columns: 320px 1fr; min-height:600px;">
        <!-- 좌측: Ctrl+V 영역 + 검사 결과 리스트 -->
        <div style="background:#f9fafb; border-right:1px solid #c7c9d1; display:flex; flex-direction:column;">
          <div class="drop-zone" tabindex="0" @click="$refs.spellFile.click()"
            @dragover.prevent="dragOver=true" @dragleave="dragOver=false"
            @drop.prevent="dragOver=false; spellCheck($event.dataTransfer.files)" :class="dragOver?'dragover':''"
            style="margin:12px; padding:18px;">
            <div style="font-size:24px; margin-bottom:4px;">📋</div>
            <div style="font-size:13px; font-weight:600; margin-bottom:3px;">Ctrl+V 또는 드래그</div>
            <div style="font-size:10px; color:#6b7280;">이미지 · 다국어 문구 · 카톡 사진 복사해서 붙여넣기</div>
          </div>
          <input type="file" multiple accept="image/*" x-ref="spellFile" style="display:none;" @change="spellCheck($event.target.files); $event.target.value=''">

          <!-- 결과 리스트 (간단한 행 형식) -->
          <div style="flex:1; overflow-y:auto; padding:0 4px 12px;">
            <template x-for="(s, i) in spellResults" :key="i">
              <div @click="spellSelectedIdx=i"
                :style="`margin: 2px 8px; padding:8px 10px; border-radius:6px; cursor:pointer; background:${spellSelectedIdx===i?'#dbeafe':'#fff'}; border:1px solid ${spellSelectedIdx===i?'#1E40FA':'#e5e7eb'}; transition: all 0.15s;`">
                <div style="display:flex; align-items:center; gap:8px;">
                  <img :src="s.imageDataUrl" style="width:38px; height:38px; object-fit:cover; border-radius:4px; border:1px solid #e5e7eb;">
                  <div style="flex:1; min-width:0;">
                    <div style="font-size:11px; font-weight:600; color:#1f2937; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" x-text="s.file"></div>
                    <div style="font-size:10px; margin-top:2px;">
                      <span x-show="s.issues && s.issues.length > 0" style="background:#fee2e2; color:#991b1b; padding:1px 6px; border-radius:3px; font-weight:600;" x-text="`⚠️ ${s.issues.length}건`"></span>
                      <span x-show="(!s.issues || s.issues.length === 0) && s.text" style="background:#d1fae5; color:#065f46; padding:1px 6px; border-radius:3px; font-weight:600;">✓ 정상</span>
                    </div>
                  </div>
                </div>
              </div>
            </template>
            <div x-show="spellResults.length === 0 && !spellChecking" x-cloak style="text-align:center; color:#9ca3af; font-size:11px; padding:30px 14px;">
              ↑ 위에 시안 이미지<br>붙여넣으면 AI 분석
            </div>
          </div>
        </div>

        <!-- 우측: 선택된 시안 상세 (큰 미리보기 + 추출 텍스트 + 의심) -->
        <div style="background:#fff; padding:0; overflow:auto;">
          <template x-if="spellSelectedIdx >= 0 && spellResults[spellSelectedIdx]">
            <div style="display:grid; grid-template-columns: 1.3fr 1fr; min-height:600px;">
              <!-- 좌: 시안 큰 미리보기 -->
              <div style="background:#1a1d23; padding:20px; display:flex; align-items:center; justify-content:center; overflow:auto; position:relative;">
                <img :src="spellResults[spellSelectedIdx].imageDataUrl" style="max-width:100%; max-height:90vh; border-radius:4px; box-shadow:0 4px 20px rgba(0,0,0,0.3);">
                <!-- 큰 상태 배지 (한 눈에) -->
                <div x-show="(spellResults[spellSelectedIdx].issues||[]).length === 0 && spellResults[spellSelectedIdx].text"
                  style="position:absolute; top:14px; right:14px; background:#10b981; color:#fff; padding:8px 16px; border-radius:6px; font-size:14px; font-weight:700; box-shadow:0 2px 8px rgba(16,185,129,0.4);">
                  ✓ 정상
                </div>
                <div x-show="(spellResults[spellSelectedIdx].issues||[]).length > 0"
                  style="position:absolute; top:14px; right:14px; background:#ef4444; color:#fff; padding:8px 16px; border-radius:6px; font-size:14px; font-weight:700; box-shadow:0 2px 8px rgba(239,68,68,0.4);"
                  x-text="`⚠️ ${(spellResults[spellSelectedIdx].issues||[]).length}건 의심`">
                </div>
              </div>
              <!-- 우: 분석 결과 -->
              <div style="padding:18px; overflow:auto; max-height:90vh;">
                <h3 style="margin:0 0 12px; font-size:13px; word-break:break-all; color:#6b7280; font-weight:500;" x-text="spellResults[spellSelectedIdx].file"></h3>

                <!-- 의심 항목 (있을 때만) -->
                <template x-if="spellResults[spellSelectedIdx].issues && spellResults[spellSelectedIdx].issues.length > 0">
                  <div style="margin-bottom:18px;">
                    <div style="font-size:12px; font-weight:600; color:#92400e; margin-bottom:8px;">⚠️ 의심 항목</div>
                    <template x-for="(iss, j) in spellResults[spellSelectedIdx].issues" :key="j">
                      <div style="background:#fffbeb; border:1px solid #fcd34d; padding:10px 12px; border-radius:6px; margin-bottom:6px;">
                        <div style="display:flex; align-items:center; gap:6px; margin-bottom:5px;">
                          <span style="background:#fbbf24; color:#78350f; font-size:10px; font-weight:700; padding:2px 8px; border-radius:3px;" x-text="iss.type"></span>
                          <span style="font-size:12px; color:#92400e; font-weight:500;" x-text="iss.message"></span>
                        </div>
                        <template x-if="iss.found || iss.suggest">
                          <div style="font-size:11px; color:#78350f; padding-top:5px; border-top:1px dashed #fcd34d;">
                            <template x-if="iss.found"><span>📍 시안: <code style="background:#fef3c7; padding:2px 6px; border-radius:3px; font-size:11px;" x-text="iss.found"></code></span></template>
                            <template x-if="iss.suggest"><span style="margin-left:6px;">→ <code style="background:#d1fae5; color:#065f46; padding:2px 6px; border-radius:3px; font-size:11px;" x-text="iss.suggest"></code></span></template>
                          </div>
                        </template>
                      </div>
                    </template>
                  </div>
                </template>

                <!-- 추출 텍스트 (의심 단어 형광펜) -->
                <div>
                  <div style="font-size:12px; font-weight:600; color:#374151; margin-bottom:8px;">📝 추출 텍스트 <span style="font-weight:400; color:#9ca3af; font-size:11px;">(의심 단어 형광펜 표시)</span></div>
                  <pre style="background:#f3f4f6; padding:12px; border-radius:6px; font-size:13px; line-height:1.7; white-space:pre-wrap; font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; margin:0;"
                    x-html="highlightText(spellResults[spellSelectedIdx].text, spellResults[spellSelectedIdx].issues)"></pre>
                </div>
              </div>
            </div>
          </template>
          <div x-show="spellSelectedIdx < 0 || !spellResults[spellSelectedIdx]" style="display:flex; align-items:center; justify-content:center; min-height:600px; color:#9ca3af; font-size:13px; padding:40px;">
            <div style="text-align:center;">
              <div style="font-size:36px; margin-bottom:10px;">←</div>
              <div>좌측 리스트에서 시안 클릭<br>또는 위에 Ctrl+V 로 새 시안 붙여넣기</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </template>

  <!-- ═════ 참조 데이터 풀 (4분할 학습 자료 미리보기) ═════ -->
  <template x-if="currentView==='data-pool'">
    <div>
      <div class="mode-bar">
        <button class="back" @click="exitMode()">← 돌아가기</button>
        <span style="background:#e0e7ff; color:#3730a3; font-size:11px; font-weight:600; padding:3px 8px; border-radius:4px;">📊 참조 데이터 풀</span>
        <span class="mode-title">4분할 학습 자료</span>
        <span style="color:#6b7280; font-size:12px;">분할별로 어떤 엑셀이 학습에 사용되는지 / 클릭하면 미리보기</span>
        <div style="flex:1;"></div>
      </div>
      <div class="mode-body" style="grid-template-columns: 360px 1fr; min-height:600px;">
        <!-- 좌측: 분할별 파일 목록 -->
        <div style="background:#f9fafb; border-right:1px solid #c7c9d1; overflow-y:auto;">
          <template x-for="(files, group) in dataSources" :key="group">
            <div style="border-bottom: 1px solid #e5e7eb;">
              <div style="padding:10px 14px; background:#fff; font-weight:600; font-size:12px; color:#374151; position:sticky; top:0; border-bottom:1px solid #e5e7eb;" x-text="`${group} (${files.length})`"></div>
              <template x-for="f in files" :key="f.path">
                <div @click="loadDataPreview(f)"
                  :style="`padding:10px 14px; cursor:pointer; border-bottom:1px solid #f3f4f6; background:${selectedDataFile===f.path?'#dbeafe':'#fff'}; transition: all 0.15s;`">
                  <div style="font-size:11px; font-weight:500; color:#1f2937; word-break:break-all;" x-text="f.file"></div>
                  <div style="font-size:10px; color:#6b7280; margin-top:2px;" x-text="`${f.sizeKb} KB`"></div>
                </div>
              </template>
              <div x-show="files.length === 0" style="padding:14px; font-size:11px; color:#9ca3af; text-align:center;">파일 없음</div>
            </div>
          </template>
        </div>

        <!-- 우측: 선택 파일 미리보기 -->
        <div style="background:#fff; padding:14px; overflow:auto; max-height: 90vh;">
          <div x-show="!selectedDataFile" style="display:flex; align-items:center; justify-content:center; min-height:540px; color:#9ca3af;">
            <div style="text-align:center;">
              <div style="font-size:40px; margin-bottom:10px;">📊</div>
              <div>좌측 파일 클릭 → 미리보기</div>
            </div>
          </div>
          <div x-show="selectedDataFile && dataLoading" style="text-align:center; padding:40px; color:#6b7280;">
            ⏳ 파일 로딩 중...
          </div>
          <div x-show="selectedDataFile && !dataLoading" x-cloak>
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:12px;">
              <h3 style="margin:0; font-size:14px; color:#1f2937; word-break:break-all;" x-text="selectedDataFile"></h3>
              <div style="flex:1;"></div>
              <a :href="`/api/statements/data-source-file?path=${encodeURIComponent(selectedDataFile)}`" download class="st-btn st-btn-ghost st-btn-sm">⬇ 다운로드</a>
            </div>
            <!-- 시트 탭 -->
            <div style="display:flex; gap:4px; margin-bottom:8px; flex-wrap:wrap;">
              <template x-for="(sheet, i) in dataSheets" :key="i">
                <button @click="selectedSheetIdx=i"
                  :style="`padding:4px 10px; font-size:11px; border-radius:4px; cursor:pointer; ${selectedSheetIdx===i?'background:#3730a3;color:#fff;':'background:#f3f4f6;color:#374151;'} border:0;`"
                  x-text="`${sheet.name} (${sheet.rows}행)`"></button>
              </template>
            </div>
            <!-- 표 -->
            <div style="overflow:auto; max-height:75vh; border:1px solid #e5e7eb; border-radius:4px;">
              <table style="width:100%; border-collapse:collapse; font-size:11px;">
                <thead style="position:sticky; top:0; background:#f3f4f6; z-index:1;">
                  <tr>
                    <template x-for="(h, hi) in (dataSheets[selectedSheetIdx]?.headers || [])" :key="hi">
                      <th style="border:1px solid #e5e7eb; padding:6px 8px; text-align:left; font-weight:600; color:#374151; white-space:nowrap;" x-text="h"></th>
                    </template>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="(row, ri) in (dataSheets[selectedSheetIdx]?.preview || [])" :key="ri">
                    <tr>
                      <template x-for="(cell, ci) in row" :key="ci">
                        <td style="border:1px solid #e5e7eb; padding:4px 8px; color:#1f2937; white-space:nowrap; max-width:280px; overflow:hidden; text-overflow:ellipsis;" x-text="cell"></td>
                      </template>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
            <div style="margin-top:8px; font-size:11px; color:#6b7280;" x-text="`처음 100행 미리보기 / 전체 ${dataSheets[selectedSheetIdx]?.rows || 0}행`"></div>
          </div>
        </div>
      </div>
    </div>
  </template>

  <!-- ═════ Overview (4분할 카드 + 그리드) — 기존 화면 ═════ -->
  <div x-show="currentView==='overview'">
  <style>
    .st-card { background:#fff; border:1px solid #e5e7eb; border-radius:8px; padding:18px; margin-bottom:14px; }
    .st-h { font-size:14px; font-weight:700; color:#1a1d23; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
    .st-btn { padding:7px 14px; border-radius:7px; font-size:13px; font-weight:600; cursor:pointer; border:none; transition: all .15s; display:inline-flex; align-items:center; justify-content:center; gap:5px; white-space:nowrap; text-decoration:none; }
    .st-btn .material-symbols-outlined { font-size:15px; line-height:1; }
    .st-btn-primary { background:#2563eb; color:#fff; }
    .st-btn-primary:hover { background:#1d4ed8; }
    .st-btn-ghost { background:#fff; border:1px solid #d1d5db; color:#374151; }
    .st-btn-ghost:hover { background:#f9fafb; }
    .st-btn-sm { padding:4px 10px; font-size:12px; }
    .st-btn-success { background:#22c55e; color:#fff; }
    .st-btn-warn { background:#f59e0b; color:#fff; }
    .st-btn-danger { background:#ef4444; color:#fff; }
    .st-btn-danger:hover { background:#dc2626; }
    .st-input { padding:7px 11px; border:1px solid #d1d5db; border-radius:6px; font-size:13px; outline:none; background:#fff; }
    .st-input:focus { border-color:#4f6ef7; }

    .drop-zone { border:2px dashed #d1d5db; border-radius:8px; padding:32px; text-align:center; color:#6b7280; cursor:pointer; transition:all 0.15s; background:#fafbfc; }
    .drop-zone:hover, .drop-zone.dragover { border-color:#4f6ef7; background:#eef2ff; color:#4338ca; }
    .drop-zone .icon { font-size:32px; margin-bottom:8px; }

    .progress-bar { width:100%; height:18px; background:#e5e7eb; border-radius:9px; overflow:hidden; }
    .progress-bar .fill { height:100%; background:linear-gradient(90deg,#4f6ef7,#22c55e); transition:width 0.3s; display:flex; align-items:center; justify-content:center; color:#fff; font-size:11px; font-weight:600; }

    .st-grid { width:100%; border-collapse:collapse; font-size:12.5px; }
    .st-grid th { text-align:left; background:#f3f4f6; padding:8px 10px; font-weight:600; color:#374151; border-bottom:1px solid #e5e7eb; font-size:11px; text-transform:uppercase; letter-spacing:0.3px; }
    .st-grid td { padding:8px 10px; border-bottom:1px solid #f3f4f6; color:#1f2937; vertical-align:middle; }
    .st-grid tr:hover td { background:#fafbfc; cursor:pointer; }

    .badge { display:inline-block; padding:2px 8px; border-radius:99px; font-size:10px; font-weight:600; }
    .badge.pending { background:#fef3c7; color:#92400e; }
    .badge.confirmed { background:#d1fae5; color:#065f46; }
    .badge.rejected { background:#fee2e2; color:#991b1b; }
    .badge.type { background:#eef2ff; color:#4338ca; }

    .st-shell { display:flex; flex-direction:column; gap:14px; }
    .st-topbar { background:#fff; border:1px solid #e5e7eb; border-radius:8px; padding:14px; display:grid; grid-template-columns:minmax(260px,1fr) auto; gap:12px; align-items:center; }
    .st-title-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .st-title-icon { width:32px; height:32px; border-radius:8px; background:#eff6ff; color:#2563eb; display:flex; align-items:center; justify-content:center; }
    .st-title-icon .material-symbols-outlined { font-size:19px; }
    .st-title-main { font-size:16px; font-weight:800; color:#111827; line-height:1.2; }
    .st-title-meta { display:flex; flex-wrap:wrap; gap:6px; margin-top:7px; }
    .st-chip { display:inline-flex; align-items:center; gap:4px; padding:3px 8px; border:1px solid #e5e7eb; border-radius:999px; background:#f9fafb; color:#4b5563; font-size:11px; font-weight:600; }
    .st-chip.warn { background:#fffbeb; color:#92400e; border-color:#fde68a; }
    .st-chip.ok { background:#ecfdf5; color:#047857; border-color:#a7f3d0; }
    .st-chip.danger { background:#fef2f2; color:#991b1b; border-color:#fecaca; }
    .st-filters { display:flex; align-items:center; justify-content:flex-end; gap:8px; flex-wrap:wrap; }
    .st-filters .st-input { height:34px; }

    .st-workbench { display:grid; grid-template-columns:minmax(360px,1.25fr) minmax(320px,.75fr); gap:14px; align-items:stretch; }
    .st-panel { background:#fff; border:1px solid #e5e7eb; border-radius:8px; overflow:hidden; }
    .st-panel-head { padding:12px 14px; border-bottom:1px solid #f1f5f9; display:flex; align-items:center; gap:8px; }
    .st-panel-head .material-symbols-outlined { font-size:18px; color:#2563eb; }
    .st-panel-title { font-size:13px; font-weight:800; color:#1f2937; }
    .st-panel-body { padding:14px; }
    .st-upload-zone { min-height:170px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; border-color:#bfdbfe; background:#f8fbff; }
    .st-upload-zone .material-symbols-outlined { font-size:34px; color:#2563eb; }
    .st-upload-title { font-size:15px; font-weight:800; color:#111827; }
    .st-upload-types { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; }
    .st-file-pill { border:1px solid #e5e7eb; background:#fff; color:#4b5563; border-radius:999px; padding:3px 9px; font-size:11px; font-weight:700; }
    .st-queue-card { margin-top:12px; padding:12px; border:1px solid #dbeafe; background:#eff6ff; border-radius:8px; }
    .st-queue-row { display:flex; justify-content:space-between; align-items:center; gap:10px; font-size:12px; color:#1e3a8a; margin-bottom:7px; }

    .st-side-stack { display:flex; flex-direction:column; gap:12px; height:100%; }
    .st-pool-box { padding:12px; border:1px solid #bbf7d0; background:#f0fdf4; border-radius:8px; }
    .st-pool-box.not-ready { border-color:#fecaca; background:#fef2f2; }
    .st-pool-top { display:flex; align-items:center; gap:8px; margin-bottom:9px; }
    .st-pool-top .material-symbols-outlined { color:#047857; font-size:17px; }
    .st-pool-title { font-size:12px; color:#065f46; font-weight:800; }
    .st-pool-box.not-ready .st-pool-top .material-symbols-outlined,
    .st-pool-box.not-ready .st-pool-title { color:#991b1b; }
    .st-pool-stats { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:6px; }
    .st-pool-stat { background:rgba(255,255,255,.72); border:1px solid #d1fae5; border-radius:6px; padding:7px 8px; min-width:0; }
    .st-pool-stat b { display:block; color:#064e3b; font-size:12px; line-height:1.2; }
    .st-pool-stat span { display:block; color:#047857; font-size:10px; margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .st-tools { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; }
    .st-tool-btn { border:1px solid #e5e7eb; background:#fff; border-radius:8px; padding:10px 8px; min-height:76px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px; cursor:pointer; color:#374151; font-size:11px; font-weight:800; text-align:center; }
    .st-tool-btn:hover { border-color:#bfdbfe; background:#f8fbff; color:#1d4ed8; }
    .st-tool-btn .material-symbols-outlined { font-size:22px; }

    .st-bucket-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px; }
    .st-bucket { background:#fff; border:1px solid #e5e7eb; border-left:4px solid var(--bucket-color); border-radius:8px; padding:13px; cursor:pointer; transition:box-shadow .15s, transform .15s, border-color .15s; min-height:118px; display:flex; flex-direction:column; gap:9px; }
    .st-bucket:hover { transform:translateY(-1px); box-shadow:0 6px 18px rgba(15,23,42,.08); border-color:#cbd5e1; }
    .st-bucket-top { display:flex; align-items:center; justify-content:space-between; gap:8px; }
    .st-bucket-label { color:#374151; font-size:12px; font-weight:800; }
    .st-bucket-erp { color:#6b7280; font-size:10px; font-weight:800; border:1px solid #e5e7eb; background:#f9fafb; border-radius:999px; padding:2px 7px; }
    .st-bucket-count { font-size:28px; font-weight:850; color:var(--bucket-color); line-height:1; }
    .st-bucket-sub { color:#6b7280; font-size:11px; }
    .st-bucket-action { margin-top:auto; display:flex; align-items:center; justify-content:space-between; gap:8px; color:#1f2937; font-size:11px; font-weight:800; padding-top:7px; border-top:1px solid #f1f5f9; }
    .st-bucket-action .material-symbols-outlined { color:var(--bucket-color); font-size:16px; }
    .st-alert { border-radius:8px; padding:12px 14px; display:flex; align-items:center; gap:10px; border:1px solid #fde68a; background:#fffbeb; color:#92400e; }

    @media (max-width: 1180px) {
      .st-topbar, .st-workbench { grid-template-columns:1fr; }
      .st-filters { justify-content:flex-start; }
      .st-bucket-grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
    }
    @media (max-width: 720px) {
      .st-bucket-grid, .st-tools, .st-pool-stats { grid-template-columns:1fr; }
    }

    /* 모달 (검토) */
    .st-modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:1000; display:none; align-items:center; justify-content:center; padding:20px; }
    .st-modal-bg.show { display:flex; }
    .st-modal { background:#fff; border-radius:12px; max-width:1300px; width:100%; max-height:95vh; display:grid; grid-template-columns:1fr 480px; overflow:hidden; }
    .st-modal .img-pane { background:#0e1116; display:flex; align-items:center; justify-content:center; overflow:auto; padding:14px; }
    .st-modal .img-pane img, .st-modal .img-pane iframe { max-width:100%; max-height:90vh; }
    .st-modal .info-pane { padding:18px 20px; overflow-y:auto; max-height:95vh; }
