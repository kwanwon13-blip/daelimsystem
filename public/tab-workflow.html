<div class="wf-tab-root">
<style>
  .wf-shell{height:calc(100vh - 112px);min-height:680px;display:grid;grid-template-columns:minmax(640px,1fr) minmax(520px,620px);gap:14px;color:#1f2937;}
  .wf-shell.no-detail{grid-template-columns:minmax(0,1fr);}
  .wf-shell.no-detail .wf-detail{display:none;}
  .wf-board,.wf-detail{background:#fff;border:1px solid #dfe4ed;border-radius:8px;overflow:hidden;}
  .wf-board{display:flex;flex-direction:column;}
  .wf-toolbar{height:58px;display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid #e5e9f1;background:#fbfcfe;}
  .wf-toolbar h2{font-size:15px;font-weight:800;margin:0;color:#111827;}
  .wf-input,.wf-select,.wf-textarea{border:1px solid #cfd6e3;border-radius:6px;background:#fff;color:#1f2937;font-size:12px;outline:none;}
  .wf-input,.wf-select{height:34px;padding:0 9px;}
  .wf-textarea{padding:8px 9px;resize:vertical;min-height:68px;line-height:1.45;}
  .wf-btn{height:34px;border:1px solid #cfd6e3;border-radius:6px;background:#fff;color:#1f2937;font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:5px;padding:0 10px;cursor:pointer;}
  .wf-btn.primary{background:#2563eb;color:#fff;border-color:#2563eb;}
  .wf-btn.ghost{background:#f8fafc;}
  .wf-btn:disabled{opacity:.5;cursor:not-allowed;}
  .wf-summary{display:flex;align-items:center;gap:10px;min-height:34px;padding:6px 12px;border-bottom:1px solid #e5e9f1;background:#fff;overflow:auto;}
  .wf-metric{appearance:none;border:0;border-right:1px solid #e5e9f1;padding:0 10px 0 0;background:transparent;min-width:max-content;display:inline-flex;align-items:center;gap:4px;text-align:left;}
  .wf-metric.clickable{cursor:pointer;}
  .wf-metric.clickable:hover strong{text-decoration:underline;}
  .wf-metric:last-child{border-right:none;}
  .wf-metric strong{display:inline;font-size:13px;line-height:1;color:#111827;}
  .wf-metric span{display:inline;font-size:11px;color:#64748b;margin:0;}
  .wf-metric.warn strong{color:#b91c1c;}
  .wf-metric.action strong{color:#1d4ed8;}
  .wf-inbox{display:none!important;gap:8px;overflow:auto;padding:9px 12px;border-bottom:1px solid #e5e9f1;background:#f8fbff;}
  .wf-inbox-item{min-width:220px;max-width:320px;border:1px solid #bfdbfe;border-radius:8px;background:#fff;padding:8px;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:6px;align-items:center;}
  .wf-inbox-title{font-size:12px;font-weight:800;color:#111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .wf-inbox-meta{font-size:10.5px;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
  .wf-focus-strip{display:flex;gap:7px;overflow:auto;padding:8px 12px;border-bottom:1px solid #e5e9f1;background:#fff;}
  .wf-focus-item{min-width:190px;max-width:290px;height:42px;border:1px solid #dbe3ef;border-radius:7px;background:#fff;color:#1f2937;padding:6px 8px;display:grid;grid-template-columns:auto minmax(0,1fr);grid-template-rows:auto auto;gap:2px 6px;text-align:left;cursor:pointer;}
  .wf-focus-item strong{font-size:11.5px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2;}
  .wf-focus-item > span:last-child{grid-column:2;color:#64748b;font-size:10.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2;}
  .wf-focus-tag{grid-row:1 / span 2;align-self:center;border-radius:999px;padding:3px 6px;background:#e0f2fe;color:#0369a1;font-size:10px;font-weight:900;white-space:nowrap;}
  .wf-focus-item.urgent{border-color:#fecaca;background:#fff5f5;}
  .wf-focus-item.urgent .wf-focus-tag{background:#fee2e2;color:#b91c1c;}
  .wf-focus-item.warn{border-color:#fed7aa;background:#fff7ed;}
  .wf-focus-item.warn .wf-focus-tag{background:#ffedd5;color:#c2410c;}
  .wf-focus-item.info{border-color:#bfdbfe;background:#eff6ff;}
  .wf-new{display:grid;grid-template-columns:minmax(170px,1.5fr) minmax(120px,.9fr) minmax(130px,1fr) minmax(120px,.75fr) minmax(120px,.7fr) auto;gap:8px;padding:10px 12px;border-bottom:1px solid #e5e9f1;background:#f8fafc;}
  .wf-creator{height:34px;display:flex;align-items:center;gap:5px;border:1px solid #e1e6ef;border-radius:6px;background:#fff;padding:0 9px;color:#475569;font-size:11px;font-weight:800;min-width:0;}
  .wf-creator span:last-child{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .wf-columns{flex:1;min-height:0;display:flex;overflow:auto;background:#eef2f7;}
  .wf-col{flex:1 0 300px;min-width:280px;border-right:1px solid #dfe4ed;display:flex;flex-direction:column;}
  .wf-col.is-empty{flex:0 0 86px;min-width:86px;background:#f8fafc;}
  .wf-col:last-child{border-right:none;}
  .wf-col-head{height:42px;display:flex;align-items:center;justify-content:space-between;padding:0 10px;background:#f8fafc;border-bottom:1px solid #dfe4ed;font-size:12px;font-weight:800;color:#374151;}
  .wf-col.is-empty .wf-col-head{height:100%;flex-direction:column;justify-content:flex-start;gap:8px;padding:10px 6px;border-bottom:none;}
  .wf-col.is-empty .wf-col-head > span:first-child{flex-direction:column;text-align:center;line-height:1.2;}
  .wf-col.is-empty .wf-col-list{display:none;}
  .wf-col-list{padding:8px;display:flex;flex-direction:column;gap:6px;overflow:auto;}
  .wf-card{border:1px solid #d8dee9;border-radius:8px;background:#fff;padding:8px 9px;cursor:pointer;box-shadow:0 1px 2px rgba(15,23,42,.04);transition:border-color .16s ease,box-shadow .16s ease,padding .16s ease;}
  .wf-card.active{border-color:#2563eb;box-shadow:0 0 0 2px rgba(37,99,235,.12);padding:10px;}
  .wf-card-title{font-size:13px;font-weight:800;color:#111827;line-height:1.32;margin-bottom:4px;word-break:break-word;}
  .wf-card:not(.active) .wf-card-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .wf-card-meta{font-size:11px;color:#6b7280;display:flex;gap:5px;flex-wrap:wrap;line-height:1.4;}
  .wf-card:not(.active) .wf-card-meta{display:none;}
  .wf-card-compact{display:flex;gap:5px;flex-wrap:nowrap;overflow:hidden;margin-top:5px;}
  .wf-card.active .wf-card-compact{display:none;}
  .wf-card-extra{display:none;gap:5px;flex-wrap:wrap;margin-top:8px;}
  .wf-card.active .wf-card-extra{display:flex;}
  .wf-card:not(.active) .wf-chip{height:18px;padding:0 6px;font-size:10px;}
  .wf-card:not(.active) .wf-card-visual{display:none!important;}
  .wf-card-visual{position:relative;display:block;height:180px;margin:-2px -3px 8px -3px;border-radius:6px;overflow:hidden;background:#e2e8f0;}
  .wf-card-visual img{width:100%;height:100%;object-fit:cover;display:block;}
  .wf-card-visual.image-failed::after,.wf-proof-thumb.image-failed::after{content:'미리보기 실패';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#e2e8f0;color:#475569;font-size:11px;font-weight:900;}
  .wf-card-visual-label{position:absolute;left:6px;bottom:6px;height:19px;border-radius:999px;background:rgba(15,23,42,.82);color:#fff;font-size:10px;font-weight:900;padding:2px 7px;}
  .wf-card-visual-urgent{position:absolute;top:6px;left:6px;height:19px;border-radius:999px;background:#dc2626;color:#fff;font-size:10px;font-weight:900;padding:2px 7px;}
  .wf-card-visual-date{position:absolute;right:6px;bottom:6px;height:19px;border-radius:999px;background:rgba(255,255,255,.9);color:#111827;font-size:10px;font-weight:900;padding:2px 7px;}
  .wf-chip{height:20px;display:inline-flex;align-items:center;border-radius:999px;padding:0 7px;font-size:10.5px;font-weight:800;border:1px solid #dbe3ef;background:#f8fafc;color:#475569;}
  .wf-chip.urgent{background:#fee2e2;color:#b91c1c;border-color:#fecaca;}
  .wf-chip.high{background:#ffedd5;color:#c2410c;border-color:#fed7aa;}
  .wf-chip.done{background:#dcfce7;color:#15803d;border-color:#bbf7d0;}
  .wf-chip.blocked{background:#fee2e2;color:#b91c1c;border-color:#fecaca;}
  .wf-chip.unread{background:#dbeafe;color:#1d4ed8;border-color:#bfdbfe;}
  .wf-chip.overdue{background:#fee2e2;color:#b91c1c;border-color:#fecaca;}
  .wf-chip.approved{background:#dcfce7;color:#15803d;border-color:#bbf7d0;}
  .wf-chip.change_requested{background:#ffedd5;color:#c2410c;border-color:#fed7aa;}
  .wf-chip.ready{background:#dcfce7;color:#15803d;border-color:#bbf7d0;}
  .wf-chip.not_ready{background:#fef3c7;color:#92400e;border-color:#fde68a;}
  .wf-detail-head{padding:12px;border-bottom:1px solid #e5e9f1;background:#fbfcfe;}
  .wf-detail-title{font-size:14px;font-weight:900;color:#111827;line-height:1.35;word-break:break-word;}
  .wf-detail-subtitle{margin-top:3px;display:flex;gap:6px;flex-wrap:wrap;color:#64748b;font-size:11px;line-height:1.3;}
  .wf-archive-strip{margin-top:8px;border:1px solid #bbf7d0;border-radius:7px;background:#f0fdf4;padding:8px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
  .wf-archive-main{display:flex;align-items:center;gap:5px;color:#166534;font-size:12px;font-weight:900;}
  .wf-archive-meta{color:#475569;font-size:11px;line-height:1.35;min-width:0;word-break:break-word;}
  .wf-detail-body{flex:1;min-height:0;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:12px;}
  .wf-detail-body .wf-section:nth-of-type(1){order:2;}
  .wf-detail-body .wf-section:nth-of-type(2){order:3;}
  .wf-detail-body .wf-section:nth-of-type(3){order:1;}
  .wf-detail-body .wf-section:nth-of-type(4){order:4;}
  .wf-section{border:1px solid #e1e6ef;border-radius:8px;background:#fff;}
  .wf-section-title{height:34px;display:flex;align-items:center;gap:6px;padding:0 10px;border-bottom:1px solid #edf0f5;background:#f8fafc;font-size:12px;font-weight:800;color:#374151;}
  .wf-section-body{padding:10px;display:flex;flex-direction:column;gap:8px;}
  .wf-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .wf-stage-row{display:grid;grid-template-columns:84px 84px 1fr auto auto;gap:6px;align-items:center;padding:7px;border:1px solid #edf0f5;border-radius:6px;background:#fff;}
  .wf-stage-row.overdue{border-color:#fecaca;background:#fff5f5;}
  .wf-stage-name{font-size:12px;font-weight:800;color:#111827;}
  .wf-stage-block{border:1px solid #edf0f5;border-radius:7px;background:#fff;}
  .wf-stage-block.overdue{border-color:#fecaca;background:#fff5f5;}
  .wf-stage-block .wf-stage-row{border:none;border-radius:0;background:transparent;}
  .wf-checklist{display:flex;gap:6px;flex-wrap:wrap;padding:0 8px 8px 8px;}
  .wf-checkitem{height:24px;border:1px solid #dbe3ef;border-radius:999px;background:#f8fafc;color:#475569;padding:0 8px;font-size:11px;font-weight:800;display:inline-flex;align-items:center;gap:4px;cursor:pointer;}
  .wf-checkitem.done{background:#dcfce7;color:#15803d;border-color:#bbf7d0;}
  .wf-handoff{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;padding:8px;border:1px solid #bfdbfe;border-radius:6px;background:#eff6ff;}
  .wf-delivery{display:flex;gap:6px;flex-wrap:wrap;align-items:center;padding:8px;border:1px solid #bfdbfe;border-radius:7px;background:#eff6ff;}
  .wf-upload-panel{border:1px solid #bfdbfe;border-radius:8px;background:#f8fbff;padding:10px;display:flex;flex-direction:column;gap:9px;}
  .wf-gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;}
  .wf-gallery.proof-strip{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;overflow:visible;padding-bottom:0;}
  .wf-gallery.proof-strip .wf-proof-card{min-width:0;max-width:none;}
  .wf-proof-card,.wf-file-card{border:1px solid #edf0f5;border-radius:8px;background:#fff;overflow:hidden;}
  .wf-proof-card.unread,.wf-file-card.unread{border-color:#bfdbfe;background:#eff6ff;}
  .wf-proof-card.urgent,.wf-file-card.urgent{border-color:#fecaca;background:#fff7f7;}
  .wf-proof-thumb{position:relative;display:block;width:100%;aspect-ratio:4/3;min-height:0;border:0;background:#f1f5f9;padding:0;cursor:pointer;overflow:hidden;}
  .wf-proof-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .wf-proof-thumb:hover img{transform:scale(1.02);}
  .wf-proof-badge{position:absolute;top:7px;left:7px;height:20px;border-radius:999px;background:rgba(15,23,42,.82);color:#fff;font-size:10px;font-weight:800;padding:3px 7px;}
  .wf-proof-info{padding:8px;display:flex;flex-direction:column;gap:6px;}
  .wf-proof-meta{display:none;}
  .wf-proof-card.active .wf-proof-meta,.wf-file-card.active .wf-proof-meta{display:block;}
  .wf-file-card{display:grid;grid-template-columns:48px minmax(0,1fr);gap:8px;align-items:center;padding:8px;}
  .wf-file-icon{height:48px;border-radius:8px;background:#f1f5f9;color:#475569;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;border:1px solid #e2e8f0;}
  .wf-file-icon.ai{background:#111827;color:#fff;border-color:#111827;}
  .wf-file-name{font-size:12px;font-weight:800;color:#111827;word-break:break-all;line-height:1.35;}
  .wf-file-thread{border-top:1px solid #edf0f5;padding-top:6px;display:flex;flex-direction:column;gap:5px;}
  .wf-file-msg{font-size:11px;line-height:1.35;color:#334155;background:#f8fafc;border-radius:6px;padding:5px 6px;}
  .wf-file-msg strong{font-weight:800;color:#111827;}
  .wf-file-comment{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:5px;}
  .wf-file-collab{display:none;border-top:1px solid #edf0f5;padding-top:7px;gap:6px;flex-direction:column;}
  .wf-proof-card.active .wf-file-collab,.wf-file-card.active .wf-file-collab{display:flex;}
  .wf-collab-compact{display:grid;grid-template-columns:110px minmax(0,1fr) auto;gap:6px;align-items:center;}
  .wf-collab-actions{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
  .wf-file-summary{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:4px;font-size:11px;color:#475569;}
  .wf-file-summary strong{color:#111827;}
  .wf-proof-secondary{display:none;}
  .wf-proof-card.active .wf-proof-secondary,.wf-file-card.active .wf-proof-secondary{display:block;}
  .wf-dropzone{min-height:118px;border:1px dashed #9db4d8;border-radius:8px;background:#fff;padding:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;color:#334155;text-align:center;cursor:pointer;}
  .wf-dropzone.drag{border-color:#2563eb;background:#eff6ff;}
  .wf-dropzone.busy{opacity:.68;pointer-events:none;}
  .wf-dropzone strong{font-size:12px;color:#111827;}
  .wf-dropzone span{font-size:11px;color:#64748b;}
  .wf-upload-hint{font-size:11px;color:#64748b;font-weight:800;}
  .wf-upload-progress{border:1px solid #bfdbfe;border-radius:7px;background:#eff6ff;padding:8px;display:flex;flex-direction:column;gap:6px;}
  .wf-upload-progress-row{display:flex;justify-content:space-between;gap:10px;font-size:11px;font-weight:800;color:#1d4ed8;}
  .wf-upload-progress-track{height:7px;border-radius:999px;background:#dbeafe;overflow:hidden;}
  .wf-upload-progress-bar{height:100%;border-radius:999px;background:#2563eb;transition:width .18s ease;}
  .wf-modal-dropzone{min-height:96px;padding:12px;}
  .wf-new-file-list{display:flex;flex-direction:column;gap:6px;}
  .wf-new-file-summary{border:1px solid #bfdbfe;border-radius:6px;background:#eff6ff;color:#1d4ed8;font-size:11px;font-weight:900;padding:6px 8px;display:flex;justify-content:space-between;gap:8px;}
  .wf-new-file-row{display:grid;grid-template-columns:minmax(0,1fr) auto auto;gap:8px;align-items:center;border:1px solid #e1e6ef;border-radius:6px;background:#f8fafc;padding:6px 8px;}
  .wf-new-file-row strong{font-size:12px;color:#111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .wf-new-file-row span{font-size:11px;color:#64748b;white-space:nowrap;}
  .wf-project-picks{display:flex;gap:5px;flex-wrap:wrap;align-items:center;max-height:86px;overflow:auto;}
  .wf-project-pick{height:24px;max-width:210px;border:1px solid #dbe3ef;border-radius:999px;background:#fff;color:#334155;padding:0 8px;font-size:11px;font-weight:800;display:inline-flex;align-items:center;gap:5px;cursor:pointer;min-width:0;}
  .wf-project-pick span:first-child{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
  .wf-project-pick small{font-size:10px;color:#64748b;font-weight:800;white-space:nowrap;}
  .wf-company-picks{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:5px;max-height:180px;overflow:auto;border:1px solid #e1e6ef;border-radius:6px;background:#f8fafc;padding:6px;}
  .wf-company-pick{height:28px;border:1px solid #dbe3ef;border-radius:6px;background:#fff;color:#334155;padding:0 8px;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:space-between;gap:6px;cursor:pointer;min-width:0;}
  .wf-company-pick strong{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;font-size:11px;}
  .wf-company-pick small{font-size:10px;color:#64748b;font-weight:800;white-space:nowrap;}
  .wf-preview-modal{position:fixed;inset:0;z-index:9999;background:rgba(3,7,18,.88);display:flex;align-items:center;justify-content:center;padding:10px;}
  .wf-preview-panel{width:calc(100vw - 20px);height:calc(100vh - 20px);background:#0f172a;border-radius:6px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 70px rgba(0,0,0,.45);}
  .wf-preview-head{height:48px;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:0 12px;color:#fff;border-bottom:1px solid rgba(255,255,255,.12);flex:0 0 auto;}
  .wf-preview-head strong{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .wf-preview-tools{display:flex;gap:6px;align-items:center;flex:0 0 auto;}
  .wf-preview-stage{flex:1;min-height:0;overflow:auto;background:#020617;display:flex;align-items:center;justify-content:center;padding:12px;}
  .wf-preview-stage.zoomed{align-items:flex-start;justify-content:flex-start;}
  .wf-preview-image{display:block;object-fit:contain;background:#111827;}
  .wf-modal{position:fixed;inset:0;z-index:9998;background:rgba(15,23,42,.42);display:flex;align-items:center;justify-content:center;padding:18px;}
  .wf-dialog{width:min(560px,calc(100vw - 36px));background:#fff;border:1px solid #dfe4ed;border-radius:8px;box-shadow:0 24px 70px rgba(15,23,42,.24);overflow:hidden;}
  .wf-dialog.wide{width:min(760px,calc(100vw - 36px));}
  .wf-dialog-head{height:48px;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:0 14px;border-bottom:1px solid #edf0f5;background:#fbfcfe;}
  .wf-dialog-title{font-size:14px;font-weight:900;color:#111827;display:flex;align-items:center;gap:7px;}
  .wf-dialog-body{padding:14px;display:flex;flex-direction:column;gap:10px;}
  .wf-dialog-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;border-top:1px solid #edf0f5;background:#fbfcfe;}
  .wf-field{display:flex;flex-direction:column;gap:5px;}
  .wf-field label{font-size:11px;font-weight:900;color:#475569;}
  .wf-modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .wf-event{padding:8px;border-left:3px solid #cbd5e1;background:#f8fafc;border-radius:4px;font-size:12px;color:#334155;line-height:1.45;}
  .wf-event.unread{border-left-color:#2563eb;background:#eff6ff;}
  .wf-event.active{border-left-color:#f59e0b;background:#fffbeb;box-shadow:0 0 0 1px #fde68a inset;}
  .wf-muted{color:#6b7280;font-size:11px;}
  .wf-empty{height:100%;display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:13px;}
  @media (max-width:1200px){.wf-shell{grid-template-columns:1fr;height:auto}.wf-detail{min-height:620px}.wf-columns{height:560px}.wf-summary{grid-template-columns:repeat(2,1fr)}.wf-new{grid-template-columns:1fr 1fr}.wf-new .wf-btn.primary{width:100%;justify-content:center;}}
</style>

<div class="fade-in" x-data="workflowApp()" x-init="init()">
  <datalist id="wfContactNames">
    <template x-for="c in contactOptions" :key="c.name + c.phone">
      <option :value="c.name" :label="(c.company || '') + (c.phone ? ' · ' + c.phone : '')"></option>
    </template>
  </datalist>
  <datalist id="wfCompanyNames">
    <template x-for="company in workflowCompanyNames()" :key="company">
      <option :value="company"></option>
    </template>
  </datalist>
  <datalist id="wfFormProjectNames">

    </aside>
  </div>

  <div class="wf-modal" x-show="orderMailModal.open" x-cloak x-transition @click.self="closeOrderMail()" @keydown.window.escape="closeOrderMail()">
    <div class="wf-dialog">
      <div class="wf-dialog-head">
        <div class="wf-dialog-title">
          <span class="material-symbols-outlined" style="font-size:18px;">mail</span>
          업체 메일 발송
        </div>
        <button class="wf-btn ghost" style="height:28px;" @click="closeOrderMail()" title="닫기">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <div class="wf-dialog-body">
        <input class="wf-input" x-model="orderMailModal.toEmail" placeholder="받는 이메일">
        <p class="wf-muted" style="margin:0;" x-show="!String(orderMailModal.toEmail || '').trim()">업체/연락처에 이메일을 등록하면 다음 발송부터 자동으로 들어옵니다.</p>
        <input class="wf-input" x-model="orderMailModal.ccEmail" placeholder="참조 이메일">
        <input class="wf-input" x-model="orderMailModal.subject" placeholder="제목">
        <textarea class="wf-textarea" rows="6" x-model="orderMailModal.message" placeholder="본문"></textarea>
        <p class="wf-muted" style="margin:0;font-weight:800;" x-show="orderMailModal.order" x-text="orderMailAttachmentText(orderMailModal.order)"></p>
        <label style="display:flex;align-items:center;gap:7px;font-size:12px;color:#334155;">
          <input type="checkbox" x-model="orderMailModal.attachFiles" :disabled="orderMailAttachmentTooLarge(orderMailModal.order)" @change="orderMailModal.linkOnlySuggested = false">
          파일 첨부
        </label>
        <p class="wf-muted" style="margin:0;">첨부 용량이 큰 경우 체크를 끄면 터널 다운로드 링크만 발송합니다.</p>
        <p class="wf-muted" style="margin:0;" :style="(!orderMailModal.attachFiles && !publicShareBaseUrl) ? 'color:#dc2626;font-weight:800;' : ''" x-show="orderMailLinkStateText()" x-text="orderMailLinkStateText()"></p>
        <p class="wf-muted" style="margin:0;color:#b45309;font-weight:800;" x-show="orderMailModal.linkOnlySuggested">첨부 용량이 커서 링크만 발송으로 전환했습니다.</p>
        <p x-show="orderMailModal.error" x-text="orderMailModal.error" style="margin:0;color:#dc2626;font-size:12px;font-weight:800;"></p>
      </div>
      <div class="wf-dialog-foot">
        <span class="wf-muted" x-text="orderMailModal.order ? ((orderMailModal.order.fileCount || 0) + '개 파일') : ''"></span>
        <button class="wf-btn primary" @click="sendOrderMail()" :disabled="!canSendOrderMail()" x-text="orderMailModal.sending ? '발송 중' : (orderMailModal.attachFiles ? '메일 발송' : '링크만 발송')"></button>
      </div>
    </div>
  </div>

  <div class="wf-modal" x-show="projectPanelOpen" x-cloak x-transition @click.self="closeProjectPanel()" @keydown.window.escape="closeProjectPanel()">
    <div class="wf-dialog wide">
      <div class="wf-dialog-head">
        <div class="wf-dialog-title">
          <span class="material-symbols-outlined" style="font-size:17px;">folder_managed</span>
          프로젝트 관리
        </div>
        <button class="wf-btn ghost" style="height:28px;" @click="closeProjectPanel()">닫기</button>
      </div>
      <div class="wf-dialog-body" style="max-height:72vh;overflow:auto;">
        <div class="wf-upload-panel">
          <div class="wf-modal-grid">
            <div class="wf-field">
              <label>회사명</label>
              <input class="wf-input" list="wfCompanyNames" x-model="projectForm.companyName" placeholder="회사명">
            </div>
            <div class="wf-field">
              <label>프로젝트명</label>
              <input class="wf-input" x-model="projectForm.projectName" placeholder="프로젝트명">
            </div>
            <div class="wf-field">
              <label>연도</label>
              <input class="wf-input" x-model="projectForm.year" placeholder="2026">
            </div>
            <div class="wf-field">
              <label>상태</label>
              <select class="wf-select" x-model="projectForm.status">
                <option value="active">진행</option>
                <option value="done">완료</option>
              </select>
            </div>
          </div>
          <div class="wf-company-picks" x-show="workflowCompanySuggestions(projectForm.companyName, 18).length">
            <template x-for="company in workflowCompanySuggestions(projectForm.companyName, 18)" :key="'project-company-'+company.name">
              <button type="button" class="wf-company-pick" @click="projectForm.companyName = company.name">
                <strong x-text="company.name"></strong>
                <small x-text="(company.projectCount || 0) + ' 현장'"></small>
              </button>
            </template>
          </div>
          <div style="display:flex;justify-content:space-between;gap:8px;align-items:center;flex-wrap:wrap;">
            <span class="wf-muted" x-text="'저장 경로: ' + workflowStorageText(projectForm.companyName, projectForm.projectName, projectForm.year)"></span>
            <button class="wf-btn primary" @click="createManagedProject()" :disabled="!projectForm.companyName || !projectForm.projectName">프로젝트 추가</button>
          </div>
          <div class="wf-muted" x-show="projectNotice" x-text="projectNotice"></div>
        </div>

        <div style="display:grid;grid-template-columns:minmax(0,1fr) 120px;gap:8px;">
          <input class="wf-input" x-model="projectQuery" placeholder="회사명 또는 프로젝트명 검색">
          <select class="wf-select" x-model="projectStatusFilter">
            <option value="active">진행</option>
            <option value="done">완료</option>
            <option value="all">전체</option>
          </select>
        </div>
        <div class="wf-gallery" x-show="filteredWorkflowProjects().length">
          <template x-for="project in filteredWorkflowProjects()" :key="project.id">
            <article class="wf-file-card" style="grid-template-columns:minmax(0,1fr);">
              <div style="display:flex;flex-direction:column;gap:7px;min-width:0;">
                <div style="display:flex;justify-content:space-between;gap:8px;align-items:flex-start;">
                  <div style="min-width:0;">
                    <div class="wf-file-name" x-text="project.projectName"></div>
                    <div class="wf-muted" x-text="project.companyName"></div>
                  </div>
                  <span class="wf-chip" :class="project.status === 'done' ? 'done' : 'ready'" x-text="projectStatusLabel(project.status)"></span>
                </div>
                <div class="wf-muted" x-show="project.storageBucket" x-text="project.storageBucket"></div>
                <div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center;">
                  <span class="wf-chip" x-text="'작업 ' + (project.jobCount || 0)"></span>
                  <span class="wf-chip unread" x-show="project.activeJobCount" x-text="'진행 ' + project.activeJobCount"></span>
                  <span class="wf-chip done" x-show="project.doneJobCount" x-text="'완료 ' + project.doneJobCount"></span>
                  <select class="wf-select" style="height:28px;margin-left:auto;" :value="project.status" @change="saveWorkflowProjectStatus(project, $event.target.value)">
                    <option value="active">진행</option>
                    <option value="done">완료</option>
                  </select>
                </div>
              </div>
            </article>
          </template>
        </div>
        <div class="wf-empty" style="height:120px;" x-show="!filteredWorkflowProjects().length">등록된 프로젝트가 없습니다.</div>
      </div>
    </div>
  </div>
  <div class="wf-modal" x-show="newOpen" x-cloak x-transition @click.self="closeNewJobModal()" @keydown.window.escape="closeNewJobModal()">
    <div class="wf-dialog wide">
      <div class="wf-dialog-head">
        <div class="wf-dialog-title">
          <span class="material-symbols-outlined" style="font-size:17px;">add_task</span>
          작업 등록
        </div>
        <button class="wf-btn ghost" style="height:28px;" @click="closeNewJobModal()">닫기</button>
      </div>
      <div class="wf-dialog-body">
        <div class="wf-modal-grid">
          <div class="wf-field">
            <label>회사명</label>
            <input class="wf-input" x-ref="newJobCompany" list="wfCompanyNames" x-model="form.companyName" @change="syncAutoJobTitle()" placeholder="직접 입력 또는 선택">
            <div class="wf-company-picks" x-show="workflowCompanySuggestions(form.companyName, 36).length">
              <template x-for="company in workflowCompanySuggestions(form.companyName, 36)" :key="'new-company-'+company.name">
                        <button type="button" class="wf-company-pick" @click="form.companyName = company.name; form.projectName = ''; syncAutoJobTitle(true)">
                  <strong x-text="company.name"></strong>
                  <small x-text="(company.projectCount || 0) + ' 현장'"></small>
                </button>
              </template>
            </div>
          </div>
          <div class="wf-field">
            <label>프로젝트/현장</label>
            <input class="wf-input" list="wfFormProjectNames" x-model="form.projectName" @change="syncAutoJobTitle()" placeholder="프로젝트명">
            <div class="wf-project-picks" x-show="workflowProjectSuggestions(form.companyName, 16, form.projectName).length">
              <template x-for="project in workflowProjectSuggestions(form.companyName, 16, form.projectName)" :key="'new-project-'+project.name">
                <button type="button" class="wf-project-pick" @click="form.projectName = project.name; syncAutoJobTitle(true)">
                  <span x-text="project.name"></span>
                  <small x-show="projectBadge(project)" x-text="projectBadge(project)"></small>
                </button>
              </template>
            </div>
            <div style="display:flex;justify-content:flex-end;">
              <button type="button" class="wf-btn ghost" style="height:28px;" @click="addFormProjectFolder()" :disabled="!form.companyName || !form.projectName">프로젝트 추가</button>
            </div>
          </div>
          <div class="wf-field">
            <label>희망 완료일</label>
            <input class="wf-input" type="date" x-model="form.dueDate">
          </div>
          <div class="wf-field">
            <label>긴급도</label>
            <select class="wf-select" x-model="form.priority">
              <option value="urgent">긴급</option>
              <option value="high">높음</option>
              <option value="normal">보통</option>
              <option value="low">낮음</option>
            </select>
          </div>
        </div>
        <div class="wf-field">
          <label>시안 파일</label>
          <label class="wf-dropzone wf-modal-dropzone" :class="[newUploadDragOver ? 'drag' : '', uploadProgress.active ? 'busy' : '']"
            @dragover.prevent="newUploadDragOver=true"
            @dragleave.prevent="newUploadDragOver=false"
            @drop="handleNewDrop($event)">
            <div>
              <strong>JPG · PNG · AI 파일을 여러 개 올릴 수 있습니다</strong>
              <span x-text="'저장 경로: ' + newStorageLabel()"></span>
              <small class="wf-upload-hint" x-text="uploadFilesLimitLabel()"></small>
            </div>
            <span class="wf-btn">파일 선택</span>
            <input type="file" multiple style="display:none;" @change="handleNewFiles($event)">
          </label>
          <div class="wf-new-file-list" x-show="newFiles.length">
            <div class="wf-new-file-summary">
              <span x-text="fileBatchLabel(newFiles)"></span>
              <span x-text="fileBatchPreview(newFiles)"></span>
            </div>
            <template x-for="(file, idx) in newFiles" :key="file.name + file.size + file.lastModified + idx">
              <div class="wf-new-file-row">
                <strong x-text="file.name"></strong>
                <span x-text="fileSizeLabel(file.size)"></span>
                <button class="wf-btn ghost" style="height:26px;padding:0 8px;" @click="removeNewFile(idx)">삭제</button>
              </div>
            </template>
          </div>
          <div class="wf-upload-progress" x-show="uploadProgress.active" x-cloak>
            <div class="wf-upload-progress-row">
              <span x-text="uploadProgress.text || '파일 업로드 중'"></span>
              <span x-text="(uploadProgress.percent || 0) + '%'"></span>
            </div>
            <div class="wf-upload-progress-track">
              <div class="wf-upload-progress-bar" :style="'width:' + (uploadProgress.percent || 0) + '%'"></div>
            </div>
          </div>
        </div>
        <div class="wf-field">
          <label>메모</label>
          <textarea class="wf-textarea" x-model="form.summary" placeholder="전달할 내용을 짧게 입력"></textarea>
        </div>
      </div>
      <div class="wf-dialog-foot">
        <div class="wf-creator" title="담당자는 로그인 사용자로 자동 저장됩니다.">
          <span class="material-symbols-outlined" style="font-size:15px;">person</span>
          <span x-text="'담당 ' + currentUserLabel()"></span>
        </div>
        <button class="wf-btn primary" @click="createJob()" :disabled="saving">
          <span class="material-symbols-outlined" style="font-size:16px;">check</span>등록
        </button>
      </div>
    </div>
  </div>
<div class="wf-preview-modal" x-show="filePreview.open" x-cloak @click.self="closeFilePreview()" @keydown.window.escape="closeFilePreview()">
  <div class="wf-preview-panel">
    <div class="wf-preview-head">
      <strong x-text="filePreview.file?.originalName || '시안 미리보기'"></strong>
      <div class="wf-preview-tools">
        <button class="wf-btn" style="height:28px;background:#fff;color:#111827;" @click="fitPreview()">맞춤</button>
        <button class="wf-btn" style="height:28px;background:#fff;color:#111827;" @click="actualPreview()">100%</button>
        <button class="wf-btn" style="height:28px;background:#fff;color:#111827;" @click="zoomPreview(-0.25)">-</button>
        <span class="wf-chip" style="height:28px;background:#1e293b;color:#fff;border-color:#334155;" x-text="previewZoomLabel()"></span>
        <button class="wf-btn" style="height:28px;background:#fff;color:#111827;" @click="zoomPreview(0.25)">+</button>
        <a class="wf-btn" style="height:28px;background:#fff;color:#111827;" :href="filePreview.file ? fileUrl(filePreview.file) : '#'">원본</a>
        <button class="wf-btn" style="height:28px;background:#fff;color:#111827;" @click="closeFilePreview()">닫기</button>
      </div>
    </div>
    <div class="wf-preview-stage" :class="filePreview.fit ? '' : 'zoomed'">
      <img class="wf-preview-image" x-show="filePreview.file" :src="filePreview.file ? filePreviewUrl(filePreview.file) : ''" :style="previewImageStyle()" alt="">
    </div>
  </div>
</div>
</div>
</div>
